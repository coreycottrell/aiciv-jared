# PayPal Webhook Proxy
# Routes paypal.purebrain.ai → Flask webhook listener on port 8960
# Place in /etc/nginx/conf.d/ or include from main config

server {
    listen 8099;
    server_name paypal.purebrain.ai;

    location /paypal/webhook {
        proxy_pass http://127.0.0.1:8960;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404 '{"error": "not found"}';
        add_header Content-Type application/json;
    }
}
