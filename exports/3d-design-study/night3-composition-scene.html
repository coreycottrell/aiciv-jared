<script type="module">
import * as THREE from 'three';
import { EffectComposer }    from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }        from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }   from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }        from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass }        from 'three/addons/postprocessing/OutputPass.js';
import { SMAAPass }          from 'three/addons/postprocessing/SMAAPass.js';

// ─── DESIGN TOKENS ────────────────────────────────────────────────────────────
const PB = {
  blue:      0x2a93c1,
  orange:    0xf1420b,
  blueL:     0x5ad4ff,
  gold:      0xC8A84A,
  dark:      0x020307,

  // Canonical glass constants (memorized from 13-day sprint)
  glass: {
    roughness:              0.025,
    ior:                    1.52,
    iridescence:            0.45,
    iridescenceIOR:         1.40,
    iridescenceRange:       [100, 420],
    clearcoat:              0.92,
    clearcoatRoughness:     0.015,
    envMapIntensity:        4.8,
    thickness:              1.8,
    attenuationDist:        3.5,
  },

  // Postprocessing (restrained = premium)
  bloom:  { strength: 0.52, radius: 0.42, threshold: 0.82 },
  ca:     0.0022,
  vig:    0.50,
  grain:  0.018,
};

// Prime float frequencies — 120s before pattern repeats
const FF = [0.55, 0.38, 0.22];
const FA = [0.11, 0.075, 0.04];

// ─── RENDERER ─────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.VSMShadowMap;

// ─── SCENE + CAMERA ───────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.05, 120);
camera.position.set(0, 1.2, 7.5);
camera.lookAt(0, 0, 0);

// ─── PMREM ENVIRONMENT (5-Light Studio Probe) ─────────────────────────────────
const pmrem    = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();

// Key: warm white top-right
const lKey = new THREE.PointLight(0xfff2e0, 120, 18);
lKey.position.set(4, 6, 2);
envScene.add(lKey);

// Fill: PureBrain blue left
const lFill = new THREE.PointLight(0x2a93c1, 55, 16);
lFill.position.set(-5, 2, 3);
envScene.add(lFill);

// Rim: orange behind
const lRim = new THREE.PointLight(0xf1420b, 38, 14);
lRim.position.set(1.5, 3, -5);
envScene.add(lRim);

// Bounce: cool blue below
const lBounce = new THREE.PointLight(0x4ab8ff, 22, 10);
lBounce.position.set(-1, -4, 2);
envScene.add(lBounce);

// Ceiling: soft white
const lCeil = new THREE.PointLight(0xe0e8ff, 18, 12);
lCeil.position.set(0, 8, 0);
envScene.add(lCeil);

// Second orange accent for hex interaction
const lOrangeAccent = new THREE.PointLight(0xf1420b, 28, 10);
lOrangeAccent.position.set(3, -1, 4);
envScene.add(lOrangeAccent);

const envTexture = pmrem.fromScene(envScene).texture;
scene.environment = envTexture;
scene.environmentIntensity = 1.0;

// ─── FBM BACKGROUND (ANIMATED GRADIENT MESH) ─────────────────────────────────
const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const bgScene  = new THREE.Scene();
const bgMat = new THREE.ShaderMaterial({
  depthWrite: false,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy, 1.0, 1.0); }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;

    float hash(vec2 p) {
      p = fract(p * vec2(234.34, 435.345));
      p += dot(p, p + 34.23);
      return fract(p.x * p.y);
    }
    float noise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(hash(i), hash(i+vec2(1,0)), f.x),
        mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 6; i++) {
        v += a * noise(p);
        p  = p * 2.1 + vec2(1.7, 9.2);
        a *= 0.48;
      }
      return v;
    }

    void main() {
      vec2 uv  = vUv;
      float t  = uTime * 0.032;

      // Multi-scale fbm for depth
      float f1 = fbm(uv * 1.8 + t);
      float f2 = fbm(uv * 3.5 - t * 0.7 + vec2(5.2, 1.3));
      float f3 = fbm(uv * 7.0 + t * 0.4 + vec2(f1, f2));

      // Deep dark base with blue-shifted nebula veins
      vec3 base    = vec3(0.008, 0.012, 0.022);
      vec3 midBlue = vec3(0.025, 0.058, 0.092);  // PureBrain blue dark
      vec3 warmMid = vec3(0.045, 0.018, 0.010);  // Dark orange glow far center
      vec3 coreGlow= vec3(0.010, 0.030, 0.055);

      float blend1 = smoothstep(0.28, 0.72, f1 * f2 + f3 * 0.4);
      float blend2 = smoothstep(0.40, 0.85, f3 * f2);
      float warm   = smoothstep(0.3, 0.7, fbm(uv * 2.4 + t * 0.6 + 8.8));

      // Radial vignette: slightly brighter toward center
      float vDist = length(uv - 0.5) * 1.6;
      float vMask = 1.0 - smoothstep(0.0, 1.0, vDist * vDist);

      vec3 col = base;
      col      = mix(col, midBlue, blend1 * 0.65);
      col      = mix(col, warmMid, warm * 0.22);
      col      = mix(col, coreGlow, blend2 * vMask * 0.45);

      // Vertical gradient: slightly warmer at bottom (ground glow)
      col += vec3(0.008, 0.003, 0.0) * (1.0 - vUv.y) * 0.8;

      gl_FragColor = vec4(col, 1.0);
    }
  `
});
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat));

// ─── GLASS MATERIAL FACTORY ───────────────────────────────────────────────────
function makeGlass(opts = {}) {
  return new THREE.MeshPhysicalMaterial({
    transmission:              1.0,
    roughness:                 PB.glass.roughness,
    ior:                       PB.glass.ior,
    iridescence:               opts.iridescence ?? PB.glass.iridescence,
    iridescenceIOR:            PB.glass.iridescenceIOR,
    iridescenceThicknessRange: opts.iridescenceRange ?? PB.glass.iridescenceRange,
    clearcoat:                 PB.glass.clearcoat,
    clearcoatRoughness:        PB.glass.clearcoatRoughness,
    envMapIntensity:           opts.envInt ?? PB.glass.envMapIntensity,
    thickness:                 opts.thickness ?? PB.glass.thickness,
    attenuationDistance:       PB.glass.attenuationDist,
    attenuationColor:          new THREE.Color(opts.attenuationColor ?? 0xafd8f0),
    color:                     new THREE.Color(opts.color ?? 0xffffff),
    side:                      opts.side ?? THREE.FrontSide,
    depthWrite:                false,
    transparent:               true,
    specularIntensity:         1.0,
    specularColor:             new THREE.Color(PB.gold),  // gold specular = aged, real
  });
}

function makeGlassBack(opts = {}) {
  return new THREE.MeshPhysicalMaterial({
    transmission:  1.0,
    roughness:     PB.glass.roughness,
    ior:           PB.glass.ior,
    side:          THREE.BackSide,
    depthWrite:    false,
    transparent:   true,
    envMapIntensity: (opts.envInt ?? PB.glass.envMapIntensity) * 0.55,
    thickness:     (opts.thickness ?? PB.glass.thickness) * 0.3,
    color:         new THREE.Color(opts.color ?? 0xffffff),
  });
}

// ─── OBJECT GROUP (parent for all 3 glass objects + interaction) ──────────────
const composition = new THREE.Group();
scene.add(composition);

// ── 1. PRIMARY SPHERE (center-left, elevated) ─────────────────────────────────
//    Signature object. Blue-tinted glass, prominent iridescence.
const sphereGroup = new THREE.Group();
sphereGroup.position.set(-1.2, 0.4, 0.0);
composition.add(sphereGroup);

const sphereGeo = new THREE.SphereGeometry(0.95, 128, 128);

// Backside layer for proper refraction depth
const sphereBack = new THREE.Mesh(sphereGeo, makeGlassBack({
  color: 0xc5e8ff, thickness: 1.5
}));
sphereGroup.add(sphereBack);

// Frontside glass with blue tint
const sphereMesh = new THREE.Mesh(sphereGeo, makeGlass({
  color: 0xe8f4ff,
  attenuationColor: 0x6bbfe8,
  iridescence: 0.48,
  iridescenceRange: [120, 480],
  thickness: 2.0,
  envInt: 5.2,
}));
sphereGroup.add(sphereMesh);

// Sphere inner emissive core — PureBrain blue
const sphereCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.28, 48, 48),
  new THREE.MeshStandardMaterial({
    color: 0x000000, emissive: new THREE.Color(0x2a93c1),
    emissiveIntensity: 2.2, transparent: true, opacity: 0.85,
    depthWrite: false,
  })
);
sphereGroup.add(sphereCore);

// Micro orbiting core inside sphere
const microCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.085, 32, 32),
  new THREE.MeshStandardMaterial({
    color: 0x000000, emissive: new THREE.Color(0xf1420b),
    emissiveIntensity: 3.5, depthWrite: false,
  })
);
sphereGroup.add(microCore);

// ── 2. HEX PRISM (center-right, lower) ───────────────────────────────────────
//    Orange-warm tinted. Bevel critical for clean glass edges.
const hexGroup = new THREE.Group();
hexGroup.position.set(1.35, -0.35, -0.5);
composition.add(hexGroup);

// Build hex shape
const hexShape = new THREE.Shape();
const HR = 0.88;
for (let i = 0; i <= 6; i++) {
  const a = (i / 6) * Math.PI * 2 - Math.PI / 6; // flat-top
  if (i === 0) hexShape.moveTo(Math.cos(a) * HR, Math.sin(a) * HR);
  else         hexShape.lineTo(Math.cos(a) * HR, Math.sin(a) * HR);
}
const hexGeo = new THREE.ExtrudeGeometry(hexShape, {
  depth: 0.58, bevelEnabled: true,
  bevelThickness: 0.08, bevelSize: 0.08, bevelSegments: 6,
});
hexGeo.center();
hexGeo.computeVertexNormals();

const hexBack = new THREE.Mesh(hexGeo, makeGlassBack({
  color: 0xffeedd, thickness: 0.8,
}));
hexGroup.add(hexBack);

const hexMesh = new THREE.Mesh(hexGeo, makeGlass({
  color: 0xfff5ee,
  attenuationColor: 0xf0b888,
  iridescence: 0.42,
  iridescenceRange: [80, 380],
  thickness: 1.4,
  envInt: 4.5,
}));
hexGroup.add(hexMesh);

// Hex inner orange core — dual emissive cores
const hexCoreA = new THREE.Mesh(
  new THREE.SphereGeometry(0.18, 32, 32),
  new THREE.MeshStandardMaterial({
    color: 0x000000, emissive: new THREE.Color(0xf1420b),
    emissiveIntensity: 3.0, depthWrite: false, transparent: true, opacity: 0.9,
  })
);
hexGroup.add(hexCoreA);

const hexCoreB = new THREE.Mesh(
  new THREE.SphereGeometry(0.10, 24, 24),
  new THREE.MeshStandardMaterial({
    color: 0x000000, emissive: new THREE.Color(0x2a93c1),
    emissiveIntensity: 2.5, depthWrite: false,
  })
);
hexGroup.add(hexCoreB);

// ── 3. TORUS RING (background, upper right) ───────────────────────────────────
//    Iridescent maximal. Tumbles on world axis. Creates upper composition balance.
const torusGroup = new THREE.Group();
torusGroup.position.set(0.8, 1.2, -1.8);
composition.add(torusGroup);

const torusGeo = new THREE.TorusGeometry(0.68, 0.12, 64, 128);
const torusMesh = new THREE.Mesh(torusGeo, new THREE.MeshPhysicalMaterial({
  iridescence:              1.0,
  iridescenceIOR:           1.52,
  iridescenceThicknessRange:[180, 650],
  roughness:                0.02,
  metalness:                0.92,
  envMapIntensity:          5.5,
  emissive:                 new THREE.Color(0x6688ff),
  emissiveIntensity:        0.45,
  color:                    new THREE.Color(0x888888),
  depthWrite:               false,
  transparent:              true, opacity: 0.98,
  specularColor:            new THREE.Color(PB.gold),
  specularIntensity:        1.0,
}));
torusGroup.add(torusMesh);

// Second thinner torus as inner ring — offset rotation
const torusInnerGeo = new THREE.TorusGeometry(0.48, 0.055, 48, 96);
const torusInner = new THREE.Mesh(torusInnerGeo, new THREE.MeshPhysicalMaterial({
  iridescence:              0.85,
  iridescenceIOR:           1.38,
  iridescenceThicknessRange:[100, 420],
  roughness:                0.04,
  metalness:                0.88,
  envMapIntensity:          4.8,
  emissive:                 new THREE.Color(0x44aadd),
  emissiveIntensity:        0.3,
  color:                    new THREE.Color(0x999999),
  depthWrite:               false,
  transparent:              true, opacity: 0.95,
}));
torusGroup.add(torusInner);

// Pre-computed world axes for organic tumble (never allocate in animation loop)
const torusAxis1 = new THREE.Vector3(0.28, 1, 0.15).normalize();
const torusAxis2 = new THREE.Vector3(-0.18, 0.95, 0.38).normalize();
const torusAxis3 = new THREE.Vector3(0.12, 0.4, 1.0).normalize();
const innerAxis  = new THREE.Vector3(-0.35, 1, 0.22).normalize();

// ── SMALL SATELLITE SPHERES (orbit sphere main) ────────────────────────────────
const satellites = [];
const satOffsets = [0, Math.PI * 0.67, Math.PI * 1.33]; // 3 satellites at 120° apart
satOffsets.forEach((phase, i) => {
  const satGeo = new THREE.SphereGeometry(0.18, 64, 64);
  const satBack = new THREE.Mesh(satGeo, makeGlassBack({ thickness: 0.6 }));
  const satMesh = new THREE.Mesh(satGeo, makeGlass({
    color:           i === 0 ? 0xe8f0ff : (i === 1 ? 0xffeee8 : 0xe8ffe8),
    attenuationColor:i === 0 ? 0x5588cc : (i === 1 ? 0xcc6633 : 0x44aa88),
    iridescence:     0.52,
    iridescenceRange:[80, 320],
    thickness:       0.65,
    envInt:          4.2,
  }));
  const satGroup = new THREE.Group();
  satGroup.add(satBack, satMesh);
  composition.add(satGroup);
  satellites.push({ group: satGroup, phase, speed: FF[i] * 0.38 });
});

// ─── GROUND PLANE (dark mirror) ───────────────────────────────────────────────
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(22, 22),
  new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(0x030408), roughness: 0.08, metalness: 0.90,
    envMapIntensity: 3.2, reflectivity: 0.85,
  })
);
groundMesh.rotation.x = -Math.PI * 0.5;
groundMesh.position.y = -1.85;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// Ground ambient glow (blue light pool under composition)
function makeCanvasGlow(innerColor, outerColor, res = 256) {
  const cv  = document.createElement('canvas');
  cv.width  = cv.height = res;
  const gc  = cv.getContext('2d');
  const grd = gc.createRadialGradient(res/2, res/2, 0, res/2, res/2, res * 0.48);
  grd.addColorStop(0,   innerColor);
  grd.addColorStop(1,   outerColor);
  gc.fillStyle = grd;
  gc.fillRect(0, 0, res, res);
  const t = new THREE.CanvasTexture(cv);
  return t;
}

const groundGlowTex = makeCanvasGlow('rgba(42,147,193,0.18)', 'rgba(42,147,193,0.0)');
const groundGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 6),
  new THREE.MeshBasicMaterial({
    map: groundGlowTex, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
  })
);
groundGlow.rotation.x = -Math.PI * 0.5;
groundGlow.position.y = -1.84;
scene.add(groundGlow);

// Orange glow under hex
const hexGlowTex = makeCanvasGlow('rgba(241,66,11,0.14)', 'rgba(241,66,11,0.0)');
const hexGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(3.5, 3.5),
  new THREE.MeshBasicMaterial({
    map: hexGlowTex, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
  })
);
hexGlow.rotation.x = -Math.PI * 0.5;
hexGlow.position.set(1.35, -1.83, -0.5);
scene.add(hexGlow);

// ─── PARTICLE SYSTEM (Dust motes + energy field) ──────────────────────────────
// Two-layer: slow ambient dust + fast energy particles near objects

const DUST_COUNT   = 2800;
const ENERGY_COUNT = 600;
const TOTAL_PARTS  = DUST_COUNT + ENERGY_COUNT;

const partPositions = new Float32Array(TOTAL_PARTS * 3);
const partVelocities= new Float32Array(TOTAL_PARTS * 3);
const partSizes     = new Float32Array(TOTAL_PARTS);
const partPhases    = new Float32Array(TOTAL_PARTS);
const partTypes     = new Float32Array(TOTAL_PARTS); // 0=dust 1=energy

// Dust motes: slow drift through a wide volume
for (let i = 0; i < DUST_COUNT; i++) {
  const idx = i * 3;
  // Distribute in ellipsoid volume
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(Math.random() * 2 - 1);
  const r     = Math.cbrt(Math.random()) * 5.5;
  partPositions[idx    ] = r * Math.sin(phi) * Math.cos(theta) * 1.5;
  partPositions[idx + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.9 + 0.2;
  partPositions[idx + 2] = r * Math.cos(phi) * 1.2 - 1.0;
  // Very slow random drift
  partVelocities[idx    ] = (Math.random() - 0.5) * 0.0004;
  partVelocities[idx + 1] = (Math.random() - 0.5) * 0.0003 + 0.00015; // slight upward drift
  partVelocities[idx + 2] = (Math.random() - 0.5) * 0.0003;
  partSizes[i]   = 0.8 + Math.random() * 1.2;
  partPhases[i]  = Math.random() * Math.PI * 2;
  partTypes[i]   = 0;
}

// Energy particles: faster, brighter, cluster near glass objects
const objectPositions = [
  new THREE.Vector3(-1.2, 0.4, 0.0),   // sphere
  new THREE.Vector3(1.35, -0.35, -0.5), // hex
  new THREE.Vector3(0.8, 1.2, -1.8),   // torus
];

for (let i = 0; i < ENERGY_COUNT; i++) {
  const globalIdx = (DUST_COUNT + i) * 3;
  // Pick a nearby object
  const obj = objectPositions[Math.floor(Math.random() * objectPositions.length)];
  const spread = 0.5 + Math.random() * 1.2;
  partPositions[globalIdx    ] = obj.x + (Math.random() - 0.5) * spread * 2;
  partPositions[globalIdx + 1] = obj.y + (Math.random() - 0.5) * spread * 1.6;
  partPositions[globalIdx + 2] = obj.z + (Math.random() - 0.5) * spread * 2;
  // Swirling velocity around object
  const dx = partPositions[globalIdx]     - obj.x;
  const dy = partPositions[globalIdx + 1] - obj.y;
  const dz = partPositions[globalIdx + 2] - obj.z;
  const distXZ = Math.sqrt(dx*dx + dz*dz) + 0.01;
  partVelocities[globalIdx    ] = -dz / distXZ * 0.0018 + (Math.random()-0.5)*0.0008;
  partVelocities[globalIdx + 1] = (Math.random()-0.5)*0.001 + 0.0002;
  partVelocities[globalIdx + 2] =  dx / distXZ * 0.0018 + (Math.random()-0.5)*0.0008;
  partSizes[DUST_COUNT + i]  = 1.4 + Math.random() * 1.8;
  partPhases[DUST_COUNT + i] = Math.random() * Math.PI * 2;
  partTypes[DUST_COUNT + i]  = 1;
}

// Particle geometry
const partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position', new THREE.BufferAttribute(partPositions, 3));
partGeo.setAttribute('aSize',    new THREE.BufferAttribute(partSizes, 1));
partGeo.setAttribute('aPhase',   new THREE.BufferAttribute(partPhases, 1));
partGeo.setAttribute('aType',    new THREE.BufferAttribute(partTypes, 1));

// Particle shader — size attenuation, soft disk, color by type
const partMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:       { value: 0 },
    uPixelRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader: `
    attribute float aSize;
    attribute float aPhase;
    attribute float aType;
    uniform float uTime;
    uniform float uPixelRatio;
    varying float vAlpha;
    varying float vType;

    void main() {
      vType = aType;
      // Twinkle: each particle breathes at slightly different rate
      float twinkle = 0.55 + 0.45 * sin(uTime * 1.2 + aPhase);
      // Energy particles twinkle faster, brighter
      float energyBoost = aType * (0.5 + 0.5 * sin(uTime * 3.8 + aPhase * 2.2));
      vAlpha = twinkle * (0.28 + aType * 0.45) + energyBoost * 0.3;

      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      // Size attenuation
      float dist = -mvPos.z;
      float sz = aSize * uPixelRatio * (1.8 + aType * 1.2);
      sz *= (18.0 / dist);  // perspective division
      gl_PointSize = clamp(sz, 0.5, 6.0);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    varying float vType;

    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = dot(uv, uv) * 4.0;
      float alpha = (1.0 - smoothstep(0.0, 1.0, d)) * vAlpha;
      if (alpha < 0.005) discard;

      // Dust: cool blue-white. Energy: warmer blue with orange tinge
      vec3 dustColor   = vec3(0.65, 0.78, 0.95);  // blue-white
      vec3 energyColor = vec3(0.42, 0.78, 1.00);  // PureBrain blue-white
      vec3 col = mix(dustColor, energyColor, vType);

      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});

const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// ─── GOD RAYS (volumetric light shafts from key light) ────────────────────────
// Thin cone segments, additive blending — suggest light coming from upper-right
const godRayGroup = new THREE.Group();
scene.add(godRayGroup);

const godRayData = [
  { angle: 0.38, color: new THREE.Color(0xfff2e0), alpha: 0.04, len: 8.5, w: 0.12 },
  { angle: 0.55, color: new THREE.Color(0xfff8ef), alpha: 0.03, len: 7.2, w: 0.08 },
  { angle: 0.22, color: new THREE.Color(0x2a93c1), alpha: 0.025, len: 6.8, w: 0.10 },
  { angle: 0.72, color: new THREE.Color(0xffeedd), alpha: 0.02, len: 9.0, w: 0.06 },
];

godRayData.forEach(({ angle, color, alpha, len, w }) => {
  const rGeo = new THREE.CylinderGeometry(w, w * 0.02, len, 1, 1, true);
  rGeo.translate(0, -len * 0.5, 0);
  const rMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uColor: { value: color }, uAlpha: { value: alpha } },
    transparent: true, depthWrite: false, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      varying float vFade;
      void main() {
        vFade = uv.y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uAlpha;
      varying float vFade;
      void main() {
        float pulse = 0.75 + 0.25 * sin(uTime * 0.45 + vFade * 3.0);
        float fade = pow(1.0 - vFade, 1.6) * pulse;
        gl_FragColor = vec4(uColor, uAlpha * fade);
      }
    `
  });
  const rMesh = new THREE.Mesh(rGeo, rMat);
  // Position from upper-right key light direction
  rMesh.position.set(3.2 + (Math.random()-0.5)*0.8, 4.0 + (Math.random()-0.5)*0.5, 1.5);
  rMesh.rotation.z = -angle * (Math.random() * 0.3 + 0.85);
  rMesh.rotation.x = 0.15 + (Math.random()-0.5)*0.1;
  godRayGroup.add(rMesh);
});

// ─── POSTPROCESSING ───────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// SMAA (better than default AA for glass)
const smaaPass = new SMAAPass(innerWidth * renderer.getPixelRatio(), innerHeight * renderer.getPixelRatio());
composer.addPass(smaaPass);

// Bloom — restrained threshold, only brightest pixels
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  PB.bloom.strength, PB.bloom.radius, PB.bloom.threshold
);
composer.addPass(bloomPass);

// Custom: Chromatic Aberration + Vignette + Film Grain + DoF hint
const finalPass = new ShaderPass({
  uniforms: {
    tDiffuse:  { value: null },
    uTime:     { value: 0 },
    uCA:       { value: PB.ca },
    uVig:      { value: PB.vig },
    uGrain:    { value: PB.grain },
    uDof:      { value: 0.0 },   // depth-of-field edge softening amount (0-1)
    uRes:      { value: new THREE.Vector2(innerWidth, innerHeight) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uCA;
    uniform float uVig;
    uniform float uGrain;
    uniform float uDof;
    uniform vec2  uRes;
    varying vec2 vUv;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
    }

    // Slight radial blur at edges for DoF simulation
    vec4 dofSample(sampler2D tex, vec2 uv, float amt) {
      if (amt < 0.001) return texture2D(tex, uv);
      vec2 center = vec2(0.5);
      vec2 dir = (uv - center) * amt * 0.012;
      vec4 col = vec4(0.0);
      float w = 0.0;
      for (int i = -3; i <= 3; i++) {
        float s = float(i) / 3.0;
        float wt = exp(-s*s*2.0);
        col += texture2D(tex, uv - dir * float(i)) * wt;
        w += wt;
      }
      return col / w;
    }

    void main() {
      vec2 uv = vUv;
      vec2 center = vec2(0.5);
      float d = length(uv - center);

      // Chromatic aberration — strength grows slightly toward edges
      float caStr = uCA * (1.0 + d * 0.8);
      vec2 caDir = normalize(uv - center + 0.0001) * caStr;

      // DoF radial strength: edge of frame gets blurred
      float edgeFactor = smoothstep(0.25, 0.7, d);

      float r = dofSample(tDiffuse, uv + caDir * 1.0, uDof * edgeFactor).r;
      float g = dofSample(tDiffuse, uv,               uDof * edgeFactor).g;
      float b = dofSample(tDiffuse, uv - caDir * 1.0, uDof * edgeFactor).b;

      vec4 col = vec4(r, g, b, 1.0);

      // Film grain (temporal: shifts each frame)
      float grain = (hash(uv + fract(uTime * 0.01723)) - 0.5) * uGrain;
      col.rgb += grain;

      // Vignette: smooth darkening toward corners
      float vig = 1.0 - smoothstep(0.45, 1.15, d * uVig * 1.6);
      // Subtle "scanner line" vignette: slightly brighter horizontal center
      float hVig = 1.0 - smoothstep(0.0, 0.52, abs(uv.y - 0.5) * 2.2) * 0.08;
      col.rgb *= vig * hVig;

      // Subtle contrast lift in center (ACES-style S-curve hint)
      float lum = dot(col.rgb, vec3(0.299, 0.587, 0.114));
      col.rgb = mix(col.rgb, col.rgb * (1.0 + lum * 0.12), 0.4);

      gl_FragColor = col;
    }
  `
});
composer.addPass(finalPass);
composer.addPass(new OutputPass());

// ─── CAMERA ANIMATION SYSTEM ──────────────────────────────────────────────────
// Multiple named shots that cycle automatically. Each shot:
// { pos, target, fov, dof, duration (s), easing }

const cameraShots = [
  // Shot 0: Opening — wide establishing shot
  {
    pos:    new THREE.Vector3(0.0, 1.2, 7.8),
    target: new THREE.Vector3(0, 0, 0),
    fov:    38, dof: 0.0, duration: 6.0,
    name:   'establish'
  },
  // Shot 1: Close on sphere — soft DoF on background
  {
    pos:    new THREE.Vector3(-2.2, 0.7, 4.0),
    target: new THREE.Vector3(-1.0, 0.3, 0),
    fov:    32, dof: 0.85, duration: 7.0,
    name:   'close-sphere'
  },
  // Shot 2: Looking up at torus from below
  {
    pos:    new THREE.Vector3(0.5, -0.5, 4.5),
    target: new THREE.Vector3(0.8, 1.2, -1.8),
    fov:    42, dof: 0.6, duration: 6.5,
    name:   'torus-lookup'
  },
  // Shot 3: Side profile — hex dominant, sphere in bg
  {
    pos:    new THREE.Vector3(4.2, 0.2, 2.8),
    target: new THREE.Vector3(0.5, 0, 0),
    fov:    36, dof: 0.7, duration: 7.0,
    name:   'side-hex'
  },
  // Shot 4: High overhead three-quarter — Gleb's signature angle
  {
    pos:    new THREE.Vector3(-1.5, 4.5, 5.5),
    target: new THREE.Vector3(0.2, 0, -0.5),
    fov:    35, dof: 0.4, duration: 7.5,
    name:   'overhead-3q'
  },
  // Shot 5: Close pass — intimate with hex prism
  {
    pos:    new THREE.Vector3(2.2, 0.1, 3.0),
    target: new THREE.Vector3(1.35, -0.35, -0.5),
    fov:    30, dof: 1.0, duration: 6.0,
    name:   'close-hex'
  },
  // Shot 6: Wide low — ground reflections dominant
  {
    pos:    new THREE.Vector3(0, -0.3, 7.0),
    target: new THREE.Vector3(0, 0.4, 0),
    fov:    44, dof: 0.3, duration: 7.0,
    name:   'ground-wide'
  },
];

let currentShot    = 0;
let shotTimer      = 0;
let shotTransition = 0; // 0 = in shot, >0 = transitioning

// Camera state — interpolated (spring-like lerp)
const camState = {
  pos:    cameraShots[0].pos.clone(),
  target: cameraShots[0].target.clone(),
  fov:    cameraShots[0].fov,
  dof:    cameraShots[0].dof,
};
const camTarget = {
  pos:    cameraShots[0].pos.clone(),
  target: cameraShots[0].target.clone(),
  fov:    cameraShots[0].fov,
  dof:    cameraShots[0].dof,
};

// Mouse parallax overlay (subtle, adds life to each shot)
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
window.addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / innerWidth  - 0.5) * 2;
  mouse.ty = (e.clientY / innerHeight - 0.5) * 2;
});

// ─── CURSOR SYSTEM ────────────────────────────────────────────────────────────
const cursor     = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
let cursorX = innerWidth / 2, cursorY = innerHeight / 2;
let ringX = innerWidth / 2, ringY = innerHeight / 2;
const CURSOR_SPEED = 0.28, RING_SPEED = 0.10;
let cX = innerWidth/2, cY = innerHeight/2;
let rX = innerWidth/2, rY = innerHeight/2;

window.addEventListener('mousemove', e => { cursorX = e.clientX; cursorY = e.clientY; });

// ─── FPS TRACKER ─────────────────────────────────────────────────────────────
let fpsFrames = 0, fpsLast = performance.now(), fpsVal = 0;
const fpsEl      = document.getElementById('fps');
const camStateEl = document.getElementById('cam-state');

// ─── OBJECT ANIMATION STATE ───────────────────────────────────────────────────
let idleT = 0;

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  composer.setSize(innerWidth, innerHeight);
  finalPass.uniforms.uRes.value.set(innerWidth, innerHeight);
  partMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
  smaaPass.setSize(innerWidth * renderer.getPixelRatio(), innerHeight * renderer.getPixelRatio());
});

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt  = Math.min(clock.getDelta(), 0.05);
  const t   = clock.getElapsedTime();
  idleT += dt;

  // ── FPS
  fpsFrames++;
  const now = performance.now();
  if (now - fpsLast >= 1000) {
    fpsVal = fpsFrames;
    fpsFrames = 0;
    fpsLast = now;
    fpsEl.textContent = `${fpsVal} fps`;
  }

  // ── Cursor spring
  cX += (cursorX - cX) * CURSOR_SPEED;
  cY += (cursorY - cY) * CURSOR_SPEED;
  rX += (cX - rX) * RING_SPEED;
  rY += (cY - rY) * RING_SPEED;
  cursor.style.left     = `${cX}px`;
  cursor.style.top      = `${cY}px`;
  cursorRing.style.left = `${rX}px`;
  cursorRing.style.top  = `${rY}px`;

  // ── Mouse parallax spring
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;

  // ── Camera shot system
  const shot = cameraShots[currentShot];
  shotTimer += dt;

  if (shotTimer >= shot.duration) {
    shotTimer = 0;
    currentShot = (currentShot + 1) % cameraShots.length;
    const nextShot = cameraShots[currentShot];
    camTarget.pos.copy(nextShot.pos);
    camTarget.target.copy(nextShot.target);
    camTarget.fov = nextShot.fov;
    camTarget.dof = nextShot.dof;
    camStateEl.textContent = `shot ${currentShot} · ${nextShot.name}`;
  }

  // Smooth camera interpolation (feel = 0.028 lerp = slightly springy)
  const camLerp = 1 - Math.pow(0.012, dt);
  camState.pos.lerp(camTarget.pos, camLerp);
  camState.target.lerp(camTarget.target, camLerp);
  camState.fov += (camTarget.fov - camState.fov) * camLerp;
  camState.dof += (camTarget.dof - camState.dof) * camLerp;

  // Mouse parallax overlay on final position
  const parallaxStr = 0.18;
  const finalPos = camState.pos.clone().add(
    new THREE.Vector3(mouse.x * parallaxStr, -mouse.y * parallaxStr * 0.6, 0)
  );

  camera.position.copy(finalPos);
  camera.lookAt(camState.target);
  camera.fov = camState.fov;
  camera.updateProjectionMatrix();

  // Update DoF
  finalPass.uniforms.uDof.value = camState.dof;

  // ── Background animation
  bgMat.uniforms.uTime.value = t;

  // ── Update uniforms
  partMat.uniforms.uTime.value    = t;
  finalPass.uniforms.uTime.value  = t;

  // Update god ray uniforms
  godRayGroup.children.forEach(child => {
    if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
      child.material.uniforms.uTime.value = t;
    }
  });

  // ── Particle position update (CPU physics, simple drift)
  const pos = partGeo.attributes.position.array;
  for (let i = 0; i < TOTAL_PARTS; i++) {
    const idx = i * 3;
    pos[idx    ] += partVelocities[idx    ];
    pos[idx + 1] += partVelocities[idx + 1];
    pos[idx + 2] += partVelocities[idx + 2];

    // Boundary wrap: particles that drift too far teleport back
    if (pos[idx + 1] >  3.5) pos[idx + 1] = -2.0;
    if (pos[idx + 1] < -2.0) pos[idx + 1] =  3.5;
    if (Math.abs(pos[idx    ]) > 7.0) pos[idx    ] *= -0.95;
    if (Math.abs(pos[idx + 2]) > 7.0) pos[idx + 2] *= -0.95;
  }
  partGeo.attributes.position.needsUpdate = true;

  // ── Object animations

  // SPHERE: prime-frequency multi-axis float
  sphereGroup.position.y = 0.4
    + Math.sin(t * FF[0]) * FA[0]
    + Math.sin(t * FF[1]) * FA[1];
  sphereGroup.rotation.y += dt * 0.12;
  sphereGroup.rotation.x = Math.sin(t * 0.22) * 0.06;

  // Sphere inner core pulse
  const spherePulse = 0.85 + 0.15 * Math.sin(t * 2.2);
  sphereCore.scale.setScalar(spherePulse);
  // Micro-core orbit inside sphere
  const microAngle = t * 1.35;
  microCore.position.set(
    Math.cos(microAngle) * 0.38,
    Math.sin(microAngle * 0.55) * 0.22,
    Math.sin(microAngle) * 0.38
  );

  // HEX: different float axis, slower rotation
  hexGroup.position.y = -0.35
    + Math.sin(t * FF[1] + 1.2) * FA[0]
    + Math.sin(t * FF[2] + 0.8) * FA[1];
  hexGroup.rotation.y += dt * 0.08;
  hexGroup.rotation.x = Math.sin(t * FF[2] + 0.5) * 0.04;
  hexGroup.rotation.z = Math.sin(t * 0.18) * 0.03;

  // Hex cores animate
  const hexPulse = 0.88 + 0.12 * Math.sin(t * 1.8 + 1.0);
  hexCoreA.scale.setScalar(hexPulse);
  hexCoreB.position.set(
    Math.cos(t * 0.85) * 0.25,
    Math.sin(t * 1.1) * 0.15,
    Math.sin(t * 0.85) * 0.25
  );

  // TORUS: rotateOnWorldAxis for organic 3D tumble
  torusMesh.rotateOnWorldAxis(torusAxis1, dt * 0.14);
  torusMesh.rotateOnWorldAxis(torusAxis2, dt * 0.08);
  torusInner.rotateOnWorldAxis(innerAxis,  dt * 0.22);
  torusInner.rotateOnWorldAxis(torusAxis3, dt * 0.06);

  torusGroup.position.y = 1.2 + Math.sin(t * FF[2] + 2.1) * FA[0];
  torusGroup.position.x = 0.8 + Math.sin(t * 0.18 + 1.0) * 0.06;

  // SATELLITE SPHERES: orbit around composition center
  satellites.forEach((sat, i) => {
    const angle  = t * sat.speed + sat.phase;
    const radius = 2.6 + Math.sin(t * 0.22 + i * 1.2) * 0.3;
    const height = Math.sin(angle * 0.55 + i * 2.0) * 0.8 + 0.3;
    sat.group.position.set(
      Math.cos(angle) * radius,
      height,
      Math.sin(angle * 0.88) * radius * 0.6 - 0.5
    );
    // Subtle self-rotation
    sat.group.rotation.y += dt * 0.25;
    sat.group.rotation.x += dt * 0.1;
  });

  // Ground glow pulses with sphere core
  groundGlow.material.opacity = 0.85 + 0.15 * Math.sin(t * 1.4);

  // ── Render: background first, then main scene
  renderer.autoClear = false;
  renderer.clear();
  renderer.render(bgScene, bgCamera);
  renderer.clearDepth();
  composer.render();
}

animate();

// ─── KEYBOARD: skip to next shot ──────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    shotTimer = 9999; // force next shot next frame
  }
  if (e.key === 'ArrowLeft') {
    currentShot = (currentShot - 2 + cameraShots.length) % cameraShots.length;
    shotTimer = 9999;
  }
});

</script>
</body>
</html>
