<script type="importmap">
{

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────
//  PureBrain3D Design System Tokens
// ─────────────────────────────────────────────
const PB = {
  blue:        0x2a93c1,
  orange:      0xf1420b,
  blueLight:   0x5ad4ff,
  dark:        0x06080f,
  glass: {
    transmission:             1.0,
    roughness:                0.04,
    ior:                      1.52,
    iridescence:              0.45,
    iridescenceIOR:           1.40,
    iridescenceThicknessRange:[100, 420],
    clearcoat:                0.90,
    clearcoatRoughness:       0.015,
    envMapIntensity:          4.2,
    depthWrite:               false,
  },
  bloom: { strength: 0.55, radius: 0.45, threshold: 0.82 },
  ca:   0.0022,
  vig:  0.52,
};

// ─────────────────────────────────────────────
//  Renderer
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ─────────────────────────────────────────────
//  Scene + Camera
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.4, 6.5);

// Spring camera system
const camPos    = new THREE.Vector3().copy(camera.position);
const camTarget = new THREE.Vector3(0, 0, 0);
const tmpPos    = new THREE.Vector3();
const tmpTarget = new THREE.Vector3();

// ─────────────────────────────────────────────
//  PMREM Procedural Environment (studio lighting)
// ─────────────────────────────────────────────
function buildPMREMEnv() {
  const pmrem  = new THREE.PMREMGenerator(renderer);
  const envScene = new THREE.Scene();

  // Key light — warm white top-left
  const kLight = new THREE.PointLight(0xfff4e8, 80, 0);
  kLight.position.set(-4, 6, 2);
  envScene.add(kLight);

  // Fill light — PureBrain blue right
  const fLight = new THREE.PointLight(0x2a93c1, 35, 0);
  fLight.position.set(6, 0, 0);
  envScene.add(fLight);

  // Rim light — PureBrain orange (goes inside glass — orange warm glow at edges)
  const rLight = new THREE.PointLight(0xf1420b, 25, 0);
  rLight.position.set(-2, -4, -6);
  envScene.add(rLight);

  // Ground bounce — cool blue
  const gLight = new THREE.PointLight(0x4ab8ff, 18, 0);
  gLight.position.set(0, -6, 2);
  envScene.add(gLight);

  const envMap = pmrem.fromScene(envScene).texture;
  scene.environment = envMap;
  pmrem.dispose();
  return envMap;
}
const envMap = buildPMREMEnv();

// ─────────────────────────────────────────────
//  Atmospheric fBm Background Gradient Mesh
// ─────────────────────────────────────────────
const bgScene  = new THREE.Scene();
const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const bgMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime:   { value: 0.0 },
    uColorA: { value: new THREE.Color(0x06080f) },
    uColorB: { value: new THREE.Color(0x0d1a2a) },
    uColorC: { value: new THREE.Color(0x150820) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    varying vec2 vUv;

    float hash(vec2 p) {
      p = fract(p * vec2(234.34, 435.345));
      p += dot(p, p + 34.23);
      return fract(p.x * p.y);
    }
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      vec2 u = f*f*(3.0-2.0*f);
      return mix(
        mix(hash(i+vec2(0,0)), hash(i+vec2(1,0)), u.x),
        mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x),
        u.y
      );
    }
    float fbm(vec2 p) {
      float v = 0.0; float a = 0.5;
      for (int i=0; i<5; i++) {
        v += a * noise(p); p *= 2.1; a *= 0.5;
      }
      return v;
    }
    void main() {
      vec2 uv = vUv - 0.5;
      float t  = uTime * 0.08;
      float f  = fbm(uv * 3.5 + t * vec2(0.3, -0.2));
      float f2 = fbm(uv * 5.0 - t * vec2(0.2, 0.35) + f);

      // Nebula color regions
      vec3 col = mix(uColorA, uColorB, f2 * 0.7);
      col = mix(col, uColorC, fbm(uv * 7.0 + t * 0.5) * 0.35);

      // Radial atmosphere bleed from center (simulates sphere glow)
      float radial = 1.0 - length(uv) * 1.8;
      col += vec3(0.012, 0.025, 0.045) * max(0.0, radial);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
  depthWrite: false,
  depthTest:  false,
});

bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial));

// ─────────────────────────────────────────────
//  Hexagonal Prism Geometry (beveled)
// ─────────────────────────────────────────────
function makeHexPrism(radius = 1.1, depth = 0.38, bevelSize = 0.06, bevelSegs = 4) {
  // Build hexagonal shape path
  const shape = new THREE.Shape();
  const sides = 6;
  for (let i = 0; i <= sides; i++) {
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 6;  // flat-top orientation
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    if (i === 0) shape.moveTo(x, y);
    else shape.lineTo(x, y);
  }

  const extrudeSettings = {
    depth:          depth,
    bevelEnabled:   true,
    bevelThickness: bevelSize,
    bevelSize:      bevelSize,
    bevelSegments:  bevelSegs,
  };

  const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  geo.center();  // center the extruded hex
  geo.computeVertexNormals();
  return geo;
}

// Main glass hex
const hexGeo  = makeHexPrism(1.1, 0.42, 0.07, 5);
const hexMat  = new THREE.MeshPhysicalMaterial({
  ...PB.glass,
  color:        new THREE.Color(0x88ccee),
  side:         THREE.DoubleSide,
  envMap,
  metalness:    0.0,
  specularIntensity: 1.0,
  specularColor: new THREE.Color(0xc8a84a),   // gold specular — Gleb signature
  transparent:  true,
  opacity:      0.92,
});

const hexMesh = new THREE.Mesh(hexGeo, hexMat);
hexMesh.castShadow = false;
hexMesh.position.set(0, 0, 0);
scene.add(hexMesh);

// Outer ghost hex (slightly larger, lower opacity — creates layered glass depth)
const hexOuterMat = new THREE.MeshPhysicalMaterial({
  ...PB.glass,
  color:       new THREE.Color(0x2a93c1),
  roughness:   0.12,
  transmission: 0.85,
  iridescence: 0.22,
  envMapIntensity: 2.8,
  side:        THREE.BackSide,
  transparent: true,
  opacity:     0.55,
  depthWrite:  false,
});

const hexOuterMesh = new THREE.Mesh(makeHexPrism(1.22, 0.5, 0.08, 4), hexOuterMat);
scene.add(hexOuterMesh);

// ─────────────────────────────────────────────
//  Inner Emissive Orange Core (glow heart)
// ─────────────────────────────────────────────
const coreGeo = new THREE.SphereGeometry(0.28, 64, 64);
const coreMat = new THREE.MeshStandardMaterial({
  color:            new THREE.Color(0xf1420b),
  emissive:         new THREE.Color(0xf1420b),
  emissiveIntensity: 2.8,
  roughness:        1.0,
  metalness:        0.0,
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
coreMesh.position.set(0, 0, 0);
scene.add(coreMesh);

// Blue secondary inner orb (slightly offset)
const core2Mat = new THREE.MeshStandardMaterial({
  color:            new THREE.Color(0x2a93c1),
  emissive:         new THREE.Color(0x2a93c1),
  emissiveIntensity: 1.8,
  roughness:        1.0,
  metalness:        0.0,
});
const core2Mesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.14, 32, 32),
  core2Mat
);
core2Mesh.position.set(-0.18, 0.08, 0);
scene.add(core2Mesh);

// ─────────────────────────────────────────────
//  Orbital Glass Spheres (3 satellites)
// ─────────────────────────────────────────────
const orbitSpheres = [];
const orbitData = [
  { radius: 0.16, orbitR: 1.82, speed: 0.38, yOff: 0.15,  col: 0x2a93c1, phase: 0      },
  { radius: 0.12, orbitR: 2.15, speed: -0.27, yOff: -0.12, col: 0xf1420b, phase: 2.094  },
  { radius: 0.10, orbitR: 2.50, speed: 0.22, yOff: 0.22,  col: 0x5ad4ff, phase: 4.189  },
];

orbitData.forEach(od => {
  const mat = new THREE.MeshPhysicalMaterial({
    ...PB.glass,
    color:           new THREE.Color(od.col),
    roughness:       0.06,
    iridescence:     0.55,
    envMapIntensity: 3.5,
    depthWrite:      false,
    transparent:     true,
    opacity:         0.88,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(od.radius, 64, 64), mat);
  scene.add(mesh);
  orbitSpheres.push({ mesh, ...od });
});

// ─────────────────────────────────────────────
//  Orbital Rings (flat ring planes around hex)
// ─────────────────────────────────────────────
const ringMeshes = [];
const ringDefs = [
  { inner: 1.62, outer: 1.68, col: 0x2a93c1, opacity: 0.28, axis: new THREE.Vector3(0.2, 1, 0.1).normalize(), speed: 0.18 },
  { inner: 1.95, outer: 2.00, col: 0x5ad4ff, opacity: 0.18, axis: new THREE.Vector3(-0.1, 0.8, 0.4).normalize(), speed: -0.14 },
  { inner: 2.35, outer: 2.40, col: 0xf1420b, opacity: 0.14, axis: new THREE.Vector3(0.3, 0.6, -0.5).normalize(), speed: 0.11 },
];

ringDefs.forEach(rd => {
  const geo = new THREE.RingGeometry(rd.inner, rd.outer, 128);
  const mat = new THREE.MeshBasicMaterial({
    color:       rd.col,
    transparent: true,
    opacity:     rd.opacity,
    side:        THREE.DoubleSide,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  ringMeshes.push({ mesh, axis: rd.axis, speed: rd.speed });
});

// ─────────────────────────────────────────────
//  GPU Particle System (field particles)
// ─────────────────────────────────────────────
const PARTICLE_COUNT = 1200;
const partPositions = new Float32Array(PARTICLE_COUNT * 3);
const partColors    = new Float32Array(PARTICLE_COUNT * 3);
const partSizes     = new Float32Array(PARTICLE_COUNT);
const partPhases    = new Float32Array(PARTICLE_COUNT);

const blueC  = new THREE.Color(0x2a93c1);
const orangeC = new THREE.Color(0xf1420b);
const lightC = new THREE.Color(0x5ad4ff);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;
  const r = 1.8 + Math.random() * 3.2;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);

  partPositions[i3]     = r * Math.sin(phi) * Math.cos(theta);
  partPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  partPositions[i3 + 2] = r * Math.cos(phi);

  const colorChoice = Math.random();
  let c;
  if (colorChoice < 0.5)      c = blueC;
  else if (colorChoice < 0.75) c = lightC;
  else                         c = orangeC;

  partColors[i3]     = c.r;
  partColors[i3 + 1] = c.g;
  partColors[i3 + 2] = c.b;

  partSizes[i]  = 0.5 + Math.random() * 1.5;
  partPhases[i] = Math.random() * Math.PI * 2;
}

const partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position', new THREE.BufferAttribute(partPositions, 3));
partGeo.setAttribute('color',    new THREE.BufferAttribute(partColors, 3));
partGeo.setAttribute('aSize',    new THREE.BufferAttribute(partSizes, 1));
partGeo.setAttribute('aPhase',   new THREE.BufferAttribute(partPhases, 1));

const partMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0.0 } },
  vertexShader: `
    attribute float aSize;
    attribute float aPhase;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uTime;

    void main() {
      vColor = color;
      // Pulse with prime-approximate frequencies
      float pulse = 0.5 + 0.5 * sin(uTime * 0.55 + aPhase)
                       * 0.6 + 0.4 * sin(uTime * 0.38 + aPhase * 1.3);
      vAlpha = pulse;
      gl_PointSize = aSize * (300.0 / -position.z) * pulse;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      vec2 uv  = gl_PointCoord - 0.5;
      float r  = length(uv);
      if (r > 0.5) discard;
      float a  = (1.0 - r * 2.0) * vAlpha * 0.75;
      gl_FragColor = vec4(vColor, a);
    }
  `,
  transparent:  true,
  depthWrite:   false,
  blending:     THREE.AdditiveBlending,
  vertexColors: true,
});

scene.add(new THREE.Points(partGeo, partMat));

// ─────────────────────────────────────────────
//  God Ray Cones (volumetric light shafts)
// ─────────────────────────────────────────────
const godRayShader = {
  vertexShader: `
    varying vec2 vUv;
    varying float vHeight;
    void main() {
      vUv    = uv;
      vHeight = position.y;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform float uAlpha;
    uniform vec3  uColor;
    varying vec2  vUv;
    varying float vHeight;

    float hash(vec2 p) {
      p = fract(p * vec2(127.1, 311.7));
      p += dot(p, p + 74.27);
      return fract(p.x * p.y);
    }
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      vec2 u = f*f*(3.0-2.0*f);
      return mix(
        mix(hash(i),             hash(i + vec2(1,0)), u.x),
        mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x),
        u.y
      );
    }

    void main() {
      float t = uTime * 0.45;
      float r = abs(vUv.x - 0.5) * 2.0;
      float shape = smoothstep(0.0, 0.38, r) * smoothstep(1.0, 0.48, r);

      float n = noise(vec2(vUv.x * 4.0 + t, vUv.y * 3.0 - t * 0.6));
      n += noise(vec2(vUv.x * 8.0 - t * 0.8, vUv.y * 5.0 + t * 0.35)) * 0.45;

      float fade = pow(1.0 - vUv.y, 0.5) * smoothstep(0.0, 0.08, vUv.y);
      float alpha = shape * (n / 1.45) * fade * uAlpha;

      gl_FragColor = vec4(uColor, alpha);
    }
  `,
};

function makeGodRay(color, alpha, posX, posY, posZ, rotZ, rotX) {
  const geo = new THREE.CylinderGeometry(0.06, 1.0, 5.5, 1, 28, true);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0.0 },
      uAlpha: { value: alpha },
      uColor: { value: new THREE.Color(color) },
    },
    vertexShader:   godRayShader.vertexShader,
    fragmentShader: godRayShader.fragmentShader,
    transparent:    true,
    depthWrite:     false,
    side:           THREE.DoubleSide,
    blending:       THREE.AdditiveBlending,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(posX, posY, posZ);
  mesh.rotation.z = rotZ;
  mesh.rotation.x = rotX;
  scene.add(mesh);
  return mat;
}

const godRayMats = [
  makeGodRay(0x2a93c1, 0.055, -0.4, 3.8, 0,    0.12,  -0.05),
  makeGodRay(0x2a93c1, 0.045,  0.2, 3.8, -0.3, -0.08,  0.04),
  makeGodRay(0x5ad4ff, 0.040,  0.5, 3.8,  0.2,  0.15, -0.08),
  makeGodRay(0xf1420b, 0.042, -0.3, 3.8,  0.3, -0.10,  0.06),
  makeGodRay(0xf1420b, 0.035,  0.4, 3.8, -0.1,  0.08,  0.03),
];

// ─────────────────────────────────────────────
//  Postprocessing: EffectComposer
// ─────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  PB.bloom.strength,
  PB.bloom.radius,
  PB.bloom.threshold,
);
composer.addPass(bloomPass);

// Custom postprocess: Chromatic Aberration + Vignette + Film Grain
const finalPass = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    uCA:      { value: PB.ca },
    uVig:     { value: PB.vig },
    uTime:    { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uCA;
    uniform float uVig;
    uniform float uTime;
    varying vec2 vUv;

    float hash13(vec3 p3) {
      p3 = fract(p3 * 0.1031);
      p3 += dot(p3, p3.zyx + 31.32);
      return fract((p3.x + p3.y) * p3.z);
    }

    void main() {
      // Chromatic aberration — separate RGB channels by vignette amount
      vec2 dir  = (vUv - 0.5) * uCA;
      float r   = texture2D(tDiffuse, vUv + dir).r;
      float g   = texture2D(tDiffuse, vUv).g;
      float b   = texture2D(tDiffuse, vUv - dir).b;
      vec3 col  = vec3(r, g, b);

      // Vignette
      float dist = length(vUv - 0.5);
      col *= 1.0 - uVig * dist * dist * 2.0;

      // Film grain (minimal — 0.02 intensity)
      float grain = hash13(vec3(vUv * 1024.0, uTime)) * 0.018 - 0.009;
      col += grain;

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
composer.addPass(finalPass);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
//  Mouse + Scroll Interaction
// ─────────────────────────────────────────────
const mouse   = { x: 0, y: 0 };
const rawMouse = { x: 0, y: 0 };

const cursorEl = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
  rawMouse.x = e.clientX;
  rawMouse.y = e.clientY;
  mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;

  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

// Scroll-to-zoom
let scrollZoom = 6.5;
document.addEventListener('wheel', e => {
  scrollZoom = Math.max(3.5, Math.min(10, scrollZoom + e.deltaY * 0.01));
}, { passive: true });

// ─────────────────────────────────────────────
//  Raycaster for hover interaction
// ─────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouseVec  = new THREE.Vector2();
let   isHovering = false;

// ─────────────────────────────────────────────
//  Float System (prime frequencies)
// ─────────────────────────────────────────────
const FLOAT_FREQS = [0.55, 0.38, 0.22];
const FLOAT_AMPS  = [0.12, 0.08, 0.04];

function computeFloat(t, scale = 1.0) {
  let v = 0;
  for (let i = 0; i < FLOAT_FREQS.length; i++) {
    v += Math.sin(t * FLOAT_FREQS[i] * Math.PI * 2) * FLOAT_AMPS[i];
  }
  return v * scale;
}

// ─────────────────────────────────────────────
//  FPS Counter
// ─────────────────────────────────────────────
const fpsEl = document.getElementById('fps-counter');
let   frameCount = 0;
let   lastFPSUpdate = 0;

// ─────────────────────────────────────────────
//  Animation Loop
// ─────────────────────────────────────────────
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const delta   = Math.min(elapsed - lastTime, 0.05);
  lastTime = elapsed;

  // FPS counter
  frameCount++;
  if (elapsed - lastFPSUpdate > 0.5) {
    const fps = Math.round(frameCount / (elapsed - lastFPSUpdate));
    fpsEl.textContent = fps + ' FPS';
    frameCount = 0;
    lastFPSUpdate = elapsed;
  }

  // Background shader time
  bgMaterial.uniforms.uTime.value = elapsed;

  // Particle time
  partMat.uniforms.uTime.value = elapsed;

  // God ray time
  godRayMats.forEach(m => { m.uniforms.uTime.value = elapsed; });

  // Final pass time (film grain)
  finalPass.uniforms.uTime.value = elapsed;

  // ── Hex float + rotation ──
  const floatY = computeFloat(elapsed);
  hexMesh.position.y      = floatY;
  hexOuterMesh.position.y = floatY;
  coreMesh.position.y     = floatY;
  core2Mesh.position.y    = floatY;

  hexMesh.rotation.y     += delta * 0.14;
  hexOuterMesh.rotation.y = hexMesh.rotation.y * 0.88;
  hexMesh.rotation.x      = Math.sin(elapsed * 0.22) * 0.08;

  // Inner core pulse
  const corePulse = 1.0 + Math.sin(elapsed * 2.2) * 0.12;
  coreMesh.scale.setScalar(corePulse);
  core2Mesh.position.x = Math.cos(elapsed * 0.88) * 0.22;
  core2Mesh.position.y = floatY + Math.sin(elapsed * 0.66) * 0.12;

  // ── Orbital spheres ──
  orbitSpheres.forEach(od => {
    const angle = elapsed * od.speed + od.phase;
    od.mesh.position.x = Math.cos(angle) * od.orbitR;
    od.mesh.position.z = Math.sin(angle) * od.orbitR;
    od.mesh.position.y = floatY + od.yOff + Math.sin(elapsed * 0.44 + od.phase) * 0.10;
    od.mesh.rotation.y = elapsed * 0.35;
  });

  // ── Orbital rings (rotateOnWorldAxis — 3D tumble) ──
  ringMeshes.forEach(rd => {
    rd.mesh.position.y = floatY;
    rd.mesh.rotateOnWorldAxis(rd.axis, delta * rd.speed);
  });

  // ── Spring camera (mouse parallax) ──
  tmpPos.set(
    mouse.x * -0.5,
    mouse.y * 0.3 + 0.4,
    scrollZoom,
  );
  tmpTarget.set(
    mouse.x * 0.15,
    floatY * 0.3,
    0,
  );

  camPos.lerp(tmpPos, 0.025);
  camTarget.lerp(tmpTarget, 0.025);
  camera.position.copy(camPos);
  camera.lookAt(camTarget);

  // ── Hover detection ──
  mouseVec.x =  mouse.x;
  mouseVec.y = -mouse.y;
  raycaster.setFromCamera(mouseVec, camera);
  const intersects = raycaster.intersectObject(hexMesh);
  const hovering = intersects.length > 0;

  if (hovering !== isHovering) {
    isHovering = hovering;
    cursorEl.classList.toggle('hover', hovering);
    // On hover: increase iridescence + brightness
    hexMat.iridescence = hovering ? 0.72 : PB.glass.iridescence;
    hexMat.envMapIntensity = hovering ? 6.0 : PB.glass.envMapIntensity;
    hexMat.needsUpdate = true;
  }

  // ── Render ──
  renderer.autoClear = false;
  renderer.clear();
  renderer.render(bgScene, bgCamera);   // background first
  composer.render(delta);               // main scene with postprocessing
}

// ─────────────────────────────────────────────
//  Resize Handler
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
});

animate();
</script>
</body>
</html>
