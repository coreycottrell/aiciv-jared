<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ==========================================
// PUREBRAIN CONSTANTS
// ==========================================
const PB_BLUE   = new THREE.Color('#2a93c1');
const PB_ORANGE = new THREE.Color('#f1420b');
const PB_GOLD   = new THREE.Color('#C8A84A');
const PB_DARK   = '#060606';

// ==========================================
// SCENE SETUP
// ==========================================
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(PB_DARK);

const camera = new THREE.PerspectiveCamera(42, W/H, 0.01, 100);
camera.position.set(0, 0, 4.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;
controls.maxDistance = 12;
controls.target.set(0, 0, 0);

// ==========================================
// PROCEDURAL ENVIRONMENT MAP (Gleb multi-color studio)
// ==========================================
function buildEnvMap(blueStr = 0.7, orangeStr = 0.2, magentaStr = 0.5) {
  const size = 512;
  const canvas = document.createElement('canvas');
  canvas.width = size * 2;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const blends = [
    // [x%, y%, r%, color, alpha]
    [20, 30, 35, `rgba(${Math.round(blueStr*13)}, ${Math.round(blueStr*22)}, 245, ${blueStr*0.6})`],
    [80, 20, 30, `rgba(24, 168, ${Math.round(blueStr*211)}, ${blueStr*0.45})`],
    [60, 70, 40, `rgba(209, ${Math.round(magentaStr*13)}, 206, ${magentaStr*0.5})`],
    [50, 10, 25, `rgba(255, 248, 240, 0.55)`], // warm key
    [90, 80, 35, `rgba(228, 36, 36, 0.25)`],
    [10, 80, 30, `rgba(${Math.round(orangeStr*241)}, ${Math.round(orangeStr*66)}, 11, ${orangeStr*0.5})`],
    [50, 50, 20, `rgba(200, 168, 74, 0.18)`],  // gold bounce
  ];
  blends.forEach(([x, y, r, color]) => {
    const grd = ctx.createRadialGradient(
      canvas.width * x/100, canvas.height * y/100, 0,
      canvas.width * x/100, canvas.height * y/100, canvas.width * r/100
    );
    grd.addColorStop(0, color);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });

  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const tex = new THREE.CanvasTexture(canvas);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const envRT = pmrem.fromEquirectangular(tex);
  pmrem.dispose();
  tex.dispose();
  return envRT.texture;
}

let envMap = buildEnvMap(0.7, 0.2, 0.5);
scene.environment = envMap;

// ==========================================
// LIGHTING RIG — Gleb 6-color studio
// ==========================================
function buildLights() {
  const key = new THREE.DirectionalLight(0xfff8f0, 3.5);
  key.position.set(-2.5, 3.5, 2);
  scene.add(key);

  const blue = new THREE.DirectionalLight(0x0D16F5, 0.9);
  blue.position.set(3, 2, 1);
  scene.add(blue);

  const cyan = new THREE.DirectionalLight(0x18A8D3, 0.7);
  cyan.position.set(2, -1, -3);
  scene.add(cyan);

  const mag = new THREE.DirectionalLight(0xD10DCE, 0.45);
  mag.position.set(3, -2, 1.5);
  scene.add(mag);

  const red = new THREE.DirectionalLight(0xE42424, 0.35);
  red.position.set(-1, -3, -2);
  scene.add(red);

  const amb = new THREE.AmbientLight(0x0a0a1a, 0.8);
  scene.add(amb);

  // Orbiting point lights for dynamic reflections
  const orb1 = new THREE.PointLight(0x2a93c1, 1.8, 8);
  const orb2 = new THREE.PointLight(0xf1420b, 1.2, 6);
  scene.add(orb1, orb2);

  return { key, blue, cyan, mag, red, amb, orb1, orb2 };
}
const lights = buildLights();

// ==========================================
// GLASS SPHERE — primary element
// ==========================================
const glassGeo = new THREE.SphereGeometry(1.2, 128, 128);

// Core glass material — mode-switchable
const glassMat = new THREE.MeshPhysicalMaterial({
  transmission: 1.0,
  thickness: 0.85,
  roughness: 0.03,
  ior: 1.5,
  reflectivity: 0.92,
  envMapIntensity: 3.5,

  // NEW: iridescence (thin-film optical interference)
  iridescence: 0.65,
  iridescenceIOR: 1.38,
  iridescenceThicknessRange: [100, 400],

  // NEW: clearcoat (double-layered glass = more premium refraction depth)
  clearcoat: 0.8,
  clearcoatRoughness: 0.02,

  // Color / tint
  color: new THREE.Color('#aaddff'),
  attenuationColor: new THREE.Color('#2a93c1'),
  attenuationDistance: 1.2,

  // Specular
  specularIntensity: 1.0,
  specularColor: new THREE.Color('#ffffff'),

  side: THREE.DoubleSide,
});

const glassMesh = new THREE.Mesh(glassGeo, glassMat);
scene.add(glassMesh);

// ==========================================
// TECHNIQUE: RYGCBV CHROMATIC DISPERSION
// Custom ShaderMaterial refracting R, Y, G, C, B, V channels separately
// Based on maxime heckel's 6-channel dispersion technique
// ==========================================
const dispersionSphereGeo = new THREE.SphereGeometry(1.22, 128, 128);

const dispersionMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  side: THREE.FrontSide,
  blending: THREE.AdditiveBlending,

  uniforms: {
    uTime:      { value: 0.0 },
    uIOR_R:     { value: 1.50 },   // Red channel IOR
    uIOR_Y:     { value: 1.505 },  // Yellow channel IOR
    uIOR_G:     { value: 1.510 },  // Green channel IOR
    uIOR_C:     { value: 1.515 },  // Cyan channel IOR
    uIOR_B:     { value: 1.520 },  // Blue channel IOR
    uIOR_V:     { value: 1.525 },  // Violet channel IOR
    uRefractPow:{ value: 0.8 },    // Refraction strength
    uOpacity:   { value: 0.0 },    // Hidden by default, revealed in dispersion mode
    uStrength:  { value: 0.15 },   // Dispersion strength
  },

  vertexShader: `
    varying vec3 vWorldNormal;
    varying vec3 vWorldPosition;
    varying vec3 vViewDirection;

    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPosition = worldPos.xyz;
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      vViewDirection = normalize(cameraPosition - worldPos.xyz);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,

  fragmentShader: `
    uniform float uTime;
    uniform float uIOR_R, uIOR_Y, uIOR_G, uIOR_C, uIOR_B, uIOR_V;
    uniform float uRefractPow;
    uniform float uOpacity;
    uniform float uStrength;

    varying vec3 vWorldNormal;
    varying vec3 vWorldPosition;
    varying vec3 vViewDirection;

    // Wavelength to RGB (approximate CIE 1931 mapping)
    vec3 wavelengthToRGB(float wavelength) {
      float t;
      vec3 rgb;
      if (wavelength >= 380.0 && wavelength < 440.0) {
        t = (wavelength - 380.0) / (440.0 - 380.0);
        rgb = vec3(1.0-t, 0.0, 1.0);
      } else if (wavelength >= 440.0 && wavelength < 490.0) {
        t = (wavelength - 440.0) / (490.0 - 440.0);
        rgb = vec3(0.0, t, 1.0);
      } else if (wavelength >= 490.0 && wavelength < 510.0) {
        t = (wavelength - 490.0) / (510.0 - 490.0);
        rgb = vec3(0.0, 1.0, 1.0-t);
      } else if (wavelength >= 510.0 && wavelength < 580.0) {
        t = (wavelength - 510.0) / (580.0 - 510.0);
        rgb = vec3(t, 1.0, 0.0);
      } else if (wavelength >= 580.0 && wavelength < 645.0) {
        t = (wavelength - 580.0) / (645.0 - 580.0);
        rgb = vec3(1.0, 1.0-t, 0.0);
      } else if (wavelength >= 645.0 && wavelength < 781.0) {
        rgb = vec3(1.0, 0.0, 0.0);
      } else {
        rgb = vec3(0.0);
      }
      return rgb;
    }

    // Fresnel schlick approximation
    float fresnel(vec3 V, vec3 N, float ior) {
      float cosTheta = max(dot(V, N), 0.0);
      float r0 = pow((1.0 - ior) / (1.0 + ior), 2.0);
      return r0 + (1.0 - r0) * pow(1.0 - cosTheta, 5.0);
    }

    void main() {
      vec3 N = normalize(vWorldNormal);
      vec3 V = normalize(vViewDirection);

      float fresnelFactor = fresnel(V, N, 1.5);

      // 6-channel refraction (RYGCBV)
      vec3 refR = refract(-V, N, 1.0 / uIOR_R);
      vec3 refY = refract(-V, N, 1.0 / uIOR_Y);
      vec3 refG = refract(-V, N, 1.0 / uIOR_G);
      vec3 refC = refract(-V, N, 1.0 / uIOR_C);
      vec3 refB = refract(-V, N, 1.0 / uIOR_B);
      vec3 refV = refract(-V, N, 1.0 / uIOR_V);

      // Per-channel contribution to spectrum
      float R = dot(refR.xy, refR.xy) * uStrength;
      float Y = dot(refY.xy, refY.xy) * uStrength;
      float G = dot(refG.xy, refG.xy) * uStrength;
      float C = dot(refC.xy, refC.xy) * uStrength;
      float B = dot(refB.xy, refB.xy) * uStrength;
      float Vl = dot(refV.xy, refV.xy) * uStrength;

      // Blend the 6 channels into visible color bands
      vec3 dispColor = vec3(0.0);
      dispColor += wavelengthToRGB(645.0) * R;
      dispColor += wavelengthToRGB(580.0) * Y;
      dispColor += wavelengthToRGB(520.0) * G;
      dispColor += wavelengthToRGB(490.0) * C;
      dispColor += wavelengthToRGB(450.0) * B;
      dispColor += wavelengthToRGB(400.0) * Vl;
      dispColor = dispColor / 2.5;  // normalize

      // Apply at fresnel edges (dispersion most visible at glass rim)
      float edgeMask = pow(1.0 - max(dot(V, N), 0.0), 2.5);
      dispColor *= edgeMask * 2.5;

      // Animated shimmer
      float shimmer = sin(uTime * 0.4 + vWorldPosition.x * 2.0 + vWorldPosition.y * 1.5) * 0.5 + 0.5;
      dispColor *= (0.7 + shimmer * 0.3);

      gl_FragColor = vec4(dispColor, uOpacity * edgeMask);
    }
  `,
});

const dispersionMesh = new THREE.Mesh(dispersionSphereGeo, dispersionMat);
dispersionMesh.visible = false;
scene.add(dispersionMesh);

// ==========================================
// VORTEX PARTICLE INTERIOR
// 5,000 particles in a vortex (FBM noise + spiral orbit)
// ==========================================
const PARTICLE_COUNT = 5000;

function buildVortexParticles() {
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const colors    = new Float32Array(PARTICLE_COUNT * 3);
  const sizes     = new Float32Array(PARTICLE_COUNT);
  const phases    = new Float32Array(PARTICLE_COUNT);
  const radii     = new Float32Array(PARTICLE_COUNT);
  const speeds    = new Float32Array(PARTICLE_COUNT);
  const layers    = new Float32Array(PARTICLE_COUNT); // spiral layer

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const t = i / PARTICLE_COUNT;
    const r = 0.05 + Math.pow(t, 0.6) * 0.85;  // inner dense, outer sparse

    // Helix angle — 4 full turns per radial unit
    const angle = t * Math.PI * 8.0 + Math.random() * 0.8;
    // Y-position: vortex narrows at top, widens at bottom
    const y = (Math.random() * 2.0 - 1.0) * (0.3 + r * 0.7);

    positions[i*3]   = Math.cos(angle) * r;
    positions[i*3+1] = y;
    positions[i*3+2] = Math.sin(angle) * r;

    // Color: PureBrain blue (inner) → cyan (mid) → gold/orange (outer)
    const blend = Math.pow(r / 0.9, 1.5);
    const innerColor = PB_BLUE.clone();
    const outerColor = blend > 0.6 ? PB_ORANGE.clone() : PB_GOLD.clone();
    const finalColor = innerColor.lerp(outerColor, blend);
    colors[i*3]   = finalColor.r;
    colors[i*3+1] = finalColor.g;
    colors[i*3+2] = finalColor.b;

    sizes[i]  = 1.5 + Math.random() * 2.5;
    phases[i] = Math.random() * Math.PI * 2;
    radii[i]  = r;
    speeds[i] = 0.4 + (1.0 - r) * 1.2 + Math.random() * 0.3; // inner faster
    layers[i] = Math.floor(Math.random() * 4);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aColor',   new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(phases, 1));
  geo.setAttribute('aRadius',  new THREE.BufferAttribute(radii, 1));
  geo.setAttribute('aSpeed',   new THREE.BufferAttribute(speeds, 1));

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,

    uniforms: {
      uTime:    { value: 0 },
      uOpacity: { value: 0.0 },
    },

    vertexShader: `
      attribute vec3 aColor;
      attribute float aSize;
      attribute float aPhase;
      attribute float aRadius;
      attribute float aSpeed;

      uniform float uTime;

      varying vec3 vColor;
      varying float vFade;

      void main() {
        // Vortex orbit — each particle revolves around Y axis
        float angle = aPhase + uTime * aSpeed;
        vec3 pos = vec3(
          cos(angle) * aRadius,
          position.y + sin(uTime * 0.3 + aPhase * 0.7) * 0.04,
          sin(angle) * aRadius
        );

        // Fade near sphere boundary (creates clean edge)
        float dist = length(pos);
        vFade = smoothstep(0.92, 0.72, dist);

        // Core brightness (inner glow)
        float coreFade = smoothstep(0.0, 0.25, dist);
        vFade *= coreFade;

        vColor = aColor;

        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = aSize * (180.0 / -mvPos.z) * vFade;
        gl_Position = projectionMatrix * mvPos;
      }
    `,

    fragmentShader: `
      uniform float uOpacity;
      varying vec3 vColor;
      varying float vFade;

      void main() {
        // Circular soft dot
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float alpha = (1.0 - d * 2.0) * vFade * uOpacity;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
  });

  return new THREE.Points(geo, mat);
}

const vortexParticles = buildVortexParticles();
scene.add(vortexParticles);

// ==========================================
// ORBIT RINGS — 3 inclined rings (orbital system)
// ==========================================
function makeRing(radius, tubeRadius, color, inclineX, inclineZ, emissiveIntensity = 2.5) {
  const geo = new THREE.TorusGeometry(radius, tubeRadius, 16, 200);
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    emissive: new THREE.Color(color),
    emissiveIntensity,
    metalness: 0.6,
    roughness: 0.2,
    transparent: true,
    opacity: 0.55,
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = inclineX;
  ring.rotation.z = inclineZ;
  return ring;
}

const ringGroup = new THREE.Group();
const ring1 = makeRing(1.52, 0.009, '#2a93c1', Math.PI/2 + 0.2, 0.15, 3.0);
const ring2 = makeRing(1.60, 0.007, '#f1420b', Math.PI/2 + 0.6, -0.3, 2.5);
const ring3 = makeRing(1.55, 0.005, '#C8A84A', Math.PI/2 + 1.1, 0.5, 2.0);
ringGroup.add(ring1, ring2, ring3);
scene.add(ringGroup);

// ==========================================
// INNER EMISSIVE CORE
// ==========================================
const coreGeo = new THREE.IcosahedronGeometry(0.28, 4);
const coreMat = new THREE.MeshStandardMaterial({
  color: PB_BLUE,
  emissive: PB_BLUE,
  emissiveIntensity: 3.5,
  roughness: 1.0,
  metalness: 0.0,
  transparent: true,
  opacity: 0.85,
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
scene.add(coreMesh);

// Secondary core glow (different phase)
const core2Geo = new THREE.IcosahedronGeometry(0.18, 3);
const core2Mat = new THREE.MeshStandardMaterial({
  color: PB_GOLD,
  emissive: PB_GOLD,
  emissiveIntensity: 2.0,
  roughness: 1.0,
  transparent: true,
  opacity: 0.7,
});
const core2Mesh = new THREE.Mesh(core2Geo, core2Mat);
scene.add(core2Mesh);

// ==========================================
// POSTPROCESSING STACK
// ==========================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(W, H),
  0.45,   // strength
  0.42,   // radius
  0.85    // luminance threshold — MUST be ≥ 0.85 for restraint
);
composer.addPass(bloom);

// Custom chromatic aberration + vignette pass (same as Day 8)
const ChromaVigShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime:    { value: 0 },
    uChromaStr: { value: 0.0030 },
    uVigOffset: { value: 0.50 },
    uVigDark:   { value: 0.75 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uChromaStr;
    uniform float uVigOffset;
    uniform float uVigDark;
    varying vec2 vUv;

    void main() {
      vec2 center = vUv - 0.5;
      float dist = length(center);
      // Radial chromatic aberration (increases toward edges)
      float aberration = uChromaStr * dist * dist * 3.0;
      vec2 dir = normalize(center) * aberration;

      vec4 cr = texture2D(tDiffuse, vUv + dir);
      vec4 cg = texture2D(tDiffuse, vUv);
      vec4 cb = texture2D(tDiffuse, vUv - dir);

      // Vignette
      float vig = smoothstep(uVigOffset, uVigOffset - 0.35, dist);
      vig = pow(vig, 0.8) * uVigDark + (1.0 - uVigDark);

      gl_FragColor = vec4(cr.r, cg.g, cb.b, 1.0) * vig;
    }
  `,
};
const chromaVigPass = new ShaderPass(ChromaVigShader);
composer.addPass(chromaVigPass);
composer.addPass(new OutputPass()); // MUST be last (r0.161.0)

// ==========================================
// MODE SYSTEM
// ==========================================
const MODES = {
  idle: {
    label: 'idle',
    glassColor: new THREE.Color('#aaddff'),
    attenColor: PB_BLUE.clone(),
    attenDist: 1.2,
    iridescence: 0.35,
    clearcoat: 0.5,
    envBlue: 0.7, envOrange: 0.15, envMagenta: 0.4,
    bloomStr: 0.42, bloomThresh: 0.88,
    coreColor: PB_BLUE.clone(), coreIntensity: 3.0,
    particleOpacity: 0.0,
    dispersionOpacity: 0.0,
    ringSpeed: [0.0008, -0.0005, 0.0011],
    description: 'Glass sphere — base Gleb recipe'
  },
  iridescent: {
    label: 'iridescent',
    glassColor: new THREE.Color('#88aaff'),
    attenColor: new THREE.Color('#8855ff'),
    attenDist: 0.8,
    iridescence: 1.0,
    clearcoat: 1.0,
    envBlue: 0.9, envOrange: 0.1, envMagenta: 0.7,
    bloomStr: 0.50, bloomThresh: 0.85,
    coreColor: new THREE.Color('#8855ff'), coreIntensity: 3.5,
    particleOpacity: 0.0,
    dispersionOpacity: 0.0,
    ringSpeed: [0.0012, -0.0008, 0.0015],
    description: 'Iridescence=1.0 + clearcoat — thin film rainbow'
  },
  dispersion: {
    label: 'dispersion',
    glassColor: new THREE.Color('#ffffff'),
    attenColor: new THREE.Color('#88ccff'),
    attenDist: 2.0,
    iridescence: 0.3,
    clearcoat: 0.3,
    envBlue: 0.5, envOrange: 0.5, envMagenta: 0.5,
    bloomStr: 0.35, bloomThresh: 0.88,
    coreColor: PB_GOLD.clone(), coreIntensity: 2.5,
    particleOpacity: 0.0,
    dispersionOpacity: 0.6,
    ringSpeed: [0.0005, -0.0003, 0.0008],
    description: 'RYGCBV chromatic dispersion — prism edge fringe'
  },
  vortex: {
    label: 'vortex',
    glassColor: new THREE.Color('#aaddff'),
    attenColor: PB_BLUE.clone(),
    attenDist: 0.9,
    iridescence: 0.5,
    clearcoat: 0.7,
    envBlue: 0.8, envOrange: 0.25, envMagenta: 0.3,
    bloomStr: 0.55, bloomThresh: 0.82,
    coreColor: PB_BLUE.clone(), coreIntensity: 2.0,
    particleOpacity: 0.85,
    dispersionOpacity: 0.0,
    ringSpeed: [0.0015, -0.001, 0.002],
    description: '5,000 vortex particles orbiting inside glass sphere'
  },
  combined: {
    label: 'combined',
    glassColor: new THREE.Color('#aaccee'),
    attenColor: PB_BLUE.clone(),
    attenDist: 0.7,
    iridescence: 0.70,
    clearcoat: 0.90,
    envBlue: 0.8, envOrange: 0.35, envMagenta: 0.6,
    bloomStr: 0.58, bloomThresh: 0.82,
    coreColor: PB_BLUE.clone(), coreIntensity: 2.5,
    particleOpacity: 0.65,
    dispersionOpacity: 0.40,
    ringSpeed: [0.0018, -0.0012, 0.0022],
    description: 'All techniques combined'
  },
};

let currentMode = 'idle';
let targetMode = MODES['idle'];
let smoothBloom = 0.42;
let smoothParticleOpacity = 0.0;
let smoothDispOpacity = 0.0;
let smoothIridescence = 0.35;
let smoothClearcoat = 0.5;

function setMode(name) {
  if (!MODES[name]) return;
  currentMode = name;
  targetMode = MODES[name];

  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === name || b.getAttribute('onclick').includes(`'${name}'`));
  });

  // Rebuild env map
  if (envMap) envMap.dispose();
  envMap = buildEnvMap(targetMode.envBlue, targetMode.envOrange, targetMode.envMagenta);
  scene.environment = envMap;
}

// Expose globally
window.setMode = setMode;

// ==========================================
// ANIMATION LOOP
// ==========================================
let prevTime = performance.now();
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;
  const t = clock.getElapsedTime();

  controls.update();

  const lerpSpeed = dt * 2.5; // smooth transitions ~0.4s

  // ---- Smooth mode lerp ----
  smoothBloom = THREE.MathUtils.lerp(smoothBloom, targetMode.bloomStr, lerpSpeed);
  smoothParticleOpacity = THREE.MathUtils.lerp(smoothParticleOpacity, targetMode.particleOpacity, lerpSpeed * 1.5);
  smoothDispOpacity = THREE.MathUtils.lerp(smoothDispOpacity, targetMode.dispersionOpacity, lerpSpeed * 1.8);
  smoothIridescence = THREE.MathUtils.lerp(smoothIridescence, targetMode.iridescence, lerpSpeed);
  smoothClearcoat = THREE.MathUtils.lerp(smoothClearcoat, targetMode.clearcoat, lerpSpeed);

  // ---- Glass material updates ----
  glassMat.iridescence = smoothIridescence;
  glassMat.clearcoat = smoothClearcoat;
  glassMat.color.lerp(targetMode.glassColor, lerpSpeed);
  glassMat.attenuationColor.lerp(targetMode.attenColor, lerpSpeed);
  glassMat.attenuationDistance = THREE.MathUtils.lerp(glassMat.attenuationDistance, targetMode.attenDist, lerpSpeed);
  glassMat.needsUpdate = false; // No structural change, just uniform updates

  // ---- Postprocessing ----
  bloom.strength = smoothBloom;
  bloom.threshold = THREE.MathUtils.lerp(bloom.threshold, targetMode.bloomThresh, lerpSpeed);
  chromaVigPass.uniforms.uTime.value = t;
  dispersionMat.uniforms.uTime.value = t;
  dispersionMat.uniforms.uOpacity.value = smoothDispOpacity;
  dispersionMesh.visible = smoothDispOpacity > 0.01;

  // ---- Vortex particles ----
  vortexParticles.material.uniforms.uTime.value = t;
  vortexParticles.material.uniforms.uOpacity.value = smoothParticleOpacity;

  // ---- Orbiting point lights (dynamic reflections) ----
  lights.orb1.position.set(
    Math.cos(t * 0.5) * 2.5,
    Math.sin(t * 0.3) * 1.5,
    Math.sin(t * 0.5) * 2.5
  );
  lights.orb2.position.set(
    Math.cos(t * 0.7 + Math.PI) * 2.0,
    Math.cos(t * 0.4) * 1.2,
    Math.sin(t * 0.7 + Math.PI) * 2.0
  );

  // ---- Glass sphere rotation (subtle idle) ----
  glassMesh.rotation.y += 0.0015 * dt * 60;

  // ---- Orbit ring rotation (each at different speed) ----
  const rs = targetMode.ringSpeed;
  ring1.rotation.z += rs[0] * dt * 60;
  ring2.rotation.z += rs[1] * dt * 60;
  ring3.rotation.z += rs[2] * dt * 60;
  // Slow precession of ring group
  ringGroup.rotation.y += 0.0003 * dt * 60;

  // ---- Inner core animation ----
  // Multi-frequency rotation (3 axes, prime frequency ratios = never repeats)
  coreMesh.rotation.x += 0.0089 * dt * 60;
  coreMesh.rotation.y += 0.0143 * dt * 60;
  coreMesh.rotation.z += 0.0061 * dt * 60;

  const corePulse = 1.0 + Math.sin(t * 1.7) * 0.06 + Math.sin(t * 3.1) * 0.03;
  coreMesh.scale.setScalar(0.9 * corePulse);
  coreMat.color.lerp(targetMode.coreColor, lerpSpeed * 2);
  coreMat.emissive.lerp(targetMode.coreColor, lerpSpeed * 2);
  coreMat.emissiveIntensity = THREE.MathUtils.lerp(
    coreMat.emissiveIntensity, targetMode.coreIntensity, lerpSpeed
  );

  // Secondary gold core rotates opposite direction
  core2Mesh.rotation.x -= 0.0067 * dt * 60;
  core2Mesh.rotation.y -= 0.0101 * dt * 60;
  const core2Pulse = 1.0 + Math.sin(t * 2.3 + 1.4) * 0.08;
  core2Mesh.scale.setScalar(0.75 * core2Pulse);

  // ---- Float animation (3 frequency components = organic, non-repeating) ----
  const floatY = Math.sin(t * 0.55) * 0.095 + Math.sin(t * 0.38) * 0.03;
  const floatX = Math.sin(t * 0.22) * 0.018;
  glassMesh.position.y = floatY;
  glassMesh.position.x = floatX;
  dispersionMesh.position.copy(glassMesh.position);
  coreMesh.position.copy(glassMesh.position);
  core2Mesh.position.copy(glassMesh.position);
  vortexParticles.position.copy(glassMesh.position);

  composer.render();
}

animate();

// ==========================================
// RESIZE
// ==========================================
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloom.setSize(w, h);
});

</script>
</body>
</html>
