<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gleb Night 13 — Hex Bokeh + Caustic-Glass Link + Enhanced SSR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060608; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#info {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 12px; text-align: center;
  z-index: 10; letter-spacing: 1px;
}
#variation-label {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.7); font-size: 14px; text-align: center;
  z-index: 10; letter-spacing: 2px; text-transform: uppercase;
}
#controls {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 10;
}
.btn {
  background: rgba(42,147,193,0.15); border: 1px solid rgba(42,147,193,0.3);
  color: rgba(255,255,255,0.7); padding: 8px 18px; cursor: pointer;
  font-size: 12px; letter-spacing: 1px; transition: all 0.3s;
  border-radius: 4px;
}
.btn:hover, .btn.active {
  background: rgba(42,147,193,0.35); border-color: rgba(42,147,193,0.7);
  color: #fff;
}
</style>
</head>
<body>
<div id="variation-label">Variation 1 — Hexagonal Bokeh DoF</div>
<div id="controls">
  <button class="btn active" onclick="setVariation(0)">1: Hex Bokeh</button>
  <button class="btn" onclick="setVariation(1)">2: Caustic Link</button>
  <button class="btn" onclick="setVariation(2)">3: Full SSR</button>
</div>
<div id="info">Night 13 — Gleb Mastery Training | Click variations above</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ──────── SCENE SETUP ────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 4.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ──────── ENVIRONMENT (Procedural PMREM) ────────
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
const envGeo = new THREE.IcosahedronGeometry(5, 3);
const envMat = new THREE.MeshBasicMaterial({ side: THREE.BackSide });
envMat.color.set('#080a12');
const envMesh = new THREE.Mesh(envGeo, envMat);
envScene.add(envMesh);

// Colored env lights
const envLights = [
  { color: '#2a93c1', pos: [3, 2, 1], intensity: 2.0 },
  { color: '#f1420b', pos: [-2, -1, 3], intensity: 1.2 },
  { color: '#C8A84A', pos: [0, 3, -2], intensity: 0.8 },
];
envLights.forEach(l => {
  const light = new THREE.PointLight(l.color, l.intensity, 10);
  light.position.set(...l.pos);
  envScene.add(light);
});
const envRT = pmremGenerator.fromScene(envScene, 0.04);
scene.environment = envRT.texture;

// ──────── SCENE LIGHTS ────────
const keyLight = new THREE.SpotLight('#ffffff', 15, 20, Math.PI * 0.2, 0.5, 1);
keyLight.position.set(3, 4, 3);
keyLight.lookAt(0, 0, 0);
scene.add(keyLight);

const fillLight = new THREE.PointLight('#2a93c1', 3, 10);
fillLight.position.set(-3, 1, 2);
scene.add(fillLight);

const rimLight = new THREE.PointLight('#f1420b', 2, 10);
rimLight.position.set(0, -1, -3);
scene.add(rimLight);

scene.add(new THREE.AmbientLight('#111122', 0.3));

// ──────── GLASS SPHERE (Outer + Inner) ────────
const glassGeo = new THREE.SphereGeometry(1.0, 128, 128);
const glassMat = new THREE.MeshPhysicalMaterial({
  color: '#ffffff',
  metalness: 0.0,
  roughness: 0.02,
  transmission: 0.97,
  thickness: 0.8,
  ior: 1.45,
  iridescence: 0.35,
  iridescenceIOR: 1.3,
  clearcoat: 0.3,
  clearcoatRoughness: 0.1,
  specularColor: new THREE.Color('#C8A84A'),
  specularIntensity: 1.0,
  envMapIntensity: 1.5,
  transparent: true,
  depthWrite: false,
  side: THREE.FrontSide,
});
const glassSphere = new THREE.Mesh(glassGeo, glassMat);
scene.add(glassSphere);

// Inner sphere
const innerGeo = new THREE.SphereGeometry(0.55, 96, 96);
const innerMat = new THREE.MeshPhysicalMaterial({
  color: '#2a93c1',
  metalness: 0.1,
  roughness: 0.05,
  transmission: 0.85,
  thickness: 0.3,
  ior: 1.8,
  iridescence: 0.5,
  iridescenceIOR: 1.5,
  clearcoat: 0.5,
  specularColor: new THREE.Color('#C8A84A'),
  envMapIntensity: 2.0,
  transparent: true,
  depthWrite: false,
});
const innerSphere = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerSphere);

// ──────── FLOOR ────────
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({
  color: '#0a0c14',
  roughness: 0.3,
  metalness: 0.8,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.8;
scene.add(floor);

// ──────── CAUSTIC FLOOR TEXTURE (Procedural) ────────
const causticSize = 512;
const causticCanvas = document.createElement('canvas');
causticCanvas.width = causticSize;
causticCanvas.height = causticSize;
const causticCtx = causticCanvas.getContext('2d');
const causticTexture = new THREE.CanvasTexture(causticCanvas);
causticTexture.wrapS = causticTexture.wrapT = THREE.RepeatWrapping;

function updateCaustics(time, sphereY) {
  causticCtx.fillStyle = 'rgba(10,12,20,1)';
  causticCtx.fillRect(0, 0, causticSize, causticSize);

  // Voronoi-like caustic pattern linked to glass position
  const cx = causticSize / 2;
  const cy = causticSize / 2;
  const glassInfluence = 0.5 + sphereY * 0.3; // Glass position affects caustic spread

  for (let i = 0; i < 25; i++) {
    const angle = (i / 25) * Math.PI * 2 + time * 0.3;
    const radius = 80 + Math.sin(time * 0.5 + i * 1.7) * 40 * glassInfluence;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;

    // Chromatic split - blue and orange channels offset
    const blueGrad = causticCtx.createRadialGradient(x - 3, y - 2, 0, x, y, 35 + Math.sin(time + i) * 10);
    blueGrad.addColorStop(0, 'rgba(42,147,193,0.15)');
    blueGrad.addColorStop(0.5, 'rgba(42,147,193,0.05)');
    blueGrad.addColorStop(1, 'rgba(0,0,0,0)');
    causticCtx.fillStyle = blueGrad;
    causticCtx.fillRect(0, 0, causticSize, causticSize);

    const orangeGrad = causticCtx.createRadialGradient(x + 3, y + 2, 0, x, y, 25 + Math.cos(time + i) * 8);
    orangeGrad.addColorStop(0, 'rgba(241,66,11,0.08)');
    orangeGrad.addColorStop(0.5, 'rgba(241,66,11,0.03)');
    orangeGrad.addColorStop(1, 'rgba(0,0,0,0)');
    causticCtx.fillStyle = orangeGrad;
    causticCtx.fillRect(0, 0, causticSize, causticSize);
  }

  // Central bright caustic under glass - LINKED to glass position
  const centralGrad = causticCtx.createRadialGradient(cx, cy, 0, cx, cy, 100 * glassInfluence);
  centralGrad.addColorStop(0, 'rgba(200,168,74,0.12)');
  centralGrad.addColorStop(0.4, 'rgba(42,147,193,0.06)');
  centralGrad.addColorStop(1, 'rgba(0,0,0,0)');
  causticCtx.fillStyle = centralGrad;
  causticCtx.fillRect(0, 0, causticSize, causticSize);

  causticTexture.needsUpdate = true;
}

floorMat.emissiveMap = causticTexture;
floorMat.emissive = new THREE.Color('#ffffff');
floorMat.emissiveIntensity = 2.0;

// ──────── HEXAGONAL BOKEH DOF SHADER ────────
const HexBokehShader = {
  uniforms: {
    tDiffuse: { value: null },
    tDepth: { value: null },
    focus: { value: 4.5 },
    aperture: { value: 0.012 },
    maxblur: { value: 0.015 },
    nearClip: { value: 0.1 },
    farClip: { value: 100.0 },
    aspect: { value: window.innerWidth / window.innerHeight },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tDepth;
    uniform float focus;
    uniform float aperture;
    uniform float maxblur;
    uniform float nearClip;
    uniform float farClip;
    uniform float aspect;
    varying vec2 vUv;

    float getDepth(vec2 uv) {
      float fragDepth = texture2D(tDepth, uv).x;
      float viewZ = nearClip * farClip / (farClip - fragDepth * (farClip - nearClip));
      return viewZ;
    }

    // HEXAGONAL KERNEL — 6-sided aperture shape
    // This is the key technique: sample in a hexagonal pattern
    // Gleb's bokeh is never circular — hex gives that premium camera lens feel
    vec2 hexSample(float angle, float radius) {
      // Snap to nearest hex vertex angle (60-degree increments)
      float sector = floor(angle / (3.14159265 / 3.0));
      float sectorAngle = sector * (3.14159265 / 3.0);
      float nextAngle = sectorAngle + (3.14159265 / 3.0);

      // Interpolate along hex edge
      float t = (angle - sectorAngle) / (3.14159265 / 3.0);
      vec2 p1 = vec2(cos(sectorAngle), sin(sectorAngle));
      vec2 p2 = vec2(cos(nextAngle), sin(nextAngle));

      return mix(p1, p2, t) * radius;
    }

    void main() {
      float depth = getDepth(vUv);
      float factor = abs(depth - focus);
      float blur = clamp(factor * aperture, 0.0, maxblur);

      vec4 col = vec4(0.0);
      float totalWeight = 0.0;

      // 3-ring hexagonal sampling (6, 12, 18 samples)
      // Ring 1: 6 samples at hex vertices
      for (int i = 0; i < 6; i++) {
        float angle = float(i) * 3.14159265 * 2.0 / 6.0;
        vec2 offset = hexSample(angle, blur * 0.33);
        offset.x /= aspect;
        float w = 1.0;
        col += texture2D(tDiffuse, vUv + offset) * w;
        totalWeight += w;
      }

      // Ring 2: 12 samples
      for (int i = 0; i < 12; i++) {
        float angle = float(i) * 3.14159265 * 2.0 / 12.0 + 0.26;
        vec2 offset = hexSample(angle, blur * 0.66);
        offset.x /= aspect;
        float w = 0.75;
        col += texture2D(tDiffuse, vUv + offset) * w;
        totalWeight += w;
      }

      // Ring 3: 18 samples (outermost — slightly less weight)
      for (int i = 0; i < 18; i++) {
        float angle = float(i) * 3.14159265 * 2.0 / 18.0;
        vec2 offset = hexSample(angle, blur);
        offset.x /= aspect;
        float w = 0.5;
        col += texture2D(tDiffuse, vUv + offset) * w;
        totalWeight += w;
      }

      // Center sample
      col += texture2D(tDiffuse, vUv) * 2.0;
      totalWeight += 2.0;

      gl_FragColor = col / totalWeight;
    }
  `
};

// ──────── SSR SHADER (Screen-Space Reflections for arbitrary geometry) ────────
const SSRShader = {
  uniforms: {
    tDiffuse: { value: null },
    tDepth: { value: null },
    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    cameraNear: { value: 0.1 },
    cameraFar: { value: 100.0 },
    ssrIntensity: { value: 0.4 },
    ssrMaxDistance: { value: 3.0 },
    ssrThickness: { value: 0.1 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tDepth;
    uniform vec2 resolution;
    uniform float cameraNear;
    uniform float cameraFar;
    uniform float ssrIntensity;
    uniform float ssrMaxDistance;
    uniform float ssrThickness;
    varying vec2 vUv;

    float linearizeDepth(float d) {
      return cameraNear * cameraFar / (cameraFar - d * (cameraFar - cameraNear));
    }

    void main() {
      vec4 baseColor = texture2D(tDiffuse, vUv);
      float depth = linearizeDepth(texture2D(tDepth, vUv).x);

      // Simple screen-space reflection march
      // Direction based on screen position (approximation for non-normal-buffer SSR)
      vec2 reflDir = vec2(0.0, -1.0); // Vertical reflection approximation
      float stepSize = 1.0 / resolution.y;

      vec4 reflColor = vec4(0.0);
      float hitWeight = 0.0;

      for (int i = 1; i <= 32; i++) {
        vec2 sampleUv = vUv + reflDir * stepSize * float(i) * 4.0;
        if (sampleUv.y < 0.0 || sampleUv.y > 1.0) break;

        float sampleDepth = linearizeDepth(texture2D(tDepth, sampleUv).x);
        float depthDiff = depth - sampleDepth;

        if (depthDiff > 0.0 && depthDiff < ssrThickness) {
          float fadeout = 1.0 - float(i) / 32.0;
          reflColor += texture2D(tDiffuse, sampleUv) * fadeout;
          hitWeight += fadeout;
          break;
        }
      }

      if (hitWeight > 0.0) {
        reflColor /= hitWeight;
        // Only apply to floor-ish regions (lower screen half, darker areas)
        float floorMask = smoothstep(0.3, 0.6, vUv.y);
        gl_FragColor = mix(baseColor, baseColor + reflColor * ssrIntensity, floorMask);
      } else {
        gl_FragColor = baseColor;
      }
    }
  `
};

// ──────── DEPTH RENDER TARGET ────────
const depthRT = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
  minFilter: THREE.NearestFilter,
  magFilter: THREE.NearestFilter,
  type: THREE.FloatType,
});
depthRT.depthTexture = new THREE.DepthTexture();
depthRT.depthTexture.format = THREE.DepthFormat;
depthRT.depthTexture.type = THREE.UnsignedIntType;

// ──────── POST-PROCESSING ────────
const composer = new EffectComposer(renderer, depthRT);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.35, 0.8, 0.85
);
composer.addPass(bloomPass);

const hexBokehPass = new ShaderPass(HexBokehShader);
hexBokehPass.uniforms.tDepth.value = depthRT.depthTexture;
hexBokehPass.enabled = true;
composer.addPass(hexBokehPass);

const ssrPass = new ShaderPass(SSRShader);
ssrPass.uniforms.tDepth.value = depthRT.depthTexture;
ssrPass.enabled = false;
composer.addPass(ssrPass);

// ──────── FLOATING PARTICLES (Bokeh visible elements) ────────
const particleCount = 80;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 8;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 5 + 0.5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 8;
  particleSizes[i] = Math.random() * 3 + 1;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: '#2a93c1',
  size: 0.04,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ──────── BREATHING VERTEX SHADER ────────
glassMat.onBeforeCompile = (shader) => {
  shader.uniforms.uTime = { value: 0 };
  shader.vertexShader = shader.vertexShader.replace(
    '#include <begin_vertex>',
    `
    #include <begin_vertex>
    float breathe = sin(uTime * 0.55) * 0.015 + sin(uTime * 0.38) * 0.01 + sin(uTime * 0.22) * 0.008;
    transformed += normal * breathe;
    `
  );
  glassMat.userData.shader = shader;
};

innerMat.onBeforeCompile = (shader) => {
  shader.uniforms.uTime = { value: 0 };
  shader.vertexShader = shader.vertexShader.replace(
    '#include <begin_vertex>',
    `
    #include <begin_vertex>
    float breathe = sin(uTime * 0.7) * 0.02 + sin(uTime * 0.45) * 0.012;
    transformed += normal * breathe;
    `
  );
  innerMat.userData.shader = shader;
};

// ──────── VARIATION STATE ────────
let currentVariation = 0;
const labels = [
  'Variation 1 — Hexagonal Bokeh DoF',
  'Variation 2 — Caustic-Glass Linkage',
  'Variation 3 — Enhanced SSR + Full Composite'
];

window.setVariation = function(v) {
  currentVariation = v;
  document.getElementById('variation-label').textContent = labels[v];
  document.querySelectorAll('.btn').forEach((b, i) => b.classList.toggle('active', i === v));

  // Variation 0: Hex Bokeh prominent
  hexBokehPass.enabled = (v === 0);
  hexBokehPass.uniforms.aperture.value = v === 0 ? 0.018 : 0.005;
  hexBokehPass.uniforms.maxblur.value = v === 0 ? 0.02 : 0.008;

  // Variation 1: Caustic-glass linkage (caustics respond to glass motion)
  // Handled in animation loop

  // Variation 2: SSR enabled
  ssrPass.enabled = (v === 2);

  // All variations get bloom
  bloomPass.strength = v === 2 ? 0.5 : 0.35;
};

// ──────── MOUSE PARALLAX ────────
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ──────── ANIMATION LOOP ────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Camera parallax
  camera.position.x += (mouseX * 0.3 - camera.position.x) * 0.02;
  camera.position.y += (-mouseY * 0.2 + 0.5 - camera.position.y) * 0.02;
  camera.lookAt(0, 0, 0);

  // Glass breathing animation
  const breathY = Math.sin(t * 0.55) * 0.05;
  glassSphere.position.y = breathY;
  innerSphere.position.y = breathY;

  // Inner sphere subtle rotation
  innerSphere.rotation.y = t * 0.15;
  innerSphere.rotation.x = Math.sin(t * 0.22) * 0.1;

  // Update breathing shader time
  if (glassMat.userData.shader) {
    glassMat.userData.shader.uniforms.uTime.value = t;
  }
  if (innerMat.userData.shader) {
    innerMat.userData.shader.uniforms.uTime.value = t;
  }

  // Particles drift
  const posArr = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArr[i * 3 + 1] += Math.sin(t * 0.3 + i) * 0.0003;
    posArr[i * 3] += Math.cos(t * 0.2 + i * 0.7) * 0.0002;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Variation-specific behaviors
  if (currentVariation === 1) {
    // CAUSTIC-GLASS LINKAGE: caustics respond to glass sphere position and breathing
    updateCaustics(t, glassSphere.position.y + 1.0);
    floorMat.emissiveIntensity = 2.5 + Math.sin(t * 0.55) * 0.5; // Sync with breathing
  } else {
    updateCaustics(t, 1.0);
    floorMat.emissiveIntensity = 2.0;
  }

  if (currentVariation === 0) {
    // HEX BOKEH: animate focus subtly
    hexBokehPass.uniforms.focus.value = 4.5 + Math.sin(t * 0.2) * 0.3;
  }

  if (currentVariation === 2) {
    // SSR: stronger reflections with bloom
    glassMat.envMapIntensity = 2.0;
    floorMat.roughness = 0.15; // More reflective floor
    floorMat.metalness = 0.9;
  } else {
    glassMat.envMapIntensity = 1.5;
    floorMat.roughness = 0.3;
    floorMat.metalness = 0.8;
  }

  composer.render();
}

animate();

// ──────── RESIZE ────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  depthRT.setSize(w, h);
  hexBokehPass.uniforms.aspect.value = w / h;
  ssrPass.uniforms.resolution.value.set(w, h);
});
</script>
</body>
</html>
