<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gleb Night 15 - Internal Light Hexagon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080a12; overflow: hidden; font-family: 'Inter', sans-serif; }
canvas { display: block; }
#info {
  position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.4);
  font-size: 11px; z-index: 10; pointer-events: none;
  letter-spacing: 1px;
}
#technique {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.35); font-size: 10px; z-index: 10;
  pointer-events: none; letter-spacing: 2px; text-transform: uppercase;
}
</style>
</head>
<body>
<div id="info">NIGHT 15 — INTERNAL LIGHT HEXAGON</div>
<div id="technique">MULTI-LAYER GLASS + EMISSIVE CORE + BLOOM + DOF</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// =============================================
// SCENE SETUP
// =============================================

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080a12);

// Camera slightly below eye level (Gleb composition rule: creates grandeur)
// Golden ratio: hex is offset ~38.2% from center
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0.3, -0.15, 4.5);
camera.lookAt(0.05, 0.1, 0);

// =============================================
// PMREM STUDIO LIGHTING (from definitive synthesis)
// =============================================

function buildPMREMProbe() {
  const pmremScene = new THREE.Scene();

  // Key light: warm white, upper right
  const key = new THREE.DirectionalLight(0xfff4e8, 3.5);
  key.position.set(3, 4, 2);
  pmremScene.add(key);

  // Fill: PureBrain blue, left
  const fill = new THREE.DirectionalLight(0x2a93c1, 1.8);
  fill.position.set(-4, 1, 3);
  pmremScene.add(fill);

  // Rim: PureBrain orange, back right (creates warm internal glow in glass)
  const rim = new THREE.DirectionalLight(0xf1420b, 2.2);
  rim.position.set(2, -1, -3);
  pmremScene.add(rim);

  // Ground bounce: cool blue
  const ground = new THREE.DirectionalLight(0x4ab8ff, 0.8);
  ground.position.set(0, -3, 1);
  pmremScene.add(ground);

  // Ambient base
  pmremScene.add(new THREE.AmbientLight(0x1a1a2e, 0.3));

  // Environment sphere
  const envGeo = new THREE.SphereGeometry(8, 32, 32);
  const envMat = new THREE.MeshBasicMaterial({
    color: 0x0a0a14,
    side: THREE.BackSide
  });
  pmremScene.add(new THREE.Mesh(envGeo, envMat));

  const pmremGen = new THREE.PMREMGenerator(renderer);
  const envMap = pmremGen.fromScene(pmremScene, 0.02).texture;
  pmremGen.dispose();

  return envMap;
}

const envMap = buildPMREMProbe();
scene.environment = envMap;

// =============================================
// HEXAGON GEOMETRY (PureBrain logo shape)
// =============================================

function createHexagonGeometry(radius, depth, segments) {
  // Create a hexagonal shape
  const shape = new THREE.Shape();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6; // rotate 30deg so flat top
    const x = radius * Math.cos(angle);
    const y = radius * Math.sin(angle);
    if (i === 0) shape.moveTo(x, y);
    else shape.lineTo(x, y);
  }
  shape.closePath();

  const extrudeSettings = {
    depth: depth,
    bevelEnabled: true,
    bevelThickness: 0.08,
    bevelSize: 0.06,
    bevelOffset: 0,
    bevelSegments: segments,
    curveSegments: 1 // hexagon edges are straight
  };

  const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  geo.center();
  geo.computeVertexNormals();
  return geo;
}

// =============================================
// OUTER GLASS HEXAGON (Transmission layer)
// =============================================

const outerHexGeo = createHexagonGeometry(1.2, 0.5, 8);

const outerGlassMat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0x88bbdd),
  metalness: 0.0,
  roughness: 0.03,
  transmission: 0.92,
  thickness: 1.2,
  ior: 1.52,
  envMap: envMap,
  envMapIntensity: 1.5,
  transparent: true,
  opacity: 0.95,
  side: THREE.DoubleSide,
  clearcoat: 0.3,
  clearcoatRoughness: 0.1,
  attenuationColor: new THREE.Color(0x2a93c1),
  attenuationDistance: 2.0,
  specularIntensity: 1.0,
  specularColor: new THREE.Color(0xffffff),
});

const outerHex = new THREE.Mesh(outerHexGeo, outerGlassMat);
scene.add(outerHex);

// =============================================
// INNER GLASS HEXAGON (Second layer, tighter, different IOR)
// =============================================

const innerHexGeo = createHexagonGeometry(0.85, 0.35, 6);

const innerGlassMat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0x99ccee),
  metalness: 0.0,
  roughness: 0.05,
  transmission: 0.88,
  thickness: 0.8,
  ior: 1.68,
  envMap: envMap,
  envMapIntensity: 1.2,
  transparent: true,
  opacity: 0.9,
  side: THREE.DoubleSide,
  attenuationColor: new THREE.Color(0x1a7db5),
  attenuationDistance: 1.5,
});

const innerHex = new THREE.Mesh(innerHexGeo, innerGlassMat);
scene.add(innerHex);

// =============================================
// EMISSIVE CORE: Blue energy source inside
// Key insight: emissive mesh INSIDE transparent mesh + bloom
// =============================================

// Blue core - primary PureBrain color
const blueCoreGeo = new THREE.IcosahedronGeometry(0.35, 4);
const blueCoreMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(0x2a93c1),
  emissive: new THREE.Color(0x2a93c1),
  emissiveIntensity: 3.5,
  metalness: 0.0,
  roughness: 0.8,
  transparent: true,
  opacity: 0.85,
});
const blueCore = new THREE.Mesh(blueCoreGeo, blueCoreMat);
scene.add(blueCore);

// Orange accent ring - secondary PureBrain color
const orangeRingGeo = new THREE.TorusGeometry(0.45, 0.03, 16, 6); // 6 segments = hexagonal torus
const orangeRingMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(0xf1420b),
  emissive: new THREE.Color(0xf1420b),
  emissiveIntensity: 4.0,
  metalness: 0.1,
  roughness: 0.5,
  transparent: true,
  opacity: 0.9,
});
const orangeRing = new THREE.Mesh(orangeRingGeo, orangeRingMat);
orangeRing.rotation.x = Math.PI / 2;
scene.add(orangeRing);

// Secondary blue energy wisps (small emissive spheres orbiting inside)
const wispGroup = new THREE.Group();
const wispGeo = new THREE.SphereGeometry(0.04, 16, 16);
const wispMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(0x4ab8ff),
  emissive: new THREE.Color(0x4ab8ff),
  emissiveIntensity: 5.0,
  transparent: true,
  opacity: 0.8,
});

const NUM_WISPS = 12;
const wisps = [];
for (let i = 0; i < NUM_WISPS; i++) {
  const wisp = new THREE.Mesh(wispGeo, wispMat.clone());
  const angle = (Math.PI * 2 / NUM_WISPS) * i;
  wisp.userData.angle = angle;
  wisp.userData.radius = 0.3 + Math.random() * 0.3;
  wisp.userData.speed = 0.3 + Math.random() * 0.4;
  wisp.userData.yOffset = (Math.random() - 0.5) * 0.4;
  wisp.userData.phase = Math.random() * Math.PI * 2;
  wispGroup.add(wisp);
  wisps.push(wisp);
}
scene.add(wispGroup);

// =============================================
// FLOATING PARTICLES (suspended photons - Gleb signature)
// =============================================

const particleCount = 3000;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particlePhases = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  // Distribute in a sphere around the hex
  const r = 1.5 + Math.random() * 3.5;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i * 3 + 2] = r * Math.cos(phi);
  particleSizes[i] = 0.5 + Math.random() * 2.0;
  particlePhases[i] = Math.random() * Math.PI * 2;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
particleGeo.setAttribute('phase', new THREE.BufferAttribute(particlePhases, 1));

const particleMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 },
    uColor1: { value: new THREE.Color(0x2a93c1) },
    uColor2: { value: new THREE.Color(0x4ab8ff) },
    uPixelRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader: `
    attribute float size;
    attribute float phase;
    uniform float uTime;
    uniform float uPixelRatio;
    varying float vAlpha;
    varying float vMix;

    void main() {
      vec3 pos = position;
      // Gentle drift
      pos.x += sin(uTime * 0.15 + phase) * 0.1;
      pos.y += cos(uTime * 0.12 + phase * 1.3) * 0.08;
      pos.z += sin(uTime * 0.1 + phase * 0.7) * 0.06;

      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_Position = projectionMatrix * mvPos;

      // Size attenuation
      float dist = -mvPos.z;
      gl_PointSize = size * uPixelRatio * (80.0 / dist);

      // Fade based on distance and time
      vAlpha = smoothstep(5.0, 1.5, dist) * (0.3 + 0.7 * sin(uTime * 0.5 + phase) * 0.5 + 0.5);
      vMix = sin(phase + uTime * 0.2) * 0.5 + 0.5;
    }
  `,
  fragmentShader: `
    uniform vec3 uColor1;
    uniform vec3 uColor2;
    varying float vAlpha;
    varying float vMix;

    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      float falloff = 1.0 - smoothstep(0.0, 1.0, d);
      falloff = pow(falloff, 2.0); // soft glow

      vec3 col = mix(uColor1, uColor2, vMix);
      gl_FragColor = vec4(col, falloff * vAlpha * 0.6);
    }
  `
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// =============================================
// CAUSTIC GROUND PLANE (evidence of refraction)
// =============================================

const groundGeo = new THREE.PlaneGeometry(12, 12, 1, 1);
const groundMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: {
    uTime: { value: 0 },
    uBlue: { value: new THREE.Color(0x2a93c1) },
    uOrange: { value: new THREE.Color(0xf1420b) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uBlue;
    uniform vec3 uOrange;
    varying vec2 vUv;

    // Simple voronoi for caustics
    vec2 hash22(vec2 p) {
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return fract(sin(p) * 43758.5453);
    }

    float voronoi(vec2 uv) {
      vec2 i = floor(uv);
      vec2 f = fract(uv);
      float minDist = 1.0;
      for (int x = -1; x <= 1; x++) {
        for (int y = -1; y <= 1; y++) {
          vec2 neighbor = vec2(float(x), float(y));
          vec2 point = hash22(i + neighbor);
          point = 0.5 + 0.5 * sin(uTime * 0.3 + 6.2832 * point);
          float dist = length(neighbor + point - f);
          minDist = min(minDist, dist);
        }
      }
      return minDist;
    }

    void main() {
      vec2 uv = (vUv - 0.5) * 8.0;

      // Distance from center for falloff
      float centerDist = length(vUv - 0.5) * 2.0;
      float falloff = 1.0 - smoothstep(0.1, 0.7, centerDist);

      // Chromatic caustics: offset UV per channel
      float r = voronoi(uv + vec2(0.02, 0.01));
      float g = voronoi(uv);
      float b = voronoi(uv - vec2(0.02, 0.01));

      // Edge detection for caustic lines
      float causticR = smoothstep(0.08, 0.0, r);
      float causticG = smoothstep(0.08, 0.0, g);
      float causticB = smoothstep(0.08, 0.0, b);

      vec3 caustic = vec3(causticR, causticG, causticB) * 0.4;

      // Mix brand colors into caustics
      vec3 col = caustic * mix(uBlue, uOrange, causticR * 0.8);
      col += caustic * 0.3; // white caustic highlights

      float alpha = (causticR + causticG + causticB) * 0.3 * falloff;

      gl_FragColor = vec4(col, alpha * 0.5);
    }
  `
});

const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.0;
scene.add(ground);

// =============================================
// POSTPROCESSING: Bloom + Chromatic Aberration + Vignette + DOF
// =============================================

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// Bloom: conservative threshold, moderate intensity
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.65,   // strength (restrained - Gleb never over-blooms)
  0.4,    // radius
  0.82    // threshold (high = only truly bright things bloom)
);
composer.addPass(bloom);

// Custom CA + Vignette + Film grain pass
const caVignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    uTime: { value: 0 },
    uCAStrength: { value: 0.003 },
    uVignetteStrength: { value: 0.45 },
    uGrainIntensity: { value: 0.03 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uResolution;
    uniform float uTime;
    uniform float uCAStrength;
    uniform float uVignetteStrength;
    uniform float uGrainIntensity;
    varying vec2 vUv;

    // Film grain
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
    }

    void main() {
      vec2 uv = vUv;
      vec2 center = uv - 0.5;
      float dist = length(center);

      // Chromatic aberration: stronger at edges (Gleb signature)
      float caScale = uCAStrength * dist;
      vec2 caOffset = center * caScale;

      float r = texture2D(tDiffuse, uv + caOffset).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - caOffset).b;

      vec3 col = vec3(r, g, b);

      // Vignette
      float vignette = 1.0 - dist * dist * uVignetteStrength;
      col *= vignette;

      // Film grain
      float grain = (hash(uv * uResolution + uTime * 100.0) - 0.5) * uGrainIntensity;
      col += grain;

      gl_FragColor = vec4(col, 1.0);
    }
  `
};

const caPass = new ShaderPass(caVignetteShader);
composer.addPass(caPass);

// Simple DOF pass (circle of confusion based on depth)
const dofShader = {
  uniforms: {
    tDiffuse: { value: null },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    uFocusPoint: { value: 0.5 },
    uBokehStrength: { value: 2.5 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uResolution;
    uniform float uFocusPoint;
    uniform float uBokehStrength;
    varying vec2 vUv;

    void main() {
      vec2 uv = vUv;
      vec2 center = uv - 0.5;
      float dist = length(center);

      // Depth layers: foreground blur, mid sharp, background atmospheric
      // Focus is at center, blur increases at edges
      float blur = smoothstep(0.0, 0.5, abs(dist - 0.15)) * uBokehStrength;

      vec2 texel = 1.0 / uResolution;
      vec4 col = vec4(0.0);
      float total = 0.0;

      // 9-sample box blur weighted by CoC
      for (float x = -1.0; x <= 1.0; x += 1.0) {
        for (float y = -1.0; y <= 1.0; y += 1.0) {
          vec2 offset = vec2(x, y) * texel * blur;
          col += texture2D(tDiffuse, uv + offset);
          total += 1.0;
        }
      }

      gl_FragColor = col / total;
    }
  `
};

const dofPass = new ShaderPass(dofShader);
composer.addPass(dofPass);

composer.addPass(new OutputPass());

// =============================================
// ANIMATION LOOP
// =============================================

// Prime float frequencies (from definitive synthesis: 120s repeat cycle)
const FLOAT_FREQS = [0.55, 0.38, 0.22];
const FLOAT_AMPS  = [0.12, 0.08, 0.05];

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // === Outer hexagon: slow prime float + gentle rotation ===
  outerHex.rotation.y = t * 0.08;
  outerHex.rotation.x = Math.sin(t * 0.05) * 0.05;
  outerHex.position.y =
    Math.sin(t * FLOAT_FREQS[0]) * FLOAT_AMPS[0] +
    Math.sin(t * FLOAT_FREQS[1]) * FLOAT_AMPS[1] +
    Math.sin(t * FLOAT_FREQS[2]) * FLOAT_AMPS[2];

  // === Inner hexagon: counter-rotate slightly ===
  innerHex.rotation.y = -t * 0.12;
  innerHex.rotation.x = Math.sin(t * 0.07 + 1.0) * 0.06;
  innerHex.position.y = outerHex.position.y; // float together

  // === Blue core: pulse emissive intensity ===
  const pulse = 2.5 + Math.sin(t * 0.8) * 1.0 + Math.sin(t * 1.3) * 0.5;
  blueCoreMat.emissiveIntensity = pulse;
  blueCore.scale.setScalar(0.95 + Math.sin(t * 0.6) * 0.05);
  blueCore.position.y = outerHex.position.y;

  // === Orange ring: rotate, pulse ===
  orangeRing.rotation.z = t * 0.25;
  orangeRing.rotation.x = Math.PI / 2 + Math.sin(t * 0.3) * 0.1;
  const orangePulse = 3.0 + Math.sin(t * 1.1 + 0.5) * 1.5;
  orangeRingMat.emissiveIntensity = orangePulse;
  orangeRing.position.y = outerHex.position.y;

  // === Wisps: orbit inside the glass ===
  wisps.forEach((wisp, i) => {
    const a = wisp.userData.angle + t * wisp.userData.speed;
    const r = wisp.userData.radius + Math.sin(t * 0.5 + wisp.userData.phase) * 0.1;
    wisp.position.x = Math.cos(a) * r;
    wisp.position.z = Math.sin(a) * r;
    wisp.position.y = outerHex.position.y + wisp.userData.yOffset +
      Math.sin(t * 0.7 + wisp.userData.phase) * 0.1;

    // Pulse individual wisps
    const wispPulse = 3.0 + Math.sin(t * 2.0 + wisp.userData.phase) * 2.0;
    wisp.material.emissiveIntensity = wispPulse;
    wisp.material.opacity = 0.4 + Math.sin(t * 1.5 + wisp.userData.phase) * 0.4;
  });

  // === Update shader uniforms ===
  particleMat.uniforms.uTime.value = t;
  groundMat.uniforms.uTime.value = t;
  caPass.uniforms.uTime.value = t;

  // === Spring camera (subtle breathing) ===
  camera.position.x = 0.3 + Math.sin(t * 0.1) * 0.08;
  camera.position.y = -0.15 + Math.cos(t * 0.08) * 0.05;
  camera.lookAt(0.05, outerHex.position.y + 0.1, 0);

  composer.render();
}

animate();

// =============================================
// RESIZE HANDLER
// =============================================

window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloom.setSize(w, h);
  caPass.uniforms.uResolution.value.set(w, h);
  dofPass.uniforms.uResolution.value.set(w, h);
});

</script>
</body>
</html>
