<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER Night 20 — Fusion Capstone</title>
<style>
  :root { --navy: #080a12; --blue: #2a93c1; --orange: #f1420b; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--navy); }
  canvas { display: block; width: 100%; height: 100%; }
  #info {
    position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.5);
    font: 11px/1.4 'SF Mono', monospace; pointer-events: none; z-index: 10;
  }
  #info h3 { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="info">
  <h3>Night 20 / Variation 3</h3>
  Fusion Capstone: Multi-Film + Dipole SSS + God Rays<br>
  All Night 18-20 techniques combined<br>
  Pearlescent translucent glass brain
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) document.body.innerHTML = '<p style="color:white;padding:2em">WebGL2 required</p>';

function resize() {
  const dpr = Math.min(devicePixelRatio, 2);
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

const vs = `#version 300 es
in vec2 p;
void main(){ gl_Position = vec4(p, 0, 1); }`;

const fs = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2 uRes;
uniform float uTime;
uniform vec2 uMouse;

#define PI 3.14159265
#define TAU 6.28318530

// --- Noise ---
float hash(vec3 p) {
  p = fract(p * vec3(443.8975, 397.2973, 491.1871));
  p += dot(p, p.yzx + 19.19);
  return fract((p.x + p.y) * p.z);
}

float noise3(vec3 p) {
  vec3 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(mix(hash(i), hash(i+vec3(1,0,0)), f.x),
                 mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
             mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x),
                 mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
}

float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise3(p);
    p *= 2.1;
    a *= 0.5;
  }
  return v;
}

// --- SDF ---
float scene(vec3 p) {
  float angle = uTime * 0.2;
  mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
  p.xz *= rot;

  float brain = length(p) - 1.2;
  // Sulci and gyri via fbm displacement
  brain += fbm(p * 3.0 + uTime * 0.03) * 0.15;
  // Fissure
  brain -= smoothstep(0.0, 0.05, abs(p.x)) * 0.03;

  return brain;
}

vec3 getNormal(vec3 p) {
  vec2 e = vec2(0.001, 0);
  return normalize(vec3(
    scene(p+e.xyy)-scene(p-e.xyy),
    scene(p+e.yxy)-scene(p-e.yxy),
    scene(p+e.yyx)-scene(p-e.yyx)
  ));
}

float estimateThickness(vec3 p, vec3 n) {
  float t = 0.01;
  for (int i = 0; i < 20; i++) {
    if (scene(p - n*t) > 0.0) return t;
    t += 0.05 + t * 0.08;
  }
  return t;
}

// --- Multi-Layer Thin Film (from Var 1) ---
vec2 fresnelAmp(float n1, float n2, float ct) {
  float st2 = (n1/n2)*(n1/n2)*(1.0-ct*ct);
  if (st2 > 1.0) return vec2(1.0, 0.0);
  float ct2 = sqrt(1.0-st2);
  return vec2((n1*ct-n2*ct2)/(n1*ct+n2*ct2), 2.0*n1*ct/(n1*ct+n2*ct2));
}

vec3 wavelengthRGB(float wl) {
  float r=0.,g=0.,b=0.;
  if(wl<440.){r=-(wl-440.)/60.;b=1.;}
  else if(wl<490.){g=(wl-440.)/50.;b=1.;}
  else if(wl<510.){g=1.;b=-(wl-510.)/20.;}
  else if(wl<580.){r=(wl-510.)/70.;g=1.;}
  else if(wl<645.){r=1.;g=-(wl-645.)/65.;}
  else{r=1.;}
  float f=1.;
  if(wl<420.)f=0.3+0.7*(wl-380.)/40.;
  else if(wl>700.)f=0.3+0.7*(780.-wl)/80.;
  return vec3(r,g,b)*f;
}

vec3 multiFilmColor(float cosT, float thickScale) {
  float n0=1.0, n1=1.38, n2=1.55, n3=1.72, nS=1.52;
  float d1=(100.+30.*sin(uTime*0.7))*thickScale;
  float d2=(220.+70.*sin(uTime*0.5+1.))*thickScale;
  float d3=(160.+50.*sin(uTime*0.9+2.))*thickScale;

  vec3 c=vec3(0.);
  for(int i=0;i<16;i++){
    float wl=380.+400.*float(i)/16.;
    // Simplified 3-layer recursive
    float phi3=TAU*2.*n3*d3*cosT/wl;
    float r34=fresnelAmp(n3,nS,cosT).x;
    float r23=fresnelAmp(n2,n3,cosT).x;
    float ar=r34*cos(phi3),ai=-r34*sin(phi3);
    float nR=r23+ar,nI=ai,dR=1.+r23*ar,dI=r23*ai;
    float dm=dR*dR+dI*dI;
    float s3r=(nR*dR+nI*dI)/dm,s3i=(nI*dR-nR*dI)/dm;

    float phi2=TAU*2.*n2*d2*cosT/wl;
    float r12=fresnelAmp(n1,n2,cosT).x;
    float a2r=s3r*cos(phi2)+s3i*sin(phi2),a2i=-s3r*sin(phi2)+s3i*cos(phi2);
    float n2R=r12+a2r,n2I=a2i,d2R=1.+r12*a2r,d2I=r12*a2i;
    float d2m=d2R*d2R+d2I*d2I;
    float s2r=(n2R*d2R+n2I*d2I)/d2m,s2i=(n2I*d2R-n2R*d2I)/d2m;

    float phi1=TAU*2.*n1*d1*cosT/wl;
    float r01=fresnelAmp(n0,n1,cosT).x;
    float a1r=s2r*cos(phi1)+s2i*sin(phi1),a1i=-s2r*sin(phi1)+s2i*cos(phi1);
    float n1R=r01+a1r,n1I=a1i,d1R=1.+r01*a1r,d1I=r01*a1i;
    float d1m=d1R*d1R+d1I*d1I;
    float fr=(n1R*d1R+n1I*d1I)/d1m,fi=(n1I*d1R-n1R*d1I)/d1m;
    float R=fr*fr+fi*fi;
    c+=wavelengthRGB(wl)*R;
  }
  return c/16.*4.;
}

// --- BSSRDF Dipole (from Var 2) ---
vec3 dipoleSSS(float thickness, vec3 sigma_a, vec3 sigma_s) {
  vec3 sigma_t = sigma_a + sigma_s;
  vec3 alpha = sigma_s / sigma_t;
  vec3 sigma_tr = sqrt(3.0*sigma_a*sigma_t);
  vec3 z_r = 1.0 / sigma_t;
  vec3 D = 1.0/(3.0*sigma_t);
  float eta=1.3;
  float Fdr=-1.440/(eta*eta)+0.710/eta+0.668+0.0636*eta;
  float A=(1.0+Fdr)/(1.0-Fdr);
  vec3 z_v=z_r+4.0*A*D;
  vec3 d_r=sqrt(vec3(thickness*thickness)+z_r*z_r);
  vec3 d_v=sqrt(vec3(thickness*thickness)+z_v*z_v);
  vec3 t1=z_r*(sigma_tr*d_r+1.)*exp(-sigma_tr*d_r)/(d_r*d_r*d_r);
  vec3 t2=z_v*(sigma_tr*d_v+1.)*exp(-sigma_tr*d_v)/(d_v*d_v*d_v);
  return alpha/(4.0*PI)*(t1+t2);
}

// --- Volumetric God Rays (from Night 18) ---
float volumetricRays(vec3 ro, vec3 rd, vec3 lightPos, float maxT) {
  float acc = 0.0;
  float stepSize = maxT / 20.0;
  for (int i = 0; i < 20; i++) {
    vec3 p = ro + rd * stepSize * float(i);
    vec3 toLight = lightPos - p;
    float dist = length(toLight);

    // Shadow test
    float shadow = 1.0;
    vec3 srd = toLight / dist;
    float st = 0.1;
    for (int j = 0; j < 12; j++) {
      if (scene(p + srd*st) < 0.01) { shadow = 0.2; break; }
      st += 0.15;
      if (st > dist) break;
    }

    // Henyey-Greenstein phase (g=0.6 forward scatter)
    float cosA = dot(normalize(rd), normalize(toLight));
    float g = 0.6;
    float phase = (1.0-g*g) / (4.0*PI*pow(1.0+g*g-2.0*g*cosA, 1.5));

    // Density: slight exponential falloff from center
    float density = exp(-length(p) * 0.3) * 0.15;

    acc += density * phase * shadow / (dist*dist + 1.0) * stepSize;
  }
  return acc;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*uRes) / min(uRes.x, uRes.y);
  vec2 mouse = (uMouse - 0.5*uRes) / min(uRes.x, uRes.y);

  vec3 ro = vec3(0, 0, 3.8);
  vec3 rd = normalize(vec3(uv, -1.5));

  float mx=mouse.x*0.5, my=mouse.y*0.3;
  mat2 rY=mat2(cos(mx),-sin(mx),sin(mx),cos(mx));
  mat2 rX=mat2(cos(my),-sin(my),sin(my),cos(my));
  ro.xz*=rY; rd.xz*=rY;
  ro.yz*=rX; rd.yz*=rX;

  // Light position (orbiting)
  vec3 lightPos = vec3(sin(uTime*0.3)*3.0, 2.0, cos(uTime*0.3)*3.0);

  float t=0.;
  bool hit=false;
  for(int i=0;i<120;i++){
    vec3 p=ro+rd*t;
    float d=scene(p);
    if(d<0.001){hit=true;break;}
    if(t>20.)break;
    t+=d;
  }

  vec3 col = vec3(0.015, 0.025, 0.05);

  // Volumetric god rays (always, even if no surface hit)
  float rays = volumetricRays(ro, rd, lightPos, hit ? t : 6.0);
  vec3 rayColor = mix(vec3(0.165,0.576,0.757), vec3(0.945,0.259,0.043), 0.3+0.2*sin(uTime*0.5));
  col += rayColor * rays * 15.0;

  if (hit) {
    vec3 p = ro + rd * t;
    vec3 n = getNormal(p);
    float cosT = abs(dot(n, -rd));
    vec3 lightDir = normalize(lightPos - p);

    // 1. Multi-layer thin film (pearlescent surface)
    float thickVar = 0.8 + 0.4*(0.5+0.5*fbm(p*4.0+uTime*0.1));
    vec3 filmColor = multiFilmColor(cosT, thickVar);

    // 2. BSSRDF dipole SSS (internal scattering)
    float thickness = estimateThickness(p, n);
    vec3 sigma_a = vec3(0.04, 0.06, 0.12);
    vec3 sigma_s = vec3(1.0, 0.85, 0.5);
    vec3 sss = dipoleSSS(thickness, sigma_a, sigma_s);

    // Back-lighting translucency
    vec3 dL = lightDir + n*0.3;
    float backLight = pow(clamp(dot(-rd, normalize(dL)),0.,1.),3.);
    vec3 transmission = exp(-thickness*sigma_a*2.);
    sss += transmission * backLight * 1.5;

    // Heartbeat pulse
    float pulse = 0.7 + 0.3*pow(sin(uTime*1.2),2.);
    sss *= pulse;

    // 3. Composite: film on surface, SSS underneath
    float fresnel = pow(1.0-cosT, 3.5);

    // Specular
    vec3 h = normalize(lightDir - rd);
    float spec = pow(max(dot(n,h),0.),96.);

    // Rim glow
    float rim = pow(1.0-cosT, 5.0);
    vec3 rimCol = mix(vec3(0.165,0.576,0.757), vec3(0.945,0.259,0.043), 0.5+0.5*sin(uTime*0.6));

    // Layer composition:
    // Deep: SSS (internal glow)
    // Mid: glass base
    // Surface: thin film iridescence (view-dependent)
    // Top: specular + rim

    vec3 deep = sss * 0.6;
    vec3 surface = filmColor * (0.3 + 0.7*fresnel);
    vec3 highlight = vec3(1.0)*spec*0.4 + rimCol*rim*0.5;

    // Thin area glow
    float thinGlow = exp(-thickness*3.0);
    vec3 internalGlow = mix(vec3(0.945,0.259,0.043), vec3(0.165,0.576,0.757), smoothstep(0.1,0.6,thickness));

    col += deep + surface + highlight + internalGlow*thinGlow*0.4*pulse;

    // Diffuse modulation
    float diff = max(dot(n, lightDir), 0.0);
    col *= 0.6 + 0.4*diff;
  }

  // Vignette
  vec2 vUv = gl_FragCoord.xy/uRes;
  col *= 1.0 - 0.35*length(vUv - 0.5);

  // Tone map
  col = col/(1.0+col);
  col = pow(col, vec3(0.85));

  fragColor = vec4(col, 1.0);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error('Link error:', gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'uRes');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uMouse = gl.getUniformLocation(prog, 'uMouse');

let mouseX = canvas.width/2, mouseY = canvas.height/2;
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX * devicePixelRatio;
  mouseY = (canvas.clientHeight - e.clientY) * devicePixelRatio;
});

function frame(t) {
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t * 0.001);
  gl.uniform2f(uMouse, mouseX, mouseY);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
