<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER Night 21 — SDF Photon Mapping</title>
<style>
  :root { --navy: #080a12; --blue: #2a93c1; --orange: #f1420b; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--navy); }
  canvas { display: block; width: 100%; height: 100%; }
  #info {
    position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.5);
    font: 11px/1.4 'SF Mono', monospace; pointer-events: none; z-index: 10;
  }
  #info h3 { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="info">
  <h3>Night 21 / Prototype 1</h3>
  SDF Photon Mapping: Light Transport via Ray Marching<br>
  Caustic accumulation on ground plane<br>
  Orbiting light source with dynamic caustics
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) document.body.innerHTML = '<p style="color:white;padding:2em">WebGL2 required</p>';

function resize() {
  const dpr = Math.min(devicePixelRatio, 2);
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

/* ---- Mouse ---- */
let mx = 0.5, my = 0.5;
canvas.addEventListener('mousemove', e => {
  mx = e.clientX / canvas.clientWidth;
  my = e.clientY / canvas.clientHeight;
});

const vs = `#version 300 es
in vec2 p;
void main(){ gl_Position = vec4(p, 0, 1); }`;

const fs = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2 uRes;
uniform float uTime;
uniform vec2 uMouse;

#define PI 3.14159265
#define TAU 6.28318530
#define MAX_STEPS 120
#define MAX_DIST 30.0
#define SURF_DIST 0.001
#define PHOTON_STEPS 48
#define PHOTON_BOUNCES 3

// --- Noise ---
float hash(vec3 p) {
  p = fract(p * vec3(443.8975, 397.2973, 491.1871));
  p += dot(p, p.yzx + 19.19);
  return fract((p.x + p.y) * p.z);
}

float noise3(vec3 p) {
  vec3 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  float a = hash(i), b = hash(i+vec3(1,0,0));
  float c = hash(i+vec3(0,1,0)), d = hash(i+vec3(1,1,0));
  float e = hash(i+vec3(0,0,1)), f2 = hash(i+vec3(1,0,1));
  float g = hash(i+vec3(0,1,1)), h = hash(i+vec3(1,1,1));
  return mix(mix(mix(a,b,f.x),mix(c,d,f.x),f.y),
             mix(mix(e,f2,f.x),mix(g,h,f.x),f.y), f.z);
}

float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  mat3 rot = mat3(0.8,-0.6,0, 0.6,0.8,0, 0,0,1);
  for(int i = 0; i < 5; i++) {
    v += a * noise3(p);
    p = rot * p * 2.1;
    a *= 0.45;
  }
  return v;
}

// --- SDF Brain Shape ---
float sdBrain(vec3 p) {
  float sphere = length(p) - 1.2;
  // Organic brain displacement
  float disp = fbm(p * 2.5 + uTime * 0.05) * 0.25;
  // Sulci (brain grooves) via sin waves
  float sulci = sin(p.x * 8.0 + p.y * 3.0) * sin(p.y * 7.0 + p.z * 4.0) * 0.04;
  return sphere + disp - 0.15 + sulci;
}

float sdGround(vec3 p) {
  return p.y + 2.2;
}

// Scene SDF (returns: x=dist, y=material_id)
vec2 scene(vec3 p) {
  float brain = sdBrain(p);
  float ground = sdGround(p);
  if (brain < ground) return vec2(brain, 1.0);
  return vec2(ground, 2.0);
}

float sceneDist(vec3 p) {
  return scene(p).x;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.001, 0);
  return normalize(vec3(
    sceneDist(p+e.xyy) - sceneDist(p-e.xyy),
    sceneDist(p+e.yxy) - sceneDist(p-e.yxy),
    sceneDist(p+e.yyx) - sceneDist(p-e.yyx)
  ));
}

// --- Photon Tracing ---
// Trace photons from light through glass brain, accumulate on ground
// Returns caustic intensity at a ground point

// Refraction helper
vec3 refractRay(vec3 I, vec3 N, float eta) {
  float cosi = dot(-I, N);
  float k = 1.0 - eta*eta*(1.0 - cosi*cosi);
  if (k < 0.0) return reflect(I, N); // TIR
  return eta*I + (eta*cosi - sqrt(k))*N;
}

// Simplified photon gather: for a given ground point, trace backwards to see
// if refracted light paths converge there (reverse caustic estimation)
float gatherCaustics(vec3 groundP, vec3 lightPos) {
  float caustic = 0.0;

  // Sample multiple photon directions from light
  for (int i = 0; i < 24; i++) {
    // Generate photon direction toward brain area
    float fi = float(i);
    float phi = fi * 2.399 + uTime * 0.3; // golden angle spiral
    float cosTheta = 1.0 - (fi + 0.5) / 24.0 * 0.6; // cone toward center
    float sinTheta = sqrt(1.0 - cosTheta*cosTheta);

    vec3 dir = normalize(vec3(
      sinTheta * cos(phi),
      -cosTheta, // downward cone
      sinTheta * sin(phi)
    ));

    // Adjust direction toward brain center
    dir = normalize(mix(dir, normalize(-lightPos), 0.6));

    vec3 ro = lightPos;
    vec3 rd = dir;

    // March photon to brain surface
    float t = 0.0;
    bool hitBrain = false;
    for (int s = 0; s < 64; s++) {
      vec3 p = ro + rd * t;
      float d = sdBrain(p);
      if (d < 0.002) {
        hitBrain = true;
        // Refract through brain
        vec3 n = calcNormal(p);
        float ior = 1.45;
        vec3 refracted = refractRay(rd, n, 1.0/ior);

        // March through interior
        vec3 innerRo = p + refracted * 0.02;
        float it = 0.0;
        for (int j = 0; j < 32; j++) {
          vec3 ip = innerRo + refracted * it;
          float id = -sdBrain(ip); // inside = negative
          if (id < 0.002) {
            // Exit point - refract again
            vec3 exitN = -calcNormal(ip);
            vec3 exitRay = refractRay(refracted, exitN, ior);

            // Project to ground
            float groundDist = -(ip.y + 2.2) / exitRay.y;
            if (groundDist > 0.0 && exitRay.y < 0.0) {
              vec3 hitGround = ip + exitRay * groundDist;
              // Accumulate if close to our sample point
              float dist = length(hitGround.xz - groundP.xz);
              caustic += exp(-dist * dist * 8.0) * 0.15;
            }
            break;
          }
          it += max(id, 0.01);
          if (it > 4.0) break;
        }
        break;
      }
      t += max(d, 0.005);
      if (t > 15.0) break;
    }
  }

  return caustic;
}

// --- Ray March Scene ---
vec2 rayMarch(vec3 ro, vec3 rd) {
  float t = 0.0;
  for (int i = 0; i < MAX_STEPS; i++) {
    vec3 p = ro + rd * t;
    vec2 d = scene(p);
    if (d.x < SURF_DIST) return vec2(t, d.y);
    t += d.x * 0.7; // conservative stepping
    if (t > MAX_DIST) break;
  }
  return vec2(-1.0, 0.0);
}

// --- Glass Shading ---
vec3 shadeGlass(vec3 p, vec3 rd, vec3 n, vec3 lightPos) {
  vec3 lightDir = normalize(lightPos - p);
  float ior = 1.45;

  // Fresnel (Schlick)
  float cosI = max(dot(n, -rd), 0.0);
  float f0 = pow((1.0 - ior) / (1.0 + ior), 2.0);
  float fresnel = f0 + (1.0 - f0) * pow(1.0 - cosI, 5.0);

  // Refraction color (chromatic dispersion)
  vec3 refracted = refractRay(rd, n, 1.0/ior);

  // Interior color via absorption
  float thickness = 0.8 + fbm(p * 3.0) * 0.4;
  vec3 absorption = exp(-vec3(0.3, 0.1, 0.05) * thickness * 2.0);

  // Specular highlight
  vec3 h = normalize(lightDir - rd);
  float spec = pow(max(dot(n, h), 0.0), 128.0);

  // Rim light
  float rim = pow(1.0 - cosI, 3.0);

  // Environment reflection (fake sky)
  vec3 refl = reflect(rd, n);
  vec3 envColor = mix(vec3(0.02, 0.05, 0.1), vec3(0.1, 0.2, 0.4), refl.y * 0.5 + 0.5);

  // Subsurface glow
  float sss = max(dot(lightDir, -n), 0.0) * 0.3;
  vec3 sssColor = vec3(0.165, 0.576, 0.757) * sss; // PureBrain blue

  // Combine
  vec3 glassColor = absorption * vec3(0.6, 0.85, 1.0);
  vec3 color = mix(glassColor + sssColor, envColor, fresnel);
  color += spec * vec3(1.0, 0.98, 0.95) * 2.0;
  color += rim * vec3(0.165, 0.576, 0.757) * 0.4;

  return color;
}

// --- Main ---
void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - uRes) / min(uRes.x, uRes.y);

  // Camera
  float camDist = 5.5;
  float camAngleY = uMouse.x * PI * 0.5 - PI * 0.25;
  float camAngleX = uMouse.y * 0.5 - 0.1;
  vec3 ro = vec3(
    sin(camAngleY) * cos(camAngleX) * camDist,
    sin(camAngleX) * camDist + 0.5,
    cos(camAngleY) * cos(camAngleX) * camDist
  );
  vec3 target = vec3(0, -0.2, 0);
  vec3 fwd = normalize(target - ro);
  vec3 right = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up = cross(right, fwd);
  float fov = 0.8;
  vec3 rd = normalize(fwd + (uv.x * right + uv.y * up) * fov);

  // Orbiting light
  float lightAngle = uTime * 0.5;
  vec3 lightPos = vec3(sin(lightAngle) * 3.0, 3.5, cos(lightAngle) * 3.0);

  // March
  vec2 hit = rayMarch(ro, rd);

  vec3 color = vec3(0.01, 0.012, 0.02); // dark bg

  if (hit.x > 0.0) {
    vec3 p = ro + rd * hit.x;
    vec3 n = calcNormal(p);

    if (hit.y < 1.5) {
      // Brain (glass)
      color = shadeGlass(p, rd, n, lightPos);
    } else {
      // Ground plane
      vec3 lightDir = normalize(lightPos - p);
      float diff = max(dot(n, lightDir), 0.0);
      float shadow = 1.0;

      // Shadow ray
      float st = 0.05;
      for (int i = 0; i < 48; i++) {
        float sd = sdBrain(p + lightDir * st);
        if (sd < 0.001) { shadow = 0.0; break; }
        shadow = min(shadow, 12.0 * sd / st);
        st += sd;
        if (st > 10.0) break;
      }

      // Caustics on ground!
      float caustics = gatherCaustics(p, lightPos);

      // Ground material
      float checker = smoothstep(0.48, 0.52, fract(p.x * 0.5)) *
                       smoothstep(0.48, 0.52, fract(p.z * 0.5));
      vec3 groundColor = mix(vec3(0.02), vec3(0.035), checker);

      // Apply lighting + caustics
      color = groundColor * (diff * shadow * 0.3 + 0.02);

      // Caustic color: blue-white concentrated light
      vec3 causticColor = mix(
        vec3(0.165, 0.576, 0.757), // PureBrain blue
        vec3(1.0, 0.95, 0.9),      // warm white
        caustics * 2.0
      );
      color += causticColor * caustics * 3.0;

      // Orange accent caustic from secondary angle
      float caustics2 = gatherCaustics(p, lightPos + vec3(1.0, 0.0, 0.5));
      color += vec3(0.945, 0.259, 0.043) * caustics2 * 1.5; // PureBrain orange
    }
  }

  // Volumetric light shaft (god ray approximation)
  float godRay = 0.0;
  {
    vec3 rayP = ro;
    float stepSize = min(hit.x > 0.0 ? hit.x : MAX_DIST, 12.0) / 32.0;
    for (int i = 0; i < 32; i++) {
      vec3 sp = ro + rd * (float(i) * stepSize);
      vec3 toLight = lightPos - sp;
      float distToLight = length(toLight);
      vec3 lightD = toLight / distToLight;

      // Check if point is in light shaft
      float brainDist = sdBrain(sp);
      float shaft = exp(-distToLight * 0.15) * 0.003;

      // Light visibility (not blocked by brain)
      float vis = smoothstep(0.0, 0.3, brainDist);
      godRay += shaft * vis;
    }
  }
  color += vec3(0.2, 0.3, 0.5) * godRay;

  // Bloom on bright areas
  float lum = dot(color, vec3(0.299, 0.587, 0.114));
  color += max(color - 0.8, 0.0) * 0.5;

  // Vignette
  vec2 vUv = gl_FragCoord.xy / uRes;
  float vig = 1.0 - dot(vUv - 0.5, vUv - 0.5) * 1.2;
  color *= vig;

  // Tone mapping (ACES)
  color = (color * (2.51 * color + 0.03)) / (color * (2.43 * color + 0.59) + 0.14);

  // Gamma
  color = pow(clamp(color, 0.0, 1.0), vec3(1.0/2.2));

  fragColor = vec4(color, 1.0);
}`;

/* ---- Compile ---- */
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vShader = compileShader(vs, gl.VERTEX_SHADER);
const fShader = compileShader(fs, gl.FRAGMENT_SHADER);
const prog = gl.createProgram();
gl.attachShader(prog, vShader);
gl.attachShader(prog, fShader);
gl.linkProgram(prog);

if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
}

gl.useProgram(prog);

/* ---- Full-screen quad ---- */
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'uRes');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uMouseLoc = gl.getUniformLocation(prog, 'uMouse');

const t0 = performance.now();
function frame() {
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, (performance.now() - t0) * 0.001);
  gl.uniform2f(uMouseLoc, mx, my);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
window.addEventListener('resize', resize);
frame();
</script>
</body>
</html>
