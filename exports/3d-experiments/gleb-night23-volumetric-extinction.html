<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER Night 23 — Volumetric Glass Extinction</title>
<style>
  :root { --navy: #080a12; --blue: #2a93c1; --orange: #f1420b; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--navy); }
  canvas { display: block; width: 100%; height: 100%; }
  #info {
    position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.5);
    font: 11px/1.4 'SF Mono', monospace; pointer-events: none; z-index: 10;
  }
  #info h3 { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 4px; }
  #fps { position: fixed; top: 16px; right: 16px; color: rgba(255,255,255,0.4);
    font: 11px 'SF Mono', monospace; z-index: 10; }
</style>
</head>
<body>
<div id="info">
  <h3>Night 23 / Exercise 2</h3>
  Volumetric Glass Extinction<br>
  Beer-Lambert absorption + per-channel sigma<br>
  Inspired by Shadertoy "Glass Gyroid Orb" technique
</div>
<div id="fps">--</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) document.body.innerHTML = '<p style="color:white;padding:2em">WebGL2 required</p>';

function resize() {
  const dpr = Math.min(devicePixelRatio, 2.0);
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

let mx = 0.5, my = 0.5;
canvas.addEventListener('mousemove', e => {
  mx = e.clientX / canvas.clientWidth;
  my = e.clientY / canvas.clientHeight;
});

const vs = `#version 300 es
in vec2 p;
void main(){ gl_Position = vec4(p, 0, 1); }`;

const fs = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2 uRes;
uniform float uTime;
uniform vec2 uMouse;

#define PI 3.14159265
#define MAX_STEPS 100
#define SURF_DIST 0.0015

// Beer-Lambert extinction coefficients (per channel, per unit distance)
// Blue-dominant absorption = warm amber tint at depth (Gleb signature)
const vec3 SIGMA_A = vec3(0.8, 0.4, 0.15); // absorption: red > green > blue
const vec3 SIGMA_S = vec3(0.05, 0.08, 0.12); // scattering: blue > green > red

float hash(vec3 p) {
  p = fract(p * vec3(443.897, 397.297, 491.187));
  p += dot(p, p.yzx + 19.19);
  return fract((p.x + p.y) * p.z);
}

float noise3(vec3 p) {
  vec3 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  float a = hash(i), b = hash(i+vec3(1,0,0));
  float c = hash(i+vec3(0,1,0)), d = hash(i+vec3(1,1,0));
  float e = hash(i+vec3(0,0,1)), f2 = hash(i+vec3(1,0,1));
  float g = hash(i+vec3(0,1,1)), h = hash(i+vec3(1,1,1));
  return mix(mix(mix(a,b,f.x),mix(c,d,f.x),f.y),
             mix(mix(e,f2,f.x),mix(g,h,f.x),f.y), f.z);
}

float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  for(int i = 0; i < 4; i++) { v += a * noise3(p); p *= 2.1; a *= 0.5; }
  return v;
}

// Brain with gyroid internal structure (inspired by Glass Gyroid Orb)
float gyroid(vec3 p, float scale) {
  p *= scale;
  return dot(sin(p), cos(p.yzx)) / scale;
}

float brainSDF(vec3 p) {
  float sphere = length(p) - 1.3;
  float folds = fbm(p * 2.2 + uTime * 0.04) * 0.12;
  return sphere + folds;
}

// Internal gyroid structure for volumetric sampling
float internalStructure(vec3 p) {
  float g1 = gyroid(p, 4.0);
  float g2 = gyroid(p + vec3(1.7), 7.0) * 0.5;
  float pulse = sin(uTime * 1.5 + length(p) * 3.0) * 0.02;
  return abs(g1 + g2 * 0.3) - 0.08 + pulse;
}

vec3 brainNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    brainSDF(p+e.xyy) - brainSDF(p-e.xyy),
    brainSDF(p+e.yxy) - brainSDF(p-e.yxy),
    brainSDF(p+e.yyx) - brainSDF(p-e.yyx)
  ));
}

float march(vec3 ro, vec3 rd, out float t) {
  t = 0.0;
  for(int i = 0; i < MAX_STEPS; i++) {
    float d = brainSDF(ro + rd * t);
    if(d < SURF_DIST) return d;
    t += d * 0.8;
    if(t > 15.0) break;
  }
  return 1e5;
}

// Volumetric extinction march through glass interior
// Beer-Lambert: transmittance = exp(-sigma_a * distance)
// In-scattering: integral of sigma_s * phase * light along path
vec3 volumetricExtinction(vec3 entryPos, vec3 dir, float ior, vec3 lightPos) {
  vec3 accumulated = vec3(0.0);
  vec3 transmittance = vec3(1.0);
  float stepSize = 0.04;
  vec3 pos = entryPos;

  for(int i = 0; i < 60; i++) {
    pos += dir * stepSize;

    // Check if we've exited the brain
    if(brainSDF(pos) > 0.0) break;

    // Beer-Lambert extinction per step
    vec3 extinction = exp(-SIGMA_A * stepSize);
    transmittance *= extinction;

    // In-scattering from light
    vec3 toLight = normalize(lightPos - pos);
    float lightDist = length(lightPos - pos);

    // Shadow test: march toward light from interior point
    float shadowOcclusion = 1.0;
    float shadowT = 0.0;
    for(int s = 0; s < 16; s++) {
      vec3 sp = pos + toLight * shadowT;
      float sd = brainSDF(sp);
      if(sd > 0.05) { break; } // exited brain = light reaches this point
      shadowT += max(abs(sd), 0.02);
      if(shadowT > 4.0) { shadowOcclusion = 0.0; break; }
    }

    // Internal gyroid structure creates density variation
    float density = 1.0 + smoothstep(0.1, 0.0, abs(internalStructure(pos))) * 3.0;

    // Henyey-Greenstein phase function (forward scattering dominant)
    float cosTheta = dot(dir, toLight);
    float g = 0.7; // strong forward scattering
    float phase = (1.0 - g*g) / (4.0 * PI * pow(1.0 + g*g - 2.0*g*cosTheta, 1.5));

    // In-scattered light contribution
    vec3 lightColor = vec3(1.0, 0.95, 0.9) / (lightDist * lightDist * 0.1 + 1.0);
    vec3 scatter = SIGMA_S * density * phase * lightColor * shadowOcclusion * stepSize;

    accumulated += transmittance * scatter;

    // Early termination if transmittance is negligible
    if(max(transmittance.r, max(transmittance.g, transmittance.b)) < 0.01) break;
  }

  return vec3(accumulated.r, accumulated.g, accumulated.b);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
  vec3 ro = vec3(0.0, 0.3, 4.8);
  vec3 rd = normalize(vec3(uv, -1.8));

  float ca = (uMouse.x - 0.5) * 0.4;
  float sa = sin(ca), csa = cos(ca);
  rd.xz = mat2(csa, -sa, sa, csa) * rd.xz;
  ro.xz = mat2(csa, -sa, sa, csa) * ro.xz;

  // Two lights: primary (orbiting) + secondary (fixed warm)
  float lt = uTime * 0.35;
  vec3 light1 = vec3(cos(lt)*3.5, 2.0, sin(lt)*3.5);
  vec3 light2 = vec3(-2.0, 1.5, -1.0);

  vec3 col = vec3(0.0);

  float t;
  float d = march(ro, rd, t);

  if(d < SURF_DIST * 2.0) {
    vec3 pos = ro + rd * t;
    vec3 n = brainNormal(pos);
    float ior = 1.50;

    // Fresnel (Schlick)
    float f0 = pow((ior - 1.0) / (ior + 1.0), 2.0);
    float fresnel = f0 + (1.0 - f0) * pow(1.0 - max(dot(-rd, n), 0.0), 5.0);

    // Reflection
    vec3 reflDir = reflect(rd, n);
    float reflY = reflDir.y * 0.5 + 0.5;
    vec3 reflCol = mix(vec3(0.02, 0.04, 0.08), vec3(0.08, 0.12, 0.2), reflY);

    // Specular highlights from both lights
    vec3 spec = vec3(0.0);
    for(int l = 0; l < 2; l++) {
      vec3 lp = l == 0 ? light1 : light2;
      vec3 lDir = normalize(lp - pos);
      vec3 h = normalize(lDir - rd);
      float s = pow(max(dot(n, h), 0.0), 256.0);
      spec += vec3(1.0, 0.97, 0.92) * s * (l == 0 ? 1.5 : 0.5);
    }

    // === VOLUMETRIC EXTINCTION: the key new technique ===
    vec3 refr = refract(rd, n, 1.0 / ior);
    if(length(refr) < 0.001) refr = reflect(rd, n);

    vec3 volColor1 = volumetricExtinction(pos + refr * 0.01, refr, ior, light1);
    vec3 volColor2 = volumetricExtinction(pos + refr * 0.01, refr, ior, light2);
    vec3 volColor = volColor1 + volColor2 * 0.6;

    // Find exit point for transmitted environment light
    float exitT = 0.0;
    vec3 exitPos = pos;
    for(int i = 0; i < 40; i++) {
      exitPos = pos + refr * exitT;
      float ed = -brainSDF(exitPos);
      if(ed < SURF_DIST) break;
      exitT += max(ed, 0.01) * 0.7;
      if(exitT > 4.0) break;
    }

    // Transmittance through the full thickness
    vec3 fullTransmittance = exp(-SIGMA_A * exitT);

    // Exit refraction for environment
    vec3 exitN = -brainNormal(exitPos);
    vec3 exitRay = refract(refr, exitN, ior);
    if(length(exitRay) < 0.001) exitRay = reflect(refr, exitN);

    float envY = exitRay.y * 0.5 + 0.5;
    vec3 envCol = mix(vec3(0.01, 0.02, 0.04), vec3(0.04, 0.07, 0.12), envY);
    vec3 transmittedEnv = envCol * fullTransmittance;

    // Rim light
    float rim = pow(1.0 - max(dot(-rd, n), 0.0), 3.5);
    vec3 rimCol = mix(vec3(0.165, 0.576, 0.757), vec3(0.945, 0.259, 0.043),
                      sin(uTime * 0.3) * 0.5 + 0.5) * rim * 0.5;

    // Combine: fresnel blend + volumetric interior + transmitted env
    col = reflCol * fresnel
        + (volColor + transmittedEnv) * (1.0 - fresnel)
        + spec
        + rimCol;
  }

  // Ground
  float groundY = -2.0;
  if(rd.y < -0.01) {
    float gt = (groundY - ro.y) / rd.y;
    if(gt > 0.0 && (d > SURF_DIST * 2.0 || gt < t)) {
      vec3 gp = ro + rd * gt;
      float falloff = exp(-length(gp.xz) * 0.12);
      vec3 groundCol = vec3(0.008, 0.012, 0.02) * falloff;

      // Soft caustic glow
      float caustDist = length(gp.xz - vec2(cos(lt)*0.5, sin(lt)*0.5));
      float caustic = exp(-caustDist * 1.5) * 0.3;
      vec3 caustCol = mix(vec3(0.165, 0.576, 0.757), vec3(0.945, 0.259, 0.043), 0.3) * caustic * falloff;

      col = d > SURF_DIST * 2.0 ? groundCol + caustCol : col;
    }
  }

  // Atmospheric glow
  if(d > SURF_DIST * 2.0) {
    float closestT = 0.0;
    float minD = 1e5;
    for(int i = 0; i < 30; i++) {
      vec3 sp = ro + rd * closestT;
      float sd = abs(brainSDF(sp));
      minD = min(minD, sd);
      closestT += max(sd, 0.06);
      if(closestT > 10.0) break;
    }
    float glow = exp(-minD * 2.5) * 0.1;
    col += vec3(0.165, 0.576, 0.757) * glow;
  }

  // Tone mapping
  col = col / (col + 0.7);
  col = pow(col, vec3(0.4545));
  float vign = 1.0 - 0.25 * length((gl_FragCoord.xy / uRes - 0.5) * 1.3);
  col *= vign;

  fragColor = vec4(col, 1.0);
}`;

function compile(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'uRes');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uMouse = gl.getUniformLocation(prog, 'uMouse');

let frames = 0, lastFps = performance.now();
const fpsEl = document.getElementById('fps');

function render(time) {
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, time * 0.001);
  gl.uniform2f(uMouse, mx, my);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  frames++;
  if(time - lastFps > 1000) {
    fpsEl.textContent = Math.round(frames * 1000 / (time - lastFps)) + ' fps';
    frames = 0;
    lastFps = time;
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
