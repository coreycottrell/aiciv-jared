<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Night 25: Interactive Glass Hero Element - Production Ready</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080a12; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
#fps { position: fixed; top: 16px; right: 16px; color: rgba(42,147,193,0.5); font-size: 11px; z-index: 50; }

/* Overlay UI - this is the production hero section */
.hero-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 10; pointer-events: none;
}
.hero-title {
  font-size: clamp(2rem, 5vw, 4.5rem); font-weight: 300; color: white;
  letter-spacing: 0.08em; text-transform: uppercase;
  opacity: 0; animation: fadeUp 1.2s ease-out 0.5s forwards;
  text-shadow: 0 0 40px rgba(42,147,193,0.3);
}
.hero-title span.blue { color: #2a93c1; }
.hero-title span.orange { color: #f1420b; }
.hero-subtitle {
  font-size: clamp(0.85rem, 1.5vw, 1.1rem); color: rgba(255,255,255,0.5);
  letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px;
  opacity: 0; animation: fadeUp 1.2s ease-out 0.9s forwards;
}
.hero-cta {
  margin-top: 40px; padding: 14px 48px; border: 1px solid rgba(42,147,193,0.4);
  color: rgba(255,255,255,0.8); font-size: 0.85rem; letter-spacing: 0.15em;
  text-transform: uppercase; background: rgba(42,147,193,0.08);
  cursor: pointer; pointer-events: all; transition: all 0.4s ease;
  opacity: 0; animation: fadeUp 1.2s ease-out 1.3s forwards;
  backdrop-filter: blur(4px); border-radius: 2px;
}
.hero-cta:hover {
  background: rgba(42,147,193,0.2); border-color: rgba(42,147,193,0.7);
  color: white; box-shadow: 0 0 30px rgba(42,147,193,0.15);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div id="fps">-- fps</div>
<canvas id="c"></canvas>

<!-- Production hero overlay -->
<div class="hero-overlay">
  <div class="hero-title">PURE<span class="blue">BR</span><span class="orange">AI</span><span class="blue">N</span>.ai</div>
  <div class="hero-subtitle">Awaken Your AI Partner Today</div>
  <button class="hero-cta">Explore the Future</button>
</div>

<script>
// Night 25 Exercise 2: Production Glass Hero Element
// Features:
// - Orbiting glass orbs with thin-film iridescence
// - Central energy nexus with pulse
// - Mouse-reactive parallax and orb attraction
// - Smooth 60fps performance target
// - Particle field with depth
// - Bloom via additive blending technique
// - Designed to sit behind text overlay (hero section usage)

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { document.body.innerHTML = '<h1 style="color:#fff;padding:2em">WebGL2 required</h1>'; }

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 1.5);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

let mx = 0.0, my = 0.0, tmx = 0.0, tmy = 0.0;
document.addEventListener('mousemove', e => {
  tmx = (e.clientX / window.innerWidth) * 2.0 - 1.0;
  tmy = (e.clientY / window.innerHeight) * 2.0 - 1.0;
});
document.addEventListener('touchmove', e => {
  tmx = (e.touches[0].clientX / window.innerWidth) * 2.0 - 1.0;
  tmy = (e.touches[0].clientY / window.innerHeight) * 2.0 - 1.0;
}, { passive: true });

const vs = `#version 300 es
in vec2 a;
void main(){gl_Position=vec4(a,0,1);}`;

const fs = `#version 300 es
precision highp float;
out vec4 O;
uniform float t;
uniform vec2 r;
uniform vec2 mouse;

#define PI 3.14159265
#define TAU 6.28318530

// ========== NOISE ==========
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }

float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}

// ========== SDF HELPERS ==========
float sdSphere(vec3 p, float r) { return length(p) - r; }
float sdTorus(vec3 p, float R, float r) { vec2 q = vec2(length(p.xz)-R, p.y); return length(q)-r; }

// ========== THIN-FILM IRIDESCENCE ==========
vec3 thinFilm(float cosTheta, float thickness) {
  vec3 col = vec3(0.0);
  for (int i = 0; i < 5; i++) {
    float lam = 0.40 + 0.075 * float(i); // 400-700nm in 5 steps
    float n1 = 1.38;
    float cosT = sqrt(max(0.0, 1.0 - (1.0/n1)*(1.0/n1)*(1.0-cosTheta*cosTheta)));
    float delta = TAU * n1 * thickness * cosT / lam;
    float r01 = (cosTheta - n1*cosT)/(cosTheta + n1*cosT);
    float refl = 2.0 * r01 * r01 * (1.0 + cos(delta));

    // Spectral to RGB approximation
    vec3 sc;
    float x = (lam - 0.40) / 0.30;
    if (x < 0.25) sc = mix(vec3(0.5,0,1), vec3(0,0.4,1), x*4.0);
    else if (x < 0.5) sc = mix(vec3(0,0.4,1), vec3(0,1,0.3), (x-0.25)*4.0);
    else if (x < 0.75) sc = mix(vec3(0,1,0.3), vec3(1,0.8,0), (x-0.5)*4.0);
    else sc = mix(vec3(1,0.8,0), vec3(1,0.1,0), (x-0.75)*4.0);

    col += sc * refl;
  }
  return col / 5.0;
}

// ========== SCENE: 5 orbiting glass orbs + central nexus ==========
struct Hit { float d; int id; };

Hit scene(vec3 p) {
  // Central nexus sphere
  float nexus = sdSphere(p, 0.35);
  float pulse = 0.35 + 0.05 * sin(t * 2.0);
  nexus = sdSphere(p, pulse);
  Hit h = Hit(nexus, 0);

  // 5 orbiting glass orbs
  for (int i = 0; i < 5; i++) {
    float fi = float(i);
    float ang = fi * TAU / 5.0 + t * (0.2 + fi * 0.05);
    float orbitR = 1.2 + 0.2 * sin(t * 0.3 + fi);
    float orbY = 0.15 * sin(t * 0.5 + fi * 1.2);

    // Mouse attraction: orbs drift toward cursor
    vec2 mouseOffset = mouse * 0.3;
    vec3 orbPos = vec3(
      cos(ang) * orbitR + mouseOffset.x * 0.2,
      orbY - mouseOffset.y * 0.15,
      sin(ang) * orbitR
    );

    float orbSize = 0.18 + 0.04 * sin(t * 0.8 + fi * 2.0);
    float d = sdSphere(p - orbPos, orbSize);
    if (d < h.d) { h.d = d; h.id = i + 1; }
  }

  // Energy rings
  float ring1 = sdTorus(p, 0.8, 0.015);
  float ring2 = sdTorus(vec3(p.x, p.z, p.y), 1.0, 0.01); // rotated
  float rings = min(ring1, ring2);
  if (rings < h.d) { h.d = rings; h.id = 10; }

  return h;
}

float sceneD(vec3 p) { return scene(p).d; }

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.001, 0);
  return normalize(vec3(
    sceneD(p+e.xyy)-sceneD(p-e.xyy),
    sceneD(p+e.yxy)-sceneD(p-e.yxy),
    sceneD(p+e.yyx)-sceneD(p-e.yyx)
  ));
}

// ========== RENDER ==========
void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * r) / r.y;

  // Camera with parallax
  vec3 ro = vec3(mouse.x * 0.5, mouse.y * 0.3 + 0.1, 3.5);
  vec3 ta = vec3(0.0);
  vec3 ww = normalize(ta - ro);
  vec3 uu = normalize(cross(ww, vec3(0,1,0)));
  vec3 vv = cross(uu, ww);
  vec3 rd = normalize(uv.x*uu + uv.y*vv + 2.0*ww);

  // Lights
  vec3 light1 = vec3(2.0, 2.0, 3.0);
  vec3 light2 = vec3(-1.5, -1.0, 2.5);

  // Raymarch
  float totalD = 0.0;
  Hit hit;
  hit.d = 999.0; hit.id = -1;
  bool hitSomething = false;

  for (int i = 0; i < 64; i++) {
    vec3 p = ro + rd * totalD;
    hit = scene(p);
    if (hit.d < 0.001) { hitSomething = true; break; }
    if (totalD > 12.0) break;
    totalD += hit.d;
  }

  vec3 col = vec3(0.0);

  // Background: subtle gradient + particles
  {
    float bgGrad = 0.5 + 0.5 * uv.y;
    col = mix(vec3(0.02, 0.025, 0.04), vec3(0.008, 0.01, 0.018), bgGrad);

    // Particle field (stars/dust)
    for (int i = 0; i < 30; i++) {
      float fi = float(i);
      vec2 pPos = vec2(
        sin(fi*127.1 + t*0.02*(1.0+fract(fi*0.37))) * 0.9,
        cos(fi*311.7 + t*0.015*(1.0+fract(fi*0.53))) * 0.5
      );
      float depth = 0.3 + 0.7 * fract(fi * 0.618);
      pPos += mouse * 0.1 * depth; // parallax
      float pd = length(uv - pPos);
      float pSize = 0.002 / depth;
      float brightness = smoothstep(pSize, pSize * 0.3, pd) * depth * 0.4;

      // Alternate blue and white particles
      vec3 pCol = mix(vec3(1.0), vec3(0.165, 0.576, 0.757), step(0.5, fract(fi*0.618)));
      col += pCol * brightness;
    }
  }

  if (hitSomething) {
    vec3 pos = ro + rd * totalD;
    vec3 N = calcNormal(pos);
    vec3 V = -rd;
    float NdV = max(dot(N, V), 0.001);

    if (hit.id == 0) {
      // Central nexus: emissive glow
      float fresnel = pow(1.0 - NdV, 4.0);
      float pulse = 0.7 + 0.3 * sin(t * 2.0);

      // Core energy color: blue with orange accents
      vec3 coreCol = mix(
        vec3(0.165, 0.576, 0.757) * 2.0,  // PureBrain blue
        vec3(0.945, 0.259, 0.043) * 1.5,   // PureBrain orange
        0.15 + 0.15 * sin(t * 3.0)
      );
      col = coreCol * pulse * (0.5 + fresnel * 1.5);

      // Inner glow bloom
      col += coreCol * 0.3;

    } else if (hit.id >= 1 && hit.id <= 5) {
      // Glass orbs with thin-film iridescence
      vec3 L1 = normalize(light1 - pos);
      vec3 L2 = normalize(light2 - pos);

      // Thin-film (thickness varies per orb)
      float fi = float(hit.id - 1);
      float filmThick = 0.00035 + 0.0001 * sin(t * 0.5 + fi * 1.5);
      vec3 film = thinFilm(NdV, filmThick);

      // Glass refraction
      float ior = 1.45 + fi * 0.02;
      vec3 refracted = refract(rd, N, 1.0/ior);
      // Interior absorption (short path for small orbs)
      vec3 absorption = exp(-vec3(0.4, 0.6, 1.0) * 0.3);

      // Fresnel
      float fresnel = pow(1.0 - NdV, 5.0);
      fresnel = mix(0.04, 1.0, fresnel);

      // Specular
      vec3 H1 = normalize(L1 + V);
      vec3 H2 = normalize(L2 + V);
      float spec = pow(max(dot(N, H1), 0.0), 128.0) + pow(max(dot(N, H2), 0.0), 128.0) * 0.5;

      // Combine
      vec3 orbCol = film * fresnel * 0.8 + absorption * (1.0 - fresnel) * 0.3;
      orbCol += spec * vec3(1.0, 0.97, 0.94) * 0.8;

      // Rim glow (brand blue)
      float rim = pow(1.0 - NdV, 3.5);
      orbCol += rim * vec3(0.165, 0.576, 0.757) * 0.6;

      col = orbCol;

    } else if (hit.id == 10) {
      // Energy rings: glowing
      float pulse = 0.6 + 0.4 * sin(t * 1.5 + pos.x * 4.0);
      vec3 ringCol = mix(
        vec3(0.165, 0.576, 0.757),
        vec3(0.945, 0.259, 0.043),
        0.3 + 0.2 * sin(pos.z * 8.0 + t)
      );
      col = ringCol * pulse * 1.5;
    }

    // Depth fade (fog)
    float fog = 1.0 - exp(-totalD * 0.08);
    col = mix(col, vec3(0.01, 0.015, 0.025), fog);
  }

  // === BLOOM PASS (screen-space approximation) ===
  // We approximate bloom by re-sampling bright areas with gaussian spread
  // This is a single-pass approximation suitable for production
  {
    vec3 bloom = vec3(0.0);
    float bloomSamples = 8.0;
    for (int i = 0; i < 8; i++) {
      float ang = float(i) * TAU / bloomSamples;
      float dist = 0.015;
      vec2 offset = vec2(cos(ang), sin(ang)) * dist;
      // Approximate: bright areas near center contribute glow
      float nd = length(uv + offset);
      float centralGlow = exp(-nd * nd * 3.0);
      float pulse = 0.7 + 0.3 * sin(t * 2.0);
      bloom += vec3(0.165, 0.576, 0.757) * centralGlow * pulse * 0.02;
    }
    col += bloom;
  }

  // Connection lines between nexus and orbs (energy tendrils)
  {
    for (int i = 0; i < 5; i++) {
      float fi = float(i);
      float ang = fi * TAU / 5.0 + t * (0.2 + fi * 0.05);
      float orbitR = 1.2 + 0.2 * sin(t * 0.3 + fi);
      vec2 orbScreen = vec2(cos(ang), sin(ang) * 0.3) * orbitR * 0.25;

      // Line from center to orb (in screen space)
      vec2 toOrb = orbScreen - vec2(0.0);
      float lineLen = length(toOrb);
      vec2 lineDir = toOrb / lineLen;

      // Project uv onto line
      float proj = dot(uv, lineDir);
      float perp = abs(dot(uv, vec2(-lineDir.y, lineDir.x)));

      if (proj > 0.0 && proj < lineLen) {
        float lineIntensity = exp(-perp * 300.0) * 0.15;
        // Pulse along line
        float pulseAlongLine = sin(proj * 20.0 - t * 4.0) * 0.5 + 0.5;
        col += vec3(0.165, 0.576, 0.757) * lineIntensity * pulseAlongLine;
      }
    }
  }

  // Vignette
  vec2 vuv = gl_FragCoord.xy / r;
  float vig = 1.0 - 0.5 * pow(length(vuv - 0.5) * 1.5, 2.0);
  col *= vig;

  // Tone mapping
  col = col * (2.51 * col + 0.03) / (col * (2.43 * col + 0.59) + 0.14);

  // Subtle grain
  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + t) * 43758.5453) * 0.015;
  col += grain - 0.0075;

  col = clamp(col, 0.0, 1.0);
  O = vec4(col, 1.0);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
const vShader = createShader(gl.VERTEX_SHADER, vs);
const fShader = createShader(gl.FRAGMENT_SHADER, fs);
gl.attachShader(prog, vShader);
gl.attachShader(prog, fShader);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aLoc = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

const uT = gl.getUniformLocation(prog, 't');
const uR = gl.getUniformLocation(prog, 'r');
const uM = gl.getUniformLocation(prog, 'mouse');

let frames = 0, lastFps = performance.now();
const fpsEl = document.getElementById('fps');

function render(time) {
  // Smooth mouse interpolation
  mx += (tmx - mx) * 0.05;
  my += (tmy - my) * 0.05;

  gl.uniform1f(uT, time * 0.001);
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform2f(uM, mx, my);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  frames++;
  if (time - lastFps > 1000) {
    fpsEl.textContent = Math.round(frames * 1000 / (time - lastFps)) + ' fps';
    frames = 0;
    lastFps = time;
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
