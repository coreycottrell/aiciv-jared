<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 27 Ex.3: Differential Caustic Splatting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080a12; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .info { position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.5); font: 12px/1.4 monospace; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<div class="info">Night 27 — Differential Caustic Splatting<br>Anisotropic photon splats + glass normal-driven caustic patterns + spectral decomposition</div>
<canvas id="c"></canvas>
<script>
// Night 27 Exercise 3: Differential Photon Splatting for Caustics
// Approximates differential photon splatting using screen-space anisotropic
// Gaussian splats driven by glass surface normals. Each "photon" landing on
// the ground is stretched based on the refraction differential, creating
// physically-motivated caustic shapes instead of noise-based approximations.
// Pure WebGL2, no dependencies.

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL2 required</p>'; throw ''; }

function resize() {
    const dpr = Math.min(devicePixelRatio, 1.5);
    canvas.width = innerWidth * dpr | 0;
    canvas.height = innerHeight * dpr | 0;
    gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
addEventListener('resize', resize);

let mx = 0.5, my = 0.5;
addEventListener('mousemove', e => { mx = e.clientX / innerWidth; my = e.clientY / innerHeight; });

const vs = `#version 300 es
in vec2 p;
out vec2 uv;
void main() { uv = p * 0.5 + 0.5; gl_Position = vec4(p, 0, 1); }`;

const fs = `#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float t;
uniform vec2 mouse;
uniform vec2 res;

#define PI 3.14159265
#define PHOTON_COUNT 24
#define SPLAT_SAMPLES 6

vec3 hash3(vec3 p) {
    p = vec3(dot(p,vec3(127.1,311.7,74.7)), dot(p,vec3(269.5,183.3,246.1)), dot(p,vec3(113.5,271.9,124.6)));
    return fract(sin(p) * 43758.5453);
}

float noise3D(vec3 p) {
    vec3 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(mix(mix(dot(hash3(i),f), dot(hash3(i+vec3(1,0,0)),f-vec3(1,0,0)), f.x),
                   mix(dot(hash3(i+vec3(0,1,0)),f-vec3(0,1,0)), dot(hash3(i+vec3(1,1,0)),f-vec3(1,1,0)), f.x), f.y),
               mix(mix(dot(hash3(i+vec3(0,0,1)),f-vec3(0,0,1)), dot(hash3(i+vec3(1,0,1)),f-vec3(1,0,1)), f.x),
                   mix(dot(hash3(i+vec3(0,1,1)),f-vec3(0,1,1)), dot(hash3(i+vec3(1,1,1)),f-vec3(1,1,1)), f.x), f.y), f.z) * 0.5 + 0.5;
}

// Sphere SDF + normal
float sdSphere(vec3 p, vec3 c, float r) { return length(p - c) - r; }

vec3 sphereNormal(vec3 p, vec3 c) { return normalize(p - c); }

// Snell's law refraction with dispersion
vec3 refractRay(vec3 I, vec3 N, float eta) {
    float cosi = dot(-I, N);
    float sin2t = eta * eta * (1.0 - cosi * cosi);
    if (sin2t > 1.0) return reflect(I, N);
    return eta * I + (eta * cosi - sqrt(1.0 - sin2t)) * N;
}

// Compute where a refracted ray hits the ground plane
// Returns (hit_pos.xz, anisotropy_x, anisotropy_z)
vec4 photonLanding(vec3 sphereCenter, float sphereR, vec3 lightDir, vec2 photonOffset, float ior) {
    // Entry point on sphere surface
    vec3 entry = sphereCenter + normalize(vec3(photonOffset.x, 1.0, photonOffset.y)) * sphereR;
    vec3 N = sphereNormal(entry, sphereCenter);

    // Refract into glass
    vec3 refracted = refractRay(lightDir, N, 1.0 / ior);

    // Travel through sphere
    float chord = 2.0 * sphereR * max(dot(-refracted, N), 0.0);
    vec3 exitPoint = entry + refracted * max(chord, 0.1);

    // Exit refraction
    vec3 exitN = sphereNormal(exitPoint, sphereCenter);
    vec3 exitRay = refractRay(refracted, -exitN, ior);

    // Hit ground plane at y = -1.5
    float groundY = -1.5;
    if (exitRay.y >= 0.0) return vec4(0, 0, 0, -1);
    float tGround = (groundY - exitPoint.y) / exitRay.y;
    vec3 groundPos = exitPoint + exitRay * tGround;

    // Compute anisotropy from refraction differentials
    // Wider refraction angle = more stretched splat
    float aniso = length(exitRay.xz) / max(abs(exitRay.y), 0.01);

    return vec4(groundPos.xz, aniso, 1.0);
}

// Anisotropic Gaussian splat
float gaussianSplat(vec2 p, vec2 center, float sigmaX, float sigmaZ, float angle) {
    float ca = cos(angle), sa = sin(angle);
    vec2 d = p - center;
    vec2 rotated = vec2(ca * d.x + sa * d.y, -sa * d.x + ca * d.y);
    return exp(-0.5 * (rotated.x * rotated.x / (sigmaX * sigmaX) + rotated.y * rotated.y / (sigmaZ * sigmaZ)));
}

void main() {
    vec2 p = (gl_FragCoord.xy - res * 0.5) / min(res.x, res.y) * 2.0;

    // Camera
    float camAngle = t * 0.15 + (mouse.x - 0.5) * 1.0;
    float camY = 1.2 + (mouse.y - 0.5) * 1.0;
    vec3 ro = vec3(sin(camAngle) * 4.5, camY, cos(camAngle) * 4.5);
    vec3 target = vec3(0, -0.5, 0);
    vec3 fwd = normalize(target - ro);
    vec3 right = normalize(cross(fwd, vec3(0,1,0)));
    vec3 up = cross(right, fwd);
    vec3 rd = normalize(fwd + p.x * right + p.y * up);

    // Background
    vec3 col = mix(vec3(0.015, 0.02, 0.05), vec3(0.03, 0.04, 0.08), uv.y);

    // Stars
    float star = pow(noise3D(vec3(gl_FragCoord.xy * 0.008, 0.0)), 18.0);
    col += star * 0.3;

    // Glass sphere
    vec3 sphereCenter = vec3(0, 0.3 + sin(t * 0.4) * 0.15, 0);
    float sphereR = 0.9;

    // Ray-sphere intersection for glass rendering
    vec3 oc = ro - sphereCenter;
    float b = dot(oc, rd);
    float c = dot(oc, oc) - sphereR * sphereR;
    float disc = b * b - c;

    float glassDepth = 20.0;
    if (disc > 0.0) {
        float sqd = sqrt(disc);
        float tNear = -b - sqd;
        if (tNear > 0.0) {
            glassDepth = tNear;
            vec3 hitPos = ro + rd * tNear;
            vec3 nor = sphereNormal(hitPos, sphereCenter);

            float fresnel = pow(1.0 - abs(dot(nor, -rd)), 4.0);

            // Thin-film interference
            float filmThickness = 280.0 + sin(t * 0.5 + atan(nor.z, nor.x) * 3.0) * 40.0;
            float cosTheta = dot(nor, -rd);
            float delta = 2.0 * 1.38 * filmThickness * cosTheta;
            vec3 filmColor = vec3(
                0.5 + 0.5 * cos(2.0 * PI * delta / 0.650),
                0.5 + 0.5 * cos(2.0 * PI * delta / 0.532),
                0.5 + 0.5 * cos(2.0 * PI * delta / 0.473)
            );

            vec3 lightDir = normalize(vec3(0.4, 0.9, 0.3));
            float spec = pow(max(dot(reflect(-lightDir, nor), -rd), 0.0), 80.0);

            vec3 glassCol = filmColor * fresnel * 0.7 + vec3(0.165, 0.576, 0.757) * 0.15 + vec3(1) * spec * 0.5;

            // Interior glow
            float interior = exp(-length(hitPos - sphereCenter) * 2.0);
            glassCol += vec3(0.945, 0.259, 0.043) * interior * 0.2 * (0.7 + 0.3 * sin(t * 1.5));

            col = mix(col, glassCol, 0.6 + fresnel * 0.4);
        }
    }

    // Ground plane with photon-splatted caustics
    float groundY = -1.5;
    if (rd.y < 0.0) {
        float tGround = (groundY - ro.y) / rd.y;
        if (tGround > 0.0 && tGround < glassDepth) {
            vec3 groundPos = ro + rd * tGround;
            vec2 gp = groundPos.xz;

            // Base ground color
            vec3 groundCol = vec3(0.03, 0.035, 0.06);

            // Light direction (animated)
            vec3 lightDir = normalize(vec3(
                sin(t * 0.3) * 0.3 + 0.4,
                0.9,
                cos(t * 0.25) * 0.3 + 0.3
            ));

            // Accumulate photon splats with spectral decomposition
            vec3 causticAccum = vec3(0);

            // 7 wavelengths for spectral caustics
            float wavelengths[7] = float[](0.380, 0.440, 0.490, 0.550, 0.610, 0.660, 0.720);
            vec3 spectralColors[7] = vec3[](
                vec3(0.3, 0.0, 0.6),  // violet
                vec3(0.0, 0.1, 0.8),  // blue
                vec3(0.0, 0.6, 0.6),  // cyan
                vec3(0.0, 0.8, 0.1),  // green
                vec3(0.8, 0.7, 0.0),  // yellow
                vec3(0.9, 0.3, 0.0),  // orange
                vec3(0.8, 0.0, 0.1)   // red
            );

            // Cauchy IOR per wavelength
            float cauchyB = 0.00420;

            for (int w = 0; w < 7; w++) {
                float lambda = wavelengths[w];
                float ior = 1.45 + cauchyB / (lambda * lambda);

                // Cast photons through sphere
                for (int i = 0; i < PHOTON_COUNT; i++) {
                    float angle = float(i) * 2.0 * PI / float(PHOTON_COUNT) + t * 0.1;
                    float radius = 0.3 + float(i % 3) * 0.15;
                    vec2 offset = vec2(cos(angle), sin(angle)) * radius;

                    vec4 landing = photonLanding(sphereCenter, sphereR, lightDir, offset, ior);

                    if (landing.w > 0.0) {
                        // Anisotropic splat based on refraction differential
                        float aniso = landing.z;
                        float splatAngle = atan(landing.y - sphereCenter.z, landing.x - sphereCenter.x);

                        float sigmaX = 0.08 + aniso * 0.04;
                        float sigmaZ = 0.04 + aniso * 0.02;

                        float splat = gaussianSplat(gp, landing.xy, sigmaX, sigmaZ, splatAngle);
                        causticAccum += spectralColors[w] * splat * 0.15;
                    }
                }
            }

            // Cardiac rhythm modulation
            float heartbeat = 0.85 + 0.15 * pow(sin(t * 1.2) * 0.5 + 0.5, 4.0);
            causticAccum *= heartbeat;

            // Distance falloff from sphere projection
            float dist = length(gp - sphereCenter.xz);
            causticAccum *= exp(-dist * 0.5) * 2.0;

            // Ambient ground light
            float ambDiff = max(dot(vec3(0,1,0), lightDir), 0.0) * 0.3 + 0.15;

            col = groundCol * ambDiff + causticAccum;
        }
    }

    // Hex vignette
    float angle = atan(p.y, p.x);
    float hexDist = cos(PI / 6.0) / cos(mod(angle + PI / 6.0, PI / 3.0) - PI / 6.0);
    float iris = smoothstep(1.5, 2.0, length(p) / hexDist);
    col *= 1.0 - iris * 0.6;

    // ACES tonemap
    col = (col * (2.51 * col + 0.03)) / (col * (2.43 * col + 0.59) + 0.14);

    // Film grain
    float grain = (noise3D(vec3(gl_FragCoord.xy * 0.5, t * 50.0)) - 0.5) * 0.03;
    col += grain;

    fragColor = vec4(pow(clamp(col, 0.0, 1.0), vec3(1.0 / 2.2)), 1.0);
}`;

function createShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, createShader(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const mLoc = gl.getUniformLocation(prog, 'mouse');
const rLoc = gl.getUniformLocation(prog, 'res');

let start = performance.now();
function frame() {
    const elapsed = (performance.now() - start) * 0.001;
    gl.uniform1f(tLoc, elapsed);
    gl.uniform2f(mLoc, mx, my);
    gl.uniform2f(rLoc, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
}
frame();
</script>
</body>
