<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 28 Ex.1: Liquid Morphing + Anisotropic Specular</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080a12; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .info { position: fixed; top: 16px; left: 16px; color: rgba(255,255,255,0.5); font: 12px/1.4 monospace; z-index: 10; pointer-events: none; }
  #fps { position: fixed; top: 16px; right: 16px; color: rgba(42,147,193,0.6); font: 11px monospace; z-index: 10; }
</style>
</head>
<body>
<div class="info">Night 28 / Exercise 1<br>Liquid Morphing SDF + Anisotropic Ward Specular<br>Smooth-min blend between organic forms + directional highlights</div>
<div id="fps">--</div>
<canvas id="c"></canvas>
<script>
// Night 28 Exercise 1: Liquid Morphing + Anisotropic Specular
// Techniques practiced:
// 1. Smooth-minimum SDF blending for liquid morphing between shapes
// 2. Ward anisotropic specular model (directional highlight streaks)
// 3. Animated SDF deformation via noise displacement
// 4. Multi-IOR glass with Beer-Lambert absorption
// 5. Ground caustics from morphing geometry

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL2 required</p>'; throw ''; }

let W, H;
function resize() {
    const dpr = Math.min(devicePixelRatio, 1.5);
    W = canvas.width = innerWidth * dpr | 0;
    H = canvas.height = innerHeight * dpr | 0;
    gl.viewport(0, 0, W, H);
}
resize();
addEventListener('resize', resize);

let mx = 0.5, my = 0.5;
addEventListener('mousemove', e => { mx = e.clientX / innerWidth; my = e.clientY / innerHeight; });

const vs = `#version 300 es
in vec2 p;
out vec2 uv;
void main() { uv = p * 0.5 + 0.5; gl_Position = vec4(p, 0, 1); }`;

const fs = `#version 300 es
precision highp float;
in vec2 uv;
out vec4 fragColor;
uniform float t;
uniform vec2 mouse;
uniform vec2 res;

#define PI 3.14159265

// -- Noise --
vec3 hash33(vec3 p3) {
    p3 = fract(p3 * vec3(.1031,.1030,.0973));
    p3 += dot(p3, p3.yxz + 33.33);
    return fract((p3.xxy + p3.yxx) * p3.zyx);
}

float noise3(vec3 p) {
    vec3 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    float a = dot(hash33(i),              f);
    float b = dot(hash33(i+vec3(1,0,0)),  f-vec3(1,0,0));
    float c = dot(hash33(i+vec3(0,1,0)),  f-vec3(0,1,0));
    float d = dot(hash33(i+vec3(1,1,0)),  f-vec3(1,1,0));
    float e = dot(hash33(i+vec3(0,0,1)),  f-vec3(0,0,1));
    float f2= dot(hash33(i+vec3(1,0,1)),  f-vec3(1,0,1));
    float g = dot(hash33(i+vec3(0,1,1)),  f-vec3(0,1,1));
    float h = dot(hash33(i+vec3(1,1,1)),  f-vec3(1,1,1));
    return mix(mix(mix(a,b,f.x),mix(c,d,f.x),f.y),
               mix(mix(e,f2,f.x),mix(g,h,f.x),f.y), f.z) * 0.5 + 0.5;
}

float fbm(vec3 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 4; i++) { v += a * noise3(p); p *= 2.1; a *= 0.5; }
    return v;
}

// -- SDFs --
float sdSphere(vec3 p, float r) { return length(p) - r; }

float sdTorus(vec3 p, vec2 t2) {
    vec2 q = vec2(length(p.xz) - t2.x, p.y);
    return length(q) - t2.y;
}

// Smooth-minimum for liquid blending
float smin(float a, float b, float k) {
    float h = max(k - abs(a-b), 0.0) / k;
    return min(a, b) - h*h*h*k*(1.0/6.0);
}

// Animated liquid form: morphs between sphere, torus, and brain-like form
float liquidSDF(vec3 p) {
    // Phase determines morphing
    float phase = t * 0.25;
    float morph1 = sin(phase) * 0.5 + 0.5;          // sphere <-> torus
    float morph2 = sin(phase * 0.7 + 1.5) * 0.5 + 0.5; // smooth <-> organic

    // Base forms
    float sphere = sdSphere(p, 0.9);
    float torus = sdTorus(p, vec2(0.7, 0.35));

    // Smooth blend between sphere and torus
    float base = smin(sphere * (1.0 - morph1) + torus * morph1,
                      sdSphere(p - vec3(0, sin(t*0.5)*0.2, 0), 0.6),
                      0.4 + 0.2 * sin(t * 0.3));

    // Organic deformation: noise displacement
    float noiseDisp = fbm(p * 3.0 + t * 0.15) * 0.12 * morph2;
    // Surface ripple (liquid surface tension waves)
    float ripple = sin(length(p.xz) * 8.0 - t * 3.0) * 0.02 * (1.0 - morph2 * 0.5);

    return base + noiseDisp + ripple;
}

vec3 calcNormal(vec3 p) {
    vec2 e = vec2(0.001, 0.0);
    return normalize(vec3(
        liquidSDF(p+e.xyy) - liquidSDF(p-e.xyy),
        liquidSDF(p+e.yxy) - liquidSDF(p-e.yxy),
        liquidSDF(p+e.yyx) - liquidSDF(p-e.yyx)
    ));
}

// -- Ward Anisotropic Specular --
// Creates directional highlight streaks (like brushed metal / liquid surface tension)
float wardAnisotropic(vec3 N, vec3 H, vec3 T, vec3 B, float alphaX, float alphaY) {
    float NdH = max(dot(N, H), 0.001);
    float TdH = dot(T, H);
    float BdH = dot(B, H);

    float exponent = -2.0 * ((TdH/alphaX)*(TdH/alphaX) + (BdH/alphaY)*(BdH/alphaY)) / (1.0 + NdH);
    return exp(exponent) / (4.0 * PI * alphaX * alphaY * sqrt(max(NdH, 0.01)));
}

// -- 5-wavelength dispersion --
const float WL[5] = float[5](0.420, 0.490, 0.540, 0.600, 0.670);

float cauchyIOR(float lam) {
    return 1.48 + 0.0052 / (lam * lam);
}

vec3 wl2rgb(float lam) {
    vec3 c;
    if (lam < 0.440)       c = vec3(0.4, 0.0, 1.0);
    else if (lam < 0.490)  c = vec3(0.0, 0.3, 1.0);
    else if (lam < 0.540)  c = vec3(0.0, 1.0, 0.5);
    else if (lam < 0.600)  c = vec3(1.0, 0.9, 0.0);
    else                   c = vec3(1.0, 0.2, 0.0);
    return c;
}

void main() {
    vec2 p = (gl_FragCoord.xy - res * 0.5) / min(res.x, res.y) * 2.0;

    // Camera orbit
    float camAngle = t * 0.12 + (mouse.x - 0.5) * 1.5;
    float camY = 0.6 + (mouse.y - 0.5) * 1.0;
    vec3 ro = vec3(sin(camAngle) * 3.8, camY, cos(camAngle) * 3.8);
    vec3 target = vec3(0, -0.1, 0);
    vec3 fwd = normalize(target - ro);
    vec3 right = normalize(cross(fwd, vec3(0,1,0)));
    vec3 up = cross(right, fwd);
    vec3 rd = normalize(fwd + p.x * right + p.y * up);

    // Lights
    vec3 light1 = vec3(2.0, 2.5, 1.5);
    vec3 light2 = vec3(-1.5, 1.0, -2.0);
    vec3 lightCol1 = vec3(0.165, 0.576, 0.757) * 2.0;  // PureBrain blue
    vec3 lightCol2 = vec3(0.945, 0.259, 0.043) * 1.2;   // PureBrain orange

    vec3 col = vec3(0.0);

    // Raymarch
    float tRay = 0.0;
    float d;
    bool hit = false;
    for (int i = 0; i < 100; i++) {
        d = liquidSDF(ro + rd * tRay);
        if (abs(d) < 0.001) { hit = true; break; }
        if (tRay > 15.0) break;
        tRay += d * 0.75;
    }

    if (hit) {
        vec3 pos = ro + rd * tRay;
        vec3 N = calcNormal(pos);
        vec3 V = normalize(ro - pos);

        // Compute tangent/bitangent for anisotropic specular
        // Tangent follows liquid flow direction (based on noise gradient)
        vec3 T = normalize(cross(N, vec3(0, 1, 0.01)));
        // Rotate tangent by flow field
        float flowAngle = fbm(pos * 2.0 + t * 0.1) * PI * 2.0;
        vec3 B = cross(N, T);
        vec3 T2 = T * cos(flowAngle) + B * sin(flowAngle);
        vec3 B2 = cross(N, T2);

        // == Anisotropic specular from both lights ==
        vec3 L1 = normalize(light1 - pos);
        vec3 L2 = normalize(light2 - pos);
        vec3 H1 = normalize(L1 + V);
        vec3 H2 = normalize(L2 + V);

        // Varying anisotropy: more stretched when liquid is morphing
        float morphPhase = abs(sin(t * 0.25));
        float alphaX = 0.05 + 0.15 * morphPhase;  // along tangent
        float alphaY = 0.15 + 0.05 * morphPhase;  // across tangent

        float spec1 = wardAnisotropic(N, H1, T2, B2, alphaX, alphaY);
        float spec2 = wardAnisotropic(N, H2, T2, B2, alphaX, alphaY);

        vec3 specular = lightCol1 * spec1 * 0.3 + lightCol2 * spec2 * 0.2;

        // == Spectral refraction with Beer-Lambert ==
        vec3 spectralCol = vec3(0.0);
        vec3 absCoeff = vec3(0.4, 0.6, 1.1); // blue absorbs least -> blue core

        for (int w = 0; w < 5; w++) {
            float lam = WL[w];
            float ior = cauchyIOR(lam);

            vec3 refracted = refract(-V, N, 1.0 / ior);
            if (length(refracted) < 0.01) refracted = reflect(-V, N);

            // Interior march
            float intDist = 0.0;
            for (int j = 0; j < 25; j++) {
                vec3 ip = pos - N * 0.005 + refracted * intDist;
                float id = liquidSDF(ip);
                if (id > 0.001) break;
                intDist += max(abs(id), 0.01) * 0.8;
            }

            // Beer-Lambert
            vec3 absorbed = exp(-absCoeff * intDist);
            spectralCol += wl2rgb(lam) * absorbed;
        }
        spectralCol /= 5.0;

        // == Fresnel ==
        float fresnel = pow(1.0 - max(dot(N, V), 0.0), 5.0);
        fresnel = mix(0.04, 1.0, fresnel);

        // == Thin-film iridescence ==
        float filmThick = 0.0003 + 0.0001 * sin(pos.x * 15.0 + pos.y * 10.0 + t);
        vec3 filmCol = vec3(0.0);
        for (int w = 0; w < 5; w++) {
            float lam = WL[w];
            float delta = 2.0 * 1.38 * filmThick * max(dot(N, V), 0.0) / lam;
            float refl = 0.5 + 0.5 * cos(2.0 * PI * delta);
            filmCol += wl2rgb(lam) * refl;
        }
        filmCol /= 5.0;

        // == Rim glow ==
        float rim = pow(1.0 - max(dot(N, V), 0.0), 3.5);
        vec3 rimCol = mix(vec3(0.165, 0.576, 0.757), vec3(0.945, 0.259, 0.043), rim * 0.5) * rim * 0.6;

        // == Combine layers ==
        col = spectralCol * (1.0 - fresnel)
            + filmCol * fresnel * 0.5
            + specular
            + rimCol;

        // Diffuse ambient
        float diff = max(dot(N, L1), 0.0) * 0.15;
        col += vec3(0.03, 0.05, 0.08) * (diff + 0.1);

    } else {
        // Ground plane
        float groundY = -1.6;
        if (rd.y < -0.001) {
            float gt = (groundY - ro.y) / rd.y;
            if (gt > 0.0) {
                vec3 gp = ro + rd * gt;
                float falloff = exp(-length(gp.xz) * 0.25);

                // Animated caustics from morphing geometry
                vec3 caustics = vec3(0.0);
                for (int w = 0; w < 5; w++) {
                    float lam = WL[w];
                    float ior = cauchyIOR(lam);
                    // Caustic pattern: interference from morphing shape
                    float pattern = noise3(vec3(gp.xz * ior * 3.0, t * 0.3 + lam * 5.0));
                    pattern = pow(pattern, 3.0); // sharpen caustics
                    float ring = exp(-abs(length(gp.xz) - ior * 1.2) * 4.0);
                    caustics += wl2rgb(lam) * pattern * ring;
                }
                caustics /= 5.0;

                // Liquid shadow (approximate)
                vec3 toLight = normalize(light1 - gp);
                float shadowRay = 0.0;
                float shadow = 1.0;
                for (int i = 0; i < 30; i++) {
                    vec3 sp = gp + toLight * shadowRay;
                    float sd = liquidSDF(sp);
                    if (sd < 0.005) { shadow = 0.15; break; }
                    shadowRay += sd;
                    if (shadowRay > 5.0) break;
                }

                col = vec3(0.01, 0.015, 0.025) * falloff * shadow
                    + caustics * 1.5 * falloff * shadow;

                // Subtle hex grid on ground
                vec2 hexUV = gp.xz * 2.0;
                float hexGrid = abs(fract(hexUV.x + hexUV.y * 0.577) - 0.5);
                hexGrid = min(hexGrid, abs(fract(hexUV.x - hexUV.y * 0.577) - 0.5));
                hexGrid = min(hexGrid, abs(fract(hexUV.y * 1.155) - 0.5));
                float hexLine = smoothstep(0.02, 0.0, hexGrid - 0.46);
                col += vec3(0.02, 0.04, 0.06) * hexLine * 0.15 * falloff;
            }
        }
    }

    // Volumetric god rays
    {
        vec3 vol = vec3(0.0);
        for (int i = 0; i < 20; i++) {
            float vt = float(i) * 0.35 + 0.2;
            vec3 sp = ro + rd * vt;
            vec3 toL = light1 - sp;
            float lDist = length(toL);
            float cosA = dot(rd, toL / lDist);
            float mie = 0.1 + 0.9 * pow(max(cosA, 0.0), 10.0);
            float brainDist = liquidSDF(sp);
            float shadow2 = smoothstep(0.0, 0.3, brainDist);
            vol += lightCol1 * mie * shadow2 / (lDist * lDist + 1.0) * 0.004;
        }
        col += vol;
    }

    // Atmospheric glow around object
    if (!hit) {
        float closest = 1e5;
        float scanT = 0.0;
        for (int i = 0; i < 40; i++) {
            float sd = abs(liquidSDF(ro + rd * scanT));
            closest = min(closest, sd);
            scanT += max(sd, 0.06);
            if (scanT > 8.0) break;
        }
        float glow = exp(-closest * 3.0) * 0.06;
        col += vec3(0.165, 0.576, 0.757) * glow;
    }

    // Vignette
    vec2 vigUV = gl_FragCoord.xy / res;
    float vig = 1.0 - 0.35 * dot(vigUV - 0.5, vigUV - 0.5) * 2.0;
    col *= vig;

    // ACES tonemap
    col = col * (2.51 * col + 0.03) / (col * (2.43 * col + 0.59) + 0.14);

    // Film grain
    float grain = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + t) * 43758.5453) - 0.5) * 0.02;
    col += grain;

    fragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}`;

function createShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, createShader(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uT = gl.getUniformLocation(prog, 't');
const uMouse = gl.getUniformLocation(prog, 'mouse');
const uRes = gl.getUniformLocation(prog, 'res');

let frames = 0, lastFps = performance.now();
const fpsEl = document.getElementById('fps');
const start = performance.now();

function frame(now) {
    const elapsed = (now - start) * 0.001;
    gl.uniform1f(uT, elapsed);
    gl.uniform2f(uMouse, mx, my);
    gl.uniform2f(uRes, W, H);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    frames++;
    if (now - lastFps > 1000) {
        fpsEl.textContent = Math.round(frames * 1000 / (now - lastFps)) + ' fps';
        frames = 0; lastFps = now;
    }
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
