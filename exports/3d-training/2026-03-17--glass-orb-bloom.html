<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Orb with Bloom — Gleb Training</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #060608; overflow: hidden; }
  canvas { display: block; }
  #label {
    position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.28); pointer-events: none;
  }
  #fps {
    position: fixed; bottom: 20px; right: 20px;
    font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.18);
  }
</style>
</head>
<body>
<div id="label">Gleb Training — Glass Orb with Bloom</div>
<div id="fps">-- fps</div>
<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.autoClear = false;

// ─────────────────────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5.5);

// ─────────────────────────────────────────────────────────────
// SCENES
// ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const bgScene = new THREE.Scene();
const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ─────────────────────────────────────────────────────────────
// BACKGROUND — fBm gradient (ortho, not bloomed)
// ─────────────────────────────────────────────────────────────
const bgVert = `
varying vec2 vUv;
void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
`;
const bgFrag = `
uniform float uTime;
varying vec2 vUv;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p) {
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){v+=a*noise(p);p*=2.1;a*=0.5;}
  return v;
}

void main() {
  vec2 uv = vUv - 0.5;
  float f = fbm(uv * 2.8 + vec2(uTime * 0.04, uTime * 0.03));
  vec3 c1 = vec3(0.015, 0.02, 0.04);   // near black deep blue
  vec3 c2 = vec3(0.025, 0.05, 0.09);   // dark blue
  vec3 c3 = vec3(0.035, 0.065, 0.12);  // slight blue glow
  float d = length(uv * 1.2);
  vec3 col = mix(c3, c2, smoothstep(0.0, 0.5, d));
  col = mix(col, c1, smoothstep(0.2, 0.8, d));
  col += (f - 0.5) * 0.012;
  gl_FragColor = vec4(col, 1.0);
}
`;
const bgMat = new THREE.ShaderMaterial({ vertexShader: bgVert, fragmentShader: bgFrag,
  uniforms: { uTime: { value: 0 } }, depthTest: false, depthWrite: false });
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat));

// ─────────────────────────────────────────────────────────────
// PMREM — Custom probe with PureBrain brand colors
// ─────────────────────────────────────────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

const probeScene = new THREE.Scene();
const probeData = [
  { color: 0xfff4e8, intensity: 3.5, pos: [8, 14, 8] },     // warm white key
  { color: 0x2a93c1, intensity: 2.0, pos: [-10, 4, -6] },    // PureBrain blue fill
  { color: 0xf1420b, intensity: 1.4, pos: [6, -4, -10] },    // orange rim (enters glass from behind)
  { color: 0x4ab8ff, intensity: 0.8, pos: [0, -8, 4] },      // cool bounce
  { color: 0xffffff, intensity: 0.5, pos: [2, 6, -2] },      // neutral specular
];
probeData.forEach(d => {
  const l = new THREE.PointLight(d.color, d.intensity, 50);
  l.position.set(...d.pos);
  probeScene.add(l);
});
const envRT = pmrem.fromScene(probeScene);
scene.environment = envRT.texture;
scene.environmentIntensity = 1.0;

// ─────────────────────────────────────────────────────────────
// GLASS ORB — the centerpiece
// Technique: dual-layer glass (transmission + iridescence)
// 128-segment sphere — MANDATORY for transmission materials
// ─────────────────────────────────────────────────────────────
const glassMat = new THREE.MeshPhysicalMaterial({
  transmission: 1.0,
  thickness: 0.55,
  roughness: 0.03,
  ior: 1.52,
  metalness: 0.0,
  reflectivity: 0.7,
  iridescence: 0.38,         // The biggest single quality upgrade
  iridescenceIOR: 1.72,
  clearcoat: 0.85,
  clearcoatRoughness: 0.04,
  sheen: 0.18,
  sheenRoughness: 0.3,
  sheenColor: new THREE.Color(0x2a93c1),
  color: new THREE.Color(0xaad4ee),
  envMapIntensity: 1.5,
  side: THREE.DoubleSide,
  depthWrite: false,
  transparent: true,
});

const orbGeo = new THREE.SphereGeometry(1.2, 128, 128);
const orb = new THREE.Mesh(orbGeo, glassMat);
scene.add(orb);

// Inner glow shell — gives the orb an interior luminance source
const innerMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.8,
  thickness: 0.2,
  roughness: 0.0,
  ior: 1.35,
  emissive: new THREE.Color(0x2a93c1),
  emissiveIntensity: 0.12,
  color: new THREE.Color(0x88ccff),
  side: THREE.FrontSide,
  depthWrite: false,
  transparent: true,
  opacity: 0.35,
});
const innerOrb = new THREE.Mesh(new THREE.SphereGeometry(0.72, 64, 64), innerMat);
scene.add(innerOrb);

// Orange energy core
const coreMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(0xf1420b),
  emissive: new THREE.Color(0xf1420b),
  emissiveIntensity: 2.8,
  roughness: 0.0,
  metalness: 0.0,
  transparent: true,
  opacity: 0.72,
  depthWrite: false,
});
const core = new THREE.Mesh(new THREE.SphereGeometry(0.18, 32, 32), coreMat);
scene.add(core);

// ─────────────────────────────────────────────────────────────
// AMBIENT PARTICLES — two-layer atmosphere
// Layer 1: slow dust particles (many, tiny)
// Layer 2: fast energy particles (fewer, brighter)
// ─────────────────────────────────────────────────────────────
function makeParticleSystem(count, speedMult, sizeMult, colorHex, orbitR) {
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  const phases = new Float32Array(count);
  const orbitRadii = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    // Distribute on sphere surface + some spread
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = orbitR + (Math.random() - 0.5) * 1.8;
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    velocities[i*3]   = (Math.random() - 0.5) * 0.002 * speedMult;
    velocities[i*3+1] = (Math.random() - 0.5) * 0.002 * speedMult;
    velocities[i*3+2] = (Math.random() - 0.5) * 0.002 * speedMult;
    phases[i] = Math.random() * Math.PI * 2;
    orbitRadii[i] = r;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(colorHex) },
      uSize: { value: sizeMult },
    },
    vertexShader: `
      attribute float aPhase;
      uniform float uTime;
      uniform float uSize;
      varying float vAlpha;
      void main() {
        vAlpha = 0.4 + 0.6 * sin(uTime * 0.8 + aPhase);
        // Slow orbit — each particle rotates around origin
        float angle = uTime * 0.12 + aPhase * 0.4;
        vec3 p = position;
        float r = length(p.xz);
        p.x = r * cos(atan(p.z, p.x) + angle * 0.3);
        p.z = r * sin(atan(position.z, position.x) + angle * 0.3);
        p.y += sin(uTime * 0.45 + aPhase) * 0.015;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = uSize * (280.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float a = (1.0 - d) * (1.0 - d) * vAlpha;
        gl_FragColor = vec4(uColor, a * 0.6);
      }
    `,
  });

  return { points: new THREE.Points(geo, mat), geo, mat };
}

const dust = makeParticleSystem(1400, 0.5, 2.2, 0x4ab8ff, 2.2);
const energy = makeParticleSystem(280, 2.0, 3.8, 0xf1420b, 1.9);
scene.add(dust.points);
scene.add(energy.points);

// Particle emitters store uniforms references
const particleUniforms = [dust.mat.uniforms, energy.mat.uniforms];

// ─────────────────────────────────────────────────────────────
// GLOW HALO — blurred ring around orb (emissive plane)
// ─────────────────────────────────────────────────────────────
const haloCanvas = document.createElement('canvas');
haloCanvas.width = haloCanvas.height = 512;
const hCtx = haloCanvas.getContext('2d');
const hGrd = hCtx.createRadialGradient(256, 256, 8, 256, 256, 256);
hGrd.addColorStop(0.0, 'rgba(42,147,193, 0.22)');
hGrd.addColorStop(0.35, 'rgba(42,147,193, 0.08)');
hGrd.addColorStop(0.65, 'rgba(42,147,193, 0.02)');
hGrd.addColorStop(1.0, 'rgba(0,0,0, 0)');
hCtx.fillStyle = hGrd;
hCtx.fillRect(0, 0, 512, 512);
const haloTex = new THREE.CanvasTexture(haloCanvas);
const haloMat = new THREE.MeshBasicMaterial({
  map: haloTex, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
});
const halo = new THREE.Mesh(new THREE.PlaneGeometry(5.5, 5.5), haloMat);
scene.add(halo);

// ─────────────────────────────────────────────────────────────
// POSTPROCESSING
// Principle: "Bloom confirms, it does not create"
// threshold 0.82 — only brightest pixels bloom
// ─────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.50,   // strength — conservative
  0.28,   // radius
  0.82    // threshold — only emissive core + particles
);
composer.addPass(bloomPass);

// Chromatic aberration + vignette + subtle grain
const caVigShader = {
  uniforms: {
    tDiffuse: { value: null },
    uCA: { value: 1.2 },
    uVig: { value: 0.32 },
    uGrain: { value: 0.018 },
    uTime: { value: 0 },
  },
  vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uCA, uVig, uGrain, uTime;
    varying vec2 vUv;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    void main() {
      vec2 uv = vUv;
      vec2 center = uv - 0.5;
      float dist = length(center);
      vec2 offset = normalize(center) * dist * uCA * 0.008;
      float r = texture2D(tDiffuse, uv + offset * 1.0).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - offset * 1.0).b;
      vec3 col = vec3(r, g, b);
      float vig = 1.0 - pow(dist * 1.42, 2.2) * uVig;
      col *= vig;
      float grain = (hash(uv + vec2(uTime * 0.003)) - 0.5) * uGrain;
      col += grain;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
};
const caPass = new ShaderPass(caVigShader);
composer.addPass(caPass);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────────────────────
// MOUSE PARALLAX
// ─────────────────────────────────────────────────────────────
const mouse = new THREE.Vector2();
const smoothMouse = new THREE.Vector2();
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
});

// ─────────────────────────────────────────────────────────────
// ANIMATION LOOP
// Prime float frequencies — never repeat in 120s
// ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0, lastFpsTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta ? 0.016 : 0.016;

  // FPS counter
  frameCount++;
  if (t - lastFpsTime > 0.5) {
    document.getElementById('fps').textContent = Math.round(frameCount / (t - lastFpsTime)) + ' fps';
    frameCount = 0; lastFpsTime = t;
  }

  // Smooth mouse
  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.04;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.04;

  // Camera — parallax + subtle breath
  camera.position.x = smoothMouse.x * 0.35;
  camera.position.y = smoothMouse.y * 0.25;
  camera.position.z = 5.5 + Math.sin(t * 0.18) * 0.08;
  camera.lookAt(0, 0, 0);

  // Orb breathing — prime frequencies (0.55, 0.38, 0.22 Hz)
  const breathe = 1.0
    + Math.sin(t * 0.55) * 0.014
    + Math.sin(t * 0.38) * 0.009
    + Math.sin(t * 0.22) * 0.005;
  orb.scale.setScalar(breathe);
  innerOrb.scale.setScalar(breathe * 0.98);

  // Orb very slow rotation
  orb.rotation.y = t * 0.08;
  orb.rotation.x = Math.sin(t * 0.12) * 0.04;

  // Core pulse — higher frequency, asynchronous
  const corePulse = 0.18 + 0.04 * Math.sin(t * 2.2);
  core.scale.setScalar(corePulse / 0.18);
  coreMat.emissiveIntensity = 2.8 + 1.2 * Math.sin(t * 2.2 + 0.5);

  // Halo billboards to camera
  halo.quaternion.copy(camera.quaternion);

  // Particles
  particleUniforms.forEach(u => { u.uTime.value = t; });

  // Background
  bgMat.uniforms.uTime.value = t;

  // Postprocessing — dynamic CA (slight idle variation)
  caPass.uniforms.uCA.value = 1.1 + 0.15 * Math.sin(t * 0.4);
  caPass.uniforms.uTime.value = t;

  // Bloom — very subtle breathing with orb
  bloomPass.strength = 0.48 + 0.08 * Math.sin(t * 0.55);

  // Render
  renderer.clear();
  renderer.render(bgScene, bgCamera);
  composer.render();
}

animate();

// ─────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
