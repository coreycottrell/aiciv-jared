<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Glassmorphic UI Card — Gleb Training</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #06080e; overflow: hidden; }
  canvas { display: block; }
  #label {
    position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 11px; letter-spacing: 0.12em; color: rgba(255,255,255,0.18);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="label">Gleb Training — Glassmorphic 3D Card</div>
<div id="hint">Move cursor over card to rotate</div>
<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.autoClear = false;

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6.5);

const scene = new THREE.Scene();
const bgScene = new THREE.Scene();
const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ─────────────────────────────────────────────────────────────
// BACKGROUND — deep dark gradient with subtle color bleed
// ─────────────────────────────────────────────────────────────
const bgFrag = `
  uniform float uTime;
  varying vec2 vUv;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
  float n(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}
  float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*n(p);p*=2.1;a*=.5;}return v;}
  void main() {
    vec2 uv = vUv - .5;
    float d = length(uv);
    float f = fbm(uv*2.+vec2(uTime*.025,uTime*.02));
    // Dark background — subtle blue/purple gradient
    vec3 col = mix(vec3(.024,.032,.06), vec3(.008,.012,.022), smoothstep(.0,.7,d));
    col += vec3(f-.5)*.008;
    // Soft PureBrain blue glow in upper-left (key light spill)
    float kl = exp(-length((uv-.15)*vec2(1.5,1.1))*5.);
    col += vec3(.022,.062,.09) * kl * .5;
    gl_FragColor = vec4(col, 1.);
  }
`;
const bgMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`,
  fragmentShader: bgFrag, uniforms: { uTime: { value: 0 } },
  depthTest: false, depthWrite: false,
});
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat));

// ─────────────────────────────────────────────────────────────
// PMREM ENVIRONMENT
// ─────────────────────────────────────────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const probeS = new THREE.Scene();
[
  { color: 0xfff4e8, intensity: 3.2, pos: [8, 12, 6] },
  { color: 0x2a93c1, intensity: 2.0, pos: [-8, 3, -5] },
  { color: 0xf1420b, intensity: 1.2, pos: [5, -3, -8] },
  { color: 0x7fd7ff, intensity: 0.7, pos: [0, -6, 3] },
].forEach(d => {
  const l = new THREE.PointLight(d.color, d.intensity, 50);
  l.position.set(...d.pos); probeS.add(l);
});
const envRT = pmrem.fromScene(probeS);
scene.environment = envRT.texture;

// ─────────────────────────────────────────────────────────────
// CARD GROUP — rotates with mouse
// ─────────────────────────────────────────────────────────────
const cardGroup = new THREE.Group();
scene.add(cardGroup);

// ─────────────────────────────────────────────────────────────
// CARD GEOMETRY — rounded rectangle via ExtrudeGeometry
// ─────────────────────────────────────────────────────────────
function roundedRectShape(w, h, r) {
  const shape = new THREE.Shape();
  shape.moveTo(-w/2 + r, -h/2);
  shape.lineTo(w/2 - r, -h/2);
  shape.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
  shape.lineTo(w/2, h/2 - r);
  shape.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
  shape.lineTo(-w/2 + r, h/2);
  shape.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
  shape.lineTo(-w/2, -h/2 + r);
  shape.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
  return shape;
}

const cardShape = roundedRectShape(3.6, 2.4, 0.22);
const extrudeSettings = {
  depth: 0.12,
  bevelEnabled: true,
  bevelThickness: 0.02,
  bevelSize: 0.02,
  bevelSegments: 6,
};
const cardGeo = new THREE.ExtrudeGeometry(cardShape, extrudeSettings);
cardGeo.center();

// Card back — dark glass
const cardBackMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.88,
  thickness: 0.18,
  roughness: 0.08,
  ior: 1.45,
  metalness: 0.0,
  color: new THREE.Color(0x0e1520),
  envMapIntensity: 1.2,
  transparent: true,
  depthWrite: false,
  side: THREE.BackSide,
});

// Card front — premium glass (iridescence key)
const cardFrontMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.92,
  thickness: 0.12,
  roughness: 0.05,
  ior: 1.48,
  metalness: 0.0,
  iridescence: 0.28,
  iridescenceIOR: 1.6,
  clearcoat: 1.0,
  clearcoatRoughness: 0.03,
  color: new THREE.Color(0xc8e4f4),
  envMapIntensity: 1.6,
  transparent: true,
  depthWrite: false,
  side: THREE.FrontSide,
});

const cardBack = new THREE.Mesh(cardGeo, cardBackMat);
const cardFront = new THREE.Mesh(cardGeo, cardFrontMat);
cardGroup.add(cardBack);
cardGroup.add(cardFront);

// ─────────────────────────────────────────────────────────────
// CARD CONTENT — CanvasTexture UI (Gleb dashboard aesthetic)
// ─────────────────────────────────────────────────────────────
function makeCardUI() {
  const W = 1024, H = 682;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // Background — transparent (glass card IS the bg)
  ctx.clearRect(0, 0, W, H);

  // Top bar
  ctx.fillStyle = 'rgba(42,147,193, 0.12)';
  roundRect(ctx, 32, 28, W - 64, 52, 8);
  ctx.fill();

  ctx.strokeStyle = 'rgba(42,147,193, 0.25)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 32, 28, W - 64, 52, 8);
  ctx.stroke();

  // Top bar text
  ctx.font = '600 20px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText('PureBrain Intelligence', 58, 60);

  ctx.font = '500 16px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(42,147,193, 0.9)';
  ctx.textAlign = 'right';
  ctx.fillText('ACTIVE', W - 58, 60);
  ctx.textAlign = 'left';

  // Three metric boxes
  const metrics = [
    { label: 'Neural Score', value: '94.2', unit: '%', color: '#2a93c1' },
    { label: 'Sync Rate',    value: '128',  unit: ' ms', color: '#2a93c1' },
    { label: 'Sessions',     value: '6,247', unit: '', color: '#f1420b' },
  ];
  const boxW = (W - 96) / 3 - 12;
  metrics.forEach((m, i) => {
    const x = 32 + i * (boxW + 18);
    const y = 108;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, x, y, boxW, 140, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, boxW, 140, 8);
    ctx.stroke();

    // Label
    ctx.font = '500 13px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(m.label.toUpperCase(), x + 18, y + 30);

    // Value
    ctx.font = '700 38px -apple-system, sans-serif';
    ctx.fillStyle = m.color;
    ctx.fillText(m.value, x + 18, y + 82);

    // Unit
    ctx.font = '500 15px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText(m.unit, x + 18 + ctx.measureText(m.value).width + 4, y + 82);

    // Mini bar chart (6 bars)
    for (let b = 0; b < 6; b++) {
      const bh = 16 + Math.random() * 28;
      const bx = x + 18 + b * 22;
      ctx.fillStyle = m.color + '55';
      roundRect(ctx, bx, y + 140 - bh - 12, 14, bh, 3);
      ctx.fill();
    }
  });

  // Bottom separator line
  ctx.strokeStyle = 'rgba(42,147,193, 0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32, 282); ctx.lineTo(W - 32, 282); ctx.stroke();

  // Activity wave (simplified path)
  ctx.strokeStyle = 'rgba(42,147,193, 0.6)';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(42,147,193,0.4)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  const pts = 80;
  for (let i = 0; i < pts; i++) {
    const px = 32 + (W - 64) * (i / (pts - 1));
    const py = 380 + Math.sin(i * 0.22) * 28 + Math.sin(i * 0.08) * 18
                   + Math.sin(i * 0.55) * 8;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Footer label
  ctx.font = '500 13px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillText('Neural Activity — Last 24h', 32, 420);

  // Status dots
  ['Online', 'Learning', 'Synced'].forEach((s, i) => {
    const dx = 32 + i * 140;
    ctx.beginPath();
    ctx.arc(dx, 470, 5, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? '#2a93c1' : i === 1 ? '#f1420b' : 'rgba(255,255,255,0.3)';
    ctx.fill();
    ctx.font = '500 13px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText(s, dx + 14, 474);
  });

  // PUREBRAIN watermark
  ctx.font = '800 72px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(42,147,193,0.04)';
  ctx.textAlign = 'center';
  ctx.fillText('PUREBRAIN', W / 2, 560);
  ctx.textAlign = 'left';

  return new THREE.CanvasTexture(cv);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const uiTex = makeCardUI();
const uiPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(3.56, 2.37),
  new THREE.MeshBasicMaterial({ map: uiTex, transparent: true, depthWrite: false })
);
uiPlane.position.z = 0.09;
cardGroup.add(uiPlane);

// ─────────────────────────────────────────────────────────────
// DEPTH LAYERS — floating glass shards behind/in front
// ─────────────────────────────────────────────────────────────
function makeGlassShard(w, h, z, opacity, col) {
  const shape = roundedRectShape(w, h, 0.08);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.04, bevelEnabled: false });
  geo.center();
  const mat = new THREE.MeshPhysicalMaterial({
    transmission: 0.9, thickness: 0.06, roughness: 0.06,
    ior: 1.45, color: new THREE.Color(col),
    envMapIntensity: 1.0, transparent: true,
    opacity: opacity, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.z = z;
  return mesh;
}

const shard1 = makeGlassShard(2.8, 0.18, -0.18, 0.55, 0x2a93c1);
shard1.position.y = -1.0;
const shard2 = makeGlassShard(1.2, 0.12, 0.22, 0.45, 0xf1420b);
shard2.position.set(0.8, 1.05, 0.22);
const shard3 = makeGlassShard(3.2, 0.1, -0.25, 0.3, 0x2a93c1);
shard3.position.y = 1.1;
cardGroup.add(shard1, shard2, shard3);

// ─────────────────────────────────────────────────────────────
// FLOATING ORBS — small glass spheres around card
// ─────────────────────────────────────────────────────────────
const orbMat = new THREE.MeshPhysicalMaterial({
  transmission: 1.0, thickness: 0.2, roughness: 0.02,
  ior: 1.52, iridescence: 0.35, iridescenceIOR: 1.6,
  color: new THREE.Color(0x9dd4f0), envMapIntensity: 1.5,
  transparent: true, depthWrite: false,
});

const smallOrbs = [];
[
  { r: 0.22, pos: [-2.2, 1.0, 0.4] },
  { r: 0.15, pos: [2.1, -0.8, 0.5] },
  { r: 0.28, pos: [-1.8, -1.0, -0.3] },
  { r: 0.12, pos: [2.4, 0.6, 0.2] },
].forEach(d => {
  const m = new THREE.Mesh(new THREE.SphereGeometry(d.r, 64, 64), orbMat);
  m.position.set(...d.pos);
  m.userData.basePos = [...d.pos];
  smallOrbs.push(m);
  scene.add(m);
});

// ─────────────────────────────────────────────────────────────
// GLOW BEHIND CARD
// ─────────────────────────────────────────────────────────────
function makeGlow(color, size) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 512;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
  g.addColorStop(0, color);
  g.addColorStop(0.4, color.replace('0.3', '0.06'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 512, 512);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, depthWrite: false, blending: THREE.AdditiveBlending })
  );
  return m;
}
const glow1 = makeGlow('rgba(42,147,193,0.3)', 7);
glow1.position.z = -0.5;
scene.add(glow1);

// ─────────────────────────────────────────────────────────────
// POSTPROCESSING
// ─────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.30, 0.84
);
composer.addPass(bloom);

const caShader = {
  uniforms: {
    tDiffuse: { value: null },
    uCA: { value: 0.9 },
    uVig: { value: 0.28 },
    uTime: { value: 0 },
  },
  vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uCA, uVig, uTime;
    varying vec2 vUv;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    void main(){
      vec2 uv=vUv; vec2 c=uv-.5; float d=length(c);
      vec2 off=normalize(c)*d*uCA*.006;
      float r=texture2D(tDiffuse,uv+off).r;
      float g=texture2D(tDiffuse,uv).g;
      float b=texture2D(tDiffuse,uv-off).b;
      vec3 col=vec3(r,g,b);
      col*=1.-pow(d*1.4,2.2)*uVig;
      col+=(hash(uv+uTime*.001)-.5)*.012;
      gl_FragColor=vec4(col,1.);
    }
  `,
};
const caPass = new ShaderPass(caShader);
composer.addPass(caPass);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────────────────────
// MOUSE HOVER — card rotation spring
// ─────────────────────────────────────────────────────────────
const mouse = new THREE.Vector2();
const smoothMouse = new THREE.Vector2();
let isHovering = false;

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
  // Check if mouse is roughly over card area
  isHovering = Math.abs(mouse.x) < 0.7 && Math.abs(mouse.y) < 0.55;
});

// ─────────────────────────────────────────────────────────────
// ANIMATION
// ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.06;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.06;

  camera.position.x = smoothMouse.x * 0.15;
  camera.position.y = smoothMouse.y * 0.1 + Math.sin(t * 0.14) * 0.04;
  camera.lookAt(0, 0, 0);

  // Card hover rotation — resting idle tilt vs hover tilt
  const hoverStrength = isHovering ? 0.35 : 0.05;
  const targetRotX = -smoothMouse.y * hoverStrength;
  const targetRotY = smoothMouse.x * hoverStrength;
  const idleRotX = Math.sin(t * 0.22) * 0.04;
  const idleRotZ = Math.sin(t * 0.15) * 0.018;

  cardGroup.rotation.x += (targetRotX + idleRotX - cardGroup.rotation.x) * 0.08;
  cardGroup.rotation.y += (targetRotY - cardGroup.rotation.y) * 0.08;
  cardGroup.rotation.z += (idleRotZ - cardGroup.rotation.z) * 0.06;

  // Hover: lift card slightly toward camera
  const targetZ = isHovering ? 0.2 : 0.0;
  cardGroup.position.z += (targetZ - cardGroup.position.z) * 0.07;

  // Small orbs float independently
  smallOrbs.forEach((o, i) => {
    const p = o.userData.basePos;
    o.position.x = p[0] + Math.sin(t * 0.28 + i * 1.2) * 0.08;
    o.position.y = p[1] + Math.sin(t * 0.35 + i * 0.9) * 0.06;
    o.position.z = p[2] + Math.sin(t * 0.22 + i * 1.5) * 0.04;
    o.rotation.y = t * 0.12 + i;
  });

  // Glow breathes
  glow1.quaternion.copy(camera.quaternion);
  const glowScale = 1.0 + 0.06 * Math.sin(t * 0.45);
  glow1.scale.setScalar(glowScale);

  // Shard subtle float
  shard1.position.y = -1.0 + Math.sin(t * 0.3 + 0.5) * 0.03;
  shard2.position.y = 1.05 + Math.sin(t * 0.38) * 0.025;

  // Bloom on hover
  bloom.strength = isHovering ? 0.58 : 0.42;

  bgMat.uniforms.uTime.value = t;
  caPass.uniforms.uTime.value = t;

  renderer.clear();
  renderer.render(bgScene, bgCamera);
  composer.render();
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
