<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variation 1: Volumetric Fog — PureBrain 3D Training</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #040608; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #label {
    position: fixed; top: 24px; left: 24px;
    color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #label strong { color: #2a93c1; }
</style>
</head>
<body>
<div id="label"><strong>Variation 1</strong> — Volumetric Fog with Layered Planes</div>
<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ─── Scene Setup ───────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040608);

const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
camera.position.set(0, 0, 6);

// Mouse parallax
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / W - 0.5) * 2;
  mouseY = (e.clientY / H - 0.5) * 2;
});

// ─── PMREM Custom Probe ─────────────────────────────────────────────────────
const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const probScene = new THREE.Scene();
probScene.add(new THREE.AmbientLight(0xffffff, 0.2));
const keyLight = new THREE.PointLight(0xfff4e0, 4.0, 40);
keyLight.position.set(6, 8, 6);
probScene.add(keyLight);
const fillLight = new THREE.PointLight(0x2a93c1, 2.5, 30);
fillLight.position.set(-5, 2, 4);
probScene.add(fillLight);
const rimLight = new THREE.PointLight(0xf1420b, 1.8, 30);
rimLight.position.set(6, -4, -10);
probScene.add(rimLight);
const envProbe = pmremGen.fromScene(probScene, 0.04).texture;
scene.environment = envProbe;

// ─── VOLUMETRIC FOG SYSTEM ──────────────────────────────────────────────────
// Technique: Stack N transparent planes with custom shader that simulates
// light scattering through depth. Each plane samples a noise texture.
// Moving the planes slowly + varying opacity by depth creates fog volume.

const FOG_LAYER_COUNT = 18;
const fogGroup = new THREE.Group();
scene.add(fogGroup);

// Create fog noise texture using canvas
function makeFogTexture(seed) {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Layered Gaussian blobs for soft fog patches
  const rand = (() => { let s = seed; return () => (s = Math.sin(s * 9301 + 49297) * 233280, (s % 1 + 1) % 1); })();

  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, size, size);

  for (let i = 0; i < 40; i++) {
    const x = rand() * size;
    const y = rand() * size;
    const r = 20 + rand() * 80;
    const a = 0.02 + rand() * 0.06;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
    grd.addColorStop(0, `rgba(255,255,255,${a})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, size, size);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// Volumetric fog shader
const fogVert = `
  varying vec2 vUv;
  varying vec3 vWorldPos;
  void main() {
    vUv = uv;
    vec4 wPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = wPos.xyz;
    gl_Position = projectionMatrix * viewMatrix * wPos;
  }
`;

const fogFrag = `
  uniform sampler2D uFogTex;
  uniform float uTime;
  uniform float uDepth;     // 0=near, 1=far
  uniform float uOpacity;
  uniform float uSpeed;
  uniform vec2  uOffset;
  uniform vec3  uColor;
  varying vec2 vUv;

  void main() {
    // Two overlapping noise samples at different scales/speeds
    vec2 uv1 = vUv * 1.4 + uOffset + vec2(uTime * uSpeed * 0.031, uTime * uSpeed * 0.017);
    vec2 uv2 = vUv * 0.8 + uOffset + vec2(-uTime * uSpeed * 0.021, uTime * uSpeed * 0.013);

    float n1 = texture2D(uFogTex, uv1).r;
    float n2 = texture2D(uFogTex, uv2).r;
    float n = n1 * 0.6 + n2 * 0.4;

    // Radial vignette — fog is denser toward center column
    float dist = length((vUv - 0.5) * vec2(1.0, 1.2));
    float vign = 1.0 - smoothstep(0.2, 0.65, dist);

    // Depth-based color tint: near=blue, far=deep
    vec3 col = mix(uColor * 0.4, uColor, uDepth * 0.7);

    float alpha = n * vign * uOpacity;
    gl_FragColor = vec4(col, alpha);
  }
`;

const fogTexA = makeFogTexture(1.23);
const fogTexB = makeFogTexture(4.77);
const fogTexC = makeFogTexture(9.11);

const fogLayers = [];
for (let i = 0; i < FOG_LAYER_COUNT; i++) {
  const t = i / (FOG_LAYER_COUNT - 1);
  const z = -4 + t * 3.5;          // spread from -4 to -0.5 behind subject
  const depth = 1.0 - t;            // deep=0, near=1
  const opacityBase = 0.04 + depth * 0.03;

  // Alternate fog textures + add some PB blue tint near camera
  const tex = [fogTexA, fogTexB, fogTexC][i % 3];
  const hue = t < 0.4 ? new THREE.Color(0x0a1520) : new THREE.Color(0x04090e);

  const mat = new THREE.ShaderMaterial({
    vertexShader: fogVert,
    fragmentShader: fogFrag,
    uniforms: {
      uFogTex:  { value: tex },
      uTime:    { value: 0 },
      uDepth:   { value: depth },
      uOpacity: { value: opacityBase },
      uSpeed:   { value: 0.3 + t * 0.4 },
      uOffset:  { value: new THREE.Vector2(Math.random(), Math.random()) },
      uColor:   { value: new THREE.Color(0x2a93c1) },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
  });

  // Large plane slightly angled for perspective depth
  const geo = new THREE.PlaneGeometry(14, 10, 1, 1);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.z = z;
  mesh.position.x = (Math.random() - 0.5) * 0.5;
  mesh.position.y = (Math.random() - 0.5) * 0.3;

  fogGroup.add(mesh);
  fogLayers.push({ mesh, mat });
}

// ─── GLASS ORB (Subject Inside Fog) ─────────────────────────────────────────
const orbGeo = new THREE.SphereGeometry(1.1, 128, 128);
const orbMat = new THREE.MeshPhysicalMaterial({
  transmission: 1.0,
  thickness: 0.65,
  roughness: 0.04,
  ior: 1.45,
  iridescence: 0.35,
  iridescenceIOR: 1.38,
  metalness: 0.0,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  envMapIntensity: 2.2,
  color: new THREE.Color(0x88ccee),
  side: THREE.DoubleSide,
  depthWrite: false,
});
const orb = new THREE.Mesh(orbGeo, orbMat);
scene.add(orb);

// Inner glow core
const coreGeo = new THREE.SphereGeometry(0.55, 64, 64);
const coreMat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0x2a93c1),
  emissive: new THREE.Color(0x2a93c1),
  emissiveIntensity: 1.4,
  transmission: 0.6,
  roughness: 0.1,
  ior: 1.3,
  depthWrite: false,
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Orange emissive accent
const accentGeo = new THREE.TorusGeometry(0.85, 0.04, 16, 80);
const accentMat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0xf1420b),
  emissive: new THREE.Color(0xf1420b),
  emissiveIntensity: 2.2,
  roughness: 0.1,
  depthWrite: false,
});
const accent = new THREE.Mesh(accentGeo, accentMat);
accent.rotation.x = Math.PI / 2.2;
scene.add(accent);

// ─── BACKGROUND fBm ─────────────────────────────────────────────────────────
const bgScene = new THREE.Scene();
const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const bgFrag = `
  uniform float uTime;
  uniform vec2 uRes;
  varying vec2 vUv;

  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }
  float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(hash(i), hash(i + vec2(1,0)), f.x),
      mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
      f.y
    );
  }
  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++) {
      v += a * noise(p);
      p = p * 2.01 + vec2(1.7, 9.2);
      a *= 0.5;
    }
    return v;
  }
  void main() {
    vec2 uv = vUv;
    float f = fbm(uv * 2.8 + vec2(uTime * 0.018, uTime * 0.012));
    float f2 = fbm(uv * 4.1 + vec2(-uTime * 0.013, uTime * 0.009) + f * 0.5);
    float v = f2;
    vec3 dark = vec3(0.016, 0.024, 0.032);
    vec3 blue = vec3(0.04, 0.09, 0.14);
    vec3 col = mix(dark, blue, v * 0.5);
    gl_FragColor = vec4(col, 1.0);
  }
`;
const bgMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: bgFrag,
  uniforms: { uTime: { value: 0 }, uRes: { value: new THREE.Vector2(W, H) } },
  depthWrite: false,
});
const bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat);
bgScene.add(bgMesh);

// ─── BLOOM POST PASS ─────────────────────────────────────────────────────────
// Manual bloom via luminance threshold + blur (CDN, no composer needed)
const bloomFrag = `
  uniform sampler2D uScene;
  uniform vec2 uRes;
  varying vec2 vUv;

  vec3 blur13(sampler2D image, vec2 uv, vec2 resolution, vec2 direction) {
    vec3 color = vec3(0.0);
    vec2 off1 = vec2(1.411765) * direction;
    vec2 off2 = vec2(3.294118) * direction;
    vec2 off3 = vec2(5.176471) * direction;
    color += texture2D(image, uv) * 0.197448;
    color += texture2D(image, uv + (off1 / resolution)).rgb * 0.296648;
    color += texture2D(image, uv - (off1 / resolution)).rgb * 0.296648;
    color += texture2D(image, uv + (off2 / resolution)).rgb * 0.0944637;
    color += texture2D(image, uv - (off2 / resolution)).rgb * 0.0944637;
    color += texture2D(image, uv + (off3 / resolution)).rgb * 0.0103813;
    color += texture2D(image, uv - (off3 / resolution)).rgb * 0.0103813;
    return color;
  }
  void main() {
    vec3 col = texture2D(uScene, vUv).rgb;
    // Luminance extract
    float lum = dot(col, vec3(0.2126, 0.7152, 0.0722));
    vec3 bright = col * smoothstep(0.78, 1.0, lum);
    // Blur bright
    vec3 blurH = blur13(uScene, vUv, uRes, vec2(2.5, 0.0));
    vec3 blurV = blur13(uScene, vUv, uRes, vec2(0.0, 2.5));
    vec3 bloomColor = (blurH + blurV) * 0.5;
    float bloomLum = dot(bloomColor, vec3(0.2126, 0.7152, 0.0722));
    vec3 bloom = bloomColor * smoothstep(0.05, 0.5, bloomLum) * 0.38;
    gl_FragColor = vec4(col + bloom, 1.0);
  }
`;

// RT for main scene
const mainRT = new THREE.WebGLRenderTarget(W, H);
const ppScene = new THREE.Scene();
const ppCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const ppMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: bloomFrag,
  uniforms: { uScene: { value: mainRT.texture }, uRes: { value: new THREE.Vector2(W, H) } },
});
ppScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ppMat));

// ─── PARTICLES INSIDE FOG ────────────────────────────────────────────────────
const PARTICLE_COUNT = 800;
const pPositions = new Float32Array(PARTICLE_COUNT * 3);
const pPhases    = new Float32Array(PARTICLE_COUNT);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  // Spread particles in cylinder through the scene
  const r = 1.5 + Math.random() * 3.5;
  const theta = Math.random() * Math.PI * 2;
  pPositions[i * 3]     = Math.cos(theta) * r;
  pPositions[i * 3 + 1] = (Math.random() - 0.5) * 4;
  pPositions[i * 3 + 2] = -1 + (Math.random() - 0.5) * 3.5;
  pPhases[i] = Math.random() * Math.PI * 2;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
pGeo.setAttribute('aPhase', new THREE.BufferAttribute(pPhases, 1));

const pMat = new THREE.PointsMaterial({
  color: 0x4bb8ff,
  size: 0.025,
  transparent: true,
  opacity: 0.6,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(pGeo, pMat));

// ─── ANIMATE ──────────────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Update fog layer time uniforms
  fogLayers.forEach(({ mat }) => {
    mat.uniforms.uTime.value = t;
  });

  // Update background
  bgMat.uniforms.uTime.value = t;

  // Orb breathing (prime frequencies)
  const breathe = Math.sin(t * 0.55) * 0.5 + Math.sin(t * 0.38) * 0.3 + Math.sin(t * 0.22) * 0.2;
  orb.scale.setScalar(1.0 + breathe * 0.025);

  // IOR animation
  orbMat.ior = 1.38 + 0.12 * Math.sin(t * 2.1);

  // Accent torus slow orbit
  accent.rotation.z = t * 0.08;
  accent.rotation.x = Math.PI / 2.2 + Math.sin(t * 0.13) * 0.08;

  // Camera parallax
  camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.04;
  camera.position.y += (-mouseY * 0.3 - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);

  // Fog group slow drift
  fogGroup.rotation.z = t * 0.005;
  fogGroup.position.x = Math.sin(t * 0.07) * 0.15;

  // Render: bg → main scene → bloom pass
  renderer.autoClear = false;
  renderer.setRenderTarget(mainRT);
  renderer.clear();
  renderer.render(bgScene, bgCamera);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(ppScene, ppCam);
}
animate();

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  mainRT.setSize(w, h);
  ppMat.uniforms.uRes.value.set(w, h);
  bgMat.uniforms.uRes.value.set(w, h);
});
</script>
</body>
</html>
