<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variation 3: Particle Advection — Flow Field — PureBrain 3D Training</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #040608; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #label {
    position: fixed; top: 24px; left: 24px;
    color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #label strong { color: #2a93c1; }
  #sub {
    position: fixed; top: 42px; left: 24px;
    color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div id="label"><strong>Variation 3</strong> — Particle Advection Along Curl Noise Flow Field</div>
<div id="sub">Click to spawn burst | Mouse moves vortex center</div>
<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ─── Scene Setup ─────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
camera.position.set(0, 0, 7);

let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / W - 0.5) * 2;
  mouseY = -(e.clientY / H - 0.5) * 2;
});

// ─── CURL NOISE FLOW FIELD ────────────────────────────────────────────────────
// Curl noise is the curl (rot) of a noise field — produces divergence-free
// vector fields (no sinks or sources) that look organic and swirling.
//
// We use 3D simplex-inspired noise approximated with sine waves.
// curl(F) for 3D field F = (Fx, Fy, Fz):
//   curl.x = dFz/dy - dFy/dz
//   curl.y = dFx/dz - dFz/dx
//   curl.z = dFy/dx - dFx/dy
//
// For web-ready CPU implementation (no GPU compute needed for <5000 particles):

function hash(x, y, z) {
  // PCG-style hash
  let v = Math.sin(x * 127.1 + y * 311.7 + z * 74.7) * 43758.5453;
  return v - Math.floor(v);
}

function noise3(x, y, z) {
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const fx = x - ix, fy = y - iy, fz = z - iz;
  // Smooth
  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);
  const uz = fz * fz * (3 - 2 * fz);

  const c000 = hash(ix, iy, iz);
  const c100 = hash(ix + 1, iy, iz);
  const c010 = hash(ix, iy + 1, iz);
  const c110 = hash(ix + 1, iy + 1, iz);
  const c001 = hash(ix, iy, iz + 1);
  const c101 = hash(ix + 1, iy, iz + 1);
  const c011 = hash(ix, iy + 1, iz + 1);
  const c111 = hash(ix + 1, iy + 1, iz + 1);

  return (
    c000 * (1-ux)*(1-uy)*(1-uz) +
    c100 * ux*(1-uy)*(1-uz) +
    c010 * (1-ux)*uy*(1-uz) +
    c110 * ux*uy*(1-uz) +
    c001 * (1-ux)*(1-uy)*uz +
    c101 * ux*(1-uy)*uz +
    c011 * (1-ux)*uy*uz +
    c111 * ux*uy*uz
  );
}

// Compute curl at position (x,y,z,t)
const EPS = 0.01;
function curlNoise(x, y, z, t) {
  const SCALE = 0.55;
  const sx = x * SCALE, sy = y * SCALE, sz = z * SCALE;

  // Potential field components (with time as 4th dimension offset)
  const n1 = (px, py, pz) => noise3(px, py + t * 0.12, pz + 1.71);
  const n2 = (px, py, pz) => noise3(px + 3.11, py + t * 0.09, pz);
  const n3 = (px, py, pz) => noise3(px + 1.5, py + 5.3, pz + t * 0.11);

  // Numerical derivatives
  const dFz_dy = (n3(sx, sy + EPS, sz) - n3(sx, sy - EPS, sz)) / (2 * EPS);
  const dFy_dz = (n2(sx, sy, sz + EPS) - n2(sx, sy, sz - EPS)) / (2 * EPS);
  const dFx_dz = (n1(sx, sy, sz + EPS) - n1(sx, sy, sz - EPS)) / (2 * EPS);
  const dFz_dx = (n3(sx + EPS, sy, sz) - n3(sx - EPS, sy, sz)) / (2 * EPS);
  const dFy_dx = (n2(sx + EPS, sy, sz) - n2(sx - EPS, sy, sz)) / (2 * EPS);
  const dFx_dy = (n1(sx, sy + EPS, sz) - n1(sx, sy - EPS, sz)) / (2 * EPS);

  return {
    x: dFz_dy - dFy_dz,
    y: dFx_dz - dFz_dx,
    z: dFy_dx - dFx_dy,
  };
}

// ─── PARTICLE SYSTEM ──────────────────────────────────────────────────────────
const MAX_PARTICLES = 4000;
const SPEED = 0.028;
const PARTICLE_LIFETIME = 120; // frames (~2 seconds at 60fps)

// CPU particle state
const particles = [];
for (let i = 0; i < MAX_PARTICLES; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 0.5 + Math.random() * 2.8;
  particles.push({
    x: r * Math.sin(phi) * Math.cos(theta),
    y: r * Math.sin(phi) * Math.sin(theta),
    z: r * Math.cos(phi),
    life: Math.random() * PARTICLE_LIFETIME,
    maxLife: PARTICLE_LIFETIME,
    speed: 0.7 + Math.random() * 0.6,
    color: Math.random() > 0.7 ? 1 : 0, // 0=blue, 1=orange
    size: 0.5 + Math.random() * 1.5,
  });
}

// GPU-side buffers
const positions = new Float32Array(MAX_PARTICLES * 3);
const colors    = new Float32Array(MAX_PARTICLES * 3);
const alphas    = new Float32Array(MAX_PARTICLES);
const sizes     = new Float32Array(MAX_PARTICLES);

const PB_BLUE   = new THREE.Color(0x2a93c1);
const PB_ORANGE = new THREE.Color(0xf1420b);

// Custom shader for point sprites with per-particle alpha + size
const particleVert = `
  attribute float aAlpha;
  attribute float aSize;
  varying float vAlpha;
  varying vec3 vColor;
  attribute vec3 color;

  void main() {
    vAlpha = aAlpha;
    vColor = color;
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (320.0 / -mvPos.z);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const particleFrag = `
  varying float vAlpha;
  varying vec3 vColor;

  void main() {
    // Circular soft point
    vec2 uv = gl_PointCoord - 0.5;
    float d = length(uv);
    if (d > 0.5) discard;
    float alpha = (1.0 - smoothstep(0.2, 0.5, d)) * vAlpha;
    gl_FragColor = vec4(vColor, alpha);
  }
`;

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
pGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(alphas, 1));
pGeo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

const pMat = new THREE.ShaderMaterial({
  vertexShader: particleVert,
  fragmentShader: particleFrag,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const points = new THREE.Points(pGeo, pMat);
scene.add(points);

// ─── GLASS ORB at center (vortex source) ─────────────────────────────────────
const orb = new THREE.Mesh(
  new THREE.SphereGeometry(0.9, 128, 128),
  new THREE.MeshPhysicalMaterial({
    transmission: 1.0,
    thickness: 0.6,
    roughness: 0.03,
    ior: 1.48,
    iridescence: 0.38,
    color: new THREE.Color(0x7ec9e8),
    envMapIntensity: 2.0,
    side: THREE.DoubleSide,
    depthWrite: false,
  })
);
scene.add(orb);

// PMREM
const pmrem = new THREE.PMREMGenerator(renderer);
const probeScene = new THREE.Scene();
probeScene.add(Object.assign(new THREE.PointLight(0xfff4e0, 5.0, 40), { position: new THREE.Vector3(6, 8, 6) }));
probeScene.add(Object.assign(new THREE.PointLight(0x2a93c1, 3.0, 30), { position: new THREE.Vector3(-4, 2, 4) }));
probeScene.add(Object.assign(new THREE.PointLight(0xf1420b, 1.8, 25), { position: new THREE.Vector3(5, -4, -8) }));
scene.environment = pmrem.fromScene(probeScene, 0.04).texture;

// Emissive core pulse
const core = new THREE.Mesh(
  new THREE.SphereGeometry(0.42, 48, 48),
  new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(0x2a93c1),
    emissive: new THREE.Color(0x2a93c1),
    emissiveIntensity: 2.0,
    transmission: 0.5,
    roughness: 0.08,
    depthWrite: false,
  })
);
scene.add(core);

// ─── TRAIL EFFECT ─────────────────────────────────────────────────────────────
// GPU-side approach: keep history of last N positions per particle
// CPU approach (simpler): just render with lower alpha
// We use the simple approach here — trails emerge from the additive blending

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
const bgScene = new THREE.Scene();
const bgCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const bgMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*n(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}return v;}
    void main(){
      float f=fbm(vUv*2.2+vec2(uTime*.011,uTime*.007));
      float f2=fbm(vUv*3.8+vec2(-uTime*.008,uTime*.006)+f*.4);
      vec3 col=mix(vec3(0.01,0.015,0.028),vec3(0.03,0.07,0.12),f2*.45);
      gl_FragColor=vec4(col,1.);
    }
  `,
  uniforms: { uTime: { value: 0 } },
});
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat));

// ─── BLOOM ───────────────────────────────────────────────────────────────────
const mainRT = new THREE.WebGLRenderTarget(W, H);
const ppScene = new THREE.Scene(), ppCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const ppMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D uScene; uniform vec2 uRes; varying vec2 vUv;
    vec3 blur9(sampler2D img, vec2 uv, vec2 res, vec2 dir) {
      vec3 c=vec3(0);
      vec2 o1=1.3846*dir/res, o2=3.2308*dir/res;
      c+=texture2D(img,uv).rgb*0.227;
      c+=texture2D(img,uv+o1).rgb*0.316+texture2D(img,uv-o1).rgb*0.316;
      c+=texture2D(img,uv+o2).rgb*0.070+texture2D(img,uv-o2).rgb*0.070;
      return c;
    }
    void main(){
      vec3 col=texture2D(uScene,vUv).rgb;
      vec3 bH=blur9(uScene,vUv,uRes,vec2(2.5,0));
      vec3 bV=blur9(uScene,vUv,uRes,vec2(0,2.5));
      vec3 bloom=(bH+bV)*0.5*smoothstep(0.04,0.5,dot((bH+bV)*.5,vec3(0.2126,0.7152,0.0722)))*0.50;
      gl_FragColor=vec4(col+bloom,1.0);
    }
  `,
  uniforms: { uScene: { value: mainRT.texture }, uRes: { value: new THREE.Vector2(W, H) } },
});
ppScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), ppMat));

// ─── CLICK: spawn burst ───────────────────────────────────────────────────────
window.addEventListener('click', () => {
  // Reset 200 random particles to near-origin for burst effect
  const burst = 200;
  for (let i = 0; i < burst; i++) {
    const p = particles[Math.floor(Math.random() * MAX_PARTICLES)];
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 0.2 + Math.random() * 0.5;
    p.x = r * Math.sin(phi) * Math.cos(theta);
    p.y = r * Math.sin(phi) * Math.sin(theta);
    p.z = r * Math.cos(phi);
    p.life = 0;
    p.speed = 1.2 + Math.random() * 0.8;
    p.color = Math.random() > 0.5 ? 1 : 0;
  }
});

// ─── ANIMATE ──────────────────────────────────────────────────────────────────
let t = 0;
const tempColor = new THREE.Color();

function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  bgMat.uniforms.uTime.value = t;

  // ── Update particles (CPU advection) ──
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = particles[i];

    // Compute curl noise at particle position
    const curl = curlNoise(
      p.x + mouseX * 0.4,
      p.y + mouseY * 0.4,
      p.z * 0.7,
      t
    );

    // Advect particle along curl vector field
    const spd = SPEED * p.speed;
    p.x += curl.x * spd;
    p.y += curl.y * spd;
    p.z += curl.z * spd * 0.4;

    // Clamp z to camera plane (2.5D feel)
    p.z *= 0.98;

    // Life cycle
    p.life++;
    if (p.life >= p.maxLife || Math.abs(p.x) > 4.5 || Math.abs(p.y) > 4.0) {
      // Respawn near center
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 0.3 + Math.random() * 1.2;
      p.x = r * Math.sin(phi) * Math.cos(theta);
      p.y = r * Math.sin(phi) * Math.sin(theta);
      p.z = (Math.random() - 0.5) * 1.5;
      p.life = 0;
      p.speed = 0.7 + Math.random() * 0.6;
    }

    // Compute alpha from life (fade in + fade out)
    const lifeNorm = p.life / p.maxLife;
    const fadeIn  = Math.min(lifeNorm * 5, 1.0);
    const fadeOut = 1.0 - Math.max((lifeNorm - 0.7) / 0.3, 0.0);
    const alpha = fadeIn * fadeOut * 0.85;

    // Fill GPU buffers
    const idx = i * 3;
    positions[idx]     = p.x;
    positions[idx + 1] = p.y;
    positions[idx + 2] = p.z;

    // Color: blue (0) or orange (1) — with slight mix based on position from center
    const dist = Math.sqrt(p.x*p.x + p.y*p.y);
    const colorMix = p.color === 0
      ? Math.max(0, 1.0 - dist / 3.0)   // blue fades at edge
      : Math.min(1.0, dist / 2.0);       // orange brightens at edge

    if (p.color === 0) {
      tempColor.copy(PB_BLUE).multiplyScalar(0.6 + colorMix * 0.4);
    } else {
      tempColor.copy(PB_ORANGE).multiplyScalar(0.6 + colorMix * 0.4);
    }
    colors[idx]     = tempColor.r;
    colors[idx + 1] = tempColor.g;
    colors[idx + 2] = tempColor.b;

    alphas[i] = alpha;
    sizes[i]  = p.size * (0.7 + 0.3 * Math.sin(t * 0.8 + i * 0.1));
  }

  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
  pGeo.attributes.aAlpha.needsUpdate = true;
  pGeo.attributes.aSize.needsUpdate = true;

  // ── Orb IOR + breathing ──
  orb.material.ior = 1.4 + 0.1 * Math.sin(t * 2.2);
  const b = Math.sin(t * 0.55) + Math.sin(t * 0.38) * 0.5;
  orb.scale.setScalar(1.0 + b * 0.02);
  core.material.emissiveIntensity = 1.6 + 0.8 * Math.abs(Math.sin(t * 0.7));

  // ── Camera ──
  camera.position.x += (mouseX * 0.4 - camera.position.x) * 0.04;
  camera.position.y += (mouseY * 0.25 - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);

  // ── Render ──
  renderer.autoClear = false;
  renderer.setRenderTarget(mainRT);
  renderer.clear();
  renderer.render(bgScene, bgCam);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(ppScene, ppCam);
}
animate();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  mainRT.setSize(w, h);
  ppMat.uniforms.uRes.value.set(w, h);
});
</script>
</body>
</html>
