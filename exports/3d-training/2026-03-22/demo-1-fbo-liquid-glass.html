<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBO Liquid Glass — Apple Technique — Night 4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #040608; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.45); font: 11px/1.6 'SF Mono', monospace;
    text-align: center; pointer-events: none; letter-spacing: 0.04em;
  }
  #info span { color: rgba(42,147,193,0.85); }
</style>
</head>
<body>
<div id="info">
  <span>FBO LIQUID GLASS</span> — Apple technique: scene rendered to RT, sampled inside glass shader<br>
  Move mouse to tilt glass · Scroll to zoom
</div>
<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Constants ───────────────────────────────────────────────────────────────
const PB_BLUE   = new THREE.Color(0x2a93c1);
const PB_ORANGE = new THREE.Color(0xf1420b);
const BG_COLOR  = new THREE.Color(0x040608);

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ─── FBO: Render Target for background scene ──────────────────────────────────
// This is THE key technique: background scene → RT → glass shader reads it
const RT_SIZE = 1024; // higher = sharper glass distortion
const bgRT = new THREE.WebGLRenderTarget(RT_SIZE, RT_SIZE, {
  minFilter: THREE.LinearMipmapLinearFilter,
  magFilter: THREE.LinearFilter,
  generateMipmaps: true,
  format: THREE.RGBAFormat,
  type: THREE.HalfFloatType, // HDR range for correct bloom interaction
});

// ─── Two Scenes ───────────────────────────────────────────────────────────────
// bgScene  = everything BEHIND the glass (rendered to RT)
// fgScene  = the glass itself + any overlaid elements
const bgScene = new THREE.Scene();
const fgScene = new THREE.Scene();
const camera  = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

// ─── PMREM Probe ──────────────────────────────────────────────────────────────
const pmremGen = new THREE.PMREMGenerator(renderer);
const probeCam = new THREE.CubeCamera(0.1, 100, new THREE.WebGLCubeRenderTarget(256, {
  generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter
}));
// We build the probe from point lights — brand colors injected into reflections
function buildPMREM() {
  const probeScene = new THREE.Scene();
  probeScene.background = new THREE.Color(0x030406);
  const lights = [
    { pos: [0, 4, 4],    color: 0xffffff, intensity: 6.0 },  // key
    { pos: [-4, 2, 2],   color: 0x2a93c1, intensity: 3.5 },  // PB blue fill
    { pos: [5, -3, -10], color: 0xf1420b, intensity: 4.5 },  // PB orange rim
  ];
  lights.forEach(({ pos, color, intensity }) => {
    const l = new THREE.PointLight(color, intensity, 30);
    l.position.set(...pos);
    probeScene.add(l);
  });
  probeCam.position.set(0, 0, 0);
  probeScene.add(probeCam);
  probeCam.update(renderer, probeScene);
  return pmremGen.fromCubemap(probeCam.renderTarget.texture);
}
const envMap = buildPMREM();

// ─── Background Scene ─────────────────────────────────────────────────────────
// Rich content behind glass: geometric forms, particles, gradient planes
bgScene.background = BG_COLOR;

// Floating geometric forms (what the glass will distort / show through)
const FORMS = [
  // Torus
  { geo: new THREE.TorusGeometry(0.9, 0.28, 48, 96), pos: [-2.2, 0.8, 0], mat: { color: 0x1a5f8a, emissive: 0x0d3c5a, emissiveIntensity: 0.6, roughness: 0.1, metalness: 0.8 } },
  // Sphere cluster
  { geo: new THREE.SphereGeometry(0.55, 64, 64), pos: [2.1, -0.6, 0.5], mat: { color: 0x8b2200, emissive: 0xf1420b, emissiveIntensity: 0.45, roughness: 0.08, metalness: 0.7 } },
  { geo: new THREE.SphereGeometry(0.3, 32, 32),  pos: [2.8, 0.4, -0.4], mat: { color: 0x1a7a9e, emissive: 0x2a93c1, emissiveIntensity: 0.5, roughness: 0.06, metalness: 0.9 } },
  // Icosahedron
  { geo: new THREE.IcosahedronGeometry(0.65, 2), pos: [0.2, -1.8, 0.3], mat: { color: 0x2a93c1, emissive: 0x163d52, emissiveIntensity: 0.3, roughness: 0.15, metalness: 0.6 } },
  // Small accent orbs
  { geo: new THREE.SphereGeometry(0.18, 24, 24), pos: [-1.5, -1.2, 0.8], mat: { color: 0xf1420b, emissive: 0xf1420b, emissiveIntensity: 1.2, roughness: 0.0, metalness: 0.0 } },
  { geo: new THREE.SphereGeometry(0.12, 24, 24), pos: [0.8,  1.5, -0.5], mat: { color: 0x2a93c1, emissive: 0x2a93c1, emissiveIntensity: 1.4, roughness: 0.0, metalness: 0.0 } },
];

const bgMeshes = FORMS.map(({ geo, pos, mat }) => {
  const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial(mat));
  m.position.set(...pos);
  bgScene.add(m);
  return m;
});

// Background gradient plane (depth wash)
const bgPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(hash(i+vec2(0,0)), hash(i+vec2(1,0)), u.x),
                   mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
      }
      void main() {
        vec2 uv = vUv - 0.5;
        float n = noise(uv * 3.5 + uTime * 0.05) * 0.5 + noise(uv * 7.0 - uTime * 0.03) * 0.25;
        vec3 c1 = vec3(0.015, 0.025, 0.04);
        vec3 c2 = vec3(0.04, 0.08, 0.12);
        vec3 col = mix(c1, c2, n);
        float vignette = 1.0 - smoothstep(0.3, 0.9, length(uv));
        gl_FragColor = vec4(col * vignette, 1.0);
      }
    `,
    side: THREE.FrontSide,
    depthWrite: false,
  })
);
bgPlane.position.z = -4;
bgPlane.renderOrder = -1;
bgScene.add(bgPlane);

// Background particles
const BG_PARTICLE_COUNT = 2000;
const bgParticleGeo = new THREE.BufferGeometry();
const bgPPos = new Float32Array(BG_PARTICLE_COUNT * 3);
const bgPAlpha = new Float32Array(BG_PARTICLE_COUNT);
for (let i = 0; i < BG_PARTICLE_COUNT; i++) {
  bgPPos[i*3]   = (Math.random() - 0.5) * 14;
  bgPPos[i*3+1] = (Math.random() - 0.5) * 10;
  bgPPos[i*3+2] = (Math.random() - 0.5) * 6 - 2;
  bgPAlpha[i]   = Math.random();
}
bgParticleGeo.setAttribute('position', new THREE.BufferAttribute(bgPPos, 3));
bgParticleGeo.setAttribute('alpha', new THREE.BufferAttribute(bgPAlpha, 1));
const bgParticleMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uColor: { value: PB_BLUE } },
  vertexShader: `
    attribute float alpha;
    varying float vAlpha;
    void main() {
      vAlpha = alpha;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = 1.5 * (220.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    uniform vec3 uColor;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - smoothstep(0.1, 0.5, d)) * vAlpha * 0.7;
      gl_FragColor = vec4(uColor, a);
    }
  `,
  transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
});
bgScene.add(new THREE.Points(bgParticleGeo, bgParticleMat));

// bg lights
const bgAmbient = new THREE.AmbientLight(0x0a1520, 2.0);
bgScene.add(bgAmbient);
const bgKey = new THREE.PointLight(0xffffff, 12, 20);
bgKey.position.set(2, 3, 4);
bgScene.add(bgKey);
const bgFill = new THREE.PointLight(0x2a93c1, 6, 20);
bgFill.position.set(-3, 1, 2);
bgScene.add(bgFill);
const bgRim = new THREE.PointLight(0xf1420b, 5, 20);
bgRim.position.set(4, -2, -6);
bgScene.add(bgRim);

// ─── FBO Glass Shader ─────────────────────────────────────────────────────────
// THE TECHNIQUE: glass reads bgRT, distorts UVs by normal, applies color grade
const fboGlassVS = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec2 vUv;
  varying vec4 vProjected;

  void main() {
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vec4 mvPos    = viewMatrix * worldPos;
    vNormal    = normalize(normalMatrix * normal);
    vViewDir   = normalize(-mvPos.xyz);
    vUv        = uv;
    vProjected = projectionMatrix * mvPos;
    gl_Position = vProjected;
  }
`;

const fboGlassFS = `
  uniform sampler2D uBackground;   // bgRT texture — the scene behind glass
  uniform samplerCube uEnv;         // PMREM for reflections
  uniform float uTime;
  uniform float uIOR;               // index of refraction (animates)
  uniform float uDistortion;        // distortion strength
  uniform float uBlurRadius;        // blur/frosted effect
  uniform vec2  uResolution;        // screen resolution for NDC → UV
  uniform float uSaturation;        // Apple: boosted saturation inside glass
  uniform float uBrightness;        // Apple: subtle brightness lift
  uniform vec3  uTint;              // glass tint color

  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec2 vUv;
  varying vec4 vProjected;

  // Chromatic aberration offset directions
  const vec2 CA_DIR = vec2(0.003, 0.0015);

  vec3 saturate(vec3 color, float factor) {
    // Convert to grayscale, lerp back with factor>1 = oversaturated
    float lum = dot(color, vec3(0.299, 0.587, 0.114));
    return mix(vec3(lum), color, factor);
  }

  // Sample bgRT with a small gaussian blur kernel (frosted effect)
  vec3 blurSample(sampler2D tex, vec2 uv, float radius) {
    vec3 sum = vec3(0.0);
    float total = 0.0;
    // 9-tap approximate gaussian
    for (int y = -1; y <= 1; y++) {
      for (int x = -1; x <= 1; x++) {
        vec2 offset = vec2(float(x), float(y)) * radius;
        float w = 1.0 / (1.0 + float(x*x + y*y));
        sum += texture2D(tex, uv + offset).rgb * w;
        total += w;
      }
    }
    return sum / total;
  }

  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(vViewDir);

    // ── NDC → screen UV (for reading bgRT) ──────────────────────────────────
    // vProjected.xy is clip space. Convert to 0..1 for texture read.
    vec2 screenUV = (vProjected.xy / vProjected.w) * 0.5 + 0.5;

    // ── Refraction distortion ────────────────────────────────────────────────
    // The normal deviation from "straight ahead" drives the UV offset.
    // This is the core of the Apple Liquid Glass technique:
    // NdotV = 1 at center (looking straight), 0 at edge (grazing)
    float NdotV = dot(N, V);
    vec3 refractDir = refract(-V, N, 1.0 / uIOR);

    // Project refraction direction onto screen plane
    // (simplified: use x,y components of the refracted direction)
    vec2 refractOffset = refractDir.xy * uDistortion * (1.0 - NdotV * 0.5);

    // Edge softening (Apple applies stronger blur at edges of the pill/circle)
    float edgeFactor = 1.0 - smoothstep(0.35, 0.5, length(vUv - 0.5));
    vec2 distortedUV = screenUV + refractOffset * edgeFactor;

    // ── Blur for frosted-glass effect ────────────────────────────────────────
    // Blur radius increases slightly at edges (edge feels more frosted)
    float dynamicBlur = uBlurRadius * (1.0 + (1.0 - edgeFactor) * 0.5);
    // Correct blur scale for aspect ratio
    vec2 blurScale = vec2(dynamicBlur / uResolution.x * uResolution.y, dynamicBlur);

    vec3 bgColor = blurSample(uBackground, distortedUV, dynamicBlur * 0.001);

    // ── Chromatic aberration (color split at edges) ──────────────────────────
    float caStrength = uDistortion * 0.4 * (1.0 - NdotV);
    float bgR = blurSample(uBackground, distortedUV + CA_DIR * caStrength, dynamicBlur * 0.001).r;
    float bgB = blurSample(uBackground, distortedUV - CA_DIR * caStrength, dynamicBlur * 0.001).b;
    bgColor = vec3(bgR, bgColor.g, bgB);

    // ── Apple color grading inside glass ─────────────────────────────────────
    // 1. Saturation boost (colors look more vivid through glass)
    bgColor = saturate(bgColor, uSaturation);
    // 2. Brightness lift (glass brightens whatever is behind it)
    bgColor = bgColor * uBrightness;
    // 3. Subtle tint (glass material has a slight blue tint for PureBrain)
    bgColor = mix(bgColor, bgColor * uTint, 0.12);

    // ── Fresnel reflection term ───────────────────────────────────────────────
    float fresnel = pow(1.0 - max(0.0, NdotV), 3.5);
    vec3 reflectDir = reflect(-V, N);
    vec3 envColor = textureCube(uEnv, reflectDir).rgb;
    // Mix reflection with bg color
    vec3 finalColor = mix(bgColor, envColor * 0.6, fresnel * 0.45);

    // ── Glass specular highlight ──────────────────────────────────────────────
    vec3 lightDir = normalize(vec3(0.5, 1.0, 0.8));
    float spec = pow(max(0.0, dot(reflect(-lightDir, N), V)), 64.0);
    finalColor += vec3(1.0) * spec * 0.35;

    // ── Rim light (PureBrain orange) ──────────────────────────────────────────
    float rim = pow(1.0 - max(0.0, NdotV), 4.5);
    finalColor += vec3(0.945, 0.259, 0.043) * rim * 0.15;

    // ── Edge alpha: glass is transparent at very edge ─────────────────────────
    float alpha = mix(0.82, 0.96, edgeFactor * NdotV + 0.3);
    alpha = clamp(alpha, 0.65, 0.97);

    gl_FragColor = vec4(finalColor, alpha);
  }
`;

// ─── Glass Geometry ───────────────────────────────────────────────────────────
// Apple Liquid Glass style: rounded "pill" capsule, not a plain sphere
// Using a SphereGeometry with high resolution for quality refraction

function makeGlassDisc(radiusX, radiusY, seg) {
  // Squished sphere → pill shape
  const geo = new THREE.SphereGeometry(1.0, seg, seg);
  geo.scale(radiusX, radiusY, 0.45); // flat disc / pill shape
  return geo;
}

const glassGeo = makeGlassDisc(1.8, 1.1, 128);

const glassMat = new THREE.ShaderMaterial({
  uniforms: {
    uBackground:  { value: bgRT.texture },
    uEnv:         { value: envMap.texture },
    uTime:        { value: 0 },
    uIOR:         { value: 1.45 },
    uDistortion:  { value: 0.18 },
    uBlurRadius:  { value: 1.5 },
    uResolution:  { value: new THREE.Vector2(innerWidth, innerHeight) },
    uSaturation:  { value: 1.35 },  // Apple: slightly oversaturated
    uBrightness:  { value: 1.15 },  // Apple: subtle brightness lift
    uTint:        { value: new THREE.Vector3(0.85, 0.94, 1.0) }, // cool tint
  },
  vertexShader:   fboGlassVS,
  fragmentShader: fboGlassFS,
  transparent: true,
  depthWrite: false,
  side: THREE.FrontSide,
});

const glassMesh = new THREE.Mesh(glassGeo, glassMat);
glassMesh.position.set(0, 0, 0.5);
fgScene.add(glassMesh);

// Second smaller glass disc (layered depth — Apple uses multiple layers)
const glassGeo2 = makeGlassDisc(1.1, 0.68, 96);
const glassMat2 = glassMat.clone();
glassMat2.uniforms = Object.assign({}, glassMat.uniforms);
glassMat2.uniforms.uIOR        = { value: 1.52 };
glassMat2.uniforms.uDistortion = { value: 0.12 };
glassMat2.uniforms.uBlurRadius = { value: 3.0 }; // frosted inner layer
glassMat2.uniforms.uSaturation = { value: 1.2 };
glassMat2.uniforms.uTint       = { value: new THREE.Vector3(0.88, 0.95, 1.02) };
const glassMesh2 = new THREE.Mesh(glassGeo2, glassMat2);
glassMesh2.position.set(0, 0, 0.8); // slightly closer to camera
fgScene.add(glassMesh2);

// Glass edge glow plane (halo / apple specular ring)
const haloMat = new THREE.MeshBasicMaterial({
  color: 0x4ab8e8,
  transparent: true,
  opacity: 0.0, // we'll set via canvas texture
  side: THREE.FrontSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const haloTex = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(128,128,80, 128,128,128);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.75, 'rgba(42,147,193,0.0)');
  grad.addColorStop(0.88, 'rgba(42,147,193,0.4)');
  grad.addColorStop(0.95, 'rgba(255,255,255,0.15)');
  grad.addColorStop(1.0,  'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
})();
const haloMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(4.2, 2.6),
  new THREE.MeshBasicMaterial({ map: haloTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending })
);
haloMesh.position.z = 0.45;
fgScene.add(haloMesh);

// fg ambient
fgScene.add(new THREE.AmbientLight(0x040810, 1.0));

// ─── Post Processing (on final composed scene) ────────────────────────────────
// We need a combined render — render bg + fg in sequence but bloom AFTER
// Strategy: use custom final composer

const finalComposer = new EffectComposer(renderer);
// We'll manually composite bg+fg in the render pass via a custom approach
// Since EffectComposer works on one scene, we'll render bg to RT and fg via composer

// Actually: render both scenes to screen in sequence, then bloom+grade composite
// For bloom: add a second composer pass over the full result
const mainScene = new THREE.Scene();
const mainCamera = camera;

// Helper: full-screen quad for compositing
const fsGeo  = new THREE.PlaneGeometry(2, 2);
const fsQuadMat = new THREE.ShaderMaterial({
  uniforms: {
    tBg: { value: bgRT.texture },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `uniform sampler2D tBg; varying vec2 vUv; void main() { gl_FragColor = texture2D(tBg, vUv); }`,
  depthTest: false, depthWrite: false,
});
// We DON'T use this — simpler approach: render bg to screen first, then fg on top.

// Post-processing: bloom + grade over combined result
const fgRT = new THREE.WebGLRenderTarget(innerWidth * Math.min(devicePixelRatio, 2), innerHeight * Math.min(devicePixelRatio, 2), {
  type: THREE.HalfFloatType,
});

const composer = new EffectComposer(renderer);
// Custom render pass that renders BOTH scenes
class DualSceneRenderPass extends RenderPass {
  render(renderer, writeBuffer, readBuffer, deltaTime, maskActive) {
    const oldBg = renderer.getClearColor(new THREE.Color());
    const oldAlpha = renderer.getClearAlpha();
    renderer.setRenderTarget(writeBuffer);
    renderer.clear();
    // Render bgScene first (clears to BG_COLOR)
    renderer.autoClear = false;
    const bgOld = bgScene.background;
    renderer.setClearColor(BG_COLOR, 1.0);
    renderer.clear(true, true, false);
    bgScene.background = null;
    renderer.render(bgScene, camera);
    // Render fgScene on top (transparent glass)
    renderer.render(fgScene, camera);
    bgScene.background = bgOld;
    renderer.autoClear = true;
  }
}
composer.addPass(new DualSceneRenderPass(bgScene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.45, 0.4, 0.84);
composer.addPass(bloomPass);

// Final color grade + CA pass
const gradePass = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    uTime:    { value: 0 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      vec2 uv = vUv;
      // Subtle CA at screen edges
      float d = length(uv - 0.5);
      float ca = d * d * 0.006;
      float r = texture2D(tDiffuse, uv + vec2( ca, 0.0)).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - vec2( ca, 0.0)).b;
      vec3 col = vec3(r, g, b);
      // Vignette
      float vign = 1.0 - smoothstep(0.45, 0.85, d);
      col *= mix(0.65, 1.0, vign);
      // Film grain
      float noise = fract(sin(dot(uv + uTime * 0.01, vec2(12.9898, 78.233))) * 43758.5453);
      col += (noise - 0.5) * 0.018;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
composer.addPass(gradePass);
composer.addPass(new OutputPass());

// ─── Mouse interaction ────────────────────────────────────────────────────────
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
document.addEventListener('mousemove', (e) => {
  mouse.tx = (e.clientX / innerWidth  - 0.5) * 2;
  mouse.ty = (e.clientY / innerHeight - 0.5) * -2;
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bgRT.setSize(RT_SIZE, RT_SIZE);
  glassMat.uniforms.uResolution.value.set(innerWidth, innerHeight);
  glassMat2.uniforms.uResolution.value.set(innerWidth, innerHeight);
});

// ─── Animation loop ────────────────────────────────────────────────────────────
let t = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  t = ts * 0.001;

  // Smooth mouse
  mouse.x += (mouse.tx - mouse.x) * 0.06;
  mouse.y += (mouse.ty - mouse.y) * 0.06;

  // Background form animations
  bgMeshes[0].rotation.x = t * 0.4;
  bgMeshes[0].rotation.y = t * 0.25;
  bgMeshes[1].rotation.y = t * 0.35;
  bgMeshes[2].rotation.x = -t * 0.3;
  bgMeshes[2].rotation.z = t * 0.2;
  bgMeshes[3].rotation.x = t * 0.2;
  bgMeshes[3].rotation.y = t * 0.45;
  // Gentle float
  bgMeshes[0].position.y = 0.8 + Math.sin(t * 0.55) * 0.2;
  bgMeshes[1].position.y = -0.6 + Math.sin(t * 0.38 + 1.0) * 0.15;
  bgMeshes[3].position.y = -1.8 + Math.sin(t * 0.62 + 2.0) * 0.18;
  // Emissive pulse on accent orbs
  const pulseBright = 0.8 + 0.4 * Math.sin(t * 2.2);
  bgMeshes[4].material.emissiveIntensity = pulseBright;
  bgMeshes[5].material.emissiveIntensity = pulseBright + 0.2;

  bgPlane.material.uniforms.uTime.value = t;
  bgParticleMat.uniforms.uTime.value    = t;

  // Glass: IOR animation (the "breath" / Apple liquid glass shimmer)
  // Prime-ratio frequencies for organic feel
  glassMat.uniforms.uIOR.value  = 1.42 + 0.08 * Math.sin(t * 1.1) + 0.04 * Math.sin(t * 2.7);
  glassMat2.uniforms.uIOR.value = 1.50 + 0.06 * Math.sin(t * 0.8 + 1.2);
  glassMat.uniforms.uTime.value   = t;
  glassMat2.uniforms.uTime.value  = t;

  // Distortion pulse (glass "breathes" its distortion strength)
  glassMat.uniforms.uDistortion.value  = 0.16 + 0.04 * Math.sin(t * 0.55);
  glassMat2.uniforms.uDistortion.value = 0.10 + 0.03 * Math.sin(t * 0.38 + 0.8);

  // Glass tilt with mouse
  glassMesh.rotation.x  = mouse.y * 0.28;
  glassMesh.rotation.y  = mouse.x * 0.28;
  glassMesh2.rotation.x = mouse.y * 0.22 + 0.02 * Math.sin(t * 0.33);
  glassMesh2.rotation.y = mouse.x * 0.22 + 0.02 * Math.sin(t * 0.25);

  gradePass.uniforms.uTime.value = t;

  // ── Render background scene to RT ─────────────────────────────────────────
  // This is what the glass shader will sample
  renderer.setRenderTarget(bgRT);
  renderer.setClearColor(BG_COLOR, 1.0);
  renderer.clear();
  renderer.render(bgScene, camera);
  renderer.setRenderTarget(null);
  bgRT.texture.needsUpdate = true;

  // ── Full composer render (bg + fg → bloom + grade) ────────────────────────
  composer.render();
}
animate(0);

</script>
