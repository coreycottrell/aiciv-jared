<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU-Scale Particles — Ping-Pong FBO — Night 4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #040508; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font: 11px/1.6 'SF Mono', monospace;
    text-align: center; pointer-events: none; letter-spacing: 0.04em;
  }
  #info span { color: rgba(241,66,11,0.85); }
  #count {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font: 10px 'SF Mono', monospace; pointer-events: none;
  }
</style>
</head>
<body>
<div id="info">
  <span>GPU-SCALE PARTICLES</span> — ping-pong FBO simulation · 65,536 particles · velocity stored in texture · curl noise GLSL
</div>
<div id="count">initializing...</div>
<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── GPU Particle Count ───────────────────────────────────────────────────────
// Must be a power of 2 — stored as WIDTH×WIDTH texture
const SIM_WIDTH   = 256;     // 256×256 = 65,536 particles
const PARTICLE_COUNT = SIM_WIDTH * SIM_WIDTH;

const countEl = document.getElementById('count');
countEl.textContent = `${PARTICLE_COUNT.toLocaleString()} particles · 256×256 FBO simulation · ping-pong double buffer`;

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x040508, 1.0);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ─── Simulation FBOs (Ping-Pong Double Buffer) ────────────────────────────────
// We need TWO render targets: read from one, write to the other, swap each frame
// RT stores RGBA32F:
//   RGB = particle XYZ position
//   A   = particle life (0..1)
// A SECOND RT stores velocity (XYZ) + particle ID (W)
const rtOptions = {
  type:           THREE.FloatType,    // RGBA32F — full float precision
  format:         THREE.RGBAFormat,
  minFilter:      THREE.NearestFilter, // NO interpolation — exact pixel reads
  magFilter:      THREE.NearestFilter,
  generateMipmaps: false,
};

let posRT0 = new THREE.WebGLRenderTarget(SIM_WIDTH, SIM_WIDTH, rtOptions);
let posRT1 = new THREE.WebGLRenderTarget(SIM_WIDTH, SIM_WIDTH, rtOptions);
let velRT0 = new THREE.WebGLRenderTarget(SIM_WIDTH, SIM_WIDTH, rtOptions);
let velRT1 = new THREE.WebGLRenderTarget(SIM_WIDTH, SIM_WIDTH, rtOptions);

// ─── Initialize Particle Data ────────────────────────────────────────────────
// Each texel = one particle's initial position + life
// We fill a DataTexture with random sphere-surface positions
const posData = new Float32Array(PARTICLE_COUNT * 4);
const velData = new Float32Array(PARTICLE_COUNT * 4);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  // Random position in sphere
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 1.5 + Math.random() * 1.5;
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.sin(phi) * Math.sin(theta);
  const z = r * Math.cos(phi);

  posData[i*4]   = x;
  posData[i*4+1] = y;
  posData[i*4+2] = z;
  posData[i*4+3] = Math.random(); // life phase offset

  // Zero initial velocity
  velData[i*4]   = 0;
  velData[i*4+1] = 0;
  velData[i*4+2] = 0;
  velData[i*4+3] = Math.random(); // particle type (0..1: 0.7 = blue, 0.3 = orange)
}

const posTex = new THREE.DataTexture(posData, SIM_WIDTH, SIM_WIDTH, THREE.RGBAFormat, THREE.FloatType);
posTex.needsUpdate = true;
const velTex = new THREE.DataTexture(velData, SIM_WIDTH, SIM_WIDTH, THREE.RGBAFormat, THREE.FloatType);
velTex.needsUpdate = true;

// Copy initial data into RT0
// Strategy: render a full-screen quad that samples the DataTexture and writes to RT
const copyScene  = new THREE.Scene();
const copyCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const copyGeo    = new THREE.PlaneGeometry(2, 2);

function makeCopyMat(sourceTex) {
  return new THREE.ShaderMaterial({
    uniforms: { tData: { value: sourceTex } },
    vertexShader:   `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
    fragmentShader: `uniform sampler2D tData; varying vec2 vUv; void main() { gl_FragColor = texture2D(tData, vUv); }`,
    depthTest: false, depthWrite: false,
  });
}

// Init pos RT0 and RT1 from posTex
[posRT0, posRT1].forEach(rt => {
  const mat  = makeCopyMat(posTex);
  const mesh = new THREE.Mesh(copyGeo, mat);
  copyScene.clear(); copyScene.add(mesh);
  renderer.setRenderTarget(rt);
  renderer.render(copyScene, copyCamera);
  renderer.setRenderTarget(null);
});

// Init vel RT0 and RT1 from velTex
[velRT0, velRT1].forEach(rt => {
  const mat  = makeCopyMat(velTex);
  const mesh = new THREE.Mesh(copyGeo, mat);
  copyScene.clear(); copyScene.add(mesh);
  renderer.setRenderTarget(rt);
  renderer.render(copyScene, copyCamera);
  renderer.setRenderTarget(null);
});

// ─── Simulation Shaders ───────────────────────────────────────────────────────

// Velocity simulation: reads current velocity, applies curl noise force, writes new velocity
const velSimMat = new THREE.ShaderMaterial({
  uniforms: {
    tPos:   { value: null }, // current positions
    tVel:   { value: null }, // current velocities
    uTime:  { value: 0 },
    uDT:    { value: 0.016 },
    uMouse: { value: new THREE.Vector3() },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tPos;
    uniform sampler2D tVel;
    uniform float uTime;
    uniform float uDT;
    uniform vec3  uMouse;
    varying vec2  vUv;

    // ── Noise functions ──────────────────────────────────────────────────────
    float hash1(float n) { return fract(sin(n) * 43758.5453123); }

    float noise3D(vec3 p) {
      vec3 i = floor(p);
      vec3 f = fract(p);
      vec3 u = f*f*(3.0 - 2.0*f);
      float n000 = hash1(i.x + i.y*57.0 + i.z*131.0);
      float n100 = hash1((i.x+1.0) + i.y*57.0 + i.z*131.0);
      float n010 = hash1(i.x + (i.y+1.0)*57.0 + i.z*131.0);
      float n110 = hash1((i.x+1.0) + (i.y+1.0)*57.0 + i.z*131.0);
      float n001 = hash1(i.x + i.y*57.0 + (i.z+1.0)*131.0);
      float n101 = hash1((i.x+1.0) + i.y*57.0 + (i.z+1.0)*131.0);
      float n011 = hash1(i.x + (i.y+1.0)*57.0 + (i.z+1.0)*131.0);
      float n111 = hash1((i.x+1.0) + (i.y+1.0)*57.0 + (i.z+1.0)*131.0);
      return mix(mix(mix(n000,n100,u.x), mix(n010,n110,u.x), u.y),
                 mix(mix(n001,n101,u.x), mix(n011,n111,u.x), u.y), u.z);
    }

    // ── 3D Curl Noise (divergence-free) ──────────────────────────────────────
    const float EPS = 0.008;
    vec3 curlNoise(vec3 p, float t) {
      // Three distinct noise functions (different phases to ensure independence)
      float n1_yp = noise3D(p + vec3(0.0,  EPS, 0.0) + vec3(0.0, t*0.10, 1.71));
      float n1_ym = noise3D(p + vec3(0.0, -EPS, 0.0) + vec3(0.0, t*0.10, 1.71));
      float n1_zp = noise3D(p + vec3(0.0, 0.0,  EPS) + vec3(0.0, t*0.10, 1.71));
      float n1_zm = noise3D(p + vec3(0.0, 0.0, -EPS) + vec3(0.0, t*0.10, 1.71));

      float n2_xp = noise3D(p + vec3( EPS, 0.0, 0.0) + vec3(3.11, t*0.08, 0.0));
      float n2_xm = noise3D(p + vec3(-EPS, 0.0, 0.0) + vec3(3.11, t*0.08, 0.0));
      float n2_zp = noise3D(p + vec3(0.0, 0.0,  EPS) + vec3(3.11, t*0.08, 0.0));
      float n2_zm = noise3D(p + vec3(0.0, 0.0, -EPS) + vec3(3.11, t*0.08, 0.0));

      float n3_xp = noise3D(p + vec3( EPS, 0.0, 0.0) + vec3(1.5,  5.3, t*0.09));
      float n3_xm = noise3D(p + vec3(-EPS, 0.0, 0.0) + vec3(1.5,  5.3, t*0.09));
      float n3_yp = noise3D(p + vec3(0.0,  EPS, 0.0) + vec3(1.5,  5.3, t*0.09));
      float n3_ym = noise3D(p + vec3(0.0, -EPS, 0.0) + vec3(1.5,  5.3, t*0.09));

      float inv2eps = 1.0 / (2.0 * EPS);
      return vec3(
        (n3_yp - n3_ym) * inv2eps - (n2_zp - n2_zm) * inv2eps,
        (n1_zp - n1_zm) * inv2eps - (n3_xp - n3_xm) * inv2eps,
        (n2_xp - n2_xm) * inv2eps - (n1_yp - n1_ym) * inv2eps
      );
    }

    void main() {
      vec4 posData = texture2D(tPos, vUv);
      vec4 velData = texture2D(tVel, vUv);
      vec3 pos = posData.xyz;
      vec3 vel = velData.xyz;
      float particleType = velData.w; // preserved from init

      // Scale position for noise input (smaller scale = slower, larger structures)
      vec3 noisePos = pos * 0.55;

      // Curl noise force
      vec3 curl = curlNoise(noisePos, uTime);

      // Mouse attraction force (weak)
      vec3 toMouse = uMouse - pos;
      float mouseDist = length(toMouse);
      vec3 mouseForce = (mouseDist < 3.0) ? normalize(toMouse) * 0.4 / (1.0 + mouseDist) : vec3(0.0);

      // Central attraction (prevent runaway)
      float r = length(pos);
      vec3 centerForce = -normalize(pos) * max(0.0, (r - 2.5) * 0.3);

      // Integrate velocity (with drag)
      float drag = 0.92;
      vel = vel * drag + (curl * 0.55 + mouseForce * 0.3 + centerForce) * uDT;

      // Clamp max velocity
      float speed = length(vel);
      if (speed > 0.8) vel = vel / speed * 0.8;

      gl_FragColor = vec4(vel, particleType);
    }
  `,
  depthTest: false, depthWrite: false,
});

// Position simulation: reads velocity, integrates position, handles respawn
const posSimMat = new THREE.ShaderMaterial({
  uniforms: {
    tPos:  { value: null },
    tVel:  { value: null },
    uTime: { value: 0 },
    uDT:   { value: 0.016 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tPos;
    uniform sampler2D tVel;
    uniform float uTime;
    uniform float uDT;
    varying vec2  vUv;

    float hash1(float n) { return fract(sin(n) * 43758.5453123); }

    void main() {
      vec4 posData = texture2D(tPos, vUv);
      vec4 velData = texture2D(tVel, vUv);
      vec3 pos  = posData.xyz;
      float life = posData.w;
      vec3 vel  = velData.xyz;

      // Integrate position
      pos += vel * uDT;

      // Life cycle
      life -= uDT * 0.4;

      // Respawn if life expired or out of bounds
      float r = length(pos);
      if (life <= 0.0 || r > 4.5) {
        // Respawn at random sphere surface position
        float seed = hash1(uTime * 0.01 + vUv.x * 127.1 + vUv.y * 311.7);
        float seed2 = hash1(seed * 43758.5 + uTime * 0.007);
        float theta = seed * 6.2832;
        float phi   = acos(2.0 * seed2 - 1.0);
        float ri    = 1.0 + hash1(seed + seed2) * 2.5;
        pos = vec3(
          ri * sin(phi) * cos(theta),
          ri * sin(phi) * sin(theta),
          ri * cos(phi)
        );
        life = 0.95 + hash1(seed * 99.7) * 0.05;
      }

      gl_FragColor = vec4(pos, life);
    }
  `,
  depthTest: false, depthWrite: false,
});

// ─── Simulation mesh (full-screen quad for compute passes) ───────────────────
const simScene  = new THREE.Scene();
const simCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const simMesh   = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), velSimMat);
simScene.add(simMesh);

// ─── Particle Render Geometry ─────────────────────────────────────────────────
// UV coordinates: each particle has a unique UV pointing to its texel in the FBO
// We use these UVs to read the particle's position from the FBO each frame

const uvs = new Float32Array(PARTICLE_COUNT * 2);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const col = i % SIM_WIDTH;
  const row = Math.floor(i / SIM_WIDTH);
  uvs[i*2]   = (col + 0.5) / SIM_WIDTH;
  uvs[i*2+1] = (row + 0.5) / SIM_WIDTH;
}

const renderGeo = new THREE.BufferGeometry();
renderGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
// Dummy positions (actual positions come from FBO read in vertex shader)
renderGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(PARTICLE_COUNT * 3), 3));

const particleRenderMat = new THREE.ShaderMaterial({
  uniforms: {
    tPos:        { value: null }, // position FBO
    tVel:        { value: null }, // velocity FBO (contains particle type)
    uTime:       { value: 0 },
    uPixelRatio: { value: Math.min(devicePixelRatio, 2) },
  },
  vertexShader: `
    uniform sampler2D tPos;
    uniform sampler2D tVel;
    uniform float uTime;
    uniform float uPixelRatio;

    // UV attribute: points to this particle's texel in the FBO
    // (default 'uv' attribute used here)

    varying float vAlpha;
    varying vec3  vColor;

    void main() {
      // Read position from FBO
      vec4 posData = texture2D(tPos, uv);
      vec4 velData = texture2D(tVel, uv);
      vec3 pos  = posData.xyz;
      float life = posData.w;
      float particleType = velData.w; // 0..1, <0.7 = blue

      // Fade in/out by life
      vAlpha = life * life * 0.9;
      vAlpha = clamp(vAlpha, 0.0, 0.9);

      // Color by type + life
      if (particleType < 0.7) {
        // Blue: PureBrain blue → white-blue at full life
        vColor = mix(vec3(0.1, 0.35, 0.55), vec3(0.165, 0.576, 0.757), life);
      } else {
        // Orange: dark orange → PB orange at full life
        vColor = mix(vec3(0.5, 0.1, 0.0), vec3(0.945, 0.259, 0.043), life);
      }

      // Use particle speed for brightness boost
      float speed = length(velData.xyz);
      vColor += vColor * speed * 0.8;

      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      // Perspective size: larger near camera, smaller far
      gl_PointSize = 1.8 * uPixelRatio * (300.0 / -mvPos.z) * (0.5 + life * 0.5);
      gl_Position  = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    varying vec3  vColor;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      // Soft circle (bright center, soft edge)
      float a = (1.0 - smoothstep(0.1, 0.5, d)) * vAlpha;
      if (a < 0.01) discard;
      gl_FragColor = vec4(vColor, a);
    }
  `,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});

const particlePoints = new THREE.Points(renderGeo, particleRenderMat);

// ─── Main Render Scene ────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 8);

// Background
const bgMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `
    varying vec2 vUv; uniform float uTime;
    float h(vec2 p) { return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float n(vec2 p) { vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f); return mix(mix(h(i),h(i+vec2(1,0)),u.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),u.x),u.y); }
    void main() {
      vec2 uv = vUv * 3.0 - 1.5;
      float v = n(uv + uTime*0.03)*0.5 + n(uv*2.0-uTime*0.02)*0.25;
      vec3 c = vec3(0.010,0.012,0.022) + vec3(0.014,0.024,0.042)*v;
      gl_FragColor = vec4(c * (1.0-smoothstep(0.5,1.2,length(vUv-0.5))), 1.0);
    }
  `,
  depthWrite: false,
});
const bgPlane = new THREE.Mesh(new THREE.PlaneGeometry(30,30), bgMat);
bgPlane.position.z = -8;
bgPlane.renderOrder = -1;
scene.add(bgPlane);

// Central glass orb (attractor visual)
const orbGeo = new THREE.SphereGeometry(0.45, 128, 128);
const orbMat = new THREE.MeshPhysicalMaterial({
  transmission: 1.0, thickness: 0.5, roughness: 0.03, ior: 1.46,
  iridescence: 0.38, color: 0x2a93c1, envMapIntensity: 2.0, depthWrite: false,
});
// Quick PMREM setup
const pmremGen = new THREE.PMREMGenerator(renderer);
const pRT = new THREE.WebGLCubeRenderTarget(128);
const pCam = new THREE.CubeCamera(0.1, 20, pRT);
const pScene = new THREE.Scene();
pScene.background = new THREE.Color(0x030405);
[[0,3,4,0xffffff,4],[-3,2,2,0x2a93c1,2.5],[4,-3,-8,0xf1420b,3]].forEach(([x,y,z,c,i])=>{const l=new THREE.PointLight(c,i,15);l.position.set(x,y,z);pScene.add(l);});
pScene.add(pCam); pCam.update(renderer, pScene);
orbMat.envMap = pmremGen.fromCubemap(pRT.texture).texture;
const orb = new THREE.Mesh(orbGeo, orbMat);
scene.add(orb);

// Glow around orb
const glowMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.55, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0x2a93c1, transparent: true, opacity: 0.06, side: THREE.BackSide, depthWrite: false, blending: THREE.AdditiveBlending })
);
scene.add(glowMesh);

// Halo
const hTex = (() => {
  const cv = document.createElement('canvas'); cv.width = cv.height = 256;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0,'rgba(42,147,193,0.3)'); g.addColorStop(0.5,'rgba(42,147,193,0.06)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(cv);
})();
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(3,3),
  new THREE.MeshBasicMaterial({map:hTex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending})));

scene.add(particlePoints);

// ─── Post ─────────────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.65, 0.4, 0.78);
composer.addPass(bloom);
const gradePass = new ShaderPass({
  uniforms: { tDiffuse: { value: null }, uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uTime; varying vec2 vUv;
    void main() {
      vec2 uv=vUv; float d=length(uv-0.5);
      float ca=d*d*0.006;
      vec3 col=vec3(texture2D(tDiffuse,uv+vec2(ca,0)).r, texture2D(tDiffuse,uv).g, texture2D(tDiffuse,uv-vec2(ca,0)).b);
      col*=mix(0.5,1.0,1.0-smoothstep(0.3,0.85,d));
      float noise=fract(sin(dot(uv+uTime*0.01,vec2(12.9898,78.233)))*43758.5453);
      col+=(noise-0.5)*0.015;
      gl_FragColor=vec4(col,1.0);
    }
  `,
});
composer.addPass(gradePass);
composer.addPass(new OutputPass());

// ─── Mouse ────────────────────────────────────────────────────────────────────
const mouse3D = new THREE.Vector3();
const mouseNDC = new THREE.Vector2();
document.addEventListener('mousemove', (e) => {
  mouseNDC.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  // Unproject to z=0 plane
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouseNDC, camera);
  const t = -camera.position.z / raycaster.ray.direction.z;
  mouse3D.copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, t);
  mouse3D.z = 0;
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ─── Animation ────────────────────────────────────────────────────────────────
let t = 0;
let lastTs = performance.now();
let frameCount = 0, fpsTimer = 0;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTs) * 0.001, 0.05);
  lastTs = ts;
  t += dt;
  frameCount++;
  fpsTimer += dt;
  if (fpsTimer > 1.0) {
    countEl.textContent = `${PARTICLE_COUNT.toLocaleString()} GPU particles · ping-pong FBO · ${Math.round(frameCount/fpsTimer)} fps`;
    frameCount = 0; fpsTimer = 0;
  }

  // ── Step 1: Velocity simulation pass ──────────────────────────────────────
  velSimMat.uniforms.tPos.value   = posRT0.texture;
  velSimMat.uniforms.tVel.value   = velRT0.texture;
  velSimMat.uniforms.uTime.value  = t;
  velSimMat.uniforms.uDT.value    = dt;
  velSimMat.uniforms.uMouse.value.copy(mouse3D);
  simMesh.material = velSimMat;
  renderer.setRenderTarget(velRT1);
  renderer.render(simScene, simCamera);

  // ── Step 2: Position simulation pass ──────────────────────────────────────
  posSimMat.uniforms.tPos.value  = posRT0.texture;
  posSimMat.uniforms.tVel.value  = velRT1.texture; // NEW velocity
  posSimMat.uniforms.uTime.value = t;
  posSimMat.uniforms.uDT.value   = dt;
  simMesh.material = posSimMat;
  renderer.setRenderTarget(posRT1);
  renderer.render(simScene, simCamera);
  renderer.setRenderTarget(null);

  // ── Ping-Pong swap ────────────────────────────────────────────────────────
  [posRT0, posRT1] = [posRT1, posRT0];
  [velRT0, velRT1] = [velRT1, velRT0];

  // ── Update render material with NEW positions ──────────────────────────────
  particleRenderMat.uniforms.tPos.value  = posRT0.texture;
  particleRenderMat.uniforms.tVel.value  = velRT0.texture;
  particleRenderMat.uniforms.uTime.value = t;

  // Orb animation
  orb.rotation.y = t * 0.15;
  orbMat.ior = 1.42 + 0.06 * Math.sin(t * 1.1);

  // Camera gentle orbit
  camera.position.x = Math.sin(t * 0.08) * 0.6;
  camera.position.y = Math.cos(t * 0.055) * 0.4;
  camera.lookAt(0, 0, 0);

  bgMat.uniforms.uTime.value     = t;
  gradePass.uniforms.uTime.value = t;

  composer.render();
}
animate(performance.now());
</script>
