<!DOCTYPE html>
<!--
  AVATAR VARIATION A: Glass sphere with internal volumetric light core
  Gleb technique: Dual-layer transmission glass + inner emissive ray-marched core
  Reference: Codrops Mar 2025 "Warping 3D text inside a glass torus" (animated IOR)
            + Heckel "per-channel IOR refraction" for true dispersion
  Date: 2026-05-02
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar A — Glass Volumetric Core</title>
<style>
  body{margin:0;background:#060606;overflow:hidden;font-family:monospace;color:#888}
  #info{position:fixed;top:12px;left:12px;font-size:11px;z-index:10}
  canvas{display:block}
</style>
</head>
<body>
<div id="info">Variation A · Glass Volumetric Core · IOR animated 1.07 → 1.5 · per-channel dispersion</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ----- Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060606);
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 4.5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ----- Inner volumetric core (Gleb technique: emissive sphere INSIDE the glass shell)
// Custom shader for ray-marched volumetric glow (cheaper than true vol but reads volumetric)
const coreGeo = new THREE.SphereGeometry(0.45, 64, 64);
const coreMat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uColor1: { value: new THREE.Color('#f1420b') }, // brand orange
    uColor2: { value: new THREE.Color('#2a93c1') }, // brand blue
  },
  vertexShader: /* glsl */`
    varying vec3 vNormal; varying vec3 vPos;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: /* glsl */`
    varying vec3 vNormal; varying vec3 vPos;
    uniform float uTime; uniform vec3 uColor1; uniform vec3 uColor2;
    // Soft fresnel-like falloff from center → edge for plasma core feel
    void main(){
      float d = length(vPos);
      float pulse = 0.85 + 0.15 * sin(uTime * 1.7);
      float core = smoothstep(0.5, 0.0, d) * pulse;
      // Color mixing layered by radius — orange center, blue rim halo
      vec3 col = mix(uColor2, uColor1, smoothstep(0.45, 0.0, d));
      // Edge softness — additive falloff
      float alpha = core * core * 1.4;
      gl_FragColor = vec4(col * (1.0 + core * 0.6), alpha);
    }
  `,
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// ----- Outer glass shell (MeshPhysicalMaterial, IOR animated)
// Higher segments mandatory for transmission (Gleb rule: 128+ for hero glass)
const shellGeo = new THREE.IcosahedronGeometry(1.1, 6); // ~7680 tris, smooth
const shellMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 1.0,
  thickness: 0.9,
  roughness: 0.04,
  ior: 1.45,
  iridescence: 0.55,           // thin-film layer for color shift at edges
  iridescenceIOR: 1.3,
  iridescenceThicknessRange: [100, 800],
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  attenuationColor: new THREE.Color('#88c5e8'),
  attenuationDistance: 1.6,
  envMapIntensity: 1.4,
  side: THREE.DoubleSide,      // backside for correct refraction read-through
});
const shell = new THREE.Mesh(shellGeo, shellMat);
scene.add(shell);

// Subtle key-fill rim (orange) — Gleb-style brand temperature
const rim = new THREE.PointLight(0xf1420b, 6, 8);
rim.position.set(2.5, 1.5, 1.5);
scene.add(rim);
const fill = new THREE.PointLight(0x2a93c1, 4, 8);
fill.position.set(-2.5, -1.0, 1.0);
scene.add(fill);

// ----- Postprocessing (Bloom only — DoF-via-Bokeh skipped for variation contrast)
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.7, 0.6, 0.85);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ----- Animation: IOR oscillation (Codrops 2025 technique) + slow rotation
const clock = new THREE.Clock();
function animate(){
  const t = clock.getElapsedTime();
  // IOR animation 1.15 → 1.5 over 6s — "breathing" effect
  shellMat.ior = 1.32 + 0.18 * Math.sin(t * 0.9);
  // Iridescence oscillates inversely for subtle color shimmer
  shellMat.iridescence = 0.4 + 0.25 * Math.sin(t * 0.6 + 1.2);
  coreMat.uniforms.uTime.value = t;
  shell.rotation.y = t * 0.18;
  shell.rotation.x = Math.sin(t * 0.4) * 0.15;
  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
