<!DOCTYPE html>
<!--
  AVATAR VARIATION C: Particle-based form with bloom-driven aesthetic
  Gleb technique: 8k GPU points orbiting an SDF attractor (ovoid figure shape) +
                 strong bloom + per-particle brand color gradient
  Reference: Gleb's particle plasma work + S40 godrays/organic particles study
  Date: 2026-05-02
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar C — Particle Bloom Form</title>
<style>
  body{margin:0;background:#040408;overflow:hidden;font-family:monospace;color:#888}
  #info{position:fixed;top:12px;left:12px;font-size:11px;z-index:10}
</style>
</head>
<body>
<div id="info">Variation C · Particle Bloom Form · 8k GPU points · SDF attractor · brand gradient</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040408);
scene.fog = new THREE.FogExp2(0x040408, 0.08); // gentle fog → depth read

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 5.5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ----- Particle cloud constrained to ovoid SDF
const COUNT = 8000;
const positions = new Float32Array(COUNT * 3);
const seeds = new Float32Array(COUNT * 3); // per-particle randomness (phase, radius offset, color mix)
const colors = new Float32Array(COUNT * 3);

const c1 = new THREE.Color('#f1420b'); // orange
const c2 = new THREE.Color('#2a93c1'); // blue
const cWhite = new THREE.Color('#ffffff');

for (let i = 0; i < COUNT; i++) {
  // Sample inside ovoid (figure-suggestion shape: vertical-elongated)
  // Rejection sample: keep points whose normalized squared dist (with y-stretch 0.6) < 1
  let x, y, z;
  do {
    x = (Math.random() * 2 - 1);
    y = (Math.random() * 2 - 1) * 1.5; // tall
    z = (Math.random() * 2 - 1);
  } while ((x*x + (y/1.5)*(y/1.5) + z*z) > 1.0);

  positions[i*3]   = x * 0.95;
  positions[i*3+1] = y * 0.95;
  positions[i*3+2] = z * 0.95;

  seeds[i*3]   = Math.random() * Math.PI * 2; // phase
  seeds[i*3+1] = Math.random();               // amplitude
  seeds[i*3+2] = Math.random();               // color mix

  // Color = vertical gradient (orange bottom → blue top) + occasional bright white sparkles
  const tcol = (y + 1.5) / 3;
  const col = c1.clone().lerp(c2, tcol);
  if (Math.random() > 0.97) col.copy(cWhite); // 3% sparkle
  colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
}

const pgeo = new THREE.BufferGeometry();
pgeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
pgeo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 3));
pgeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const pmat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uPixelRatio: { value: Math.min(devicePixelRatio, 2) },
    uSize: { value: 16.0 },
  },
  vertexShader: /* glsl */`
    attribute vec3 aSeed;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uTime; uniform float uPixelRatio; uniform float uSize;

    void main(){
      vColor = color;
      vec3 p = position;

      // Per-particle orbit: small swirl around its rest position
      // (suggests "alive" without breaking shape readability)
      float phase = aSeed.x;
      float amp = 0.04 + 0.06 * aSeed.y;
      p.x += sin(uTime * 0.8 + phase) * amp;
      p.y += cos(uTime * 0.7 + phase * 1.3) * amp * 0.5;
      p.z += sin(uTime * 0.9 + phase * 0.7) * amp;

      // Soft "breathing" — whole cloud expands/contracts ±5%
      float breath = 1.0 + sin(uTime * 0.6) * 0.04;
      p *= breath;

      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      // Size attenuation by depth — particles near camera bigger
      gl_PointSize = uSize * uPixelRatio * (1.0 / -mv.z);
      gl_Position = projectionMatrix * mv;

      // Alpha by depth — far particles fade (creates volumetric depth read)
      vAlpha = smoothstep(8.0, 2.0, -mv.z);
    }
  `,
  fragmentShader: /* glsl */`
    varying vec3 vColor; varying float vAlpha;
    void main(){
      // Soft circular point with hot center for bloom catch
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float core = smoothstep(0.5, 0.0, d);
      // Squared falloff = sharp center, soft halo (bloom feeds on this)
      float intensity = core * core * 1.6;
      gl_FragColor = vec4(vColor * (1.0 + intensity * 0.5), intensity * vAlpha);
    }
  `,
  vertexColors: true,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

const points = new THREE.Points(pgeo, pmat);
scene.add(points);

// ----- Postprocessing: bloom is the aesthetic primary here
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
// Stronger bloom intensity than A/B — but threshold low enough that bloom feeds particle cores
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.1, 0.85, 0.4));
composer.addPass(new OutputPass());

const clock = new THREE.Clock();
function animate(){
  const t = clock.getElapsedTime();
  pmat.uniforms.uTime.value = t;
  points.rotation.y = t * 0.08; // very slow form rotation
  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  pmat.uniforms.uPixelRatio.value = Math.min(devicePixelRatio, 2);
});
</script>
</body>
</html>
