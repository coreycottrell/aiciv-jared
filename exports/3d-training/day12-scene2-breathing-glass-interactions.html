<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 12 Scene 2 — Breathing Glass + Micro Interactions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060606; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }

  /* Hover cursor */
  #cursor {
    position: fixed;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(42,147,193,0.7);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.15s, height 0.15s, border-color 0.15s, background 0.15s;
    z-index: 100;
    mix-blend-mode: screen;
  }
  #cursor.hover {
    width: 40px;
    height: 40px;
    border-color: rgba(241,66,11,0.9);
    background: rgba(241,66,11,0.07);
  }

  #info {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
    text-align: center;
  }
  #info span {
    color: rgba(42,147,193,0.8);
  }

  #tooltip {
    position: fixed;
    background: rgba(10,14,20,0.92);
    border: 1px solid rgba(42,147,193,0.3);
    color: rgba(255,255,255,0.85);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  #tooltip.visible { opacity: 1; }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="info">Day 12 — Breathing Glass &nbsp;<span>|</span>&nbsp; Hover the orbs</div>
<canvas id="c"></canvas>
<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Renderer ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 80);
camera.position.set(0, 0, 9);

// ─── PMREM Environment ────────────────────────────────────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileCubemapShader();
const envScene = new THREE.Scene();
[
  { col: 0x4ab8ff, pos: [5, 7, 3],  int: 9  },
  { col: 0x2a93c1, pos: [-5, 2, 2], int: 4  },
  { col: 0xf1420b, pos: [1, -2,-6], int: 2.5},
  { col: 0xffffff, pos: [0, 10, 0], int: 3  },
].forEach(({ col, pos, int }) => {
  const l = new THREE.PointLight(col, int, 50);
  l.position.set(...pos);
  envScene.add(l);
});
scene.environment = pmrem.fromScene(envScene).texture;
pmrem.dispose();

// ─── BREATHING GLASS — Core GLSL technique ────────────────────────────────────
// Simulates drei's temporalDistortion: animated surface normal perturbation
// that distorts the transmission refraction, making the glass "breathe"

const breathingVert = /* glsl */`
  uniform float uTime;
  uniform float uBreath;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  // Simple 3D noise for surface perturbation
  vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+10.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
      i.z + vec4(0.0, i1.z, i2.z, 1.0)) +
      i.y + vec4(0.0, i1.y, i2.y, 1.0)) +
      i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }

  void main() {
    vUv = uv;
    vNormal = normalMatrix * normal;

    // Animated normal perturbation: the breathing effect
    float waveTime = uTime * 0.18;
    float n = snoise(vec3(position * 1.6 + waveTime));
    float n2 = snoise(vec3(position * 3.2 - waveTime * 0.7)) * 0.5;

    // Displace along normal for surface wave
    vec3 displaced = position + normal * (n + n2) * uBreath;

    vWorldPos = (modelMatrix * vec4(displaced, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
  }
`;

const breathingFrag = /* glsl */`
  uniform float uTime;
  uniform vec3 uColor;
  uniform float uGlow;
  uniform float uIridescenceStrength;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(cameraPosition - vWorldPos);
    float NdotV = max(dot(N, V), 0.0);

    // Fresnel
    float fresnel = pow(1.0 - NdotV, 3.0);

    // Iridescence approximation: hue shifts with viewing angle
    float iridPhase = NdotV * 3.14159 * 2.0 + uTime * 0.3;
    vec3 iridColor = vec3(
      0.5 + 0.5 * cos(iridPhase + 0.0),
      0.5 + 0.5 * cos(iridPhase + 2.094),
      0.5 + 0.5 * cos(iridPhase + 4.189)
    );

    // Base glass color
    vec3 baseColor = uColor;

    // Mix base + iridescence at fresnel rim
    vec3 finalColor = mix(baseColor, iridColor, fresnel * uIridescenceStrength);

    // Glass rim glow
    float rimGlow = pow(1.0 - NdotV, 2.0);
    finalColor += uColor * rimGlow * uGlow;

    // Transmission: glass is mostly transparent in center, reflective at edges
    float alpha = 0.04 + fresnel * 0.55;

    gl_FragColor = vec4(finalColor, alpha);
  }
`;

// ─── ORB DATA ─────────────────────────────────────────────────────────────────
const orbData = [
  {
    pos: [-3.0, 0.2, 0],
    radius: 0.85,
    color: new THREE.Color(0x2a93c1),
    breathAmp: 0.025,
    iridStrength: 0.5,
    glow: 0.35,
    label: 'Cognition Core',
    sublabel: 'Neural pattern processing',
  },
  {
    pos: [0, 0, 0],
    radius: 1.1,
    color: new THREE.Color(0x5ad4ff),
    breathAmp: 0.032,
    iridStrength: 0.6,
    glow: 0.45,
    label: 'Pure Intelligence',
    sublabel: 'Unified field awareness',
  },
  {
    pos: [3.0, 0.2, 0],
    radius: 0.78,
    color: new THREE.Color(0xf1420b),
    breathAmp: 0.020,
    iridStrength: 0.45,
    glow: 0.40,
    label: 'Action Engine',
    sublabel: 'Decision crystallization',
  },
];

const orbs = orbData.map(d => {
  const mat = new THREE.ShaderMaterial({
    vertexShader: breathingVert,
    fragmentShader: breathingFrag,
    uniforms: {
      uTime:                { value: 0 },
      uColor:               { value: d.color.clone() },
      uBreath:              { value: d.breathAmp },
      uGlow:                { value: d.glow },
      uIridescenceStrength: { value: d.iridStrength },
    },
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
  });

  const geo = new THREE.SphereGeometry(d.radius, 96, 96);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...d.pos);

  // Inner emissive core
  const coreMat = new THREE.MeshStandardMaterial({
    color: d.color,
    emissive: d.color,
    emissiveIntensity: 0.4,
    roughness: 0.3,
    metalness: 0.6,
    transparent: true,
    opacity: 0.08,
    depthWrite: false,
  });
  const core = new THREE.Mesh(new THREE.SphereGeometry(d.radius * 0.65, 64, 64), coreMat);
  mesh.add(core);

  // Outer thin glass shell (ring-like glow)
  const outerMat = new THREE.MeshPhysicalMaterial({
    transmission: 0.97,
    thickness: 0.05,
    roughness: 0.02,
    ior: 1.45,
    envMapIntensity: 2.5,
    transparent: true,
    opacity: 0.0,
    depthWrite: false,
  });
  const outer = new THREE.Mesh(new THREE.SphereGeometry(d.radius * 1.08, 64, 64), outerMat);
  outer.visible = false; // activated on hover
  mesh.add(outer);

  scene.add(mesh);
  return {
    mesh,
    core,
    outerMesh: outer,
    outerMat,
    data: d,
    baseY: d.pos[1],
    hovered: false,
    hoverT: 0,
    // For hover scale spring
    scaleTarget: 1.0,
    scaleCurrent: 1.0,
    scaleVelocity: 0.0,
  };
});

// ─── CONNECTION LINES ─────────────────────────────────────────────────────────
// Animated curved lines connecting the three orbs

function buildConnectionLine(posA, posB, color) {
  const segments = 80;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    // Quadratic bezier with apex lifted
    const mid = new THREE.Vector3().lerpVectors(posA, posB, 0.5);
    mid.y += 0.8;
    const a = new THREE.Vector3().lerpVectors(posA, mid, t);
    const b = new THREE.Vector3().lerpVectors(mid, posB, t);
    points.push(new THREE.Vector3().lerpVectors(a, b, t));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color,
    transparent: true,
    opacity: 0.22,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  return new THREE.Line(geo, mat);
}

const connections = [
  buildConnectionLine(
    new THREE.Vector3(-3, 0.2, 0),
    new THREE.Vector3(0, 0, 0),
    0x2a93c1
  ),
  buildConnectionLine(
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(3, 0.2, 0),
    0xf1420b
  ),
];
connections.forEach(c => scene.add(c));

// ─── ANIMATED PULSE RINGS (micro interaction feedback) ────────────────────────
const pulseRings = [];
function spawnPulseRing(position, color) {
  const geo = new THREE.RingGeometry(0.01, 0.04, 64);
  const mat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: 0.9,
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.position.copy(position);
  ring.lookAt(camera.position);
  scene.add(ring);
  pulseRings.push({ mesh: ring, t: 0, maxT: 1.8, color });
}

// ─── PARTICLE HALO (spawns around hovered orb) ───────────────────────────────
const haloData = orbs.map(orbObj => {
  const count = 200;
  const positions = new Float32Array(count * 3);
  const phases = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const r = orbObj.data.radius + 0.15 + Math.random() * 0.3;
    positions[i*3]   = r * Math.sin(ph) * Math.cos(th);
    positions[i*3+1] = r * Math.cos(ph);
    positions[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    phases[i] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: orbObj.data.color,
    size: 0.025,
    transparent: true,
    opacity: 0.0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  pts.position.copy(orbObj.mesh.position);
  scene.add(pts);
  return { pts, mat, phases, basePositions: positions.slice() };
});

// ─── POST PROCESSING ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.55, 0.45, 0.84);
composer.addPass(bloom);

const caVigPass = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    uCA: { value: 0.0018 },
    uVig: { value: 0.52 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uCA;
    uniform float uVig;
    varying vec2 vUv;
    void main() {
      vec2 c = vec2(0.5);
      vec2 d = vUv - c;
      float r = texture2D(tDiffuse, vUv + d * uCA).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - d * uCA).b;
      float vig = 1.0 - smoothstep(0.42, 0.98, length(d) * uVig);
      gl_FragColor = vec4(r, g, b, 1.0) * vig;
    }
  `,
});
composer.addPass(caVigPass);
composer.addPass(new OutputPass());

// ─── RAYCASTER / INTERACTIONS ─────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-10, -10);
const mousePx = new THREE.Vector2(0, 0);
const cursor = document.getElementById('cursor');
const tooltip = document.getElementById('tooltip');

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  mousePx.set(e.clientX, e.clientY);
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

window.addEventListener('click', e => {
  // Spawn pulse ring on hovered orb
  const hoveredOrb = orbs.find(o => o.hovered);
  if (hoveredOrb) {
    const pos = hoveredOrb.mesh.position.clone();
    pos.z += hoveredOrb.data.radius * 1.1;
    spawnPulseRing(pos, hoveredOrb.data.color);
    // Kick scale spring
    hoveredOrb.scaleVelocity += 0.15;
  }
});

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
// Subtle dark gradient background via wide plane
const bgMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      float t = uTime * 0.04;
      float gx = sin(vUv.x * 2.0 + t) * 0.5 + 0.5;
      float gy = cos(vUv.y * 1.5 - t * 0.7) * 0.5 + 0.5;
      float blend = gx * gy;
      vec3 dark = vec3(0.012, 0.016, 0.022);
      vec3 tint = vec3(0.02, 0.055, 0.075);
      gl_FragColor = vec4(mix(dark, tint, blend * 0.45), 1.0);
    }
  `,
  side: THREE.BackSide,
  depthWrite: false,
});
const bg = new THREE.Mesh(new THREE.PlaneGeometry(40, 25, 1, 1), bgMat);
bg.position.z = -8;
scene.add(bg);

// ─── LIGHTS ───────────────────────────────────────────────────────────────────
const ambLight = new THREE.AmbientLight(0x0a1520, 0.8);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0x4ab8ff, 2.5);
dirLight.position.set(3, 5, 5);
scene.add(dirLight);

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ─── ANIMATION ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  // Raycaster hit test
  raycaster.setFromCamera(mouse, camera);
  const meshes = orbs.map(o => o.mesh);
  const hits = raycaster.intersectObjects(meshes);
  const hitOrb = hits.length > 0 ? hits[0].object : null;

  let anyHovered = false;
  orbs.forEach((orbObj, idx) => {
    const isHovered = orbObj.mesh === hitOrb;
    orbObj.hovered = isHovered;
    if (isHovered) anyHovered = true;

    // Smooth hover transition
    orbObj.hoverT += ((isHovered ? 1 : 0) - orbObj.hoverT) * 0.08;

    // Scale spring physics
    const springK = 220;
    const damping = 18;
    const targetScale = 1.0 + orbObj.hoverT * 0.12;
    const springForce = (targetScale - orbObj.scaleCurrent) * springK;
    const dampForce = orbObj.scaleVelocity * damping;
    orbObj.scaleVelocity += (springForce - dampForce) * delta;
    orbObj.scaleCurrent += orbObj.scaleVelocity * delta;
    orbObj.mesh.scale.setScalar(orbObj.scaleCurrent);

    // Halo particles fade in/out
    haloData[idx].mat.opacity = orbObj.hoverT * 0.6;
    // Animate halo particle positions
    if (orbObj.hoverT > 0.05) {
      const bp = haloData[idx].basePositions;
      const pos = haloData[idx].pts.geometry.attributes.position.array;
      const count = bp.length / 3;
      for (let i = 0; i < count; i++) {
        const ph = haloData[idx].phases[i];
        const pulse = 1.0 + Math.sin(elapsed * 2.2 + ph) * 0.04;
        pos[i*3]   = bp[i*3]   * pulse;
        pos[i*3+1] = bp[i*3+1] * pulse;
        pos[i*3+2] = bp[i*3+2] * pulse;
      }
      haloData[idx].pts.geometry.attributes.position.needsUpdate = true;
    }

    // Outer glow mesh appears on hover
    orbObj.outerMesh.visible = orbObj.hoverT > 0.05;
    if (orbObj.outerMesh.visible) {
      orbObj.outerMesh.material.opacity = orbObj.hoverT * 0.08;
    }

    // Update shader uniforms
    orbObj.mesh.material.uniforms.uTime.value = elapsed;
    // Increase breath amplitude on hover
    orbObj.mesh.material.uniforms.uBreath.value =
      orbObj.data.breathAmp + orbObj.hoverT * orbObj.data.breathAmp * 1.5;
    // Increase glow on hover
    orbObj.mesh.material.uniforms.uGlow.value =
      orbObj.data.glow + orbObj.hoverT * 0.8;

    // Float animation with unique phase offset
    const fid = idx * 17.3;
    orbObj.mesh.position.y = orbObj.baseY
      + Math.sin(elapsed * 0.55 + fid) * 0.08
      + Math.sin(elapsed * 0.38 + fid * 0.7) * 0.025;
    orbObj.mesh.rotation.y = elapsed * 0.07 + idx * 1.2;

    // Sync halo
    haloData[idx].pts.position.y = orbObj.mesh.position.y;

    // Tooltip on hover
    if (isHovered) {
      tooltip.innerHTML = `<strong>${orbObj.data.label}</strong><br><span style="color:rgba(255,255,255,0.5);font-size:11px">${orbObj.data.sublabel}</span>`;
      tooltip.style.left = (mousePx.x + 20) + 'px';
      tooltip.style.top = (mousePx.y - 35) + 'px';
      tooltip.classList.add('visible');
    }
  });

  if (!anyHovered) {
    tooltip.classList.remove('visible');
    cursor.classList.remove('hover');
  } else {
    cursor.classList.add('hover');
  }

  // Connection line pulse
  connections.forEach((line, i) => {
    const t = (elapsed * 0.6 + i * Math.PI) % (Math.PI * 2);
    line.material.opacity = 0.12 + 0.12 * Math.sin(t);
  });

  // Pulse rings
  for (let i = pulseRings.length - 1; i >= 0; i--) {
    const pr = pulseRings[i];
    pr.t += delta;
    if (pr.t > pr.maxT) {
      scene.remove(pr.mesh);
      pr.mesh.geometry.dispose();
      pr.mesh.material.dispose();
      pulseRings.splice(i, 1);
      continue;
    }
    const progress = pr.t / pr.maxT;
    const eased = 1 - (1 - progress) * (1 - progress);
    const scale = 1 + eased * 5;
    pr.mesh.scale.setScalar(scale);
    pr.mesh.material.opacity = (1 - eased) * 0.85;
    pr.mesh.lookAt(camera.position);
  }

  bgMat.uniforms.uTime.value = elapsed;

  composer.render();
}

animate();
</script>
</body>
