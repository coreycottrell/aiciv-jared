<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureBrain — Loading Transition</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #2a93c1;
    --orange: #f1420b;
    --dark:   #0a0a0f;
    --text:   #e8eaf0;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  #loader-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  /* ── Loader HUD ────────────────────────────────────── */
  #loader-hud {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .loader-logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin-bottom: 32px;
    opacity: 0;
    animation: hud-fade-in 0.6s ease 0.2s forwards;
  }
  .loader-logo .blue   { color: var(--blue); }
  .loader-logo .orange { color: var(--orange); }

  /* Progress bar */
  .progress-track {
    width: 200px;
    height: 2px;
    background: rgba(42,147,193,0.15);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 20px;
    opacity: 0;
    animation: hud-fade-in 0.6s ease 0.4s forwards;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--blue), #5ad4ff);
    border-radius: 100px;
    transition: width 0.08s linear;
  }

  .loader-status {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(232,234,240,0.45);
    opacity: 0;
    animation: hud-fade-in 0.6s ease 0.6s forwards;
    min-height: 18px;
  }

  /* Completion state */
  .loader-complete {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  .loader-complete.show {
    animation: complete-appear 0.8s ease forwards;
  }
  .checkmark {
    width: 56px; height: 56px;
    border: 2px solid var(--blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: var(--blue);
    margin-bottom: 16px;
    transform: scale(0);
    animation: check-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
  }
  .complete-text {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    opacity: 0;
    animation: hud-fade-in 0.4s ease 0.4s forwards;
  }
  .complete-sub {
    font-size: 0.78rem;
    color: rgba(232,234,240,0.45);
    margin-top: 6px;
    opacity: 0;
    animation: hud-fade-in 0.4s ease 0.6s forwards;
  }

  @keyframes hud-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes complete-appear {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes check-pop {
    from { transform: scale(0); } to { transform: scale(1); }
  }

  /* Replay button — shown after completion */
  #replay-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    padding: 12px 32px;
    background: rgba(42,147,193,0.12);
    border: 1px solid rgba(42,147,193,0.30);
    border-radius: 100px;
    color: var(--blue);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s, background 0.2s;
    backdrop-filter: blur(8px);
  }
  #replay-btn.show { opacity: 1; }
  #replay-btn:hover { background: rgba(42,147,193,0.22); }

  /* Usage note */
  #usage-note {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-size: 0.72rem;
    color: rgba(232,234,240,0.30);
    letter-spacing: 0.04em;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="loader-canvas"></canvas>

<!-- HUD overlay -->
<div id="loader-hud">
  <div class="loader-logo">
    <span class="blue">PUREBR</span><span class="orange">AI</span><span class="blue">N</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="loader-status" id="loader-status">Initializing AI Team...</div>
</div>

<div class="loader-complete" id="loader-complete">
  <div class="checkmark">✓</div>
  <div class="complete-text">Your AI team is ready</div>
  <div class="complete-sub">Entering workspace</div>
</div>

<button id="replay-btn">Replay Animation</button>
<div id="usage-note">Production loading state — use between page transitions or during assessment flow</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }     from 'three/addons/postprocessing/ShaderPass.js';

// ─── Status messages — cycle during load ────────────────────────────────────
const STATUS_MESSAGES = [
  'Initializing AI Team...',
  'Loading intelligence modules...',
  'Calibrating strategy engine...',
  'Connecting agents...',
  'Synchronizing knowledge base...',
  'Briefing your team...',
  'Almost ready...',
];

// ─── Scene Setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('loader-canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, W() / H(), 0.1, 50);
camera.position.set(0, 0, 6);

// Lighting
scene.add(new THREE.AmbientLight(0x0d1a25, 0.8));
const kl = new THREE.PointLight(0x2a93c1, 12, 30);
kl.position.set(3, 3, 2);
scene.add(kl);
const rl = new THREE.PointLight(0xf1420b, 5, 25);
rl.position.set(-3, -2, 2);
scene.add(rl);
const wl = new THREE.PointLight(0xffffff, 3, 20);
wl.position.set(0, 4, -2);
scene.add(wl);

// PMREM
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const es = new THREE.Scene();
es.add(new THREE.AmbientLight(0x1a3a5c, 1.0));
const ep = new THREE.PointLight(0x5ad4ff, 4, 30); ep.position.set(5,5,5);
es.add(ep);
const ep2 = new THREE.PointLight(0xf1420b, 2, 20); ep2.position.set(-4,-3,2);
es.add(ep2);
scene.environment = pmrem.fromScene(es, 0.05).texture;

// ─── Background ─────────────────────────────────────────────────────────────
const bgMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite: false,
  uniforms: { uTime: { value: 0 }, uProgress: { value: 0 } },
  vertexShader: `varying vec3 vPos; void main() { vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    varying vec3 vPos;
    uniform float uTime, uProgress;
    void main() {
      float y = vPos.y / 25.0;
      // Background brightens slightly as loading progresses
      float bright = mix(0.0, 0.04, uProgress);
      vec3 col = vec3(0.016 + bright, 0.016 + bright * 0.5, 0.026 + bright * 0.8);
      // Rim blue at top
      col = mix(col, vec3(0.04, 0.10, 0.18), smoothstep(0.5, 1.0, y * 0.5 + 0.5));
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(25, 16, 16), bgMat));

// ─── CORE: The glass orb that assembles ─────────────────────────────────────
// The central concept: glass sphere starts "empty" (transparent/rough), assembles itself
// to full glass quality as the loading progresses

const coreGeo = new THREE.SphereGeometry(1.0, 128, 128);
const coreMat = new THREE.MeshPhysicalMaterial({
  transmission:   1.0,
  thickness:      1.4,
  roughness:      0.80,   // starts rough — will animate to 0.03
  ior:            1.52,
  color:          new THREE.Color(0x2a93c1),
  iridescence:    0.0,    // starts 0 — will animate to 0.5
  iridescenceIOR: 1.40,
  iridescenceThicknessRange: [90, 380],
  clearcoat:      0.0,    // starts 0 — animates to 0.92
  clearcoatRoughness: 0.5,
  envMapIntensity: 0.5,   // starts dim — brightens
  depthWrite:     false,
  specularIntensity: 0.5,
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// ─── Assembly ring — sweeps around as sphere "forms" ────────────────────────
const assembleRingMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:     { value: 0 },
    uProgress: { value: 0 },  // 0-1
    uColor:    { value: new THREE.Color(0x2a93c1) },
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
  vertexShader: `
    uniform float uTime, uProgress;
    varying vec2 vUv;
    varying float vAngle;
    void main() {
      vUv    = uv;
      // Expand ring outward as progress increases
      vec3 pos = position;
      pos *= 1.0 + uProgress * 0.3;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      vAngle = atan(pos.y, pos.x);
    }
  `,
  fragmentShader: `
    uniform float uTime, uProgress;
    uniform vec3 uColor;
    varying vec2 vUv;
    varying float vAngle;
    void main() {
      // Arc that fills from 0 to uProgress (full circle)
      float PI2 = 6.28318;
      float angle = mod(vAngle + PI2, PI2) / PI2;    // 0-1 angle
      // Add a leading sweep — bright head, fading trail
      float head = mod(angle - uProgress + 1.0, 1.0);
      float arc  = 1.0 - step(uProgress, angle);    // filled portion
      float leadBright = smoothstep(0.12, 0.0, head) * arc;
      float base = arc * 0.35;
      float alpha = (base + leadBright * 0.65) * smoothstep(0.0, 0.02, uProgress)
                  * smoothstep(1.0, 0.92, uProgress);  // fade out at complete
      gl_FragColor = vec4(uColor + leadBright * 0.4, alpha);
    }
  `,
});

// Two assembly rings at different orientations
const ring1 = new THREE.Mesh(new THREE.RingGeometry(1.08, 1.14, 128, 1), assembleRingMat);
const ring2 = new THREE.Mesh(new THREE.RingGeometry(1.02, 1.07, 128, 1), assembleRingMat.clone());
ring1.rotation.x = Math.PI / 2;
ring2.rotation.y = Math.PI / 2;
ring2.material.uniforms.uColor.value = new THREE.Color(0xf1420b);
scene.add(ring1);
scene.add(ring2);

// ─── Orbit particles — appear one by one during load ────────────────────────
const OP_COUNT = 80;
const opPos   = new Float32Array(OP_COUNT * 3);
const opPh    = new Float32Array(OP_COUNT);
const opSz    = new Float32Array(OP_COUNT);
const opBirth = new Float32Array(OP_COUNT);  // when this particle appears (0-1 progress)

for (let i = 0; i < OP_COUNT; i++) {
  const r = 1.6 + Math.random() * 1.4;
  const theta = Math.random() * Math.PI * 2;
  const phi   = (Math.random() - 0.5) * Math.PI;
  opPos[i*3]   = r * Math.cos(phi) * Math.cos(theta);
  opPos[i*3+1] = r * Math.sin(phi);
  opPos[i*3+2] = r * Math.cos(phi) * Math.sin(theta);
  opPh[i]      = Math.random() * Math.PI * 2;
  opSz[i]      = 1.5 + Math.random() * 2.5;
  opBirth[i]   = (i / OP_COUNT) * 0.85;  // staggered appearance
}

const opGeo = new THREE.BufferGeometry();
opGeo.setAttribute('position', new THREE.BufferAttribute(opPos, 3));
opGeo.setAttribute('aPhase',   new THREE.BufferAttribute(opPh, 1));
opGeo.setAttribute('aSize',    new THREE.BufferAttribute(opSz, 1));
opGeo.setAttribute('aBirth',   new THREE.BufferAttribute(opBirth, 1));

const opMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:     { value: 0 },
    uProgress: { value: 0 },
    uBlue:     { value: new THREE.Color(0x2a93c1) },
    uOrange:   { value: new THREE.Color(0xf1420b) },
  },
  transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float aPhase, aSize, aBirth;
    uniform float uTime, uProgress;
    varying float vAlpha, vIsOrange;

    void main() {
      // Only appear after aBirth progress threshold — grow in
      float appear = smoothstep(aBirth, aBirth + 0.08, uProgress);
      vAlpha   = appear * (0.5 + 0.3 * sin(uTime * 0.6 + aPhase));
      vIsOrange = step(0.82, fract(aPhase * 0.637));

      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = aSize * appear * (200.0 / -mvPos.z);
      gl_Position  = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform vec3 uBlue, uOrange;
    varying float vAlpha, vIsOrange;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      vec3 col = mix(uBlue, uOrange, vIsOrange);
      gl_FragColor = vec4(col, (1.0 - d*d) * vAlpha);
    }
  `,
});
scene.add(new THREE.Points(opGeo, opMat));

// ─── Connection lines to center (appear during load) ──────────────────────
// 6 key agents represented as lines
const LINE_COUNT = 6;
const lineGroup  = new THREE.Group();
for (let i = 0; i < LINE_COUNT; i++) {
  const angle = (i / LINE_COUNT) * Math.PI * 2;
  const r     = 2.2;
  const pts   = [
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(Math.cos(angle) * r, Math.sin(angle * 0.5) * 0.8, Math.sin(angle) * r),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const col = i < 4 ? 0x2a93c1 : 0xf1420b;
  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color(col),
    transparent: true,
    opacity: 0,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const line = new THREE.Line(geo, mat);
  line.userData.birthProgress = (i / LINE_COUNT) * 0.7;
  lineGroup.add(line);
}
scene.add(lineGroup);

// ─── Post-processing ──────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(W(), H()), 0.65, 0.50, 0.80);
composer.addPass(bloom);
const finalPass = new ShaderPass({
  uniforms: {
    tDiffuse:   { value: null },
    uCA:        { value: 0.0015 },
    uVig:       { value: 0.65 },
    uProgress:  { value: 0 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uCA, uVig, uProgress;
    varying vec2 vUv;
    void main() {
      vec2 d = vUv - 0.5;
      // CA diminishes as scene loads (becomes "cleaner" / more resolved)
      float ca = uCA * (1.0 - uProgress * 0.6);
      vec3 c;
      c.r = texture2D(tDiffuse, vUv + d * ca).r;
      c.g = texture2D(tDiffuse, vUv).g;
      c.b = texture2D(tDiffuse, vUv - d * ca).b;
      float v = 1.0 - dot(d,d) * uVig * 1.8;
      // Slight de-saturate at start, full color at end
      float grey = dot(c, vec3(0.299, 0.587, 0.114));
      c = mix(vec3(grey), c, mix(0.6, 1.0, uProgress));
      gl_FragColor = vec4(c * v, 1.0);
    }
  `,
});
composer.addPass(finalPass);

// ─── Loading simulation ────────────────────────────────────────────────────
let progress    = 0;       // 0-1
let isComplete  = false;
let statusIdx   = 0;

const progressFill = document.getElementById('progress-fill');
const statusEl     = document.getElementById('loader-status');
const completeEl   = document.getElementById('loader-complete');
const replayBtn    = document.getElementById('replay-btn');

// Progress increments at variable speed (feels like real async loading)
const progressStages = [
  { target: 0.15, duration: 0.4 },
  { target: 0.35, duration: 0.5 },
  { target: 0.55, duration: 0.3 },
  { target: 0.72, duration: 0.6 },
  { target: 0.88, duration: 0.4 },
  { target: 0.97, duration: 0.3 },
  { target: 1.00, duration: 0.2 },
];

let stageIdx   = 0;
let stageStart = null;
let prevStageVal = 0;

const updateStatus = () => {
  const newIdx = Math.min(
    Math.floor(progress * STATUS_MESSAGES.length),
    STATUS_MESSAGES.length - 1
  );
  if (newIdx !== statusIdx) {
    statusIdx = newIdx;
    statusEl.style.opacity = '0';
    setTimeout(() => {
      statusEl.textContent = STATUS_MESSAGES[statusIdx];
      statusEl.style.opacity = '1';
      statusEl.style.transition = 'opacity 0.25s';
    }, 150);
  }
};

const onComplete = () => {
  isComplete = true;
  // Show completion UI
  setTimeout(() => {
    document.getElementById('loader-hud').style.opacity = '0';
    document.getElementById('loader-hud').style.transition = 'opacity 0.5s';
    completeEl.classList.add('show');
    setTimeout(() => {
      replayBtn.classList.add('show');
    }, 1200);
  }, 300);
};

// ─── Resize ──────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  composer.setSize(W(), H());
  bloom.setSize(W(), H());
});

// ─── Replay ──────────────────────────────────────────────────────────────
replayBtn.addEventListener('click', () => {
  progress = 0;
  stageIdx = 0;
  stageStart = null;
  prevStageVal = 0;
  statusIdx = 0;
  isComplete = false;
  completeEl.classList.remove('show');
  replayBtn.classList.remove('show');
  document.getElementById('loader-hud').style.opacity = '1';
  statusEl.textContent = STATUS_MESSAGES[0];
  progressFill.style.width = '0%';
});

// ─── Animation ────────────────────────────────────────────────────────────
let prevTime = performance.now();

const animate = () => {
  requestAnimationFrame(animate);
  const now   = performance.now();
  const delta = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;
  const elapsed = now * 0.001;

  // ── Progress animation ──
  if (!isComplete) {
    if (stageStart === null) stageStart = elapsed;

    if (stageIdx < progressStages.length) {
      const stage  = progressStages[stageIdx];
      const t      = Math.min((elapsed - stageStart) / stage.duration, 1.0);
      const eased  = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      progress = prevStageVal + (stage.target - prevStageVal) * eased;

      if (t >= 1.0) {
        prevStageVal = stage.target;
        stageIdx++;
        stageStart = elapsed;
      }
    }

    if (progress >= 0.999 && !isComplete) onComplete();

    progressFill.style.width = (progress * 100).toFixed(1) + '%';
    updateStatus();
  }

  // ── Core sphere assembles ──
  // As progress increases, the glass material becomes more refined
  const lerpSpeed = delta * 1.2;
  coreMat.roughness       += (0.03  - coreMat.roughness)       * Math.min(lerpSpeed, 1);
  coreMat.iridescence     += (0.55  - coreMat.iridescence)     * Math.min(lerpSpeed, 1);
  coreMat.clearcoat       += (0.92  - coreMat.clearcoat)       * Math.min(lerpSpeed, 1);
  coreMat.clearcoatRoughness += (0.02 - coreMat.clearcoatRoughness) * Math.min(lerpSpeed, 1);
  coreMat.envMapIntensity += (4.5   - coreMat.envMapIntensity)  * Math.min(lerpSpeed * 0.5, 1);
  coreMat.needsUpdate = true;

  // Core rotation — speeds up as it becomes more real
  const rotSpeed = 0.12 + progress * 0.25;
  core.rotation.y += delta * rotSpeed;
  core.rotation.x  = Math.sin(elapsed * 0.35) * 0.04;

  // Scale pulse — beat pattern during loading, stabilize at complete
  if (!isComplete) {
    const heartbeat = 1.0 + Math.sin(elapsed * 2.8) * 0.02 * (1 - progress * 0.7);
    core.scale.setScalar(heartbeat + progress * 0.05);
  } else {
    core.scale.setScalar(1.0 + Math.sin(elapsed * 0.8) * 0.01);
  }

  // ── Assembly rings ──
  ring1.material.uniforms.uTime.value     = elapsed;
  ring1.material.uniforms.uProgress.value = progress;
  ring2.material.uniforms.uTime.value     = elapsed;
  ring2.material.uniforms.uProgress.value = progress;

  // Rings rotate as they sweep
  ring1.rotation.z = elapsed * 0.4;
  ring2.rotation.x = Math.PI / 2 + elapsed * 0.3;

  // ── Orbit particles ──
  opMat.uniforms.uTime.value     = elapsed;
  opMat.uniforms.uProgress.value = progress;

  // ── Connection lines ──
  lineGroup.children.forEach(line => {
    const lineProgress = Math.min(
      Math.max(progress - line.userData.birthProgress, 0) / 0.1, 1.0
    );
    line.material.opacity = lineProgress * 0.20;
    // Subtle line animation — pulse
    line.material.opacity += Math.sin(elapsed * 1.2 + line.userData.birthProgress * 10) * 0.04 * lineProgress;
  });
  lineGroup.rotation.y = elapsed * 0.08;

  // ── Background ──
  bgMat.uniforms.uTime.value     = elapsed;
  bgMat.uniforms.uProgress.value = progress;

  // ── Final pass progress ──
  finalPass.material.uniforms.uProgress.value = progress;

  // ── Camera ──
  camera.position.z  = 6 - progress * 0.5;  // zoom in slightly as loading completes
  camera.lookAt(0, 0, 0);

  composer.render();
};
animate();
</script>
</body>
</html>
