<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orb Collection — Day 11 | PureBrain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060606; overflow: hidden; }
  canvas { display: block; }
  #overlay {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.28);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    pointer-events: none;
  }
  #label {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.15);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #tooltip {
    position: fixed;
    padding: 6px 12px;
    background: rgba(10,20,35,0.85);
    border: 1px solid rgba(42,147,193,0.3);
    border-radius: 4px;
    color: rgba(255,255,255,0.8);
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    letter-spacing: 0.06em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
<div id="label">Gleb Mastery — Day 11 — Orb Collection</div>
<canvas id="c"></canvas>
<div id="tooltip"></div>
<div id="overlay">Hover orbs to inspect · Click to focus · Drag to orbit</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Renderer ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ─── Scene + Camera ───────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 60);
camera.position.set(0, 1.2, 10);

// ─── Controls ─────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.055;
controls.minDistance = 4;
controls.maxDistance = 18;
controls.maxPolarAngle = Math.PI * 0.60;
controls.target.set(0, 0.3, 0);

// ─── Procedural PMREM Environment ─────────────────────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileCubemapShader();
const probeScene = new THREE.Scene();
// Studio rig with colored lights creates rich IBL reflections on orbs
[
  { color: 0x8de4ff, intensity: 12, pos: [6, 10, 5]  },  // key: cool white
  { color: 0x2a93c1, intensity:  6, pos: [-7, 3, 4]  },  // fill: PureBrain blue
  { color: 0xf1420b, intensity:  4, pos: [1, -2, -7] },  // rim: orange
  { color: 0x4444aa, intensity:  2, pos: [0, -8, 0]  },  // ground bounce: blue-violet
  { color: 0xffffff, intensity:  3, pos: [0, 0, 12]  },  // front bounce: white
].forEach(l => {
  const light = new THREE.PointLight(l.color, l.intensity, 50);
  light.position.set(...l.pos);
  probeScene.add(light);
});
const envTex = pmrem.fromScene(probeScene).texture;
scene.environment = envTex;
pmrem.dispose();

// ─── Scene Lights ─────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x080818, 2.0));
const keyDL = new THREE.DirectionalLight(0xb0e0ff, 2.8);
keyDL.position.set(5, 8, 6);
scene.add(keyDL);
const orangePoint = new THREE.PointLight(0xf1420b, 1.8, 14);
orangePoint.position.set(-2, -1, -4);
scene.add(orangePoint);
const bluePoint = new THREE.PointLight(0x2a93c1, 1.5, 14);
bluePoint.position.set(3, 2, -3);
scene.add(bluePoint);

// ─── Orb Definitions ──────────────────────────────────────────────────────
// Each orb showcases a different glass material technique
const orbDefs = [
  {
    name: 'Pure Transmission',
    desc: 'IOR 1.50, zero roughness, beer-law blue tint',
    pos: [-3.5, 0, 0],
    radius: 0.95,
    mat: {
      transmission: 1.0, thickness: 0.85, roughness: 0.02, ior: 1.50,
      color: '#c8e8ff',
      attenuationColor: '#2a93c1', attenuationDistance: 1.2,
      iridescence: 0.40, iridescenceIOR: 1.38, iridescenceThicknessRange: [80, 350],
      clearcoat: 0.80, clearcoatRoughness: 0.02,
      envMapIntensity: 3.8, reflectivity: 0.92,
      specularColor: '#C8A84A', specularIntensity: 1.0,
    },
    emissiveRing: 0x2a93c1,
  },
  {
    name: 'Heavy Flint Glass',
    desc: 'IOR 1.68, nested-lens depth, strong dispersion',
    pos: [-1.1, 0, 0],
    radius: 0.85,
    mat: {
      transmission: 1.0, thickness: 0.9, roughness: 0.04, ior: 1.68,
      color: '#ddeeff',
      attenuationColor: '#1a60a0', attenuationDistance: 0.7,
      iridescence: 0.55, iridescenceIOR: 1.42, iridescenceThicknessRange: [100, 420],
      clearcoat: 0.90, clearcoatRoughness: 0.01,
      envMapIntensity: 4.0, reflectivity: 0.95,
      specularColor: '#ddcc88', specularIntensity: 1.0,
    },
    emissiveRing: 0x1a70c0,
  },
  {
    name: 'Orange Core Orb',
    desc: 'Beer-law orange attenuation, PureBrain brand',
    pos: [ 1.1, 0, 0],
    radius: 0.90,
    mat: {
      transmission: 1.0, thickness: 0.8, roughness: 0.035, ior: 1.52,
      color: '#ffe0c8',
      attenuationColor: '#e86020', attenuationDistance: 0.6,
      iridescence: 0.30, iridescenceIOR: 1.38, iridescenceThicknessRange: [150, 500],
      clearcoat: 0.70, clearcoatRoughness: 0.03,
      envMapIntensity: 3.5, reflectivity: 0.88,
      specularColor: '#ffddaa', specularIntensity: 1.0,
    },
    emissiveRing: 0xf1420b,
  },
  {
    name: 'Frosted Sapphire',
    desc: 'Surface roughness 0.12, anisotropic brushed look',
    pos: [ 3.5, 0, 0],
    radius: 0.88,
    mat: {
      transmission: 0.92, thickness: 0.75, roughness: 0.12, ior: 1.46,
      color: '#99ccee',
      attenuationColor: '#2a93c1', attenuationDistance: 1.5,
      iridescence: 0.25, iridescenceIOR: 1.38, iridescenceThicknessRange: [60, 280],
      clearcoat: 0.60, clearcoatRoughness: 0.08,
      envMapIntensity: 2.8, reflectivity: 0.75,
      specularColor: '#aabbcc', specularIntensity: 0.8,
    },
    emissiveRing: 0x4499bb,
  },
  {
    name: 'Void Sphere',
    desc: 'Maximum IOR 1.90, extreme refraction',
    pos: [ 0, 2.1, -0.5],
    radius: 0.75,
    mat: {
      transmission: 0.98, thickness: 1.0, roughness: 0.015, ior: 1.90,
      color: '#eeeeff',
      attenuationColor: '#8866ff', attenuationDistance: 0.4,
      iridescence: 0.65, iridescenceIOR: 1.45, iridescenceThicknessRange: [80, 300],
      clearcoat: 0.95, clearcoatRoughness: 0.01,
      envMapIntensity: 4.5, reflectivity: 0.98,
      specularColor: '#eeeeee', specularIntensity: 1.0,
    },
    emissiveRing: 0x8866ff,
  },
];

const orbMeshes = [];
const orbGroup = new THREE.Group();
scene.add(orbGroup);

orbDefs.forEach(def => {
  const geo = new THREE.SphereGeometry(def.radius, 128, 128);
  const mat = new THREE.MeshPhysicalMaterial({
    transmission: def.mat.transmission,
    thickness: def.mat.thickness,
    roughness: def.mat.roughness,
    ior: def.mat.ior,
    color: new THREE.Color(def.mat.color),
    attenuationColor: new THREE.Color(def.mat.attenuationColor),
    attenuationDistance: def.mat.attenuationDistance,
    iridescence: def.mat.iridescence,
    iridescenceIOR: def.mat.iridescenceIOR,
    iridescenceThicknessRange: def.mat.iridescenceThicknessRange,
    clearcoat: def.mat.clearcoat,
    clearcoatRoughness: def.mat.clearcoatRoughness,
    envMapIntensity: def.mat.envMapIntensity,
    reflectivity: def.mat.reflectivity,
    specularColor: new THREE.Color(def.mat.specularColor),
    specularIntensity: def.mat.specularIntensity,
    side: THREE.DoubleSide,
    depthWrite: false,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...def.pos);
  orbGroup.add(mesh);

  // Emissive ring equator
  const ringGeo = new THREE.TorusGeometry(def.radius + 0.005, 0.006, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: def.emissiveRing,
    transparent: true,
    opacity: 0.55,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  mesh.add(ring);

  orbMeshes.push({
    mesh,
    ringMat,
    floatId: Math.random() * 100,
    basePos: [...def.pos],
    baseScale: 1.0,
    hovered: false,
    clicked: false,
    name: def.name,
    desc: def.desc,
  });
});

// ─── Background Field Particles ────────────────────────────────────────────
const BG_COUNT = 600;
const bgPositions = new Float32Array(BG_COUNT * 3);
for (let i = 0; i < BG_COUNT; i++) {
  const r = 5 + Math.random() * 10;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  bgPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  bgPositions[i*3+1] = r * Math.cos(phi);
  bgPositions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
const bgGeo = new THREE.BufferGeometry();
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
const bgMat = new THREE.PointsMaterial({
  color: 0x3a6a8a,
  size: 0.025,
  transparent: true,
  opacity: 0.32,
  sizeAttenuation: true,
});
scene.add(new THREE.Points(bgGeo, bgMat));

// ─── Postprocessing ───────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.60, 0.50, 0.82
);
composer.addPass(bloom);

// CA + Vignette
const caVig = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    uCA: { value: 0.0025 },
    uVig: { value: 0.72 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uCA;
    uniform float uVig;
    varying vec2 vUv;
    void main() {
      vec2 c = vUv - 0.5;
      float d = length(c);
      vec2 dir = normalize(c + vec2(0.001)) * uCA;
      vec3 col;
      col.r = texture2D(tDiffuse, vUv + dir).r;
      col.g = texture2D(tDiffuse, vUv).g;
      col.b = texture2D(tDiffuse, vUv - dir).b;
      float vig = 1.0 - smoothstep(0.38, 1.15, d * uVig);
      gl_FragColor = vec4(col * vig, 1.0);
    }
  `,
});
composer.addPass(caVig);
composer.addPass(new OutputPass());

// ─── Raycasting for hover/click ───────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredOrb = null;
let clickedOrb = null;
let cameraTarget = null;

canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth)  *  2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * -2 + 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
});

canvas.addEventListener('click', () => {
  if (hoveredOrb) {
    clickedOrb = hoveredOrb;
    cameraTarget = hoveredOrb.mesh.position.clone();
  } else {
    clickedOrb = null;
    cameraTarget = null;
  }
});

// ─── Animation ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let ph1 = 0, ph2 = 0, ph3 = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  ph1 += dt * 0.55;
  ph2 += dt * 0.38;
  ph3 += dt * 0.22;

  // Raycasting for hover
  raycaster.setFromCamera(mouse, camera);
  const targets = orbMeshes.map(o => o.mesh);
  const intersects = raycaster.intersectObjects(targets);
  const hit = intersects.length > 0 ? intersects[0].object : null;

  hoveredOrb = null;
  orbMeshes.forEach(orb => {
    // Float animation (each orb has unique phase)
    const fid = orb.floatId;
    const baseY = orb.basePos[1];
    orb.mesh.position.y = baseY + Math.sin(ph1 + fid * 0.5) * 0.08 + Math.sin(ph2 + fid * 0.3) * 0.025;
    orb.mesh.rotation.y = elapsed * 0.08 + fid * 0.2;
    orb.mesh.rotation.x = Math.sin(ph3 + fid) * 0.012;

    // Hover detection
    const isHovered = orb.mesh === hit;
    if (isHovered) hoveredOrb = orb;

    // Smooth scale response to hover
    const targetScale = isHovered ? 1.08 : 1.0;
    orb.mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);

    // Ring opacity pulse on hover
    const pulseFactor = isHovered ? (0.7 + Math.sin(elapsed * 5) * 0.2) : 0.30;
    orb.ringMat.opacity = pulseFactor;
  });

  // Tooltip
  if (hoveredOrb) {
    tooltip.textContent = hoveredOrb.name + ' — ' + hoveredOrb.desc;
    tooltip.style.opacity = '1';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.opacity = '0';
    canvas.style.cursor = '';
  }

  // Camera focus on click
  if (cameraTarget) {
    const idealPos = cameraTarget.clone().add(new THREE.Vector3(0, 0.5, 3.5));
    camera.position.lerp(idealPos, 0.04);
    controls.target.lerp(cameraTarget, 0.06);
  }

  controls.update();
  composer.render();
}

animate();

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W = window.innerWidth, H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  composer.setSize(W, H);
  bloom.resolution.set(W, H);
});
</script>
</body>
</html>
