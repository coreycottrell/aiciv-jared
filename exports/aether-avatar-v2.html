<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Avatar v2 — PureBrain</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pb-blue:   #2a93c1;
    --pb-orange: #f1420b;
    --pb-dark:   #060606;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--pb-dark);
    font-family: 'Inter', system-ui, sans-serif;
  }

  /* =================== LOADING SCREEN =================== */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: #060606;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    transition: opacity 0.9s ease, visibility 0.9s ease;
  }
  #loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loading-logo {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .loading-logo .blue   { color: var(--pb-blue); }
  .loading-logo .orange { color: var(--pb-orange); }

  .loading-ring-wrap {
    position: relative;
    width: 56px;
    height: 56px;
  }
  .loading-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  .loading-ring.outer {
    border: 1.5px solid rgba(42,147,193,0.12);
    border-top-color: var(--pb-blue);
  }
  .loading-ring.inner {
    inset: 10px;
    border: 1.5px solid rgba(241,66,11,0.08);
    border-top-color: rgba(241,66,11,0.35);
    animation-direction: reverse;
    animation-duration: 0.9s;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
  }

  /* =================== CANVAS =================== */
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--pb-dark);
    /* Subtle colored ambient behind the canvas */
  }

  /* Light bleeds — CSS radial gradients, zero GPU cost */
  #wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 52% 52% at 68% 22%, rgba(13,22,245,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 30% 74%, rgba(209,13,206,0.045) 0%, transparent 70%),
      radial-gradient(ellipse 30% 30% at 50% 50%, rgba(24,168,211,0.03) 0%, transparent 60%);
  }

  #canvas-wrap {
    position: relative;
    width: 480px;
    height: 480px;
    z-index: 1;
    /* Subtle box shadow for depth */
    filter: drop-shadow(0 0 60px rgba(42,147,193,0.08));
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 0;
  }

  /* =================== UI OVERLAY =================== */
  #ui-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 36px;
  }

  /* Header: logo + badge */
  #ui-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .logo-mark .blue   { color: var(--pb-blue); }
  .logo-mark .orange { color: var(--pb-orange); }

  .agent-badge {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    font-weight: 400;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 5px 13px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.02);
  }

  /* Mode indicator — right side vertical */
  #mode-indicator {
    position: fixed;
    top: 50%;
    right: 36px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    z-index: 10;
    pointer-events: all;
  }

  .mode-label {
    font-size: 8px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    margin-bottom: 6px;
    pointer-events: none;
  }

  .mode-row {
    display: flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    padding: 2px 0;
    transition: all 0.3s ease;
  }
  .mode-row-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    text-align: right;
    transition: color 0.3s;
    font-weight: 500;
  }
  .mode-row:hover .mode-row-label { color: rgba(255,255,255,0.55); }
  .mode-row.active .mode-row-label { color: rgba(255,255,255,0.7); }

  .mode-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.4s ease;
    flex-shrink: 0;
  }
  .mode-row.active .mode-dot,
  .mode-row:hover .mode-dot {
    transform: scale(1.3);
  }
  .mode-row[data-mode="idle"].active .mode-dot {
    background: var(--pb-blue);
    border-color: var(--pb-blue);
    box-shadow: 0 0 10px rgba(42,147,193,0.7);
  }
  .mode-row[data-mode="speaking"].active .mode-dot {
    background: #ffffff;
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
  }
  .mode-row[data-mode="thinking"].active .mode-dot {
    background: #8866AA;
    border-color: #8866AA;
    box-shadow: 0 0 10px rgba(136,102,170,0.7);
  }
  .mode-row[data-mode="listening"].active .mode-dot {
    background: #00D4FF;
    border-color: #00D4FF;
    box-shadow: 0 0 10px rgba(0,212,255,0.7);
  }

  /* Footer */
  #ui-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  #aether-name {
    line-height: 1;
  }
  #aether-name .big {
    font-size: 80px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.03);
    line-height: 1;
    user-select: none;
  }
  #aether-name .sub {
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    font-weight: 400;
    margin-top: 4px;
  }

  /* Mode buttons */
  #mode-buttons {
    display: flex;
    gap: 8px;
    pointer-events: all;
  }

  .mode-btn {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    color: rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  .mode-btn:hover {
    color: rgba(255,255,255,0.65);
    border-color: rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
  }
  .mode-btn.active {
    color: rgba(255,255,255,0.9);
    border-color: var(--pb-blue);
    background: rgba(42,147,193,0.1);
    box-shadow: 0 0 18px rgba(42,147,193,0.18);
  }
  .mode-btn[data-mode="speaking"].active {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 18px rgba(255,255,255,0.1);
  }
  .mode-btn[data-mode="thinking"].active {
    border-color: #8866AA;
    background: rgba(136,102,170,0.1);
    box-shadow: 0 0 18px rgba(136,102,170,0.2);
  }
  .mode-btn[data-mode="listening"].active {
    border-color: #00D4FF;
    background: rgba(0,212,255,0.07);
    box-shadow: 0 0 18px rgba(0,212,255,0.15);
  }

  /* Status */
  #status-text {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    z-index: 11;
    transition: all 0.6s ease;
    white-space: nowrap;
    pointer-events: none;
    text-align: center;
  }

  /* Audio bars */
  #audio-bars {
    position: fixed;
    bottom: 132px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 18px;
    z-index: 11;
    pointer-events: none;
  }
  .audio-bar {
    width: 2px;
    background: var(--pb-blue);
    border-radius: 2px;
    opacity: 0.35;
    transition: height 0.06s ease;
    min-height: 2px;
  }
  .audio-bar.orange { background: var(--pb-orange); }

  /* Key hint */
  #key-hint {
    position: fixed;
    top: 50%;
    left: 36px;
    transform: translateY(-50%);
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.1);
    z-index: 11;
    pointer-events: none;
    line-height: 2.2;
  }

  /* v2 badge */
  #v2-badge {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    z-index: 11;
    pointer-events: none;
  }
</style>

<!-- THREE.JS from CDN (v0.161.0 — verified working with MeshPhysicalMaterial transmission) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
'use strict';

// =============================================================================
// PUREBRAIN BRAND CONSTANTS
// =============================================================================
const PB_BLUE   = new THREE.Color('#2a93c1');
const PB_ORANGE = new THREE.Color('#f1420b');
const PB_DARK   = new THREE.Color('#060606');
const GOLD      = new THREE.Color('#C8A84A');
const THINKING_PURPLE = new THREE.Color('#8866AA');
const CYAN      = new THREE.Color('#00D4FF');
const WHITE     = new THREE.Color('#ffffff');

// =============================================================================
// AVATAR V2 MODE CONFIGURATIONS
// Jared's approved decisions:
//   - 3 rings (richer visual)
//   - Ring color: Option B for speaking (orange #f1420b tint), Option A for idle
//   - Orange: ADD in v2 — orange emissive spark particles in speaking mode
//   - Canvas: 480px square
// =============================================================================
const MODES = {
  idle: {
    innerColor:      PB_BLUE.clone(),
    innerIntensity:  5.0,
    glassAttColor:   PB_BLUE.clone(),
    glassThickness:  0.8,
    floatAmp:        1.0,
    idleRotSpeed:    0.002,
    gazeRatio:       0.70,
    ringPulse:       false,
    ringColor:       PB_BLUE.clone(),       // Option A: same glass as outer sphere
    sparkActive:     false,                  // Orange sparks off in idle
    statusText:      'Idle — hover to interact',
    synthMode:       'idle',
    lightBlueIntensity:  1.5,
    lightOrangeIntensity: 0.0,
    bloomStrength:   0.55,
  },
  speaking: {
    innerColor:      WHITE.clone(),
    innerIntensity:  7.5,
    glassAttColor:   new THREE.Color('#88ccff'),
    glassThickness:  0.9,
    floatAmp:        1.4,
    idleRotSpeed:    0.003,
    gazeRatio:       0.50,
    ringPulse:       true,
    ringColor:       PB_ORANGE.clone(),     // Option B: orange tint when speaking
    sparkActive:     true,                   // Orange sparks ON in speaking mode
    statusText:      'Speaking — generating response',
    synthMode:       'speaking',
    lightBlueIntensity:  2.2,
    lightOrangeIntensity: 1.8,              // Orange fill light activates
    bloomStrength:   0.85,                   // Stronger bloom in speaking
  },
  thinking: {
    innerColor:      PB_BLUE.clone(),
    innerIntensity:  2.5,
    glassAttColor:   THINKING_PURPLE.clone(),
    glassThickness:  1.0,
    floatAmp:        0.6,
    idleRotSpeed:    0.006,                  // Faster spin — thinking paradox
    gazeRatio:       0.30,
    ringPulse:       false,
    ringColor:       PB_BLUE.clone(),
    sparkActive:     false,
    statusText:      'Thinking — processing deeply',
    synthMode:       'thinking',
    lightBlueIntensity:  1.0,
    lightOrangeIntensity: 0.0,
    bloomStrength:   0.45,
  },
  listening: {
    innerColor:      CYAN.clone(),
    innerIntensity:  4.0,
    glassAttColor:   CYAN.clone(),
    glassThickness:  0.7,
    floatAmp:        1.0,
    idleRotSpeed:    0.001,                  // Very slow — attentive stillness
    gazeRatio:       1.60,                   // Maximum gaze — leaning toward you
    ringPulse:       false,
    ringColor:       CYAN.clone(),
    sparkActive:     false,
    statusText:      'Listening — tell me everything',
    synthMode:       'listening',
    lightBlueIntensity:  1.8,
    lightOrangeIntensity: 0.0,
    bloomStrength:   0.60,
  },
};

// =============================================================================
// SYNTHETIC AUDIO ENGINE — Day 6 mastery, fully validated
// Generates realistic speech-profile amplitudes without a microphone.
// =============================================================================
class SyntheticAudioEngine {
  constructor() {
    this.mode = 'idle';
    this.time = 0;
    this.speechCycleLength = 0.15 + Math.random() * 0.35;
    this.speechPhase = 0;
    this.amplitudes = { subBass: 0, bass: 0, midLow: 0, midHigh: 0, presence: 0 };
  }

  setMode(mode) {
    this.mode = mode;
    this.time = 0;
    this.speechPhase = 0;
  }

  tick(dt) {
    this.time += dt;
    const t = this.time;

    if (this.mode === 'idle') {
      const breath = (Math.sin(t * 0.45) * 0.5 + 0.5) * 0.25;
      this.amplitudes.subBass  = breath * 0.8;
      this.amplitudes.bass     = breath * 0.4;
      this.amplitudes.midLow   = 0.015 + Math.random() * 0.015;
      this.amplitudes.midHigh  = 0.008;
      this.amplitudes.presence = 0.005;

    } else if (this.mode === 'speaking') {
      this.speechPhase += dt;
      if (this.speechPhase >= this.speechCycleLength) {
        this.speechPhase -= this.speechCycleLength;
        this.speechCycleLength = 0.15 + Math.random() * 0.35;
      }
      const bp = this.speechPhase / this.speechCycleLength;
      let burst = bp < 0.2 ? bp / 0.2 : 1.0 - (bp - 0.2) / 0.8;
      burst = Math.max(0, burst);

      const phoneme = 0.5 + 0.5 * Math.sin(t * 12.0);
      const midVal  = burst * phoneme;
      const formant = Math.sin(bp * Math.PI);
      const sibilant = Math.sin(t * 5.0) > 0.6 ? 0.3 + Math.random() * 0.4 : 0;

      this.amplitudes.subBass  = 0.10 + burst * 0.15;
      this.amplitudes.bass     = 0.15 + burst * 0.50;
      this.amplitudes.midLow   = 0.10 + formant * 0.55;
      this.amplitudes.midHigh  = 0.05 + midVal  * 0.65;
      this.amplitudes.presence = sibilant;

    } else if (this.mode === 'thinking') {
      const pulse  = Math.pow(Math.sin(t * 0.8) * 0.5 + 0.5, 2);
      const tremor = 0.5 + 0.5 * Math.sin(t * 3.5);
      this.amplitudes.subBass  = pulse * 0.18;
      this.amplitudes.bass     = pulse * 0.12;
      this.amplitudes.midLow   = 0.04 + tremor * 0.12;
      this.amplitudes.midHigh  = 0.06 + pulse  * 0.10;
      this.amplitudes.presence = 0.015 + Math.random() * 0.04;

    } else if (this.mode === 'listening') {
      const breathe = (Math.sin(t * 0.38) * 0.5 + 0.5) * 0.18;
      this.amplitudes.subBass  = breathe * 0.5;
      this.amplitudes.bass     = breathe * 0.3;
      this.amplitudes.midLow   = 0.012;
      this.amplitudes.midHigh  = 0.008;
      this.amplitudes.presence = 0.005;
    }
    return this.amplitudes;
  }
}

// =============================================================================
// POSTPROCESS SHADERS
// =============================================================================

// Chromatic Aberration — radial color split at edges (Gleb signature)
const ChromaticAberrationShader = {
  uniforms: {
    tDiffuse: { value: null },
    offset:   { value: new THREE.Vector2(0.0022, 0.0022) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 offset;
    varying vec2 vUv;
    void main() {
      vec2 dir = vUv - vec2(0.5);
      float dist = length(dir);
      vec2 offsetScaled = offset * dist * 2.5;
      vec2 n = normalize(dir + vec2(0.0001));
      float r = texture2D(tDiffuse, vUv + n * offsetScaled).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - n * offsetScaled).b;
      float a = texture2D(tDiffuse, vUv).a;
      gl_FragColor = vec4(r, g, b, a);
    }
  `,
};

// Vignette — dark corners, pulls focus to center
const VignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    offset:   { value: 0.5 },
    darkness: { value: 0.75 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float offset;
    uniform float darkness;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      vec2 uv = (vUv - 0.5) * 2.0;
      float d = length(uv);
      float vignette = smoothstep(offset, offset + 0.45, d);
      color.rgb = mix(color.rgb, color.rgb * (1.0 - darkness), vignette);
      gl_FragColor = color;
    }
  `,
};

// =============================================================================
// STATE
// =============================================================================
let currentMode = 'idle';

      midColor:    { value: new THREE.Color('#03030A') },
      bottomColor: { value: new THREE.Color('#180008') },
    },
    vertexShader: `
      varying vec3 vPos;
      void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    `,
    fragmentShader: `
      uniform vec3 topColor; uniform vec3 midColor; uniform vec3 bottomColor;
      varying vec3 vPos;
      void main() {
        float t = normalize(vPos).y * 0.5 + 0.5;
        vec3 c = mix(bottomColor, midColor, smoothstep(0.0, 0.45, t));
        c = mix(c, topColor, smoothstep(0.45, 1.0, t));

const statusEl = document.getElementById('status-text');
const bars = Array.from({ length: 9 }, (_, i) => document.getElementById('bar' + i));

function updateUI(mode) {
  // Mode buttons (bottom)
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  // Mode indicator (right side)
  document.querySelectorAll('.mode-row').forEach(row => {
    row.classList.toggle('active', row.dataset.mode === mode);
  });
  // Status text
  if (statusEl) statusEl.textContent = MODES[mode].statusText;
}

function updateAudioBars(amps) {
  // 9 bars — bell curve distribution
  const vals = [
    amps.subBass * 0.5,
    amps.bass    * 0.75,
    amps.midLow  * 0.90,
    amps.midHigh * 1.00,  // center-ish
    amps.midHigh * 0.95,
    amps.midHigh * 0.80,
    amps.midLow  * 0.70,
    amps.bass    * 0.55,
    amps.subBass * 0.40,
  ];
  bars.forEach((bar, i) => {
    const h = 2 + vals[i] * 16;
    bar.style.height = h + 'px';
    bar.style.opacity = String(0.18 + vals[i] * 0.65);
  });
}

// =============================================================================
// MODE SWITCH (public API — called from buttons + keyboard + PostMessage)
// =============================================================================
function setMode(mode) {
  if (!MODES[mode]) return;
  currentMode = mode;
  synth.setMode(MODES[mode].synthMode);
  updateUI(mode);
}
window.setMode = setMode;  // expose to onclick handlers

// =============================================================================
// POSTMESSAGE API (for WordPress iframe embed)
// Supports: SET_MODE, PING
// Sends: READY, PONG
// =============================================================================
const ALLOWED_ORIGINS = [
  'https://purebrain.ai',
  'https://www.purebrain.ai',
  'http://localhost:3000',
  'http://localhost:5173',
];

window.addEventListener('message', (e) => {
  const origin = e.origin;
  const isAllowed = origin === 'null' ||
    ALLOWED_ORIGINS.some(o => origin === o || origin.endsWith('.purebrain.ai'));
  if (!isAllowed) return;

  const msg = e.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'SET_MODE' && msg.mode) {
    setMode(msg.mode);
  } else if (msg.type === 'PING') {
    const resp = { type: 'PONG', mode: currentMode, version: '2.0' };
    if (window.parent !== window) window.parent.postMessage(resp, '*');
  }
});

// =============================================================================
// KEYBOARD SHORTCUTS
// =============================================================================
document.addEventListener('keydown', (e) => {
  if (e.key === '1') setMode('idle');
  else if (e.key === '2') setMode('speaking');
  else if (e.key === '3') setMode('thinking');
  else if (e.key === '4') setMode('listening');
});

// =============================================================================
// CURSOR TRACKING (gaze system — Day 6 architecture)
// The gazeGroup is rotated toward the cursor with a 5% lerp per frame.
// Intensity is multiplied per mode (listening=1.6x, thinking=0.3x, etc.)
// =============================================================================
document.addEventListener('mousemove', (e) => {
  // Normalize to -1..+1 relative to canvas center
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  mouse.x = (e.clientX - cx) / (rect.width  / 2);
  mouse.y = (e.clientY - cy) / (rect.height / 2);
});

// Touch support
document.addEventListener('touchmove', (e) => {
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  mouse.x = (touch.clientX - cx) / (rect.width  / 2);
  mouse.y = (touch.clientY - cy) / (rect.height / 2);
}, { passive: true });

// =============================================================================
// FLOAT ANIMATION STATE
// Simple sine-based vertical + slight horizontal float.
// Speed multiplied by mode floatAmp.
// =============================================================================
let floatPhase = 0;

// =============================================================================
// LERP HELPER
// =============================================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(current, target, t) {
  current.r = lerp(current.r, target.r, t);
  current.g = lerp(current.g, target.g, t);
  current.b = lerp(current.b, target.b, t);
}

// =============================================================================
// MAIN ANIMATE LOOP
// =============================================================================
let readyFrames = 0;
let isReady = false;

function animateReady() {
  requestAnimationFrame(animateReady);
  renderer.render(scene, camera);
  readyFrames++;
  if (readyFrames >= 4) {
    // Scene is warmed up — dismiss loading screen
    const loadingEl = document.getElementById('loading-screen');
    if (loadingEl) loadingEl.classList.add('hidden');
    // Signal parent if inside iframe
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'READY', version: '2.0' }, '*');
    }
    isReady = true;
    animate();  // hand off to main loop
  }
}

function animate() {
  if (!isReady) return;
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05); // cap dt to prevent spiral on tab switch
  const t  = clock.getElapsedTime();
  const cfg = MODES[currentMode];

  // ── 1. Synthetic audio tick ──────────────────────────────────────────────
  const amps = synth.tick(dt);

  // ── 2. Smooth mode config values (lerp factor: 0.04 ≈ 1s transition at 60fps) ──
  const LF = 0.045; // lerp factor per frame
  lerpColor(smooth.innerColor,    cfg.innerColor,    LF);
  lerpColor(smooth.glassAttColor, cfg.glassAttColor, LF);
  smooth.innerIntensity = lerp(smooth.innerIntensity, cfg.innerIntensity, LF);
  smooth.glassThickness = lerp(smooth.glassThickness, cfg.glassThickness, LF);
  smooth.bloomStrength  = lerp(smooth.bloomStrength,  cfg.bloomStrength,  LF);
  smooth.lightBlueI     = lerp(smooth.lightBlueI,     cfg.lightBlueIntensity,  LF * 0.7);
  smooth.lightOrangeI   = lerp(smooth.lightOrangeI,   cfg.lightOrangeIntensity, LF * 0.7);

  // Ring color lerp
  smooth.ringColorR = lerp(smooth.ringColorR, cfg.ringColor.r, LF);
  smooth.ringColorG = lerp(smooth.ringColorG, cfg.ringColor.g, LF);
  smooth.ringColorB = lerp(smooth.ringColorB, cfg.ringColor.b, LF);

  // ── 3. Audio-reactive values ──────────────────────────────────────────────
  // Scale: bass drives sphere scale (outer). Safe to animate scale (free matrix op).
  const bassScale = amps.bass * 0.08;
  const targetScale = 1.0 + bassScale;
  outerMesh.scale.setScalar(lerp(outerMesh.scale.x, targetScale, 0.12));

  // Inner glow: midHigh drives emissiveIntensity (meshStandardMaterial — safe uniform)
  const audioGlow = amps.midHigh * 3.5;
  const targetGlow = smooth.innerIntensity + audioGlow;
  innerMesh.material.emissiveIntensity = lerp(innerMesh.material.emissiveIntensity, targetGlow, 0.15);

  // Haze glow tracks inner
  hazeMesh.material.opacity = lerp(hazeMesh.material.opacity, 0.06 + amps.bass * 0.14, 0.10);

  // ── 4. Apply smoothed materials ──────────────────────────────────────────
  innerMesh.material.color.copy(smooth.innerColor);
  innerMesh.material.emissive.copy(smooth.innerColor);
  hazeMesh.material.color.copy(smooth.innerColor);
  outerMesh.material.attenuationColor.copy(smooth.glassAttColor);
  // DO NOT animate outerMesh.material.roughness / transmission / thickness —
  // those trigger FBO reconfiguration every frame (catastrophic, from Day 6 memory)

  // ── 5. Lights ─────────────────────────────────────────────────────────────
  lightBlue.intensity  = smooth.lightBlueI;
  lightOrange.intensity = smooth.lightOrangeI;

  // ── 6. Bloom ──────────────────────────────────────────────────────────────
  bloomPass.strength = smooth.bloomStrength + amps.midHigh * 0.4;

  // ── 7. Float animation ────────────────────────────────────────────────────
  floatPhase += dt * 0.55 * cfg.floatAmp;
  const floatY  =  Math.sin(floatPhase) * 0.095 * cfg.floatAmp;
  const floatX  =  Math.sin(floatPhase * 0.7) * 0.03;
  avatarGroup.position.y = lerp(avatarGroup.position.y, floatY, 0.06);
  avatarGroup.position.x = lerp(avatarGroup.position.x, floatX, 0.06);

  // ── 8. Idle rotation ──────────────────────────────────────────────────────
  outerMesh.rotation.y += cfg.idleRotSpeed;
  outerMesh.rotation.x += Math.sin(t * 0.35) * 0.00025;

  // ── 9. Ring animations ────────────────────────────────────────────────────
  const ringColor = new THREE.Color(smooth.ringColorR, smooth.ringColorG, smooth.ringColorB);

  rings.forEach((ring, idx) => {
    // Speed multiplier — speaking mode accelerates rings
    const speedMult = currentMode === 'speaking' ? 1.8 : currentMode === 'thinking' ? 0.3 : 1.0;
    ring.rotation.z += ring.userData.speed * speedMult;

    // Ring pulse in speaking mode
    if (cfg.ringPulse) {
      const phaseSeed = idx * 2.2;
      const pulse = 0.55 + 0.45 * Math.sin(t * 2.8 + phaseSeed);
      ring.material.opacity = lerp(ring.material.opacity, 0.35 + pulse * 0.55, 0.12);
      ring.material.emissiveIntensity = lerp(ring.material.emissiveIntensity, 0.8 + pulse * 1.8, 0.12);
    } else {
      ring.material.opacity = lerp(ring.material.opacity, 0.45, 0.06);
      ring.material.emissiveIntensity = lerp(ring.material.emissiveIntensity, 1.0, 0.06);
    }

    // Color
    ring.material.color.copy(ringColor);
    ring.material.emissive.copy(ringColor);
  });

  // ── 10. Orange spark particles (speaking mode) ───────────────────────────
  const sparkTargetOpacity = cfg.sparkActive ? 0.75 : 0.0;
  sparkMat.opacity = lerp(sparkMat.opacity, sparkTargetOpacity, 0.08);

  const sparkPosAttr = sparkGeo.attributes.position;
  const sparkSpeedMult = currentMode === 'speaking' ? 1.0 : 0.5;
  for (let i = 0; i < SPARK_COUNT; i++) {
    sparkAngles[i] += sparkSpeeds[i] * sparkSpeedMult;
    // Small vertical oscillation per particle
    const vertOsc = Math.sin(t * 1.5 + i * 0.4) * 0.04;
    sparkPosAttr.setXYZ(
      i,
      Math.cos(sparkAngles[i]) * sparkRadii[i],
      sparkElevs[i] + vertOsc,
      Math.sin(sparkAngles[i]) * sparkRadii[i]
    );
  }
  sparkPosAttr.needsUpdate = true;

  // ── 11. Blue ambient particles ────────────────────────────────────────────
  const bluePosAttr = blueGeo.attributes.position;
  for (let i = 0; i < BLUE_PARTICLE_COUNT; i++) {
    blueAngles[i] += blueSpeeds[i];
    const vertOsc = Math.sin(t * 0.4 + i * 0.2) * 0.025;
    bluePosAttr.setXYZ(
      i,
      Math.cos(blueAngles[i]) * blueRadii[i],
      blueElevs[i] + vertOsc,
      Math.sin(blueAngles[i]) * blueRadii[i]
    );
  }
  bluePosAttr.needsUpdate = true;

  // ── 12. Gold particles ────────────────────────────────────────────────────
  const goldPosAttr = goldGeo.attributes.position;
  for (let i = 0; i < GOLD_PARTICLE_COUNT; i++) {
    goldAngles[i] += goldSpeeds[i];
    goldPosAttr.setXYZ(
      i,
      Math.cos(goldAngles[i]) * goldRadii[i],
      goldElevs[i],
      Math.sin(goldAngles[i]) * goldRadii[i]
    );
  }
  goldPosAttr.needsUpdate = true;

  // ── 13. Cursor gaze (Day 6 architecture) ──────────────────────────────────
  const GAZE_TRACK  = 0.20;     // cursor at ±1 → sphere rotates ±0.20 rad max
  const GAZE_SMOOTH = 0.05;     // lerp factor — slow = weighted/natural feel
  const gazeIntensity = cfg.gazeRatio;

  const targetRotY =  mouse.x * GAZE_TRACK * gazeIntensity;
  const targetRotX = -mouse.y * GAZE_TRACK * gazeIntensity * 0.6;

  smooth.gazeRotY = lerp(smooth.gazeRotY, targetRotY, GAZE_SMOOTH);
  smooth.gazeRotX = lerp(smooth.gazeRotX, targetRotX, GAZE_SMOOTH);

  gazeGroup.rotation.y = smooth.gazeRotY;
  gazeGroup.rotation.x = smooth.gazeRotX;

  // ── 14. Audio bars (DOM) ──────────────────────────────────────────────────
  updateAudioBars(amps);

  // ── 15. Orbit controls damping ────────────────────────────────────────────
  controls.update();

  // ── 16. Render via postprocessing composer ────────────────────────────────
  composer.render();
}

// =============================================================================
// KICKOFF
// =============================================================================
updateUI('idle');
animateReady();

// =============================================================================
// AUTO MODE CYCLE (demo mode — cycles through modes every 5s after 3s idle)
// Stops when user clicks a button or presses a key
// =============================================================================
const DEMO_MODES  = ['idle', 'listening', 'thinking', 'speaking'];
let demoIndex     = 0;
let demoActive    = true;
let demoTimer     = null;

function scheduleDemoNext() {
  demoTimer = setTimeout(() => {
    if (!demoActive) return;
    demoIndex = (demoIndex + 1) % DEMO_MODES.length;
    setMode(DEMO_MODES[demoIndex]);
    scheduleDemoNext();
  }, 5000);
}

// Start demo cycle after 3 seconds
setTimeout(() => {
  if (demoActive) scheduleDemoNext();
}, 3000);

function stopDemo() {
  demoActive = false;
  if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
}

// User interaction stops the demo auto-cycle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', stopDemo);
});
document.querySelectorAll('.mode-row').forEach(row => {
  row.addEventListener('click', stopDemo);
});
document.addEventListener('keydown', (e) => {
  if (['1','2','3','4'].includes(e.key)) stopDemo();
});

</script>
