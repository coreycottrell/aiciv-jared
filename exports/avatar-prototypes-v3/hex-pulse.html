<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Avatar V3 — Hex Pulse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080a12;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .avatar-root {
    position: relative;
    width: 220px;
    height: 200px;
    cursor: pointer;
  }

  canvas {
    display: block;
  }

  .label {
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="avatar-root">
    <canvas id="hexCanvas" width="440" height="400" style="width:220px;height:200px;"></canvas>
  </div>
  <span class="label">Hex Pulse</span>
</div>

<script>
'use strict';

const canvas = document.getElementById('hexCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const DPR = 2;

// Brand colors
const ORANGE = { r: 241, g: 66, b: 11 };
const BLUE   = { r: 42,  g: 147, b: 193 };
const DARK   = { r: 8,   g: 10,  b: 18 };

// ── Hex geometry ──
// A "flat-top" hexagon.
// The avatar IS a hexagon — we clip to it, draw micro-hex grid inside.

const HEX_SIZE = 95;           // Outer avatar hexagon radius
const MICRO_SIZE = 8;          // Micro hex cell size
const CX = W / 2;
const CY = H / 2;

// Flat-top hex points
function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i - 30); // pointy-top
    pts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
  }
  return pts;
}

// Check if point is inside hexagon
function inHex(px, py, cx, cy, r) {
  const dx = Math.abs(px - cx);
  const dy = Math.abs(py - cy);
  if (dx > r) return false;
  if (dy > r * Math.sqrt(3) / 2) return false;
  return (r * Math.sqrt(3) * 0.5 - dy) * 2 >= r - dx;
}

// Generate micro hex grid cells that fit inside the big hex
const microCells = [];
const mR = MICRO_SIZE;
const mW = mR * Math.sqrt(3);
const mH = mR * 2;

for (let row = -15; row <= 15; row++) {
  for (let col = -15; col <= 15; col++) {
    const mx = CX + col * mW + (row % 2 === 0 ? 0 : mW * 0.5);
    const my = CY + row * mH * 0.75;
    if (inHex(mx, my, CX, CY, HEX_SIZE - 4)) {
      // distance from center (0-1)
      const dist = Math.sqrt((mx - CX) ** 2 + (my - CY) ** 2) / HEX_SIZE;
      microCells.push({
        x: mx,
        y: my,
        r: mR,
        dist,
        phase: Math.random() * Math.PI * 2,
        speed: 0.8 + Math.random() * 1.2,
        baseAlpha: 0.15 + Math.random() * 0.25,
      });
    }
  }
}

// Pulse ring system
const pulseRings = [];

function emitPulse(intensity = 1.0) {
  pulseRings.push({
    r: 0,
    maxR: HEX_SIZE * 1.1,
    alpha: 0.8 * intensity,
    speed: 2 + Math.random() * 1.5,
    color: Math.random() > 0.5 ? ORANGE : BLUE,
    t: 0,
  });
}

// Idle pulse emitter
setInterval(emitPulse, 2200);
setInterval(() => emitPulse(0.5), 1100);
emitPulse(1.0);

// Mouse hover state
let isHovered = false;
let mouseX = CX;
let mouseY = CY;

canvas.addEventListener('mouseenter', () => {
  isHovered = true;
  emitPulse(1.2);
});
canvas.addEventListener('mouseleave', () => { isHovered = false; });
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * DPR;
  mouseY = (e.clientY - rect.top) * DPR;
});

// Outer hex glow ring — pulsing ambient
let globalPulse = 0;
let globalPulseDir = 1;

function drawHexPath(cx, cy, r, ctx) {
  const pts = hexPoints(cx, cy, r);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
}

function lerpColor(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t),
  };
}

function rgba(c, a) {
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

// Draw a single micro hexagon
function drawMicroHex(cell, t) {
  const pts = hexPoints(cell.x, cell.y, cell.r * 0.82);

  // Distance from mouse when hovered
  let mouseDist = 1;
  if (isHovered) {
    const d = Math.sqrt((cell.x - mouseX) ** 2 + (cell.y - mouseY) ** 2);
    mouseDist = Math.max(0, 1 - d / (HEX_SIZE * 0.7));
  }

  // Pulse ring influence — brighten cells that rings have passed through
  let ringInfluence = 0;
  for (const ring of pulseRings) {
    const cellDist = cell.dist * HEX_SIZE;
    const ringDist = Math.abs(cellDist - ring.r);
    if (ringDist < 12) {
      ringInfluence = Math.max(ringInfluence, (1 - ringDist / 12) * ring.alpha);
    }
  }

  // Cell brightness: center is warmest (orange), edges are cooler (blue)
  const centerBias = 1 - cell.dist;
  const cellColor = lerpColor(BLUE, ORANGE, centerBias * 0.7 + ringInfluence * 0.5);

  // Idle flicker
  const flicker = cell.baseAlpha + Math.sin(t * cell.speed + cell.phase) * 0.08;
  const finalAlpha = Math.min(1, flicker + ringInfluence * 0.9 + mouseDist * 0.5 + globalPulse * centerBias * 0.3);

  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fillStyle = rgba(cellColor, finalAlpha * 0.7);
  ctx.fill();

  // Stroke (cell border)
  ctx.strokeStyle = rgba(cellColor, finalAlpha * 0.5);
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Bright glow on ring pass
  if (ringInfluence > 0.3 || mouseDist > 0.2) {
    ctx.fillStyle = rgba({ r: 255, g: 255, b: 255 }, (ringInfluence * 0.4 + mouseDist * 0.2));
    ctx.fill();
  }
}

let lastTime = performance.now();

function draw(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  const t = now * 0.001;

  // Global pulse (slow sine)
  globalPulse += globalPulseDir * dt * 0.4;
  if (globalPulse > 1) { globalPulse = 1; globalPulseDir = -1; }
  if (globalPulse < 0) { globalPulse = 0; globalPulseDir = 1; }

  // Clear
  ctx.fillStyle = '#080a12';
  ctx.fillRect(0, 0, W, H);

  // ── Draw outer hex glow rings (pulse propagation) ──
  for (let i = pulseRings.length - 1; i >= 0; i--) {
    const ring = pulseRings[i];
    ring.r += ring.speed;
    ring.alpha -= 0.006;
    ring.t += dt;

    if (ring.alpha <= 0) {
      pulseRings.splice(i, 1);
      continue;
    }

    // Hexagonal ring (approximated by multiple strokes)
    drawHexPath(CX, CY, ring.r, ctx);
    ctx.strokeStyle = rgba(ring.color, ring.alpha * 0.6);
    ctx.lineWidth = 2;
    ctx.stroke();

    // Outer feather
    drawHexPath(CX, CY, ring.r + 4, ctx);
    ctx.strokeStyle = rgba(ring.color, ring.alpha * 0.2);
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // ── Clip to main hex shape ──
  ctx.save();
  drawHexPath(CX, CY, HEX_SIZE, ctx);
  ctx.clip();

  // ── Dark fill inside hex ──
  ctx.fillStyle = `rgba(8,10,18,0.92)`;
  ctx.fillRect(0, 0, W, H);

  // ── Center radial gradient (the "core") ──
  const coreIntensity = 0.15 + globalPulse * 0.2 + (isHovered ? 0.2 : 0);
  const coreGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, HEX_SIZE * 0.6);
  coreGrad.addColorStop(0, rgba(ORANGE, coreIntensity * 0.8));
  coreGrad.addColorStop(0.4, rgba(BLUE, coreIntensity * 0.4));
  coreGrad.addColorStop(1, 'rgba(8,10,18,0)');
  ctx.fillStyle = coreGrad;
  ctx.fillRect(0, 0, W, H);

  // ── Draw micro hex grid ──
  microCells.forEach(cell => drawMicroHex(cell, t));

  // ── "Æ" lettermark in center ──
  const letterAlpha = 0.7 + globalPulse * 0.15;
  ctx.font = `900 italic 44px Inter, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Glow layers
  ctx.shadowColor = rgba(BLUE, 0.8);
  ctx.shadowBlur = 20;
  ctx.fillStyle = rgba({ r: 255, g: 255, b: 255 }, letterAlpha * 0.6);
  ctx.fillText('Æ', CX, CY);

  ctx.shadowColor = rgba(ORANGE, 0.4);
  ctx.shadowBlur = 40;
  ctx.fillStyle = rgba({ r: 255, g: 255, b: 255 }, letterAlpha * 0.3);
  ctx.fillText('Æ', CX + 1.5, CY);

  ctx.shadowBlur = 0;

  ctx.restore();

  // ── Outer hex border ──
  drawHexPath(CX, CY, HEX_SIZE, ctx);
  const borderAlpha = 0.3 + globalPulse * 0.25;
  // Conic-style border (alternate two colors)
  ctx.strokeStyle = rgba(BLUE, borderAlpha);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner border accent
  drawHexPath(CX, CY, HEX_SIZE - 3, ctx);
  ctx.strokeStyle = rgba(ORANGE, borderAlpha * 0.4);
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // ── Outer ambient glow shadow ──
  drawHexPath(CX, CY, HEX_SIZE + 6, ctx);
  const glowGrad = ctx.createLinearGradient(CX - HEX_SIZE, CY, CX + HEX_SIZE, CY);
  glowGrad.addColorStop(0, rgba(BLUE, 0.1));
  glowGrad.addColorStop(0.5, rgba(ORANGE, 0.08));
  glowGrad.addColorStop(1, rgba(BLUE, 0.1));
  ctx.strokeStyle = glowGrad;
  ctx.lineWidth = 8;
  ctx.stroke();

  // Hover: emit rapid pulses
  if (isHovered && Math.random() < 0.04) {
    emitPulse(0.6);
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
