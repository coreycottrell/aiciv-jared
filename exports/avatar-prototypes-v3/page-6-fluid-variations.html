<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Avatars — Fluid Core Variations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080a12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 40px 20px;
  }

  h1 {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 48px;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px 56px;
    align-items: start;
  }

  .avatar-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .label {
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── VARIATION 1: Hex Frame ── */
  .v1-wrapper {
    position: relative;
    width: 250px;
    height: 250px;
    cursor: pointer;
  }

  /* Hexagon clip-path geometry */
  .hex-clip {
    position: absolute;
    inset: 14px;
    clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
    overflow: hidden;
    z-index: 2;
  }

  .hex-clip canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Hex border SVG overlay */
  .hex-border-svg {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* Hex edge micro-grid pattern */
  .hex-micro-grid {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .hex-micro-grid canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .hex-glow-ring {
    position: absolute;
    inset: 8px;
    clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
    background: transparent;
    z-index: 0;
    animation: hexPulseGlow 2.5s ease-in-out infinite;
    filter: blur(8px);
    background: conic-gradient(from 0deg, #f1420b, #2a93c1, #f1420b, #2a93c1, #f1420b);
    opacity: 0.55;
  }

  @keyframes hexPulseGlow {
    0%, 100% { opacity: 0.45; filter: blur(8px); }
    50% { opacity: 0.8; filter: blur(14px); }
  }

  /* Hex sigil */
  .hex-sigil {
    position: absolute;
    inset: 14px;
    clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ── VARIATION 2: Glass Layer ── */
  .v2-wrapper {
    position: relative;
    width: 250px;
    height: 250px;
    cursor: pointer;
  }

  .v2-wrapper::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #f1420b, #2a93c1, #f1420b, #2a93c1, #f1420b);
    opacity: 0.65;
    animation: ringRotate 8s linear infinite;
    filter: blur(2px);
  }

  .v2-wrapper::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: #080a12;
    z-index: 1;
  }

  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .v2-fluid-container {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
  }

  .v2-fluid-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* The glass panel — frosted strip across the middle */
  .glass-panel {
    position: absolute;
    left: 6px;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    height: 38%;
    z-index: 3;
    pointer-events: none;
    border-radius: 8px;
    backdrop-filter: blur(12px) saturate(1.4);
    -webkit-backdrop-filter: blur(12px) saturate(1.4);
    background: rgba(8, 10, 18, 0.35);
    border-top: 1px solid rgba(42,147,193,0.35);
    border-bottom: 1px solid rgba(241,66,11,0.25);
    box-shadow:
      0 0 20px rgba(42,147,193,0.12),
      inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
    animation: glassPanelGlow 4s ease-in-out infinite;
  }

  /* Fresnel-style edge highlight on the glass */
  .glass-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.07) 0%,
      transparent 30%,
      transparent 70%,
      rgba(255,255,255,0.04) 100%
    );
    border-radius: inherit;
  }

  /* Scanline texture on glass */
  .glass-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(42,147,193,0.04) 3px,
      rgba(42,147,193,0.04) 4px
    );
    border-radius: inherit;
  }

  @keyframes glassPanelGlow {
    0%, 100% {
      border-top-color: rgba(42,147,193,0.25);
      box-shadow: 0 0 20px rgba(42,147,193,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    50% {
      border-top-color: rgba(42,147,193,0.55);
      box-shadow: 0 0 30px rgba(42,147,193,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
    }
  }

  /* Circular clip to keep glass inside the avatar circle */
  .glass-panel-clip {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    z-index: 3;
    overflow: hidden;
    pointer-events: none;
  }

  .v2-sigil {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ── VARIATION 3: Three.js Glass Shell ── */
  .v3-wrapper {
    position: relative;
    width: 250px;
    height: 250px;
    cursor: pointer;
  }

  #threeCanvas {
    display: block;
    width: 250px;
    height: 250px;
    border-radius: 50%;
  }

  .v3-sigil {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ── VARIATION 4: Hex Grid Overlay ── */
  .v4-wrapper {
    position: relative;
    width: 250px;
    height: 250px;
    cursor: pointer;
  }

  .v4-wrapper::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #2a93c1, #f1420b, #2a93c1, #f1420b, #2a93c1);
    opacity: 0.6;
    animation: ringRotate 10s linear infinite reverse;
    filter: blur(2px);
  }

  .v4-wrapper::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: #080a12;
    z-index: 1;
  }

  .v4-fluid-container {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
  }

  .v4-fluid-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* The hex grid SVG overlay — honeycomb lens */
  .hex-overlay-container {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 3;
    pointer-events: none;
  }

  .hex-overlay-svg {
    width: 100%;
    height: 100%;
  }

  .v4-sigil {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ── Shared sigil style ── */
  .sigil-mark {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -2px;
    color: rgba(255,255,255,0.9);
    text-shadow:
      0 0 20px rgba(42,147,193,0.85),
      0 0 40px rgba(42,147,193,0.45),
      0 0 80px rgba(241,66,11,0.3);
    animation: sigilPulse 3s ease-in-out infinite;
    mix-blend-mode: overlay;
    user-select: none;
  }

  @keyframes sigilPulse {
    0%, 100% { opacity: 0.72; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Hover amplifiers */
  .v1-wrapper:hover .sigil-mark,
  .v2-wrapper:hover .sigil-mark,
  .v3-wrapper:hover .sigil-mark,
  .v4-wrapper:hover .sigil-mark {
    opacity: 1;
    mix-blend-mode: normal;
  }

  .v1-wrapper:hover .hex-glow-ring {
    opacity: 1;
    filter: blur(18px);
    animation-duration: 1s;
  }
</style>
</head>
<body>

<h1>Aether Avatars &mdash; Fluid Core Variations</h1>

<div class="grid">

  <!-- ── VARIATION 1: Hex Frame ── -->
  <div class="avatar-cell">
    <div class="v1-wrapper" id="v1wrapper">
      <div class="hex-glow-ring"></div>
      <div class="hex-clip">
        <canvas id="v1canvas"></canvas>
      </div>
      <!-- SVG hex border with micro-hex edge cells -->
      <svg class="hex-border-svg" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="hexGlow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <!-- Micro hex pattern along border -->
          <pattern id="microHex" x="0" y="0" width="18" height="20.78" patternUnits="userSpaceOnUse">
            <polygon points="9,1 17,5.5 17,15.5 9,20 1,15.5 1,5.5"
              fill="none" stroke="rgba(42,147,193,0.22)" stroke-width="0.8"/>
          </pattern>
          <clipPath id="hexFrame">
            <!-- outer hex -->
            <polygon points="125,14 233.25,62.5 233.25,187.5 125,236 16.75,187.5 16.75,62.5"/>
          </clipPath>
          <mask id="hexBorderMask">
            <polygon points="125,14 233.25,62.5 233.25,187.5 125,236 16.75,187.5 16.75,62.5"
              fill="white"/>
            <polygon points="125,26 221.5,70 221.5,180 125,224 28.5,180 28.5,70"
              fill="black"/>
          </mask>
        </defs>
        <!-- Micro-hex texture fills the border band -->
        <polygon points="125,14 233.25,62.5 233.25,187.5 125,236 16.75,187.5 16.75,62.5"
          fill="url(#microHex)" mask="url(#hexBorderMask)"/>
        <!-- Main hex stroke — animated -->
        <polygon points="125,14 233.25,62.5 233.25,187.5 125,236 16.75,187.5 16.75,62.5"
          fill="none" stroke="url(#hexBorderGrad)" stroke-width="2.5" filter="url(#hexGlow)"/>
        <polygon points="125,26 221.5,70 221.5,180 125,224 28.5,180 28.5,70"
          fill="none" stroke="rgba(42,147,193,0.3)" stroke-width="1"/>
        <defs>
          <linearGradient id="hexBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f1420b" stop-opacity="0.9">
              <animate attributeName="stop-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
            </stop>
            <stop offset="50%" stop-color="#2a93c1" stop-opacity="0.9">
              <animate attributeName="stop-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#f1420b" stop-opacity="0.9">
              <animate attributeName="stop-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
            </stop>
          </linearGradient>
        </defs>
        <!-- Corner vertex dots that pulse -->
        <g fill="#2a93c1" opacity="0.8">
          <circle cx="125" cy="14" r="3"><animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="233.25" cy="62.5" r="3"><animate attributeName="r" values="2;4;2" dur="2.3s" repeatCount="indefinite"/></circle>
          <circle cx="233.25" cy="187.5" r="3"><animate attributeName="r" values="2;4;2" dur="1.8s" repeatCount="indefinite"/></circle>
          <circle cx="125" cy="236" r="3"><animate attributeName="r" values="2;4;2" dur="2.1s" repeatCount="indefinite"/></circle>
          <circle cx="16.75" cy="187.5" r="3"><animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/></circle>
          <circle cx="16.75" cy="62.5" r="3"><animate attributeName="r" values="2;4;2" dur="1.9s" repeatCount="indefinite"/></circle>
        </g>
      </svg>
      <div class="hex-sigil">
        <span class="sigil-mark">&#198;</span>
      </div>
    </div>
    <span class="label">Fluid Core + Hex Frame</span>
  </div>

  <!-- ── VARIATION 2: Glass Layer ── -->
  <div class="avatar-cell">
    <div class="v2-wrapper" id="v2wrapper">
      <div class="v2-fluid-container">
        <canvas id="v2canvas"></canvas>
      </div>
      <!-- Glass panel clipped to circle -->
      <div class="glass-panel-clip">
        <div class="glass-panel"></div>
      </div>
      <div class="v2-sigil">
        <span class="sigil-mark">&#198;</span>
      </div>
    </div>
    <span class="label">Fluid Core + Glass Layer</span>
  </div>

  <!-- ── VARIATION 3: Three.js Glass Shell ── -->
  <div class="avatar-cell">
    <div class="v3-wrapper" id="v3wrapper">
      <canvas id="threeCanvas"></canvas>
      <div class="v3-sigil">
        <span class="sigil-mark">&#198;</span>
      </div>
    </div>
    <span class="label">Fluid Core + 3D Glass Shell</span>
  </div>

  <!-- ── VARIATION 4: Hex Grid Overlay ── -->
  <div class="avatar-cell">
    <div class="v4-wrapper" id="v4wrapper">
      <div class="v4-fluid-container">
        <canvas id="v4canvas"></canvas>
      </div>
      <!-- Honeycomb lens overlay -->
      <div class="hex-overlay-container">
        <svg class="hex-overlay-svg" viewBox="0 0 238 238" xmlns="http://www.w3.org/2000/svg" id="hexOverlaySvg">
          <defs>
            <clipPath id="circleClipV4">
              <circle cx="119" cy="119" r="119"/>
            </clipPath>
          </defs>
          <g clip-path="url(#circleClipV4)" id="hexCells">
            <!-- Generated by JS below -->
          </g>
        </svg>
      </div>
      <div class="v4-sigil">
        <span class="sigil-mark">&#198;</span>
      </div>
    </div>
    <span class="label">Fluid Core + Hex Grid Overlay</span>
  </div>

</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
// FLUID SIM FACTORY — Creates independent Navier-Stokes instances
// Based on Pavel Dobryakov's WebGL fluid simulation (MIT License)
// Each call returns an independent fluid simulation on a given canvas
// ══════════════════════════════════════════════════════════════════

function createFluidSim(canvas, wrapperEl, cfg) {

  const config = Object.assign({
    SIM_RESOLUTION: 64,
    DYE_RESOLUTION: 256,
    DENSITY_DISSIPATION: 1.8,
    VELOCITY_DISSIPATION: 0.4,
    PRESSURE: 0.8,
    PRESSURE_ITERATIONS: 20,
    CURL: 28,
    SPLAT_RADIUS: 0.25,
    SPLAT_FORCE: 4000,
    SHADING: true,
    BLOOM: true,
    BLOOM_ITERATIONS: 6,
    BLOOM_RESOLUTION: 128,
    BLOOM_INTENSITY: 0.9,
    BLOOM_THRESHOLD: 0.4,
    BLOOM_SOFT_KNEE: 0.7,
    BACK_COLOR: { r: 8, g: 10, b: 18 },
  }, cfg || {});

  function pointerPrototype() {
    this.id = -1;
    this.texcoordX = 0;
    this.texcoordY = 0;
    this.prevTexcoordX = 0;
    this.prevTexcoordY = 0;
    this.deltaX = 0;
    this.deltaY = 0;
    this.down = false;
    this.moved = false;
    this.color = [0, 0, 0];
  }

  let pointers = [new pointerPrototype()];
  let splatStack = [];

  function scaleByPixelRatio(input) {
    return Math.floor(input * (window.devicePixelRatio || 1));
  }

  function resizeCanvas() {
    let w = scaleByPixelRatio(canvas.clientWidth);
    let h = scaleByPixelRatio(canvas.clientHeight);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h; return true;
    }
    return false;
  }
  resizeCanvas();

  const params = { alpha: true, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false };
  let gl = canvas.getContext('webgl2', params);
  const isWebGL2 = !!gl;
  if (!isWebGL2) gl = canvas.getContext('webgl', params) || canvas.getContext('experimental-webgl', params);

  let halfFloat, supportLinearFiltering;
  if (isWebGL2) {
    gl.getExtension('EXT_color_buffer_float');
    supportLinearFiltering = gl.getExtension('OES_texture_float_linear');
  } else {
    halfFloat = gl.getExtension('OES_texture_half_float');
    supportLinearFiltering = gl.getExtension('OES_texture_half_float_linear');
  }
  gl.clearColor(0, 0, 0, 1);

  const halfFloatTexType = isWebGL2 ? gl.HALF_FLOAT : (halfFloat ? halfFloat.HALF_FLOAT_OES : gl.UNSIGNED_BYTE);

  function getSupportedFormat(internalFormat, format, type) {
    if (!supportRenderTextureFormat(internalFormat, format, type)) {
      if (internalFormat === gl.R16F) return getSupportedFormat(gl.RG16F, gl.RG, type);
      if (internalFormat === gl.RG16F) return getSupportedFormat(gl.RGBA16F, gl.RGBA, type);
      return null;
    }
    return { internalFormat, format };
  }

  function supportRenderTextureFormat(internalFormat, format, type) {
    let tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, 4, 4, 0, format, type, null);
    let fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  }

  const ext = {
    formatRGBA: isWebGL2 ? getSupportedFormat(gl.RGBA16F, gl.RGBA, halfFloatTexType) : getSupportedFormat(gl.RGBA, gl.RGBA, halfFloatTexType),
    formatRG:   isWebGL2 ? getSupportedFormat(gl.RG16F, gl.RG, halfFloatTexType) : getSupportedFormat(gl.RGBA, gl.RGBA, halfFloatTexType),
    formatR:    isWebGL2 ? getSupportedFormat(gl.R16F, gl.RED, halfFloatTexType) : getSupportedFormat(gl.RGBA, gl.RGBA, halfFloatTexType),
    halfFloatTexType,
    supportLinearFiltering,
  };

  class Material {
    constructor(vs, fsSource) {
      this.vertexShader = vs; this.fragmentShaderSource = fsSource;
      this.programs = []; this.activeProgram = null; this.uniforms = [];
    }
    setKeywords(keywords) {
      let hash = keywords.reduce((h, kw) => h + hashCode(kw), 0);
      let program = this.programs[hash];
      if (!program) {
        let fs = compileShader(gl.FRAGMENT_SHADER, this.fragmentShaderSource, keywords);
        program = createProgram(this.vertexShader, fs);
        this.programs[hash] = program;
      }
      if (program === this.activeProgram) return;
      this.uniforms = getUniforms(program);
      this.activeProgram = program;
    }
    bind() { gl.useProgram(this.activeProgram); }
  }

  class Program {
    constructor(vs, fs) {
      this.uniforms = {};
      this.program = createProgram(vs, fs);
      this.uniforms = getUniforms(this.program);
    }
    bind() { gl.useProgram(this.program); }
  }

  function createProgram(vs, fs) {
    let p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
    return p;
  }

  function getUniforms(program) {
    let u = [];
    let n = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
    for (let i = 0; i < n; i++) {
      let name = gl.getActiveUniform(program, i).name;
      u[name] = gl.getUniformLocation(program, name);
    }
    return u;
  }

  function compileShader(type, source, keywords) {
    source = (keywords || []).reduce((s, kw) => '#define ' + kw + '\n' + s, source);
    let shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
  }

  function hashCode(s) {
    let hash = 0;
    for (let i = 0; i < s.length; i++) { hash = (hash << 5) - hash + s.charCodeAt(i); hash |= 0; }
    return hash;
  }

  const baseVS = compileShader(gl.VERTEX_SHADER, `
    precision highp float;
    attribute vec2 aPosition;
    varying vec2 vUv; varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
    uniform vec2 texelSize;
    void main(){
      vUv=aPosition*0.5+0.5;
      vL=vUv-vec2(texelSize.x,0.); vR=vUv+vec2(texelSize.x,0.);
      vT=vUv+vec2(0.,texelSize.y); vB=vUv-vec2(0.,texelSize.y);
      gl_Position=vec4(aPosition,0.,1.);
    }
  `);

  const blurVS = compileShader(gl.VERTEX_SHADER, `
    precision highp float;
    attribute vec2 aPosition;
    varying vec2 vUv; varying vec2 vL; varying vec2 vR;
    uniform vec2 texelSize;
    void main(){
      vUv=aPosition*0.5+0.5;
      float o=1.33333333;
      vL=vUv-texelSize*o; vR=vUv+texelSize*o;
      gl_Position=vec4(aPosition,0.,1.);
    }
  `);

  const blurFS     = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying vec2 vUv,vL,vR;uniform sampler2D uTexture;void main(){vec4 s=texture2D(uTexture,vUv)*0.29411764;s+=texture2D(uTexture,vL)*0.35294117;s+=texture2D(uTexture,vR)*0.35294117;gl_FragColor=s;}`);
  const copyFS     = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;uniform sampler2D uTexture;void main(){gl_FragColor=texture2D(uTexture,vUv);}`);
  const clearFS    = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying highp vec2 vUv;uniform sampler2D uTexture;uniform float value;void main(){gl_FragColor=value*texture2D(uTexture,vUv);}`);
  const colorFS    = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;uniform vec4 color;void main(){gl_FragColor=color;}`);
  const bpFS       = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying vec2 vUv;uniform sampler2D uTexture;uniform vec3 curve;uniform float threshold;void main(){vec3 c=texture2D(uTexture,vUv).rgb;float br=max(c.r,max(c.g,c.b));float rq=clamp(br-curve.x,0.,curve.y);rq=(rq*rq)*curve.z;c*=max(rq,br-threshold)/max(br,.0001);gl_FragColor=vec4(c,0.);}`);
  const bbFS       = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying vec2 vL,vR,vT,vB;uniform sampler2D uTexture;void main(){vec4 s=vec4(0.);s+=texture2D(uTexture,vL);s+=texture2D(uTexture,vR);s+=texture2D(uTexture,vT);s+=texture2D(uTexture,vB);s*=.25;gl_FragColor=s;}`);
  const bfFS       = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying vec2 vL,vR,vT,vB;uniform sampler2D uTexture;uniform sampler2D uBloom;uniform float intensity;void main(){vec4 c=texture2D(uTexture,(vL+vR)*.5);vec4 b=texture2D(uBloom,(vL+vR)*.5);b.rgb*=intensity;c+=b;float a=max(c.r,max(c.g,c.b));gl_FragColor=vec4(c.rgb,a);}`);
  const splatFS    = compileShader(gl.FRAGMENT_SHADER, `precision highp float;precision highp sampler2D;varying vec2 vUv;uniform sampler2D uTarget;uniform float aspectRatio;uniform vec3 color;uniform vec2 point;uniform float radius;void main(){vec2 p=vUv-point.xy;p.x*=aspectRatio;vec3 s=exp(-dot(p,p)/radius)*color;vec3 b=texture2D(uTarget,vUv).xyz;gl_FragColor=vec4(b+s,1.);}`);
  const advFS      = compileShader(gl.FRAGMENT_SHADER, `precision highp float;precision highp sampler2D;varying vec2 vUv;uniform sampler2D uVelocity,uSource;uniform vec2 texelSize,dyeTexelSize;uniform float dt,dissipation;vec4 bilerp(sampler2D sam,vec2 uv,vec2 ts){vec2 st=uv/ts-.5;vec2 iuv=floor(st);vec2 fuv=fract(st);vec4 a=texture2D(sam,(iuv+vec2(.5,.5))*ts);vec4 b=texture2D(sam,(iuv+vec2(1.5,.5))*ts);vec4 c=texture2D(sam,(iuv+vec2(.5,1.5))*ts);vec4 d=texture2D(sam,(iuv+vec2(1.5,1.5))*ts);return mix(mix(a,b,fuv.x),mix(c,d,fuv.x),fuv.y);}void main(){#ifdef MANUAL_FILTERING\nvec2 coord=vUv-dt*bilerp(uVelocity,vUv,texelSize).xy*texelSize;vec4 result=bilerp(uSource,coord,dyeTexelSize);#else\nvec2 coord=vUv-dt*texture2D(uVelocity,vUv).xy*texelSize;vec4 result=texture2D(uSource,coord);#endif\nfloat decay=1.+dissipation*dt;gl_FragColor=result/decay;}`, ext.supportLinearFiltering ? null : ['MANUAL_FILTERING']);
  const divFS      = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying highp vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity;void main(){float L=texture2D(uVelocity,vL).x,R=texture2D(uVelocity,vR).x,T=texture2D(uVelocity,vT).y,B=texture2D(uVelocity,vB).y;vec2 C=texture2D(uVelocity,vUv).xy;if(vL.x<0.)L=-C.x;if(vR.x>1.)R=-C.x;if(vT.y>1.)T=-C.y;if(vB.y<0.)B=-C.y;float div=.5*(R-L+T-B);gl_FragColor=vec4(div,0.,0.,1.);}`);
  const curlFS     = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying highp vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity;void main(){float L=texture2D(uVelocity,vL).y,R=texture2D(uVelocity,vR).y,T=texture2D(uVelocity,vT).x,B=texture2D(uVelocity,vB).x;float v=R-L-T+B;gl_FragColor=vec4(.5*v,0.,0.,1.);}`);
  const vortFS     = compileShader(gl.FRAGMENT_SHADER, `precision highp float;precision highp sampler2D;varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity,uCurl;uniform float curl,dt;void main(){float L=texture2D(uCurl,vL).x,R=texture2D(uCurl,vR).x,T=texture2D(uCurl,vT).x,B=texture2D(uCurl,vB).x,C=texture2D(uCurl,vUv).x;vec2 force=.5*vec2(abs(T)-abs(B),abs(R)-abs(L));force/=length(force)+.0001;force*=curl*C;force.y*=-1.;vec2 vel=texture2D(uVelocity,vUv).xy;gl_FragColor=vec4(vel+force*dt,0.,1.);}`);
  const pressFS    = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying highp vec2 vUv,vL,vR,vT,vB;uniform sampler2D uPressure,uDivergence;void main(){float L=texture2D(uPressure,vL).x,R=texture2D(uPressure,vR).x,T=texture2D(uPressure,vT).x,B=texture2D(uPressure,vB).x,C=texture2D(uPressure,vUv).x;float div=texture2D(uDivergence,vUv).x;float p=(L+R+B+T-div)*.25;gl_FragColor=vec4(p,0.,0.,1.);}`);
  const gradFS     = compileShader(gl.FRAGMENT_SHADER, `precision mediump float;precision mediump sampler2D;varying highp vec2 vUv,vL,vR,vT,vB;uniform sampler2D uPressure,uVelocity;void main(){float L=texture2D(uPressure,vL).x,R=texture2D(uPressure,vR).x,T=texture2D(uPressure,vT).x,B=texture2D(uPressure,vB).x;vec2 vel=texture2D(uVelocity,vUv).xy;vel.xy-=vec2(R-L,T-B);gl_FragColor=vec4(vel,0.,1.);}`);

  const displaySrc = `
    precision highp float; precision highp sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;
    uniform sampler2D uTexture,uBloom,uDithering;
    uniform vec2 ditherScale,texelSize;
    vec3 ltg(vec3 c){c=max(c,vec3(0));return max(1.055*pow(c,vec3(0.416666667))-.055,vec3(0));}
    void main(){
      vec3 c=texture2D(uTexture,vUv).rgb;
      #ifdef SHADING
        vec3 lc=texture2D(uTexture,vL).rgb,rc=texture2D(uTexture,vR).rgb;
        vec3 tc=texture2D(uTexture,vT).rgb,bc=texture2D(uTexture,vB).rgb;
        float dx=length(rc)-length(lc),dy=length(tc)-length(bc);
        vec3 n=normalize(vec3(dx,dy,length(texelSize)));
        float diff=clamp(dot(n,vec3(0,0,1))+.7,.7,1.);
        c*=diff;
      #endif
      #ifdef BLOOM
        vec3 bloom=texture2D(uBloom,vUv).rgb;
        bloom=ltg(bloom); c+=bloom;
      #endif
      float a=max(c.r,max(c.g,c.b));
      gl_FragColor=vec4(c,a);
    }
  `;

  // Blit setup
  gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,-1,1,1,1,1,-1]), gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2,0,2,3]), gl.STATIC_DRAW);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(0);

  const blit = (target, clear) => {
    if (target == null) {
      gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    } else {
      gl.viewport(0, 0, target.width, target.height);
      gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
    }
    if (clear) { gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }
    gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
  };

  const copyProg   = new Program(baseVS, copyFS);
  const clearProg  = new Program(baseVS, clearFS);
  const bpProg     = new Program(baseVS, bpFS);
  const bbProg     = new Program(baseVS, bbFS);
  const bfProg     = new Program(blurVS, bfFS);
  const splatProg  = new Program(baseVS, splatFS);
  const advProg    = new Program(baseVS, advFS);
  const divProg    = new Program(baseVS, divFS);
  const curlProg   = new Program(baseVS, curlFS);
  const vortProg   = new Program(baseVS, vortFS);
  const pressProg  = new Program(baseVS, pressFS);
  const gradProg   = new Program(baseVS, gradFS);
  const displayMat = new Material(baseVS, displaySrc);

  displayMat.setKeywords([...(config.SHADING ? ['SHADING'] : []), ...(config.BLOOM ? ['BLOOM'] : [])]);

  function createFBO(w, h, iF, f, t, p) {
    gl.activeTexture(gl.TEXTURE0);
    let tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, p);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, p);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, iF, w, h, 0, f, t, null);
    let fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    gl.viewport(0, 0, w, h); gl.clear(gl.COLOR_BUFFER_BIT);
    let tsx = 1/w, tsy = 1/h;
    return { texture: tex, fbo, width: w, height: h, texelSizeX: tsx, texelSizeY: tsy,
      attach(id){ gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; } };
  }

  function createDoubleFBO(w, h, iF, f, t, p) {
    let f1 = createFBO(w,h,iF,f,t,p), f2 = createFBO(w,h,iF,f,t,p);
    return { width:w, height:h, texelSizeX:f1.texelSizeX, texelSizeY:f1.texelSizeY,
      get read(){return f1;}, set read(v){f1=v;}, get write(){return f2;}, set write(v){f2=v;},
      swap(){let tmp=f1;f1=f2;f2=tmp;} };
  }

  function getResolution(res) {
    let ar = gl.drawingBufferWidth / gl.drawingBufferHeight;
    if (ar < 1) ar = 1/ar;
    let mn = Math.round(res), mx = Math.round(res * ar);
    return gl.drawingBufferWidth > gl.drawingBufferHeight ? {width:mx,height:mn} : {width:mn,height:mx};
  }

  const filt = ext.supportLinearFiltering ? gl.LINEAR : gl.NEAREST;
  const {formatRGBA:rgba, formatRG:rg, formatR:r} = ext;
  const tt = ext.halfFloatTexType;

  let dye = createDoubleFBO(...Object.values(getResolution(config.DYE_RESOLUTION)), rgba.internalFormat, rgba.format, tt, filt);
  let velocity = createDoubleFBO(...Object.values(getResolution(config.SIM_RESOLUTION)), rg.internalFormat, rg.format, tt, filt);
  let divergence = createFBO(...Object.values(getResolution(config.SIM_RESOLUTION)), r.internalFormat, r.format, tt, gl.NEAREST);
  let curl = createFBO(...Object.values(getResolution(config.SIM_RESOLUTION)), r.internalFormat, r.format, tt, gl.NEAREST);
  let pressure = createDoubleFBO(...Object.values(getResolution(config.SIM_RESOLUTION)), r.internalFormat, r.format, tt, gl.NEAREST);

  let bloomRes = getResolution(config.BLOOM_RESOLUTION);
  let bloom = createFBO(bloomRes.width, bloomRes.height, rgba.internalFormat, rgba.format, tt, filt);

  let ditheringTex = (() => {
    let tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB, 1, 1, 0, gl.RGB, gl.UNSIGNED_BYTE, new Uint8Array([255,255,255]));
    return { texture: tex, width: 1, height: 1,
      attach(id){ gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; } };
  })();

  function generateColor() {
    return Math.random() > 0.5
      ? [1.0 + Math.random()*0.5, 0.15*Math.random(), 0.02]
      : [0.02, 0.3 + Math.random()*0.4, 1.0 + Math.random()*0.5];
  }

  function correctRadius(r) {
    let ar = canvas.width / canvas.height;
    if (ar > 1) r *= ar;
    return r;
  }

  function correctDeltaX(d) { let ar = canvas.width/canvas.height; if(ar<1) d*=ar; return d; }
  function correctDeltaY(d) { let ar = canvas.width/canvas.height; if(ar>1) d/=ar; return d; }

  function splat(x, y, dx, dy, color) {
    splatProg.bind();
    gl.uniform1i(splatProg.uniforms.uTarget, velocity.read.attach(0));
    gl.uniform1f(splatProg.uniforms.aspectRatio, canvas.width/canvas.height);
    gl.uniform2f(splatProg.uniforms.point, x, y);
    gl.uniform3f(splatProg.uniforms.color, dx, dy, 0);
    gl.uniform1f(splatProg.uniforms.radius, correctRadius(config.SPLAT_RADIUS/100));
    blit(velocity.write); velocity.swap();
    gl.uniform1i(splatProg.uniforms.uTarget, dye.read.attach(0));
    gl.uniform3f(splatProg.uniforms.color, color[0], color[1], color[2]);
    blit(dye.write); dye.swap();
  }

  function multipleSplats(n) {
    for (let i=0; i<n; i++) {
      const c = Math.random()>0.5 ? [1.2+Math.random()*0.8,0.1+Math.random()*0.3,0.02] : [0.05,0.4+Math.random()*0.4,1.2+Math.random()*0.8];
      splat(Math.random(), Math.random(), 1000*(Math.random()-.5), 1000*(Math.random()-.5), c);
    }
  }
  multipleSplats(Math.floor(Math.random()*4+3));

  function step(dt) {
    gl.disable(gl.BLEND);
    curlProg.bind();
    gl.uniform2f(curlProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    gl.uniform1i(curlProg.uniforms.uVelocity, velocity.read.attach(0));
    blit(curl);
    vortProg.bind();
    gl.uniform2f(vortProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    gl.uniform1i(vortProg.uniforms.uVelocity, velocity.read.attach(0));
    gl.uniform1i(vortProg.uniforms.uCurl, curl.attach(1));
    gl.uniform1f(vortProg.uniforms.curl, config.CURL);
    gl.uniform1f(vortProg.uniforms.dt, dt);
    blit(velocity.write); velocity.swap();
    divProg.bind();
    gl.uniform2f(divProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    gl.uniform1i(divProg.uniforms.uVelocity, velocity.read.attach(0));
    blit(divergence);
    clearProg.bind();
    gl.uniform1i(clearProg.uniforms.uTexture, pressure.read.attach(0));
    gl.uniform1f(clearProg.uniforms.value, config.PRESSURE);
    blit(pressure.write); pressure.swap();
    pressProg.bind();
    gl.uniform2f(pressProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    gl.uniform1i(pressProg.uniforms.uDivergence, divergence.attach(0));
    for (let i=0; i<config.PRESSURE_ITERATIONS; i++) {
      gl.uniform1i(pressProg.uniforms.uPressure, pressure.read.attach(1));
      blit(pressure.write); pressure.swap();
    }
    gradProg.bind();
    gl.uniform2f(gradProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    gl.uniform1i(gradProg.uniforms.uPressure, pressure.read.attach(0));
    gl.uniform1i(gradProg.uniforms.uVelocity, velocity.read.attach(1));
    blit(velocity.write); velocity.swap();
    advProg.bind();
    gl.uniform2f(advProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (!ext.supportLinearFiltering) gl.uniform2f(advProg.uniforms.dyeTexelSize, velocity.texelSizeX, velocity.texelSizeY);
    let vid = velocity.read.attach(0);
    gl.uniform1i(advProg.uniforms.uVelocity, vid);
    gl.uniform1i(advProg.uniforms.uSource, vid);
    gl.uniform1f(advProg.uniforms.dt, dt);
    gl.uniform1f(advProg.uniforms.dissipation, config.VELOCITY_DISSIPATION);
    blit(velocity.write); velocity.swap();
    if (!ext.supportLinearFiltering) gl.uniform2f(advProg.uniforms.dyeTexelSize, dye.texelSizeX, dye.texelSizeY);
    gl.uniform1i(advProg.uniforms.uVelocity, velocity.read.attach(0));
    gl.uniform1i(advProg.uniforms.uSource, dye.read.attach(1));
    gl.uniform1f(advProg.uniforms.dissipation, config.DENSITY_DISSIPATION);
    blit(dye.write); dye.swap();
  }

  function applyBloom(src, dst) {
    if (!bloom.texelSizeX) return;
    let last = dst;
    gl.disable(gl.BLEND);
    bpProg.bind();
    let knee = config.BLOOM_THRESHOLD * config.BLOOM_SOFT_KNEE + 0.0001;
    gl.uniform3f(bpProg.uniforms.curve, config.BLOOM_THRESHOLD-knee, knee*2, 0.25/knee);
    gl.uniform1f(bpProg.uniforms.threshold, config.BLOOM_THRESHOLD);
    gl.uniform1i(bpProg.uniforms.uTexture, src.attach(0));
    blit(last);
    bbProg.bind();
    for (let i=0; i<config.BLOOM_ITERATIONS; i++) {
      gl.uniform2f(bbProg.uniforms.texelSize, last.texelSizeX, last.texelSizeY);
      gl.uniform1i(bbProg.uniforms.uTexture, last.attach(0));
      blit(dst); last = dst;
    }
    gl.blendFunc(gl.ONE, gl.ONE); gl.enable(gl.BLEND);
    bfProg.bind();
    gl.uniform2f(bfProg.uniforms.texelSize, last.texelSizeX, last.texelSizeY);
    gl.uniform1i(bfProg.uniforms.uTexture, dye.read.attach(0));
    gl.uniform1i(bfProg.uniforms.uBloom, last.attach(1));
    gl.uniform1f(bfProg.uniforms.intensity, config.BLOOM_INTENSITY);
    blit(dst); gl.disable(gl.BLEND);
  }

  function render() {
    applyBloom(dye.read, bloom);
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA); gl.enable(gl.BLEND);
    let w = gl.drawingBufferWidth, h = gl.drawingBufferHeight;
    displayMat.bind();
    if (config.SHADING) gl.uniform2f(displayMat.uniforms.texelSize, 1/w, 1/h);
    gl.uniform1i(displayMat.uniforms.uTexture, dye.read.attach(0));
    if (config.BLOOM) {
      gl.uniform1i(displayMat.uniforms.uBloom, bloom.attach(1));
      gl.uniform1i(displayMat.uniforms.uDithering, ditheringTex.attach(2));
      gl.uniform2f(displayMat.uniforms.ditherScale, canvas.width/ditheringTex.width, canvas.height/ditheringTex.height);
    }
    blit(null);
  }

  let lastTime = Date.now();

  function tick() {
    let now = Date.now();
    let dt = Math.min((now - lastTime) / 1000, 0.016666);
    lastTime = now;
    if (resizeCanvas()) {
      // re-init FBOs on resize
      const sr = getResolution(config.DYE_RESOLUTION);
      dye = createDoubleFBO(sr.width, sr.height, rgba.internalFormat, rgba.format, tt, filt);
      const sr2 = getResolution(config.SIM_RESOLUTION);
      velocity = createDoubleFBO(sr2.width, sr2.height, rg.internalFormat, rg.format, tt, filt);
      divergence = createFBO(sr2.width, sr2.height, r.internalFormat, r.format, tt, gl.NEAREST);
      curl = createFBO(sr2.width, sr2.height, r.internalFormat, r.format, tt, gl.NEAREST);
      pressure = createDoubleFBO(sr2.width, sr2.height, r.internalFormat, r.format, tt, gl.NEAREST);
    }
    if (splatStack.length > 0) {
      splatStack.splice(-1, 20).forEach(n => multipleSplats(n));
    }
    pointers.forEach(p => {
      if (p.moved) { p.moved = false; splat(p.texcoordX, p.texcoordY, p.deltaX * config.SPLAT_FORCE, p.deltaY * config.SPLAT_FORCE, p.color); }
    });
    step(dt);
    render();
    requestAnimationFrame(tick);
  }
  tick();

  // Autonomous idle splats
  setInterval(() => {
    const c = Math.random()>0.4 ? [1+Math.random(),0.1,0.02] : [0.02,0.3+Math.random()*0.3,1+Math.random()];
    const x = 0.3 + Math.random()*0.4, y = 0.3 + Math.random()*0.4;
    const a = Math.random()*Math.PI*2, f = 800+Math.random()*1200;
    splat(x, y, Math.cos(a)*f, Math.sin(a)*f, c);
  }, 1800 + Math.random()*600);

  // Mouse interaction
  if (wrapperEl) {
    wrapperEl.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      let px = (e.clientX - rect.left) / rect.width;
      let py = 1 - (e.clientY - rect.top) / rect.height;
      let p = pointers[0];
      p.deltaX = correctDeltaX(px - p.texcoordX);
      p.deltaY = correctDeltaY(py - p.texcoordY);
      p.texcoordX = px; p.texcoordY = py;
      p.color = generateColor();
      p.moved = Math.abs(p.deltaX) > 0 || Math.abs(p.deltaY) > 0;
    });
    wrapperEl.addEventListener('mouseleave', () => { pointers[0].moved = false; });
  }

  return { splatStack, splat, multipleSplats };
}

// ══════════════════════════════════════════════════════════════════
// INIT: Fluid sims for V1, V2, V4
// ══════════════════════════════════════════════════════════════════

const v1 = createFluidSim(document.getElementById('v1canvas'), document.getElementById('v1wrapper'));
const v2 = createFluidSim(document.getElementById('v2canvas'), document.getElementById('v2wrapper'));
const v4 = createFluidSim(document.getElementById('v4canvas'), document.getElementById('v4wrapper'));

// ══════════════════════════════════════════════════════════════════
// VARIATION 1: Hex Frame — hex canvas background (dark with micro pattern)
// ══════════════════════════════════════════════════════════════════
// (The fluid runs inside hex-clip, SVG border handles the frame)

// ══════════════════════════════════════════════════════════════════
// VARIATION 3: Three.js Glass Shell with fluid as background texture
// ══════════════════════════════════════════════════════════════════

(function initThreeJS() {
  const wrapper = document.getElementById('v3wrapper');
  const threeCanvas = document.getElementById('threeCanvas');

  // Off-screen fluid canvas to use as texture
  const offCanvas = document.createElement('canvas');
  offCanvas.width = 256; offCanvas.height = 256;
  offCanvas.style.display = 'none';
  document.body.appendChild(offCanvas);

  const fluidSim = createFluidSim(offCanvas, null);

  // Scene
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 0, 3.2);

  const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: true });
  renderer.setSize(250, 250);
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.setClearColor(0x000000, 0);

  // Fluid texture updated every frame
  const fluidTexture = new THREE.CanvasTexture(offCanvas);
  fluidTexture.minFilter = THREE.LinearFilter;
  fluidTexture.magFilter = THREE.LinearFilter;

  // Inner fluid sphere — fluid mapped onto surface
  const innerGeo = new THREE.SphereGeometry(0.92, 128, 128);
  const innerMat = new THREE.MeshBasicMaterial({ map: fluidTexture, side: THREE.FrontSide });
  const innerSphere = new THREE.Mesh(innerGeo, innerMat);
  scene.add(innerSphere);

  // Outer glass shell — custom shader for Fresnel + refraction
  const glassGeo = new THREE.SphereGeometry(1.0, 128, 128);
  const glassMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uEnvMap: { value: fluidTexture },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      varying vec3 vWorldPos;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPos = worldPos.xyz;
        vNormal = normalize(normalMatrix * normal);
        vec3 camPos = cameraPosition;
        vViewDir = normalize(camPos - worldPos.xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      varying vec3 vWorldPos;

      // PureBrain brand colors
      vec3 BLUE = vec3(0.165, 0.576, 0.757);
      vec3 ORANGE = vec3(0.945, 0.259, 0.043);

      void main() {
        float fresnel = pow(1.0 - abs(dot(vNormal, vViewDir)), 3.5);

        // Animated chromatic aberration on rim
        float rimPulse = 0.5 + 0.5 * sin(uTime * 1.2 + vWorldPos.y * 4.0);
        vec3 rimColor = mix(BLUE, ORANGE, rimPulse);

        // Glass body — very subtle tint
        float glassAlpha = 0.06 + fresnel * 0.72;
        vec3 glassColor = mix(vec3(0.08, 0.11, 0.22), rimColor, fresnel * 0.85);

        // Specular highlight
        vec3 reflected = reflect(-vViewDir, vNormal);
        float spec = pow(max(dot(reflected, vec3(0.3, 0.8, 0.5)), 0.0), 64.0);
        glassColor += BLUE * spec * 0.6;

        // Second specular (orange)
        float spec2 = pow(max(dot(reflected, vec3(-0.5, 0.6, 0.6)), 0.0), 48.0);
        glassColor += ORANGE * spec2 * 0.4;

        gl_FragColor = vec4(glassColor, glassAlpha);
      }
    `,
    transparent: true,
    side: THREE.FrontSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const glassSphere = new THREE.Mesh(glassGeo, glassMat);
  scene.add(glassSphere);

  // Outer rim glow — slightly larger, additive
  const rimGeo = new THREE.SphereGeometry(1.04, 64, 64);
  const rimMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec3 vNormal; varying vec3 vViewDir;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vViewDir = normalize(cameraPosition - worldPos.xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec3 vNormal; varying vec3 vViewDir;
      void main() {
        float f = pow(1.0 - abs(dot(vNormal, vViewDir)), 5.0);
        float pulse = 0.6 + 0.4 * sin(uTime * 0.9);
        vec3 c = mix(vec3(0.165, 0.576, 0.757), vec3(0.945, 0.259, 0.043), sin(uTime*0.5)*0.5+0.5);
        gl_FragColor = vec4(c * f * pulse, f * 0.55 * pulse);
      }
    `,
    transparent: true,
    side: THREE.BackSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const rimSphere = new THREE.Mesh(rimGeo, rimMat);
  scene.add(rimSphere);

  let t = 0;
  const clock = new THREE.Clock();

  // Hover interaction
  let mouseX = 0, mouseY = 0;
  wrapper.addEventListener('mousemove', e => {
    const rect = wrapper.getBoundingClientRect();
    mouseX = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    mouseY = -((e.clientY - rect.top) / rect.height - 0.5) * 2;
    // Feed mouse to fluid sim too
    fluidSim.splat(
      (e.clientX - rect.left) / rect.width,
      1 - (e.clientY - rect.top) / rect.height,
      mouseX * 1500, mouseY * 1500,
      Math.random() > 0.5
        ? [1.2 + Math.random()*0.6, 0.1, 0.02]
        : [0.02, 0.3 + Math.random()*0.3, 1.2 + Math.random()*0.6]
    );
  });

  function animateThree() {
    requestAnimationFrame(animateThree);
    const delta = clock.getDelta();
    t += delta;

    // Gentle rotation + hover tilt
    const targetRotX = mouseY * 0.25;
    const targetRotY = mouseX * 0.25 + t * 0.15;
    innerSphere.rotation.y = glassSphere.rotation.y = rimSphere.rotation.y = targetRotY;
    innerSphere.rotation.x = glassSphere.rotation.x = rimSphere.rotation.x += (targetRotX - glassSphere.rotation.x) * 0.08;

    // Update time uniforms
    glassMat.uniforms.uTime.value = t;
    rimMat.uniforms.uTime.value = t;

    // Sync fluid texture every frame
    fluidTexture.needsUpdate = true;

    renderer.render(scene, camera);
  }
  animateThree();
})();

// ══════════════════════════════════════════════════════════════════
// VARIATION 4: Hex Grid Overlay — generate honeycomb SVG + pulse cells
// ══════════════════════════════════════════════════════════════════

(function buildHexOverlay() {
  const svgEl = document.getElementById('hexOverlaySvg');
  const group = document.getElementById('hexCells');
  const ns = 'http://www.w3.org/2000/svg';

  const SIZE = 238;
  const CX = 119, CY = 119, RADIUS = 119;
  const HEX_SIZE = 16;  // circumradius
  const HEX_W = HEX_SIZE * 2;
  const HEX_H = Math.sqrt(3) * HEX_SIZE;
  const COLS_APPROX = Math.ceil(SIZE / (HEX_W * 0.75)) + 2;
  const ROWS_APPROX = Math.ceil(SIZE / HEX_H) + 2;

  const hexCellEls = [];

  function hexPoints(cx, cy, r) {
    let pts = [];
    for (let i = 0; i < 6; i++) {
      let a = Math.PI / 180 * (60 * i - 30);
      pts.push((cx + r * Math.cos(a)).toFixed(2) + ',' + (cy + r * Math.sin(a)).toFixed(2));
    }
    return pts.join(' ');
  }

  for (let row = -2; row < ROWS_APPROX + 2; row++) {
    for (let col = -2; col < COLS_APPROX + 2; col++) {
      let x = col * HEX_W * 0.75;
      let y = row * HEX_H + (col % 2 === 0 ? 0 : HEX_H * 0.5);
      x += HEX_SIZE;
      y += HEX_H / 2;

      // Only include cells near the circle boundary
      let dist = Math.sqrt((x - CX) ** 2 + (y - CY) ** 2);
      if (dist > RADIUS + HEX_SIZE) continue;

      let poly = document.createElementNS(ns, 'polygon');
      poly.setAttribute('points', hexPoints(x, y, HEX_SIZE - 0.5));

      // Cells fully inside circle: mostly transparent, slight fill
      // Cells near edge: slightly more visible
      const edgeFactor = Math.max(0, 1 - (RADIUS - dist) / (RADIUS * 0.3));
      const baseFill = dist < RADIUS ? 0.04 + edgeFactor * 0.08 : 0;
      const baseStroke = dist < RADIUS ? 0.12 + edgeFactor * 0.18 : 0;

      poly.setAttribute('fill', `rgba(42,147,193,${baseFill.toFixed(3)})`);
      poly.setAttribute('stroke', `rgba(42,147,193,${baseStroke.toFixed(3)})`);
      poly.setAttribute('stroke-width', '0.8');

      // Store for animation
      poly.dataset.cx = x;
      poly.dataset.cy = y;
      poly.dataset.dist = dist;
      poly.dataset.baseFill = baseFill;
      poly.dataset.baseStroke = baseStroke;

      group.appendChild(poly);
      if (dist < RADIUS) hexCellEls.push(poly);
    }
  }

  // Animate hex cells — pulse based on distance waves
  let hexTime = 0;
  function animateHex() {
    hexTime += 0.035;
    hexCellEls.forEach(poly => {
      const cx = parseFloat(poly.dataset.cx);
      const cy = parseFloat(poly.dataset.cy);
      const dist = parseFloat(poly.dataset.dist);
      const baseFill = parseFloat(poly.dataset.baseFill);
      const baseStroke = parseFloat(poly.dataset.baseStroke);

      // Ripple wave from center
      const wave = Math.sin(hexTime - dist * 0.05) * 0.5 + 0.5;
      const wave2 = Math.sin(hexTime * 1.3 + (cx / SIZE) * Math.PI * 3) * 0.5 + 0.5;
      const combined = wave * 0.6 + wave2 * 0.4;

      // Occasional bright cell flash
      const brightRand = Math.sin(hexTime * 2.1 + cx * 0.3 + cy * 0.2);
      const bright = brightRand > 0.88 ? (brightRand - 0.88) * 8 : 0;

      const fillAlpha = Math.min(0.35, baseFill + combined * 0.12 + bright * 0.18);
      const strokeAlpha = Math.min(0.55, baseStroke + combined * 0.15 + bright * 0.25);

      // Alternate between blue and orange tint on bright cells
      const color = bright > 0.05
        ? `rgba(241,66,11,${fillAlpha.toFixed(3)})`
        : `rgba(42,147,193,${fillAlpha.toFixed(3)})`;
      const strokeColor = bright > 0.05
        ? `rgba(241,66,11,${strokeAlpha.toFixed(3)})`
        : `rgba(42,147,193,${strokeAlpha.toFixed(3)})`;

      poly.setAttribute('fill', color);
      poly.setAttribute('stroke', strokeColor);
    });
    requestAnimationFrame(animateHex);
  }
  animateHex();
})();
</script>
