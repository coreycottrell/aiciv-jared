<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────
const C = {
  BG:           0x080a12,
  BLUE:         0x2a93c1,
  ORANGE:       0xf1420b,
  WHITE:        0xffffff,
  NODE_COUNT:   560,
  BRAIN_RADIUS: 3.0,
  CONN_DIST:    1.1,
  MAX_CONNS:    980,
  FIRE_RATE:    0.007,
  FIRE_DECAY:   0.96,
  BLOOM_STR:    1.8,
  BLOOM_THRESH: 0.15,
  BLOOM_RADIUS: 0.6,

  // Camera journey
  CAM_START_Z:  52,
  CAM_END_Z:    0.0,
  FLY_DURATION: 9000,

  // After entry: slow drift inside
  DRIFT_SPEED:  0.008,
  LOOK_SMOOTH:  0.032,
};

// ─────────────────────────────────────────────
// Phase state
// ─────────────────────────────────────────────
let phase       = 0;
let flyStart    = null;
let insideTime  = 0;
let entryPulse  = false;

// ─────────────────────────────────────────────
// Scene setup
// ─────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(C.BG);
scene.fog = new THREE.FogExp2(C.BG, 0.0);

const camera = new THREE.PerspectiveCamera(70, W() / H(), 0.05, 120);
camera.position.set(0, 0, C.CAM_START_Z);
camera.lookAt(0, 0, 0);

const lookTarget   = new THREE.Vector3(0, 0, -1);
const lookCurrent  = new THREE.Euler(0, 0, 0, 'YXZ');
const lookDesired  = new THREE.Euler(0, 0, 0, 'YXZ');

// ─────────────────────────────────────────────
// Post-processing
// ─────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(W(), H()),
  C.BLOOM_STR,
  C.BLOOM_RADIUS,
  C.BLOOM_THRESH
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function rnd(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function easeInQuart(t) { return t*t*t*t; }
function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10*t); }

// ─────────────────────────────────────────────
// Brain node generation
// ─────────────────────────────────────────────
function brainPoint(radius) {
  const phi   = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;

  const x0 = Math.sin(phi) * Math.cos(theta);
  const y0 = Math.sin(phi) * Math.sin(theta);
  const z0 = Math.cos(phi);

  const xS = x0 * 1.0;
  const yS = y0 * 0.82;
  const zS = z0 * 1.14;

  const bump = 1.0 + 0.12 * Math.sin(x0*7.3) * Math.cos(y0*5.1) * Math.sin(z0*6.7);
  const r    = radius * bump * rnd(0.78, 1.0);

  const len = Math.sqrt(xS*xS + yS*yS + zS*zS);
  return new THREE.Vector3(xS/len * r, yS/len * r, zS/len * r);
}

// ─────────────────────────────────────────────
// Nodes
// ─────────────────────────────────────────────
const nodePositions = [];
for (let i = 0; i < C.NODE_COUNT; i++) {
  nodePositions.push(brainPoint(C.BRAIN_RADIUS));
}

const nodeGeo  = new THREE.SphereGeometry(0.03, 6, 6);
const nodeMat  = new THREE.MeshBasicMaterial({ color: C.BLUE });
const nodeMesh = new THREE.InstancedMesh(nodeGeo, nodeMat, C.NODE_COUNT);
nodeMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

const nodeEnergy = new Float32Array(C.NODE_COUNT);
const dummy      = new THREE.Object3D();
const tempColor  = new THREE.Color();

for (let i = 0; i < C.NODE_COUNT; i++) {
  dummy.position.copy(nodePositions[i]);
  dummy.scale.setScalar(1);
  dummy.updateMatrix();
  nodeMesh.setMatrixAt(i, dummy.matrix);
  nodeMesh.setColorAt(i, new THREE.Color(C.BLUE));
}
nodeMesh.instanceMatrix.needsUpdate = true;
nodeMesh.instanceColor.needsUpdate  = true;

// ─────────────────────────────────────────────
// Connections
// ─────────────────────────────────────────────
const edges    = [];
const edgeFlow = [];

for (let i = 0; i < C.NODE_COUNT && edges.length < C.MAX_CONNS; i++) {
  for (let j = i + 1; j < C.NODE_COUNT && edges.length < C.MAX_CONNS; j++) {
    if (nodePositions[i].distanceTo(nodePositions[j]) < C.CONN_DIST) {
      edges.push([i, j]);
      edgeFlow.push(0);
    }
  }
}

const linePositions = new Float32Array(edges.length * 6);
const lineColors    = new Float32Array(edges.length * 6);

for (let e = 0; e < edges.length; e++) {
  const [i, j] = edges[e];
  const pi = nodePositions[i], pj = nodePositions[j];
  const b = e * 6;
  linePositions[b]   = pi.x; linePositions[b+1] = pi.y; linePositions[b+2] = pi.z;
  linePositions[b+3] = pj.x; linePositions[b+4] = pj.y; linePositions[b+5] = pj.z;
}

const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
lineGeo.setAttribute('color',    new THREE.BufferAttribute(lineColors,    3));

const lineMat = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent:  true,
  opacity:      0.5,
  blending:     THREE.AdditiveBlending,
  depthWrite:   false,
});
const lineMesh = new THREE.LineSegments(lineGeo, lineMat);

// ─────────────────────────────────────────────
// Hexagon logo
// ─────────────────────────────────────────────
function makeHexRing(radius, innerR, rotAngle, color, opacity) {
  const shape = new THREE.Shape();
  const sides  = 6;
  for (let s = 0; s < sides; s++) {
    const a = (s / sides) * Math.PI * 2 + rotAngle;
    if (s === 0) shape.moveTo(Math.cos(a)*radius, Math.sin(a)*radius);
    else         shape.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
  }
  shape.closePath();
  const hole = new THREE.Path();
  for (let s = 0; s < sides; s++) {
    const a = (s / sides) * Math.PI * 2 + rotAngle;
    if (s === 0) hole.moveTo(Math.cos(a)*innerR, Math.sin(a)*innerR);
    else         hole.lineTo(Math.cos(a)*innerR, Math.sin(a)*innerR);
  }
  hole.closePath();
  shape.holes.push(hole);

  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  return new THREE.Mesh(geo, mat);
}

const hexGroup = new THREE.Group();
[
  { rot: 0,             color: 0x2a93c1, op: 0.55 },
  { rot: Math.PI/3,     color: 0x2a93c1, op: 0.45 },
  { rot: Math.PI/1.5,   color: 0xf1420b, op: 0.30 },
].forEach(cfg => hexGroup.add(makeHexRing(0.38, 0.24, cfg.rot, cfg.color, cfg.op)));

const orbGeo = new THREE.SphereGeometry(0.09, 16, 16);
const orbMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending,
});
hexGroup.add(new THREE.Mesh(orbGeo, orbMat));

hexGroup.position.set(1.2, 0.3, -1.5);
hexGroup.scale.setScalar(0);

// ─────────────────────────────────────────────
// Inner ambient particles
// ─────────────────────────────────────────────
const INNER_COUNT = 320;
const innerGeo    = new THREE.BufferGeometry();
const innerPos    = new Float32Array(INNER_COUNT * 3);
const innerCol    = new Float32Array(INNER_COUNT * 3);
for (let i = 0; i < INNER_COUNT; i++) {
  const r = rnd(0, C.BRAIN_RADIUS * 0.9);
  const theta = rnd(0, Math.PI * 2);
  const phi   = Math.acos(rnd(-1, 1));
  innerPos[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
  innerPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.82;
  innerPos[i*3+2] = r * Math.cos(phi) * 1.14;
  const isOrange = Math.random() < 0.2;
  innerCol[i*3+0] = isOrange ? 0.94 : 0.165;
  innerCol[i*3+1] = isOrange ? 0.25 : 0.578;
  innerCol[i*3+2] = isOrange ? 0.04 : 0.757;
}
innerGeo.setAttribute('position', new THREE.BufferAttribute(innerPos, 3));
innerGeo.setAttribute('color',    new THREE.BufferAttribute(innerCol, 3));
const innerMat  = new THREE.PointsMaterial({
  size: 0.035, vertexColors: true, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const innerParticles = new THREE.Points(innerGeo, innerMat);

// ─────────────────────────────────────────────
// Outer background particles
// ─────────────────────────────────────────────
const OUTER_COUNT = 240;
const outerGeo    = new THREE.BufferGeometry();
const outerPos    = new Float32Array(OUTER_COUNT * 3);
const outerCol    = new Float32Array(OUTER_COUNT * 3);
for (let i = 0; i < OUTER_COUNT; i++) {
  outerPos[i*3+0] = rnd(-18, 18);
  outerPos[i*3+1] = rnd(-12, 12);
  outerPos[i*3+2] = rnd(-20, 8);
  const isOrange = Math.random() < 0.12;
  outerCol[i*3+0] = isOrange ? 0.94 : 0.165;
  outerCol[i*3+1] = isOrange ? 0.25 : 0.578;
  outerCol[i*3+2] = isOrange ? 0.04 : 0.757;
}
outerGeo.setAttribute('position', new THREE.BufferAttribute(outerPos, 3));
outerGeo.setAttribute('color',    new THREE.BufferAttribute(outerCol, 3));
const outerMat  = new THREE.PointsMaterial({
  size: 0.06, vertexColors: true, transparent: true, opacity: 0.3,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const outerParticles = new THREE.Points(outerGeo, outerMat);

// ─────────────────────────────────────────────
// Scene assembly
// ─────────────────────────────────────────────
scene.add(nodeMesh);
scene.add(lineMesh);
scene.add(hexGroup);
scene.add(innerParticles);
scene.add(outerParticles);

// ─────────────────────────────────────────────
// Adjacency for propagation
// ─────────────────────────────────────────────
const adjacency = Array.from({length: C.NODE_COUNT}, () => []);
edges.forEach(([i, j]) => {
  adjacency[i].push(j);
  adjacency[j].push(i);
});

// ─────────────────────────────────────────────
// Neural activity
// ─────────────────────────────────────────────
function spontaneousFire() {
  const rate = phase >= 2 ? C.FIRE_RATE * 1.8 : C.FIRE_RATE;
  if (Math.random() < rate) {
    const idx = Math.floor(Math.random() * C.NODE_COUNT);
    nodeEnergy[idx] = clamp(nodeEnergy[idx] + rnd(0.4, 1.0), 0, 1);
  }
}

function propagateEnergy() {
  for (let i = 0; i < C.NODE_COUNT; i++) {
    if (nodeEnergy[i] > 0.35) {
      const neighbors = adjacency[i];
      const spreadCount = Math.min(neighbors.length, 3);
      for (let n = 0; n < spreadCount; n++) {
        const j = neighbors[Math.floor(Math.random() * neighbors.length)];
        if (nodeEnergy[j] < nodeEnergy[i]) {
          nodeEnergy[j] = clamp(
            nodeEnergy[j] + nodeEnergy[i] * 0.28 * Math.random(),
            0, 1
          );
        }
      }
    }
    nodeEnergy[i] *= C.FIRE_DECAY;
    if (nodeEnergy[i] < 0.001) nodeEnergy[i] = 0;
  }
}

// ─────────────────────────────────────────────
// Color logic
// ─────────────────────────────────────────────
const COL_BLUE   = new THREE.Color(C.BLUE);
const COL_ORANGE = new THREE.Color(C.ORANGE);
const COL_WHITE  = new THREE.Color(C.WHITE);

function energyToColor(e, out) {
  if (e < 0.5) {
    out.lerpColors(COL_BLUE, COL_ORANGE, e * 2);
  } else {
    out.lerpColors(COL_ORANGE, COL_WHITE, (e - 0.5) * 2);
  }
}

function updateNodes() {
  for (let i = 0; i < C.NODE_COUNT; i++) {
    const e = nodeEnergy[i];
    energyToColor(e, tempColor);
    const scale = 1.0 + e * 3.2;
    dummy.position.copy(nodePositions[i]);
    dummy.scale.setScalar(scale);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
    nodeMesh.setColorAt(i, tempColor);
  }
  nodeMesh.instanceMatrix.needsUpdate = true;
  nodeMesh.instanceColor.needsUpdate  = true;
}

const edgeColorA = new THREE.Color();
const edgeColorB = new THREE.Color();

function updateEdges() {
  for (let e = 0; e < edges.length; e++) {
    const [i, j] = edges[e];
    energyToColor(nodeEnergy[i], edgeColorA);
    energyToColor(nodeEnergy[j], edgeColorB);
    const b = e * 6;
    lineColors[b]   = edgeColorA.r; lineColors[b+1] = edgeColorA.g; lineColors[b+2] = edgeColorA.b;
    lineColors[b+3] = edgeColorB.r; lineColors[b+4] = edgeColorB.g; lineColors[b+5] = edgeColorB.b;
  }
  lineGeo.attributes.color.needsUpdate = true;
}

// ─────────────────────────────────────────────
// Mouse / touch look
// ─────────────────────────────────────────────
const mouseNDC    = new THREE.Vector2(0, 0);
let   isPointerLocked = false;
let   mouseDeltaX = 0, mouseDeltaY = 0;

renderer.domElement.addEventListener('click', () => {
  if (phase >= 2 && !isPointerLocked) {
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', e => {
  if (isPointerLocked) {
    mouseDeltaX += e.movementX;
    mouseDeltaY += e.movementY;
  } else {
    mouseNDC.x = (e.clientX / W()) * 2 - 1;
    mouseNDC.y = -(e.clientY / H()) * 2 + 1;
  }
});

let gyroAvailable = false;
let gyroAlpha = 0, gyroBeta = 0, gyroGamma = 0;
if ('DeviceOrientationEvent' in window) {
  window.addEventListener('deviceorientation', e => {
    if (e.alpha !== null) {
      gyroAvailable = true;
      gyroAlpha  = e.alpha  || 0;
      gyroBeta   = e.beta   || 0;
      gyroGamma  = e.gamma  || 0;
    }
  });
}

window.addEventListener('touchstart', e => {
  if (phase >= 2) { fireAllAround(); }
}, { passive: true });

// ─────────────────────────────────────────────
// Click — fire cascade
// ─────────────────────────────────────────────
function fireAllAround() {
  const count = Math.floor(C.NODE_COUNT * (phase >= 2 ? 0.55 : 0.35));
  for (let n = 0; n < C.NODE_COUNT; n++) {
    if (Math.random() < count / C.NODE_COUNT) {
      nodeEnergy[n] = clamp(nodeEnergy[n] + rnd(0.5, 1.0), 0, 1);
    }
  }
  bloom.strength = 4.2;
  setTimeout(() => { bloom.strength = C.BLOOM_STR + (phase >= 2 ? 0.4 : 0); }, 500);
}

window.addEventListener('click', e => {
  if (phase >= 2 && isPointerLocked) return;

  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left   = e.clientX + 'px';
  el.style.top    = e.clientY + 'px';
  el.style.width  = el.style.height = '80px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);

  if (phase >= 2 || phase === 1) { fireAllAround(); }
});

// ─────────────────────────────────────────────
// Entry pulse wave
// ─────────────────────────────────────────────
function triggerEntryPulse() {
  if (entryPulse) return;
  entryPulse = true;

  const flash = document.getElementById('entry-flash');
  flash.classList.add('fire');
  setTimeout(() => flash.classList.remove('fire'), 2000);

  for (let i = 0; i < C.NODE_COUNT; i++) {
    const dist = nodePositions[i].length();
    const delay = dist * 140;
    setTimeout(() => { nodeEnergy[i] = rnd(0.7, 1.0); }, delay);
  }

  bloom.strength = 5.5;
  setTimeout(() => {
    bloom.strength = C.BLOOM_STR + 0.5;
    setTimeout(() => { bloom.strength = C.BLOOM_STR; }, 800);
  }, 400);

  scene.fog = new THREE.FogExp2(C.BG, 0.08);

  const bb = document.getElementById('brand-block');
  bb.classList.add('visible');

  const ec = document.getElementById('entry-card');
  ec.classList.add('hidden');

  const pl = document.getElementById('phase-label');
  pl.textContent = 'Inside the neural network';
  pl.classList.add('visible');

  const targetScale = 1.0;
  let scaleT = 0;
  const hexScaleIn = setInterval(() => {
    scaleT += 0.04;
    hexGroup.scale.setScalar(easeOutExpo(Math.min(scaleT, 1)) * targetScale);
    if (scaleT >= 1) clearInterval(hexScaleIn);
  }, 20);

  let innerOpT = 0;
  const innerFade = setInterval(() => {
    innerOpT += 0.015;
    innerMat.opacity = Math.min(innerOpT, 0.5);
    if (innerOpT >= 0.5) clearInterval(innerFade);
  }, 30);
}

// ─────────────────────────────────────────────
// Camera update per frame
// ─────────────────────────────────────────────
const _camQ    = new THREE.Quaternion();
const _camUp   = new THREE.Vector3(0, 1, 0);
const _camFwd  = new THREE.Vector3();

function updateCamera(now, dt) {
  if (phase === 0) {
    if (flyStart === null) flyStart = now;
    const elapsed  = now - flyStart;
    const progress = clamp(elapsed / C.FLY_DURATION, 0, 1);
    const eased    = easeInOutCubic(progress);

    camera.position.z = C.CAM_START_Z + (C.CAM_END_Z - C.CAM_START_Z) * eased;
    camera.position.x = Math.sin(progress * Math.PI * 1.5) * 0.3 * (1 - progress);
    camera.position.y = Math.cos(progress * Math.PI * 0.8) * 0.15 * (1 - progress);
    camera.lookAt(0, 0, 0);

    outerMat.opacity = 0.3 + progress * 0.2;

    if (progress >= 0.72) {
      phase = 1;
      document.getElementById('phase-label').textContent = 'Entering...';
      document.getElementById('phase-label').classList.add('visible');
    }
    if (progress >= 1.0) {
      phase = 2;
      triggerEntryPulse();
    }

  } else if (phase === 1) {
    const elapsed  = now - flyStart;
    const progress = clamp(elapsed / C.FLY_DURATION, 0, 1);
    const eased    = easeInOutCubic(progress);
    camera.position.z = C.CAM_START_Z + (C.CAM_END_Z - C.CAM_START_Z) * eased;
    camera.position.x = Math.sin(progress * Math.PI * 1.5) * 0.3 * (1 - progress);
    camera.position.y = Math.cos(progress * Math.PI * 0.8) * 0.15 * (1 - progress);
    camera.lookAt(0, 0, 0);

    if (progress >= 1.0) {
      phase = 2;
      triggerEntryPulse();
    }

  } else if (phase === 2) {
    insideTime += 0.016 * dt;

    if (isPointerLocked) {
      lookDesired.y -= mouseDeltaX * 0.0015;
      lookDesired.x -= mouseDeltaY * 0.0015;
      mouseDeltaX = 0;
      mouseDeltaY = 0;
    } else if (gyroAvailable) {
      lookDesired.y = -(gyroGamma / 45) * 0.8;
      lookDesired.x = ((gyroBeta - 45) / 45) * 0.5;
    } else {
      lookDesired.y = -mouseNDC.x * 0.55;
      lookDesired.x =  mouseNDC.y * 0.35;
    }

    lookDesired.x = clamp(lookDesired.x, -0.7, 0.7);
    lookCurrent.x += (lookDesired.x - lookCurrent.x) * C.LOOK_SMOOTH * dt;
    lookCurrent.y += (lookDesired.y - lookCurrent.y) * C.LOOK_SMOOTH * dt;
    camera.rotation.set(lookCurrent.x, lookCurrent.y, 0, 'YXZ');

    const driftR = 0.4;
    const driftT = insideTime * C.DRIFT_SPEED;
    camera.position.x += (driftR * Math.sin(driftT * 0.7) * 0.5 - camera.position.x) * 0.005 * dt;
    camera.position.y += (driftR * Math.cos(driftT * 0.4) * 0.3 - camera.position.y) * 0.005 * dt;
    camera.position.z += (0 - camera.position.z) * 0.002 * dt;

    hexGroup.rotation.z = insideTime * 0.25;
    hexGroup.position.y = 0.3 + Math.sin(insideTime * 0.6) * 0.06;
    hexGroup.position.x = 1.2 + Math.sin(insideTime * 0.3) * 0.08;
  }
}

// ─────────────────────────────────────────────
// Connection visibility
// ─────────────────────────────────────────────
function updateConnectionVisibility() {
  if (phase === 0 || phase === 1) {
    const elapsed  = flyStart ? (performance.now() - flyStart) : 0;
    const progress = clamp(elapsed / C.FLY_DURATION, 0, 1);
    lineMat.opacity = 0.15 + progress * 0.45;
  } else {
    lineMat.opacity = 0.55;
  }
}

// ─────────────────────────────────────────────
// Initial burst
// ─────────────────────────────────────────────
setTimeout(() => {
  const burst = Math.floor(C.NODE_COUNT * 0.18);
  for (let i = 0; i < burst; i++) {
    const idx = Math.floor(Math.random() * C.NODE_COUNT);
    nodeEnergy[idx] = rnd(0.3, 0.8);
  }
}, 400);

setTimeout(() => {
  document.getElementById('phase-label').textContent = 'Approaching neural cortex';
  document.getElementById('phase-label').classList.add('visible');
}, 1200);

// ─────────────────────────────────────────────
// Outer particle drift
// ─────────────────────────────────────────────
function updateOuterParticles(dt) {
  const pp = outerGeo.attributes.position;
  for (let i = 0; i < OUTER_COUNT; i++) {
    pp.array[i*3+2] += 0.004 * dt;
    if (pp.array[i*3+2] > 12) pp.array[i*3+2] = -22;
    pp.array[i*3+0] += Math.sin(performance.now()*0.0003 + i) * 0.0005 * dt;
    pp.array[i*3+1] += Math.cos(performance.now()*0.0002 + i) * 0.0003 * dt;
  }
  pp.needsUpdate = true;
}

// ─────────────────────────────────────────────
// Inner particle float
// ─────────────────────────────────────────────
function updateInnerParticles(t, dt) {
  const pp = innerGeo.attributes.position;
  for (let i = 0; i < INNER_COUNT; i++) {
    const angle = t * 0.12 + i * 0.41;
    pp.array[i*3+0] += Math.sin(angle * 0.7) * 0.0008 * dt;
    pp.array[i*3+1] += Math.cos(angle * 0.5) * 0.0006 * dt;
    pp.array[i*3+2] += Math.sin(angle * 0.3) * 0.0005 * dt;

    const r = Math.sqrt(
      pp.array[i*3]*pp.array[i*3] +
      pp.array[i*3+1]*pp.array[i*3+1] +
      pp.array[i*3+2]*pp.array[i*3+2]
    );
    if (r > C.BRAIN_RADIUS * 0.95) {
      const scale = (C.BRAIN_RADIUS * 0.9) / r;
      pp.array[i*3]   *= scale;
      pp.array[i*3+1] *= scale;
      pp.array[i*3+2] *= scale;
    }
  }
  pp.needsUpdate = true;
}

// ─────────────────────────────────────────────
// Animation loop
// ─────────────────────────────────────────────
let t = 0;
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);

  const dt = clamp((now - lastTime) / 16.67, 0.1, 4);
  lastTime = now;
  t += 0.016 * dt;

  updateCamera(now, dt);
  updateOuterParticles(dt);
  if (phase >= 2) updateInnerParticles(t, dt);

  updateConnectionVisibility();

  spontaneousFire();
  propagateEnergy();
  updateNodes();
  updateEdges();

  const baseBloom = C.BLOOM_STR + (phase >= 2 ? 0.5 : 0);
  bloom.strength = baseBloom + Math.sin(t * 1.3) * 0.15;

  composer.render();
}

animate(performance.now());

// ─────────────────────────────────────────────
// Resize
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
  composer.setSize(W(), H());
  bloom.setSize(W(), H());
});

if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.addEventListener('click', () => {
    DeviceOrientationEvent.requestPermission().catch(() => {});
  }, { once: true });
}

</script>
