<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────
const C = {
  BG:           0x080a12,
  BLUE:         0x2a93c1,
  ORANGE:       0xf1420b,
  WHITE:        0xffffff,
  NODE_COUNT:   520,
  BRAIN_RADIUS: 2.6,
  CONN_DIST:    1.05,
  MAX_CONNS:    900,
  FIRE_RATE:    0.0055,
  FIRE_DECAY:   0.96,
  PULSE_SPEED:  0.018,
  BLOOM_STR:    1.6,
  BLOOM_THRESH: 0.18,
  BLOOM_RADIUS: 0.55,
};

// ─────────────────────────────────────────────
// Scene setup
// ─────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(C.BG);

const camera = new THREE.PerspectiveCamera(55, W() / H(), 0.1, 80);
camera.position.set(0, 0, 9);

// ─────────────────────────────────────────────
// Post-processing
// ─────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(W(), H()),
  C.BLOOM_STR,
  C.BLOOM_RADIUS,
  C.BLOOM_THRESH
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function rnd(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Organic brain-shape point distribution
// Combines sphere with cortical fold-like deformation
function brainPoint(radius) {
  // Fibonacci sphere for even initial distribution
  const phi   = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;

  // Apply organic deformation to make it brain-shaped
  const x0 = Math.sin(phi) * Math.cos(theta);
  const y0 = Math.sin(phi) * Math.sin(theta);
  const z0 = Math.cos(phi);

  // Squash vertically, elongate front-back = brain silhouette
  const xS = x0 * 1.0;
  const yS = y0 * 0.82;
  const zS = z0 * 1.14;

  // Add cortical bumps via noise-like perturbation
  const bump = 1.0 + 0.12 * Math.sin(x0 * 7.3) * Math.cos(y0 * 5.1) * Math.sin(z0 * 6.7);
  const r    = radius * bump * rnd(0.78, 1.0);

  const len = Math.sqrt(xS*xS + yS*yS + zS*zS);
  return new THREE.Vector3(xS/len * r, yS/len * r, zS/len * r);
}

// ─────────────────────────────────────────────
// Nodes (InstancedMesh)
// ─────────────────────────────────────────────
const nodePositions = [];
for (let i = 0; i < C.NODE_COUNT; i++) {
  nodePositions.push(brainPoint(C.BRAIN_RADIUS));
}

const nodeGeo  = new THREE.SphereGeometry(0.028, 6, 6);
const nodeMat  = new THREE.MeshBasicMaterial({ color: C.BLUE });
const nodeMesh = new THREE.InstancedMesh(nodeGeo, nodeMat, C.NODE_COUNT);
nodeMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

const nodeEnergy   = new Float32Array(C.NODE_COUNT);  // 0=off, 1=peak
const nodeColor    = new Float32Array(C.NODE_COUNT * 3);
const nodeScale    = new Float32Array(C.NODE_COUNT).fill(1);
const dummy        = new THREE.Object3D();
const tempColor    = new THREE.Color();

for (let i = 0; i < C.NODE_COUNT; i++) {
  dummy.position.copy(nodePositions[i]);
  dummy.scale.setScalar(1);
  dummy.updateMatrix();
  nodeMesh.setMatrixAt(i, dummy.matrix);
  nodeMesh.setColorAt(i, new THREE.Color(C.BLUE));
}
nodeMesh.instanceMatrix.needsUpdate = true;
nodeMesh.instanceColor.needsUpdate  = true;
scene.add(nodeMesh);

// ─────────────────────────────────────────────
// Connections (LineSegments)
// ─────────────────────────────────────────────
// Build adjacency based on distance
const edges     = [];          // [i, j]
const edgeFlow  = [];          // 0-1 energy traveling along edge

function buildConnections() {
  // Use a grid acceleration structure for distance check
  for (let i = 0; i < C.NODE_COUNT && edges.length < C.MAX_CONNS; i++) {
    const pi = nodePositions[i];
    for (let j = i + 1; j < C.NODE_COUNT && edges.length < C.MAX_CONNS; j++) {
      if (pi.distanceTo(nodePositions[j]) < C.CONN_DIST) {
        edges.push([i, j]);
        edgeFlow.push(0);
      }
    }
  }
}
buildConnections();

// Positions buffer: 2 verts per edge
const linePositions = new Float32Array(edges.length * 6);
const lineColors    = new Float32Array(edges.length * 6);

function updateLineBuffer() {
  for (let e = 0; e < edges.length; e++) {
    const [i, j] = edges[e];
    const pi = nodePositions[i];
    const pj = nodePositions[j];
    const base = e * 6;
    linePositions[base+0] = pi.x; linePositions[base+1] = pi.y; linePositions[base+2] = pi.z;
    linePositions[base+3] = pj.x; linePositions[base+4] = pj.y; linePositions[base+5] = pj.z;
  }
}
updateLineBuffer();

const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
lineGeo.setAttribute('color',    new THREE.BufferAttribute(lineColors,    3));

const lineMat = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent:  true,
  opacity:      0.55,
  blending:     THREE.AdditiveBlending,
  depthWrite:   false,
});
const lineMesh = new THREE.LineSegments(lineGeo, lineMat);
scene.add(lineMesh);

// ─────────────────────────────────────────────
// Hexagon Logo (center-front)
// ─────────────────────────────────────────────
function makeHexRing(radius, innerR, rotAngle, color, opacity) {
  const shape = new THREE.Shape();
  const sides  = 6;
  for (let s = 0; s < sides; s++) {
    const a = (s / sides) * Math.PI * 2 + rotAngle;
    if (s === 0) shape.moveTo(Math.cos(a)*radius, Math.sin(a)*radius);
    else         shape.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
  }
  shape.closePath();

  // Punch inner hole
  const hole = new THREE.Path();
  for (let s = 0; s < sides; s++) {
    const a = (s / sides) * Math.PI * 2 + rotAngle;
    if (s === 0) hole.moveTo(Math.cos(a)*innerR, Math.sin(a)*innerR);
    else         hole.lineTo(Math.cos(a)*innerR, Math.sin(a)*innerR);
  }
  hole.closePath();
  shape.holes.push(hole);

  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity,
    side:        THREE.DoubleSide,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
  });
  return new THREE.Mesh(geo, mat);
}

const hexGroup = new THREE.Group();
// 3 overlapping rotated hexagons — PT logo geometry
const hexConfigs = [
  { rot: 0,              color: 0x2a93c1, op: 0.55 },
  { rot: Math.PI / 3,    color: 0x2a93c1, op: 0.45 },
  { rot: Math.PI / 1.5,  color: 0xf1420b, op: 0.30 },
];
hexConfigs.forEach(cfg => {
  hexGroup.add(makeHexRing(0.52, 0.34, cfg.rot, cfg.color, cfg.op));
});

// Central glow orb
const orbGeo = new THREE.SphereGeometry(0.12, 16, 16);
const orbMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
});
const orb = new THREE.Mesh(orbGeo, orbMat);
hexGroup.add(orb);

// Position at front-center of brain
hexGroup.position.set(0, 0, C.BRAIN_RADIUS * 0.72);
scene.add(hexGroup);

// ─────────────────────────────────────────────
// Ambient particles (floating background)
// ─────────────────────────────────────────────
const PART_COUNT = 180;
const partGeo    = new THREE.BufferGeometry();
const partPos    = new Float32Array(PART_COUNT * 3);
const partCol    = new Float32Array(PART_COUNT * 3);
for (let i = 0; i < PART_COUNT; i++) {
  partPos[i*3+0] = rnd(-6, 6);
  partPos[i*3+1] = rnd(-5, 5);
  partPos[i*3+2] = rnd(-6, 2);
  // Mostly blue, few orange
  const isOrange = Math.random() < 0.15;
  partCol[i*3+0] = isOrange ? 0.94 : 0.165;
  partCol[i*3+1] = isOrange ? 0.25 : 0.578;
  partCol[i*3+2] = isOrange ? 0.04 : 0.757;
}
partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
partGeo.setAttribute('color',    new THREE.BufferAttribute(partCol, 3));
const partMat  = new THREE.PointsMaterial({
  size: 0.04, vertexColors: true, transparent: true, opacity: 0.45,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// ─────────────────────────────────────────────
// Brain group (rotates as unit)
// ─────────────────────────────────────────────
const brainGroup = new THREE.Group();
brainGroup.add(nodeMesh);
brainGroup.add(lineMesh);
brainGroup.add(hexGroup);
scene.add(brainGroup);
// Remove individual adds from scene (already added via group)
scene.remove(nodeMesh);
scene.remove(lineMesh);
scene.remove(hexGroup);

// ─────────────────────────────────────────────
// Mouse state
// ─────────────────────────────────────────────
const mouse      = new THREE.Vector2(0, 0);  // normalized -1 to 1
const targetTilt = new THREE.Vector2(0, 0);
const currentTilt= new THREE.Vector2(0, 0);

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / W()) * 2 - 1;
  mouse.y = -(e.clientY / H()) * 2 + 1;
  targetTilt.set(mouse.y * 0.18, mouse.x * 0.18);

  // Trigger nearby nodes on hover
  triggerNearMouse(mouse);
});

window.addEventListener('touchmove', e => {
  if (e.touches.length === 0) return;
  const t = e.touches[0];
  mouse.x = (t.clientX / W()) * 2 - 1;
  mouse.y = -(t.clientY / H()) * 2 + 1;
  targetTilt.set(mouse.y * 0.18, mouse.x * 0.18);
  triggerNearMouse(mouse);
}, { passive: true });

// Click — cascade fire
window.addEventListener('click', e => {
  // Ripple DOM effect
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left = e.clientX + 'px';
  el.style.top  = e.clientY + 'px';
  el.style.width = el.style.height = '80px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);

  // Fire 40% of nodes
  const count = Math.floor(C.NODE_COUNT * 0.4);
  const indices = Array.from({length: C.NODE_COUNT}, (_,i)=>i)
    .sort(() => Math.random() - 0.5)
    .slice(0, count);
  indices.forEach(idx => {
    nodeEnergy[idx] = clamp(nodeEnergy[idx] + rnd(0.5, 1.0), 0, 1);
  });
  // Flash bloom
  bloom.strength = 3.0;
  setTimeout(() => { bloom.strength = C.BLOOM_STR; }, 400);
});

window.addEventListener('touchstart', e => {
  if (e.touches.length === 0) return;
  const count = Math.floor(C.NODE_COUNT * 0.4);
  const indices = Array.from({length: C.NODE_COUNT}, (_,i)=>i)
    .sort(() => Math.random() - 0.5)
    .slice(0, count);
  indices.forEach(idx => {
    nodeEnergy[idx] = clamp(nodeEnergy[idx] + rnd(0.5, 1.0), 0, 1);
  });
  bloom.strength = 3.0;
  setTimeout(() => { bloom.strength = C.BLOOM_STR; }, 400);
}, { passive: true });

// Raycaster for hover-near detection
const raycaster = new THREE.Raycaster();
function triggerNearMouse(ndc) {
  raycaster.setFromCamera(ndc, camera);
  // Find nodes within angular proximity
  for (let i = 0; i < C.NODE_COUNT; i++) {
    const worldPos = nodePositions[i].clone().applyMatrix4(brainGroup.matrixWorld);
    const d = raycaster.ray.distanceTo(worldPos);
    if (d < 0.35) {
      nodeEnergy[i] = clamp(nodeEnergy[i] + rnd(0.15, 0.45), 0, 1);
    }
  }
}

// ─────────────────────────────────────────────
// Neural fire propagation (adjacency list)
// ─────────────────────────────────────────────
// Build adjacency for fast propagation
const adjacency = Array.from({length: C.NODE_COUNT}, () => []);
edges.forEach(([i, j]) => {
  adjacency[i].push(j);
  adjacency[j].push(i);
});

// Spontaneous firing
function spontaneousFire() {
  if (Math.random() < C.FIRE_RATE) {
    const idx = Math.floor(Math.random() * C.NODE_COUNT);
    nodeEnergy[idx] = clamp(nodeEnergy[idx] + rnd(0.4, 1.0), 0, 1);
  }
}

// Propagate energy along edges
function propagateEnergy() {
  for (let i = 0; i < C.NODE_COUNT; i++) {
    if (nodeEnergy[i] > 0.35) {
      const neighbors = adjacency[i];
      const spreadCount = Math.min(neighbors.length, 3);
      for (let n = 0; n < spreadCount; n++) {
        const j = neighbors[Math.floor(Math.random() * neighbors.length)];
        if (nodeEnergy[j] < nodeEnergy[i]) {
          nodeEnergy[j] = clamp(
            nodeEnergy[j] + nodeEnergy[i] * 0.28 * Math.random(),
            0, 1
          );
        }
      }
    }
    // Decay
    nodeEnergy[i] *= C.FIRE_DECAY;
    if (nodeEnergy[i] < 0.001) nodeEnergy[i] = 0;
  }
}

// ─────────────────────────────────────────────
// Color interpolation: blue → orange → white → blue
// ─────────────────────────────────────────────
const COL_BLUE   = new THREE.Color(C.BLUE);
const COL_ORANGE = new THREE.Color(C.ORANGE);
const COL_WHITE  = new THREE.Color(C.WHITE);

function energyToColor(e, out) {
  if (e < 0.5) {
    out.lerpColors(COL_BLUE, COL_ORANGE, e * 2);
  } else {
    out.lerpColors(COL_ORANGE, COL_WHITE, (e - 0.5) * 2);
  }
}

// ─────────────────────────────────────────────
// Update nodes visuals
// ─────────────────────────────────────────────
function updateNodes() {
  for (let i = 0; i < C.NODE_COUNT; i++) {
    const e = nodeEnergy[i];
    energyToColor(e, tempColor);

    const scale = 1.0 + e * 2.8;
    dummy.position.copy(nodePositions[i]);
    dummy.scale.setScalar(scale);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
    nodeMesh.setColorAt(i, tempColor);
  }
  nodeMesh.instanceMatrix.needsUpdate = true;
  nodeMesh.instanceColor.needsUpdate  = true;
}

// ─────────────────────────────────────────────
// Update edge colors
// ─────────────────────────────────────────────
const edgeColorA = new THREE.Color();
const edgeColorB = new THREE.Color();

function updateEdges() {
  for (let e = 0; e < edges.length; e++) {
    const [i, j] = edges[e];
    const ei = nodeEnergy[i];
    const ej = nodeEnergy[j];
    const avg = (ei + ej) * 0.5;

    energyToColor(ei, edgeColorA);
    energyToColor(ej, edgeColorB);

    const base = e * 6;
    lineColors[base+0] = edgeColorA.r;
    lineColors[base+1] = edgeColorA.g;
    lineColors[base+2] = edgeColorA.b;
    lineColors[base+3] = edgeColorB.r;
    lineColors[base+4] = edgeColorB.g;
    lineColors[base+5] = edgeColorB.b;
  }
  lineGeo.attributes.color.needsUpdate = true;
}

// ─────────────────────────────────────────────
// Animation loop
// ─────────────────────────────────────────────
let t = 0;
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);

  const dt = (now - lastTime) / 16.67;  // normalized to 60fps
  lastTime = now;
  t += 0.016 * dt;

  // ── Parallax tilt (smooth follow)
  currentTilt.x += (targetTilt.x - currentTilt.x) * 0.04 * dt;
  currentTilt.y += (targetTilt.y - currentTilt.y) * 0.04 * dt;

  // ── Brain rotation: slow auto-spin + parallax tilt
  brainGroup.rotation.y  = t * 0.09 + currentTilt.y;
  brainGroup.rotation.x  = currentTilt.x * 0.6;

  // ── Hexagon rotation (independent, faster)
  hexGroup.rotation.z = t * 0.22;
  // Gentle float
  hexGroup.position.z = C.BRAIN_RADIUS * 0.72 + Math.sin(t * 0.7) * 0.04;

  // ── Particle drift
  const pp = particles.geometry.attributes.position;
  for (let i = 0; i < PART_COUNT; i++) {
    pp.array[i*3+1] += 0.0006 * dt;  // float up slowly
    if (pp.array[i*3+1] > 5.5) pp.array[i*3+1] = -5.5;
    pp.array[i*3+0] += Math.sin(t * 0.3 + i) * 0.0004 * dt;
  }
  pp.needsUpdate = true;

  // ── Neural activity
  spontaneousFire();
  propagateEnergy();
  updateNodes();
  updateEdges();

  // ── Bloom breathe
  bloom.strength = C.BLOOM_STR + Math.sin(t * 1.1) * 0.12;

  composer.render();
}

animate(performance.now());

// ─────────────────────────────────────────────
// Resize
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
  composer.setSize(W(), H());
  bloom.setSize(W(), H());
});

// ─────────────────────────────────────────────
// Initial burst on load
// ─────────────────────────────────────────────
setTimeout(() => {
  const burst = Math.floor(C.NODE_COUNT * 0.25);
  for (let i = 0; i < burst; i++) {
    const idx = Math.floor(Math.random() * C.NODE_COUNT);
    nodeEnergy[idx] = rnd(0.4, 1.0);
  }
}, 600);

</script>
