<!-- UNIVERSAL REFERRAL CODE CAPTURE — 90-day cookie + localStorage -->
<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpV3(out, a, b, t) {
  out.x = lerp(a.x, b.x, t);
  out.y = lerp(a.y, b.y, t);
  out.z = lerp(a.z, b.z, t);
}

// ============================================================
// THE NEURAL BRAIN — center of the universe
// ============================================================
function buildNeuralBrain() {
  const group = new THREE.Group();

  // Core sphere — pulsing, glass-like
  const coreGeo = new THREE.IcosahedronGeometry(12, 4);
  const coreMat = new THREE.MeshPhysicalMaterial({
    color: 0x0d1a2e,
    emissive: 0x0a2040,
    emissiveIntensity: 0.6,
    metalness: 0.1,
    roughness: 0.05,
    transmission: 0.6,
    thickness: 8,
    ior: 1.5,
    transparent: true,
    opacity: 0.55,
    side: THREE.DoubleSide,
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  group.add(core);

  // Inner glow orb
  const glowGeo = new THREE.SphereGeometry(9, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x2a93c1,
    transparent: true,
    opacity: 0.06,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  group.add(new THREE.Mesh(glowGeo, glowMat));

  // Neural connection lines — synaptic lattice
  const nodeCount = 180;
  const nodePositions = [];
  for (let i = 0; i < nodeCount; i++) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = 11 + Math.random() * 4;
    nodePositions.push(new THREE.Vector3(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    ));
  }

  // Draw connections between nearby nodes
  const lineGeo = new THREE.BufferGeometry();
  const lineVerts = [];
  for (let i = 0; i < nodeCount; i++) {
    for (let j = i + 1; j < nodeCount; j++) {
      const d = nodePositions[i].distanceTo(nodePositions[j]);
      if (d < 7) {
        lineVerts.push(
          nodePositions[i].x, nodePositions[i].y, nodePositions[i].z,
          nodePositions[j].x, nodePositions[j].y, nodePositions[j].z
        );
      }
    }
  }
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(lineVerts, 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x2a93c1,
    transparent: true,
    opacity: 0.18,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  group.add(new THREE.LineSegments(lineGeo, lineMat));

  // Node dots
  const dotGeo = new THREE.BufferGeometry();
  const dotPositions = new Float32Array(nodePositions.flatMap(p => [p.x, p.y, p.z]));
  dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPositions, 3));
  const dotMat = new THREE.PointsMaterial({
    color: 0x2a93c1,
    size: 0.25,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  group.add(new THREE.Points(dotGeo, dotMat));

  // Orbiting rings — equatorial, polar, diagonal
  [[0, 0], [Math.PI / 2, 0], [Math.PI / 4, Math.PI / 4]].forEach(([rx, rz], i) => {
    const rGeo = new THREE.TorusGeometry(14 + i * 1.5, 0.05, 12, 120);
    const rMat = new THREE.MeshBasicMaterial({
      color: i === 1 ? 0xf1420b : 0x2a93c1,
      transparent: true,
      opacity: 0.25 - i * 0.04,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = rx;
    ring.rotation.z = rz;
    ring.userData.rotSpeed = 0.002 + i * 0.001;
    ring.userData.axis = i === 1 ? 'z' : 'y';
    group.add(ring);
  });

  // Emanating pulse rings
  for (let i = 0; i < 3; i++) {
    const pGeo = new THREE.RingGeometry(0.1, 0.3, 64);
    const pMat = new THREE.MeshBasicMaterial({
      color: 0x2a93c1,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const pulse = new THREE.Mesh(pGeo, pMat);
    pulse.rotation.x = -Math.PI / 2;
    pulse.userData.pulsePhase = i * (Math.PI * 2 / 3);
    pulse.userData.isPulse = true;
    group.add(pulse);
  }

  return { group, core, coreMat, lineMat };
}

function buildGatewayPortal() {
  const group = new THREE.Group();

  // Outer ring — large glowing torus
  const outerGeo = new THREE.TorusGeometry(8, 0.12, 24, 128);
  const outerMat = new THREE.MeshBasicMaterial({

  });
  const outer = new THREE.Mesh(outerGeo, outerMat);
  group.add(outer);

  // Middle ring — orange
  const midGeo = new THREE.TorusGeometry(6, 0.08, 20, 100);
  const midMat = new THREE.MeshBasicMaterial({
    color: 0xf1420b,
    transparent: true,
    opacity: 0.5,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const mid = new THREE.Mesh(midGeo, midMat);
  group.add(mid);

  // Inner energy disc
  const discGeo = new THREE.CircleGeometry(5.8, 64);
  const discMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform float uTime; varying vec2 vUv;
      void main(){
        vec2 c = vUv - 0.5;
        float d = length(c) * 2.0;
        float a = atan(c.y, c.x);
        float spiral = sin(a * 3.0 - uTime * 2.0 + d * 4.0) * 0.5 + 0.5;
        float energy = pow(1.0 - d, 2.0) * 0.6;
        float ring = smoothstep(0.7, 0.75, d) * (1.0 - smoothstep(0.75, 0.9, d));
        vec3 col1 = vec3(0.165, 0.576, 0.757); // blue
        vec3 col2 = vec3(0.945, 0.259, 0.043); // orange
        vec3 col = mix(col1, col2, spiral * 0.5);
        float alpha = (spiral * energy + ring * 0.4) * smoothstep(1.0, 0.85, d);
        gl_FragColor = vec4(col, alpha * 0.65);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
  });
  const disc = new THREE.Mesh(discGeo, discMat);
  group.add(disc);

  // Particle vortex — particles spiraling into the portal
  const vortexCount = 400;
  const vGeo = new THREE.BufferGeometry();
  const vPos = new Float32Array(vortexCount * 3);
  const vAngle = new Float32Array(vortexCount);
  const vRadius = new Float32Array(vortexCount);
  const vHeight = new Float32Array(vortexCount);
  for (let i = 0; i < vortexCount; i++) {
    vAngle[i] = Math.random() * Math.PI * 2;
    vRadius[i] = 2 + Math.random() * 25;
    vHeight[i] = (Math.random() - 0.5) * 6;
    vPos[i*3] = Math.cos(vAngle[i]) * vRadius[i];
    vPos[i*3+1] = vHeight[i];
    vPos[i*3+2] = Math.sin(vAngle[i]) * vRadius[i];
  }
  vGeo.setAttribute('position', new THREE.BufferAttribute(vPos, 3));
  const vMat = new THREE.PointsMaterial({
    color: 0x2a93c1,
    size: 0.18,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const vortex = new THREE.Points(vGeo, vMat);
  vortex.userData.angles = vAngle;
  vortex.userData.radii = vRadius;
  vortex.userData.heights = vHeight;
  group.add(vortex);

  group.position.set(0, 2, 0);
  group.userData.discMat = discMat;
  group.userData.vortex = vortex;
  group.userData.outerRing = outer;
  group.userData.midRing = mid;

  return group;
}

const keyLight = new THREE.PointLight(0x2a93c1, 8, 80);
keyLight.position.set(0, 30, 0);
scene.add(keyLight);

// Fill light — orange from side
const fillLight = new THREE.PointLight(0xf1420b, 5, 60);
fillLight.position.set(40, 10, 20);
scene.add(fillLight);

// Rim light
const rimLight = new THREE.PointLight(0x2a93c1, 3, 40);
rimLight.position.set(-30, -5, -20);
scene.add(rimLight);

// Portal-specific warm light
const portalLight = new THREE.PointLight(0x88ccff, 6, 40);
portalLight.position.set(0, 2, 8);
scene.add(portalLight);

setLoader(100, 'Universe Ready');

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloom.setSize(w, h);
});

// ============================================================
// SCROLL STATE
// ============================================================
const scrollEl = document.getElementById('scroll-container');
let scrollProgress = 0;
let targetScrollProgress = 0;

scrollEl.addEventListener('scroll', () => {
  const maxScroll = scrollEl.scrollHeight - scrollEl.clientHeight;
  targetScrollProgress = scrollEl.scrollTop / maxScroll;
});

// Touch/trackpad inertia smoothing
let smoothProgress = 0;

// ============================================================
// SECTION STATE
// ============================================================
const sectionTitleEl = document.getElementById('section-title');
const stLabel = document.getElementById('st-label');
const stHeadline = document.getElementById('st-headline');
const stSub = document.getElementById('st-sub');
const stCta = document.getElementById('st-cta');
const progressBar = document.getElementById('progress-bar');
const sectionDots = document.querySelectorAll('.s-dot');

let currentSection = -1;
let sectionTransitionTimer = null;

function getSectionIndex(progress) {
  // 6 sections, transitions at 0.0, 0.16, 0.32, 0.50, 0.68, 0.84
  if (progress < 0.10) return 0;
  if (progress < 0.26) return 1;
  if (progress < 0.42) return 2;
  if (progress < 0.60) return 3;
  if (progress < 0.76) return 4;
  return 5;
}

function showSection(idx) {
  if (idx === currentSection) return;
  currentSection = idx;

  const s = sections[idx];

  // Update dots
  sectionDots.forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  // Fade out → update content → fade in
  sectionTitleEl.classList.remove('visible');

  clearTimeout(sectionTransitionTimer);
  sectionTransitionTimer = setTimeout(() => {
    stLabel.textContent = s.label;
    stHeadline.innerHTML = s.headline.split('\n').map(l => `<div>${l}</div>`).join('');
    stSub.textContent = s.sub;

    if (s.cta) {
      stCta.innerHTML = `<a class="cta-btn" href="${s.cta.href}" target="_blank">${s.cta.text}</a>`;
    } else {
      stCta.innerHTML = '';
    }

    sectionTitleEl.classList.add('visible');
  }, 300);
}

// ============================================================
// PARTICLE TRAIL (mouse interaction)
// ============================================================
const mouse = new THREE.Vector2();
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = -(e.clientY / window.innerHeight - 0.5) * 2;
  mouse.x = mouseX;
  mouse.y = mouseY;
});

// ============================================================
// REMOVE LOADER
// ============================================================
setTimeout(() => {
  loaderEl.classList.add('fade-out');
  setTimeout(() => loaderEl.remove(), 1400);
}, 800);

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

// Temp vectors for camera interpolation
const camPos = new THREE.Vector3();
const lookAt = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth scroll progress
  smoothProgress += (targetScrollProgress - smoothProgress) * 0.06;

  // Update progress bar
  progressBar.style.width = (smoothProgress * 100) + '%';

  // ---- CAMERA PATH ----
  const curveT = Math.min(smoothProgress * 1.05, 1.0);
  camCurve.getPoint(curveT, camPos);
  lookCurve.getPoint(curveT, lookAt);

  // Subtle mouse parallax on camera
  camPos.x += mouseX * 1.5;
  camPos.y += mouseY * 0.8;

  camera.position.lerp(camPos, 0.04);
  camera.lookAt(lookAt.x, lookAt.y, lookAt.z);

  // ---- SECTION TRANSITIONS ----
  const sectionIdx = getSectionIndex(smoothProgress);
  showSection(sectionIdx);

  // ---- NEURAL BRAIN ----
  brain.group.rotation.y = t * 0.08;
  brain.group.rotation.x = Math.sin(t * 0.05) * 0.04;

  // Pulse brain emissive
  brain.coreMat.emissiveIntensity = 0.5 + Math.sin(t * 1.5) * 0.15;
  brain.lineMat.opacity = 0.12 + Math.sin(t * 0.8) * 0.06;

  // Pulse rings on brain
  brain.group.children.forEach(child => {
    if (child.userData.isPulse) {
      const phase = child.userData.pulsePhase;
      const cycleT = ((t * 0.6 + phase / (Math.PI * 2)) % 1);
      const s = cycleT * 20;
      child.scale.set(s, s, 1);
      child.material.opacity = (1 - cycleT) * 0.4;
    }
    if (child.userData.axis === 'y') child.rotation.y = t * child.userData.rotSpeed * 80;
    if (child.userData.axis === 'z') child.rotation.z = t * child.userData.rotSpeed * 60;
  });

  // ---- GLASS PODS ----
  glassPods.children.forEach(pod => {
    const phase = pod.userData.floatPhase || 0;
    pod.position.y += Math.sin(t * 0.6 + phase) * 0.008;
    pod.rotation.y += 0.003;
  });

  // ---- FEATURE DISPLAYS ----
  featureDisplays.children.forEach(display => {
    const phase = display.userData.floatPhase || 0;
    display.position.y += Math.sin(t * 0.5 + phase) * 0.005;
    display.children.forEach(child => {
      if (child.userData.isScan) {
        child.position.y = (Math.sin(t * 0.8 + child.userData.phase) * 2.4);
        child.material.opacity = 0.3 + Math.sin(t * 0.8 + child.userData.phase) * 0.3;
      }
    });
  });

  // ---- PRICING MONOLITHS ----
  pricingGroup.children.forEach(child => {
    if (child.userData.isGroundMat) return;
    const phase = child.userData.floatPhase || 0;
    child.position.y = (child.userData.baseY || -8) + Math.sin(t * 0.4 + phase) * 0.4;
    if (child.userData.isGroundMat) {
      child.material.uniforms && (child.material.uniforms.uTime.value = t);
    }
  });
  // Update pricing ground shader
  pricingGroup.children.forEach(child => {
    if (child.isGroup) return;
    if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
      child.material.uniforms.uTime.value = t;
    }
  });
  // Direct update
  if (pricingGround && pricingGround.uniforms) {
    pricingGround.uniforms.uTime.value = t;
  }

  // ---- TESTIMONIAL SHARDS ----
  testimonialShards.children.forEach(shard => {
    const phase = shard.userData.floatPhase || 0;
    const speed = shard.userData.driftSpeed || 0.001;
    shard.position.y += Math.sin(t * speed * 800 + phase) * 0.005;
    shard.rotation.y += speed * 0.8;
    shard.rotation.z = Math.sin(t * speed * 600 + phase) * 0.05;
  });

  // ---- GATEWAY PORTAL ----
  portal.userData.discMat.uniforms.uTime.value = t;
  portal.rotation.z = t * 0.08;

  // Vortex spiral animation
  const vortex = portal.userData.vortex;
  const vAngles = vortex.userData.angles;
  const vRadii = vortex.userData.radii;
  const vHeights = vortex.userData.heights;
  const vPositions = vortex.geometry.attributes.position;
  for (let i = 0; i < vAngles.length; i++) {
    vAngles[i] += (0.003 + (1 - vRadii[i] / 27) * 0.012); // faster at center
    vRadii[i] -= 0.02;
    if (vRadii[i] < 1) { vRadii[i] = 2 + Math.random() * 25; vAngles[i] = Math.random() * Math.PI * 2; }
    vPositions.setXYZ(
      i,
      Math.cos(vAngles[i]) * vRadii[i],
      vHeights[i] + Math.sin(t * 0.3 + i * 0.1) * 0.3,
      Math.sin(vAngles[i]) * vRadii[i]
    );
  }
  vPositions.needsUpdate = true;

  // Portal rings pulsing
  portal.userData.outerRing.material.opacity = 0.5 + Math.sin(t * 1.2) * 0.2;
  portal.userData.midRing.material.opacity = 0.3 + Math.sin(t * 1.8 + 1) * 0.2;

  // ---- POINT LIGHTS DRIFT ----
  fillLight.position.x = 40 + Math.sin(t * 0.3) * 15;
  fillLight.position.z = 20 + Math.cos(t * 0.2) * 10;
  rimLight.position.x = -30 + Math.cos(t * 0.25) * 10;

  composer.render();
}

animate();
</script>
</body>
</html>
