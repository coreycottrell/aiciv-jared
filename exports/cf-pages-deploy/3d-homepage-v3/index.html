<!-- UNIVERSAL REFERRAL CODE CAPTURE — 90-day cookie + localStorage -->
<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────
// BRAND PALETTE
// ─────────────────────────────────────────────
const BLUE   = 0x2a93c1;
const ORANGE = 0xf1420b;
const BLUE_F  = new THREE.Color(BLUE);
const ORANGE_F = new THREE.Color(ORANGE);
const DEEP   = 0x030510;

// ─────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(DEEP);
scene.fog = new THREE.FogExp2(DEEP, 0.0028);

// Camera
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2500);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.6,   // strength
  0.35,  // radius
  0.12   // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
// SCROLL STATE
// ─────────────────────────────────────────────
const scrollEl = document.getElementById('scroll-container');
let scrollProgress = 0;
let targetProgress = 0;
const TOTAL_SECTIONS = 6;

scrollEl.addEventListener('scroll', () => {
  const max = scrollEl.scrollHeight - scrollEl.clientHeight;
  targetProgress = scrollEl.scrollTop / max;
});

// ─────────────────────────────────────────────
// MOUSE
// ─────────────────────────────────────────────
const mouse = new THREE.Vector2(0, 0);
const mouseSmooth = new THREE.Vector2(0, 0);
const cursorEl = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Canvas texture helper
function makeCanvasTex(w, h, drawFn) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  drawFn(ctx, cv);
  const tex = new THREE.CanvasTexture(cv);
  return tex;
}

// Hexagon shape (returns THREE.Shape)
function hexShape(r) {
  const shape = new THREE.Shape();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r;
    if (i === 0) shape.moveTo(x, y);
    else shape.lineTo(x, y);
  }
  shape.closePath();
  return shape;
}

// ─────────────────────────────────────────────
// SECTION 0 — ARRIVAL
// Far-away universe: particles + rotating hex logo + 3D wordmark
// ─────────────────────────────────────────────

// --- STAR FIELD ---
const starGeo = new THREE.BufferGeometry();
const starCount = 4000;
const starPos = new Float32Array(starCount * 3);
const starCol = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 400 + Math.random() * 1200;
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
  // Mostly blue, some orange
  const isOrange = Math.random() < 0.15;
  if (isOrange) {
    starCol[i*3] = 0.95; starCol[i*3+1] = 0.26; starCol[i*3+2] = 0.04;
  } else {
    starCol[i*3] = 0.1 + Math.random()*0.3;
    starCol[i*3+1] = 0.5 + Math.random()*0.3;
    starCol[i*3+2] = 0.7 + Math.random()*0.3;
  }
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
const starMat = new THREE.PointsMaterial({
  size: 1.4, vertexColors: true, transparent: true, opacity: 0.85, sizeAttenuation: true
});
scene.add(new THREE.Points(starGeo, starMat));

// --- PARTICLE NEBULA around origin ---
const nebGeo = new THREE.BufferGeometry();
const nebCount = 3000;
const nebPos = new Float32Array(nebCount * 3);
const nebCol = new Float32Array(nebCount * 3);
for (let i = 0; i < nebCount; i++) {
  const r = 30 + Math.random() * 180;
  const theta = Math.random() * Math.PI * 2;
  const phi = (Math.random() - 0.5) * Math.PI * 0.8;
  nebPos[i*3]   = r * Math.cos(theta) * Math.cos(phi);
  nebPos[i*3+1] = r * Math.sin(phi) * 0.5;
  nebPos[i*3+2] = r * Math.sin(theta) * Math.cos(phi);
  const t = Math.random();
  nebCol[i*3]   = lerp(0.16, 0.95, t);
  nebCol[i*3+1] = lerp(0.58, 0.26, t);
  nebCol[i*3+2] = lerp(0.76, 0.04, t);
}
nebGeo.setAttribute('position', new THREE.BufferAttribute(nebPos, 3));
nebGeo.setAttribute('color', new THREE.BufferAttribute(nebCol, 3));
const nebMat = new THREE.PointsMaterial({
  size: 2.2, vertexColors: true, transparent: true, opacity: 0.55, sizeAttenuation: true
});
const nebula = new THREE.Points(nebGeo, nebMat);
scene.add(nebula);

// --- PUREBRAIN HEX LOGO — 3 overlapping extruded hexagons ---
const hexGroup = new THREE.Group();
hexGroup.position.set(0, 0, 0);
scene.add(hexGroup);

const hexExtSettings = { depth: 3, bevelEnabled: true, bevelThickness: 0.5, bevelSize: 0.3, bevelSegments: 3 };

function makeHexRing(r, color, rotZ, opacity) {
  const shape = hexShape(r);
  // Hollow: subtract inner hex
  const hole = hexShape(r * 0.7);
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, hexExtSettings);
  const mat = new THREE.MeshPhysicalMaterial({
    color, emissive: color, emissiveIntensity: 0.4,
    metalness: 0.4, roughness: 0.2,
    transmission: 0.5, transparent: true, opacity,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = rotZ;
  mesh.rotation.x = 0.1;
  return mesh;
}

const hex1 = makeHexRing(22, BLUE,   0,             0.85);
const hex2 = makeHexRing(22, ORANGE, Math.PI / 6,   0.75);
const hex3 = makeHexRing(22, BLUE,   Math.PI / 3,   0.65);
hexGroup.add(hex1, hex2, hex3);

// Glowing core sphere
const coreSphere = new THREE.Mesh(
  new THREE.SphereGeometry(8, 32, 32),
  new THREE.MeshPhysicalMaterial({
    color: BLUE, emissive: BLUE, emissiveIntensity: 1.2,
    metalness: 0.1, roughness: 0, transmission: 0.8,
    transparent: true, opacity: 0.9
  })
);
hexGroup.add(coreSphere);

// Core point light
const hexLight = new THREE.PointLight(BLUE, 4, 120);
hexGroup.add(hexLight);
const hexLightO = new THREE.PointLight(ORANGE, 2, 80);
hexLightO.position.set(10, 10, 0);
hexGroup.add(hexLightO);

// --- 3D WORDMARK — "PUREBRAIN.AI" on canvas-textured planes in the scene ---
// Letters are 3D planes that orbit the hex logo
function makeWordmarkPlane() {
  const cv = document.createElement('canvas');
  cv.width = 1024; cv.height = 128;
  const ctx = cv.getContext('2d');

  // Clear
  ctx.clearRect(0, 0, 1024, 128);

  // "PUREBR" in blue
  ctx.font = 'bold 88px system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '6px';
  ctx.fillStyle = '#2a93c1';
  ctx.fillText('PUREBR', 10, 64);

  // measure "PUREBR"
  const w1 = ctx.measureText('PUREBR').width;

  // "AI" in orange
  ctx.fillStyle = '#f1420b';
  ctx.fillText('AI', w1 + 10, 64);

  const w2 = ctx.measureText('AI').width;

  // "N.AI" in blue
  ctx.fillStyle = '#2a93c1';
  ctx.fillText('N.AI', w1 + w2 + 10, 64);

  const tex = new THREE.CanvasTexture(cv);

  const geo = new THREE.PlaneGeometry(70, 8.75);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, opacity: 0.95, side: THREE.DoubleSide
  });
  return new THREE.Mesh(geo, mat);
}

const wordmark = makeWordmarkPlane();
wordmark.position.set(0, -32, 0);
scene.add(wordmark);

// --- AMBIENT ORBITAL RING around hex ---
function makeOrbitalRing(radius, color, tilt) {
  const geo = new THREE.TorusGeometry(radius, 0.15, 8, 120);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.25 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = tilt;
  return mesh;
}
const ring1 = makeOrbitalRing(38, BLUE, Math.PI / 2.5);
const ring2 = makeOrbitalRing(48, ORANGE, Math.PI / 1.8);
hexGroup.add(ring1, ring2);

// ─────────────────────────────────────────────
// SECTION 1 — ENTER THE BRAIN
// Neural network interior — nodes + synaptic connections
// ─────────────────────────────────────────────
const brainGroup = new THREE.Group();
brainGroup.position.set(0, 0, -180);
scene.add(brainGroup);

// Neural node positions (distributed as brain silhouette)
const nodeCount = 80;
const nodePositions = [];
const nodeMeshes = [];

for (let i = 0; i < nodeCount; i++) {
  // Approximate brain shape
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  const rBase = 28 + Math.random() * 22;

  // Squeeze into brain-ish blob
  const rx = rBase * (1 + 0.3 * Math.sin(phi * 2));
  const ry = rBase * 0.75;
  const rz = rBase * 0.85;

  const pos = new THREE.Vector3(
    rx * Math.sin(phi) * Math.cos(theta),
    ry * Math.cos(phi),
    rz * Math.sin(phi) * Math.sin(theta)
  );
  nodePositions.push(pos);

  const isHub = Math.random() < 0.15;
  const size = isHub ? 1.8 + Math.random() * 1.2 : 0.6 + Math.random() * 0.8;
  const col = Math.random() < 0.4 ? ORANGE : BLUE;

  const geo = new THREE.SphereGeometry(size, 12, 12);
  const mat = new THREE.MeshPhysicalMaterial({
    color: col, emissive: col, emissiveIntensity: isHub ? 1.5 : 0.8,
    metalness: 0.2, roughness: 0.1,
    transparent: true, opacity: 0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.userData = { baseEmissive: isHub ? 1.5 : 0.8, pulseOffset: Math.random() * Math.PI * 2 };
  brainGroup.add(mesh);
  nodeMeshes.push(mesh);
}

// Synaptic connections
const synGeo = new THREE.BufferGeometry();
const synVerts = [];
const synColVerts = [];

const blueArr = [0.16, 0.58, 0.76];
const orangeArr = [0.95, 0.26, 0.04];

for (let i = 0; i < nodeCount; i++) {
  for (let j = i + 1; j < nodeCount; j++) {
    const dist = nodePositions[i].distanceTo(nodePositions[j]);
    if (dist < 25 && Math.random() < 0.35) {
      synVerts.push(nodePositions[i].x, nodePositions[i].y, nodePositions[i].z);
      synVerts.push(nodePositions[j].x, nodePositions[j].y, nodePositions[j].z);
      const col = Math.random() < 0.5 ? blueArr : orangeArr;
      synColVerts.push(...col, ...col);
    }
  }
}

synGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(synVerts), 3));
synGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(synColVerts), 3));

const synMat = new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, opacity: 0.22
});
brainGroup.add(new THREE.LineSegments(synGeo, synMat));

// Pulse particles flying through neural paths
const pulseGeo = new THREE.BufferGeometry();
const pulseCount = 60;
const pulsePos = new Float32Array(pulseCount * 3);
const pulseDat = []; // {from, to, t, speed, col}

  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = rotZ;

}

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta ? 0.016 : 0.016;

  // Smooth scroll progress
  scrollProgress += (targetProgress - scrollProgress) * 0.06;

  // Camera path
  camCurve.getPoint(sp, camPos);
  lookCurve.getPoint(sp, lookPos);

  // Mouse parallax
  mouseSmooth.x += (mouse.x - mouseSmooth.x) * 0.04;
  mouseSmooth.y += (mouse.y - mouseSmooth.y) * 0.04;

  camPos.x += mouseSmooth.x * 8;
  camPos.y += mouseSmooth.y * 4;

  // Smooth camera lerp
  camCurrent.lerp(camPos, 0.055);
  lookCurrent.lerp(lookPos, 0.06);

  camera.position.copy(camCurrent);
  camera.lookAt(lookCurrent);

  // Section detection
  const secIndex = Math.min(Math.floor(sp * TOTAL_SECTIONS), TOTAL_SECTIONS - 1);
  updateSection(secIndex);

  // ── Animate hex logo group ──
  hexGroup.rotation.y = t * 0.18;
  hex1.rotation.z = Math.sin(t * 0.3) * 0.08;
  hex2.rotation.z = Math.PI / 6 + Math.sin(t * 0.4 + 1) * 0.08;
  hex3.rotation.z = Math.PI / 3 + Math.sin(t * 0.25 + 2) * 0.08;
  hexLight.intensity = 3 + Math.sin(t * 1.5) * 1;

  // Wordmark gentle bob
  wordmark.position.y = -32 + Math.sin(t * 0.5) * 1.5;
  wordmark.rotation.y = Math.sin(t * 0.3) * 0.05;

  // Ring rotation
  ring1.rotation.z = t * 0.12;
  ring2.rotation.z = -t * 0.08;

  // Nebula drift
  nebula.rotation.y = t * 0.04;

  // ── Animate brain ──
  brainGroup.rotation.y = t * 0.06;
  nodeMeshes.forEach((mesh, i) => {
    const pd = mesh.userData;
    const pulse = 0.5 + 0.5 * Math.sin(t * 1.8 + pd.pulseOffset);
    mesh.material.emissiveIntensity = pd.baseEmissive * (0.6 + 0.4 * pulse);
    mesh.scale.setScalar(0.95 + 0.08 * pulse);
  });

  // Pulse particles
  const ppPos = pulseGeo.attributes.position.array;
  pulseDat.forEach((pd, i) => {
    pd.t += pd.speed * 0.008;
    if (pd.t > 1) {
      pd.t = 0;
      pd.from = nodePositions[Math.floor(Math.random() * nodeCount)];
      pd.to = nodePositions[Math.floor(Math.random() * nodeCount)];
    }
    const p = new THREE.Vector3().lerpVectors(pd.from, pd.to, easeInOut(pd.t));
    ppPos[i*3] = p.x; ppPos[i*3+1] = p.y; ppPos[i*3+2] = p.z;
  });
  pulseGeo.attributes.position.needsUpdate = true;

  // ── Animate chambers ──
  chambersGroup.children.forEach(child => {
    if (child.userData && child.userData.floatOffset !== undefined) {
      child.position.y = child.userData.baseY + Math.sin(t * 0.5 + child.userData.floatOffset) * 2.5;
      child.rotation.y = Math.sin(t * 0.15 + child.userData.floatOffset) * 0.06;
    }
  });

  // ── Animate towers ──
  towerGroup.children.forEach(child => {
    if (child.userData && child.userData.col !== undefined) {
      child.position.y = child.userData.baseY + Math.sin(t * 0.35 + child.position.x * 0.05) * 1.5;
    }
  });

  // ── Animate gateway ──
  portalGroup.rotation.y = t * 0.12;
  gp1.rotation.z = t * 0.08;
  gp2.rotation.z = Math.PI/6 - t * 0.06;
  gp3.rotation.z = Math.PI/3 + t * 0.10;
  portalLight1.intensity = 5 + Math.sin(t * 1.2) * 2;
  portalLight2.intensity = 3 + Math.cos(t * 0.9 + 1) * 1;

  // Awaken text float
  awakeMesh.position.y = -55 + Math.sin(t * 0.6) * 1.5;

  // Converging particles
  const cpPos = convGeo.attributes.position.array;
  convData.forEach((cd, i) => {
    cd.t += cd.speed * 0.004;
    if (cd.t > 1) {
      cd.t = 0;
      const theta = Math.random() * Math.PI * 2;
      const r = 100 + Math.random() * 300;
      cd.start.set(Math.cos(theta)*r, (Math.random()-0.5)*100, Math.sin(theta)*r);
    }
    const et = easeInOut(cd.t);
    cpPos[i*3]   = lerp(cd.start.x, 0, et);
    cpPos[i*3+1] = lerp(cd.start.y, 0, et);
    cpPos[i*3+2] = lerp(cd.start.z, 0, et);
  });
  convGeo.attributes.position.needsUpdate = true;

  // Constellation drift
  constellationGroup.rotation.y = t * 0.025;

  // Bloom intensity by section
  const bloomBySection = [1.8, 2.2, 1.6, 1.4, 1.6, 2.4];
  bloom.strength += (bloomBySection[secIndex] - bloom.strength) * 0.02;

  composer.render();
}

animate();

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloom.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
