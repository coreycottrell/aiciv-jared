<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 10 V2: Thick Glass Card + Depth of Field</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080a12; overflow: hidden; }
canvas { display: block; }
.label {
  position: fixed; bottom: 20px; left: 20px;
  font-family: 'SF Pro Display', -apple-system, sans-serif;
  color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">Night 10 / V2 / Thick Glass Card + Depth of Field Bokeh</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080a12);
scene.fog = new THREE.FogExp2(0x080a12, 0.08);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 5);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

// === THICK GLASS CARD (Gap #4: BoxGeometry, not PlaneGeometry) ===
const cardGeo = new THREE.BoxGeometry(2.0, 2.8, 0.15, 32, 32, 4);
const cardMat = new THREE.MeshPhysicalMaterial({
  color: 0x88aacc,
  metalness: 0.0,
  roughness: 0.05,
  transmission: 0.92,
  thickness: 3.0,           // KEY: thick glass = attenuated internal light
  ior: 1.45,
  attenuationColor: new THREE.Color(0.4, 0.6, 1.0), // Blue-tinted depth (Night 9 learning)
  attenuationDistance: 1.5,
  clearcoat: 1.0,
  clearcoatRoughness: 0.1,
  envMapIntensity: 1.5,
  transparent: true,
  opacity: 0.95,
  side: THREE.DoubleSide,
});
const card = new THREE.Mesh(cardGeo, cardMat);
card.position.set(0, 0, 0);
card.rotation.y = 0.15;
scene.add(card);

// Edge highlight wireframe
const edgeGeo = new THREE.BoxGeometry(2.02, 2.82, 0.17, 8, 12, 2);
const edgeMat = new THREE.MeshBasicMaterial({
  color: 0x3388ff,
  wireframe: true,
  transparent: true,
  opacity: 0.06, // 6% per Night 9 structural reveal technique
});
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.copy(card.position);
edge.rotation.copy(card.rotation);
scene.add(edge);

// === BACKGROUND OBJECTS (for DOF blur demonstration) ===
// Near objects (sharp)
const accentGeo = new THREE.OctahedronGeometry(0.2, 2);
const accentMat = new THREE.MeshStandardMaterial({
  color: 0xff6622,
  emissive: 0xff4400,
  emissiveIntensity: 0.6,
  metalness: 0.8,
  roughness: 0.2,
});

const accents = [];
for (let i = 0; i < 5; i++) {
  const a = new THREE.Mesh(accentGeo, accentMat.clone());
  a.position.set(
    (Math.random() - 0.5) * 4,
    (Math.random() - 0.5) * 3,
    (Math.random() - 0.5) * 2 + 1.5
  );
  a.scale.setScalar(0.3 + Math.random() * 0.4);
  scene.add(a);
  accents.push(a);
}

// Far objects (will be blurred by DOF)
const farGeo = new THREE.IcosahedronGeometry(0.5, 1);
const farMat = new THREE.MeshPhysicalMaterial({
  color: 0x4466aa,
  metalness: 0.9,
  roughness: 0.05,
  envMapIntensity: 2.0,
});
const farObjects = [];
for (let i = 0; i < 8; i++) {
  const f = new THREE.Mesh(farGeo, farMat.clone());
  f.position.set(
    (Math.random() - 0.5) * 8,
    (Math.random() - 0.5) * 5,
    -3 - Math.random() * 8  // FAR behind the card
  );
  f.scale.setScalar(0.5 + Math.random() * 1.0);
  scene.add(f);
  farObjects.push(f);
}

// Chrome orb companion (foreground - will also test near-blur)
const orbGeo = new THREE.SphereGeometry(0.35, 64, 64);
const orbMat = new THREE.MeshPhysicalMaterial({
  color: 0xccccdd,
  metalness: 1.0,
  roughness: 0.03,
  envMapIntensity: 2.0,
});
const orb = new THREE.Mesh(orbGeo, orbMat);
orb.position.set(1.5, -0.5, 2.5); // close to camera
scene.add(orb);

// === PROCEDURAL HDRI (from Night 9) ===
const hdriSize = 256;
const hdriData = new Float32Array(hdriSize * hdriSize * 4);
for (let y = 0; y < hdriSize; y++) {
  for (let x = 0; x < hdriSize; x++) {
    const u = x / hdriSize;
    const v = y / hdriSize;
    const theta = u * Math.PI * 2;
    const phi = v * Math.PI;
    const dir = new THREE.Vector3(
      Math.sin(phi) * Math.cos(theta),
      Math.cos(phi),
      Math.sin(phi) * Math.sin(theta)
    );

    // 3-light studio (warm key upper-right, cool fill lower-left, orange rim behind)
    const keyDir = new THREE.Vector3(0.6, 0.7, 0.4).normalize();
    const fillDir = new THREE.Vector3(-0.5, -0.2, 0.5).normalize();
    const rimDir = new THREE.Vector3(0.0, 0.2, -0.9).normalize();

    const key = Math.pow(Math.max(dir.dot(keyDir), 0), 32) * 3.0;
    const fill = Math.pow(Math.max(dir.dot(fillDir), 0), 8) * 0.5;
    const rim = Math.pow(Math.max(dir.dot(rimDir), 0), 16) * 1.5;

    const idx = (y * hdriSize + x) * 4;
    hdriData[idx]     = 0.02 + key * 1.0 + fill * 0.3 + rim * 1.0;
    hdriData[idx + 1] = 0.025 + key * 0.92 + fill * 0.4 + rim * 0.5;
    hdriData[idx + 2] = 0.04 + key * 0.85 + fill * 0.7 + rim * 0.15;
    hdriData[idx + 3] = 1.0;
  }
}
const hdriTex = new THREE.DataTexture(hdriData, hdriSize, hdriSize, THREE.RGBAFormat, THREE.FloatType);
hdriTex.mapping = THREE.EquirectangularReflectionMapping;
hdriTex.needsUpdate = true;
scene.environment = hdriTex;

// === LIGHTS ===
const keyLight = new THREE.DirectionalLight(0xffeedd, 1.5);
keyLight.position.set(3, 4, 2);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x4466aa, 0.4);
fillLight.position.set(-2, -1, 3);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xff6622, 1.0, 10);
rimLight.position.set(0, 1, -3);
scene.add(rimLight);

// === POST-PROCESSING: DOF + Bloom (Gap #5) ===
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// Bloom for emissive accents
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  0.4,  // strength
  0.6,  // radius
  0.85  // threshold
);
composer.addPass(bloom);

// DEPTH OF FIELD - the key gap being closed tonight
const bokeh = new BokehPass(scene, camera, {
  focus: 5.0,      // focus at card distance
  aperture: 0.015, // wide aperture = shallow DOF
  maxblur: 0.008,
});
composer.addPass(bokeh);

// Film grain + chromatic aberration (custom)
const grainShader = {
  uniforms: {
    tDiffuse: { value: null },
    u_time: { value: 0 },
    u_res: { value: new THREE.Vector2(innerWidth, innerHeight) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float u_time;
    uniform vec2 u_res;
    varying vec2 vUv;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    void main() {
      // Chromatic aberration
      float caStr = 0.0006;
      vec2 dir = vUv - 0.5;
      float r = texture2D(tDiffuse, vUv + dir * caStr).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - dir * caStr).b;
      vec3 col = vec3(r, g, b);

      // Film grain 3.5%
      float grain = (hash(vUv * u_res + u_time * 100.0) - 0.5) * 0.035;
      col += grain;

      // Asymmetric vignette
      vec2 vc = vUv - vec2(0.47, 0.5);
      float vig = 1.0 - dot(vc * 1.4, vc * 1.4);
      col *= smoothstep(0.0, 0.7, vig);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
};
const grainPass = new ShaderPass(grainShader);
composer.addPass(grainPass);

// === ANIMATION ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle card tilt
  card.rotation.y = 0.15 + Math.sin(t * 0.3) * 0.08;
  card.rotation.x = Math.sin(t * 0.2) * 0.03;
  edge.rotation.copy(card.rotation);

  // Accent floats
  accents.forEach((a, i) => {
    a.position.y += Math.sin(t * 0.5 + i) * 0.001;
    a.rotation.x = t * 0.3 + i;
    a.rotation.y = t * 0.2 + i * 0.5;
  });

  // Far objects drift
  farObjects.forEach((f, i) => {
    f.rotation.x = t * 0.1 + i;
    f.rotation.z = t * 0.15 + i * 0.3;
    f.position.y += Math.sin(t * 0.2 + i * 0.7) * 0.0005;
  });

  // Chrome orb orbit
  orb.position.x = 1.5 + Math.sin(t * 0.4) * 0.3;
  orb.position.y = -0.5 + Math.cos(t * 0.3) * 0.2;

  // Animate DOF focus subtly
  bokeh.uniforms['focus'].value = 5.0 + Math.sin(t * 0.15) * 0.3;

  // Update grain time
  grainPass.uniforms.u_time.value = t;

  composer.render();
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
