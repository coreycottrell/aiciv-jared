<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 10 V3: Anisotropic GGX Chrome Avatar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080a12; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
.label {
  position: fixed; bottom: 20px; left: 20px;
  font-family: 'SF Pro Display', -apple-system, sans-serif;
  color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase;
}
.info {
  position: fixed; top: 20px; right: 20px;
  font-family: 'SF Pro Display', -apple-system, sans-serif;
  color: rgba(255,255,255,0.25); font-size: 10px; letter-spacing: 1px;
  text-align: right; line-height: 1.6;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">Night 10 / V3 / Anisotropic GGX Chrome Avatar</div>
<div class="info">
  Anisotropic roughness: flow-direction specular<br>
  GGX distribution with tangent/bitangent split<br>
  Click to cycle flow direction
</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

let flowMode = 0; // 0=vertical, 1=horizontal, 2=spiral
canvas.addEventListener('click', () => { flowMode = (flowMode + 1) % 3; });

const vsrc = `#version 300 es
in vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const fsrc = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform float u_time;
uniform vec2 u_res;
uniform int u_flowMode;

#define PI 3.14159265
#define PHI 1.61803398

float hash(vec3 p) {
  p = fract(p * 0.3183099 + 0.1);
  p *= 17.0;
  return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}

float noise(vec3 x) {
  vec3 i = floor(x);
  vec3 f = fract(x);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(mix(hash(i), hash(i+vec3(1,0,0)), f.x),
                 mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
             mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x),
                 mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
}

float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.1; a *= 0.5; }
  return v;
}

// SDF sphere with liquid displacement
float sdSphere(vec3 p, float r) { return length(p) - r; }

float map(vec3 p) {
  float t = u_time * 0.3;
  float disp = fbm(p * 2.5 + t * 0.2) * 0.12;
  float d = sdSphere(p, 1.0 + disp);

  // Add smaller orbiting satellites
  for (int i = 0; i < 3; i++) {
    float angle = t * 0.5 + float(i) * PI * 2.0 / 3.0;
    float radius = 1.6 + sin(t * 0.4 + float(i)) * 0.15;
    vec3 sp = vec3(cos(angle) * radius, sin(float(i) * 1.3 + t * 0.2) * 0.4, sin(angle) * radius);
    float sd = sdSphere(p - sp, 0.15 + sin(t + float(i)) * 0.03);
    // Polynomial smooth min (IQ cubic) from tonight's research
    float k = 0.5;
    k *= 6.0;
    float h = max(k - abs(d - sd), 0.0) / k;
    d = min(d, sd) - h * h * h * k * (1.0 / 6.0);
  }

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

// === ANISOTROPIC GGX === (Gap #3 from Night 8)
// The key insight: split roughness into tangent/bitangent components
// Flow direction controls which axis gets sharper specular
float ggxAnisotropic(float NdotH, float TdotH, float BdotH, float alphaT, float alphaB) {
  float denom = (TdotH * TdotH) / (alphaT * alphaT)
              + (BdotH * BdotH) / (alphaB * alphaB)
              + NdotH * NdotH;
  return 1.0 / (PI * alphaT * alphaB * denom * denom);
}

float geometrySmith(float NdotV, float NdotL, float roughness) {
  float r = roughness + 1.0;
  float k = (r * r) / 8.0;
  float ggx1 = NdotV / (NdotV * (1.0 - k) + k);
  float ggx2 = NdotL / (NdotL * (1.0 - k) + k);
  return ggx1 * ggx2;
}

vec3 fresnelSchlick(float cosTheta, vec3 F0) {
  return F0 + (1.0 - F0) * pow(clamp(1.0 - cosTheta, 0.0, 1.0), 5.0);
}

// Get flow-dependent tangent frame
void getAnisotropicFrame(vec3 N, vec3 P, out vec3 T, out vec3 B) {
  float t = u_time * 0.3;

  if (u_flowMode == 0) {
    // Vertical flow - stretched specular highlights along Y
    T = normalize(cross(N, vec3(0.0, 1.0, 0.0)));
    if (length(T) < 0.001) T = normalize(cross(N, vec3(1.0, 0.0, 0.0)));
  } else if (u_flowMode == 1) {
    // Horizontal flow - stretched along XZ
    T = normalize(cross(N, vec3(1.0, 0.0, 0.0)));
    if (length(T) < 0.001) T = normalize(cross(N, vec3(0.0, 1.0, 0.0)));
  } else {
    // Spiral flow - tangent follows spiral pattern on surface
    float angle = atan(P.z, P.x) + P.y * 2.0 + t;
    vec3 spiral = vec3(cos(angle), 0.3, sin(angle));
    T = normalize(cross(N, spiral));
    if (length(T) < 0.001) T = normalize(cross(N, vec3(0.0, 1.0, 0.0)));
  }
  B = normalize(cross(N, T));
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_res) / u_res.y;

  // Camera
  float camAngle = u_time * 0.12;
  vec3 ro = vec3(sin(camAngle) * 3.5, 0.5 + sin(u_time * 0.15) * 0.3, cos(camAngle) * 3.5);
  vec3 ta = vec3(0.0);
  vec3 ww = normalize(ta - ro);
  vec3 uu = normalize(cross(ww, vec3(0,1,0)));
  vec3 vv = cross(uu, ww);
  vec3 rd = normalize(uv.x * uu + uv.y * vv + 1.8 * ww);

  // Raymarch
  float t = 0.0;
  float d;
  for (int i = 0; i < 80; i++) {
    d = map(ro + rd * t);
    if (d < 0.001 || t > 12.0) break;
    t += d * 0.85;
  }

  vec3 col = vec3(0.02, 0.025, 0.04);

  if (d < 0.001) {
    vec3 p = ro + rd * t;
    vec3 N = calcNormal(p);
    vec3 V = normalize(ro - p);

    // Anisotropic tangent frame
    vec3 T, B;
    getAnisotropicFrame(N, p, T, B);

    // Chrome F0 (Night 8)
    vec3 F0 = vec3(0.78, 0.76, 0.82);

    // Anisotropic roughness: one axis smooth, other rough
    // This creates the stretched specular that makes chrome look brushed/flowing
    float alphaT = 0.04;  // very smooth along tangent
    float alphaB = 0.25;  // rougher along bitangent = stretched highlight

    // 3-light Gleb setup
    vec3 lights[3];
    vec3 lightCols[3];
    float lightInts[3];
    lights[0] = normalize(vec3(1.0, 1.2, 0.8));   // warm key
    lights[1] = normalize(vec3(-0.8, -0.3, 0.6));  // cool fill
    lights[2] = normalize(vec3(0.0, 0.3, -1.0));   // orange rim

    lightCols[0] = vec3(1.0, 0.92, 0.85);
    lightCols[1] = vec3(0.3, 0.4, 0.7);
    lightCols[2] = vec3(1.0, 0.5, 0.15);

    lightInts[0] = 1.5;
    lightInts[1] = 0.5;
    lightInts[2] = 1.2;

    float NdotV = max(dot(N, V), 0.001);

    vec3 totalSpec = vec3(0.0);
    for (int i = 0; i < 3; i++) {
      vec3 L = lights[i];
      vec3 H = normalize(V + L);

      float NdotL = max(dot(N, L), 0.0);
      float NdotH = max(dot(N, H), 0.001);
      float TdotH = dot(T, H);
      float BdotH = dot(B, H);
      float HdotV = max(dot(H, V), 0.0);

      // Anisotropic GGX
      float D = ggxAnisotropic(NdotH, TdotH, BdotH, alphaT, alphaB);
      float G = geometrySmith(NdotV, NdotL, (alphaT + alphaB) * 0.5);
      vec3 F = fresnelSchlick(HdotV, F0);

      vec3 spec = (D * G * F) / (4.0 * NdotV * NdotL + 0.001);
      totalSpec += spec * lightCols[i] * lightInts[i] * NdotL;

      // Rim contribution
      if (i == 2) {
        float rim = pow(1.0 - NdotV, 3.0) * NdotL;
        totalSpec += lightCols[i] * rim * lightInts[i] * 0.8;
      }
    }

    // Environment reflection
    vec3 refl = reflect(-V, N);
    vec3 envCol = mix(vec3(0.05, 0.08, 0.15), vec3(0.2, 0.15, 0.3), refl.y * 0.5 + 0.5);
    vec3 F_env = fresnelSchlick(NdotV, F0);
    vec3 envSpec = F_env * envCol * 0.5;

    col = totalSpec + envSpec;

    // Emissive energy at satellite merge points
    float surfNoise = fbm(p * 6.0 + u_time * 0.4);
    float mergeGlow = smoothstep(0.92, 1.0, surfNoise);
    col += vec3(0.1, 0.6, 1.0) * mergeGlow * 0.5; // additive

    // Fog
    float fog = 1.0 - exp(-t * t * 0.012);
    col = mix(col, vec3(0.02, 0.025, 0.04), fog);
  }

  // Post-processing
  // Vignette
  vec2 vuv = gl_FragCoord.xy / u_res;
  float vig = 1.0 - dot((vuv - vec2(0.48, 0.5)) * 1.3, (vuv - 0.5) * 1.3);
  col *= smoothstep(0.0, 0.65, vig);

  // Film grain
  float grain = (hash(vec3(gl_FragCoord.xy, u_time * 100.0)) - 0.5) * 0.035;
  col += grain;

  // Tone map + gamma
  col = col / (col + 0.85);
  col = pow(col, vec3(1.0 / 2.2));

  fragColor = vec4(col, 1.0);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

const vs = createShader(gl.VERTEX_SHADER, vsrc);
const fs = createShader(gl.FRAGMENT_SHADER, fsrc);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');
const uFlow = gl.getUniformLocation(prog, 'u_flowMode');

function render(t) {
  gl.uniform1f(uTime, t * 0.001);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1i(uFlow, flowMode);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
