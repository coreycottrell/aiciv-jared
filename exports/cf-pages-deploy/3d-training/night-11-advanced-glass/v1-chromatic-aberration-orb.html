<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 11 V1: Chromatic Aberration Glass Orb</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080a12; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.4);
    font: 12px/1.4 monospace; z-index: 10;
  }
</style>
</head>
<body>
<div id="info">Night 11 V1 — Chromatic Aberration Glass Orb<br>Technique: Per-channel refraction offset + Fresnel rim</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Environment - deep blue gradient
const envCanvas = document.createElement('canvas');
envCanvas.width = 512; envCanvas.height = 512;
const ectx = envCanvas.getContext('2d');
const grad = ectx.createRadialGradient(256, 256, 0, 256, 256, 360);
grad.addColorStop(0, '#1a1a3e');
grad.addColorStop(0.5, '#0d0d2b');
grad.addColorStop(1, '#050510');
ectx.fillStyle = grad;
ectx.fillRect(0, 0, 512, 512);
// Add some light spots for refraction to catch
for (let i = 0; i < 30; i++) {
  const x = Math.random() * 512;
  const y = Math.random() * 512;
  const r = 2 + Math.random() * 8;
  const sg = ectx.createRadialGradient(x, y, 0, x, y, r);
  sg.addColorStop(0, `rgba(${150+Math.random()*105}, ${150+Math.random()*105}, 255, ${0.3+Math.random()*0.4})`);
  sg.addColorStop(1, 'rgba(0,0,0,0)');
  ectx.fillStyle = sg;
  ectx.fillRect(x - r, y - r, r * 2, r * 2);
}
const envTex = new THREE.CanvasTexture(envCanvas);
envTex.mapping = THREE.EquirectangularReflectionMapping;
scene.environment = envTex;
scene.background = new THREE.Color('#080a12');

// Chromatic Aberration Glass Shader
const caGlassVert = `
  varying vec3 vWorldNormal;
  varying vec3 vViewDir;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  void main() {
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vWorldNormal = normalize(normalMatrix * normal);
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    vUv = uv;
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

const caGlassFrag = `
  uniform float uTime;
  uniform float uIorR;
  uniform float uIorG;
  uniform float uIorB;
  uniform float uChromaticOffset;
  uniform float uFresnelPower;
  uniform float uSaturation;
  uniform samplerCube uEnvMap;

  varying vec3 vWorldNormal;
  varying vec3 vViewDir;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  float fresnel(vec3 viewDir, vec3 normal, float power) {
    return pow(1.0 - max(dot(viewDir, normal), 0.0), power);
  }

  // Animated surface perturbation
  vec3 perturbNormal(vec3 normal, vec3 pos, float time) {
    float n1 = sin(pos.x * 4.0 + time * 0.7) * cos(pos.y * 3.0 + time * 0.5) * 0.03;
    float n2 = sin(pos.z * 5.0 + time * 0.8) * cos(pos.x * 2.0 + time * 0.6) * 0.03;
    return normalize(normal + vec3(n1, n2, n1 * n2));
  }

  void main() {
    vec3 normal = perturbNormal(vWorldNormal, vWorldPos, uTime);

    // Per-channel refraction with different IOR — the chromatic aberration trick
    vec3 refractR = refract(-vViewDir, normal, 1.0 / uIorR);
    vec3 refractG = refract(-vViewDir, normal, 1.0 / uIorG);
    vec3 refractB = refract(-vViewDir, normal, 1.0 / uIorB);

    // Sample environment per channel — this separates colors at edges
    float envR = textureCube(uEnvMap, refractR).r;
    float envG = textureCube(uEnvMap, refractG).g;
    float envB = textureCube(uEnvMap, refractB).b;
    vec3 refractColor = vec3(envR, envG, envB);

    // Boost saturation of the CA effect
    float lum = dot(refractColor, vec3(0.2126, 0.7152, 0.0722));
    refractColor = mix(vec3(lum), refractColor, uSaturation);

    // Reflection
    vec3 reflectDir = reflect(-vViewDir, normal);
    vec3 reflectColor = textureCube(uEnvMap, reflectDir).rgb;

    // Fresnel blend
    float f = fresnel(vViewDir, normal, uFresnelPower);

    // Edge glow — emissive rim
    float rim = pow(1.0 - max(dot(vViewDir, vWorldNormal), 0.0), 3.0);
    vec3 rimColor = mix(vec3(0.2, 0.4, 1.0), vec3(0.6, 0.2, 1.0), sin(uTime * 0.3) * 0.5 + 0.5);

    vec3 color = mix(refractColor, reflectColor, f * 0.6);
    color += rimColor * rim * 0.4;

    // Internal glow pulsing
    float pulse = sin(uTime * 1.5) * 0.5 + 0.5;
    color += vec3(0.1, 0.15, 0.35) * pulse * (1.0 - f) * 0.3;

    gl_FragColor = vec4(color, 0.92);
  }
`;

// Build cube render target for env sampling
const cubeRT = new THREE.WebGLCubeRenderTarget(256);
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
scene.add(cubeCamera);

// Background floating particles for the refraction to catch
const particleGeo = new THREE.BufferGeometry();
const pCount = 200;
const pPositions = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
  pPositions[i * 3] = (Math.random() - 0.5) * 12;
  pPositions[i * 3 + 1] = (Math.random() - 0.5) * 12;
  pPositions[i * 3 + 2] = (Math.random() - 0.5) * 12 - 3;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x6688ff, size: 0.08, transparent: true, opacity: 0.6,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Main glass orb with custom CA shader
const orbGeo = new THREE.SphereGeometry(1.2, 128, 128);
const orbMat = new THREE.ShaderMaterial({
  vertexShader: caGlassVert,
  fragmentShader: caGlassFrag,
  uniforms: {
    uTime: { value: 0 },
    uIorR: { value: 1.15 },
    uIorG: { value: 1.18 },
    uIorB: { value: 1.22 },
    uChromaticOffset: { value: 0.07 },
    uFresnelPower: { value: 3.5 },
    uSaturation: { value: 2.2 },
    uEnvMap: { value: cubeRT.texture }
  },
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false
});
const orb = new THREE.Mesh(orbGeo, orbMat);
scene.add(orb);

// Inner core — smaller emissive sphere
const coreGeo = new THREE.IcosahedronGeometry(0.35, 3);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0x4466ff, emissive: 0x2244aa, emissiveIntensity: 2.0,
  metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.7
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Orbiting ring
const ringGeo = new THREE.TorusGeometry(1.6, 0.015, 16, 100);
const ringMat = new THREE.MeshStandardMaterial({
  color: 0x8899ff, emissive: 0x4455cc, emissiveIntensity: 1.5,
  metalness: 1.0, roughness: 0.0
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI * 0.35;
scene.add(ring);

// Lights
const keyLight = new THREE.PointLight(0x6688ff, 3, 20);
keyLight.position.set(3, 3, 4);
scene.add(keyLight);

const fillLight = new THREE.PointLight(0xff6644, 1.5, 15);
fillLight.position.set(-3, -1, 2);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xaa66ff, 2, 15);
rimLight.position.set(0, 4, -3);
scene.add(rimLight);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.4, 0.85
);
composer.addPass(bloom);

// Film grain + vignette pass
const grainShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime: { value: 0 },
    uGrainIntensity: { value: 0.06 },
    uVignetteStrength: { value: 0.4 }
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uGrainIntensity;
    uniform float uVignetteStrength;
    varying vec2 vUv;

    float rand(vec2 co){ return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453); }

    void main(){
      vec4 color = texture2D(tDiffuse, vUv);
      float grain = rand(vUv + fract(uTime)) * uGrainIntensity;
      color.rgb += grain - uGrainIntensity * 0.5;
      float dist = distance(vUv, vec2(0.5));
      color.rgb *= 1.0 - dist * dist * uVignetteStrength;
      gl_FragColor = color;
    }
  `
};
const grainPass = new ShaderPass(grainShader);
composer.addPass(grainPass);

// Animation
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  orbMat.uniforms.uTime.value = t;
  grainShader.uniforms.uTime.value = t;

  // Animate IOR for shifting CA
  orbMat.uniforms.uIorR.value = 1.15 + Math.sin(t * 0.4) * 0.02;
  orbMat.uniforms.uIorB.value = 1.22 + Math.cos(t * 0.3) * 0.02;

  // Gentle orb breathing
  const breathe = 1.0 + Math.sin(t * 0.8) * 0.03;
  orb.scale.setScalar(breathe);

  // Core rotation + pulse
  core.rotation.y = t * 0.5;
  core.rotation.x = t * 0.3;
  coreMat.emissiveIntensity = 1.5 + Math.sin(t * 2.0) * 0.8;

  // Ring orbit
  ring.rotation.z = t * 0.15;
  ring.rotation.y = t * 0.1;

  // Particles drift
  particles.rotation.y = t * 0.02;
  particles.rotation.x = t * 0.01;

  // Update cube camera for refraction
  orb.visible = false;
  cubeCamera.position.copy(orb.position);
  cubeCamera.update(renderer, scene);
  orb.visible = true;

  composer.render();
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
