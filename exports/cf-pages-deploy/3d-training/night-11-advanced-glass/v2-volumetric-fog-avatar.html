<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 11 V2: Volumetric Fog Glass Avatar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080a12; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.4);
    font: 12px/1.4 monospace; z-index: 10;
  }
</style>
</head>
<body>
<div id="info">Night 11 V2 — Volumetric Fog Glass Avatar<br>Technique: Raymarched fog volumes + glass sphere composition</div>
<canvas id="c"></canvas>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#080a12');
scene.fog = new THREE.FogExp2(0x080a12, 0.08);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 5.5);
camera.lookAt(0, 0, 0);

// === VOLUMETRIC FOG PLANE (screen-space raymarched fog) ===
const fogVert = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position.xy, 0.0, 1.0);
  }
`;

const fogFrag = `
  uniform float uTime;
  uniform vec2 uResolution;
  uniform vec3 uFogColor1;
  uniform vec3 uFogColor2;

  varying vec2 vUv;

  // 3D noise for volumetric density
  float hash(vec3 p) {
    p = fract(p * 0.3183099 + 0.1);
    p *= 17.0;
    return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
  }

  float noise3d(vec3 x) {
    vec3 i = floor(x);
    vec3 f = fract(x);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
          mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
      mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
          mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y),
      f.z
    );
  }

  float fbm(vec3 p) {
    float v = 0.0;
    float a = 0.5;
    vec3 shift = vec3(100.0);
    for (int i = 0; i < 4; i++) {
      v += a * noise3d(p);
      p = p * 2.0 + shift;
      a *= 0.5;
    }
    return v;
  }

  void main() {
    vec2 uv = vUv;
    vec2 aspect = vec2(uResolution.x / uResolution.y, 1.0);

    // Volumetric layers at different depths
    float fog = 0.0;
    for (int layer = 0; layer < 3; layer++) {
      float depth = 1.0 + float(layer) * 0.8;
      vec3 samplePos = vec3(uv * aspect * 2.0, depth + uTime * 0.05 * (1.0 + float(layer) * 0.3));
      samplePos.x += sin(uTime * 0.1 + float(layer)) * 0.3;
      float density = fbm(samplePos * 1.5) * (0.35 - float(layer) * 0.08);

      // Fade at center to reveal avatar behind
      float centerFade = smoothstep(0.0, 0.5, length(uv - 0.5));
      density *= centerFade;

      fog += density;
    }

    vec3 color = mix(uFogColor1, uFogColor2, fog * 2.0);
    float alpha = clamp(fog * 0.8, 0.0, 0.6);

    gl_FragColor = vec4(color, alpha);
  }
`;

const fogPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({
    vertexShader: fogVert,
    fragmentShader: fogFrag,
    uniforms: {
      uTime: { value: 0 },
      uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
      uFogColor1: { value: new THREE.Color(0x1a1a4e) },
      uFogColor2: { value: new THREE.Color(0x3322aa) }
    },
    transparent: true,
    depthTest: false,
    depthWrite: false
  })
);

// === GLASS AVATAR ORB ===
const orbGeo = new THREE.SphereGeometry(1.0, 96, 96);
const orbMat = new THREE.MeshPhysicalMaterial({
  color: 0x88aaff,
  metalness: 0.0,
  roughness: 0.02,
  transmission: 0.95,
  thickness: 2.5,
  ior: 1.45,
  attenuationColor: new THREE.Color(0x2244aa),
  attenuationDistance: 1.5,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  envMapIntensity: 1.5,
  transparent: true
});
const orb = new THREE.Mesh(orbGeo, orbMat);
scene.add(orb);

// Inner avatar shape — icosahedron as "consciousness core"
const innerGeo = new THREE.IcosahedronGeometry(0.4, 2);
const innerMat = new THREE.MeshStandardMaterial({
  color: 0x6644ff,
  emissive: 0x4422cc,
  emissiveIntensity: 3.0,
  metalness: 0.8,
  roughness: 0.15,
  wireframe: true
});
const inner = new THREE.Mesh(innerGeo, innerMat);
scene.add(inner);

// Second inner — solid smaller for depth
const inner2Geo = new THREE.OctahedronGeometry(0.22, 1);
const inner2Mat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0x8866ff,
  emissiveIntensity: 4.0,
  metalness: 1.0,
  roughness: 0.0
});
const inner2 = new THREE.Mesh(inner2Geo, inner2Mat);
scene.add(inner2);

// Fog wisps — small emissive spheres that drift
const wisps = [];
for (let i = 0; i < 40; i++) {
  const wispGeo = new THREE.SphereGeometry(0.015 + Math.random() * 0.025, 8, 8);
  const wispMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color().setHSL(0.65 + Math.random() * 0.1, 0.7, 0.6),
    transparent: true,
    opacity: 0.3 + Math.random() * 0.4,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const wisp = new THREE.Mesh(wispGeo, wispMat);
  wisp.userData = {
    angle: Math.random() * Math.PI * 2,
    radius: 1.3 + Math.random() * 2.5,
    speed: 0.1 + Math.random() * 0.3,
    yOffset: (Math.random() - 0.5) * 3,
    ySpeed: 0.05 + Math.random() * 0.1,
    phase: Math.random() * Math.PI * 2
  };
  scene.add(wisp);
  wisps.push(wisp);
}

// Orbiting glass ring
const torusGeo = new THREE.TorusGeometry(1.5, 0.02, 16, 100);
const torusMat = new THREE.MeshPhysicalMaterial({
  color: 0xaabbff,
  metalness: 0.0,
  roughness: 0.0,
  transmission: 0.9,
  thickness: 0.5,
  ior: 1.5,
  emissive: 0x4455aa,
  emissiveIntensity: 0.5
});
const torus = new THREE.Mesh(torusGeo, torusMat);
torus.rotation.x = Math.PI * 0.4;
scene.add(torus);

// Lights
const key = new THREE.PointLight(0x6688ff, 4, 20);
key.position.set(3, 3, 5);
scene.add(key);

const fill = new THREE.PointLight(0x8844ff, 2, 15);
fill.position.set(-4, -1, 2);
scene.add(fill);

const back = new THREE.PointLight(0xaa66ff, 3, 15);
back.position.set(0, 3, -5);
scene.add(back);

const ambient = new THREE.AmbientLight(0x111133, 0.5);
scene.add(ambient);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 1.0, 0.5, 0.7
);
composer.addPass(bloom);

// Grain + Vignette
const grainShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime: { value: 0 }
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    varying vec2 vUv;
    float rand(vec2 co){ return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453); }
    void main(){
      vec4 c = texture2D(tDiffuse, vUv);
      float grain = rand(vUv + fract(uTime)) * 0.05;
      c.rgb += grain - 0.025;
      float d = distance(vUv, vec2(0.5));
      c.rgb *= 1.0 - d * d * 0.5;
      gl_FragColor = c;
    }
  `
};
composer.addPass(new ShaderPass(grainShader));

// Fog overlay rendered last
const fogScene = new THREE.Scene();
const fogCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
fogScene.add(fogPlane);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Update fog
  fogPlane.material.uniforms.uTime.value = t;
  grainShader.uniforms.uTime.value = t;

  // Orb breathing
  const breathe = 1.0 + Math.sin(t * 0.6) * 0.04;
  orb.scale.setScalar(breathe);

  // Inner rotations
  inner.rotation.y = t * 0.4;
  inner.rotation.x = t * 0.25;
  inner2.rotation.y = -t * 0.7;
  inner2.rotation.z = t * 0.3;
  inner2Mat.emissiveIntensity = 3.0 + Math.sin(t * 2.5) * 1.5;

  // Torus orbit
  torus.rotation.z = t * 0.12;
  torus.rotation.y = t * 0.08;

  // Wisp animation — drift and fade
  wisps.forEach(w => {
    const d = w.userData;
    d.angle += d.speed * 0.016;
    w.position.x = Math.cos(d.angle) * d.radius;
    w.position.z = Math.sin(d.angle) * d.radius;
    w.position.y = d.yOffset + Math.sin(t * d.ySpeed + d.phase) * 1.0;
    w.material.opacity = (0.2 + Math.sin(t * d.speed + d.phase) * 0.2) * 0.7;
  });

  // Camera subtle sway
  camera.position.x = Math.sin(t * 0.1) * 0.3;
  camera.position.y = 0.5 + Math.cos(t * 0.08) * 0.2;
  camera.lookAt(0, 0, 0);

  // Render main scene with bloom
  composer.render();

  // Render fog overlay on top
  renderer.autoClear = false;
  renderer.render(fogScene, fogCam);
  renderer.autoClear = true;
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  fogPlane.material.uniforms.uResolution.value.set(innerWidth, innerHeight);
});
</script>
</body>
</html>
