<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 12 V1: Hexagonal Bokeh DoF Glass Orb</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080a12; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#info { position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.4); font: 12px monospace; z-index: 10; }
</style>
</head>
<body>
<div id="info">Night 12 V1 | Hexagonal Bokeh DoF | Rhomboid Decomposition</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// --- HDRI-like lighting ---
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.3);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0x4fc3f7, 2.0);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0xff6f00, 1.2);
rimLight.position.set(-3, 2, -3);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0x7c4dff, 1.5, 20);
fillLight.position.set(-2, -1, 4);
scene.add(fillLight);

// --- CubeCamera for reflections ---
const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, {
  format: THREE.RGBAFormat,
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter
});
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRenderTarget);
scene.add(cubeCamera);

// --- Hero Orb: Multi-layer glass with chromatic dispersion ---
const glassGroup = new THREE.Group();

function createGlassShell(radius, iorBase, color, opacity) {
  const geo = new THREE.IcosahedronGeometry(radius, 5);
  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(color),
    metalness: 0.0,
    roughness: 0.05,
    transmission: 0.95,
    thickness: 0.5,
    ior: iorBase,
    envMap: cubeRenderTarget.texture,
    envMapIntensity: 1.5,
    clearcoat: 1.0,
    clearcoatRoughness: 0.02,
    transparent: true,
    opacity: opacity,
    depthWrite: false,
    side: THREE.DoubleSide,
    iridescence: 0.3,
    iridescenceIOR: 1.3,
    dispersion: 0.15
  });
  return new THREE.Mesh(geo, mat);
}

const shell1 = createGlassShell(1.0, 1.55, 0x1a237e, 0.6);
const shell2 = createGlassShell(0.75, 1.50, 0x0d47a1, 0.5);
const shell3 = createGlassShell(0.5, 1.45, 0x4fc3f7, 0.4);

glassGroup.add(shell1, shell2, shell3);
scene.add(glassGroup);

// --- Depth staging spheres (for bokeh demonstration) ---
const depthSpheres = [];
const depthPositions = [
  { pos: [-2.5, 1.2, 2.0], color: 0x7c4dff, size: 0.25 },
  { pos: [2.8, -0.8, 1.5], color: 0x00bcd4, size: 0.2 },
  { pos: [-1.5, -1.5, -3.0], color: 0xff6f00, size: 0.35 },
  { pos: [1.8, 1.8, -4.0], color: 0xe040fb, size: 0.3 },
  { pos: [-3.0, 0.5, -2.5], color: 0x1de9b6, size: 0.2 },
  { pos: [0.5, -2.0, -5.0], color: 0xffab40, size: 0.4 },
];

depthPositions.forEach(({ pos, color, size }) => {
  const geo = new THREE.IcosahedronGeometry(size, 4);
  const mat = new THREE.MeshPhysicalMaterial({
    color, metalness: 0.1, roughness: 0.08,
    transmission: 0.9, thickness: 0.3, ior: 1.5,
    envMap: cubeRenderTarget.texture,
    transparent: true, opacity: 0.7, depthWrite: false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...pos);
  scene.add(mesh);
  depthSpheres.push(mesh);
});

// --- Dust motes ---
const dustCount = 200;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
const dustSizes = new Float32Array(dustCount);
for (let i = 0; i < dustCount; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 12;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 8;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 10;
  dustSizes[i] = Math.random() * 2 + 0.5;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));
const dustMat = new THREE.PointsMaterial({
  color: 0x4fc3f7, size: 0.02, transparent: true, opacity: 0.3,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const dustMotes = new THREE.Points(dustGeo, dustMat);
scene.add(dustMotes);

// --- Hexagonal Bokeh DoF Shader ---
// Rhomboid decomposition: 3 directional blurs at 0, 60, 120 degrees
const HexBokehShader = {
  uniforms: {
    tDiffuse: { value: null },
    tDepth: { value: null },
    resolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
    focus: { value: 6.0 },
    aperture: { value: 0.015 },
    maxblur: { value: 0.02 },
    blurDir: { value: new THREE.Vector2(1.0, 0.0) },
    nearClip: { value: 0.1 },
    farClip: { value: 100.0 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 resolution;
    uniform float focus;
    uniform float aperture;
    uniform float maxblur;
    uniform vec2 blurDir;

    varying vec2 vUv;

    // Hexagonal kernel weight - approximates 6-sided bokeh shape
    float hexWeight(vec2 offset, float radius) {
      // Hexagonal distance function
      vec2 q = abs(offset);
      float hex = max(q.x * 0.866025 + q.y * 0.5, q.y);
      return smoothstep(radius, radius * 0.5, hex);
    }

    void main() {
      vec2 texel = 1.0 / resolution;

      // Depth-based blur amount (simplified - using luminance as proxy)
      vec4 center = texture2D(tDiffuse, vUv);
      float centerDepth = dot(center.rgb, vec3(0.299, 0.587, 0.114));

      // Blur radius based on distance from focus
      float blurAmount = aperture * abs(focus - (1.0 / (centerDepth + 0.01)));
      blurAmount = clamp(blurAmount, 0.0, maxblur);

      // 3 directional samples for hexagonal approximation
      // Direction 0: 0 degrees
      vec2 dir0 = vec2(1.0, 0.0);
      // Direction 1: 60 degrees
      vec2 dir1 = vec2(0.5, 0.866025);
      // Direction 2: 120 degrees
      vec2 dir2 = vec2(-0.5, 0.866025);

      vec4 color = vec4(0.0);
      float totalWeight = 0.0;

      const int SAMPLES = 12;

      for (int i = -SAMPLES; i <= SAMPLES; i++) {
        float fi = float(i) / float(SAMPLES);
        float radius = blurAmount * abs(fi);

        // Sample along each of 3 hex directions
        vec2 offset0 = dir0 * fi * blurAmount * texel * resolution.y;
        vec2 offset1 = dir1 * fi * blurAmount * texel * resolution.y;
        vec2 offset2 = dir2 * fi * blurAmount * texel * resolution.y;

        // Hexagonal weighting
        float w0 = hexWeight(offset0 * texel, blurAmount * 1.2);
        float w1 = hexWeight(offset1 * texel, blurAmount * 1.2);
        float w2 = hexWeight(offset2 * texel, blurAmount * 1.2);

        color += texture2D(tDiffuse, vUv + offset0 * texel) * w0;
        color += texture2D(tDiffuse, vUv + offset1 * texel) * w1;
        color += texture2D(tDiffuse, vUv + offset2 * texel) * w2;

        totalWeight += w0 + w1 + w2;
      }

      gl_FragColor = color / max(totalWeight, 1.0);
    }
  `
};

// --- Film Grain Shader ---
const FilmGrainShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 },
    intensity: { value: 0.015 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform float intensity;
    varying vec2 vUv;
    float rand(vec2 co) { return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453); }
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      float grain = rand(vUv + fract(time)) * 2.0 - 1.0;
      color.rgb += grain * intensity;
      gl_FragColor = color;
    }
  `
};

// --- Vignette Shader ---
const VignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    offset: { value: 0.3 },
    darkness: { value: 0.7 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float offset;
    uniform float darkness;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      float dist = distance(vUv, vec2(0.5));
      color.rgb *= smoothstep(0.8, offset * 0.799, dist * (darkness + offset));
      gl_FragColor = color;
    }
  `
};

// --- Post-Processing Pipeline ---
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// Hexagonal Bokeh DoF (FIRST - reads depth)
const hexBokehPass = new ShaderPass(HexBokehShader);
composer.addPass(hexBokehPass);

// Bloom
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.4, 0.85
);
composer.addPass(bloomPass);

// Vignette
const vignettePass = new ShaderPass(VignetteShader);
composer.addPass(vignettePass);

// Film Grain (LAST)
const grainPass = new ShaderPass(FilmGrainShader);
composer.addPass(grainPass);

// --- Animation ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Shell rotations (different speeds for parallax)
  shell1.rotation.y = t * 0.05;
  shell1.rotation.x = t * 0.03;
  shell2.rotation.y = -t * 0.07;
  shell2.rotation.z = t * 0.04;
  shell3.rotation.y = t * 0.09;
  shell3.rotation.x = -t * 0.06;

  // Group float
  glassGroup.position.y = Math.sin(t * 0.4) * 0.15;
  glassGroup.rotation.y = t * 0.15;

  // Depth spheres orbit
  depthSpheres.forEach((s, i) => {
    const angle = t * 0.2 + i * Math.PI / 3;
    s.position.x = depthPositions[i].pos[0] + Math.sin(angle) * 0.3;
    s.position.y = depthPositions[i].pos[1] + Math.cos(angle * 0.7) * 0.2;
  });

  // Breathing bokeh focus
  hexBokehPass.uniforms.focus.value = 6.0 + Math.sin(t * 0.25) * 0.15;

  // Dust drift
  const positions = dustMotes.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    positions[i * 3 + 1] += Math.sin(t + i) * 0.0005;
    positions[i * 3] += Math.cos(t * 0.5 + i * 0.3) * 0.0003;
  }
  dustMotes.geometry.attributes.position.needsUpdate = true;

  // Film grain time
  grainPass.uniforms.time.value = t;

  // Update cube camera (hide glass to prevent self-sampling)
  shell1.visible = false; shell2.visible = false; shell3.visible = false;
  cubeCamera.position.copy(glassGroup.position);
  cubeCamera.update(renderer, scene);
  shell1.visible = true; shell2.visible = true; shell3.visible = true;

  composer.render();
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  hexBokehPass.uniforms.resolution.value.set(innerWidth, innerHeight);
});
</script>
</body>
</html>
