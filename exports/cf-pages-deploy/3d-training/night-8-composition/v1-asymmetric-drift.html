<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 8 V1 — Asymmetric Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #040608; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    color: rgba(255,255,255,0.12);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }
  #fps {
    position: fixed;
    top: 12px;
    right: 16px;
    font-family: monospace;
    color: rgba(42,147,193,0.2);
    font-size: 10px;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="info">Night 8 V1 — Asymmetric Drift — Composition: Golden Ratio Placement</div>
<div id="fps">--</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── COMPOSITION STUDY: Golden Ratio ───
// Gleb places primary forms at ~0.618 from left, leaving vast negative space
// The form "breathes" because of the emptiness around it
const PHI = 0.618;
const BLUE = new THREE.Color(0x2a93c1);
const ORANGE = new THREE.Color(0xf1420b);
const DARK_BG = new THREE.Color(0x040608);

// ─── SCENE ───
const scene = new THREE.Scene();
scene.background = DARK_BG;
scene.fog = new THREE.FogExp2(0x040608, 0.06);

const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ─── MOUSE ───
const mouse = new THREE.Vector2(0, 0);
const targetMouse = new THREE.Vector2(0, 0);
window.addEventListener('mousemove', (e) => {
  targetMouse.x = (e.clientX / innerWidth) * 2 - 1;
  targetMouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// ─── GOLDEN RATIO OFFSET ───
// Place the main form at PHI * viewport width from left edge
// In NDC: center is 0, so PHI offset = (PHI - 0.5) * 2 * aspect-adjusted
const aspect = innerWidth / innerHeight;
const offsetX = (PHI - 0.5) * 2.8; // Shifted right of center
const offsetY = 0.15; // Slightly above center

// ─── MAIN FORM: Glass Torus Knot ───
const mainGeo = new THREE.TorusKnotGeometry(0.7, 0.22, 200, 32, 2, 3);
const mainMat = new THREE.MeshPhysicalMaterial({
  color: 0x0a1520,
  metalness: 0.15,
  roughness: 0.05,
  transmission: 0.92,
  thickness: 1.5,
  ior: 1.45,
  envMapIntensity: 1.2,
  clearcoat: 1.0,
  clearcoatRoughness: 0.02,
  attenuationColor: new THREE.Color(0x1a6090),
  attenuationDistance: 2.5,
  transparent: true,
  opacity: 0.95,
});
const mainMesh = new THREE.Mesh(mainGeo, mainMat);
mainMesh.position.set(offsetX, offsetY, 0);
scene.add(mainMesh);

// ─── ACCENT RING: Thin chrome orbit ───
const ringGeo = new THREE.TorusGeometry(1.2, 0.008, 16, 128);
const ringMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 1.0,
  roughness: 0.03,
  envMapIntensity: 2.0,
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.set(offsetX, offsetY, 0);
ring.rotation.x = Math.PI * 0.35;
scene.add(ring);

// ─── COUNTER-BALANCE: Tiny accent sphere on opposite side ───
// Compositional counterweight — small form in the negative space
const dotGeo = new THREE.SphereGeometry(0.06, 32, 32);
const dotMat = new THREE.MeshPhysicalMaterial({
  color: ORANGE,
  metalness: 0.8,
  roughness: 0.1,
  emissive: ORANGE,
  emissiveIntensity: 0.4,
});
const dot = new THREE.Mesh(dotGeo, dotMat);
dot.position.set(-offsetX * 1.3, -0.5, 0.5);
scene.add(dot);

// ─── FLOATING DUST PARTICLES (sparse, compositional) ───
const dustCount = 40;
const dustGeo = new THREE.BufferGeometry();
const dustPositions = new Float32Array(dustCount * 3);
const dustSizes = new Float32Array(dustCount);
for (let i = 0; i < dustCount; i++) {
  dustPositions[i * 3] = (Math.random() - 0.5) * 8;
  dustPositions[i * 3 + 1] = (Math.random() - 0.5) * 5;
  dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 4 - 1;
  dustSizes[i] = Math.random() * 2 + 0.5;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));

const dustMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color(0x2a93c1) },
  },
  vertexShader: `
    attribute float size;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 pos = position;
      pos.y += sin(uTime * 0.3 + position.x * 2.0) * 0.05;
      pos.x += cos(uTime * 0.2 + position.z * 1.5) * 0.03;
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = size * (200.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
      vAlpha = 0.15 + 0.1 * sin(uTime + position.x * 3.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.1, d) * vAlpha;
      gl_FragColor = vec4(uColor, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const dustPoints = new THREE.Points(dustGeo, dustMat);
scene.add(dustPoints);

// ─── LIGHTS (minimal — Gleb's single-source principle) ───
const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(3, 2, 4);
scene.add(keyLight);

const rimLight = new THREE.PointLight(0x2a93c1, 2.0, 10);
rimLight.position.set(-3, 1, -2);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xf1420b, 0.3, 8);
fillLight.position.set(2, -2, 3);
scene.add(fillLight);

scene.add(new THREE.AmbientLight(0x080c15, 0.3));

// ─── ENV MAP (simple cube for reflections) ───
const cubeRT = new THREE.WebGLCubeRenderTarget(256);
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
scene.environment = cubeRT.texture;

// ─── POST-PROCESSING ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.3, 0.6, 0.85);
composer.addPass(bloom);

// Chromatic aberration (subtle)
const chromaShader = {
  uniforms: {
    tDiffuse: { value: null },
    uOffset: { value: 0.0008 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uOffset;
    varying vec2 vUv;
    void main() {
      float r = texture2D(tDiffuse, vUv + vec2(uOffset, 0.0)).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - vec2(uOffset, 0.0)).b;
      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `,
};
composer.addPass(new ShaderPass(chromaShader));

// Vignette
const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    uDarkness: { value: 0.7 },
    uOffset: { value: 1.0 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uDarkness;
    uniform float uOffset;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      vec2 center = vUv - 0.5;
      float dist = length(center);
      float vig = smoothstep(0.7, 0.3, dist);
      color.rgb *= mix(1.0 - uDarkness, 1.0, vig);
      gl_FragColor = color;
    }
  `,
};
composer.addPass(new ShaderPass(vignetteShader));
composer.addPass(new OutputPass());

// ─── FPS COUNTER ───
const fpsEl = document.getElementById('fps');
let frames = 0, lastFpsTime = performance.now();

// ─── ANIMATION ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Smooth mouse
  mouse.lerp(targetMouse, 0.05);

  // Main form: slow rotation + mouse influence
  mainMesh.rotation.y = t * 0.15 + mouse.x * 0.3;
  mainMesh.rotation.x = Math.sin(t * 0.1) * 0.1 + mouse.y * 0.15;

  // Ring: counter-rotate
  ring.rotation.z = t * 0.08;
  ring.rotation.y = t * 0.05 + mouse.x * 0.1;

  // Dot: gentle drift
  dot.position.y = -0.5 + Math.sin(t * 0.5) * 0.15;
  dot.position.x = -offsetX * 1.3 + Math.cos(t * 0.3) * 0.1;

  // Camera: very subtle parallax from mouse (composition shift)
  camera.position.x = mouse.x * 0.15;
  camera.position.y = mouse.y * 0.08;
  camera.lookAt(offsetX * 0.3, 0, 0); // Look slightly toward the form, not center

  // Update dust
  dustMat.uniforms.uTime.value = t;

  // Update env map occasionally
  if (Math.floor(t * 2) % 3 === 0) {
    mainMesh.visible = false;
    cubeCamera.position.copy(mainMesh.position);
    cubeCamera.update(renderer, scene);
    mainMesh.visible = true;
  }

  composer.render();

  // FPS
  frames++;
  if (performance.now() - lastFpsTime >= 1000) {
    fpsEl.textContent = frames + ' fps';
    frames = 0;
    lastFpsTime = performance.now();
  }
}
animate();

// ─── RESIZE ───
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
