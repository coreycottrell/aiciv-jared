<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 8 V3 — Minimal Horizon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020305; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    color: rgba(255,255,255,0.10);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }
  #fps {
    position: fixed;
    top: 12px;
    right: 16px;
    font-family: monospace;
    color: rgba(42,147,193,0.2);
    font-size: 10px;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="info">Night 8 V3 — Minimal Horizon — Composition: Bottom Third, Vast Emptiness</div>
<div id="fps">--</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── COMPOSITION STUDY: Minimal Horizon ───
// The boldest Gleb compositions put the form LOW in the frame
// 2/3 of the viewport is pure darkness — the void gives the form gravitas
// Like a planet on a horizon — the emptiness IS the design

const BLUE = new THREE.Color(0x2a93c1);
const ORANGE = new THREE.Color(0xf1420b);
const NEAR_BLACK = new THREE.Color(0x020305);

const scene = new THREE.Scene();
scene.background = NEAR_BLACK;

const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 7); // Looking DOWN at the form
camera.lookAt(0, -1.2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.body.appendChild(renderer.domElement);

const mouse = new THREE.Vector2(0, 0);
const targetMouse = new THREE.Vector2(0, 0);
window.addEventListener('mousemove', (e) => {
  targetMouse.x = (e.clientX / innerWidth) * 2 - 1;
  targetMouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// ─── GROUND PLANE: Reflective dark surface ───
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshPhysicalMaterial({
  color: 0x030508,
  metalness: 0.95,
  roughness: 0.15,
  envMapIntensity: 0.4,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.8;
scene.add(ground);

// ─── MAIN FORM: Chrome sphere sitting on horizon ───
const sphereGeo = new THREE.SphereGeometry(0.65, 128, 128);

// Custom vertex displacement for organic feel
const sphereMat = new THREE.MeshPhysicalMaterial({
  color: 0x0a0e14,
  metalness: 1.0,
  roughness: 0.03,
  envMapIntensity: 2.5,
  clearcoat: 1.0,
  clearcoatRoughness: 0.01,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(0, -1.12, 0); // Sitting on ground, bottom third of frame
scene.add(sphere);

// ─── REFLECTION SPHERE (mirror on ground) ───
const reflGeo = new THREE.SphereGeometry(0.64, 64, 64);
const reflMat = new THREE.MeshPhysicalMaterial({
  color: 0x050810,
  metalness: 1.0,
  roughness: 0.2,
  envMapIntensity: 0.3,
  transparent: true,
  opacity: 0.15,
});
const reflection = new THREE.Mesh(reflGeo, reflMat);
reflection.position.set(0, -2.48, 0);
reflection.scale.y = -0.4; // Squished reflection
scene.add(reflection);

// ─── SINGLE ACCENT: One light line on the horizon ───
const linePoints = [];
for (let i = 0; i <= 100; i++) {
  const x = (i / 100) * 16 - 8;
  const y = -1.79;
  const z = 0;
  linePoints.push(new THREE.Vector3(x, y, z));
}
const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
const lineMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: BLUE },
  },
  vertexShader: `
    varying float vX;
    void main() {
      vX = position.x;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColor;
    varying float vX;
    void main() {
      // Fade at edges, pulse from center
      float fade = 1.0 - smoothstep(0.0, 4.0, abs(vX));
      float pulse = 0.3 + 0.15 * sin(uTime * 0.8 + vX * 0.5);
      float alpha = fade * pulse;
      gl_FragColor = vec4(uColor, alpha * 0.5);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const horizonLine = new THREE.Line(lineGeo, lineMat);
scene.add(horizonLine);

// ─── ATMOSPHERE: Extremely sparse particles (3-5 visible at any time) ───
const partCount = 12;
const partGeo = new THREE.BufferGeometry();
const partPos = new Float32Array(partCount * 3);
const partSize = new Float32Array(partCount);
for (let i = 0; i < partCount; i++) {
  partPos[i * 3] = (Math.random() - 0.5) * 6;
  partPos[i * 3 + 1] = Math.random() * 3 - 1.5; // Mostly above the sphere
  partPos[i * 3 + 2] = (Math.random() - 0.5) * 3;
  partSize[i] = Math.random() * 1.5 + 0.5;
}
partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
partGeo.setAttribute('size', new THREE.BufferAttribute(partSize, 1));
const partMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float size;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 pos = position;
      pos.y += sin(uTime * 0.15 + position.x * 1.5) * 0.08;
      pos.x += cos(uTime * 0.1 + position.z) * 0.05;
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = size * (150.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
      // Fade in/out slowly
      vAlpha = 0.04 + 0.03 * sin(uTime * 0.4 + position.x * 2.0 + position.z * 3.0);
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = smoothstep(0.5, 0.0, d) * vAlpha;
      gl_FragColor = vec4(0.16, 0.58, 0.76, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(partGeo, partMat));

// ─── LIGHTS: Extremely minimal ───
// ONE key light from above-right — that's it
const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(2, 6, 3);
scene.add(keyLight);

// Subtle blue rim from left (like horizon glow)
const rimLight = new THREE.PointLight(0x2a93c1, 0.6, 15);
rimLight.position.set(-4, -1.5, 2);
scene.add(rimLight);

// Warm point from behind and below (ground bounce)
const bounceLight = new THREE.PointLight(0xf1420b, 0.15, 8);
bounceLight.position.set(0, -2.5, -2);
scene.add(bounceLight);

scene.add(new THREE.AmbientLight(0x030508, 0.2));

// ─── ENV MAP ───
const cubeRT = new THREE.WebGLCubeRenderTarget(256);
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
scene.environment = cubeRT.texture;

// ─── POST-PROCESSING ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// Very restrained bloom — just the lightest glow
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.2, 0.8, 0.92
));

// Film grain (Gleb's renders often have subtle grain)
const grainShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime: { value: 0 },
    uIntensity: { value: 0.04 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uIntensity;
    varying vec2 vUv;

    float random(vec2 co) {
      return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453);
    }

    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      float grain = random(vUv * uTime) * uIntensity;
      color.rgb += grain - uIntensity * 0.5;
      gl_FragColor = color;
    }
  `,
};
const grainPass = new ShaderPass(grainShader);
composer.addPass(grainPass);

// Heavy vignette (top 2/3 goes nearly black)
const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      // Asymmetric vignette: heavier on top
      vec2 center = vec2(vUv.x - 0.5, (vUv.y - 0.3) * 1.3); // Shift center down
      float dist = length(center);
      float vig = smoothstep(0.8, 0.2, dist);
      color.rgb *= mix(0.0, 1.0, vig); // Fades to pure black at edges
      gl_FragColor = color;
    }
  `,
};
composer.addPass(new ShaderPass(vignetteShader));
composer.addPass(new OutputPass());

// ─── FPS ───
const fpsEl = document.getElementById('fps');
let frames = 0, lastFpsTime = performance.now();

// ─── ANIMATE ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  mouse.lerp(targetMouse, 0.03);

  // Sphere: barely rotates — stillness is the point
  sphere.rotation.y = t * 0.05 + mouse.x * 0.1;

  // Reflection follows
  reflection.rotation.y = sphere.rotation.y;

  // Camera: very subtle mouse influence (stability = gravitas)
  camera.position.x = mouse.x * 0.1;
  camera.position.y = 1.5 + mouse.y * 0.05;
  camera.lookAt(0, -1.2, 0);

  // Horizon line pulse
  lineMat.uniforms.uTime.value = t;

  // Particles
  partMat.uniforms.uTime.value = t;

  // Film grain
  grainPass.uniforms.uTime.value = t;

  // Env map (sparse updates)
  if (Math.floor(t) % 3 === 0) {
    sphere.visible = false;
    cubeCamera.position.copy(sphere.position);
    cubeCamera.update(renderer, scene);
    sphere.visible = true;
  }

  composer.render();

  frames++;
  if (performance.now() - lastFpsTime >= 1000) {
    fpsEl.textContent = frames + ' fps';
    frames = 0;
    lastFpsTime = performance.now();
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
