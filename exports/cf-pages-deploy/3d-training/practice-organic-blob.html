<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice 2: Organic Blob — Gleb Training</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #04060e;
    overflow: hidden;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Practice 2 — Organic Blob — PureBrain 3D Training</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060e);
scene.fog = new THREE.FogExp2(0x04060e, 0.08);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

// ─── Lighting ─────────────────────────────────────────────────────────────────
// Three-point lighting for luxury product photography feel
const ambient = new THREE.AmbientLight(0x080d1a, 3.0);
scene.add(ambient);

// Primary key - cool blue from top
const key = new THREE.DirectionalLight(0x4ab8e8, 6.0);
key.position.set(-2, 4, 3);
scene.add(key);

// Rim - warm orange from behind right
const rim = new THREE.DirectionalLight(0xff5522, 3.5);
rim.position.set(3, -1, -3);
scene.add(rim);

// Fill - soft warm from below
const fill = new THREE.DirectionalLight(0x2255aa, 1.5);
fill.position.set(0, -3, 2);
scene.add(fill);

// ─── GLSL Simplex Noise (Ashima Arts, MIT License) ────────────────────────────
// Injected into vertex shader for organic morphing

const simplexNoise = `
// Simplex 3D Noise by Ian McEwan, Ashima Arts
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g  = step(x0.yzx, x0.xyz);
  vec3 l  = 1.0 - g;
  vec3 i1 = min( g.xyz, l.zxy );
  vec3 i2 = max( g.xyz, l.zxy );
  vec3 x1 = x0 - i1 + 1.0 * C.xxx;
  vec3 x2 = x0 - i2 + 2.0 * C.xxx;
  vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
  i = mod(i, 289.0);
  vec4 p = permute( permute( permute(
    i.z + vec4(0.0, i1.z, i2.z, 1.0))
    + i.y + vec4(0.0, i1.y, i2.y, 1.0))
    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 1.0/7.0;
  vec3  ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4( x.xy, y.xy );
  vec4 b1 = vec4( x.zw, y.zw );
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x;
  p1 *= norm.y;
  p2 *= norm.z;
  p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
`;

// ─── Primary Blob (Chrome-Tinted Glass) ──────────────────────────────────────
// High resolution icosahedron for smooth deformation
const blobGeo = new THREE.IcosahedronGeometry(1.5, 80);

// Store original positions for morphing
const posAttr = blobGeo.getAttribute('position');
const origPos = new Float32Array(posAttr.array.length);
origPos.set(posAttr.array);
blobGeo.userData.origPos = origPos;

// Custom shader material - chrome-glass hybrid
const blobMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uNoiseScale: { value: 0.85 },
    uNoiseStrength: { value: 0.38 },
    uColorA: { value: new THREE.Color(0x2a93c1) },  // PureBrain blue
    uColorB: { value: new THREE.Color(0x88ddff) },  // light blue highlight
    uColorC: { value: new THREE.Color(0xf1420b) },  // orange accent
    uFresnelPow: { value: 3.5 },
    uLightPos: { value: new THREE.Vector3(-2, 4, 3) }
  },
  vertexShader: `
    ${simplexNoise}

    uniform float uTime;
    uniform float uNoiseScale;
    uniform float uNoiseStrength;

    varying vec3 vNormal;
    varying vec3 vPosition;
    varying float vNoise;
    varying vec3 vWorldPos;

    void main() {
      vNormal = normalize(normalMatrix * normal);

      // Multi-octave noise for organic feel
      vec3 noisePos = position * uNoiseScale;
      float n1 = snoise(noisePos + uTime * 0.22);
      float n2 = snoise(noisePos * 2.1 + uTime * 0.14 + 1.57);
      float n3 = snoise(noisePos * 4.3 + uTime * 0.09 + 3.14);

      // Weighted combination - large features dominate
      float noise = n1 * 0.6 + n2 * 0.28 + n3 * 0.12;
      vNoise = noise;

      // Displace vertex along normal
      vec3 displaced = position + normal * noise * uNoiseStrength;
      vPosition = displaced;

      vec4 worldPos = modelMatrix * vec4(displaced, 1.0);
      vWorldPos = worldPos.xyz;

      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: `
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    uniform float uFresnelPow;
    uniform vec3 uLightPos;
    uniform float uTime;

    varying vec3 vNormal;
    varying vec3 vPosition;
    varying float vNoise;
    varying vec3 vWorldPos;

    void main() {
      // Fresnel effect for glass-like rim
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), uFresnelPow);

      // Base color driven by noise value
      float t = vNoise * 0.5 + 0.5;
      vec3 baseColor = mix(uColorA, uColorB, t);

      // Orange accent in the high noise ridges
      float ridgeAccent = smoothstep(0.6, 0.9, t);
      baseColor = mix(baseColor, uColorC, ridgeAccent * 0.35);

      // Specular highlight (Blinn-Phong style)
      vec3 lightDir = normalize(uLightPos - vWorldPos);
      vec3 halfDir = normalize(lightDir + viewDir);
      float specular = pow(max(dot(vNormal, halfDir), 0.0), 128.0);

      // Fresnel rim glow - PureBrain blue
      vec3 rimColor = mix(vec3(0.16, 0.58, 0.76), vec3(0.2, 0.75, 1.0), fresnel);

      // Assemble final color
      vec3 finalColor = baseColor;
      finalColor += rimColor * fresnel * 0.85;
      finalColor += vec3(1.0, 0.97, 0.95) * specular * 1.2;

      // Slight transparency on fresnel edges - glass-like
      float alpha = mix(0.88, 0.5, fresnel * 0.6);

      gl_FragColor = vec4(finalColor, alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false
});

const blob = new THREE.Mesh(blobGeo, blobMat);
scene.add(blob);

// ─── Inner Glass Core (Velvet-Chrome Interior) ────────────────────────────────
const innerGeo = new THREE.IcosahedronGeometry(0.9, 60);
const innerMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uNoiseScale: { value: 1.2 },
    uNoiseStrength: { value: 0.22 }
  },
  vertexShader: `
    ${simplexNoise}
    uniform float uTime;
    uniform float uNoiseScale;
    uniform float uNoiseStrength;
    varying vec3 vNormal;
    varying vec3 vWorldPos;

    void main() {
      vNormal = normalize(normalMatrix * normal);
      float n = snoise(position * uNoiseScale + uTime * 0.18 + 6.28);
      vec3 displaced = position + normal * n * uNoiseStrength;
      vec4 worldPos = modelMatrix * vec4(displaced, 1.0);
      vWorldPos = worldPos.xyz;
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    uniform float uTime;

    void main() {
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 2.0);

      // Velvet-chrome: deep blue-black center, bright blue rim
      vec3 center = vec3(0.04, 0.1, 0.22);
      vec3 edge = vec3(0.15, 0.65, 0.95);

      vec3 color = mix(center, edge, fresnel);
      color += vec3(0.8, 0.9, 1.0) * pow(fresnel, 8.0) * 1.5;

      gl_FragColor = vec4(color, 0.82);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const innerBlob = new THREE.Mesh(innerGeo, innerMat);
innerBlob.scale.setScalar(0.92);
scene.add(innerBlob);

// ─── Orbiting Satellite Blobs ──────────────────────────────────────────────────
// Small orbiting elements that make the composition feel alive
function createSatellite(radius, speed, phase, color, size) {
  const geo = new THREE.IcosahedronGeometry(size, 20);
  const mat = new THREE.MeshPhysicalMaterial({
    color: color,
    transmission: 0.8,
    thickness: 0.1,
    roughness: 0.05,
    ior: 1.5,
    metalness: 0.1,
    transparent: true,
    opacity: 0.75
  });
  const mesh = new THREE.Mesh(geo, mat);
  return { mesh, radius, speed, phase };
}

const satellites = [
  createSatellite(2.2, 0.6, 0.0, 0x2a93c1, 0.22),
  createSatellite(2.5, 0.4, 2.09, 0x3db8e8, 0.16),
  createSatellite(2.0, 0.8, 4.18, 0xf1420b, 0.14),
  createSatellite(2.7, 0.35, 1.05, 0x88ccff, 0.12),
  createSatellite(2.3, 0.55, 3.5, 0xaaffdd, 0.10),
];

satellites.forEach(s => scene.add(s.mesh));

// ─── Ring Halo ────────────────────────────────────────────────────────────────
// Translucent ring around blob for luxury product feel
const ringGeo = new THREE.TorusGeometry(2.05, 0.018, 16, 128);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x3a9fd4,
  transparent: true,
  opacity: 0.22,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI * 0.22;
scene.add(ring);

// Second ring - orange accent
const ring2Geo = new THREE.TorusGeometry(2.25, 0.012, 16, 128);
const ring2Mat = new THREE.MeshBasicMaterial({
  color: 0xf1420b,
  transparent: true,
  opacity: 0.12,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
ring2.rotation.x = Math.PI * 0.45;
ring2.rotation.z = Math.PI * 0.15;
scene.add(ring2);

// ─── Particle Dust ────────────────────────────────────────────────────────────
const dustCount = 600;
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  // Distribute in sphere around blob
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2.0 + Math.random() * 2.5;
  dustPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  dustPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  dustPos[i * 3 + 2] = r * Math.cos(phi);
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0x4499bb,
  size: 0.018,
  transparent: true,
  opacity: 0.5,
  sizeAttenuation: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ─── Postprocessing ───────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// Strong bloom for the glowing blob surfaces
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.7,    // strength - more aggressive for this piece
  0.6,    // radius
  0.78    // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─── Mouse Interaction ────────────────────────────────────────────────────────
let mx = 0, my = 0;
document.addEventListener('mousemove', (e) => {
  mx = (e.clientX / window.innerWidth - 0.5) * 2;
  my = -(e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let camTargetX = 0;
let camTargetY = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta ? 0.016 : 0.016;

  // Update shader time
  blobMat.uniforms.uTime.value = t;
  innerMat.uniforms.uTime.value = t * 1.2;

  // Main blob - slow majestic rotation
  blob.rotation.y = t * 0.12;
  blob.rotation.x = Math.sin(t * 0.08) * 0.15;
  blob.rotation.z = Math.cos(t * 0.06) * 0.08;

  // Inner blob - counter-rotate for dynamic feel
  innerBlob.rotation.y = -t * 0.18;
  innerBlob.rotation.x = Math.cos(t * 0.1) * 0.12;
  blob.position.copy(innerBlob.position);

  // Satellites orbit
  satellites.forEach((s, i) => {
    const angle = t * s.speed + s.phase;
    const yBob = Math.sin(t * 0.4 + s.phase) * 0.35;
    const tilt = Math.sin(t * 0.15 + s.phase) * 0.3;
    s.mesh.position.set(
      Math.cos(angle) * s.radius,
      yBob,
      Math.sin(angle) * s.radius
    );
    s.mesh.rotation.x = t * 0.5 + i;
    s.mesh.rotation.y = t * 0.3 + i;
  });

  // Rings rotate
  ring.rotation.z = t * 0.08;
  ring2.rotation.y = t * 0.06;

  // Dust slow drift
  dust.rotation.y = t * 0.03;
  dust.rotation.x = Math.sin(t * 0.02) * 0.05;

  // Camera gentle mouse follow
  camTargetX += (mx * 0.3 - camTargetX) * 0.04;
  camTargetY += (my * 0.25 - camTargetY) * 0.04;
  camera.position.x = camTargetX;
  camera.position.y = camTargetY;
  camera.lookAt(0, 0, 0);

  // Key light breathe
  key.intensity = 6.0 + Math.sin(t * 0.8) * 0.8;

  composer.render();
}

animate();
</script>
</body>
</html>
