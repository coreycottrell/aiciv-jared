<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCal - Aether Operations Schedule</title>
<style>
  :root {
    --bg: #080a12;
    --bg-card: #0d1117;
    --bg-hover: #161b22;
    --border: #21262d;
    --blue: #2a93c1;
    --orange: #f1420b;
    --green: #4caf50;
    --purple: #9c27b0;
    --cyan: #00bcd4;
    --pink: #e91e63;
    --amber: #ff9800;
    --deep-purple: #673ab7;
    --grey: #607d8b;
    --red: #ff5722;
    --lime: #8bc34a;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #484f58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* PASSWORD GATE */
  #gate {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.5s, visibility 0.5s;
  }
  #gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #gate h1 { font-size: 24px; margin-bottom: 8px; color: var(--blue); }
  #gate p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; }
  #gate input {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 12px 20px; border-radius: 8px;
    font-size: 16px; width: 280px; text-align: center;
    outline: none;
  }
  #gate input:focus { border-color: var(--blue); }
  #gate .error { color: var(--orange); font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* HEADER */
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  header .brand {
    display: flex; align-items: center; gap: 12px;
  }
  header .brand h1 {
    font-size: 20px; font-weight: 600;
  }
  header .brand h1 span { color: var(--blue); }
  header .brand .subtitle { color: var(--text-dim); font-size: 13px; }
  header .meta {
    display: flex; gap: 16px; align-items: center; font-size: 13px; color: var(--text-dim);
  }
  header .meta .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  header .meta .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 12px; padding: 16px 24px;
    overflow-x: auto; border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; min-width: 140px;
    flex-shrink: 0;
  }
  .stat-card .label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }
  .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }

  /* FILTER BAR */
  .filter-bar {
    display: flex; gap: 8px; padding: 16px 24px;
    flex-wrap: wrap; align-items: center;
  }
  .filter-bar .label { color: var(--text-dim); font-size: 13px; margin-right: 4px; }
  .filter-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-dim); padding: 5px 12px; border-radius: 16px;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--blue); color: var(--text); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* MAIN CONTENT */
  main { padding: 16px 24px; }

  .section-header {
    font-size: 16px; font-weight: 600; margin: 24px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-header .count {
    background: var(--bg-hover); border-radius: 10px;
    padding: 2px 8px; font-size: 12px; color: var(--text-dim);
  }

  /* EVENT LIST */
  .event-list { display: flex; flex-direction: column; gap: 6px; }

  .event-row {
    display: grid;
    grid-template-columns: 4px 120px 1fr 140px 120px 100px;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: background 0.15s;
    font-size: 13px;
  }
  .event-row:hover { background: var(--bg-hover); }

  .event-color {
    width: 4px; height: 32px; border-radius: 2px;
  }
  .event-time {
    color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
  }
  .event-summary {
    font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .event-agent {
    color: var(--text-dim); font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .event-freq {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    text-align: center; font-weight: 500;
  }
  .event-status {
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .event-status.active { color: var(--green); }
  .event-status.inactive { color: var(--text-muted); }

  /* FREQUENCY COLORS */
  .freq-60min { background: rgba(42,147,193,0.15); color: var(--blue); }
  .freq-8hr { background: rgba(156,39,176,0.15); color: var(--purple); }
  .freq-12hr { background: rgba(0,188,212,0.15); color: var(--cyan); }
  .freq-daily { background: rgba(255,152,0,0.15); color: var(--amber); }
  .freq-nightly { background: rgba(103,58,183,0.15); color: var(--deep-purple); }
  .freq-weekly { background: rgba(233,30,99,0.15); color: var(--pink); }
  .freq-monthly { background: rgba(96,125,139,0.15); color: var(--grey); }

  /* TIMELINE VIEW */
  .timeline-container {
    position: relative; margin: 16px 0;
  }
  .timeline-hour {
    display: flex; align-items: flex-start; gap: 12px;
    min-height: 60px; border-bottom: 1px solid var(--border);
    padding: 8px 0;
  }
  .timeline-label {
    width: 60px; flex-shrink: 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; color: var(--text-dim);
    padding-top: 2px;
  }
  .timeline-events {
    display: flex; flex-wrap: wrap; gap: 6px; flex: 1;
  }
  .timeline-chip {
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    border: 1px solid; cursor: default; white-space: nowrap;
    max-width: 220px; overflow: hidden; text-overflow: ellipsis;
  }

  /* TOOLTIP */
  .tooltip {
    display: none; position: fixed; z-index: 100;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; max-width: 360px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    font-size: 13px;
  }
  .tooltip.show { display: block; }
  .tooltip .tt-title { font-weight: 600; margin-bottom: 6px; }
  .tooltip .tt-desc { color: var(--text-dim); font-size: 12px; line-height: 1.5; }
  .tooltip .tt-meta { margin-top: 8px; font-size: 11px; color: var(--text-muted); }

  /* VIEW TOGGLE */
  .view-toggle {
    display: flex; gap: 0; margin-left: auto;
  }
  .view-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 14px; font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .view-btn:first-child { border-radius: 6px 0 0 6px; }
  .view-btn:last-child { border-radius: 0 6px 6px 0; }
  .view-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* REFRESH INDICATOR */
  .refresh-indicator {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 12px;
    color: var(--text-dim); display: flex; align-items: center; gap: 6px;
  }
  .refresh-indicator .spinner {
    width: 12px; height: 12px; border: 2px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }
  .refresh-indicator.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .event-row {
      grid-template-columns: 4px 1fr;
      gap: 4px;
    }
    .event-time, .event-agent, .event-freq, .event-status {
      grid-column: 2;
    }
    .event-row { padding: 8px; }
    .stats-bar { padding: 12px 16px; }
    main { padding: 12px 16px; }
    header { padding: 16px; }
  }

  /* CATEGORY LEGEND */
  .legend {
    display: flex; flex-wrap: wrap; gap: 12px; padding: 0 24px 12px;
    font-size: 12px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 4px; color: var(--text-dim);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }
</style>

<!-- UNIVERSAL REFERRAL CODE CAPTURE — 90-day cookie + localStorage -->
<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <h1>AgentCal</h1>
  <p>Aether Operations Schedule</p>
  <input type="password" id="gate-input" placeholder="Access Code" autocomplete="off" autofocus>
  <div class="error" id="gate-error"></div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

<header>
  <div class="brand">
    <div>
      <h1><span>Agent</span>Cal</h1>
      <div class="subtitle">Aether Operations Schedule</div>
    </div>
  </div>
  <div class="meta">
    <span><span class="dot live"></span> Auto-refresh 60s</span>
    <span id="last-updated"></span>
    <div class="view-toggle">
      <button class="view-btn active" data-view="list">List</button>
      <button class="view-btn" data-view="timeline">Timeline</button>
    </div>
  </div>
</header>

<div class="stats-bar" id="stats-bar"></div>

<div class="legend" id="legend"></div>

<div class="filter-bar">
  <span class="label">Filter:</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active Only</button>
  <button class="filter-btn" data-filter="identity">Identity</button>
  <button class="filter-btn" data-filter="quality">Quality</button>
  <button class="filter-btn" data-filter="marketing">Marketing</button>
  <button class="filter-btn" data-filter="communication">Communication</button>
  <button class="filter-btn" data-filter="business">Business</button>
  <button class="filter-btn" data-filter="learning">Learning</button>
  <button class="filter-btn" data-filter="build">Build</button>
  <button class="filter-btn" data-filter="qa">QA</button>
  <button class="filter-btn" data-filter="infrastructure">Infrastructure</button>
</div>

<main>
  <div id="list-view"></div>
  <div id="timeline-view" style="display:none;"></div>
</main>

</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-desc"></div>
  <div class="tt-meta"></div>
</div>

<div class="refresh-indicator" id="refresh">
  <div class="spinner"></div>
  <span id="refresh-text">Ready</span>
</div>

<script>
// CONFIG
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8300'
  : 'http://localhost:8300'; // When served from VPS, still hits localhost
const CAL_ID = 'cal_f0d1166ff02248cca147c7beb1b5ec6c';
const API_KEY = 'sl5PWCrxFZiEjjpT6acbBaHfwAsnLOdLvkl2JPJpjHU';
const ACCESS_CODE = 'aether2026';

const CAT_COLORS = {
  identity: '#2a93c1',
  communication: '#6ec1e4',
  quality: '#4caf50',
  marketing: '#f1420b',
  infrastructure: '#9c27b0',
  learning: '#ff9800',
  business: '#e91e63',
  growth: '#00bcd4',
  strategy: '#673ab7',
  optimization: '#607d8b',
  build: '#f1420b',
  training: '#ff5722',
  qa: '#8bc34a',
};

const FREQ_CLASS = {
  '60minutes': 'freq-60min',
  '8hours': 'freq-8hr',
  '12hours': 'freq-12hr',
  'daily': 'freq-daily',
  'nightly': 'freq-nightly',
  'weekly': 'freq-weekly',
  'weekly-monday': 'freq-weekly',
  'weekly-wednesday': 'freq-weekly',
  'weekly-friday': 'freq-weekly',
  'monthly': 'freq-monthly',
};

const FREQ_LABEL = {
  '60minutes': 'Every 60m',
  '8hours': 'Every 8h',
  '12hours': 'Every 12h',
  'daily': 'Daily',
  'nightly': 'Nightly',
  'weekly': 'Weekly',
  'weekly-monday': 'Mon',
  'weekly-wednesday': 'Wed',
  'weekly-friday': 'Fri',
  'monthly': 'Monthly',
};

let allEvents = [];
let currentFilter = 'all';
let currentView = 'list';

// PASSWORD GATE
const gate = document.getElementById('gate');
const gateInput = document.getElementById('gate-input');
const gateError = document.getElementById('gate-error');
const app = document.getElementById('app');

// Check URL bypass
if (new URLSearchParams(window.location.search).get('open') === '1') {
  unlockApp();
}

gateInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (gateInput.value === ACCESS_CODE) {
      unlockApp();
    } else {
      gateError.textContent = 'Invalid access code';
      gateInput.value = '';
    }
  }
});

function unlockApp() {
  gate.classList.add('hidden');
  app.style.display = '';
  loadEvents();
  setInterval(loadEvents, 60000);
}

// LOAD EVENTS
async function loadEvents() {
  const refresh = document.getElementById('refresh');
  const refreshText = document.getElementById('refresh-text');
  refresh.classList.add('loading');
  refreshText.textContent = 'Fetching...';

  try {
    const res = await fetch(`${API_BASE}/api/v1/calendars/${CAL_ID}/events?limit=100`, {
      headers: { 'Authorization': `Bearer ${API_KEY}` }
    });
    const data = await res.json();
    allEvents = (data.items || []).map(evt => ({
      ...evt,
      _cat: evt.metadata?.category || 'general',
      _agent: evt.metadata?.agent || 'unknown',
      _freq: evt.metadata?.frequency || 'daily',
      _active: evt.metadata?.active || false,
      _color: evt.metadata?.color || '#607d8b',
      _boop: evt.metadata?.boop_name || evt.summary,
    }));

    renderStats();
    renderLegend();
    renderView();

    refreshText.textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    refreshText.textContent = `Error: ${err.message}`;
    // If API unreachable, use embedded fallback data
    if (allEvents.length === 0) {
      loadFallbackData();
    }
  }
  refresh.classList.remove('loading');
  document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
}

function loadFallbackData() {
  // Fallback: read from embedded data if API not reachable
  const refreshText = document.getElementById('refresh-text');
  refreshText.textContent = 'Using cached data (API unreachable)';
}

// STATS
function renderStats() {
  const bar = document.getElementById('stats-bar');
  const total = allEvents.length;
  const active = allEvents.filter(e => e._active).length;
  const cats = [...new Set(allEvents.map(e => e._cat))];
  const agents = [...new Set(allEvents.map(e => e._agent))];

  const freqCounts = {};
  allEvents.forEach(e => {
    freqCounts[e._freq] = (freqCounts[e._freq] || 0) + 1;
  });

  bar.innerHTML = `
    <div class="stat-card"><div class="label">Total Tasks</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value" style="color:var(--green)">${active}</div></div>
    <div class="stat-card"><div class="label">Inactive</div><div class="value" style="color:var(--text-muted)">${total - active}</div></div>
    <div class="stat-card"><div class="label">Categories</div><div class="value">${cats.length}</div></div>
    <div class="stat-card"><div class="label">Agents</div><div class="value">${agents.length}</div></div>
    <div class="stat-card"><div class="label">High Freq</div><div class="value" style="color:var(--blue)">${freqCounts['60minutes']||0}</div></div>
  `;
}

// LEGEND
function renderLegend() {
  const legend = document.getElementById('legend');
  const cats = [...new Set(allEvents.map(e => e._cat))].sort();
  legend.innerHTML = cats.map(c =>
    `<div class="legend-item"><div class="legend-dot" style="background:${CAT_COLORS[c]||'#607d8b'}"></div>${c}</div>`
  ).join('');
}

// FILTERS
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderView();
  });
});

// VIEW TOGGLE
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('list-view').style.display = currentView === 'list' ? '' : 'none';
    document.getElementById('timeline-view').style.display = currentView === 'timeline' ? '' : 'none';
    renderView();
  });
});

function getFilteredEvents() {
  let evts = [...allEvents];
  if (currentFilter === 'active') evts = evts.filter(e => e._active);
  else if (currentFilter !== 'all') evts = evts.filter(e => e._cat === currentFilter);
  return evts;
}

// LIST VIEW
function renderView() {
  if (currentView === 'list') renderListView();
  else renderTimelineView();
}

function renderListView() {
  const container = document.getElementById('list-view');
  const events = getFilteredEvents();

  // Group by frequency
  const groups = {};
  const freqOrder = ['60minutes', '8hours', '12hours', 'daily', 'nightly', 'weekly', 'weekly-monday', 'weekly-wednesday', 'weekly-friday', 'monthly'];
  const freqNames = {
    '60minutes': 'Every 60 Minutes (Highest Priority)',
    '8hours': 'Every 8 Hours (3x Daily)',
    '12hours': 'Every 12 Hours (Twice Daily)',
    'daily': 'Daily',
    'nightly': 'Nightly (2am UTC / 10pm ET)',
    'weekly': 'Weekly',
    'weekly-monday': 'Weekly (Monday)',
    'weekly-wednesday': 'Weekly (Wednesday)',
    'weekly-friday': 'Weekly (Friday)',
    'monthly': 'Monthly',
  };

  events.forEach(e => {
    if (!groups[e._freq]) groups[e._freq] = [];
    groups[e._freq].push(e);
  });

  let html = '';
  freqOrder.forEach(freq => {
    if (!groups[freq]) return;
    const evts = groups[freq];
    html += `<div class="section-header">${freqNames[freq] || freq} <span class="count">${evts.length}</span></div>`;
    html += '<div class="event-list">';
    evts.sort((a, b) => a._boop.localeCompare(b._boop)).forEach(evt => {
      const startTime = new Date(evt.start).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true});
      const name = evt._boop.replace(/-/g, ' ').replace(/\bboop\b/gi, '').trim();
      html += `
        <div class="event-row" data-id="${evt.id}"
             onmouseenter="showTooltip(event, '${evt.id}')"
             onmouseleave="hideTooltip()">
          <div class="event-color" style="background:${evt._color}"></div>
          <div class="event-time">${startTime} ET</div>
          <div class="event-summary">${escapeHtml(name)}</div>
          <div class="event-agent">${escapeHtml(evt._agent)}</div>
          <div class="event-freq ${FREQ_CLASS[evt._freq] || ''}">${FREQ_LABEL[evt._freq] || evt._freq}</div>
          <div class="event-status ${evt._active ? 'active' : 'inactive'}">${evt._active ? 'ACTIVE' : 'INACTIVE'}</div>
        </div>`;
    });
    html += '</div>';
  });

  if (events.length === 0) {
    html = '<div style="text-align:center;padding:48px;color:var(--text-dim)">No events match this filter</div>';
  }

  container.innerHTML = html;
}

// TIMELINE VIEW
function renderTimelineView() {
  const container = document.getElementById('timeline-view');
  const events = getFilteredEvents();

  // Build 24-hour timeline
  const hourSlots = {};
  for (let h = 0; h < 24; h++) hourSlots[h] = [];

  events.forEach(evt => {
    const hour = new Date(evt.start).getHours();
    hourSlots[hour].push(evt);
  });

  let html = '<div class="timeline-container">';
  for (let h = 0; h < 24; h++) {
    const evts = hourSlots[h];
    const label = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h-12} PM`;
    const etHour = (h + 20) % 24; // UTC to ET approx
    const etLabel = etHour === 0 ? '12a' : etHour < 12 ? `${etHour}a` : etHour === 12 ? '12p' : `${etHour-12}p`;

    html += `<div class="timeline-hour">
      <div class="timeline-label">${label}<br><span style="color:var(--text-muted);font-size:10px">${etLabel} ET</span></div>
      <div class="timeline-events">`;

    evts.forEach(evt => {
      const name = evt._boop.replace(/-/g, ' ').replace(/\bboop\b/gi, '').trim();
      html += `<div class="timeline-chip" style="background:${hexToRgba(evt._color, 0.15)};border-color:${hexToRgba(evt._color, 0.4)};color:${evt._color};${evt._active ? '' : 'opacity:0.4'}"
        onmouseenter="showTooltip(event, '${evt.id}')"
        onmouseleave="hideTooltip()">${escapeHtml(name)}</div>`;
    });

    html += '</div></div>';
  }
  html += '</div>';

  container.innerHTML = html;
}

// TOOLTIP
const tooltip = document.getElementById('tooltip');
function showTooltip(e, eventId) {
  const evt = allEvents.find(ev => ev.id === eventId);
  if (!evt) return;

  tooltip.querySelector('.tt-title').textContent = evt._boop.replace(/-/g, ' ');
  tooltip.querySelector('.tt-desc').textContent = evt.description || 'No description';
  tooltip.querySelector('.tt-meta').innerHTML =
    `Agent: ${evt._agent} | Category: ${evt._cat} | Freq: ${FREQ_LABEL[evt._freq] || evt._freq} | Status: ${evt._active ? 'Active' : 'Inactive'}`;

  const rect = e.target.getBoundingClientRect();
  let x = rect.right + 8;
  let y = rect.top;
  if (x + 360 > window.innerWidth) x = rect.left - 368;
  if (y + 200 > window.innerHeight) y = window.innerHeight - 210;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
  tooltip.classList.add('show');
}

function hideTooltip() {
  tooltip.classList.remove('show');
}

// HELPERS
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function hexToRgba(hex, alpha) {
  if (!hex || hex[0] !== '#') return `rgba(96,125,139,${alpha})`;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
