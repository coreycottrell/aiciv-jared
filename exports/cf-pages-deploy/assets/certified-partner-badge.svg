<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a93c1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d6e99;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1120;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#080a12;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="440" rx="20" ry="20" fill="#080a12"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="424" rx="16" ry="16" fill="none" stroke="url(#borderGrad)" stroke-width="2.5"/>

  <!-- Inner accent border -->
  <rect x="16" y="16" width="368" height="408" rx="12" ry="12" fill="none" stroke="#1a2540" stroke-width="1"/>

  <!-- Shield / hexagon accent at top -->
  <g transform="translate(200,100)">
    <!-- Hexagon background -->
    <polygon points="0,-55 47.6,-27.5 47.6,27.5 0,55 -47.6,27.5 -47.6,-27.5" fill="url(#shieldGrad)" stroke="url(#borderGrad)" stroke-width="2.5"/>
    <!-- Check mark inside hexagon -->
    <polyline points="-18,2 -6,14 20,-10" fill="none" stroke="#2a93c1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>

  <!-- PUREBR+AI+N.ai wordmark -->
  <g transform="translate(200,190)">
    <text text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="1">
      <tspan fill="#2a93c1">PUREBR</tspan><tspan fill="#f1420b">AI</tspan><tspan fill="#2a93c1">N</tspan><tspan fill="#ffffff">.ai</tspan>
    </text>
  </g>

  <!-- Divider line -->
  <line x1="80" y1="220" x2="320" y2="220" stroke="#2a93c1" stroke-width="1" opacity="0.4"/>

  <!-- CERTIFIED PARTNER text -->
  <text x="200" y="270" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="4">CERTIFIED</text>
  <text x="200" y="305" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="4">PARTNER</text>

  <!-- Divider line -->
  <line x1="120" y1="330" x2="280" y2="330" stroke="#2a93c1" stroke-width="1" opacity="0.4"/>

  <!-- Year -->
  <text x="200" y="365" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#8899aa" letter-spacing="3">2026</text>

  <!-- Bottom accent dots -->
  <circle cx="170" cy="400" r="3" fill="#2a93c1" opacity="0.5"/>
  <circle cx="200" cy="400" r="3" fill="#f1420b" opacity="0.5"/>
  <circle cx="230" cy="400" r="3" fill="#2a93c1" opacity="0.5"/>
</svg>
