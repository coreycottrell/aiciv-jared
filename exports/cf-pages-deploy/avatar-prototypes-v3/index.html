<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════
// SHARED NOISE GLSL (simplex 3D)
// ═══════════════════════════════════════════════════════════
const SIMPLEX_GLSL = `
vec3 _mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 _mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 _permute(vec4 x){return _mod289v4(((x*34.)+1.)*x);}
vec4 _taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);
  const vec4 D=vec4(0.,-.5,1./3.,2./3.);
  vec4 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0+D.yyy;
  i=_mod289v3(i);
  vec4 p=_permute(_permute(_permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;
  vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=_taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm(vec3 p){
  float v=0.,a=.5;
  for(int i=0;i<5;i++){v+=a*snoise(p);p=p*2.1+vec3(1.7,9.2,-3.1);a*=.5;}
  return v;
}
`;

// Value noise (no external deps) for shaders that need something lighter
const VALUE_NOISE_GLSL = `
float _hash(vec3 p){
  p=fract(p*vec3(443.8975,397.2973,491.1871));
  p+=dot(p.zxy,p.yxz+19.19);
  return fract(p.x*p.y*p.z);
}
float vnoise(vec3 p){
  vec3 i=floor(p);vec3 f=fract(p);f=f*f*(3.-2.*f);
  return mix(
    mix(mix(_hash(i),_hash(i+vec3(1,0,0)),f.x),mix(_hash(i+vec3(0,1,0)),_hash(i+vec3(1,1,0)),f.x),f.y),
    mix(mix(_hash(i+vec3(0,0,1)),_hash(i+vec3(1,0,1)),f.x),mix(_hash(i+vec3(0,1,1)),_hash(i+vec3(1,1,1)),f.x),f.y),f.z);
}
float vfbm(vec3 p){
  float v=0.,a=.5;
  mat3 rot=mat3(.8,.6,0,-.6,.8,0,0,0,1);
  for(int i=0;i<5;i++){v+=a*vnoise(p);p=rot*p*2.1+vec3(1.7,9.2,-3.1);a*=.5;}
  return v;
}
`;

// Ray-sphere intersection (reused in shaders)
const RAY_SPHERE_GLSL = `
vec2 raySphere(vec3 ro,vec3 rd,float r){
  float b=dot(ro,rd),c=dot(ro,ro)-r*r,h=b*b-c;
  if(h<0.)return vec2(-1.);h=sqrt(h);
  return vec2(-b-h,-b+h);
}
`;
</script>

<script>
// ═══════════════════════════════════════════════════════════
// AVATAR 1 — CHROME FLUX
// Noise-displaced metallic sphere. Custom vertex+frag shader.
// MeshStandardMaterial with custom displacement in vertex.
// ═══════════════════════════════════════════════════════════
(function ChromeFlux() {
  const canvas = document.getElementById('c-chrome');
  const wrap   = document.getElementById('wrap-chrome');
  let hovered  = false;
  wrap.addEventListener('mouseenter', () => hovered = true);
  wrap.addEventListener('mouseleave', () => hovered = false);

  const W = 250, H = 250;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping   = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5;

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x060810);
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 50);
  camera.position.set(0, 0, 3.6);

  // ----- Build small procedural cube render target for env reflections -----
  const cubeRT  = new THREE.WebGLCubeRenderTarget(128, { format: THREE.RGBFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter });
  const cubeCam = new THREE.CubeCamera(0.1, 100, cubeRT);
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0x04070d);

  // Point lights in envScene give colored env map
  const envB = new THREE.PointLight(0x2a93c1, 6, 40);
  envB.position.set(-5, 6, 3);
  envScene.add(envB);
  const envO = new THREE.PointLight(0xf1420b, 3.5, 40);
  envO.position.set(6, -4, 4);
  envScene.add(envO);
  const envW = new THREE.PointLight(0xe0eaff, 3, 40);
  envW.position.set(1, 8, -5);
  envScene.add(envW);
  const envD = new THREE.PointLight(0x1a0838, 2, 40);
  envD.position.set(0, -8, -3);
  envScene.add(envD);

  // Render env map once at startup (static is fine for this effect)
  cubeCam.position.set(0, 0, 0);
  cubeCam.update(renderer, envScene);
  scene.environment = cubeRT.texture;

  // ----- Custom ShaderMaterial with noise vertex displacement -----
  const chromeMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:   { value: 0 },
      uHover:  { value: 0 },
      envMap:  { value: cubeRT.texture },
      uCamPos: { value: camera.position.clone() },
    },
    vertexShader: `
      uniform float uTime;
      uniform float uHover;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying vec2 vUv;
      varying vec3 vDisplacedNorm;

      ${SIMPLEX_GLSL}

      float blobFBM(vec3 p, float t, float spd) {
        return fbm(p * 1.3 + vec3(t*spd*0.68, t*0.31, t*0.54))   * 0.22
             + fbm(p * 2.7 - vec3(t*0.38, t*spd*0.77, t*0.29))   * 0.09;
      }

      void main() {
        vUv = uv;
        float t = uTime;
        float spd = 1.0 + uHover * 1.4;

        float d = blobFBM(position, t, spd)
                + uHover * fbm(position * 3.2 + vec3(t*2.1)) * 0.1;

        vec3 disp = normalize(position) * (1.0 + d);

        // Finite-difference normal on displaced surface
        float eps = 0.04;
        vec3 pA = normalize(position + vec3(eps,0,0)) * (1.0 + blobFBM(position+vec3(eps,0,0),t,spd));
        vec3 pB = normalize(position + vec3(0,eps,0)) * (1.0 + blobFBM(position+vec3(0,eps,0),t,spd));
        vec3 dpA = pA - disp;
        vec3 dpB = pB - disp;
        vDisplacedNorm = normalize(cross(dpA, dpB));

        vec4 worldPos = modelMatrix * vec4(disp, 1.0);
        vWorldPos = worldPos.xyz;
        vNormal   = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uHover;
      uniform samplerCube envMap;
      uniform vec3 uCamPos;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying vec2 vUv;
      varying vec3 vDisplacedNorm;

      // GGX microfacet
      float ggxD(float nDotH, float rough) {
        float a2 = rough*rough*rough*rough;
        float d  = nDotH*nDotH*(a2-1.)+1.;
        return a2 / (3.14159*d*d + 0.0001);
      }
      float ggxV(float nDotV, float nDotL, float rough) {
        float a2=rough*rough*rough*rough;
        float gV=nDotV+sqrt(a2+(1.-a2)*nDotV*nDotV);
        float gL=nDotL+sqrt(a2+(1.-a2)*nDotL*nDotL);
        return 1./(gV*gL+0.0001);
      }
      vec3 schlick(float cosT, vec3 F0){return F0+(1.-F0)*pow(1.-cosT,5.);}

      void main() {
        vec3 N  = normalize(vDisplacedNorm);
        vec3 V  = normalize(uCamPos - vWorldPos);
        vec3 R  = reflect(-V, N);
        float NdV = max(dot(N,V), 0.0);

        // Sample cubemap for IBL reflection
        vec3 envSample = textureCube(envMap, R).rgb;
        // Fresnel for chrome (F0 ~0.95 silver)
        vec3 F0 = vec3(0.95, 0.93, 0.96);
        vec3 F  = schlick(NdV, F0);

        // Three analytical lights for crisp specular highlights
        float rough = 0.04 + uHover * 0.02;

        // Key light — cold white upper
        vec3 Lk = normalize(vec3(-1.1, 2.2, 1.4));
        float NdLk = max(dot(N,Lk),0.);
        vec3  Hk = normalize(V+Lk);
        float Dk = ggxD(max(dot(N,Hk),0.), rough);
        float Vk = ggxV(NdV, NdLk, rough);
        vec3 specK = vec3(0.9,0.95,1.0) * Dk*Vk*NdLk * F * 4.5;

        // Blue fill light
        vec3 Lb = normalize(vec3(-2.0, 0.8, 0.5));
        float NdLb = max(dot(N,Lb),0.);
        vec3  Hb = normalize(V+Lb);
        float Db = ggxD(max(dot(N,Hb),0.), rough+0.04);
        float Vb = ggxV(NdV, NdLb, rough+0.04);
        vec3 specB = vec3(0.17,0.58,0.76) * Db*Vb*NdLb * 2.5 * (1.+uHover);

        // Orange rim
        vec3 Lo = normalize(vec3(2.3, -1.6, -0.8));
        float NdLo = max(dot(N,Lo),0.);
        vec3  Ho = normalize(V+Lo);
        float Do = ggxD(max(dot(N,Ho),0.), rough+0.06);
        float Vo = ggxV(NdV, NdLo, rough+0.06);
        vec3 specO = vec3(0.95,0.26,0.04) * Do*Vo*NdLo * (1.8 + uHover*1.5);

        // IBL env reflection (blurred cube = rough reflection)
        vec3 metal = envSample * F + specK + specB + specO;

        // Æ sigil — etched into metal surface near face-on view
        vec2 su = vUv - 0.5;
        float faceOn = smoothstep(0.2, 0.75, NdV);
        // A shape: two diagonals + crossbar
        float lA = smoothstep(0.018,0.006, abs(su.x+su.y*0.7+0.04)); // left stroke A
        float rA = smoothstep(0.018,0.006, abs(su.x-su.y*0.7-0.04)); // right stroke A
        float cA = smoothstep(0.016,0.005, abs(su.y+0.03)) * step(0.0, su.x+0.1) * step(0.0, 0.1-su.x); // crossbar
        // E right side: three bars
        float eV  = smoothstep(0.015,0.005, abs(su.x+0.1)) * smoothstep(0.16,0.13, abs(su.y)); // vertical
        float eT  = smoothstep(0.015,0.005, abs(su.y-0.12)) * step(0.0, su.x+0.1) * step(0.0, 0.08-su.x);
        float eMid= smoothstep(0.015,0.005, abs(su.y)) * step(0.0, su.x+0.1) * step(0.0, 0.06-su.x);
        float eBot= smoothstep(0.015,0.005, abs(su.y+0.12)) * step(0.0, su.x+0.1) * step(0.0, 0.08-su.x);
        float sigil = clamp(lA+rA+cA+eV+eT+eMid+eBot, 0., 1.) * 0.45 * faceOn;
        // Sigil embossed: slightly brighter/bluer
        metal += sigil * mix(vec3(0.17,0.58,0.76), vec3(1.0,0.95,0.9), 0.4);

        // Subtle pulsing on hover
        float pulse = sin(uTime*3.5)*0.5+0.5;
        metal += uHover * 0.06 * vec3(0.95,0.26,0.04) * pulse;

        gl_FragColor = vec4(clamp(metal,0.,3.), 1.0);
      }
    `,
  });

  const geo    = new THREE.SphereGeometry(1.0, 128, 128);
  const sphere = new THREE.Mesh(geo, chromeMat);
  scene.add(sphere);

  let t = 0, hoverVal = 0;
  function tick() {
    t += 0.016;
    hoverVal += ((hovered ? 1 : 0) - hoverVal) * 0.05;
    chromeMat.uniforms.uTime.value  = t;
    chromeMat.uniforms.uHover.value = hoverVal;
    chromeMat.uniforms.uCamPos.value.copy(camera.position);
    sphere.rotation.y = t * 0.11;
    sphere.rotation.x = Math.sin(t * 0.07) * 0.12;
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════
// AVATAR 2 — MOLTEN GLASS CORE
// Fullscreen quad with ray-marched volumetric interior.
// Glass shell with Fresnel + refraction. Dense molten streams.
// ═══════════════════════════════════════════════════════════
(function MoltenGlassCore() {
  const canvas = document.getElementById('c-molten');
  const wrap   = document.getElementById('wrap-molten');
  let hovered  = false;
  wrap.addEventListener('mouseenter', () => hovered = true);
  wrap.addEventListener('mouseleave', () => hovered = false);

  const W = 250, H = 250;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(1); // Keep 1:1 — raymarch is expensive

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x060810);
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 10);
  camera.position.z = 3;

  const fragSrc = `
    precision highp float;
    uniform float uTime;
    uniform float uHover;
    uniform vec2  uRes;

    ${VALUE_NOISE_GLSL}
    ${RAY_SPHERE_GLSL}

    // Molten density — thick viscous streams
    float moltenD(vec3 p, float t) {
      // Two opposing swirl axes create thick braided streams
      float s1 = vfbm(p * 1.6 + vec3( t*0.19, t*0.13,  t*0.22));
      float s2 = vfbm(p * 2.3 + vec3(-t*0.15, t*0.27, -t*0.11));
      // Viscous layer: saturate the mixing
      float mix_val = s1 * s2;
      // Core blob — denser at center
      float core = (1.0 - smoothstep(0.0, 0.78, length(p))) * 0.55;
      return mix_val * 3.0 + core;
    }

    // Color of molten material at a sample point
    vec3 moltenCol(vec3 p, float t) {
      float hot  = vfbm(p * 2.0 + vec3(t*0.28, 0.0, t*0.18));
      float cool = vfbm(p * 2.6 - vec3(0.0, t*0.23, t*0.14));
      float blend = clamp(hot - cool * 0.4 + 0.5, 0.0, 1.0);
      float coreHeat = 1.0 - smoothstep(0.0, 0.55, length(p));

      vec3 orangeHot = mix(vec3(0.92,0.22,0.03), vec3(1.0,0.68,0.18), coreHeat);
      vec3 blueCool  = mix(vec3(0.06,0.22,0.46), vec3(0.16,0.58,0.76), cool);
      return mix(blueCool, orangeHot, blend);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - uRes*0.5) / min(uRes.x, uRes.y);
      vec3 ro  = vec3(0.0, 0.0, 3.2);
      vec3 rd  = normalize(vec3(uv * 0.64, -1.0));

      float t = uTime;
      float hB = uHover;
      vec3 bg = vec3(0.024, 0.031, 0.047);

      // Outer glass shell R=1.0
      vec2 hit = raySphere(ro, rd, 1.0);
      if(hit.x < 0.0) { gl_FragColor = vec4(bg, 1.0); return; }

      vec3 entryP = ro + rd * max(hit.x, 0.0);
      vec3 outerN = normalize(entryP);
      float cosIn = max(dot(-rd, outerN), 0.0);

      // Fresnel glass rim (blue)
      float fr = pow(1.0 - cosIn, 4.2);

      // Refract into glass (IOR 1.5)
      vec3 refRd = refract(rd, outerN, 1.0/1.5);
      if(dot(refRd,refRd) < 0.01) refRd = rd; // TIR fallback
      vec3 iRo = entryP + refRd * 0.015;

      // Interior shell back face
      vec2 iHit = raySphere(iRo, refRd, 0.97);
      float tEnd = (iHit.y > 0.0) ? iHit.y : 2.0;

      // ---- Raymarch interior ----
      const int STEPS = 28;
      float stepSz = tEnd / float(STEPS);
      float transmit = 1.0;
      vec3  acc = vec3(0.0);

      for(int i = 0; i < STEPS; i++) {
        float ts = (float(i) + 0.5) * stepSz;
        vec3  p  = iRo + refRd * ts;
        if(length(p) > 0.98) break;

        float dens = max(0.0, moltenD(p, t) * 0.48);
        vec3  col  = moltenCol(p, t) * (0.9 + dens * 1.3);

        float absorb = exp(-dens * stepSz * 3.0);
        acc     += transmit * col * dens * stepSz * 2.8 * (1.0 + hB * 0.6);
        transmit *= absorb;
        if(transmit < 0.008) break;
      }

      // Glass shell appearance
      // Back-face gives deeper blue tinge
      vec3 exitP = ro + rd * hit.y;
      vec3 backN  = -normalize(exitP);
      float backFr = pow(1.0 - max(dot(-rd, backN), 0.0), 3.5);
      vec3 rimBlue = vec3(0.16, 0.58, 0.76) * fr * (0.8 + hB*0.5);
      vec3 backBlue= vec3(0.04, 0.12, 0.32) * backFr * 0.2;

      // Specular on glass surface
      vec3 Lk = normalize(vec3(-0.7, 1.6, 1.0));
      float specK = pow(max(dot(reflect(-Lk,outerN),-rd),0.), 120.) * 0.5;
      vec3 glassSpec = vec3(0.8,0.9,1.0) * specK;

      // Composite
      vec3 col = acc + rimBlue + backBlue + glassSpec;
      col = mix(bg, col, min(1.0 - transmit + fr*0.6, 1.0));

      // ACES-ish tone map
      col = col * (2.51 * col + 0.03) / (col * (2.43 * col + 0.59) + 0.14);
      col = pow(max(col, vec3(0.0)), vec3(0.4545));

      gl_FragColor = vec4(clamp(col,0.,1.), 1.0);
    }
  `;

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0 },
      uHover: { value: 0 },
      uRes:   { value: new THREE.Vector2(W, H) },
    },
    vertexShader:   `void main(){gl_Position=vec4(position,1.);}`,
    fragmentShader: fragSrc,
  });

  const quad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat);
  scene.add(quad);

  let tick_t = 0, hoverVal = 0;
  function tick() {
    tick_t += 0.016;
    hoverVal += ((hovered ? 1 : 0) - hoverVal) * 0.05;
    mat.uniforms.uTime.value  = tick_t;
    mat.uniforms.uHover.value = hoverVal;
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════
// AVATAR 3 — LIQUID MIRROR
// Canvas 2D. Wave-equation water sim. ImageData pixel shading.
// Æ sigil floating above + reflected below.
// ═══════════════════════════════════════════════════════════
(function LiquidMirror() {
  const canvas = document.getElementById('c-mirror');
  const wrap   = document.getElementById('wrap-mirror');
  const ctx    = canvas.getContext('2d');
  const W = 250, H = 250;
  const CX = W/2, CY = H/2;
  const DISK_R = 118;

  let hovered = false, mouseX = CX, mouseY = CY;
  let lastMX = CX, lastMY = CY;

  wrap.addEventListener('mouseenter', () => hovered = true);
  wrap.addEventListener('mouseleave', () => { hovered = false; mouseX = CX; mouseY = CY; });
  wrap.addEventListener('mousemove', (e) => {
    const r = wrap.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseY = (e.clientY - r.top)  * (H / r.height);
  });

  // Wave simulation grid
  const GS = 80;
  const CELL = W / GS;
  const h0 = new Float32Array(GS * GS);
  const h1 = new Float32Array(GS * GS);
  const vel= new Float32Array(GS * GS);

  function wIdx(x, y) { return y * GS + x; }

  function disturb(wx, wy, str) {
    const gx = Math.round(wx / CELL);
    const gy = Math.round(wy / CELL);
    const rad = 4;
    for(let dy = -rad; dy <= rad; dy++)
      for(let dx = -rad; dx <= rad; dx++) {
        const nx = gx+dx, ny = gy+dy;
        if(nx>=0&&nx<GS&&ny>=0&&ny<GS) {
          const d = Math.sqrt(dx*dx+dy*dy);
          if(d <= rad) h0[wIdx(nx,ny)] = str * (1-d/rad) * 5.0;
        }
      }
  }

  function stepWave() {
    for(let y = 1; y < GS-1; y++) {
      for(let x = 1; x < GS-1; x++) {
        const lapl = h0[wIdx(x-1,y)] + h0[wIdx(x+1,y)] + h0[wIdx(x,y-1)] + h0[wIdx(x,y+1)] - 4*h0[wIdx(x,y)];
        vel[wIdx(x,y)] += lapl * 0.19;
        vel[wIdx(x,y)] *= 0.983;
      }
    }
    for(let i = 0; i < GS*GS; i++) h0[i] += vel[i];
  }

  function getH(px, py) {
    const gx = px/CELL, gy = py/CELL;
    const ix = Math.floor(gx), iy = Math.floor(gy);
    if(ix<0||ix>=GS-1||iy<0||iy>=GS-1) return 0;
    const fx = gx-ix, fy = gy-iy;
    return h0[wIdx(ix,iy)]*(1-fx)*(1-fy) + h0[wIdx(ix+1,iy)]*fx*(1-fy)
         + h0[wIdx(ix,iy+1)]*(1-fx)*fy  + h0[wIdx(ix+1,iy+1)]*fx*fy;
  }

  function getNorm(px, py) {
    const e = 3;
    return { nx: (getH(px+e,py)-getH(px-e,py))/(e*2) * (-0.09),
             ny: (getH(px,py+e)-getH(px,py-e))/(e*2) * (-0.09) };
  }

  let clock = 0, lastIdleRipple = -5;
  disturb(CX, CY, 1.8);

  // Pre-create ImageData
  const img = ctx.createImageData(W, H);
  const dat = img.data;

  function draw() {
    clock += 0.016;

    // Idle ripples
    if(!hovered && clock - lastIdleRipple > 3.2) {
      disturb(CX + (Math.random()-0.5)*40, CY + (Math.random()-0.5)*40, 0.8);
      lastIdleRipple = clock;
    }
    if(hovered) {
      const dx = mouseX-lastMX, dy = mouseY-lastMY;
      const spd = Math.sqrt(dx*dx+dy*dy);
      if(spd > 3.5) {
        disturb(mouseX, mouseY, Math.min(spd * 0.1, 1.8));
        lastMX = mouseX; lastMY = mouseY;
      }
    }

    stepWave(); stepWave(); // 2 steps per frame for stability

    // Pixel shader
    for(let py = 0; py < H; py++) {
      for(let px = 0; px < W; px++) {
        const i = (py*W+px)*4;
        const dx = px-CX, dy = py-CY;
        const dist = Math.sqrt(dx*dx+dy*dy);

        if(dist > DISK_R) { dat[i]=dat[i+1]=dat[i+2]=dat[i+3]=0; continue; }

        const n = getNorm(px, py);
        const ht = getH(px, py);

        // PBR-ish mercury shading
        // Surface normal includes wave height tilt
        const NX = n.nx, NY = n.ny, NZ = Math.sqrt(Math.max(0, 1 - NX*NX - NY*NY));

        // Mercury base — silvery blue-grey
        const base = 0.52 + ht * 0.09;

        // Key light (upper-left, warm white)
        const Lkx=-0.55, Lky=-0.7, Lkz=0.45;
        const Lkl = Math.sqrt(Lkx*Lkx+Lky*Lky+Lkz*Lkz);
        const lkn = NX*Lkx/Lkl + NY*Lky/Lkl + NZ*Lkz/Lkl;
        const diffK = Math.max(lkn, 0) * 0.18;
        // Specular from key — reflection Blinn-Phong
        const Vz = 1; // viewer from above
        const Hkz = (Lkz/Lkl + Vz) * 0.5; // simplified half-vector
        const specK = Math.pow(Math.max(0, NX*(Lkx/Lkl)*0.5 + NY*(Lky/Lkl)*0.5 + NZ*Hkz), 55) * 3.5;

        // Blue light (left)
        const blueSpec = Math.pow(Math.max(0, (-0.7*NX + 0.15*NY + 0.7*NZ)*1.2), 28) * 1.2;

        // Orange rim light (bottom-right)
        const orangeSpec = Math.pow(Math.max(0, (0.55*NX + 0.65*NY + 0.52*NZ)*1.2), 32) * 1.8;

        // Edge fade (disk rim)
        const rimFac = Math.pow(dist/DISK_R, 3.5);
        const rimVal = rimFac * 0.7;

        let r = base + diffK + specK*0.9 + orangeSpec*0.8 + rimVal*0.6;
        let g = base + diffK + specK*0.85 + blueSpec*0.15 + rimVal*0.5;
        let b = base + diffK + specK*0.75 + blueSpec*0.35 + rimVal*0.4;

        // Orange warm tint from right bottom
        r += orangeSpec * 0.5;
        g += orangeSpec * 0.15;

        // Mercury characteristic: slightly cooler blue in broad areas
        b += 0.04 + ht * 0.02;

        dat[i]   = Math.min(255, r*255);
        dat[i+1] = Math.min(255, g*255);
        dat[i+2] = Math.min(255, b*255);
        dat[i+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);

    // Circular crop (the overflow:hidden handles it but belt+suspenders)
    ctx.save();
    ctx.globalCompositeOperation = 'destination-in';
    ctx.beginPath();
    ctx.arc(CX, CY, DISK_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();

    // Æ sigil: floating above surface
    const sigilY   = CY - 8 + Math.sin(clock*1.05)*3.5;
    const sigilAlpha = 0.72 + Math.sin(clock*1.9)*0.14;

    // Distorted reflection below surface
    ctx.save();
    ctx.globalAlpha = sigilAlpha * 0.35;
    ctx.translate(CX + getNorm(CX,CY+12).nx*40, CY + 12);
    ctx.scale(1, -0.22);
    ctx.font = 'bold 38px "Georgia", serif';
    ctx.fillStyle = '#7ab0c8';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Æ', 0, 0);
    ctx.restore();

    // Actual sigil
    ctx.save();
    ctx.globalAlpha = sigilAlpha;
    ctx.translate(CX, sigilY);
    const sg = ctx.createLinearGradient(-22,-22,22,22);
    sg.addColorStop(0, '#55a8cc');
    sg.addColorStop(0.45, '#ddeeff');
    sg.addColorStop(1, '#f1420b');
    ctx.fillStyle = sg;
    ctx.shadowColor = 'rgba(42,147,193,0.7)';
    ctx.shadowBlur  = 10;
    ctx.font = 'bold 38px "Georgia", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Æ', 0, 0);
    ctx.restore();

    // Rim glow ring
    ctx.save();
    const rimGrad = ctx.createRadialGradient(CX,CY,DISK_R-8, CX,CY,DISK_R+4);
    rimGrad.addColorStop(0, 'rgba(42,147,193,0.0)');
    rimGrad.addColorStop(0.5, 'rgba(42,147,193,0.3)');
    rimGrad.addColorStop(1, 'rgba(42,147,193,0.0)');
    ctx.beginPath();
    ctx.arc(CX,CY,DISK_R,0,Math.PI*2);
    ctx.strokeStyle = rimGrad;
    ctx.lineWidth = 10;
    ctx.stroke();
    ctx.restore();

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════
// AVATAR 4 — GLASS EMBER
// Fullscreen quad shader. Dark glass orb with volumetric ember.
// God rays (volumetric scattering). Fresnel blue rim.
// ═══════════════════════════════════════════════════════════
(function GlassEmber() {
  const canvas = document.getElementById('c-ember');
  const wrap   = document.getElementById('wrap-ember');
  let hovered  = false;
  wrap.addEventListener('mouseenter', () => hovered = true);
  wrap.addEventListener('mouseleave', () => hovered = false);

  const W = 250, H = 250;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(1); // raymarch cost

  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x030406);
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 10);
  camera.position.z = 3;

  const fragSrc = `
    precision highp float;
    uniform float uTime;
    uniform float uHover;
    uniform vec2  uRes;

    ${VALUE_NOISE_GLSL}
    ${RAY_SPHERE_GLSL}

    // Ember glow field — small hot coal SDF + glow falloff
    float emberGlow(vec3 p, float t) {
      // Blobby ember shape
      float blob = vnoise(p * 5.0 + vec3(t*0.35, t*0.22, 0.0)) * 0.06;
      float sdf  = length(p) - (0.21 + blob);
      // Volumetric glow with falloff
      float pulse = 0.55 + 0.45 * sin(t * 1.75 + sin(t*0.65)*2.1);
      return exp(-max(sdf, 0.0) * 9.0) * pulse;
    }

    // Color of the ember at sample position
    vec3 emberColor(vec3 p, float t) {
      float d = length(p);
      // White-hot core → deep orange → dark red edge
      float c0 = smoothstep(0.21, 0.0, d);   // white core
      float c1 = smoothstep(0.36, 0.05, d);  // orange
      float c2 = smoothstep(0.70, 0.0, d);   // red outer
      vec3 whitehot = vec3(1.0, 0.9, 0.75);
      vec3 orange   = vec3(1.0, 0.38, 0.04);
      vec3 deepred  = vec3(0.55, 0.04, 0.01);
      return mix(mix(deepred, orange, c2), mix(orange, whitehot, c1), c0);
    }

    // Volumetric god-ray contribution along a ray step
    float godRayScatter(vec3 p, float t, float hB) {
      // Thin fog medium inside glass that scatters ember light
      float scatterFog = vfbm(p * 1.8 + vec3(t*0.08)) * 0.12;
      scatterFog *= (1.0 - smoothstep(0.0, 0.96, length(p)));
      // Ember drives the scattering brightness
      float glow = emberGlow(p, t) * (1.0 + hB * 1.6);
      return glow * scatterFog;
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - uRes*0.5) / min(uRes.x, uRes.y);
      vec3 ro  = vec3(0.0, 0.0, 3.5);
      vec3 rd  = normalize(vec3(uv * 0.62, -1.0));
      float t  = uTime;
      float hB = uHover;

      vec3 bg = vec3(0.012, 0.016, 0.024);

      // Glass shell R=1.0
      vec2 hit = raySphere(ro, rd, 1.0);
      if(hit.x < 0.0) { gl_FragColor = vec4(bg, 1.0); return; }

      vec3 entryP = ro + rd * max(hit.x, 0.0);
      vec3 outerN = normalize(entryP);
      float cosIn = max(dot(-rd, outerN), 0.0);

      // Fresnel — clear dark glass (F0 ~0.04)
      float fr = pow(1.0 - cosIn, 5.0);

      // Refract into glass (dark glass, IOR 1.48)
      vec3 refRd = refract(rd, outerN, 1.0/1.48);
      if(dot(refRd,refRd) < 0.01) refRd = rd;
      vec3 iRo = entryP + refRd * 0.012;

      // Interior bounds
      vec2 iHit = raySphere(iRo, refRd, 0.975);
      float tEnd = max(iHit.y, 0.001);

      // ---- Raymarch interior ----
      const int STEPS = 36;
      float stepSz = tEnd / float(STEPS);
      float transmit = 1.0;
      vec3  acc = vec3(0.0);

      for(int i = 0; i < STEPS; i++) {
        float ts = (float(i) + 0.5) * stepSz;
        vec3  p  = iRo + refRd * ts;
        if(length(p) >= 0.98) break;

        float glow = emberGlow(p, t);
        float boostGlow = glow * (1.0 + hB * 2.0);

        // Ember light contribution
        vec3 eCol = emberColor(p, t);
        float glowDens = boostGlow * 0.9;

        // Volumetric god-rays
        float scatter = godRayScatter(p, t, hB);
        vec3  rayCol  = mix(vec3(0.7,0.12,0.01), vec3(1.0,0.48,0.08), hB) * scatter * 12.0;

        // Glass medium — very slightly absorbing (smoky dark glass)
        float mediumAbsorb = 0.035;
        float mediumScatter= 0.008;

        acc     += transmit * (eCol * glowDens * stepSz * 2.4 + rayCol * stepSz);
        transmit *= exp(-(mediumAbsorb + mediumScatter + glowDens * 0.5) * stepSz);
        if(transmit < 0.004) break;
      }

      // Glass shell Fresnel rim — blue, subtle
      float rimPulse = 0.5 + 0.5 * sin(t * 2.0);
      vec3 rimBlue = vec3(0.14, 0.52, 0.76) * fr * (0.55 + hB*0.55 + rimPulse*0.1);

      // Back-face refraction depth tint
      vec3 exitP  = ro + rd * hit.y;
      vec3 backN   = -normalize(exitP);
      float backFr = pow(1.0 - max(dot(-rd, backN), 0.0), 3.5);
      vec3 backTint= vec3(0.02, 0.06, 0.14) * backFr * 0.3;

      // Specular highlight on glass surface (single key light upper-left)
      vec3 Lk = normalize(vec3(-0.6, 1.8, 1.2));
      float NdL = max(dot(outerN, Lk), 0.0);
      vec3  Hk  = normalize(-rd + Lk);
      float specK = pow(max(dot(outerN, Hk), 0.0), 160.0) * 0.45 * NdL;
      vec3 glassSpec = vec3(0.6, 0.75, 1.0) * specK;

      // Composite
      vec3 col = bg;
      // Interior glow bleeds through glass
      col = mix(col, bg + acc, min(1.0 - transmit + fr*0.2, 1.0));
      col += rimBlue + backTint + glassSpec;

      // Flare on hover — ember brightens visibly
      col += hB * vec3(0.95,0.2,0.02) * 0.04 * (0.5 + 0.5*sin(t*4.0));

      // ACES tone map
      col = col * (2.51*col + 0.03) / (col*(2.43*col+0.59)+0.14);
      col = pow(max(col, vec3(0.0)), vec3(0.4545));

      gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
    }
  `;

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0 },
      uHover: { value: 0 },
      uRes:   { value: new THREE.Vector2(W, H) },
    },
    vertexShader:   `void main(){gl_Position=vec4(position,1.);}`,
    fragmentShader: fragSrc,
  });

  const quad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat);
  scene.add(quad);

  let tick_t = 0, hoverVal = 0;
  function tick() {
    tick_t += 0.016;
    hoverVal += ((hovered ? 1 : 0) - hoverVal) * 0.065;
    mat.uniforms.uTime.value  = tick_t;
    mat.uniforms.uHover.value = hoverVal;
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
