name = "purebrain-creator"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# ── D1 Database ──────────────────────────────────────────────
# Run: wrangler d1 create creator-db
# Then replace database_id with the ID from that command's output.
[[d1_databases]]
binding = "CREATOR_DB"
database_name = "purebrain-creator"
database_id = "54e38626-8905-4aff-8905-2060532a7339"

# ── Environment variables ────────────────────────────────────
# ANTHROPIC_API_KEY must be a secret:
#   wrangler pages secret put ANTHROPIC_API_KEY
[vars]
JWT_SECRET = "a858ccdd23babc7e27a2312add9dd162"

# ── Setup instructions ───────────────────────────────────────
# Step 1 — Create D1 database:
#   wrangler d1 create creator-db
#   (copy the database_id from output, paste above)
#
# Step 2 — Apply schema:
#   wrangler d1 execute creator-db \
#     --file=../../departments/systems-technology/creator-ai-sprint/schema.sql \
#     --remote
#
# Step 3 — Set secrets (CF Pages dashboard or CLI):
#   wrangler pages secret put ANTHROPIC_API_KEY
#   wrangler pages secret put JWT_SECRET
#   wrangler pages secret put ELEVENLABS_API_KEY
#
# Step 4 — Deploy to purebrain-staging first:
#   CLOUDFLARE_API_TOKEN=$(grep CF_PAGES_TOKEN /home/jared/projects/AI-CIV/aether/.env | cut -d= -f2) \
#   npx wrangler pages deploy exports/cf-pages-deploy/creator \
#     --project-name purebrain-creator-ai \
#     --commit-dirty=true
#
# Step 5 — Add custom domain in CF Pages dashboard:
#   creator.purebrain.ai → CNAME → purebrain-creator-ai.pages.dev
