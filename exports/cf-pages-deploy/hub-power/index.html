<!-- UNIVERSAL REFERRAL CODE CAPTURE — 90-day cookie + localStorage -->
<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

<!-- Password Gate -->
<div id="pw-gate">
  <div class="logo">
    <span class="blue">PUREBR</span><span class="orange">AI</span><span class="blue">N</span><span style="color:#fff">.AI</span>
  </div>
  <h2>Protected Content</h2>
  <p>Enter password to continue</p>
  <input type="password" id="pw-input" placeholder="Password" autofocus
    onkeydown="if(event.key==='Enter')checkPw()">
  <div class="hint" id="pw-hint">Incorrect password</div>
</div>

<!-- Real content (hidden until password correct) -->
<div id="real-content"></div>

<script>
var PW_HASH = "b2cde55436f25873ab7377c510c5464b3bcd687a70ac9aba4cdc9f24df33b821";

async function sha256(str) {
  var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
}

async function checkPw() {
  var input = document.getElementById("pw-input");
  var hash = await sha256(input.value);
  if (hash === PW_HASH) {
    document.getElementById("pw-gate").style.display = "none";
    var rc = document.getElementById("real-content");
    rc.style.display = "block";
    // Load the iframe with the actual content
    var iframe = document.createElement("iframe");
    iframe.src = "content.html";
    iframe.style.cssText = "width:100vw;height:100vh;border:none;position:fixed;top:0;left:0;z-index:1;";
    rc.appendChild(iframe);
  } else {
    input.classList.add("error");
    document.getElementById("pw-hint").classList.add("show");
    setTimeout(function() {
      input.classList.remove("error");
    }, 300);
  }
}
</script>
