<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology — Living Breath</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  /* Vignette overlay */
  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(0,0,0,0.35) 70%,
      rgba(0,0,0,0.75) 100%
    );
  }
  /* Subtle wordmark */
  #wordmark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="vignette"></div>
<div id="wordmark">Pure Technology</div>

<!-- Three.js r160 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>

<!-- Postprocessing addons via importmap-style CDN -->
<script type="module">
import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/OutputPass.js';
import { ShaderPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/ShaderPass.js';

// ─────────────────────────────────────────────
// LOGO CONSTANTS — exact spec
// ─────────────────────────────────────────────
const NUM_HEXAGONS    = 3;
const STROKES_PER_HEX = 33;
const HEX_ROTATION_OFFSET = (9 * Math.PI) / 180;   // 9° between hexagons
const TWIST_PER_RING  = (7  * Math.PI) / 180;        // 7° twist per ring
const SHRINK_RATE     = 0.93;                          // 7% shrink per ring
const OUTER_RADIUS    = 2.6;                           // world units, outermost ring
const VOID_RADIUS     = 0.18;                          // centre void fraction
const STROKE_WIDTH    = 0.012;                         // tube radius for line geometry

// Color spec
const COLOR_OUTER  = new THREE.Color('#2d86c1');       // blue
const COLOR_MID    = new THREE.Color('#8a9ba8');        // muted grey transition
const COLOR_INNER  = new THREE.Color('#f1420b');        // orange-red

// Brand accent for emissive glow shift
const COLOR_OUTER_GLOW  = new THREE.Color('#40c8ff');   // slightly more cyan
const COLOR_INNER_GLOW  = new THREE.Color('#ffb020');   // slightly more gold

// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = window.innerWidth;
const H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// Camera — front-facing, fixed, no orbit
const camera = new THREE.PerspectiveCamera(42, W / H, 0.01, 50);
camera.position.set(0, 0, 7);
camera.lookAt(0, 0, 0);

// ─────────────────────────────────────────────
// POSTPROCESSING
// ─────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(W, H),
  0.55,    // strength — will pulse in animate()
  0.38,    // radius
  0.80     // threshold
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

/** Build a flat, closed hexagon ring (line loop) of given radius, at given rotation.
 *  Returns a THREE.BufferGeometry with positions only. */
function hexRingGeometry(radius, rotation, segments = 6) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2 + rotation;
    pts.push(radius * Math.cos(angle), radius * Math.sin(angle), 0);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  return geo;
}

/** Lerp between three colour stops based on t ∈ [0,1] */
function tricolorLerp(t, cOuter, cMid, cInner) {
  const c = new THREE.Color();
  if (t < 0.45) {
    // outer → mid zone
    const f = t / 0.45;
    c.copy(cOuter).lerp(cMid, f);
  } else if (t < 0.62) {
    // muted grey plateau
    c.copy(cMid);
  } else {
    // mid → inner
    const f = (t - 0.62) / 0.38;
    c.copy(cMid).lerp(cInner, f);
  }
  return c;
}

// ─────────────────────────────────────────────
// BUILD LOGO GEOMETRY
// ─────────────────────────────────────────────
//
// We store per-stroke data for animation:
//   strokeData[hexIdx][ringIdx] = { line, baseRadius, baseRotation, phaseScale, phaseRot, color }
//
const strokeData = [];
const logoGroup  = new THREE.Group();
scene.add(logoGroup);

for (let h = 0; h < NUM_HEXAGONS; h++) {
  const hexBaseRotation = h * HEX_ROTATION_OFFSET;
  strokeData[h] = [];

  for (let r = 0; r < STROKES_PER_HEX; r++) {
    // t = 0 → outermost ring, t = 1 → innermost ring
    const t = r / (STROKES_PER_HEX - 1);

    // Radius shrinks inward; skip if below void threshold
    const baseRadius = OUTER_RADIUS * Math.pow(SHRINK_RATE, r);
    if (baseRadius < OUTER_RADIUS * VOID_RADIUS) break;

    // Twist accumulates
    const baseRotation = hexBaseRotation + r * TWIST_PER_RING;

    // Color interpolation
    const baseColor   = tricolorLerp(t, COLOR_OUTER,      COLOR_MID, COLOR_INNER);
    const glowColor   = tricolorLerp(t, COLOR_OUTER_GLOW, COLOR_MID, COLOR_INNER_GLOW);

    // Per-stroke animation phase offsets (pseudo-random but deterministic)
    const phaseScale = (h * 11.7 + r * 2.39) % (Math.PI * 2);
    const phaseRot   = (h * 7.3  + r * 1.61) % (Math.PI * 2);
    const phaseColor = (h * 5.1  + r * 3.07) % (Math.PI * 2);

    // Build line
    const geo  = hexRingGeometry(baseRadius, baseRotation);
    const mat  = new THREE.LineBasicMaterial({
      color: baseColor.clone(),
      transparent: true,
      opacity: 1.0,
      linewidth: 1,
    });
    const line = new THREE.LineLoop(geo, mat);
    logoGroup.add(line);

    strokeData[h].push({
      line,
      geo,
      baseRadius,
      baseRotation,
      baseColor:  baseColor.clone(),
      glowColor:  glowColor.clone(),
      phaseScale,
      phaseRot,
      phaseColor,
      t,
    });
  }
}

// ─────────────────────────────────────────────
// CENTER VOID — pulsing point light
// ─────────────────────────────────────────────
const voidLight = new THREE.PointLight(0xffffff, 2.5, 6.0, 2);
voidLight.position.set(0, 0, 0.1);
scene.add(voidLight);

// Soft ambient
const ambientLight = new THREE.AmbientLight(0x1a2a40, 0.6);
scene.add(ambientLight);

// ─────────────────────────────────────────────
// PARTICLE MIST — floating dust motes
// ─────────────────────────────────────────────
const PARTICLE_COUNT = 280;
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleVelocities = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const angle  = Math.random() * Math.PI * 2;
  const radius = 1.0 + Math.random() * 3.2;
  particlePositions[i * 3]     = Math.cos(angle) * radius;
  particlePositions[i * 3 + 1] = Math.sin(angle) * radius;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 0.8;
  particleVelocities.push({
    vx: (Math.random() - 0.5) * 0.0004,
    vy: (Math.random() - 0.5) * 0.0004,
    phase: Math.random() * Math.PI * 2,
  });
}
const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x4aa8d8,
  size: 0.022,
  transparent: true,
  opacity: 0.28,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─────────────────────────────────────────────
// RESIZE HANDLER
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
});

// ─────────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────────
let lastTime = 0;

function animate(timestamp) {
  requestAnimationFrame(animate);
  const t = timestamp * 0.001; // seconds
  const dt = Math.min(t - lastTime, 0.05);
  lastTime = t;

  // ── Master breath cycle ──────────────────
  // Primary: 4.2s period — the main inhale/exhale
  const breathPrimary  = Math.sin(t * (Math.PI * 2) / 4.2);  // -1 → +1
  // Inhale = positive, exhale = negative
  const inhaleAmount   = (breathPrimary + 1) * 0.5;           // 0 → 1

  // ── Per-stroke updates ───────────────────
  for (let h = 0; h < NUM_HEXAGONS; h++) {
    const strokes = strokeData[h];
    for (let r = 0; r < strokes.length; r++) {
      const sd = strokes[r];

      // Scale pulse: ±3% radius, 3–5s period depending on ring
      const scalePeriod = 3.4 + sd.t * 1.6;  // outer rings slower, inner faster
      const scaleSine   = Math.sin(t * (Math.PI * 2) / scalePeriod + sd.phaseScale);
      const scaledRadius = sd.baseRadius * (1 + scaleSine * 0.03);

      // Rotation oscillation: ±0.5° per stroke
      const rotSine    = Math.sin(t * (Math.PI * 2) / 3.8 + sd.phaseRot);
      const rotated    = sd.baseRotation + rotSine * (0.5 * Math.PI / 180);

      // Rebuild hexagon positions in-place
      const pos = sd.geo.attributes.position.array;
      const segments = 6;
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2 + rotated;
        pos[i * 3]     = scaledRadius * Math.cos(angle);
        pos[i * 3 + 1] = scaledRadius * Math.sin(angle);
        pos[i * 3 + 2] = 0;
      }
      sd.geo.attributes.position.needsUpdate = true;

      // Color animation: shift toward glow on inhale
      const colorShift = Math.sin(t * (Math.PI * 2) / 6.0 + sd.phaseColor);
      const colorBlend = (colorShift + 1) * 0.5 * 0.35; // max 35% shift toward glow
      const liveColor  = sd.baseColor.clone().lerp(sd.glowColor, colorBlend + inhaleAmount * 0.12);
      sd.line.material.color.copy(liveColor);

      // Opacity: outer strokes breathe slightly more than inner
      const opacityBase = 0.55 + sd.t * 0.45;  // inner rings slightly brighter
      const opacityPulse = Math.sin(t * (Math.PI * 2) / 4.2 + sd.phaseScale * 0.3) * 0.12;
      sd.line.material.opacity = Math.max(0.3, Math.min(1.0, opacityBase + opacityPulse));
    }
  }

  // ── Center void light ────────────────────
  // Brightens on inhale (inhaleAmount near 1), dims on exhale
  voidLight.intensity = 1.2 + inhaleAmount * 2.8;
  const voidHue = 0.2 + inhaleAmount * 0.06;  // shift warm→cool on inhale
  voidLight.color.setHSL(voidHue, 0.7, 0.7);

  // ── Bloom pulse with breath ───────────────
  bloomPass.strength = 0.40 + inhaleAmount * 0.32;

  // ── Very subtle logo group scale (global breath) ─
  const globalScale = 1.0 + breathPrimary * 0.008;  // ±0.8%
  logoGroup.scale.setScalar(globalScale);

  // ── Particle drift ───────────────────────
  const pPos = particleGeo.attributes.position.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const v = particleVelocities[i];
    pPos[i * 3]     += v.vx + Math.sin(t * 0.23 + v.phase) * 0.0002;
    pPos[i * 3 + 1] += v.vy + Math.cos(t * 0.19 + v.phase) * 0.0002;

    // Wrap particles if they drift too far
    const px = pPos[i * 3], py = pPos[i * 3 + 1];
    const dist = Math.sqrt(px * px + py * py);
    if (dist > 4.8) {
      const angle  = Math.random() * Math.PI * 2;
      const radius = 1.0 + Math.random() * 1.5;
      pPos[i * 3]     = Math.cos(angle) * radius;
      pPos[i * 3 + 1] = Math.sin(angle) * radius;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Particle opacity breathes with the logo
  particleMat.opacity = 0.18 + inhaleAmount * 0.16;

  composer.render();
}

requestAnimationFrame(animate);
</script>
</body>
</html>
