<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology Logo — 3 Hexagonal Spirals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #ccc;
  }

  .layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    padding: 40px;
  }

  .canvas-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  canvas {
    border: 1px solid #111;
    display: block;
  }

  .label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Controls panel */
  .controls {
    width: 300px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    padding: 24px;
    border-radius: 4px;
  }

  .controls h2 {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #2B93C1;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1a1a1a;
  }

  .ctrl-group {
    margin-bottom: 20px;
  }

  .ctrl-group label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #666;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .ctrl-group label span {
    color: #F1420B;
    font-weight: bold;
    min-width: 40px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: #1a1a1a;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #2B93C1;
    cursor: pointer;
  }

  .divider {
    border: none;
    border-top: 1px solid #1a1a1a;
    margin: 20px 0;
  }

  .note {
    font-size: 10px;
    color: #333;
    line-height: 1.6;
    margin-top: 20px;
  }

  .note strong {
    color: #444;
  }

  .size-btns {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .size-btn {
    flex: 1;
    padding: 8px;
    background: #111;
    border: 1px solid #222;
    color: #555;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .size-btn:hover, .size-btn.active {
    background: #1a1a1a;
    border-color: #2B93C1;
    color: #2B93C1;
  }

  .export-btn {
    width: 100%;
    padding: 10px;
    background: #0d1f2d;
    border: 1px solid #2B93C1;
    color: #2B93C1;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .export-btn:hover {
    background: #2B93C1;
    color: #000;
  }
</style>
</head>
<body>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="logo" width="500" height="500"></canvas>
    <div class="label">Pure Technology — Logo Recreation</div>
  </div>

  <div class="controls">
    <h2>Spiral Controls</h2>

    <div class="ctrl-group">
      <label>Rotation Offset (hex 2 & 3) <span id="val-rot">7</span>°</label>
      <input type="range" id="sl-rot" min="0" max="25" step="0.5" value="7">
    </div>

    <div class="ctrl-group">
      <label>Spiral Loops <span id="val-loops">7</span></label>
      <input type="range" id="sl-loops" min="2" max="14" step="0.5" value="7">
    </div>

    <div class="ctrl-group">
      <label>Line Thickness <span id="val-thick">1.4</span>px</label>
      <input type="range" id="sl-thick" min="0.5" max="4" step="0.1" value="1.4">
    </div>

    <div class="ctrl-group">
      <label>Void Radius <span id="val-void">12</span>%</label>
      <input type="range" id="sl-void" min="2" max="30" step="1" value="12">
    </div>

    <div class="ctrl-group">
      <label>Spiral Twist <span id="val-twist">30</span>°/loop</label>
      <input type="range" id="sl-twist" min="0" max="60" step="1" value="30">
    </div>

    <div class="ctrl-group">
      <label>Outer Size <span id="val-size">85</span>%</label>
      <input type="range" id="sl-size" min="50" max="95" step="1" value="85">
    </div>

    <div class="ctrl-group">
      <label>Opacity (each layer) <span id="val-opacity">0.9</span></label>
      <input type="range" id="sl-opacity" min="0.3" max="1.0" step="0.05" value="0.9">
    </div>

    <div class="ctrl-group">
      <label>Gradient Color Mix <span id="val-mix">50</span>%</label>
      <input type="range" id="sl-mix" min="10" max="90" step="5" value="50">
    </div>

    <hr class="divider">

    <div class="size-btns">
      <button class="size-btn active" onclick="setSize(500)">500px</button>
      <button class="size-btn" onclick="setSize(800)">800px</button>
      <button class="size-btn" onclick="setSize(1200)">1200px</button>
    </div>

    <button class="export-btn" onclick="exportPNG()">Export PNG</button>

    <div class="note">
      <strong>Structure:</strong> 3 identical hexagonal spirals.<br>
      Hex 1: no rotation. Hex 2: +offset. Hex 3: -offset.<br>
      Each spiral = single continuous line following hex path inward.<br><br>
      <strong>Gradient:</strong> Blue (#2B93C1) outer → Orange (#F1420B) inner.
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('logo');
const ctx = canvas.getContext('2d');

// State
const state = {
  rotOffset: 7,    // degrees offset for hex 2 and 3
  loops: 7,        // number of spiral loops
  lineThick: 1.4,  // line width
  voidRadius: 12,  // percent of canvas radius
  twistDeg: 30,    // additional twist per loop (degrees)
  outerSize: 85,   // percent of canvas
  opacity: 0.9,    // per-layer opacity
  gradMix: 50,     // color crossover point (%)
  canvasSize: 500
};

// Colors
const BLUE   = { r: 43,  g: 147, b: 193 };  // #2B93C1
const ORANGE = { r: 241, g: 66,  b: 11  };  // #F1420B

function lerpColor(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t)
  };
}

function toRgba(c, alpha) {
  return `rgba(${c.r},${c.g},${c.b},${alpha})`;
}

// Get the 6 vertices of a regular hexagon
// radius = outer radius, rotDeg = rotation of whole hex
function hexVerts(cx, cy, radius, rotDeg) {
  const verts = [];
  for (let i = 0; i < 6; i++) {
    // Start flat-top: 0° = right vertex
    // We want pointy-top style to match logo: offset by 30°
    const angle = (rotDeg + i * 60) * Math.PI / 180;
    verts.push({
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    });
  }
  return verts;
}

// Interpolate along the perimeter of a hexagon
// t = 0..1 around the full perimeter
function hexPerimPoint(verts, t) {
  const perSide = 1 / 6;
  const seg = Math.floor(t / perSide);
  const segT = (t - seg * perSide) / perSide;
  const i0 = seg % 6;
  const i1 = (seg + 1) % 6;
  return {
    x: verts[i0].x + (verts[i1].x - verts[i0].x) * segT,
    y: verts[i0].y + (verts[i1].y - verts[i0].y) * segT
  };
}

// Draw a single hexagonal spiral
// cx,cy = center, outerR = outer radius, innerR = inner (void) radius
// baseRotDeg = base rotation of hex orientation (flat-top offset)
// loops = number of full loops
// twistPerLoop = extra rotation per loop in degrees
// lineWidth = stroke width
// opacity = alpha
// gradMixPct = 0-100, where the color midpoint is
function drawHexSpiral(cx, cy, outerR, innerR, baseRotDeg, loops, twistPerLoop, lineWidth, opacity, gradMixPct) {
  const STEPS = Math.round(loops * 120); // subdivisions per loop — higher = smoother

  ctx.beginPath();

  for (let step = 0; step <= STEPS; step++) {
    const frac = step / STEPS;  // 0 (start, outer) to 1 (end, inner)

    // Radius: shrinks from outerR to innerR
    const r = outerR - (outerR - innerR) * frac;

    // Angle around perimeter: frac * loops full rotations
    // t = position around hex perimeter [0..1)
    // Plus base rotation
    const totalRotations = loops;
    const t = (frac * totalRotations) % 1.0;

    // The hex itself rotates as we spiral inward (the twist effect)
    // baseRotDeg: initial orientation
    // twistPerLoop * frac * loops: cumulative twist as we go inward
    const hexRotDeg = baseRotDeg - 90 + twistPerLoop * frac * loops;

    const verts = hexVerts(cx, cy, r, hexRotDeg);
    const pt = hexPerimPoint(verts, t);

    // Color based on position (frac = 0 is outer/blue, 1 is inner/orange)
    // gradMixPct controls the crossover — higher pushes orange further in
    const mixT = Math.min(1, Math.max(0, (frac - (gradMixPct / 100 - 0.5)) / (gradMixPct / 100)));
    const color = lerpColor(BLUE, ORANGE, Math.pow(frac, 0.8));
    const rgba = toRgba(color, opacity);

    if (step === 0) {
      ctx.moveTo(pt.x, pt.y);
    } else {
      ctx.lineTo(pt.x, pt.y);
    }
  }

  // Stroke with gradient — we need a different approach for per-segment coloring
  // Use the path for clipping, but draw segmented
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // Fallback uniform stroke (we'll improve with segments below)
  ctx.strokeStyle = `rgba(100,100,100,0.1)`;
  ctx.stroke();
}

// Better: draw segment-by-segment with per-segment color
function drawHexSpiralSegmented(cx, cy, outerR, innerR, baseRotDeg, loops, twistPerLoop, lineWidth, opacity) {
  const STEPS = Math.round(loops * 120);

  // Precompute all points and colors
  const points = [];
  for (let step = 0; step <= STEPS; step++) {
    const frac = step / STEPS;
    const r = outerR - (outerR - innerR) * frac;
    const t = (frac * loops) % 1.0;
    const hexRotDeg = baseRotDeg - 90 + twistPerLoop * frac * loops;
    const verts = hexVerts(cx, cy, r, hexRotDeg);
    const pt = hexPerimPoint(verts, t);

    // Color: blue at 0 (outer) → orange at 1 (inner)
    const color = lerpColor(BLUE, ORANGE, Math.pow(frac, 0.75));

    points.push({ x: pt.x, y: pt.y, color, alpha: opacity });
  }

  // Draw segment by segment
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i];
    const p1 = points[i + 1];

    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.strokeStyle = toRgba(p0.color, p0.alpha);
    ctx.stroke();
  }
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const outerR = (W / 2) * (state.outerSize / 100);
  const innerR = (W / 2) * (state.voidRadius / 100);

  // Clear to black
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  const loops = state.loops;
  const twist = state.twistDeg;
  const lw = state.lineThick;
  const opa = state.opacity;
  const offset = state.rotOffset;

  // The base rotation: pointy-top = 90° offset for standard hex
  // Flat-top = 0°. For this logo, pointy-top looks right.
  const baseRot = 90;  // degrees — pointy-top orientation

  // Draw 3 spirals — one centered, one offset right, one offset left
  // Order matters for layering. Draw center last so it's on top.

  // Spiral 3: rotated left (-offset)
  drawHexSpiralSegmented(cx, cy, outerR, innerR, baseRot - offset, loops, twist, lw, opa);

  // Spiral 2: rotated right (+offset)
  drawHexSpiralSegmented(cx, cy, outerR, innerR, baseRot + offset, loops, twist, lw, opa);

  // Spiral 1: center (no rotation offset)
  drawHexSpiralSegmented(cx, cy, outerR, innerR, baseRot, loops, twist, lw, opa);

  // Center void — solid black circle to hide the tightly packed inner spirals
  const voidPx = innerR * 0.9;
  ctx.beginPath();
  ctx.arc(cx, cy, voidPx, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
}

// Slider bindings
function bindSlider(id, valId, stateKey, decimals) {
  const sl = document.getElementById(id);
  const vd = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    state[stateKey] = v;
    vd.textContent = decimals > 0 ? v.toFixed(decimals) : v;
    draw();
  });
}

bindSlider('sl-rot',     'val-rot',     'rotOffset',  0);
bindSlider('sl-loops',   'val-loops',   'loops',      1);
bindSlider('sl-thick',   'val-thick',   'lineThick',  1);
bindSlider('sl-void',    'val-void',    'voidRadius', 0);
bindSlider('sl-twist',   'val-twist',   'twistDeg',   0);
bindSlider('sl-size',    'val-size',    'outerSize',  0);
bindSlider('sl-opacity', 'val-opacity', 'opacity',    2);
bindSlider('sl-mix',     'val-mix',     'gradMix',    0);

// Canvas size buttons
function setSize(px) {
  canvas.width = px;
  canvas.height = px;
  state.canvasSize = px;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  draw();
}

// Export PNG
function exportPNG() {
  const link = document.createElement('a');
  link.download = 'pure-technology-logo-spiral.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Initial draw
draw();
</script>
</body>
</html>
