<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology Logo — Assembly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="500" height="500"></canvas>
<script>
// Pure Technology Logo — Assembly Animation
// Rings fly in from off-canvas one by one (outer first, inner last),
// each rotating into its exact final position.
// After ~4 seconds the EXACT static logo renders and stays permanently.
//
// Ring data measured from reference PNG (2100x2100) via pixel analysis.
// Radii in 500px canvas units. Colors from pixel sampling. Line widths calibrated.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 500, H = 500, CX = 250, CY = 250;

const RINGS = [
  {r:27.4,  rot:5,  color:"#F1420B", lw:6.5},
  {r:78.6,  rot:28, color:"#E64614", lw:2.2},
  {r:83.8,  rot:0,  color:"#E34717", lw:2.2},
  {r:89.3,  rot:2,  color:"#DE491B", lw:2.2},
  {r:95.5,  rot:10, color:"#D94B20", lw:2.0},
  {r:101.2, rot:14, color:"#D24E27", lw:2.0},
  {r:107.4, rot:0,  color:"#CB512D", lw:2.2},
  {r:114.3, rot:5,  color:"#C05537", lw:2.5},
  {r:121.9, rot:12, color:"#B55A42", lw:2.8},
  {r:128.8, rot:1,  color:"#AA5E4C", lw:3.0},
  {r:137.4, rot:1,  color:"#95675E", lw:3.5},
  {r:146.2, rot:6,  color:"#7F7072", lw:4.0},
  {r:155.5, rot:1,  color:"#657B8B", lw:4.5},
  {r:165.5, rot:6,  color:"#4C85A1", lw:3.5},
  {r:176.0, rot:9,  color:"#398DB3", lw:3.0},
  {r:186.9, rot:2,  color:"#2C92BF", lw:2.5},
  {r:198.8, rot:5,  color:"#2B93C1", lw:1.8}
];

// Easing
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  const p = 0.4, s = p / (2 * Math.PI) * Math.asin(1);
  return Math.pow(2, -10 * t) * Math.sin((t - s) * (2 * Math.PI) / p) + 1;
}
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// Draw one hexagon ring
function drawHex(cx, cy, r, rotDeg, color, alpha, lw) {
  if (alpha <= 0 || r <= 0) return;
  const rot = rotDeg * Math.PI / 180;
  ctx.save();
  ctx.globalAlpha = Math.min(1, Math.max(0, alpha));
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = rot + i * Math.PI / 3;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// Draw the exact static logo — final resting state
function drawStaticLogo() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  for (const ring of RINGS) {
    drawHex(CX, CY, ring.r, ring.rot, ring.color, 1.0, ring.lw);
  }
}

// Animation config
const TOTAL_DURATION = 4200;  // ms until all rings settled
const RING_STAGGER = 170;     // ms delay between rings starting (outer first)
const RING_FLY_DURATION = 1400; // ms each ring takes to fly in and settle

// Entry directions — distributed evenly to make visually interesting assembly
// Outer rings come from outside, inner rings from more central directions
const entryAngles = RINGS.map((_, i) => (i * 137.508) * Math.PI / 180); // golden angle

let startTime = null;
let animComplete = false;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;

  if (animComplete) {
    drawStaticLogo();
    return;
  }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  let allDone = true;

  // Draw rings innermost first (so outer rings appear on top in overlap areas)
  // But entry order: outer first (index 16 = outermost starts first)
  for (let i = 0; i < RINGS.length; i++) {
    const ring = RINGS[i];
    const orderPos = RINGS.length - 1 - i; // outer rings get orderPos=0 (start first)
    const ringStart = orderPos * RING_STAGGER;
    const ringEnd = ringStart + RING_FLY_DURATION;

    if (elapsed < ringStart) {
      allDone = false;
      continue;
    }

    const ringElapsed = elapsed - ringStart;
    const ringT = Math.min(1, ringElapsed / RING_FLY_DURATION);
    const eased = easeOutElastic(ringT);

    if (ringT < 1) allDone = false;

    // Position: from off-canvas to exact center
    const entryAngle = entryAngles[i];
    const ENTRY_DIST = 340; // px from center (off-canvas at 500px canvas)
    const startX = CX + ENTRY_DIST * Math.cos(entryAngle);
    const startY = CY + ENTRY_DIST * Math.sin(entryAngle);

    const cx = startX + (CX - startX) * eased;
    const cy = startY + (CY - startY) * eased;

    // Rotation: starts 45deg off, spins into exact position
    const startRot = ring.rot + 45 * (1 - eased);

    // Alpha: fades in during first 25% of travel
    const alpha = Math.min(1, ringT / 0.25);

    drawHex(cx, cy, ring.r, startRot, ring.color, alpha, ring.lw);
  }

  if (allDone) {
    animComplete = true;
    drawStaticLogo();
    return;
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
