<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology Logo — Breathe Then Rest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="500" height="500"></canvas>
<script>
// Pure Technology Logo — Breathe Then Rest
// The logo is already in its final form. It does ONE subtle breath —
// a slight scale pulse and gentle rotation — then settles back to the EXACT static state.
// After the breath completes, the logo stays perfectly still forever.
// The resting state is pixel-identical to the reference PNG.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 500, H = 500, CX = 250, CY = 250;

const RINGS = [
  {r:27.4,  rot:5,  color:"#F1420B", lw:6.5},
  {r:78.6,  rot:28, color:"#E64614", lw:2.2},
  {r:83.8,  rot:0,  color:"#E34717", lw:2.2},
  {r:89.3,  rot:2,  color:"#DE491B", lw:2.2},
  {r:95.5,  rot:10, color:"#D94B20", lw:2.0},
  {r:101.2, rot:14, color:"#D24E27", lw:2.0},
  {r:107.4, rot:0,  color:"#CB512D", lw:2.2},
  {r:114.3, rot:5,  color:"#C05537", lw:2.5},
  {r:121.9, rot:12, color:"#B55A42", lw:2.8},
  {r:128.8, rot:1,  color:"#AA5E4C", lw:3.0},
  {r:137.4, rot:1,  color:"#95675E", lw:3.5},
  {r:146.2, rot:6,  color:"#7F7072", lw:4.0},
  {r:155.5, rot:1,  color:"#657B8B", lw:4.5},
  {r:165.5, rot:6,  color:"#4C85A1", lw:3.5},
  {r:176.0, rot:9,  color:"#398DB3", lw:3.0},
  {r:186.9, rot:2,  color:"#2C92BF", lw:2.5},
  {r:198.8, rot:5,  color:"#2B93C1", lw:1.8}
];

// Draw the exact static logo — the final resting state, no transforms
function drawStaticLogo() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  for (const ring of RINGS) {
    const rot = ring.rot * Math.PI / 180;
    ctx.save();
    ctx.strokeStyle = ring.color;
    ctx.lineWidth = ring.lw;
    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = rot + i * Math.PI / 3;
      const x = CX + ring.r * Math.cos(angle);
      const y = CY + ring.r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

// Draw logo with global scale and rotation applied about center
// scaleMult: 1.0 = normal, >1 = expanded, <1 = contracted
// extraRotDeg: additional rotation in degrees (applied to all rings uniformly)
// fadeIn: 0-1 alpha for initial fade
function drawLogoTransformed(scaleMult, extraRotDeg, fadeIn) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalAlpha = Math.min(1, Math.max(0, fadeIn));
  ctx.translate(CX, CY);
  ctx.rotate(extraRotDeg * Math.PI / 180);
  ctx.scale(scaleMult, scaleMult);
  ctx.translate(-CX, -CY);

  for (const ring of RINGS) {
    const rot = ring.rot * Math.PI / 180;
    ctx.strokeStyle = ring.color;
    ctx.lineWidth = ring.lw / scaleMult; // keep visual line width constant
    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = rot + i * Math.PI / 3;
      const x = CX + ring.r * Math.cos(angle);
      const y = CY + ring.r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

// Easing
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }
function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

// Animation phases (all times in seconds for readability):
// 0.00 - 0.12s: Fade in from black
// 0.12 - 0.60s: Hold static (composed, present)
// 0.60 - 1.80s: ONE breath — inhale (expand + slight rotate) then exhale (return)
// 1.80 - 2.20s: Micro-oscillation dying out (it's alive, then it settles)
// 2.20s+:       Perfect static logo, held forever

const TOTAL_MS = 2600;  // ms until animation fully complete

let startTime = null;
let animComplete = false;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const t = elapsed / TOTAL_MS; // normalized 0 to 1+

  if (animComplete) {
    drawStaticLogo();
    return;
  }

  if (t < 0.046) {
    // === Fade in ===
    const fadeT = t / 0.046;
    drawLogoTransformed(1.0, 0, easeOutCubic(fadeT));

  } else if (t < 0.231) {
    // === Static hold — composed ===
    drawStaticLogo();

  } else if (t < 0.692) {
    // === ONE BREATH ===
    // inhale: t=0.231 to 0.461 (0.230 duration) — expand + gentle counter-rotate
    // exhale: t=0.461 to 0.692 (0.231 duration) — contract + return to exact position
    const breathT = (t - 0.231) / 0.461; // 0 to 1 over the full breath
    const breathCurve = Math.sin(breathT * Math.PI); // 0 -> 1 -> 0 (one breath cycle)
    const smoothBreath = easeInOutSine(breathCurve); // extra smoothing

    // Scale: expand by max 4% at peak
    const scale = 1.0 + smoothBreath * 0.04;

    // Rotation: gentle -1.0 degree at peak, returns to 0
    const extraRot = -smoothBreath * 1.0;

    drawLogoTransformed(scale, extraRot, 1.0);

  } else if (t < 0.846) {
    // === Micro-oscillation dying out ===
    // Very small residual motion as the system relaxes
    const settlT = (t - 0.692) / 0.154;
    const decay = Math.exp(-settlT * 5);
    const osc = decay * Math.sin(settlT * Math.PI * 4) * 0.008;
    drawLogoTransformed(1.0 + osc, 0, 1.0);

  } else {
    // === Permanent static ===
    drawStaticLogo();
  }

  if (t >= 1.0) {
    animComplete = true;
    drawStaticLogo();
    return;
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
