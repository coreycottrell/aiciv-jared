<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology Logo — Digital Materialize</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="500" height="500"></canvas>
<script>
// Pure Technology Logo — Digital Materialize
// Starts with digital noise/static, then the logo emerges as a scan from top to bottom.
// Glitch artifacts flash briefly. Resolves cleanly to the EXACT static logo.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 500, H = 500, CX = 250, CY = 250;

const RINGS = [
  {r:27.4,  rot:5,  color:"#F1420B", lw:6.5},
  {r:78.6,  rot:28, color:"#E64614", lw:2.2},
  {r:83.8,  rot:0,  color:"#E34717", lw:2.2},
  {r:89.3,  rot:2,  color:"#DE491B", lw:2.2},
  {r:95.5,  rot:10, color:"#D94B20", lw:2.0},
  {r:101.2, rot:14, color:"#D24E27", lw:2.0},
  {r:107.4, rot:0,  color:"#CB512D", lw:2.2},
  {r:114.3, rot:5,  color:"#C05537", lw:2.5},
  {r:121.9, rot:12, color:"#B55A42", lw:2.8},
  {r:128.8, rot:1,  color:"#AA5E4C", lw:3.0},
  {r:137.4, rot:1,  color:"#95675E", lw:3.5},
  {r:146.2, rot:6,  color:"#7F7072", lw:4.0},
  {r:155.5, rot:1,  color:"#657B8B", lw:4.5},
  {r:165.5, rot:6,  color:"#4C85A1", lw:3.5},
  {r:176.0, rot:9,  color:"#398DB3", lw:3.0},
  {r:186.9, rot:2,  color:"#2C92BF", lw:2.5},
  {r:198.8, rot:5,  color:"#2B93C1", lw:1.8}
];

// Easing
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }

// Draw one hex ring
function drawHex(cx, cy, r, rotDeg, color, alpha, lw) {
  if (alpha <= 0 || r <= 0) return;
  const rot = rotDeg * Math.PI / 180;
  ctx.save();
  ctx.globalAlpha = Math.min(1, Math.max(0, alpha));
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = rot + i * Math.PI / 3;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// Draw the exact static logo — final resting state
function drawStaticLogo() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  for (const ring of RINGS) {
    drawHex(CX, CY, ring.r, ring.rot, ring.color, 1.0, ring.lw);
  }
}

// Draw logo clipped to top revealY pixels
function drawLogoClipped(revealY) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, revealY);
  ctx.clip();
  // Draw on black background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, revealY);
  for (const ring of RINGS) {
    drawHex(CX, CY, ring.r, ring.rot, ring.color, 1.0, ring.lw);
  }
  ctx.restore();
}

// Color palette for noise (pulled from logo colors)
const PALETTE = [
  [241,66,11],[222,73,27],[192,85,55],[170,94,76],
  [149,103,94],[127,112,114],[101,123,139],[76,133,161],[43,147,193]
];

// Seeded random for consistent noise
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

// Pre-generate static noise frames (update ~12fps for flicker effect)
const NOISE_FRAMES = [];
for (let f = 0; f < 8; f++) {
  const rng = seededRand(f * 7919 + 42);
  const frame = new Uint8Array(W * H * 4);
  for (let i = 0; i < W * H; i++) {
    if (rng() < 0.35) {
      const ci = Math.floor(rng() * PALETTE.length);
      const c = PALETTE[ci];
      frame[i*4]   = c[0];
      frame[i*4+1] = c[1];
      frame[i*4+2] = c[2];
      frame[i*4+3] = Math.floor(rng() * 180 + 75);
    }
  }
  NOISE_FRAMES.push(frame);
}

// Pre-generate glitch blocks
const GLITCH_BLOCKS = [];
const grng = seededRand(12345);
for (let i = 0; i < 18; i++) {
  const ci = Math.floor(grng() * PALETTE.length);
  GLITCH_BLOCKS.push({
    x: Math.floor(grng() * 280 + 110),
    y: Math.floor(grng() * 280 + 110),
    w: Math.floor(grng() * 50 + 8),
    h: Math.floor(grng() * 3 + 1),
    color: PALETTE[ci],
    tStart: 0.60 + grng() * 0.12,
    tEnd: 0.70 + grng() * 0.10
  });
}

const TOTAL_DURATION = 4300;
let startTime = null;
let animComplete = false;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const t = Math.min(1, elapsed / TOTAL_DURATION);

  if (animComplete) {
    drawStaticLogo();
    return;
  }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (t < 0.12) {
    // === Phase 1: Pure digital static noise ===
    const noiseIntensity = easeOutCubic(t / 0.12);
    const frameIdx = Math.floor(elapsed / 80) % NOISE_FRAMES.length;
    const frame = NOISE_FRAMES[frameIdx];
    const imgData = ctx.createImageData(W, H);
    for (let i = 0; i < W * H * 4; i++) {
      imgData.data[i] = Math.floor(frame[i] * noiseIntensity);
    }
    ctx.putImageData(imgData, 0, 0);

  } else if (t < 0.62) {
    // === Phase 2: Scanline reveal top-to-bottom ===
    const scanT = (t - 0.12) / 0.50;
    const revealY = Math.floor(easeInOutCubic(scanT) * H);

    // Draw the unrevealed area with dying noise
    const noiseAlpha = (1 - easeInOutCubic(scanT)) * 0.7;
    if (noiseAlpha > 0.01 && revealY < H) {
      const frameIdx = Math.floor(elapsed / 80) % NOISE_FRAMES.length;
      const frame = NOISE_FRAMES[frameIdx];
      const imgData = ctx.createImageData(W, H - revealY);
      for (let y = 0; y < H - revealY; y++) {
        for (let x = 0; x < W; x++) {
          const src = (y * W + x) * 4; // offset in full frame
          const dst = (y * W + x) * 4;
          imgData.data[dst]   = frame[(y + revealY) * W * 4 + x * 4];
          imgData.data[dst+1] = frame[(y + revealY) * W * 4 + x * 4 + 1];
          imgData.data[dst+2] = frame[(y + revealY) * W * 4 + x * 4 + 2];
          imgData.data[dst+3] = Math.floor(frame[(y + revealY) * W * 4 + x * 4 + 3] * noiseAlpha);
        }
      }
      ctx.putImageData(imgData, 0, revealY);
    }

    // Draw the revealed logo portion
    if (revealY > 0) {
      drawLogoClipped(revealY);
    }

    // Scan line — bright edge at reveal boundary
    if (revealY > 0 && revealY < H) {
      ctx.save();
      // Bright cyan line
      ctx.globalAlpha = 0.8;
      const grad = ctx.createLinearGradient(0, revealY - 3, 0, revealY + 3);
      grad.addColorStop(0, 'rgba(43,147,193,0)');
      grad.addColorStop(0.5, 'rgba(43,147,193,0.9)');
      grad.addColorStop(1, 'rgba(241,66,11,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, revealY - 3, W, 6);
      ctx.restore();
    }

  } else if (t < 0.82) {
    // === Phase 3: Full logo with glitch artifacts ===
    drawStaticLogo();

    const glitchT = (t - 0.62) / 0.20;
    const glitchStrength = Math.sin(glitchT * Math.PI); // rise and fall

    for (const g of GLITCH_BLOCKS) {
      if (t >= g.tStart && t <= g.tEnd) {
        const gT = (t - g.tStart) / (g.tEnd - g.tStart);
        const gAlpha = Math.sin(gT * Math.PI) * 0.75 * glitchStrength;
        if (gAlpha > 0.01) {
          ctx.save();
          ctx.globalAlpha = gAlpha;
          ctx.fillStyle = `rgb(${g.color[0]},${g.color[1]},${g.color[2]})`;
          ctx.fillRect(g.x, g.y, g.w, g.h);
          ctx.restore();
        }
      }
    }

    // Horizontal displacement on a random slice
    if (glitchStrength > 0.3) {
      const sliceY = Math.floor(CY + Math.sin(elapsed * 0.013) * 60);
      const sliceH = 2;
      const dispAmt = Math.floor(glitchStrength * 5);
      if (sliceY >= 0 && sliceY + sliceH <= H && dispAmt > 0) {
        try {
          const sliceData = ctx.getImageData(0, sliceY, W, sliceH);
          ctx.clearRect(0, sliceY, W, sliceH);
          ctx.fillStyle = '#000';
          ctx.fillRect(0, sliceY, W, sliceH);
          ctx.putImageData(sliceData, dispAmt, sliceY);
        } catch(e) {}
      }
    }

  } else {
    // === Phase 4: Clean final settle ===
    const cleanT = (t - 0.82) / 0.18;
    // Already clean logo since phase 3, just fade in over any residual glitch
    drawStaticLogo();
    // Brief brightness pulse fading out
    const pulse = (1 - easeOutCubic(cleanT)) * 0.15;
    if (pulse > 0.005) {
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  if (t >= 1.0) {
    animComplete = true;
    drawStaticLogo();
    return;
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
