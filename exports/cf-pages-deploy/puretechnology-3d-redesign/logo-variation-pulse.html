<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology — Pulse Heartbeat</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#080a12;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
//  PURE TECHNOLOGY — PULSE / HEARTBEAT VARIATION
//
//  The logo breathes like a heartbeat:
//  - Sharp inward compression at the "beat" moment
//  - Expansion wave radiates outward ring by ring
//  - Glow wave travels from center to outer edge
//  - Each ring has a slight timing delay (propagation effect)
//  - Subtle scale oscillation on the whole logo
//  - Background ripple fades out to dark
//
//  Heartbeat rhythm: 72 BPM (1.2s period)
//  Two-beat pattern like a real cardiac cycle: lub-DUB
// ============================================================

const CANVAS = document.getElementById('c');
const CTX    = CANVAS.getContext('2d');

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight);
  CANVAS.width  = s;
  CANVAS.height = s;
}
resize();
window.addEventListener('resize', resize);

// ---- mouse ----
let MX = 0, MY = 0, smoothMX = 0, smoothMY = 0;
document.addEventListener('mousemove', e => {
  const r = CANVAS.getBoundingClientRect();
  MX = (e.clientX - r.left - r.width  * 0.5) / (r.width  * 0.5);
  MY = (e.clientY - r.top  - r.height * 0.5) / (r.height * 0.5);
});

// ---- color ----
function lerpColor(t, alpha) {
  const r = Math.round(241 + (43  - 241) * t);
  const g = Math.round( 66 + (147 -  66) * t);
  const b = Math.round( 11 + (193 -  11) * t);
  return alpha !== undefined
    ? `rgba(${r},${g},${b},${alpha})`
    : `rgb(${r},${g},${b})`;
}

function hexVerts(radius, rotation) {
  const pts = new Array(6);
  for (let i = 0; i < 6; i++) {
    const a = rotation + (Math.PI * 2 * i) / 6;
    pts[i] = { x: radius * Math.cos(a), y: radius * Math.sin(a) };
  }
  return pts;
}

function drawHexRing(ctx, radius, rotation, color, lw, alpha) {
  const v = hexVerts(radius, rotation);
  ctx.beginPath();
  ctx.moveTo(v[0].x, v[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(v[i].x, v[i].y);
  ctx.closePath();
  ctx.strokeStyle = color;
  ctx.lineWidth   = lw;
  ctx.globalAlpha = alpha;
  ctx.stroke();
}

function drawVortexSpokes(ctx, rA, rotA, rB, rotB, tA, tB, lw, alpha) {
  const vA = hexVerts(rA, rotA);
  const vB = hexVerts(rB, rotB);
  for (let i = 0; i < 6; i++) {
    const pA  = vA[i];
    const pB0 = vB[i % 6];
    const pB1 = vB[(i + 1) % 6];
    const g0 = ctx.createLinearGradient(pA.x, pA.y, pB0.x, pB0.y);
    g0.addColorStop(0, lerpColor(tA, alpha));
    g0.addColorStop(1, lerpColor(tB, alpha));
    ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB0.x, pB0.y);
    ctx.strokeStyle = g0; ctx.lineWidth = lw; ctx.globalAlpha = alpha; ctx.stroke();
    const g1 = ctx.createLinearGradient(pA.x, pA.y, pB1.x, pB1.y);
    g1.addColorStop(0, lerpColor(tA, alpha));
    g1.addColorStop(1, lerpColor(tB, alpha));
    ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB1.x, pB1.y);
    ctx.strokeStyle = g1; ctx.lineWidth = lw * 0.7; ctx.globalAlpha = alpha; ctx.stroke();
  }
}

// ---- ring geometry ----
const RING_NORMS = [
  0.11, 0.16, 0.22, 0.28, 0.335, 0.40,
  0.46, 0.535, 0.615, 0.685, 0.755, 0.840, 0.970
];
const BASE_ROT    = Math.PI / 6 - 5 * Math.PI / 180;
const SPIRAL_STEP = 5 * Math.PI / 180;
const SPEED_INNER = 0.18;
const SPEED_OUTER = 0.06;

// ---- Heartbeat rhythm ----
// 72 BPM = 0.833s period
// lub-DUB pattern:
//   lub (softer) at t=0.0
//   DUB (stronger) at t=0.25 of period
//   rest at t=0.5 - 1.0
const HEART_PERIOD = 0.833;

function heartbeat(t) {
  const phase = (t % HEART_PERIOD) / HEART_PERIOD;

  // lub: small fast beat
  const lubWidth = 0.07;
  const lub = Math.max(0, 1 - Math.abs(phase - 0.05) / lubWidth);
  const lubPulse = lub * lub * 0.5;

  // DUB: bigger beat
  const dubWidth = 0.10;
  const dub = Math.max(0, 1 - Math.abs(phase - 0.20) / dubWidth);
  const dubPulse = dub * dub * 1.0;

  return lubPulse + dubPulse;
}

// Heartbeat with ring-propagation delay
// Ring 0 = innermost feels the beat first, outer rings feel it later
function heartbeatForRing(t, ringIndex, totalRings) {
  const delay = (ringIndex / totalRings) * 0.12; // 120ms max propagation
  return heartbeat(t - delay);
}

// ---- Glow wave system ----
// Tracks active glow waves radiating outward
let glowWaves = [];
let lastBeatT = -1;

function checkBeatTrigger(t) {
  const phase = (t % HEART_PERIOD) / HEART_PERIOD;
  const prevPhase = ((t - 0.016) % HEART_PERIOD) / HEART_PERIOD;

  // Trigger on DUB (phase ~0.20)
  if (prevPhase < 0.20 && phase >= 0.20) {
    glowWaves.push({ startT: t, type: 'dub' });
  }
  // Trigger on lub (phase ~0.05)
  if (prevPhase < 0.05 && phase >= 0.05) {
    glowWaves.push({ startT: t, type: 'lub' });
  }

  // Prune old waves
  glowWaves = glowWaves.filter(w => (t - w.startT) < 1.2);
}

// ---- Background ripple rings ----
function drawGlowWave(ctx, wave, R, t) {
  const age   = t - wave.startT;
  const speed = R * 1.4; // travels R*1.4 in 1 second
  const waveR = age * speed;
  const maxR  = R * 1.3;

  if (waveR > maxR) return;

  const alpha = Math.max(0, 1 - waveR / maxR);
  const isDub = wave.type === 'dub';
  const strength = isDub ? 1.0 : 0.4;

  // Inner color (orange) for early wave, outer (cyan) as it expands
  const tColor = waveR / R;
  const r = Math.round(241 + (43  - 241) * Math.min(1, tColor));
  const g = Math.round( 66 + (147 -  66) * Math.min(1, tColor));
  const b = Math.round( 11 + (193 -  11) * Math.min(1, tColor));

  ctx.beginPath();
  ctx.arc(0, 0, waveR, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * strength * 0.25})`;
  ctx.lineWidth = isDub ? R * 0.025 : R * 0.012;
  ctx.globalAlpha = 1;
  ctx.stroke();
}

function render(ms) {
  const t = ms * 0.001;
  const W = CANVAS.width;
  const H = CANVAS.height;

  smoothMX += (MX - smoothMX) * 0.05;
  smoothMY += (MY - smoothMY) * 0.05;

  const R = W * 0.42;
  const N = RING_NORMS.length;

  checkBeatTrigger(t);

  const ox = smoothMX * W * 0.012;
  const oy = smoothMY * H * 0.012;

  CTX.fillStyle = '#080a12';
  CTX.fillRect(0, 0, W, H);
  CTX.save();
  CTX.translate(W * 0.5 + ox, H * 0.5 + oy);

  // ---- Draw background glow waves ----
  CTX.save();
  CTX.globalCompositeOperation = 'lighter';
  for (const wave of glowWaves) {
    drawGlowWave(CTX, wave, R, t);
  }
  CTX.globalCompositeOperation = 'source-over';
  CTX.restore();

  // ---- Pre-compute ring rotations and pulse scales ----
  const rotations = [];
  const pulseMags = [];
  const glowBoosts = [];

  for (let i = 0; i < N; i++) {
    const normR = RING_NORMS[i];
    const speed = SPEED_OUTER + (SPEED_INNER - SPEED_OUTER) * (1 - normR);
    rotations.push(BASE_ROT + i * SPIRAL_STEP + speed * t);

    // Heartbeat scale displacement
    const hb = heartbeatForRing(t, i, N);
    // Scale: slight expand-then-contract
    // Inner rings expand first, outer rings follow
    pulseMags.push(hb);

    // Glow boost at beat moment
    glowBoosts.push(hb);
  }

  // ---- Glow bloom pass ----
  CTX.save();
  CTX.shadowBlur = W * 0.02;
  for (let i = 0; i < N; i++) {
    const normR   = RING_NORMS[i];
    const glowExtra = glowBoosts[i] * 0.4;
    const pulseDR  = pulseMags[i] * R * 0.025; // up to 2.5% radius expansion
    const radius   = (normR * R) + pulseDR;
    const color    = lerpColor(normR);
    const lw       = W * 0.0015;
    CTX.shadowColor = color;
    drawHexRing(CTX, radius, rotations[i], color, lw, 0.20 + glowExtra * 0.5);
  }
  CTX.restore();

  // ---- Main crisp draw ----
  CTX.shadowBlur = 0;
  for (let i = N - 1; i >= 0; i--) {
    const normR   = RING_NORMS[i];
    const pulseDR = pulseMags[i] * R * 0.025;
    const radius  = (normR * R) + pulseDR;
    const color   = lerpColor(normR);
    const lw      = (W * 0.0022) + (W * 0.0012) * normR;
    const alpha   = 1.0;

    if (i < N - 1) {
      const jNormR  = RING_NORMS[i + 1];
      const jPulse  = pulseMags[i + 1] * R * 0.025;
      const jRadius = (jNormR * R) + jPulse;
      drawVortexSpokes(
        CTX, radius, rotations[i], jRadius, rotations[i + 1],
        normR, jNormR, lw * 0.7, 0.55 + 0.45 * normR
      );
    }

    // Hex ring — slightly thicker at beat moment
    const beatThick = 1 + pulseMags[i] * 0.5;
    drawHexRing(CTX, radius, rotations[i], color, lw * beatThick, alpha);

    // Extra glow ring at beat peak
    if (pulseMags[i] > 0.3) {
      CTX.save();
      CTX.shadowBlur = W * 0.03 * pulseMags[i];
      CTX.shadowColor = color;
      drawHexRing(CTX, radius, rotations[i], color, lw * 0.3, pulseMags[i] * 0.7);
      CTX.restore();
    }
  }

  // ---- Core heartbeat glow ----
  CTX.globalAlpha = 1;
  const hbNow = heartbeat(t);
  const pulseR  = R * 0.13 * (1 + 0.08 * Math.sin(t * 2.1) + hbNow * 0.15);
  const coreGrd = CTX.createRadialGradient(0, 0, 0, 0, 0, pulseR);
  coreGrd.addColorStop(0.0, `rgba(241,66,11,${0.35 + hbNow * 0.45})`);
  coreGrd.addColorStop(0.4, `rgba(241,66,11,${0.12 + hbNow * 0.15})`);
  coreGrd.addColorStop(1.0, 'rgba(241,66,11,0.0)');
  CTX.beginPath(); CTX.arc(0, 0, pulseR, 0, Math.PI * 2);
  CTX.fillStyle = coreGrd; CTX.fill();

  // Beat flash: brief white-orange core flash on DUB
  const phase = (t % HEART_PERIOD) / HEART_PERIOD;
  const dubDist = Math.abs(phase - 0.20);
  if (dubDist < 0.06) {
    const flashA = Math.max(0, 1 - dubDist / 0.06);
    const flashGrd = CTX.createRadialGradient(0,0,0,0,0,R*0.08);
    flashGrd.addColorStop(0.0, `rgba(255,180,80,${flashA * 0.6})`);
    flashGrd.addColorStop(0.5, `rgba(241,66,11,${flashA * 0.2})`);
    flashGrd.addColorStop(1.0, 'rgba(241,66,11,0)');
    CTX.beginPath(); CTX.arc(0,0,R*0.08,0,Math.PI*2);
    CTX.fillStyle = flashGrd; CTX.fill();
  }

  // ---- Black void ----
  const voidGrd = CTX.createRadialGradient(0,0,0,0,0,R*0.06);
  voidGrd.addColorStop(0.0,  '#080a12');
  voidGrd.addColorStop(0.6,  '#080a12');
  voidGrd.addColorStop(1.0,  'rgba(8,10,18,0)');
  CTX.beginPath(); CTX.arc(0, 0, R*0.06, 0, Math.PI * 2);
  CTX.fillStyle = voidGrd; CTX.fill();

  CTX.restore();
  CTX.globalAlpha = 1;
  CTX.shadowBlur  = 0;

  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
