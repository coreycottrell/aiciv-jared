// CANVAS TEXT HELPER - renders text to a texture on a plane
// =========================================================================
function createTextPlane(config) {
  const {
    text, width = 512, height = 256, fontSize = 28, fontFamily = "'Oswald', sans-serif",
    color = '#e8eaf0', bgColor = null, x = 0, y = 0, z = 0,
    rotY = 0, rotX = 0, scaleW = 4, scaleH = 2, align = 'left',
    lineHeight = 1.4, maxWidth = null, fontWeight = '400', opacity = 1,
    padding = 30, textTransform = 'none'
  } = config;

  const cvs = document.createElement('canvas');
  cvs.width = width;
  cvs.height = height;
  const ctx = cvs.getContext('2d');

  // Background
  if (bgColor) {
    ctx.fillStyle = bgColor;
    if (bgColor.includes('gradient')) {
      const grd = ctx.createLinearGradient(0, 0, 0, height);
      grd.addColorStop(0, 'rgba(8,10,18,0.85)');
      grd.addColorStop(1, 'rgba(8,10,18,0.6)');
      ctx.fillStyle = grd;
    }
    // Rounded rect
    const r = 16;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(width - r, 0);
    ctx.quadraticCurveTo(width, 0, width, r);
    ctx.lineTo(width, height - r);
    ctx.quadraticCurveTo(width, height, width - r, height);
    ctx.lineTo(r, height);
    ctx.quadraticCurveTo(0, height, 0, height - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(42,147,193,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.fillStyle = color;
  ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';

  let displayText = text;
  if (textTransform === 'uppercase') displayText = text.toUpperCase();

  const mw = maxWidth || (width - padding * 2);
  const startX = align === 'center' ? width / 2 : padding;

  // Word wrap
  const words = displayText.split(' ');
  const lines = [];
  let currentLine = '';
  for (const word of words) {
    const testLine = currentLine ? currentLine + ' ' + word : word;
    const metrics = ctx.measureText(testLine);
    if (metrics.width > mw && currentLine) {
      lines.push(currentLine);
      currentLine = word;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);

  const lh = fontSize * lineHeight;
  const startY = padding;
  lines.forEach((line, i) => {
    ctx.fillText(line, startX, startY + i * lh);
  });

  const texture = new THREE.CanvasTexture(cvs);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;

  const geo = new THREE.PlaneGeometry(scaleW, scaleH);
  const mat = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    opacity: opacity,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY;
  mesh.rotation.x = rotX;
  return mesh;
}

// Multi-line text with mixed styles
function createRichTextPlane(config) {
  const {
    lines, width = 512, height = 512, x = 0, y = 0, z = 0,
    rotY = 0, scaleW = 5, scaleH = 5, bgColor = null, opacity = 1, padding = 30
  } = config;

  const cvs = document.createElement('canvas');
  cvs.width = width;
  cvs.height = height;
  const ctx = cvs.getContext('2d');

  if (bgColor) {
    ctx.fillStyle = bgColor;
    const r = 16;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(width - r, 0);
    ctx.quadraticCurveTo(width, 0, width, r); ctx.lineTo(width, height - r);
    ctx.quadraticCurveTo(width, height, width - r, height); ctx.lineTo(r, height);
    ctx.quadraticCurveTo(0, height, 0, height - r); ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(42,147,193,0.2)';
    ctx.lineWidth = 2; ctx.stroke();
  }

  let curY = padding;
  for (const line of lines) {
    const { text, font = "400 24px 'Inter', sans-serif", color = '#e8eaf0', align = 'left', gap = 0 } = line;
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    const xPos = align === 'center' ? width / 2 : padding;
    // Word wrap
    const words = text.split(' ');
    const maxW = width - padding * 2;
    let cl = '';
    const fontSize = parseInt(font.match(/(\d+)px/)?.[1] || '24');
    const lh = fontSize * 1.4;
    for (const word of words) {
      const test = cl ? cl + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && cl) {
        ctx.fillText(cl, xPos, curY);
        curY += lh;
        cl = word;
      } else {
        cl = test;
      }
    }
    if (cl) { ctx.fillText(cl, xPos, curY); curY += lh; }
    curY += gap;
  }

  const texture = new THREE.CanvasTexture(cvs);
  texture.minFilter = THREE.LinearFilter;
  const geo = new THREE.PlaneGeometry(scaleW, scaleH);
  const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY;
  return mesh;
}

// HELPER: Create a headshot texture from image URL
// =========================================================================
const headBase = "../puretechnology-redesign/headshots/";
const textureLoader = new THREE.TextureLoader();

function createHeadshotCard(member, x, y, z) {
  const group = new THREE.Group();
  group.position.set(x, y, z);

  // Card background
  const cardGeo = new THREE.PlaneGeometry(1.2, 1.6);
  const cardMat = new THREE.MeshBasicMaterial({
    color: 0x0a0d18, transparent: true, opacity: 0.7, side: THREE.DoubleSide
  });
  const card = new THREE.Mesh(cardGeo, cardMat);
  group.add(card);

  // Border
  const borderGeo = new THREE.PlaneGeometry(1.24, 1.64);
  const borderMat = new THREE.MeshBasicMaterial({
    color: BLUE, transparent: true, opacity: 0.15, side: THREE.DoubleSide
  });
  const border = new THREE.Mesh(borderGeo, borderMat);
  border.position.z = -0.01;
  group.add(border);

  // Name text below photo area
  const nameCvs = document.createElement('canvas');
  nameCvs.width = 256; nameCvs.height = 64;
  const nctx = nameCvs.getContext('2d');
  nctx.fillStyle = '#e8eaf0';
  nctx.font = "600 18px 'Oswald', sans-serif";
  nctx.textAlign = 'center';
  nctx.fillText(member.name, 128, 20);
  nctx.fillStyle = 'rgba(42,147,193,0.8)';
  nctx.font = "400 13px 'Inter', sans-serif";
  nctx.fillText(member.role, 128, 44);
  const nameTex = new THREE.CanvasTexture(nameCvs);
  const nameGeo = new THREE.PlaneGeometry(1.0, 0.25);
  const nameMat = new THREE.MeshBasicMaterial({ map: nameTex, transparent: true, side: THREE.DoubleSide });
  const nameMesh = new THREE.Mesh(nameGeo, nameMat);
  nameMesh.position.y = -0.6;
  nameMesh.position.z = 0.01;
  group.add(nameMesh);

  // Photo (if img provided)
  if (member.img) {
    const tex = textureLoader.load(headBase + member.img);
    const photoGeo = new THREE.PlaneGeometry(0.8, 0.8);
    const photoMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
    const photo = new THREE.Mesh(photoGeo, photoMat);
    photo.position.y = 0.15;
    photo.position.z = 0.01;
    group.add(photo);
  } else {
    // Initials circle
    const initCvs = document.createElement('canvas');
    initCvs.width = 128; initCvs.height = 128;
    const ictx = initCvs.getContext('2d');
    ictx.fillStyle = 'rgba(42,147,193,0.15)';
    ictx.beginPath(); ictx.arc(64, 64, 60, 0, Math.PI * 2); ictx.fill();
    ictx.strokeStyle = 'rgba(42,147,193,0.4)'; ictx.lineWidth = 2; ictx.stroke();
    const initials = member.name.split(' ').map(w => w[0]).join('');
    ictx.fillStyle = '#2a93c1';
    ictx.font = "600 42px 'Oswald', sans-serif";
    ictx.textAlign = 'center'; ictx.textBaseline = 'middle';
    ictx.fillText(initials, 64, 64);
    const initTex = new THREE.CanvasTexture(initCvs);
    const initGeo = new THREE.PlaneGeometry(0.7, 0.7);
    const initMat = new THREE.MeshBasicMaterial({ map: initTex, transparent: true, side: THREE.DoubleSide });
    const initMesh = new THREE.Mesh(initGeo, initMat);
    initMesh.position.y = 0.15;
    initMesh.position.z = 0.01;
    group.add(initMesh);
  }

  return group;
}

function createNameWall(names, x, z, rotY) {
  const rows = Math.ceil(names.length / 6);
  const cvs = document.createElement('canvas');
  cvs.width = 1024;
  cvs.height = rows * 50 + 60;
  const ctx = cvs.getContext('2d');

  ctx.fillStyle = 'rgba(8,10,18,0.4)';
  ctx.fillRect(0, 0, cvs.width, cvs.height);

  names.forEach((name, i) => {
    const col = i % 6;
    const row = Math.floor(i / 6);
    const cx = 20 + col * 168;
    const cy = 30 + row * 50;
    ctx.font = "400 16px 'Oswald', sans-serif";
    ctx.fillStyle = `rgba(232,234,240,${0.25 + Math.random() * 0.25})`;
    ctx.textAlign = 'left';
    ctx.fillText(name.toUpperCase(), cx, cy);
  });

  const tex = new THREE.CanvasTexture(cvs);
  const geo = new THREE.PlaneGeometry(16, rows * 0.8 + 1);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 2, z);
  mesh.rotation.y = rotY;
  return mesh;
}

// =========================================================================
// SCROLL HANDLER
// =========================================================================
let currentProgress = 0;
let currentSection = 0;

function getScrollProgress() {
  const total = document.getElementById('scroll-container').offsetHeight - window.innerHeight;
  return Math.min(Math.max(window.scrollY / total, 0), 1);
}

function getSectionFromProgress(p) {
  const idx = Math.round(p * (ROOMS.length - 1));
  return Math.min(idx, ROOMS.length - 1);
}

function updateUI(section) {
  if (section === currentSection) return;
  currentSection = section;

  // Nav dots
  document.querySelectorAll('.ndot').forEach((d, i) => d.classList.toggle('active', i === section));

  // Room label
  const labelEl = document.getElementById('room-label');
  if (labelEl) {
    labelEl.innerHTML = `<span class="num">${String(section + 1).padStart(2, '0')}</span> ${ROOMS[section].name}`;
  }

  // Scroll hint
  const hint = document.getElementById('scroll-hint');
  if (hint) hint.style.opacity = section > 0 ? '0' : '1';
}

// =========================================================================
// ANIMATION LOOP
// =========================================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth scroll interpolation
  const rawProgress = getScrollProgress();
  currentProgress += (rawProgress - currentProgress) * 0.08;
  const p = currentProgress;

  // Camera position from spline
  const camPos = cameraPath.getPointAt(Math.min(p, 0.999));
  const lookPos = lookPath.getPointAt(Math.min(p, 0.999));

  camera.position.lerp(camPos, 0.06);
  camera.lookAt(lookPos);

  // Section
  const section = getSectionFromProgress(p);
  updateUI(section);

  // Progress bar
  document.getElementById('progress-bar').style.width = (p * 100) + '%';

  // Animate AI orbs
  aiNodes.forEach((node) => {
    node.mesh.position.y = node.baseY + Math.sin(t * 0.8 + node.phase) * 0.3;
    node.mesh.rotation.y = t * 0.3;
    node.mesh.rotation.x = Math.sin(t * 0.5 + node.phase) * 0.2;
  });

  // Portal ring rotation
  portal.rotation.z = t * 0.3;
  portal.rotation.x = Math.sin(t * 0.5) * 0.1;

  // Inner glow pulse
  innerGlowMat.opacity = 0.03 + Math.sin(t * 2) * 0.02;

  // Bloom pulse near gateway
  if (p > 0.85) {
    bloom.strength = 0.6 + Math.sin(t * 2) * 0.3;
  } else {
    bloom.strength = 0.6;
  }

  composer.render();
}

// =========================================================================
// LOADING
// =========================================================================
const loadBar = document.getElementById('load-inner');
let loadProgress = 0;
const loadInterval = setInterval(() => {
  loadProgress += Math.random() * 15 + 5;
  if (loadProgress >= 100) {
    loadProgress = 100;
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loading').classList.add('done');
    }, 300);
  }
  loadBar.style.width = loadProgress + '%';
}, 100);

// Start
animate();

window.addEventListener('resize', () => {

  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});
