<!-- UNIVERSAL REFERRAL CODE CAPTURE — 90-day cookie + localStorage -->
<script>
(function() {
  // Read ?ref= or ?code= from URL
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref') || params.get('code');
  
  if (ref && /^[A-Za-z0-9-]{4,16}$/.test(ref)) {
    // Store in localStorage
    try { localStorage.setItem('pb_ref', ref); } catch(e) {}
    // Store in cookie (90-day expiry, all paths, SameSite=Lax)
    var expires = new Date();
    expires.setDate(expires.getDate() + 90);
    document.cookie = 'pb_ref=' + encodeURIComponent(ref) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
    // Fire click tracking (non-blocking)
    try {
      fetch('https://app.purebrain.ai/api/referral/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ referral_code: ref.toUpperCase() }),
        keepalive: true
      }).catch(function(){});
    } catch(e) {}
  }
  
  // Global helper: read stored referral code at payment time
  // Checks URL first, then localStorage, then cookie
  window.getPbRef = function() {
    // 1. Check current URL
    var p = new URLSearchParams(window.location.search);
    var urlRef = p.get('ref') || p.get('code');
    if (urlRef && /^[A-Za-z0-9-]{4,16}$/.test(urlRef)) return urlRef;
    // 2. Check localStorage
    try {
      var ls = localStorage.getItem('pb_ref');
      if (ls && /^[A-Za-z0-9-]{4,16}$/.test(ls)) return ls;
    } catch(e) {}
    // 3. Check cookie
    var match = document.cookie.match(/(?:^|;)\s*pb_ref=([^;]+)/);
    if (match) {
      var decoded = decodeURIComponent(match[1]);
      if (/^[A-Za-z0-9-]{4,16}$/.test(decoded)) return decoded;
    }
    return null;
  };
})();
</script>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {

/* ── Layout ─────────────────────────────────────────────── */
.page {

/* ── Header ─────────────────────────────────────────────── */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.hdr-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  font-size: 0.87rem;
  cursor: pointer;
  border: none;
  background: none;
  padding: 4px 0;
  transition: color .2s;
}
.hdr-back:hover { color: var(--text); }
.hdr-back svg { width: 18px; height: 18px; }
.hdr-title {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.hdr-close {
  width: 32px; height: 32px;

  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: color .2s, background .2s;
}
.hdr-close:hover { color: var(--text); background: var(--card2); }

/* ── Hero Code Card ──────────────────────────────────────── */
.hero {
  margin: 20px 20px 0;
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  background: linear-gradient(135deg, #f1420b 0%, #2a93c1 100%);

  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(241,66,11,0.85) 0%, rgba(42,147,193,0.85) 100%);
}
.hero-content { position: relative; z-index: 1; }
.hero-label {
  font-size: 0.72rem;

  letter-spacing: 0.12em;

  color: rgba(255,255,255,0.7);

}
.hero-code {
  font-size: 2.4rem;

  letter-spacing: 0.18em;

}
.hero-link-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.25);

.hero-link-text {
  flex: 1;
  font-size: 0.82rem;

}
.copy-btn {

  border-radius: 6px;
  color: #fff;
  font-size: 0.8rem;

  padding: 6px 14px;
  cursor: pointer;

}
.copy-btn:hover { background: rgba(255,255,255,0.25); }
.copy-btn.copied { background: rgba(34,197,94,0.35); }

/* ── Stats Row ───────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 16px 20px 0;
}
.stat-card {

  <div class="share-row">

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      Share on X
    </button>
    <button class="share-btn share-li" id="share-li" onclick="shareLinkedIn()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </button>
    <button class="share-btn share-em" onclick="shareEmail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      Email
    </button>
  </div>

  <!-- Referral History -->
  <div class="section">
    <div class="section-title">Referral History</div>
    <div class="history-list" id="history-list">
      <div class="empty-state">Loading referrals&#8230;</div>
    </div>
  </div>

  <!-- Reward Tiers -->
  <div class="section">
    <div class="section-title">Reward Tiers</div>
    <table class="tiers-table" id="tiers-table">
      <thead>
        <tr>
          <th>Milestone</th>
          <th style="text-align:right">Reward</th>
        </tr>
      </thead>
      <tbody id="tiers-body">
        <tr><td colspan="2" style="text-align:center;color:var(--text-dim);padding:16px;">Loading&#8230;</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────
var API_BASE = 'https://app.purebrain.ai/api/referral';
var state = {
  referral_code: null,
  referral_link: null,
  name: '',
  earnings: 0,
  total_referrals: 0,
  pending: 0,
  completed: 0,
  history: [],
  reward_tiers: []
};

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
(function init() {
  var params = new URLSearchParams(window.location.search);
  var code  = params.get('ref_code');
  var email = params.get('email');

  if (code) {
    fetchDashboard({ code: code });
  } else if (email) {
    fetchDashboard({ email: email });
  } else {
    // Try localStorage for portal user
    var storedEmail = localStorage.getItem('pb_user_email');
    if (storedEmail) {
      fetchDashboard({ email: storedEmail });
    } else {
      showError('No referral code found. Please access this page from your PureBrain portal.');
    }
  }
})();

// ─────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────
function fetchDashboard(params) {
  var qs = params.code ? ('?code=' + encodeURIComponent(params.code))
                       : ('?email=' + encodeURIComponent(params.email));
  fetch(API_BASE + '/dashboard' + qs)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (data.code) {
        // WP error object
        showError(data.message || 'Referral not found.');
        return;
      }
      state = Object.assign(state, data);
      renderAll();
    })
    .catch(function(err) {
      showError('Could not load dashboard. Please try again. (' + err.message + ')');
    });
}

// ─────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────
function renderAll() {
  // Hero
  document.getElementById('hero-code').textContent = state.referral_code || '--------';
  document.getElementById('hero-link').textContent = state.referral_link || '';

  // Header
  if (state.name) {
    document.getElementById('hdr-title').textContent = state.name.split(' ')[0] + "'s Dashboard";
  }

  // Stats
  document.getElementById('stat-total').textContent = state.total_referrals;
  document.getElementById('stat-pending').textContent = state.pending;
  document.getElementById('stat-completed').textContent = state.completed;
  document.getElementById('stat-earnings').textContent = '$' + Number(state.earnings).toFixed(2);

  // History
  renderHistory();

  // Tiers
  renderTiers();
}

function renderHistory() {
  var list = document.getElementById('history-list');
  if (!state.history || state.history.length === 0) {
    list.innerHTML = '<div class="empty-state">No referrals yet.<br>Share your link to start earning!</div>';
    return;
  }
  list.innerHTML = state.history.map(function(item) {
    var initials = getInitials(item.referred_name || 'U');
    var badgeClass = 'badge-' + (item.status || 'pending');
    var earnText = item.earnings > 0 ? '$' + Number(item.earnings).toFixed(2) : '$0.00';
    var earnClass = item.earnings > 0 ? 'history-earn' : 'history-earn zero';
    var dateStr = formatDate(item.created_at);
    return '<div class="history-item">' +
      '<div class="avatar">' + initials + '</div>' +
      '<div class="history-info">' +
        '<div class="history-name">' + esc(item.referred_name || 'Unknown') + '</div>' +
        '<div class="history-email">' + esc(item.referred_email || '') + '</div>' +
        '<div class="history-date">' + dateStr + '</div>' +
      '</div>' +
      '<div class="history-right">' +
        '<span class="badge ' + badgeClass + '">' + (item.status || 'pending') + '</span>' +
        '<span class="' + earnClass + '">' + earnText + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderTiers() {
  var tbody = document.getElementById('tiers-body');
  if (!state.reward_tiers || state.reward_tiers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;color:var(--text-dim)">No tier data</td></tr>';
    return;
  }
  tbody.innerHTML = state.reward_tiers.map(function(tier) {
    return '<tr><td>' + esc(tier.label) + '</td><td>' + esc(tier.reward) + '</td></tr>';
  }).join('');
}

// ─────────────────────────────────────────────────────────────
// Copy
// ─────────────────────────────────────────────────────────────
function copyLink() {
  var link = state.referral_link;
  if (!link) return;
  var btn = document.getElementById('copy-btn');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(function() {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = link;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
  }
}

// ─────────────────────────────────────────────────────────────
// Share
// ─────────────────────────────────────────────────────────────
function shareX() {
  var link = state.referral_link || 'https://purebrain.ai';
  var text = 'I use PureBrain to work with my AI assistant. Join me and we both earn rewards! ';
  var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(link);
  window.open(url, '_blank', 'width=600,height=400');
}

function shareLinkedIn() {
  var link = state.referral_link || 'https://purebrain.ai';
  var url = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(link);
  window.open(url, '_blank', 'width=600,height=500');
}

function shareEmail() {
  var link = state.referral_link || 'https://purebrain.ai';
  var subject = encodeURIComponent('Check out PureBrain — my AI assistant platform');
  var body = encodeURIComponent(
    'Hey,\n\nI\'ve been using PureBrain to work with my own AI assistant and it\'s been incredible.\n\n' +
    'Use my referral link to sign up and we both earn rewards:\n' +
    link + '\n\nTalk soon!'
  );
  window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
}

// ─────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────
function showError(msg) {
  var el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function getInitials(name) {
  var parts = String(name).trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return (parts[0][0] || 'U').toUpperCase();
}

function formatDate(dtStr) {
  if (!dtStr) return '';
  try {
    var d = new Date(dtStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch(e) { return dtStr; }
}
</script>

<script src="/referral-tracker.js" defer></script>
</body>
</html>
