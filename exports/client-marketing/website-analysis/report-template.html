<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Analysis Report | Aether AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & VARS ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --bg2: #0f1525;
      --bg3: #141929;
      --border: rgba(42,147,193,0.15);
      --border2: rgba(42,147,193,0.35);
      --blue: #2a93c1;
      --blue2: #3db8f0;
      --orange: #f1420b;
      --green: #00d68f;
      --yellow: #ffd60a;
      --red: #ff4d4d;
      --txt1: #e8edf5;
      --txt2: #8a9ab8;
      --txt3: #5a6a85;
      --r: 10px;
      --rl: 16px;
    }

    @media print {
      body { background: white !important; color: #111 !important; }
      .no-print { display: none !important; }
      .page-break { page-break-before: always; }
      section { break-inside: avoid; }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--txt1);
      line-height: 1.65;
      font-size: 15px;
    }

    a { color: var(--blue); }

    /* ── LAYOUT ── */
    .report-wrapper { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── HEADER ── */
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--blue), var(--orange));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
    }

    .brand-name span { color: var(--blue); }

    .report-meta { text-align: right; }
    .report-meta h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--txt1);
      margin-bottom: 4px;
    }
    .report-meta .url-display {
      color: var(--blue2);
      font-size: 14px;
      margin-bottom: 4px;
    }
    .report-meta .gen-date {
      color: var(--txt3);
      font-size: 12px;
    }

    /* ── OVERALL SCORE CARD ── */
    .score-overview {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--rl);
      padding: 36px 40px;
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .overall-score-block { text-align: center; }

    .overall-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      /* color set inline by JS/generator */
    }

    .overall-label {
      font-size: 16px;
      font-weight: 600;
      margin-top: 4px;
      margin-bottom: 2px;
    }

    .overall-sublabel {
      color: var(--txt3);
      font-size: 13px;
    }

    .score-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
    }

    .score-mini {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      text-align: center;
    }

    .score-mini .sm-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--txt3);
      margin-bottom: 6px;
    }

    .score-mini .sm-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      /* color inline */
    }

    .score-mini .sm-label {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 2px;
    }

    /* ── SUMMARY BOX ── */
    .exec-summary {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 28px 32px;
      margin-bottom: 40px;
    }

    .exec-summary h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .exec-summary h2::before {
      content: '📊';
      font-size: 20px;
    }

    .exec-summary p { color: var(--txt2); line-height: 1.7; }

    /* ── PRIORITY ACTIONS ── */
    .priority-section { margin-bottom: 40px; }

    .priority-section h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .priority-list { display: flex; flex-direction: column; gap: 12px; }

    .priority-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
    }

    .priority-item.critical { border-left: 3px solid var(--red); }
    .priority-item.moderate { border-left: 3px solid var(--yellow); }

    .priority-badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .priority-badge.critical { background: rgba(255,77,77,0.15); color: var(--red); }
    .priority-badge.moderate { background: rgba(255,214,10,0.12); color: var(--yellow); }

    .priority-content .section-tag {
      font-size: 11px;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .priority-content .item-text { font-size: 14px; color: var(--txt2); }

    /* ── SECTION REPORTS ── */
    .analysis-section { margin-bottom: 32px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--rl) var(--rl) 0 0;
      cursor: pointer;
      gap: 12px;
    }

    .section-header:hover { background: var(--bg2); }

    .section-title-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .section-icon {
      font-size: 22px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(42,147,193,0.08);
      border-radius: 8px;
    }

    .section-header h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 600;
    }

    .section-score-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .score-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .score-badge-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-body {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--rl) var(--rl);
      padding: 24px;
      background: var(--bg2);
    }

    .findings-cols {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .findings-group h4 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .findings-group.wins h4 { color: var(--green); }
    .findings-group.wins h4::before { content: '✓'; }

    .findings-group.warnings h4 { color: var(--yellow); }
    .findings-group.warnings h4::before { content: '⚠'; }

    .findings-group.issues h4 { color: var(--red); }
    .findings-group.issues h4::before { content: '✗'; }

    .findings-list { list-style: none; }
    .findings-list li {
      font-size: 13px;
      color: var(--txt2);
      padding: 5px 0;
      padding-left: 14px;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      line-height: 1.5;
    }

    .findings-list li:last-child { border-bottom: none; }

    .findings-group.wins li::before     { content: ''; position:absolute;left:0;top:11px;width:6px;height:2px;background:var(--green); }
    .findings-group.warnings li::before { content: ''; position:absolute;left:0;top:11px;width:6px;height:2px;background:var(--yellow); }
    .findings-group.issues li::before   { content: ''; position:absolute;left:0;top:11px;width:6px;height:2px;background:var(--red); }

    /* ── SCORE BAR ── */
    .score-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .score-bar-label {
      font-size: 12px;
      color: var(--txt3);
      width: 90px;
      flex-shrink: 0;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    .score-bar-num {
      font-size: 12px;
      font-weight: 600;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .report-footer {
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .report-footer .footer-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--txt2);
    }

    .report-footer .footer-note {
      font-size: 12px;
      color: var(--txt3);
    }

    .print-btn {
      background: var(--blue);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .print-btn:hover { background: var(--blue2); }
  </style>
</head>
<body>

<div class="report-wrapper">

  <!-- HEADER -->
  <header class="report-header">
    <div class="brand">
      <div class="brand-logo">A</div>
      <div>
        <div class="brand-name">Aether <span>AI</span></div>
        <div style="font-size:12px;color:var(--txt3)">Website Analysis Report</div>
      </div>
    </div>

    <div class="report-meta">
      <h1 id="rep-title">Website Diagnostic</h1>
      <div class="url-display" id="rep-url">—</div>
      <div class="gen-date" id="rep-date">—</div>
    </div>
  </header>

  <!-- OVERALL SCORE -->
  <div class="score-overview" id="score-overview">
    <div class="overall-score-block">
      <div class="overall-num" id="overall-num" style="color:#2a93c1">—</div>
      <div class="overall-label" id="overall-label">Analyzing…</div>
      <div class="overall-sublabel">out of 100</div>
    </div>

    <div class="score-grid" id="score-grid">
      <!-- Populated by JS / generator -->
    </div>
  </div>

  <!-- SCORE BARS -->
  <div class="exec-summary" id="score-bars-section">
    <h2 style="margin-bottom:20px">Score Breakdown</h2>
    <div id="score-bars"></div>
  </div>

  <!-- EXECUTIVE SUMMARY -->
  <div class="exec-summary" id="exec-summary-block">
    <h2>Executive Summary</h2>
    <p id="exec-summary-text">Loading analysis…</p>
  </div>

  <!-- PRIORITY ACTIONS -->
  <div class="priority-section">
    <h2>Priority Actions</h2>
    <div class="priority-list" id="priority-list">
      <!-- Populated by JS / generator -->
    </div>
  </div>

  <!-- SECTION REPORTS -->
  <div id="sections-container">
    <!-- Populated by JS / generator -->
  </div>

  <!-- FOOTER -->
  <footer class="report-footer">
    <div>
      <div class="footer-brand">Aether AI</div>
      <div class="footer-note">This report is generated by AI analysis. Recommendations should be reviewed by a qualified web professional.</div>
    </div>
    <button class="print-btn no-print" onclick="window.print()">Print / Save PDF</button>
  </footer>

</div>

<script>
  // ── SCORE COLOR HELPER ──
  function scoreColor(n) {
    if (n >= 80) return '#00d68f';
    if (n >= 60) return '#2a93c1';
    if (n >= 40) return '#f1420b';
    return '#ff4d4d';
  }

  function scoreLabel(n) {
    if (n >= 80) return 'Excellent';
    if (n >= 60) return 'Good';
    if (n >= 40) return 'Needs Work';
    return 'Critical';
  }

  const SECTION_META = {
    technical:   { name: 'Technical',   icon: '⚡' },
    seo:         { name: 'SEO',         icon: '🔍' },
    ux:          { name: 'UX / UI',     icon: '🎨' },
    marketing:   { name: 'Marketing',   icon: '📣' },
    positioning: { name: 'Positioning', icon: '💼' },
  };

  // ── RENDER FUNCTION ──
  // Call this with the JSON report object from the analysis pipeline
  function renderReport(report) {
    const meta    = report.meta || {};
    const sections = report.sections || {};
    const recs    = report.recommendations || {};

    // Header
    document.getElementById('rep-title').textContent = `${meta.domain || meta.url || '—'} Diagnostic`;
    document.getElementById('rep-url').textContent   = meta.url || '—';
    document.getElementById('rep-date').textContent  = `Generated: ${meta.generated_readable || meta.generated || '—'}`;

    // Overall score
    const overall = meta.overall_score || 0;
    const overallEl = document.getElementById('overall-num');
    overallEl.textContent = overall;
    overallEl.style.color = scoreColor(overall);
    document.getElementById('overall-label').textContent = scoreLabel(overall);
    document.getElementById('overall-label').style.color = scoreColor(overall);

    // Score mini cards
    const scoreGrid = document.getElementById('score-grid');
    scoreGrid.innerHTML = '';
    const sectionScores = meta.section_scores || {};
    Object.entries(sectionScores).forEach(([key, val]) => {
      if (!SECTION_META[key]) return;
      const s = val.score || 0;
      const div = document.createElement('div');
      div.className = 'score-mini';
      div.innerHTML = `
        <div class="sm-name">${SECTION_META[key].name}</div>
        <div class="sm-val" style="color:${scoreColor(s)}">${s}</div>
        <div class="sm-label">${scoreLabel(s)}</div>
      `;
      scoreGrid.appendChild(div);
    });

    // Score bars
    const barsEl = document.getElementById('score-bars');
    barsEl.innerHTML = '';
    Object.entries(sectionScores).forEach(([key, val]) => {
      if (!SECTION_META[key]) return;
      const s = val.score || 0;
      const row = document.createElement('div');
      row.className = 'score-bar-row';
      row.innerHTML = `
        <span class="score-bar-label">${SECTION_META[key].name}</span>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${s}%;background:${scoreColor(s)}"></div>
        </div>
        <span class="score-bar-num" style="color:${scoreColor(s)}">${s}</span>
      `;
      barsEl.appendChild(row);
    });

    // Executive summary
    const issueCount = recs.total_issues || 0;
    const warnCount  = recs.total_warnings || 0;
    const execText = `
      ${meta.domain || meta.url} scored <strong style="color:${scoreColor(overall)}">${overall}/100</strong> (${scoreLabel(overall)}) across five key dimensions.
      The analysis found <strong style="color:#ff4d4d">${issueCount} critical issue${issueCount !== 1 ? 's' : ''}</strong> and
      <strong style="color:#ffd60a">${warnCount} moderate warning${warnCount !== 1 ? 's' : ''}</strong> that, when addressed,
      could meaningfully improve search visibility, conversion rates, and user experience.
      ${issueCount === 0 ? 'No critical issues were detected — the site is in good shape.' : 'Addressing the critical issues should be the immediate priority.'}
    `;
    document.getElementById('exec-summary-text').innerHTML = execText;

    // Priority list
    const prList = document.getElementById('priority-list');
    prList.innerHTML = '';
    const allItems = [
      ...(recs.critical || []).map(i => ({...i, type: 'critical'})),
      ...(recs.moderate || []).map(i => ({...i, type: 'moderate'})),
    ];
    if (allItems.length === 0) {
      prList.innerHTML = '<p style="color:var(--txt3);font-size:14px">No critical or moderate issues found. Well done!</p>';
    }
    allItems.forEach(item => {
      const secLabel = SECTION_META[item.section]?.name || item.section;
      const el = document.createElement('div');
      el.className = `priority-item ${item.type}`;
      el.innerHTML = `
        <span class="priority-badge ${item.type}">${item.type === 'critical' ? 'Critical' : 'Moderate'}</span>
        <div class="priority-content">
          <div class="section-tag">${secLabel}</div>
          <div class="item-text">${item.text}</div>
        </div>
      `;
      prList.appendChild(el);
    });

    // Section reports
    const container = document.getElementById('sections-container');
    container.innerHTML = '';
    ['technical', 'seo', 'ux', 'marketing', 'positioning'].forEach(key => {
      const sec = sections[key];
      if (!sec || !SECTION_META[key]) return;
      const meta_s = SECTION_META[key];
      const s = sec.score || 0;

      const wrapper = document.createElement('div');
      wrapper.className = 'analysis-section';

      const wins     = sec.wins     || [];
      const warnings = sec.warnings || [];
      const issues   = sec.issues   || [];

      const winsHtml     = wins.length     ? `<ul class="findings-list">${wins.map(w=>`<li>${w}</li>`).join('')}</ul>`     : '<p style="color:var(--txt3);font-size:13px">None detected.</p>';
      const warningsHtml = warnings.length ? `<ul class="findings-list">${warnings.map(w=>`<li>${w}</li>`).join('')}</ul>` : '<p style="color:var(--txt3);font-size:13px">None detected.</p>';
      const issuesHtml   = issues.length   ? `<ul class="findings-list">${issues.map(w=>`<li>${w}</li>`).join('')}</ul>`   : '<p style="color:var(--txt3);font-size:13px">None detected.</p>';

      wrapper.innerHTML = `
        <div class="section-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <div class="section-title-row">
            <div class="section-icon">${meta_s.icon}</div>
            <h3>${meta_s.name} Analysis</h3>
          </div>
          <div class="section-score-badge">
            <div class="score-circle" style="color:${scoreColor(s)};border-color:${scoreColor(s)}">${s}</div>
            <span class="score-badge-label" style="color:${scoreColor(s)}">${scoreLabel(s)}</span>
          </div>
        </div>
        <div class="section-body">
          <div class="findings-cols">
            <div class="findings-group wins">
              <h4>What's Working (${wins.length})</h4>
              ${winsHtml}
            </div>
            <div class="findings-group warnings">
              <h4>Warnings (${warnings.length})</h4>
              ${warningsHtml}
            </div>
            <div class="findings-group issues">
              <h4>Critical Issues (${issues.length})</h4>
              ${issuesHtml}
            </div>
          </div>
        </div>
      `;
      container.appendChild(wrapper);
    });
  }

  // ─────────────────────────────────────────────────────────
  // DEMO DATA — Replace with real report JSON when deploying
  // ─────────────────────────────────────────────────────────
  const DEMO_REPORT = {
    "meta": {
      "url": "https://example.com",
      "domain": "example.com",
      "generated_readable": "February 23, 2026 at 10:30 AM",
      "overall_score": 67,
      "section_scores": {
        "technical":   { "score": 72, "label": "Good" },
        "seo":         { "score": 58, "label": "Needs Work" },
        "ux":          { "score": 75, "label": "Good" },
        "marketing":   { "score": 61, "label": "Good" },
        "positioning": { "score": 55, "label": "Needs Work" }
      }
    },
    "sections": {
      "technical": {
        "score": 72,
        "wins":     ["HTTPS enabled", "Fast server response: 312ms", "Viewport meta tag present"],
        "warnings": ["No Cache-Control header", "Missing X-Frame-Options header"],
        "issues":   []
      },
      "seo": {
        "score": 58,
        "wins":     ["H1 tag present", "Canonical URL configured"],
        "warnings": ["Meta description too short (62 chars)", "No Open Graph tags"],
        "issues":   ["3 images missing alt text", "Title tag too generic"]
      },
      "ux": {
        "score": 75,
        "wins":     ["Navigation present", "CTA buttons detected", "Mobile viewport configured"],
        "warnings": ["No skip navigation link", "Footer not semantically structured"],
        "issues":   []
      },
      "marketing": {
        "score": 61,
        "wins":     ["Good content volume (~820 words)", "Value proposition language present"],
        "warnings": ["No visible testimonials", "No quantified social proof", "Copy readability could improve"],
        "issues":   []
      },
      "positioning": {
        "score": 55,
        "wins":     ["Pricing information visible", "About section present"],
        "warnings": ["Target audience not clearly stated", "No FAQ section", "No 'How it works' section"],
        "issues":   ["No differentiation messaging found"]
      }
    },
    "recommendations": {
      "critical": [
        { "section": "seo",         "text": "3 images missing alt text — hurts SEO and accessibility" },
        { "section": "seo",         "text": "Title tag too generic — missing primary keyword opportunity" },
        { "section": "positioning", "text": "No differentiation messaging — visitors may not understand what makes you different" }
      ],
