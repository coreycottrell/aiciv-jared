<!-- ==================== DUO CHAT WIDGET (generic multi-AI pop-out overlay) ==================== -->
<!-- Self-contained widget for customer portals. Parameterized via data attributes.
     Uses trio-comms worker /trio/messages + /trio/message with Bearer token.
     No hardcoded names — participants auto-detected from message sender_id. -->

<!-- Usage: inject into any portal HTML with:
  <script src="duo-widget.html"
    data-duo-id="CUSTOMER_DUO_ID"
    data-token="PORTAL_AUTH_TOKEN"
    data-comms-url="https://trio-comms.in0v8.workers.dev">
  </script>
  OR: just include this HTML file directly and set window.DUO_CONFIG before it loads.
-->

<script>
(function(){
  // --- Configuration ---
  // Reads from: 1) data attributes on the script tag, 2) window.DUO_CONFIG, 3) defaults
  var scriptTag = document.currentScript || (function(){
    var scripts = document.getElementsByTagName('script');
    return scripts[scripts.length - 1];
  })();

  var cfg = window.DUO_CONFIG || {};
  var DUO_ID = scriptTag?.getAttribute('data-duo-id') || cfg.duo_id || '';
  var DUO_TOKEN = scriptTag?.getAttribute('data-token') || cfg.token || '';
  var COMMS_URL = scriptTag?.getAttribute('data-comms-url') || cfg.comms_url || 'https://trio-comms.in0v8.workers.dev';
  var POLL_MS = parseInt(scriptTag?.getAttribute('data-poll-ms') || cfg.poll_ms || '10000', 10);
  var WIDGET_TITLE = scriptTag?.getAttribute('data-title') || cfg.title || 'Duo Chat';

  if (!DUO_ID) console.warn('[duo-widget] No data-duo-id set. Messages will not load.');

  // --- Widget state ---
  var DUO = window.DUO_WIDGET = {
    participants: {},   // id -> {id, label, color}
    participantOrder: [],
    pollHandle: null,
    open: false,
    allMessages: [],
    searchQuery: '',
    _savedScrollY: 0,
    pendingMedia: null,
    isDragging: false
  };

  // Color palette for auto-assigning participant colors
  var COLORS = [
    '#2a93c1', '#f1420b', '#22c55e', '#a855f7', '#eab308',
    '#ec4899', '#06b6d4', '#f97316', '#8b5cf6', '#14b8a6'
  ];
  var HUMAN_COLOR = '#ffffff';

  function getParticipant(senderId) {
    if (!senderId) return { id: 'unknown', label: 'Unknown', color: '#7a8aaa' };
    var key = senderId.toLowerCase();
    if (DUO.participants[key]) return DUO.participants[key];
    var idx = DUO.participantOrder.length;
    var p = {
      id: key,
      label: senderId.charAt(0).toUpperCase() + senderId.slice(1),
      color: COLORS[idx % COLORS.length]
    };
    DUO.participants[key] = p;
    DUO.participantOrder.push(key);
    updateHeaderDots();
    return p;
  }

  function updateHeaderDots() {
    var dotsEl = document.getElementById('dw-dots');
    if (!dotsEl) return;
    dotsEl.innerHTML = DUO.participantOrder.map(function(id) {
      var p = DUO.participants[id];
      return '<span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:' + dwEscape(p.color) + ';"></span>';
    }).join('');
  }

  // --- Auth ---
  function dwToken() {
    return DUO_TOKEN || '';
  }

  function dwAuthHeaders(extra) {
    var h = Object.assign({}, extra || {});
    var t = dwToken();
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }

  // --- Helpers ---
  function dwEscape(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function dwFmtTs(iso) {
    try { return new Date(iso).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }); }
    catch(e) { return ''; }
  }

  // --- Markdown renderer ---
  function dwLinkify(s) {
    var raw = String(s || '');
    var codeBlocks = [];
    var h = raw.replace(/```(\w+)?\n?([\s\S]*?)```/g, function(m, lang, code) {
      var langClass = lang ? ' class="language-' + lang.replace(/[^a-zA-Z0-9]/g, '') + '"' : '';
      var safeCode = dwEscape(code.replace(/\n$/, ''));
      var idx = codeBlocks.length;
      codeBlocks.push('<pre class="dw-code-block"><code' + langClass + '>' + safeCode + '</code></pre>');
      return '\0CB' + idx + '\0';
    });

    h = dwEscape(h);
    h = h.replace(/`([^`\n]+)`/g, '<code class="dw-inline-code">$1</code>');
    h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
    h = h.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    h = h.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
    h = h.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
    h = h.replace(/^### (.+)$/gm, '<div class="dw-h3">$1</div>');
    h = h.replace(/^## (.+)$/gm, '<div class="dw-h2">$1</div>');
    h = h.replace(/^# (.+)$/gm, '<div class="dw-h1">$1</div>');
    h = h.replace(/^&gt; (.+)$/gm, '<div class="dw-blockquote">$1</div>');
    h = h.replace(/^(?:[-*]) (.+)$/gm, '<div class="dw-li">$1</div>');
    h = h.replace(/^(\d+)\. (.+)$/gm, '<div class="dw-li">$1. $2</div>');
    h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener" style="color:#2a93c1;text-decoration:underline;">$1</a>');
    h = h.replace(/(?<!["=])(https?:\/\/[^\s<]+)/g,
      '<a href="$1" target="_blank" rel="noopener" style="color:#2a93c1;text-decoration:underline;">$1</a>');
    h = h.replace(/\n/g, '<br>');
    h = h.replace(/\0CB(\d+)\0/g, function(m, idx) { return codeBlocks[parseInt(idx, 10)] || ''; });
    return h;
  }

  // --- Mention highlight ---
  function dwEmphasizeMentions(html) {
    return html.replace(/(^|[\s>])@(\w+)\b/gi, function(m, pre, who) {
      return pre + '<strong style="color:#fff;background:rgba(255,255,255,0.10);padding:1px 5px;border-radius:4px;">@' + who.toLowerCase() + '</strong>';
    });
  }

  // --- Media rendering ---
  function dwRenderMedia(message) {
    var refs = message.media_refs;
    if (typeof refs === 'string') {
      try { refs = JSON.parse(refs); } catch(e) { refs = []; }
    }
    if (!refs || !Array.isArray(refs) || refs.length === 0) return '';
    return refs.map(function(media) {
      var url = dwEscape(media.url || '');
      var name = dwEscape(media.original_name || 'file');
      if (media.mime && media.mime.startsWith('image/')) {
        return '<img src="' + url + '" class="dw-msg-img" loading="lazy" onclick="window.open(\'' + url + '\',\'_blank\')" alt="' + name + '" />';
      } else {
        return '<a href="' + url + '" target="_blank" class="dw-file-link">' + name + '</a>';
      }
    }).join('');
  }

  // --- Search ---
  function dwFilterMessages(messages) {
    if (!DUO.searchQuery) return messages;
    var q = DUO.searchQuery.toLowerCase();
    return messages.filter(function(m) {
      var from = (m.from || m.sender_id || '').toLowerCase();
      var content = (m.content || '').toLowerCase();
      return from.includes(q) || content.includes(q);
    });
  }

  // --- Pin / Bookmark / Reactions (localStorage, scoped by duo_id) ---
  function _storageKey(prefix) { return prefix + '_' + DUO_ID; }

  function _getPinnedIds() {
    try { return JSON.parse(localStorage.getItem(_storageKey('duoPins')) || '[]'); } catch(e) { return []; }
  }
  function _getBookmarkedIds() {
    try { return JSON.parse(localStorage.getItem(_storageKey('duoBookmarks')) || '[]'); } catch(e) { return []; }
  }
  function _getReactions(id) {
    try { return JSON.parse(localStorage.getItem(_storageKey('duoReact_') + id) || '[]'); } catch(e) { return []; }
  }

  window.duoTogglePin = function(id) {
    var pins = _getPinnedIds();
    var idx = pins.indexOf(id);
    if (idx >= 0) pins.splice(idx, 1); else pins.push(id);
    localStorage.setItem(_storageKey('duoPins'), JSON.stringify(pins));
    dwRenderUnified(DUO.allMessages);
  };

  window.duoShowPins = function() {
    var pins = _getPinnedIds();
    if (!pins.length) { alert('No pinned messages yet. Click "pin" on any message.'); return; }
    DUO.searchQuery = '';
    var pinned = DUO.allMessages.filter(function(m) { return pins.includes(m.id); });
    dwRenderUnified(pinned);
    var input = document.getElementById('dw-search');
    if (input) input.value = 'Pinned messages';
    _dwShowFilterBanner('Pinned messages', pins.length);
  };

  window.duoToggleBookmark = function(id) {
    var bms = _getBookmarkedIds();
    var idx = bms.indexOf(id);
    if (idx >= 0) bms.splice(idx, 1); else bms.push(id);
    localStorage.setItem(_storageKey('duoBookmarks'), JSON.stringify(bms));
    dwRenderUnified(DUO.allMessages);
  };

  window.duoShowBookmarks = function() {
    var bms = _getBookmarkedIds();
    if (!bms.length) { alert('No bookmarks yet.'); return; }
    var saved = DUO.allMessages.filter(function(m) { return bms.includes(m.id); });
    dwRenderUnified(saved);
    var input = document.getElementById('dw-search');
    if (input) input.value = 'Bookmarked messages';
    _dwShowFilterBanner('Bookmarked messages', bms.length);
  };

  window.duoReact = function(id, emoji) {
    var key = _storageKey('duoReact_') + id;
    var reactions = _getReactions(id);
    var idx = reactions.indexOf(emoji);
    if (idx >= 0) reactions.splice(idx, 1); else reactions.push(emoji);
    localStorage.setItem(key, JSON.stringify(reactions));
    dwRenderUnified(DUO.allMessages);
  };

  function _dwShowFilterBanner(label, count) {
    var banner = document.getElementById('dw-filter-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'dw-filter-banner';
      banner.style.cssText = 'padding:8px 16px;background:rgba(42,147,193,0.12);border-bottom:1px solid rgba(42,147,193,0.2);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#2a93c1;font-weight:600';
      var feed = document.getElementById('dw-feed-unified');
      if (feed && feed.parentElement) feed.parentElement.insertBefore(banner, feed);
    }
    banner.innerHTML = '<span>' + dwEscape(label) + ' (' + count + ')</span><button onclick="window.duoClearSearch();var b=document.getElementById(\'dw-filter-banner\');if(b)b.remove()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">Back to all</button>';
    banner.style.display = 'flex';
  }

  // --- Copy / Reply ---
  window.duoCopyMessage = function(id) {
    var msg = DUO.allMessages.find(function(m) { return m.id === id; });
    if (!msg) return;
    navigator.clipboard.writeText(msg.content || '').then(function() {
      var el = document.querySelector('[data-msg-id="' + id + '"] .dw-copy-btn');
      if (el) { el.textContent = 'copied'; setTimeout(function() { el.textContent = 'copy'; }, 1500); }
    });
  };

  window.duoReplyTo = function(id) {
    var msg = DUO.allMessages.find(function(m) { return m.id === id; });
    if (!msg) return;
    var from = msg.from || msg.sender_id || 'unknown';
    var snippet = (msg.content || '').replace(/\n/g, ' ').slice(0, 120);
    var ta = document.getElementById('dw-input');
    if (!ta) return;
    var prefix = '> @' + from + ': ' + snippet + ((msg.content || '').length > 120 ? '...' : '') + '\n\n';
    ta.value = prefix + (ta.value || '');
    ta.focus();
    ta.selectionStart = ta.selectionEnd = ta.value.length;
  };

  // --- Render messages ---
  function dwRenderUnified(messages) {
    DUO.allMessages = messages;
    var feed = document.getElementById('dw-feed-unified');
    if (!feed) return;
    var atBottom = Math.abs(feed.scrollTop + feed.clientHeight - feed.scrollHeight) < 40;

    var filtered = dwFilterMessages(messages);

    if (!filtered.length) {
      var emptyText = DUO.searchQuery
        ? 'No messages match "' + dwEscape(DUO.searchQuery) + '".'
        : 'No messages yet. Send something to start the conversation.';
      feed.innerHTML = '<div class="dw-empty">' + emptyText + '</div>';
      return;
    }

    feed.innerHTML = filtered.map(function(m) {
      var senderId = (m.from || m.sender_id || '').toLowerCase();
      var participant = getParticipant(senderId);
      // Determine message alignment: portal user's messages go right, others go left.
      // Set DUO_CONFIG.my_id to the portal user's sender_id to align their messages right.
      var myId = (cfg.my_id || '').toLowerCase();
      var side = (myId && senderId === myId) ? 'right' : 'left';
      var label = participant.label;
      var color = participant.color;

      var body = dwEmphasizeMentions(dwLinkify(m.content || ''));
      if (DUO.searchQuery && DUO.searchQuery.length > 1) {
        try {
          var safeQ = DUO.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          body = body.replace(new RegExp('(' + safeQ + ')', 'gi'),
            '<mark style="background:rgba(234,179,8,0.35);color:#fff;padding:1px 2px;border-radius:2px">$1</mark>');
        } catch(e) {}
      }

      var mediaHtml = dwRenderMedia(m);
      var msgId = m.id || '';
      var isPinned = _getPinnedIds().includes(msgId);
      var isBookmarked = _getBookmarkedIds().includes(msgId);
      var reactions = _getReactions(msgId);
      var bodyLen = (m.content || '').length;
      var isLong = bodyLen > 400;
      var collapsed = isLong ? ' dw-collapsed' : '';
      var fullTs = m.timestamp ? new Date(m.timestamp).toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : '';

      return '<div class="dw-msg dw-msg-' + side + (isPinned ? ' dw-pinned' : '') + '" data-msg-id="' + dwEscape(msgId) + '">' +
        '<div class="dw-msg-meta">' +
          '<span class="dw-sender" style="color:' + color + ';">' + dwEscape(label) + '</span>' +
          '<span class="dw-time" title="' + dwEscape(fullTs) + '">' + dwEscape(dwFmtTs(m.timestamp)) + '</span>' +
          (isPinned ? '<span class="dw-pin-badge">pinned</span>' : '') +
        '</div>' +
        '<div class="dw-msg-body' + collapsed + '" style="border-color:' + color + '66;" ondblclick="duoCopyMessage(\'' + dwEscape(msgId) + '\')">' + body + mediaHtml + '</div>' +
        (isLong ? '<button class="dw-expand-btn" onclick="this.previousElementSibling.classList.toggle(\'dw-collapsed\');this.textContent=this.previousElementSibling.classList.contains(\'dw-collapsed\')?\'Show more\':\'Show less\'">Show more</button>' : '') +
        '<div class="dw-reactions">' +
          '<button class="dw-react-btn' + (reactions.includes('\uD83D\uDC4D') ? ' active' : '') + '" onclick="duoReact(\'' + dwEscape(msgId) + '\',\'\uD83D\uDC4D\')">\uD83D\uDC4D' + (reactions.filter(function(r){return r==='\uD83D\uDC4D';}).length || '') + '</button>' +
          '<button class="dw-react-btn' + (reactions.includes('\uD83D\uDD25') ? ' active' : '') + '" onclick="duoReact(\'' + dwEscape(msgId) + '\',\'\uD83D\uDD25\')">\uD83D\uDD25' + (reactions.filter(function(r){return r==='\uD83D\uDD25';}).length || '') + '</button>' +
          '<button class="dw-react-btn' + (reactions.includes('\u2705') ? ' active' : '') + '" onclick="duoReact(\'' + dwEscape(msgId) + '\',\'\u2705\')">\u2705' + (reactions.filter(function(r){return r==='\u2705';}).length || '') + '</button>' +
        '</div>' +
        '<div class="dw-msg-actions">' +
          '<button class="dw-copy-btn" onclick="duoCopyMessage(\'' + dwEscape(msgId) + '\')">copy</button>' +
          '<button class="dw-reply-btn" onclick="duoReplyTo(\'' + dwEscape(msgId) + '\')">reply</button>' +
          '<button class="dw-pin-btn" onclick="duoTogglePin(\'' + dwEscape(msgId) + '\')">' + (isPinned ? 'unpin' : 'pin') + '</button>' +
          '<button class="dw-bm-btn" onclick="duoToggleBookmark(\'' + dwEscape(msgId) + '\')">' + (isBookmarked ? 'bookmarked' : 'bookmark') + '</button>' +
        '</div>' +
      '</div>';
    }).join('');

    if (atBottom && !DUO.searchQuery) feed.scrollTop = feed.scrollHeight;
  }

  // --- API calls ---
  async function dwRefresh() {
    if (!DUO_ID || !DUO_TOKEN) return;
    try {
      var url = COMMS_URL + '/trio/messages?limit=200&trio_id=' + encodeURIComponent(DUO_ID);
      var res = await fetch(url, {
        headers: dwAuthHeaders()
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var rawMessages = Array.isArray(data) ? data : (data.messages || []);
      var messages = rawMessages.slice().sort(function(a, b) { return a.timestamp < b.timestamp ? -1 : 1; });
      dwRenderUnified(messages);
    } catch(e) {
      console.warn('[duo-widget] refresh failed', e);
      var st = document.getElementById('dw-status');
      if (st && !DUO._warned) {
        st.style.color = '#ef4444';
        st.textContent = 'Connection error: ' + (e.message || e);
        DUO._warned = true;
      }
    }
  }

  async function dwSend() {
    var ta = document.getElementById('dw-input');
    var status = document.getElementById('dw-status');
    var content = (ta.value || '').trim();
    if (!content) return;
    status.textContent = 'Sending...';
    status.style.color = '#7a8aaa';
    try {
      var payload = { content: content, trio_id: DUO_ID };
      var res = await fetch(COMMS_URL + '/trio/message', {
        method: 'POST',
        headers: dwAuthHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        var detail = 'HTTP ' + res.status;
        try { var j = await res.json(); if (j.error) detail = j.error; } catch(e) {}
        throw new Error(detail);
      }
      ta.value = '';
      status.style.color = '#22c55e';
      status.textContent = 'Sent.';
      setTimeout(function() { status.textContent = ''; }, 3500);
      await dwRefresh();
    } catch(e) {
      status.style.color = '#ef4444';
      status.textContent = 'Failed: ' + e.message;
    }
  }

  // --- Open / Close ---
  window.openDuoWidget = function() {
    DUO.open = true;
    var m = document.getElementById('duo-widget-modal');
    if (m) m.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.position = 'fixed';
    document.body.style.width = '100%';
    document.body.style.top = '-' + window.scrollY + 'px';
    DUO._savedScrollY = window.scrollY;
    dwRefresh();
    if (DUO.pollHandle) clearInterval(DUO.pollHandle);
    DUO.pollHandle = setInterval(dwRefresh, POLL_MS);
    setTimeout(function() { var i = document.getElementById('dw-input'); if (i) i.focus(); }, 120);
  };

  window.closeDuoWidget = function() {
    DUO.open = false;
    var m = document.getElementById('duo-widget-modal');
    if (m) m.classList.remove('open');
    document.body.style.overflow = '';
    document.documentElement.style.overflow = '';
    document.body.style.position = '';
    document.body.style.width = '';
    document.body.style.top = '';
    window.scrollTo(0, DUO._savedScrollY || 0);
    if (DUO.pollHandle) { clearInterval(DUO.pollHandle); DUO.pollHandle = null; }
  };

  window.duoSend = dwSend;
  window.duoRefresh = dwRefresh;

  window.duoClearSearch = function() {
    var input = document.getElementById('dw-search');
    if (input) { input.value = ''; DUO.searchQuery = ''; dwRenderUnified(DUO.allMessages); }
    var banner = document.getElementById('dw-filter-banner');
    if (banner) banner.remove();
  };

  window.duoScrollBottom = function() {
    var feed = document.getElementById('dw-feed-unified');
    if (feed) feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
  };

  // --- Keyboard ---
  document.addEventListener('keydown', function(e) {
    if (!DUO.open) return;
    if (e.key === 'Escape') { window.closeDuoWidget(); return; }
    if (e.target && e.target.id === 'dw-input' && e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); dwSend();
    }
  });

  // --- Search wiring ---
  function dwSetupSearch() {
    var input = document.getElementById('dw-search');
    if (!input) { setTimeout(dwSetupSearch, 300); return; }
    input.addEventListener('input', function() {
      DUO.searchQuery = input.value.trim();
      if (DUO.allMessages.length) dwRenderUnified(DUO.allMessages);
    });
  }
  dwSetupSearch();

  // --- Scroll-to-bottom button ---
  function setupScrollBottom() {
    var feed = document.getElementById('dw-feed-unified');
    var btn = document.getElementById('dw-scroll-bottom');
    if (!feed || !btn) { setTimeout(setupScrollBottom, 300); return; }
    function check() {
      var atBottom = Math.abs(feed.scrollTop + feed.clientHeight - feed.scrollHeight) < 40;
      btn.style.display = atBottom ? 'none' : 'flex';
    }
    feed.addEventListener('scroll', check);
    check();
  }
  setupScrollBottom();

  // --- Drag-and-drop on textarea ---
  function setupDragDrop() {
    var ta = document.getElementById('dw-input');
    if (!ta) { setTimeout(setupDragDrop, 300); return; }
    ['dragenter','dragover'].forEach(function(ev) {
      ta.addEventListener(ev, function(e) {
        e.preventDefault(); e.stopPropagation();
        ta.classList.add('drag-over');
      });
    });
    ['dragleave','drop'].forEach(function(ev) {
      ta.addEventListener(ev, function(e) {
        e.preventDefault(); e.stopPropagation();
        ta.classList.remove('drag-over');
      });
    });
    ta.addEventListener('drop', function(e) {
      e.preventDefault();
      var dt = e.dataTransfer;
      if (!dt) return;
      var appendText = '';
      var url = dt.getData('text/uri-list') || dt.getData('URL');
      if (url) appendText = url;
      else if (dt.getData('text/plain')) appendText = dt.getData('text/plain');
      if (appendText) {
        var cur = ta.value || '';
        ta.value = cur + (cur && !cur.endsWith(' ') && !cur.endsWith('\n') ? ' ' : '') + appendText;
        ta.focus();
      }
    });
  }
  setupDragDrop();

})();
</script>

<style>
#duo-widget-modal{
  position:fixed;inset:0;background:rgba(4,6,12,0.72);backdrop-filter:blur(6px);
  z-index:99999;display:none;align-items:center;justify-content:center;padding:24px;
  overflow:hidden;touch-action:none;
}
#duo-widget-modal.open{display:flex;}
#duo-widget-modal .dw-shell{
  width:min(820px,100%);height:min(82vh,820px);background:#0d1121;
  border:1px solid rgba(42,147,193,0.25);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);color:#e8eaf6;

<div id="duo-widget-modal" role="dialog" aria-modal="true" aria-label="Duo Chat">
  <div class="dw-shell">
    <div class="dw-header">
      <div class="dw-title">
        <span class="dw-dots" id="dw-dots"></span>
        <span id="dw-title-text">Duo Chat</span>
      </div>
      <button class="dw-close" onclick="closeDuoWidget()" aria-label="Close">&times;</button>
    </div>
    <div class="dw-search-row">
      <input type="text" id="dw-search" placeholder="Search messages by @name or keyword..." autocomplete="off">
      <button class="dw-filter-btn" onclick="window.duoShowPins()" title="Pinned messages">pin</button>
      <button class="dw-filter-btn" onclick="window.duoShowBookmarks()" title="Bookmarks">saved</button>
      <button class="dw-search-clear" onclick="window.duoClearSearch()" title="Clear">&times;</button>
    </div>
    <div class="dw-feed-wrap">
      <div class="dw-feed" id="dw-feed-unified"></div>
    </div>
    <button id="dw-scroll-bottom" onclick="window.duoScrollBottom()" title="Jump to latest" style="display:none">&darr;</button>
    <div class="dw-footer">
      <div class="dw-input-row">
        <textarea id="dw-input" placeholder="Type a message. Enter to send, Shift+Enter for newline." rows="1"></textarea>
        <button id="dw-send" onclick="duoSend()">Send</button>
      </div>
      <div class="dw-status-row">
        <span id="dw-status"></span>
        <span style="font-size:10px;opacity:0.7;">Polling every <span id="dw-poll-interval"></span>s</span>
      </div>
    </div>
  </div>
</div>

<script>
// Set dynamic values after DOM is ready
(function(){
  var titleEl = document.getElementById('dw-title-text');
  var pollEl = document.getElementById('dw-poll-interval');
  var cfg = window.DUO_CONFIG || {};
  var scriptTag = document.currentScript || document.querySelector('script[data-duo-id]');
  var title = (scriptTag && scriptTag.getAttribute('data-title')) || cfg.title || 'Duo Chat';
  var pollMs = parseInt((scriptTag && scriptTag.getAttribute('data-poll-ms')) || cfg.poll_ms || '10000', 10);
  if (titleEl) titleEl.textContent = title;
  if (pollEl) pollEl.textContent = Math.round(pollMs / 1000);
})();
</script>
