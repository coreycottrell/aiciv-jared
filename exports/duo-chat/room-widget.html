<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Conversation — PureBrain</title>
<meta name="robots" content="noindex,nofollow">
<!--
  PureBrain DUO/TRIO chat widget — Thread B Phase 1, Days 6-7
  Build date: 2026-05-13
  Source pattern: /home/jared/purebrain_portal/portal-pb-styled.html (upload-mode-modal + compression fns)

  This file is the standalone widget. It expects:
    - window.ROOM_CONFIG = { room_id: "room_cust_X", api_base: "https://trio-comms.in0v8.workers.dev" }
    - Caller injects an Authorization Bearer (human portal session) via the
      `getAuthToken()` function (default: reads from localStorage.social_session
      OR document.cookie social_session=…).

  Hosting: copy this file into:
    - purebrain_portal/static/room-widget.html  (legacy portal)
    - app.purebrain.ai/room (customer-facing CF Pages route, conditional on seat_count >= 2)

  Conditional render: the sidebar nav link to /room should ONLY appear when the
  customer has seat_count >= 2 (server-rendered gate; widget itself is opaque
  to that — 403 fallback covers misconfig).
-->
<style>
  :root {
    --bg: #0a0c14;
    --surface: #141820;
    --surface2: #1a1f2b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(42,147,193,0.25);
    --text: #f2f4f8;
    --text-mid: #b9c2d0;
    --text-dim: #6f7a8d;
    --accent: #2a93c1;
    --accent-hi: #3aa8d8;
    --orange: #f1420b;
    --green: #2dd4a1;
    --yellow: #f5c343;
    --red: #f15a5a;
    --radius: 8px;
    --font-heading: "Oswald","Inter",system-ui,sans-serif;
    --font-body: "Inter",system-ui,sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: var(--font-body); height: 100%; overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  /* ============ HEADER ============ */
  .pb-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pb-header h1 {
    font-family: var(--font-heading); font-weight: 600;
    font-size: 17px; letter-spacing: 0.04em; text-transform: uppercase;
    margin: 0; color: var(--text);
  }
  .pb-header h1 .accent { color: var(--accent); }
  .pb-header h1 .orange { color: var(--orange); }
  .room-meta {
    font-family: var(--font-body); font-size: 12px;
    color: var(--text-dim); display: flex; align-items: center; gap: 14px;
  }

  /* ============ PRESENCE STRIP ============ */
  .presence-strip {
    display: flex; gap: 14px; padding: 10px 22px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    flex-wrap: wrap; flex-shrink: 0;
  }
  .presence-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 10px 4px 7px;
    background: rgba(255,255,255,0.04); border-radius: 12px;
    font-size: 12px; color: var(--text-mid);
  }
  .presence-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); box-shadow: 0 0 6px currentColor;
  }
  .presence-dot.online { background: var(--green); }
  .presence-dot.stale  { background: var(--yellow); }
  .presence-dot.offline{ background: var(--red); }
  .presence-pill.me { background: rgba(42,147,193,0.18); color: var(--accent); }

  /* ============ MESSAGE LIST ============ */
  .msg-list {
    flex: 1; overflow-y: auto; padding: 18px 22px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  .msg-list::-webkit-scrollbar { width: 8px; }
  .msg-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex; flex-direction: column; gap: 4px;
    max-width: 70%;
  }
  .msg.from-me { align-self: flex-end; }
  .msg-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim);
  }
  .msg-sender {
    font-family: var(--font-heading); font-weight: 600;
    color: var(--accent); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .msg.from-me .msg-sender { color: var(--orange); }
  .msg-bubble {
    background: var(--surface); padding: 10px 14px;
    border-radius: var(--radius); border: 1px solid var(--border);
    line-height: 1.5; font-size: 14px;
    word-wrap: break-word; white-space: pre-wrap;
  }
  .msg.from-me .msg-bubble {
    background: rgba(42,147,193,0.12); border-color: var(--border2);
  }

  .msg-attach { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
  .attach-image {
    max-width: 360px; max-height: 280px; border-radius: 6px;
    border: 1px solid var(--border); cursor: zoom-in; display: block;
  }
  .attach-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; color: var(--text-mid); max-width: 320px;
  }
  .attach-card .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .attach-card .fsize { color: var(--text-dim); font-size: 11px; flex-shrink: 0; }
  .attach-card a { color: var(--accent); text-decoration: none; flex-shrink: 0; font-weight: 600; }
  .attach-card a:hover { color: var(--accent-hi); }
  .attach-audio { width: 100%; max-width: 360px; margin-top: 4px; }
  .badge-original {
    display: inline-block; background: rgba(241,66,11,0.15); color: var(--orange);
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 3px; padding: 1px 5px; margin-left: 6px; vertical-align: middle;
  }

  /* ============ COMPOSER ============ */
  .composer {
    display: flex; align-items: flex-end; gap: 10px;
    padding: 14px 22px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .composer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 160px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; font: 14px/1.5 var(--font-body);
    outline: none; transition: border 0.15s;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .composer button, .composer label {
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius); padding: 12px 18px; cursor: pointer;
    font-family: var(--font-heading); font-weight: 600; font-size: 13px;
    letter-spacing: 0.04em; transition: background 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .composer button:hover, .composer label:hover { background: var(--accent-hi); }
  .composer button:disabled { background: var(--text-dim); cursor: not-allowed; }
  .composer label.upload-btn {
    background: transparent; color: var(--accent); border: 1px solid var(--accent);
  }
  .composer input[type=file] { display: none; }

  /* ============ UPLOAD MODE MODAL (compression toggle) ============ */
  /* Ported from /home/jared/purebrain_portal/portal-pb-styled.html lines 5660-5840 */
  #upload-mode-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; transition: opacity 0.18s;
  }
  #upload-mode-overlay.visible { display: flex; opacity: 1; }
  #upload-mode-modal {
    background: #141820; border: 1px solid #2a93c1;
    border-radius: 12px; padding: 22px 24px 20px;
    width: 360px; max-width: calc(100vw - 32px);
    box-shadow:
      0 0 0 1px rgba(42,147,193,0.12),
      0 12px 40px rgba(0,0,0,0.7),
      0 0 32px rgba(42,147,193,0.10);
    animation: uploadModalIn 0.18s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes uploadModalIn {
    0%   { opacity:0; transform: translateY(8px) scale(0.97); }
    100% { opacity:1; transform: translateY(0) scale(1); }
  }
  #upload-mode-modal .upm-title {
    font-family: var(--font-heading); font-size: 14px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; color: #ffffff;
    margin-bottom: 4px;
  }
  #upload-mode-modal .upm-subtitle {
    font-family: var(--font-body); font-size: 12px;
    color: var(--text-dim); margin-bottom: 18px; line-height: 1.5;
  }
  #upload-mode-modal .upm-subtitle strong { color: var(--text-mid); font-weight: 500; }
  #upload-mode-modal .upm-size-row {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  #upload-mode-modal .upm-size-chip {
    flex: 1; background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 8px; text-align: center;
  }
  #upload-mode-modal .upm-size-chip .upm-size-label {
    font-family: var(--font-body); font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    display: block; margin-bottom: 2px;
  }
  #upload-mode-modal .upm-size-chip .upm-size-val {
    font-family: var(--font-heading); font-size: 13px; font-weight: 600; color: var(--text);
  }
  #upload-mode-modal .upm-size-chip.compressed .upm-size-val { color: var(--accent); }
  #upload-mode-modal .upm-badge-recommended {
    display: inline-block;
    background: rgba(42,147,193,0.15); color: var(--accent);
    font-family: var(--font-body); font-size: 9px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 3px; padding: 1px 5px; margin-top: 3px;
  }
  #upload-mode-modal .upm-btns { display: flex; gap: 10px; }
  #upload-mode-modal .upm-btn {
    flex: 1; padding: 10px 8px 9px; border-radius: 8px;
    font-family: var(--font-heading); font-size: 13px; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s ease;
    text-align: center; line-height: 1.3;
  }
  #upload-mode-modal .upm-btn-original {
    background: transparent; border: 1px solid #2a93c1; color: #2a93c1;
  }
  #upload-mode-modal .upm-btn-original:hover {
    background: rgba(42,147,193,0.12); box-shadow: 0 0 12px rgba(42,147,193,0.2);
  }
  #upload-mode-modal .upm-btn-compressed {
    background: #2a93c1; border: 1px solid #2a93c1; color: #ffffff;
  }
  #upload-mode-modal .upm-btn-compressed:hover {
    background: #3aa8d8; box-shadow: 0 0 16px rgba(42,147,193,0.35);
  }
  #upload-mode-modal .upm-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; bottom: 80px; right: 22px;
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 16px; border-radius: 8px;
    font-size: 13px; opacity: 0; transform: translateY(10px);
    transition: all 0.2s; z-index: 2000;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

<header class="pb-header">
  <h1><span class="accent">PUREBR</span><span class="orange">AI</span><span class="accent">N</span> Conversation</h1>
  <div class="room-meta">
    <span id="room-id-label">—</span>
    <span id="poll-status" title="Polling cadence">●</span>
  </div>
</header>

<div class="presence-strip" id="presence-strip">
  <span class="presence-pill"><span class="presence-dot offline"></span>Loading members…</span>
</div>

<main class="msg-list" id="msg-list">
  <div class="empty-state">Connecting…</div>
</main>

<div class="composer">
  <label class="upload-btn" for="file-input" title="Attach a file (images, audio, docs)">
    + File
  </label>
  <input type="file" id="file-input" accept="image/*,audio/*,application/pdf,application/json,text/*,.txt,.md,.csv,.docx">
  <textarea id="composer-text" placeholder="Type your message…" rows="1"></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<!-- Upload Mode Modal (compression toggle, ported from portal-pb-styled.html) -->
<div id="upload-mode-overlay" role="dialog" aria-modal="true" aria-label="Choose upload quality">
  <div id="upload-mode-modal">
    <div class="upm-title">How would you like to send this?</div>
    <div class="upm-subtitle" id="upm-subtitle">Preparing...</div>
    <div class="upm-size-row">
      <div class="upm-size-chip original">
        <span class="upm-size-label">Original</span>
        <span class="upm-size-val" id="upm-size-original">—</span>
      </div>
      <div class="upm-size-chip compressed">
        <span class="upm-size-label">Compressed</span>
        <span class="upm-size-val" id="upm-size-compressed">—</span>
        <div class="upm-badge-recommended" id="upm-badge-recommended">Recommended</div>
      </div>
    </div>
    <div class="upm-btns">
      <button class="upm-btn upm-btn-original" id="upm-btn-original">Original Quality</button>
      <button class="upm-btn upm-btn-compressed" id="upm-btn-compressed">Compressed</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/room-widget.js"></script>
</body>
</html>
