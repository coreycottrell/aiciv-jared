<style>
/* Brain animation background - fixed position */
.pb-brain-bg {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('https://purebrain.ai/wp-content/uploads/2026/02/Pure-Brain-Vid-3.gif') center center no-repeat;
    background-size: cover;
    opacity: 0.3;
    z-index: -2;
    pointer-events: none;
}

/* Dark gradient overlay */
.pb-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(10,10,10,0.8) 0%, rgba(20,35,60,0.7) 50%, rgba(10,10,10,0.85) 100%);
    z-index: -1;
    pointer-events: none;
}

/* Pure Tech Icon - top right */
.pb-icon {
    position: fixed;
    top: 80px;
    right: 25px;
    width: 50px;
    height: 50px;
    z-index: 9999;
    animation: pb-pulse 3s ease-in-out infinite;
}

.pb-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(42,147,193,0.6));
}

@keyframes pb-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); filter: drop-shadow(0 4px 20px rgba(42,147,193,0.9)); }
}
</style>

<!-- Background elements -->
<div class="pb-brain-bg"></div>
<div class="pb-overlay"></div>
<div class="pb-icon">
    <img src="https://purebrain.ai/wp-content/uploads/2026/02/cropped-cropped-MA1.BI-1.2.4-002-211107-Icon-PT.png" alt="Pure Technology">
</div>
