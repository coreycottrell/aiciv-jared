<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gleb Night 36 - Hexagonal Bokeh DoF + HDRI + Text Refraction</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060606; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#info {
  position: fixed; bottom: 16px; left: 16px; color: rgba(255,255,255,0.4);
  font: 12px/1.4 system-ui; z-index: 10; pointer-events: none;
}
</style>
</head>
<body>
<div id="info">Night 36 | Hex Bokeh DoF + HDRI + SDF Text Behind Glass</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ============================================================
// SCENE SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x060610, 0.06);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.3, 4.2);
camera.lookAt(0, 0, 0);

// ============================================================
// HDRI LOADING (Poly Haven via CDN - Night 35 goal #3)
// ============================================================
const pmremGenerator = new THREE.PMREMGenerator(renderer);
let envMap = null;

// Use a studio HDRI from Poly Haven CDN
new RGBELoader()
  .setPath('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/')
  .load('studio_small_09_1k.hdr', (texture) => {
    envMap = pmremGenerator.fromEquirectangular(texture).texture;
    scene.environment = envMap;
    scene.background = null; // Keep dark background
    texture.dispose();
    pmremGenerator.dispose();
    console.log('HDRI loaded: studio_small_09');
  }, undefined, (err) => {
    console.warn('HDRI load failed, using fallback lighting');
    setupFallbackLighting();
  });

function setupFallbackLighting() {
  const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
  dirLight.position.set(3, 4, 2);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0x2a93c1, 0.8);
  fillLight.position.set(-2, 1, -1);
  scene.add(fillLight);
}

// Ambient fill
scene.add(new THREE.AmbientLight(0x111122, 0.3));

// Key light
const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(3, 4, 2);
scene.add(keyLight);

// Brand-colored fill
const fillLight = new THREE.DirectionalLight(0x2a93c1, 0.6);
fillLight.position.set(-2, 1, -1);
scene.add(fillLight);

// Orange accent rim
const rimLight = new THREE.DirectionalLight(0xf1420b, 0.4);
rimLight.position.set(0, -1, -3);
scene.add(rimLight);

// ============================================================
// CONSTANTS
// ============================================================
const PB_BLUE = new THREE.Color(0x2a93c1);
const PB_ORANGE = new THREE.Color(0xf1420b);

// ============================================================
// MAIN GLASS SPHERE - Dual-layer (Night 35 technique)
// ============================================================

// Inner core - MeshPhysicalMaterial with transmission
const innerGeo = new THREE.SphereGeometry(0.85, 128, 128);
const innerMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.95,
  thickness: 1.2,
  roughness: 0.02,
  ior: 1.5,
  clearcoat: 1.0,
  clearcoatRoughness: 0.04,
  color: PB_BLUE.clone().multiplyScalar(0.8),
  attenuationColor: PB_BLUE,
  attenuationDistance: 1.5,
  side: THREE.DoubleSide,
  envMapIntensity: 2.0,
});
const innerSphere = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerSphere);

// Outer shell - ShaderMaterial with vertex displacement
const outerShaderMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uNoiseFreq: { value: 1.8 },
    uAmplitude: { value: 0.18 },
    uColor: { value: PB_BLUE },
    uFresnelPower: { value: 2.5 },
  },
  vertexShader: `
    uniform float uTime;
    uniform float uNoiseFreq;
    uniform float uAmplitude;
    varying vec3 vNormal;
    varying vec3 vViewPosition;
    varying float vDisplacement;

    // Simplex-like noise (4-octave FBM)
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

    float snoise(vec3 v) {
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute(permute(permute(
        i.z + vec4(0.0, i1.z, i2.z, 1.0))
        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
        + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
      p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m * m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }

    float fbm(vec3 p, float t) {
      float val = 0.0;
      float amp = 0.5;
      float freq = 1.0;
      for (int i = 0; i < 4; i++) {
        val += amp * snoise(p * freq + vec3(t * 0.3, t * 0.2, t * 0.1));
        amp *= 0.5;
        freq *= 2.1;
      }
      return val;
    }

    void main() {
      // Dual-frequency breathing
      float breath = sin(uTime * 0.8) * 0.6 + sin(uTime * 1.84) * 0.15;
      breath = breath * 0.5 + 0.5;
      float amp = uAmplitude * (0.6 + breath * 0.4);

      float disp = fbm(position * uNoiseFreq, uTime * 0.4);
      vDisplacement = disp;

      vec3 displaced = position + normal * disp * amp;

      // Recalculate normal via neighbors
      float eps = 0.01;
      vec3 tangent = normalize(cross(normal, vec3(0.0, 1.0, 0.0)));
      if (length(tangent) < 0.001) tangent = normalize(cross(normal, vec3(1.0, 0.0, 0.0)));
      vec3 bitangent = normalize(cross(normal, tangent));

      vec3 neighbor1 = position + tangent * eps;
      vec3 neighbor2 = position + bitangent * eps;
      float d1 = fbm(neighbor1 * uNoiseFreq, uTime * 0.4);
      float d2 = fbm(neighbor2 * uNoiseFreq, uTime * 0.4);
      vec3 displaced1 = neighbor1 + normal * d1 * amp;
      vec3 displaced2 = neighbor2 + normal * d2 * amp;

      vNormal = normalize(cross(displaced1 - displaced, displaced2 - displaced));

      vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
      vViewPosition = -mvPosition.xyz;
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform float uFresnelPower;
    uniform float uTime;
    varying vec3 vNormal;
    varying vec3 vViewPosition;
    varying float vDisplacement;

    void main() {
      vec3 viewDir = normalize(vViewPosition);
      float fresnel = pow(1.0 - abs(dot(viewDir, vNormal)), uFresnelPower);

      // Color shift based on displacement
      vec3 baseColor = uColor;
      vec3 accentColor = vec3(0.945, 0.259, 0.043); // PB orange
      vec3 color = mix(baseColor, accentColor, smoothstep(0.3, 0.8, vDisplacement) * 0.3);

      // Shimmer
      float shimmer = sin(vDisplacement * 20.0 + uTime * 2.0) * 0.5 + 0.5;
      color += shimmer * 0.05;

      float alpha = fresnel * 0.45;
      gl_FragColor = vec4(color, alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const outerGeo = new THREE.SphereGeometry(1.05, 128, 128);
const outerSphere = new THREE.Mesh(outerGeo, outerShaderMat);
scene.add(outerSphere);

// ============================================================
// SDF-STYLE TEXT BEHIND GLASS (Night 35 goal #2 - approximation)
// ============================================================
// Create text using canvas texture behind the sphere
const textCanvas = document.createElement('canvas');
textCanvas.width = 1024;
textCanvas.height = 256;
const ctx = textCanvas.getContext('2d');
ctx.fillStyle = 'rgba(0,0,0,0)';
ctx.fillRect(0, 0, 1024, 256);
ctx.font = 'bold 120px system-ui, -apple-system, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
// Gradient text
const gradient = ctx.createLinearGradient(200, 0, 824, 0);
gradient.addColorStop(0, 'rgba(42,147,193,0.6)');
gradient.addColorStop(0.5, 'rgba(255,255,255,0.4)');
gradient.addColorStop(1, 'rgba(241,66,11,0.4)');
ctx.fillStyle = gradient;
ctx.fillText('PUREBRAIN', 512, 128);

const textTexture = new THREE.CanvasTexture(textCanvas);
textTexture.needsUpdate = true;

const textPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(3.5, 0.875),
  new THREE.MeshBasicMaterial({
    map: textTexture,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    opacity: 0.7,
  })
);
textPlane.position.z = -0.8; // Behind the sphere
scene.add(textPlane);

// ============================================================
// MAGNETIC FIELD LINES (Night 34 technique)
// ============================================================
const fieldLineGroup = new THREE.Group();
scene.add(fieldLineGroup);

for (let i = 0; i < 14; i++) {
  const angle = (i / 14) * Math.PI * 2;
  const radius = 1.8 + Math.random() * 0.6;
  const points = [];
  const segments = 50;
  for (let j = 0; j <= segments; j++) {
    const t = j / segments;
    const theta = angle + t * Math.PI * 0.4;
    const phi = (t - 0.5) * Math.PI * 0.8;
    points.push(new THREE.Vector3(
      Math.cos(theta) * radius * (1 + Math.sin(phi) * 0.3),
      Math.sin(phi) * 1.2,
      Math.sin(theta) * radius * (1 + Math.cos(phi) * 0.2)
    ));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const tubeGeo = new THREE.TubeGeometry(curve, 40, 0.005, 6, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color: i % 3 === 0 ? PB_ORANGE : PB_BLUE,
    transparent: true,
    opacity: 0.06 + Math.random() * 0.08,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  fieldLineGroup.add(tube);
}

// ============================================================
// ATMOSPHERIC PARTICLES (Night 35 technique)
// ============================================================
const particleCount = 2500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleAlphas = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 8;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 6;
  particlePositions[i * 3 + 2] = -1.5 - Math.random() * 4; // Behind subject
  particleSizes[i] = 0.5 + Math.random() * 2.5;
  particleAlphas[i] = 0.03 + Math.random() * 0.15;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: 0xaaddff,
  size: 1.5,
  transparent: true,
  opacity: 0.08,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============================================================
// GOD RAYS (Night 35 technique - radial blur post-process)
// ============================================================
const godRayLightGeo = new THREE.CircleGeometry(0.6, 32);
const godRayLightMat = new THREE.MeshBasicMaterial({
  color: 0x2a93c1,
  transparent: true,
  opacity: 0.9,
});
const godRayDisc = new THREE.Mesh(godRayLightGeo, godRayLightMat);
godRayDisc.position.set(0.5, 1.0, -2.5);
scene.add(godRayDisc);

// Occlusion scene
const occlusionScene = new THREE.Scene();
const occlusionLightClone = new THREE.Mesh(
  new THREE.CircleGeometry(0.6, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
occlusionLightClone.position.copy(godRayDisc.position);
occlusionScene.add(occlusionLightClone);

// Occlusion sphere (black)
const occSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.05, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
occlusionScene.add(occSphere);

const occlusionRT = new THREE.WebGLRenderTarget(
  Math.floor(window.innerWidth / 2),
  Math.floor(window.innerHeight / 2)
);

// Radial blur shader for god rays
const GodRayShader = {
  uniforms: {
    tDiffuse: { value: null },
    tGodRays: { value: occlusionRT.texture },
    uLightPos: { value: new THREE.Vector2(0.55, 0.65) },
    uExposure: { value: 0.22 },
    uDecay: { value: 0.96 },
    uDensity: { value: 0.85 },
    uWeight: { value: 0.58 },
    uSamples: { value: 60 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tGodRays;
    uniform vec2 uLightPos;
    uniform float uExposure;
    uniform float uDecay;
    uniform float uDensity;
    uniform float uWeight;
    uniform int uSamples;
    varying vec2 vUv;

    void main() {
      vec2 deltaTextCoord = vUv - uLightPos;
      deltaTextCoord *= 1.0 / float(uSamples) * uDensity;

      vec2 coord = vUv;
      float illumination = 0.0;
      float decay = 1.0;

      for (int i = 0; i < 60; i++) {
        coord -= deltaTextCoord;
        float sample = texture2D(tGodRays, coord).r;
        sample *= decay * uWeight;
        illumination += sample;
        decay *= uDecay;
      }

      vec4 scene = texture2D(tDiffuse, vUv);
      // Tint god rays with PureBrain blue
      vec3 rayColor = vec3(0.165, 0.576, 0.757) * illumination * uExposure;
      gl_FragColor = vec4(scene.rgb + rayColor, 1.0);
    }
  `,
};

// ============================================================
// HEXAGONAL BOKEH DOF SHADER (Night 35 goal #1 - NEW)
// ============================================================
const HexBokehShader = {
  uniforms: {
    tDiffuse: { value: null },
    uFocusDistance: { value: 4.2 },
    uFocalLength: { value: 0.05 },
    uAperture: { value: 0.02 },
    uMaxBlur: { value: 0.012 },
    uNear: { value: 0.1 },
    uFar: { value: 100.0 },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    tDepth: { value: null },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tDepth;
    uniform float uFocusDistance;
    uniform float uFocalLength;
    uniform float uAperture;
    uniform float uMaxBlur;
    uniform float uNear;
    uniform float uFar;
    uniform vec2 uResolution;
    varying vec2 vUv;

    float linearizeDepth(float d) {
      return uNear * uFar / (uFar - d * (uFar - uNear));
    }

    float getCoC(float depth) {
      float S1 = uFocusDistance;
      float f = uFocalLength;
      float A = uAperture;
      float coc = abs(A * (f * (S1 - depth)) / (depth * (S1 - f)));
      return clamp(coc, 0.0, uMaxBlur);
    }

    void main() {
      float depth = linearizeDepth(texture2D(tDepth, vUv).r);
      float coc = getCoC(depth);

      if (coc < 0.0005) {
        gl_FragColor = texture2D(tDiffuse, vUv);
        return;
      }

      // Hexagonal bokeh: 6 directions at 60-degree intervals
      vec3 color = vec3(0.0);
      float totalWeight = 0.0;

      // 6 hexagonal directions
      vec2 dirs[6];
      for (int i = 0; i < 6; i++) {
        float angle = float(i) * 3.14159265 / 3.0;
        dirs[i] = vec2(cos(angle), sin(angle));
      }

      // Sample along each direction
      const int SAMPLES_PER_DIR = 6;
      for (int d = 0; d < 6; d++) {
        for (int s = 1; s <= SAMPLES_PER_DIR; s++) {
          float t = float(s) / float(SAMPLES_PER_DIR);
          vec2 offset = dirs[d] * coc * t / uResolution * 400.0;

          // Also sample between directions for hexagonal fill
          vec2 offset2 = (dirs[d] + dirs[(d + 1) < 6 ? d + 1 : 0]) * 0.5 * coc * t / uResolution * 400.0;

          float w = 1.0 - t * 0.3; // slight center weighting

          vec3 s1 = texture2D(tDiffuse, vUv + offset).rgb;
          vec3 s2 = texture2D(tDiffuse, vUv + offset2).rgb;

          // Brighten hot pixels (bokeh highlight effect)
          float lum1 = dot(s1, vec3(0.299, 0.587, 0.114));
          float lum2 = dot(s2, vec3(0.299, 0.587, 0.114));
          float boost1 = 1.0 + smoothstep(0.5, 1.0, lum1) * 2.0;
          float boost2 = 1.0 + smoothstep(0.5, 1.0, lum2) * 2.0;

          color += s1 * w * boost1 + s2 * w * boost2;
          totalWeight += w * boost1 + w * boost2;
        }
      }

      color /= totalWeight;
      gl_FragColor = vec4(color, 1.0);
    }
  `,
};

// ============================================================
// CHROMATIC ABERRATION (Night 34 refined - radial, time-pulsing)
// ============================================================
const ChromaticAberrationShader = {
  uniforms: {
    tDiffuse: { value: null },
    uBaseOffset: { value: 0.0015 },
    uTime: { value: 0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uBaseOffset;
    uniform float uTime;
    varying vec2 vUv;

    void main() {
      vec2 center = vec2(0.5);
      vec2 dir = vUv - center;
      float dist = length(dir);
      float strength = smoothstep(0.1, 0.7, dist);
      float offset = uBaseOffset * strength * (1.0 + sin(uTime * 0.5) * 0.1);

      vec2 rOffset = dir * offset;
      vec2 bOffset = -dir * offset;

      float r = texture2D(tDiffuse, vUv + rOffset).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv + bOffset).b;

      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `,
};

// ============================================================
// POST-PROCESSING CHAIN
// ============================================================

// Depth render target for DoF
const depthRT = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
  minFilter: THREE.NearestFilter,
  magFilter: THREE.NearestFilter,
  format: THREE.RGBAFormat,
  type: THREE.FloatType,
});
depthRT.depthTexture = new THREE.DepthTexture();
depthRT.depthTexture.type = THREE.FloatType;

const composer = new EffectComposer(renderer);

const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// Bloom (Night 34 refined parameters)
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.5,   // intensity
  0.6,   // radius
  0.88   // threshold
);
composer.addPass(bloomPass);

// God rays
const godRayPass = new ShaderPass(GodRayShader);
composer.addPass(godRayPass);

// Hexagonal bokeh DoF
HexBokehShader.uniforms.tDepth.value = depthRT.depthTexture;
const dofPass = new ShaderPass(HexBokehShader);
composer.addPass(dofPass);

// Chromatic aberration (last)
const caPass = new ShaderPass(ChromaticAberrationShader);
composer.addPass(caPass);

// ============================================================
// HEXAGONAL GLASS FRAME (Brand element)
// ============================================================
const hexShape = new THREE.Shape();
const hexRadius = 1.6;
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
  const x = Math.cos(angle) * hexRadius;
  const y = Math.sin(angle) * hexRadius;
  if (i === 0) hexShape.moveTo(x, y);
  else hexShape.lineTo(x, y);
}
hexShape.closePath();

// Inner hole
const holeShape = new THREE.Shape();
const holeRadius = 1.3;
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
  const x = Math.cos(angle) * holeRadius;
  const y = Math.sin(angle) * holeRadius;
  if (i === 0) holeShape.moveTo(x, y);
  else holeShape.lineTo(x, y);
}
hexShape.holes.push(holeShape);

const hexExtrudeSettings = { depth: 0.06, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 8 };
const hexGeo = new THREE.ExtrudeGeometry(hexShape, hexExtrudeSettings);
hexGeo.center();

const hexMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.9,
  thickness: 0.3,
  roughness: 0.03,
  ior: 1.45,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  color: new THREE.Color(0x2a93c1).multiplyScalar(0.4),
  attenuationColor: PB_BLUE,
  attenuationDistance: 2.0,
  side: THREE.DoubleSide,
  envMapIntensity: 1.5,
});

const hexFrame = new THREE.Mesh(hexGeo, hexMat);
hexFrame.position.z = 0.1;
scene.add(hexFrame);

// ============================================================
// SATELLITE MINI SPHERES
// ============================================================
const satellites = [];
for (let i = 0; i < 5; i++) {
  const angle = (i / 5) * Math.PI * 2 + Math.PI * 0.1;
  const sat = new THREE.Mesh(
    new THREE.SphereGeometry(0.08 + Math.random() * 0.06, 32, 32),
    new THREE.MeshPhysicalMaterial({
      transmission: 0.9,
      thickness: 0.3,
      roughness: 0.03,
      ior: 1.5,
      color: i % 2 === 0 ? PB_BLUE : PB_ORANGE,
      attenuationColor: i % 2 === 0 ? PB_BLUE : PB_ORANGE,
      attenuationDistance: 0.5,
      side: THREE.DoubleSide,
    })
  );
  sat.userData = { angle, radius: 2.0 + Math.random() * 0.4, speed: 0.15 + Math.random() * 0.1, yOffset: (Math.random() - 0.5) * 0.6 };
  scene.add(sat);
  satellites.push(sat);
}

// ============================================================
// MOUSE TRACKING
// ============================================================
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Update outer shell displacement
  outerShaderMat.uniforms.uTime.value = t;

  // Inner sphere subtle rotation
  innerSphere.rotation.y = t * 0.15;
  innerSphere.rotation.x = Math.sin(t * 0.1) * 0.05;

  // Hex frame subtle rotation
  hexFrame.rotation.z = t * 0.02;

  // Cursor reactivity (subtle tilt on whole scene)
  innerSphere.rotation.x += mouseY * 0.04;
  innerSphere.rotation.y += mouseX * 0.04;
  outerSphere.rotation.x = mouseY * 0.03;
  outerSphere.rotation.y = mouseX * 0.03;
  hexFrame.rotation.x = mouseY * 0.02;
  hexFrame.rotation.y = mouseX * 0.02;

  // Satellite orbits
  for (const sat of satellites) {
    const { angle, radius, speed, yOffset } = sat.userData;
    const a = angle + t * speed;
    sat.position.set(
      Math.cos(a) * radius,
      yOffset + Math.sin(t * 0.5 + angle) * 0.15,
      Math.sin(a) * radius * 0.4
    );
    sat.rotation.y = t * 0.5;
  }

  // Field line group slow rotation
  fieldLineGroup.rotation.y = t * 0.02;
  fieldLineGroup.rotation.x = Math.sin(t * 0.1) * 0.03;

  // Particle drift
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += 0.002; // slow upward drift
    if (positions[i * 3 + 1] > 3) positions[i * 3 + 1] = -3;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // God ray light source drift
  godRayDisc.position.x = 0.5 + Math.sin(t * 0.2) * 0.3;
  godRayDisc.position.y = 0.8 + Math.cos(t * 0.15) * 0.2;
  occlusionLightClone.position.copy(godRayDisc.position);

  // Update occlusion sphere to match outer shell position
  occSphere.rotation.copy(outerSphere.rotation);

  // Calculate screen-space light position for god rays
  const lightScreenPos = godRayDisc.position.clone().project(camera);
  godRayPass.uniforms.uLightPos.value.set(
    lightScreenPos.x * 0.5 + 0.5,
    lightScreenPos.y * 0.5 + 0.5
  );

  // Update CA time
  caPass.uniforms.uTime.value = t;

  // Render occlusion pass
  renderer.setRenderTarget(occlusionRT);
  renderer.render(occlusionScene, camera);

  // Render main scene to depth RT for DoF
  renderer.setRenderTarget(depthRT);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);

  // Composite
  composer.render();
}

animate();

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  occlusionRT.setSize(Math.floor(window.innerWidth / 2), Math.floor(window.innerHeight / 2));
  depthRT.setSize(window.innerWidth, window.innerHeight);
  dofPass.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
