<body>

<div id="fps">--</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ============================================================
// SCENE SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // cap DPR for perf with heavy shaders
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x060610, 0.04);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.4, 4.5);
camera.lookAt(0, -0.1, 0);

// ============================================================
// HDRI LOADING (Poly Haven CDN)
// ============================================================
const pmremGenerator = new THREE.PMREMGenerator(renderer);
let envMap = null;

new RGBELoader()
  .setPath('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/')
  .load('studio_small_09_1k.hdr', (texture) => {
    envMap = pmremGenerator.fromEquirectangular(texture).texture;
    scene.environment = envMap;
    scene.background = null;
    texture.dispose();
    pmremGenerator.dispose();
  }, undefined, () => setupFallbackLighting());

function setupFallbackLighting() {
  scene.add(new THREE.DirectionalLight(0xffffff, 2.0).translateX(3).translateY(4).translateZ(2));
  scene.add(new THREE.DirectionalLight(0x2a93c1, 0.8).translateX(-2).translateY(1).translateZ(-1));
}

// Lighting
scene.add(new THREE.AmbientLight(0x111122, 0.3));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(3, 4, 2);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x2a93c1, 0.6);
fillLight.position.set(-2, 1, -1);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xf1420b, 0.4);
rimLight.position.set(0, -1, -3);
scene.add(rimLight);

// Orbiting caustic light (drives floor caustic pattern)
const causticLight = new THREE.PointLight(0xffffff, 3.0, 12);
causticLight.position.set(2, 3, 1);
scene.add(causticLight);

const PB_BLUE = new THREE.Color(0x2a93c1);
const PB_ORANGE = new THREE.Color(0xf1420b);

// ============================================================
// TECHNIQUE 1: THIN-FILM IRIDESCENCE SHADER (NEW Night 38)
// ============================================================
// Physics: Light interference in thin dielectric coating.
// Path difference = 2 * n_film * d * cos(theta_refract)
// Constructive interference when path_diff = m * lambda
// 2-layer stack: MgF2 (n=1.38) on glass (n=1.5), viewed from air (n=1.0)
// Spectral sampling: 12 wavelengths from 400nm to 730nm

const ThinFilmIridescenceMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uFilmThickness: { value: 380.0 }, // nm - base thickness
    uThicknessVariation: { value: 120.0 }, // nm - sin-based variation
    uFilmIOR: { value: 1.38 }, // MgF2
    uSubstrateIOR: { value: 1.5 }, // glass
    uFresnelPower: { value: 3.0 },
    uBaseColor: { value: PB_BLUE },
    uEnvMap: { value: null },
    uIridescenceStrength: { value: 0.85 },
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec3 vWorldPos;
    varying vec3 vLocalPos;
    varying float vFresnel;

    void main() {
      vNormal = normalize(normalMatrix * normal);
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      vLocalPos = position;
      vViewDir = normalize(cameraPosition - worldPos.xyz);

      float NdotV = max(dot(vNormal, vViewDir), 0.0);
      vFresnel = pow(1.0 - NdotV, 3.0);

      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform float uFilmThickness;
    uniform float uThicknessVariation;
    uniform float uFilmIOR;
    uniform float uSubstrateIOR;
    uniform float uFresnelPower;
    uniform vec3 uBaseColor;
    uniform float uIridescenceStrength;

    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec3 vWorldPos;
    varying vec3 vLocalPos;
    varying float vFresnel;

    // CIE 1931 wavelength to RGB (simplified Gaussian fit)
    vec3 wavelengthToRGB(float lambda) {
      // lambda in nm (400-730)
      float t = (lambda - 400.0) / 330.0; // 0 to 1

      // Gaussian curves for R, G, B response
      float r = exp(-0.5 * pow((lambda - 610.0) / 50.0, 2.0))
              + 0.3 * exp(-0.5 * pow((lambda - 450.0) / 20.0, 2.0));
      float g = exp(-0.5 * pow((lambda - 540.0) / 45.0, 2.0));
      float b = exp(-0.5 * pow((lambda - 450.0) / 35.0, 2.0));

      return vec3(max(r, 0.0), max(g, 0.0), max(b, 0.0));
    }

    // Thin-film reflectance for single wavelength
    float thinFilmReflectance(float lambda, float cosTheta, float thickness) {
      // Snell's law: refracted angle in film
      float sinTheta = sqrt(1.0 - cosTheta * cosTheta);
      float sinThetaFilm = sinTheta / uFilmIOR;
      if (sinThetaFilm > 1.0) return 1.0; // total internal reflection
      float cosThetaFilm = sqrt(1.0 - sinThetaFilm * sinThetaFilm);

      // Optical path difference
      float delta = 2.0 * uFilmIOR * thickness * cosThetaFilm;

      // Phase difference (in radians)
      float phase = 2.0 * 3.14159265 * delta / lambda;

      // Simplified Fresnel reflectances at interfaces
      float r01 = (1.0 - uFilmIOR) / (1.0 + uFilmIOR);
      float r12 = (uFilmIOR - uSubstrateIOR) / (uFilmIOR + uSubstrateIOR);

      // Airy formula (intensity)
      float R = r01 * r01 + r12 * r12 + 2.0 * r01 * r12 * cos(phase);
      R /= (1.0 + r01 * r01 * r12 * r12 + 2.0 * r01 * r12 * cos(phase));

      return clamp(R, 0.0, 1.0);
    }

    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(vViewDir);
      float NdotV = max(dot(N, V), 0.001);

      // Spatially varying film thickness (organic look)
      float thicknessNoise = sin(vLocalPos.x * 5.0 + uTime * 0.3)
                           * cos(vLocalPos.y * 4.0 + uTime * 0.2)
                           * sin(vLocalPos.z * 6.0 - uTime * 0.15);
      float thickness = uFilmThickness + uThicknessVariation * thicknessNoise;

      // Sample 12 wavelengths (400-730nm at 30nm spacing)
      vec3 iridColor = vec3(0.0);
      float totalWeight = 0.0;
      for (int i = 0; i < 12; i++) {
        float lambda = 400.0 + float(i) * 30.0;
        float R = thinFilmReflectance(lambda, NdotV, thickness);
        vec3 rgb = wavelengthToRGB(lambda);
        float weight = 0.5 + 0.5 * (1.0 - abs(float(i) - 5.5) / 5.5); // center-weighted
        iridColor += rgb * R * weight;
        totalWeight += weight;
      }
      iridColor /= totalWeight;
      iridColor *= 2.5; // Boost for visibility

      // Iridescence strongest at grazing angles (Fresnel)
      float iridescentMask = smoothstep(0.3, 0.0, NdotV);

      // Base glass look: Fresnel edge glow in brand blue
      vec3 baseColor = uBaseColor * vFresnel * 0.6;

      // Combine: base glass + iridescence at edges
      vec3 finalColor = mix(baseColor, iridColor, iridescentMask * uIridescenceStrength);

      // Add subtle specular highlight
      vec3 R_dir = reflect(-V, N);
      float spec = pow(max(dot(R_dir, normalize(vec3(3.0, 4.0, 2.0))), 0.0), 64.0);
      finalColor += vec3(1.0) * spec * 0.3;

      // Alpha: stronger at edges
      float alpha = max(vFresnel * 0.5, iridescentMask * 0.6) + spec * 0.2;

      gl_FragColor = vec4(finalColor, alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

// ============================================================
// GLASS SPHERE (inner: transmission, outer: thin-film iridescence)
// ============================================================
const innerGeo = new THREE.SphereGeometry(0.85, 128, 128);
const innerMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.95,
  thickness: 1.2,
  roughness: 0.02,
  ior: 1.5,
  clearcoat: 1.0,
  clearcoatRoughness: 0.04,
  color: PB_BLUE.clone().multiplyScalar(0.8),
  attenuationColor: PB_BLUE,
  attenuationDistance: 1.5,
  side: THREE.DoubleSide,
  envMapIntensity: 2.0,
});
const innerSphere = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerSphere);

// Outer shell with THIN-FILM IRIDESCENCE (Night 38 technique #1)
const outerGeo = new THREE.SphereGeometry(1.02, 128, 128);
const outerSphere = new THREE.Mesh(outerGeo, ThinFilmIridescenceMaterial);
scene.add(outerSphere);

// ============================================================
// TECHNIQUE 2: MULTIPLICATIVE CAUSTIC FLOOR (NEW Night 38)
// ============================================================
// Physics: Light refracted through curved glass concentrates at focal points.
// Dual-texture sampling at different scales, multiplied together for sharp convergence.
// Animated via light position orbit.

const CausticFloorMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uLightPos: { value: new THREE.Vector3(2, 3, 1) },
    uSpherePos: { value: new THREE.Vector3(0, 0, 0) },
    uSphereRadius: { value: 0.85 },
    uCausticIntensity: { value: 2.8 },
    uCausticScale1: { value: 3.2 },
    uCausticScale2: { value: 7.8 },
    uCausticSharpness: { value: 4.0 },
    uBlueColor: { value: PB_BLUE },
    uOrangeColor: { value: PB_ORANGE },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;

    void main() {
      vUv = uv;
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uLightPos;
    uniform vec3 uSpherePos;
    uniform float uSphereRadius;
    uniform float uCausticIntensity;
    uniform float uCausticScale1;
    uniform float uCausticScale2;
    uniform float uCausticSharpness;
    uniform vec3 uBlueColor;
    uniform vec3 uOrangeColor;

    varying vec2 vUv;
    varying vec3 vWorldPos;

    // Hash functions for caustic noise
    vec2 hash22(vec2 p) {
      p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
      return -1.0 + 2.0 * fract(sin(p) * 43758.5453);
    }

    // Voronoi-based caustic pattern (simulates photon concentration)
    float causticPattern(vec2 p, float scale, float timeOffset) {
      p *= scale;
      p += vec2(uTime * 0.08 + timeOffset, uTime * 0.06);

      vec2 i = floor(p);
      vec2 f = fract(p);

      float minDist1 = 10.0;
      float minDist2 = 10.0;

      // Check 3x3 neighborhood
      for (int y = -1; y <= 1; y++) {
        for (int x = -1; x <= 1; x++) {
          vec2 neighbor = vec2(float(x), float(y));
          vec2 point = hash22(i + neighbor) * 0.5 + 0.5;
          // Animate points
          point += 0.15 * sin(uTime * 0.4 + 6.2831 * hash22(i + neighbor));
          float d = length(f - neighbor - point);
          if (d < minDist1) {
            minDist2 = minDist1;
            minDist1 = d;
          } else if (d < minDist2) {
            minDist2 = d;
          }
        }
      }

      // Edge detection between Voronoi cells = caustic convergence lines
      float edge = minDist2 - minDist1;
      // Sharp convergence: thin bright lines
      return pow(1.0 - smoothstep(0.0, 0.15, edge), uCausticSharpness);
    }

    void main() {
      // Distance from sphere center (projected onto floor)
      vec2 toCenter = vWorldPos.xz - uSpherePos.xz;
      float dist = length(toCenter);

      // Caustic falloff: strongest near sphere, fading outward
      float falloff = smoothstep(4.0, 0.5, dist) * smoothstep(0.3, 0.8, dist);

      // MULTIPLICATIVE dual-scale caustic sampling (Night 37 theory -> implementation)
      float caustic1 = causticPattern(vWorldPos.xz, uCausticScale1, 0.0);
      float caustic2 = causticPattern(vWorldPos.xz, uCausticScale2, 1.7);

      // Multiplication creates sharp convergence where both patterns align
      float caustic = caustic1 * caustic2 * uCausticIntensity;

      // Additional fine detail layer
      float caustic3 = causticPattern(vWorldPos.xz, 14.0, 3.1);
      caustic += caustic3 * 0.3 * falloff;

      caustic *= falloff;

      // Color: warm at bright concentrations, cool at diffuse areas
      vec3 warmColor = mix(uOrangeColor, vec3(1.0, 0.95, 0.8), 0.5);
      vec3 coolColor = uBlueColor * 0.3;
      vec3 causticColor = mix(coolColor, warmColor, smoothstep(0.3, 1.5, caustic));

      // Base floor: very dark with subtle reflection
      float floorBase = 0.02;

      // Combine
      vec3 color = vec3(floorBase) + causticColor * caustic;

      // Specular floor reflection (subtle)
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      vec3 floorNormal = vec3(0.0, 1.0, 0.0);
      float floorSpec = pow(max(dot(reflect(-normalize(uLightPos - vWorldPos), floorNormal), viewDir), 0.0), 32.0);
      color += vec3(0.03) * floorSpec;

      gl_FragColor = vec4(color, 1.0);
    }
  `,
});

const floorGeo = new THREE.PlaneGeometry(12, 12);
floorGeo.rotateX(-Math.PI / 2);
const floor = new THREE.Mesh(floorGeo, CausticFloorMaterial);
floor.position.y = -1.3;
scene.add(floor);

// ============================================================
// TECHNIQUE 3: SDF TEXT WITH UV DISTORTION THROUGH GLASS (NEW Night 38)
// ============================================================
// Approach: Render text to texture, then apply refraction-based UV distortion
// in a custom shader that simulates how glass bends the view of the text behind it.
// The distortion is computed from the glass sphere normal at each fragment.

// Step 1: Create high-quality text texture
const textCanvas = document.createElement('canvas');
textCanvas.width = 2048;
textCanvas.height = 512;
const ctx = textCanvas.getContext('2d');
ctx.clearRect(0, 0, 2048, 512);

// Draw text with gradient
ctx.font = 'bold 180px system-ui, -apple-system, "Segoe UI", sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

// Multi-layer text for glow effect
// Glow layer
ctx.shadowColor = 'rgba(42, 147, 193, 0.6)';
ctx.shadowBlur = 40;
const textGradient = ctx.createLinearGradient(300, 0, 1748, 0);
textGradient.addColorStop(0, 'rgba(42, 147, 193, 0.9)');
textGradient.addColorStop(0.45, 'rgba(200, 220, 255, 0.85)');
textGradient.addColorStop(0.55, 'rgba(255, 255, 255, 0.9)');
textGradient.addColorStop(1, 'rgba(241, 66, 11, 0.7)');
ctx.fillStyle = textGradient;
ctx.fillText('PUREBRAIN', 1024, 256);

// Second pass: sharper text on top
ctx.shadowBlur = 0;
ctx.fillText('PUREBRAIN', 1024, 256);

const textTexture = new THREE.CanvasTexture(textCanvas);
textTexture.needsUpdate = true;

// Step 2: Text plane with refraction distortion shader
const TextRefractionMaterial = new THREE.ShaderMaterial({
  uniforms: {
    tText: { value: textTexture },
    uTime: { value: 0 },
    uSphereCenter: { value: new THREE.Vector3(0, 0, 0) },
    uSphereRadius: { value: 0.85 },
    uIOR: { value: 1.5 },
    uDistortionStrength: { value: 0.12 },
    uTextOpacity: { value: 0.85 },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vViewDir;

    void main() {
      vUv = uv;
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      vViewDir = normalize(cameraPosition - worldPos.xyz);
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: `
    uniform sampler2D tText;
    uniform float uTime;
    uniform vec3 uSphereCenter;
    uniform float uSphereRadius;
    uniform float uIOR;
    uniform float uDistortionStrength;
    uniform float uTextOpacity;

    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vViewDir;

    void main() {
      // Calculate if this fragment is "behind" the glass sphere from camera's perspective
      // Project world position onto the sphere to get distortion normal
      vec3 toPoint = vWorldPos - uSphereCenter;
      float distFromAxis = length(toPoint.xy); // distance from sphere center in screen-aligned plane

      // Normalized distance from sphere center (0 at center, 1 at edge)
      float normalizedDist = distFromAxis / uSphereRadius;

      // Only apply distortion within the sphere's projected area
      vec2 distortedUV = vUv;

      if (normalizedDist < 1.2) {
        // Approximate glass normal at the closest sphere surface point
        vec3 sphereNormal = normalize(toPoint);

        // Refraction direction using Snell's law
        float eta = 1.0 / uIOR;
        vec3 refractDir = refract(-normalize(vViewDir), sphereNormal, eta);

        // UV distortion proportional to refraction deviation
        // Stronger distortion near center (thicker glass), weaker at edges
        float thickness = sqrt(max(0.0, 1.0 - normalizedDist * normalizedDist));

        // The key insight: text appears INVERTED through a convex lens
        // At center: flip (magnified inversion), at edges: barrel distortion
        vec2 distortion = refractDir.xy * thickness * uDistortionStrength;

        // Add subtle chromatic split
        float chromaOffset = thickness * 0.008;

        // Apply distortion with smooth falloff at sphere boundary
        float mask = smoothstep(1.2, 0.8, normalizedDist);
        distortedUV += distortion * mask;

        // Text inversion effect through convex glass
        // Center of sphere acts like a lens: inverts the image
        float inversionStrength = smoothstep(1.0, 0.0, normalizedDist) * 0.3;
        vec2 invCenter = vec2(0.5, 0.5);
        distortedUV = mix(distortedUV, invCenter + (invCenter - distortedUV) * 0.5, inversionStrength * mask);
      }

      // Sample text with distorted UVs (with chromatic aberration)
      float r = texture2D(tText, distortedUV + vec2(0.003, 0.0) * (normalizedDist < 1.2 ? 1.0 : 0.0)).r;
      float g = texture2D(tText, distortedUV).g;
      float b = texture2D(tText, distortedUV - vec2(0.003, 0.0) * (normalizedDist < 1.2 ? 1.0 : 0.0)).b;

      vec3 color = vec3(r, g, b);

      // Subtle animation: gentle wave distortion
      float wave = sin(vUv.x * 8.0 + uTime * 0.5) * cos(vUv.y * 6.0 + uTime * 0.3) * 0.02;
      color += wave * 0.1;

      float alpha = max(max(color.r, color.g), color.b) * uTextOpacity;

      // Fade edges of text plane
      float edgeFade = smoothstep(0.0, 0.05, vUv.x) * smoothstep(1.0, 0.95, vUv.x)
                     * smoothstep(0.0, 0.1, vUv.y) * smoothstep(1.0, 0.9, vUv.y);
      alpha *= edgeFade;

      gl_FragColor = vec4(color, alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const textPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(4.0, 1.0),
  TextRefractionMaterial
);
textPlane.position.z = -0.9;
textPlane.position.y = 0.0;
scene.add(textPlane);

// ============================================================
// HEXAGONAL GLASS FRAME
// ============================================================
const hexShape = new THREE.Shape();
const hexRadius = 1.6;
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
  const x = Math.cos(angle) * hexRadius;
  const y = Math.sin(angle) * hexRadius;
  if (i === 0) hexShape.moveTo(x, y); else hexShape.lineTo(x, y);
}
hexShape.closePath();
const holeShape = new THREE.Shape();
const holeRadius = 1.3;
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
  const x = Math.cos(angle) * holeRadius;
  const y = Math.sin(angle) * holeRadius;
  if (i === 0) holeShape.moveTo(x, y); else holeShape.lineTo(x, y);
}
hexShape.holes.push(holeShape);

const hexGeo = new THREE.ExtrudeGeometry(hexShape, {
  depth: 0.06, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 8
});
hexGeo.center();

const hexMat = new THREE.MeshPhysicalMaterial({
  transmission: 0.9,
  thickness: 0.3,
  roughness: 0.03,
  ior: 1.45,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  color: new THREE.Color(0x2a93c1).multiplyScalar(0.4),
  attenuationColor: PB_BLUE,
  attenuationDistance: 2.0,
  side: THREE.DoubleSide,
  envMapIntensity: 1.5,
});
const hexFrame = new THREE.Mesh(hexGeo, hexMat);
hexFrame.position.z = 0.1;
scene.add(hexFrame);

// ============================================================
// MAGNETIC FIELD LINES
// ============================================================
const fieldLineGroup = new THREE.Group();
scene.add(fieldLineGroup);
for (let i = 0; i < 14; i++) {
  const angle = (i / 14) * Math.PI * 2;
  const radius = 1.8 + Math.random() * 0.6;
  const points = [];
  for (let j = 0; j <= 50; j++) {
    const t = j / 50;
    const theta = angle + t * Math.PI * 0.4;
    const phi = (t - 0.5) * Math.PI * 0.8;
    points.push(new THREE.Vector3(
      Math.cos(theta) * radius * (1 + Math.sin(phi) * 0.3),
      Math.sin(phi) * 1.2,
      Math.sin(theta) * radius * (1 + Math.cos(phi) * 0.2)
    ));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 40, 0.005, 6, false),
    new THREE.MeshBasicMaterial({
      color: i % 3 === 0 ? PB_ORANGE : PB_BLUE,
      transparent: true, opacity: 0.06 + Math.random() * 0.08,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  fieldLineGroup.add(tube);
}

// ============================================================
// ATMOSPHERIC PARTICLES
// ============================================================
const particleCount = 2000;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  pPos[i * 3] = (Math.random() - 0.5) * 8;
  pPos[i * 3 + 1] = (Math.random() - 0.5) * 6;
  pPos[i * 3 + 2] = -1.5 - Math.random() * 4;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xaaddff, size: 1.5, transparent: true, opacity: 0.07,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
});
const particles = new THREE.Points(pGeo, particleMat);
scene.add(particles);

// ============================================================
// SATELLITE MINI SPHERES (with own thin-film hints)
// ============================================================
const satellites = [];
for (let i = 0; i < 5; i++) {
  const angle = (i / 5) * Math.PI * 2 + Math.PI * 0.1;
  const sat = new THREE.Mesh(
    new THREE.SphereGeometry(0.08 + Math.random() * 0.06, 32, 32),
    new THREE.MeshPhysicalMaterial({
      transmission: 0.9, thickness: 0.3, roughness: 0.03, ior: 1.5,
      color: i % 2 === 0 ? PB_BLUE : PB_ORANGE,
      attenuationColor: i % 2 === 0 ? PB_BLUE : PB_ORANGE,
      attenuationDistance: 0.5, side: THREE.DoubleSide,
    })
  );
  sat.userData = { angle, radius: 2.0 + Math.random() * 0.4, speed: 0.15 + Math.random() * 0.1, yOffset: (Math.random() - 0.5) * 0.6 };
  scene.add(sat);
  satellites.push(sat);
}

// ============================================================
// GOD RAYS (occlusion-based radial blur)
// ============================================================
const godRayDisc = new THREE.Mesh(
  new THREE.CircleGeometry(0.6, 32),
  new THREE.MeshBasicMaterial({ color: 0x2a93c1, transparent: true, opacity: 0.9 })
);
godRayDisc.position.set(0.5, 1.0, -2.5);
scene.add(godRayDisc);

const occlusionScene = new THREE.Scene();
const occLightClone = new THREE.Mesh(
  new THREE.CircleGeometry(0.6, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
occLightClone.position.copy(godRayDisc.position);
occlusionScene.add(occLightClone);
const occSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.05, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
occlusionScene.add(occSphere);

const occlusionRT = new THREE.WebGLRenderTarget(
  Math.floor(window.innerWidth / 2), Math.floor(window.innerHeight / 2)
);

const GodRayShader = {
  uniforms: {
    tDiffuse: { value: null },
    tGodRays: { value: occlusionRT.texture },
    uLightPos: { value: new THREE.Vector2(0.55, 0.65) },
    uExposure: { value: 0.18 },
    uDecay: { value: 0.96 },
    uDensity: { value: 0.85 },
    uWeight: { value: 0.5 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse, tGodRays;
    uniform vec2 uLightPos;
    uniform float uExposure, uDecay, uDensity, uWeight;
    varying vec2 vUv;
    void main() {
      vec2 delta = (vUv - uLightPos) * (1.0 / 60.0) * uDensity;
      vec2 coord = vUv;
      float illum = 0.0, decay = 1.0;
      for (int i = 0; i < 60; i++) {
        coord -= delta;
        illum += texture2D(tGodRays, coord).r * decay * uWeight;
        decay *= uDecay;
      }
      vec4 s = texture2D(tDiffuse, vUv);
      vec3 rays = vec3(0.165, 0.576, 0.757) * illum * uExposure;
      gl_FragColor = vec4(s.rgb + rays, 1.0);
    }
  `,
};

// ============================================================
// HEX BOKEH DOF SHADER
// ============================================================
const HexBokehShader = {
  uniforms: {
    tDiffuse: { value: null }, tDepth: { value: null },
    uFocusDistance: { value: 4.5 }, uFocalLength: { value: 0.05 },
    uAperture: { value: 0.018 }, uMaxBlur: { value: 0.01 },
    uNear: { value: 0.1 }, uFar: { value: 100.0 },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse, tDepth;
    uniform float uFocusDistance, uFocalLength, uAperture, uMaxBlur, uNear, uFar;
    uniform vec2 uResolution;
    varying vec2 vUv;
    float linearizeDepth(float d) { return uNear * uFar / (uFar - d * (uFar - uNear)); }
    float getCoC(float depth) {
      float S1 = uFocusDistance, f = uFocalLength, A = uAperture;
      return clamp(abs(A * (f * (S1 - depth)) / (depth * (S1 - f))), 0.0, uMaxBlur);
    }
    void main() {
      float depth = linearizeDepth(texture2D(tDepth, vUv).r);
      float coc = getCoC(depth);
      if (coc < 0.0005) { gl_FragColor = texture2D(tDiffuse, vUv); return; }
      vec3 color = vec3(0.0); float tw = 0.0;
      for (int d = 0; d < 6; d++) {
        float angle = float(d) * 3.14159265 / 3.0;
        vec2 dir1 = vec2(cos(angle), sin(angle));
        float nextAngle = float(d + 1) * 3.14159265 / 3.0;
        vec2 dir2 = (dir1 + vec2(cos(nextAngle), sin(nextAngle))) * 0.5;
        for (int s = 1; s <= 5; s++) {
          float t = float(s) / 5.0;
          vec2 o1 = dir1 * coc * t / uResolution * 350.0;
          vec2 o2 = dir2 * coc * t / uResolution * 350.0;
          float w = 1.0 - t * 0.3;
          vec3 s1 = texture2D(tDiffuse, vUv + o1).rgb;
          vec3 s2 = texture2D(tDiffuse, vUv + o2).rgb;
          float b1 = 1.0 + smoothstep(0.5, 1.0, dot(s1, vec3(0.299, 0.587, 0.114))) * 2.0;
          float b2 = 1.0 + smoothstep(0.5, 1.0, dot(s2, vec3(0.299, 0.587, 0.114))) * 2.0;
          color += s1 * w * b1 + s2 * w * b2;
          tw += w * b1 + w * b2;
        }
      }
      gl_FragColor = vec4(color / tw, 1.0);
    }
  `,
};

// ============================================================
// CHROMATIC ABERRATION (radial, time-pulsing)
// ============================================================
const ChromaticAberrationShader = {
  uniforms: {
    tDiffuse: { value: null }, uBaseOffset: { value: 0.0012 }, uTime: { value: 0 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uBaseOffset, uTime; varying vec2 vUv;
    void main() {
      vec2 dir = vUv - vec2(0.5);
      float dist = length(dir);
      float strength = smoothstep(0.1, 0.7, dist);
      float offset = uBaseOffset * strength * (1.0 + sin(uTime * 0.5) * 0.1);
      float r = texture2D(tDiffuse, vUv + dir * offset).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - dir * offset).b;
      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `,
};

// ============================================================
// POST-PROCESSING CHAIN
// ============================================================
const depthRT = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
  minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter,
  format: THREE.RGBAFormat, type: THREE.FloatType,
});
depthRT.depthTexture = new THREE.DepthTexture();
depthRT.depthTexture.type = THREE.FloatType;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.6, 0.88
);
composer.addPass(bloomPass);

const godRayPass = new ShaderPass(GodRayShader);
composer.addPass(godRayPass);

HexBokehShader.uniforms.tDepth.value = depthRT.depthTexture;
const dofPass = new ShaderPass(HexBokehShader);
composer.addPass(dofPass);

const caPass = new ShaderPass(ChromaticAberrationShader);
composer.addPass(caPass);

// ============================================================
// MOUSE TRACKING
// ============================================================
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// ============================================================
// FPS COUNTER
// ============================================================
let frameCount = 0, lastFPSTime = performance.now();
const fpsEl = document.getElementById('fps');

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFPSTime >= 1000) {
    fpsEl.textContent = `${frameCount} fps`;
    frameCount = 0;
    lastFPSTime = now;
  }

  // Update thin-film iridescence
  ThinFilmIridescenceMaterial.uniforms.uTime.value = t;

  // Update caustic floor
  CausticFloorMaterial.uniforms.uTime.value = t;
  // Orbit caustic light for dynamic caustic pattern
  const lightAngle = t * 0.25;
  causticLight.position.set(
    Math.cos(lightAngle) * 2.5,
    3.0 + Math.sin(t * 0.15) * 0.5,
    Math.sin(lightAngle) * 2.0
  );
  CausticFloorMaterial.uniforms.uLightPos.value.copy(causticLight.position);

  // Update text refraction
  TextRefractionMaterial.uniforms.uTime.value = t;

  // Inner sphere rotation
  innerSphere.rotation.y = t * 0.15;
  innerSphere.rotation.x = Math.sin(t * 0.1) * 0.05;

  // Hex frame
  hexFrame.rotation.z = t * 0.02;

  // Cursor reactivity
  innerSphere.rotation.x += mouseY * 0.04;
  innerSphere.rotation.y += mouseX * 0.04;
  outerSphere.rotation.x = mouseY * 0.03;
  outerSphere.rotation.y = mouseX * 0.03;
  hexFrame.rotation.x = mouseY * 0.02;
  hexFrame.rotation.y = mouseX * 0.02;

  // Satellites
  for (const sat of satellites) {
    const { angle, radius, speed, yOffset } = sat.userData;
    const a = angle + t * speed;
    sat.position.set(Math.cos(a) * radius, yOffset + Math.sin(t * 0.5 + angle) * 0.15, Math.sin(a) * radius * 0.4);
    sat.rotation.y = t * 0.5;
  }

  // Field lines
  fieldLineGroup.rotation.y = t * 0.02;
  fieldLineGroup.rotation.x = Math.sin(t * 0.1) * 0.03;

  // Particles
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3 + 1] += 0.002;
    if (pos[i * 3 + 1] > 3) pos[i * 3 + 1] = -3;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // God rays
  godRayDisc.position.x = 0.5 + Math.sin(t * 0.2) * 0.3;
  godRayDisc.position.y = 0.8 + Math.cos(t * 0.15) * 0.2;
  occLightClone.position.copy(godRayDisc.position);
  occSphere.rotation.copy(outerSphere.rotation);
  const lsp = godRayDisc.position.clone().project(camera);
  godRayPass.uniforms.uLightPos.value.set(lsp.x * 0.5 + 0.5, lsp.y * 0.5 + 0.5);

  // CA time
  caPass.uniforms.uTime.value = t;

  // Render passes
  renderer.setRenderTarget(occlusionRT);
  renderer.render(occlusionScene, camera);
  renderer.setRenderTarget(depthRT);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  composer.render();
}

animate();

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  occlusionRT.setSize(Math.floor(window.innerWidth / 2), Math.floor(window.innerHeight / 2));
  depthRT.setSize(window.innerWidth, window.innerHeight);
  dofPass.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
