<!--
PAYPAL BUTTONS FOR PURE BRAIN 2.0 PRICING PAGE
===============================================
INSTRUCTIONS FOR ELEMENTOR:
1. Go to purebrain.ai/wp-admin → Pages → Pure Brain 2.0 → Edit with Elementor
2. Find each pricing tier section
3. Click + to add new element → search "HTML" → drag HTML widget below the price
4. Paste the matching button code
5. Save/Update
-->


<!-- ======================= -->
<!-- TIER 1: STARTER - $79   -->
<!-- ======================= -->

<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank" style="text-align: center; margin-top: 20px;">
  <input type="hidden" name="cmd" value="_xclick">
  <input type="hidden" name="business" value="support@puremarketing.ai">
  <input type="hidden" name="item_name" value="Pure Brain Starter">
  <input type="hidden" name="item_number" value="PB-STARTER">
  <input type="hidden" name="amount" value="79.00">
  <input type="hidden" name="currency_code" value="USD">
  <input type="hidden" name="no_shipping" value="1">
  <input type="hidden" name="return" value="https://purebrain.ai/thank-you/">
  <input type="hidden" name="cancel_return" value="https://purebrain.ai/purebrain-2-0/">
  <button type="submit" style="
    background: linear-gradient(135deg, #f1420b 0%, #ff6b3d 100%);
    color: white;
    border: none;
    padding: 16px 40px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(241, 66, 11, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  " onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 20px rgba(241, 66, 11, 0.6)';"
     onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 15px rgba(241, 66, 11, 0.4)';">
    Get Started - $79
  </button>
</form>
