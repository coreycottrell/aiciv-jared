<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Avatar V1 — Cryogen Orb</title>
<style>body{margin:0;background:#080a12;overflow:hidden;font-family:system-ui;color:#fff}
#label{position:fixed;top:16px;left:20px;font-size:13px;letter-spacing:.15em;opacity:.7}</style></head>
<body><div id="label">V1 · CRYOGEN ORB · transmission 1.0 · ior 1.52</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,100);
camera.position.z=3.5;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x404055,.6));
const k=new THREE.PointLight(0x2a93c1,3,10);k.position.set(2,2,3);scene.add(k);
const r=new THREE.PointLight(0xf1420b,1.5,10);r.position.set(-2,-1,2);scene.add(r);
const mat=new THREE.MeshPhysicalMaterial({color:0xffffff,transmission:1,thickness:1.8,roughness:.08,ior:1.52,clearcoat:1});
const orb=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),mat);
scene.add(orb);
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),.6,.9,.85));
let t=0;
function loop(){t+=.01;orb.rotation.y+=.005;orb.position.y=Math.sin(t)*.08;composer.render();requestAnimationFrame(loop)}
loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});
</script></body></html>
