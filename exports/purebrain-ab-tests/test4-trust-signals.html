<!--
  TEST 4: Trust Signals Position
  ================================
  Control:  No trust signals above the fold (current live state)
  Variant:  Horizontal trust bar inserted directly below the hero section

  Hypothesis: Adding social proof and trust indicators in the first viewport
              reduces purchase anxiety and increases CTA click-through rate
              by 15-25%. The UX audit identified trust signal deficit as the
              #2 conversion killer (D+ grade).

  Implementation:
  - Paste this HTML block immediately AFTER the hero section in
    Elementor / Divi / WordPress page builder.
  - The trust bar is self-contained with inline styles as fallback.
  - It uses CSS classes for theme integration — override as needed.
  - Data attributes track which variant is shown for analytics.

  Analytics events to track:
  - ab_variant_assigned: trust-signals-position / variant-b
  - trust_bar_visible: (IntersectionObserver fires when bar enters viewport)
  - cta_click: segmented by variant
  - form_submit: segmented by variant
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureBrain – Trust Signals Variant (Test 4-B)</title>

  <style>
    /* -------------------------------------------------------
       Trust Bar — scoped to .pb-trust-bar
       Designed to sit directly below the hero section.
    ------------------------------------------------------- */

    .pb-trust-bar {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px 24px;
      box-sizing: border-box;
    }

    .pb-trust-bar__inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 24px 40px;
    }

    /* Individual trust item */
    .pb-trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .pb-trust-item__icon {
      font-size: 1.1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .pb-trust-item__text {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.78);
      letter-spacing: 0.01em;
    }

    .pb-trust-item__text strong {
      color: #ffffff;
      font-weight: 700;
    }

    /* Divider between items (desktop only) */
    .pb-trust-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
    }

    /* Star rating component */
    .pb-trust-stars {
      display: inline-flex;
      gap: 2px;
      color: #f59e0b; /* amber */
      font-size: 0.9rem;
    }

    /* Mobile: stack items */
    @media (max-width: 640px) {
      .pb-trust-bar__inner {
        gap: 14px 20px;
        justify-content: flex-start;
      }

      .pb-trust-divider {
        display: none;
      }

      .pb-trust-item__text {
        font-size: 0.8rem;
      }
    }

    /* Animated entrance (optional — remove if site uses reduced-motion) */
    @media (prefers-reduced-motion: no-preference) {
      .pb-trust-bar {
        animation: pb-trust-fadein 0.5s ease both;
      }

      @keyframes pb-trust-fadein {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }
  </style>
</head>

<body>

  <!--
    PASTE THIS BLOCK immediately after the closing tag of the
    hero/banner section in the page builder.
  -->
  <div
    class="pb-trust-bar"
    data-ab-test="trust-signals-position"
    data-variant="b"
    id="pb-trust-bar"
  >
    <div class="pb-trust-bar__inner">

      <!-- Trust item 1: User count / social proof number -->
      <div class="pb-trust-item">
        <span class="pb-trust-item__icon">&#128100;</span>
        <span class="pb-trust-item__text">
          <strong>500+</strong> professionals awakened
        </span>
      </div>

      <div class="pb-trust-divider" aria-hidden="true"></div>

      <!-- Trust item 2: Star rating -->
      <div class="pb-trust-item">
        <span class="pb-trust-stars" aria-label="5 stars">
          &#9733;&#9733;&#9733;&#9733;&#9733;
        </span>
        <span class="pb-trust-item__text">
          <strong>5.0</strong> avg rating
        </span>
      </div>

      <div class="pb-trust-divider" aria-hidden="true"></div>

      <!-- Trust item 3: Guarantee / risk reversal -->
      <div class="pb-trust-item">
        <span class="pb-trust-item__icon">&#128737;</span>
        <!-- Shield icon (Unicode fallback) — swap for SVG for crispness -->
        <span class="pb-trust-item__text">
          <strong>30-day</strong> money-back guarantee
        </span>
      </div>

      <div class="pb-trust-divider" aria-hidden="true"></div>

      <!-- Trust item 4: Privacy / data safety -->
      <div class="pb-trust-item">
        <span class="pb-trust-item__icon">&#128274;</span>
        <span class="pb-trust-item__text">
          Your data stays <strong>private</strong>
        </span>
      </div>

      <div class="pb-trust-divider" aria-hidden="true"></div>

      <!-- Trust item 5: Founder credibility -->
      <div class="pb-trust-item">
        <span class="pb-trust-item__icon">&#127775;</span>
        <span class="pb-trust-item__text">
          Built by a <strong>human who uses it daily</strong>
        </span>
      </div>

    </div>
  </div>
  <!-- END trust bar -->

  <script>
    // -----------------------------------------------------------
    // Analytics: track trust bar visibility and assign variant
    // -----------------------------------------------------------
    (function () {
      var TEST_NAME = 'trust-signals-position';
      var VARIANT   = 'b';

      // Track assignment
      try {
        gtag('event', 'ab_variant_assigned', { test_name: TEST_NAME, variant: VARIANT });
      } catch (e) {}

      // Track when trust bar enters viewport (visibility = engagement signal)
      var bar = document.getElementById('pb-trust-bar');
      if (bar && 'IntersectionObserver' in window) {
        var seen = false;
        var observer = new IntersectionObserver(function (entries) {
          if (!seen && entries[0].isIntersecting) {
            seen = true;
            try {
              gtag('event', 'trust_bar_visible', { test_name: TEST_NAME, variant: VARIANT });
            } catch (e) {}
            observer.disconnect();
          }
        }, { threshold: 0.5 });
        observer.observe(bar);
      }
    })();
  </script>

</body>
