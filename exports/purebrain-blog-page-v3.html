<!DOCTYPE html>
<html>
<head>
<style>
/* Full page dark background with brain animation */
.pb-blog-wrapper {
    position: relative;
    min-height: 100vh;
    background: #0a0a0a;
    padding: 80px 20px 60px;
    overflow: hidden;
}

/* Brain animation background */
.pb-blog-wrapper::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('https://purebrain.ai/wp-content/uploads/2026/02/Pure-Brain-Vid-3.gif') center center no-repeat;
    background-size: cover;
    opacity: 0.25;
    z-index: 0;
    pointer-events: none;
}

/* Dark gradient overlay */
.pb-blog-wrapper::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(10,10,10,0.85) 0%, rgba(20,35,60,0.75) 50%, rgba(10,10,10,0.85) 100%);
    z-index: 1;
    pointer-events: none;
}

/* Pure Tech Icon Badge */
.pb-icon-badge {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    z-index: 9999;
    animation: icon-pulse 3s ease-in-out infinite;
}

.pb-icon-badge img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(42,147,193,0.5));
}

@keyframes icon-pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 2px 10px rgba(42,147,193,0.5)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 4px 20px rgba(42,147,193,0.8)); }
}

/* Content container */
.pb-blog-content {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
}

/* Page title */
.pb-blog-title {
    text-align: center;
    margin-bottom: 50px;
}

.pb-blog-title h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    color: #ffffff;
    margin: 0;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.pb-blog-title h1 span.pure {
    color: #2a93c1;
}

.pb-blog-title h1 span.brain {
    color: #f1420b;
}

.pb-blog-title p {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.7);
    margin-top: 15px;
}

/* Blog posts grid */
.pb-posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 30px;
    padding: 20px 0;
}

/* Individual post card */
.pb-post-card {
    background: rgba(20,25,40,0.85);
    border: 1px solid rgba(42,147,193,0.3);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
}

.pb-post-card:hover {
    border-color: rgba(241,66,11,0.6);
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.pb-post-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.pb-post-card-content {
    padding: 25px;
}

.pb-post-card h2 {
    color: #ffffff;
    font-size: 1.4rem;
    margin: 0 0 15px 0;
    line-height: 1.3;
}

.pb-post-card h2 a {
    color: #ffffff;
    text-decoration: none;
    transition: color 0.3s ease;
}

.pb-post-card h2 a:hover {
    color: #2a93c1;
}

.pb-post-card .excerpt {
    color: rgba(255,255,255,0.75);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 20px;
}

.pb-post-card .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
}

.pb-post-card .read-more {
    color: #2a93c1;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.pb-post-card .read-more:hover {
    color: #f1420b;
}

/* Responsive */
@media (max-width: 768px) {
    .pb-blog-title h1 {
        font-size: 2.5rem;
    }

    .pb-posts-grid {
        grid-template-columns: 1fr;
    }

    .pb-icon-badge {
        width: 40px;
        height: 40px;
        top: 15px;
        right: 15px;
    }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div class="pb-blog-wrapper">
    <!-- Pure Tech Icon Badge -->
    <div class="pb-icon-badge">
        <img src="https://purebrain.ai/wp-content/uploads/2026/02/cropped-cropped-MA1.BI-1.2.4-002-211107-Icon-PT.png" alt="Pure Technology">
    </div>

    <div class="pb-blog-content">
        <!-- Title Section -->
        <div class="pb-blog-title">
            <h1><span class="pure">PURE</span><span class="brain">BRAIN</span> BLOG</h1>
            <p>Thoughts from the AI frontier</p>
        </div>

        <!-- Posts will be dynamically loaded by WordPress/Elementor -->
        <!-- This is a container for the Posts widget -->
        <div class="pb-posts-grid">
            [elementor-template id="posts"]
        </div>
    </div>
</div>

</body>
</html>
