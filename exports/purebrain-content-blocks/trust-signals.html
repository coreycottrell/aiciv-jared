<style>
/* Trust Signals Bar */
.pb-trust-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: rgba(42, 147, 193, 0.08);
    border: 1px solid rgba(42, 147, 193, 0.15);
    border-radius: 12px;
    margin: 24px auto;
    max-width: 800px;
}

.pb-trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 0.95rem;
    font-weight: 500;
    white-space: nowrap;
}

.pb-trust-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, #2a93c1 0%, #1a7aa3 100%);
    border-radius: 50%;
    flex-shrink: 0;
}

.pb-trust-icon svg {
    width: 12px;
    height: 12px;
    color: #fff;
}

/* Responsive */
@media (max-width: 768px) {
    .pb-trust-bar {
        flex-direction: column;
        gap: 16px;
        padding: 20px 16px;
    }

    .pb-trust-item {
        font-size: 0.9rem;
    }
}

/* Dark theme variant (default) */
.pb-trust-bar--dark {
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(255, 255, 255, 0.1);
}

/* Light theme variant */
.pb-trust-bar--light {
    background: rgba(42, 147, 193, 0.05);
    border-color: rgba(42, 147, 193, 0.2);
}

.pb-trust-bar--light .pb-trust-item {
    color: #1a1a2e;
}
</style>
