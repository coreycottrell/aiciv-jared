<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureBrain Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     PUREBRAIN PORTAL — LOGIN PAGE
     Self-contained. Preserves handleLogin() interface.
     ============================================================ */

  :root {
    --bright-orange: #f1420b;
    --orange: #ed6626;
    --light-blue: #2a93c1;
    --dark-blue: #3a60ab;
    --black: #0a0a0a;
    --white: #ffffff;
    --muted: #888888;
    --font-heading: 'Oswald', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    /* Portal-specific */
    --card-bg: rgba(10, 10, 10, 0.85);
    --field-bg: rgba(255, 255, 255, 0.04);
    --field-border: rgba(255, 255, 255, 0.1);
    --glow-orange: rgba(241, 66, 11, 0.35);
    --glow-blue: rgba(42, 147, 193, 0.35);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    background: var(--black);
    color: var(--white);
  }

  /* ============================================================
     BACKGROUND — animated mesh gradient
     ============================================================ */

  .pb-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  /* Deep base */
  .pb-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(58, 96, 171, 0.28) 0%, transparent 65%),
      radial-gradient(ellipse 70% 70% at 80% 70%, rgba(241, 66, 11, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 110%, rgba(42, 147, 193, 0.12) 0%, transparent 55%);
    animation: meshDrift 18s ease-in-out infinite alternate;
  }

  /* Secondary layer — slow sweep */
  .pb-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 20%, rgba(42, 147, 193, 0.15) 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 10% 80%, rgba(241, 66, 11, 0.12) 0%, transparent 55%);
    animation: meshDrift 24s ease-in-out infinite alternate-reverse;
  }

  @keyframes meshDrift {
    0%   { transform: scale(1) translate(0, 0); }
    33%  { transform: scale(1.04) translate(-1%, 1.5%); }
    66%  { transform: scale(0.97) translate(1.5%, -1%); }
    100% { transform: scale(1.02) translate(-0.5%, 0.5%); }
  }

  /* ============================================================
     PARTICLE CANVAS — floats behind card
     ============================================================ */

  #pb-particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ============================================================
     ORB — glowing sphere in background
     ============================================================ */

  .pb-orb-wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
    animation: orbFloat 8s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    33%       { transform: translate(-50%, -51.5%) scale(1.02); }
    66%       { transform: translate(-50%, -48.5%) scale(0.99); }
  }

  .pb-orb {
    width: 420px;
    height: 420px;
    border-radius: 50%;
    position: relative;
    filter: blur(0px);
  }

  /* Core orb glow */
  .pb-orb-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 60% 60% at 38% 32%,
        rgba(255,255,255, 0.12) 0%,
        rgba(42,147,193, 0.18) 25%,
        rgba(58,96,171, 0.22) 50%,
        rgba(241,66,11, 0.08) 75%,
        transparent 100%
      );
    box-shadow:
      0 0 80px 20px rgba(42, 147, 193, 0.12),
      0 0 160px 40px rgba(58, 96, 171, 0.10),
      0 0 280px 80px rgba(241, 66, 11, 0.06),
      inset 0 0 80px 20px rgba(42, 147, 193, 0.06);
    animation: orbPulse 6s ease-in-out infinite;
    position: relative;
    overflow: hidden;
  }

  /* Glass highlight */
  .pb-orb-inner::before {
    content: '';
    position: absolute;
    top: 10%;
    left: 15%;
    width: 42%;
    height: 32%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
    transform: rotate(-25deg);
    filter: blur(8px);
  }

  /* Neural lines inside orb */
  .pb-orb-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        62deg,
        transparent,
        transparent 28px,
        rgba(42, 147, 193, 0.04) 28px,
        rgba(42, 147, 193, 0.04) 29px
      ),
      repeating-linear-gradient(
        -28deg,
        transparent,
        transparent 32px,
        rgba(241, 66, 11, 0.03) 32px,
        rgba(241, 66, 11, 0.03) 33px
      );
    border-radius: 50%;
    animation: neuralShift 12s linear infinite;
  }

  @keyframes orbPulse {
    0%, 100% {
      box-shadow:
        0 0 80px 20px rgba(42, 147, 193, 0.12),
        0 0 160px 40px rgba(58, 96, 171, 0.10),
        0 0 280px 80px rgba(241, 66, 11, 0.06),
        inset 0 0 80px 20px rgba(42, 147, 193, 0.06);
    }
    50% {
      box-shadow:
        0 0 100px 30px rgba(42, 147, 193, 0.18),
        0 0 200px 60px rgba(58, 96, 171, 0.14),
        0 0 340px 100px rgba(241, 66, 11, 0.09),
        inset 0 0 100px 30px rgba(42, 147, 193, 0.09);
    }
  }

  @keyframes neuralShift {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ============================================================
     OVERLAY — full screen login stage
     ============================================================ */

  #loginOverlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #loginOverlay.hidden {
    display: none;
  }

  /* ============================================================
     CARD — materializes from light
     ============================================================ */

  .pb-login-card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 48px 40px 0;
    text-align: center;

    /* Glass morphism */
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    border: 1px solid rgba(255, 255, 255, 0.08);

    /* Multi-layer glow */
    box-shadow:
      0 0 0 1px rgba(241, 66, 11, 0.08),
      0 8px 32px rgba(0, 0, 0, 0.6),
      0 0 60px rgba(42, 147, 193, 0.08),
      0 0 120px rgba(241, 66, 11, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.07);

    animation: cardMaterialize 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.2s;
    overflow: hidden;
  }

  /* Inner content wrapper with padding for all but footer */
  .pb-card-content {
    padding-bottom: 36px;
  }

  @keyframes cardMaterialize {
    0% {
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      box-shadow:
        0 0 0 1px rgba(241, 66, 11, 0),
        0 4px 16px rgba(0, 0, 0, 0.3),
        0 0 30px rgba(42, 147, 193, 0.03),
        0 0 0px rgba(241, 66, 11, 0);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* Top edge — orange-to-blue gradient line */
  .pb-login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(241, 66, 11, 0.6) 25%,
      rgba(42, 147, 193, 0.8) 50%,
      rgba(58, 96, 171, 0.6) 75%,
      transparent 100%
    );
    border-radius: 1px;
  }

  /* ============================================================
     LOGO — PURE BRAIN .ai
     ============================================================ */

  .pb-logo-wrap {
    margin-bottom: 28px;
    animation: logoReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.5s;
  }

  @keyframes logoReveal {
    0%   { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Brand icon — actual PureBrain hexagonal spirograph */
  .pb-logo-mark {
    display: block;
    width: 52px;
    height: 52px;
    margin: 0 auto 14px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow:
      0 0 16px 4px rgba(42, 147, 193, 0.3),
      0 0 32px 8px rgba(58, 96, 171, 0.2),
      0 0 8px 2px rgba(241, 66, 11, 0.25);
    animation: orbMarkGlow 3s ease-in-out infinite alternate;
  }

  @keyframes orbMarkGlow {
    0%  { box-shadow: 0 0 16px 4px rgba(42,147,193,0.3), 0 0 32px 8px rgba(58,96,171,0.2), 0 0 8px 2px rgba(241,66,11,0.25); }
    100%{ box-shadow: 0 0 20px 6px rgba(42,147,193,0.45), 0 0 40px 12px rgba(58,96,171,0.3), 0 0 12px 4px rgba(241,66,11,0.35); }
  }

  .pb-logo-wordmark {
    font-family: var(--font-heading);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  /* PUREBR = blue, AI = orange, N = blue, .ai = white — "AI" highlighted within "BRAIN" */
  .pb-logo-wordmark .pure  { color: #2a93c1; }
  .pb-logo-wordmark .brain { color: #f1420b; }
  .pb-logo-wordmark .brain-n { color: #2a93c1; }
  .pb-logo-wordmark .ai    { color: var(--white); font-weight: 400; }

  /* ============================================================
     HEADLINE + SUBTEXT
     ============================================================ */

  .pb-headline {
    font-family: var(--font-heading);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--white);
    margin-bottom: 8px;
    animation: contentReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.65s;
  }

  .pb-subtext {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.01em;
    margin-bottom: 32px;
    line-height: 1.5;
    animation: contentReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.75s;
  }

  .pb-subtext strong {
    color: rgba(255,255,255,0.55);
    font-weight: 500;
  }

  @keyframes contentReveal {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ============================================================
     FORM — floating label fields
     ============================================================ */

  .pb-form {
    text-align: left;
    animation: contentReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.85s;
  }

  .pb-field {
    position: relative;
    margin-bottom: 20px;
  }

  .pb-field label {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    letter-spacing: 0.01em;
    z-index: 1;
  }

  /* Float label when input has value or is focused */
  .pb-field input:not(:placeholder-shown) ~ label,
  .pb-field input:focus ~ label {
    top: 6px;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--light-blue);
    font-weight: 600;
  }

  .pb-field input {
    width: 100%;
    height: 52px;
    padding: 20px 14px 6px;
    border-radius: 10px;
    border: 1px solid var(--field-border);
    background: var(--field-bg);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .pb-field input::placeholder {
    color: transparent; /* hidden — label floats instead */
  }

  .pb-field input:focus {
    border-color: rgba(42, 147, 193, 0.6);
    background: rgba(42, 147, 193, 0.05);
    box-shadow:
      0 0 0 3px rgba(42, 147, 193, 0.12),
      inset 0 0 20px rgba(42, 147, 193, 0.04);
  }

  .pb-field input:focus ~ .pb-field-accent {
    transform: scaleX(1);
    opacity: 1;
  }

  /* Bottom accent bar on focus */
  .pb-field-accent {
    position: absolute;
    bottom: 0;
    left: 10px;
    right: 10px;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), var(--light-blue));
    border-radius: 0 0 2px 2px;
    transform: scaleX(0);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
    pointer-events: none;
  }

  /* ============================================================
     ERROR
     ============================================================ */

  .pb-error {
    display: none;
    color: #ff6b6b;
    font-size: 13px;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.2);
    border-radius: 8px;
    line-height: 1.4;
  }

  /* ============================================================
     SIGN IN BUTTON — orange-to-blue gradient + glow hover
     ============================================================ */

  .pb-signin-btn {
    width: 100%;
    height: 52px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: var(--font-heading);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.3s;

    /* Gradient */
    background: linear-gradient(105deg,
      var(--bright-orange) 0%,
      var(--orange) 30%,
      var(--light-blue) 70%,
      var(--dark-blue) 100%
    );

    /* Subtle shadow to lift button */
    box-shadow:
      0 4px 20px rgba(241, 66, 11, 0.3),
      0 2px 8px rgba(0, 0, 0, 0.4);
  }

  .pb-signin-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow:
      0 6px 30px rgba(241, 66, 11, 0.45),
      0 0 40px rgba(42, 147, 193, 0.2),
      0 3px 12px rgba(0, 0, 0, 0.4);
  }

  .pb-signin-btn:active:not(:disabled) {
    transform: translateY(0px);
    box-shadow:
      0 2px 12px rgba(241, 66, 11, 0.3),
      0 1px 4px rgba(0, 0, 0, 0.4);
  }

  .pb-signin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Shimmer sweep on hover */
  .pb-signin-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg,
      transparent,
      rgba(255,255,255,0.15),
      transparent
    );
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }

  .pb-signin-btn:hover:not(:disabled)::after {
    left: 160%;
  }

  /* Loading state text */
  .pb-signin-btn .btn-text      { display: inline; }
  .pb-signin-btn .btn-loading   { display: none; }
  .pb-signin-btn.loading .btn-text    { display: none; }
  .pb-signin-btn.loading .btn-loading { display: inline; }

  /* Spinner */
  .pb-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spinnerRotate 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    margin-top: -2px;
  }

  @keyframes spinnerRotate {
    to { transform: rotate(360deg); }
  }

  /* ============================================================
     ESCAPE HATCH — configure gateway link
     ============================================================ */

  .pb-escape {
    margin-top: 20px;
    text-align: center;
  }

  .pb-escape a {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.2s;
    border-bottom: 1px solid transparent;
  }

  .pb-escape a:hover {
    color: rgba(255,255,255,0.5);
    border-bottom-color: rgba(255,255,255,0.2);
  }

  /* ============================================================
     AGENT COUNT — trust signal
     ============================================================ */

  .pb-trust-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
    animation: contentReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.7s;
  }

  .pb-trust-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .pb-trust-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 6px var(--orange);
    animation: dotPulse 2s ease-in-out infinite;
  }

  .pb-trust-dot.blue {
    background: var(--light-blue);
    box-shadow: 0 0 6px var(--light-blue);
    animation-delay: 0.7s;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.7); }
  }

  .pb-trust-divider {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.1);
  }

  /* ============================================================
     FOOTER — Premium bottom banner with glow
     ============================================================ */

  .pb-footer {
    position: relative;
    margin-top: 28px;
    overflow: hidden;
    border-radius: 0 0 20px 20px;
    animation: contentReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 1.0s;
  }

  /* Gradient glow bar — orange-to-blue, inspired by purebrain.ai homepage banner */
  .pb-footer-glow-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(241, 66, 11, 0.8) 20%,
      rgba(42, 147, 193, 0.9) 50%,
      rgba(58, 96, 171, 0.7) 80%,
      transparent 100%
    );
  }

  /* The glowing banner background */
  .pb-footer-inner {
    position: relative;
    padding: 22px 24px 24px;
    background: linear-gradient(
      180deg,
      rgba(42, 147, 193, 0.06) 0%,
      rgba(241, 66, 11, 0.08) 50%,
      rgba(10, 10, 10, 0.4) 100%
    );
  }

  /* Ambient radial glow behind the footer content */
  .pb-footer-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 80% at 50% 120%,
        rgba(241, 66, 11, 0.18) 0%,
        rgba(42, 147, 193, 0.12) 40%,
        transparent 70%
      );
    animation: footerGlowPulse 4s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes footerGlowPulse {
    0%   { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.04); }
  }

  .pb-footer-powered {
    position: relative;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: var(--font-mono);
  }

  /* POWERED BY brand styling */
  .pb-footer-powered .pb-brand-pure    { color: #2a93c1; font-weight: 700; }
  .pb-footer-powered .pb-brand-brain   { color: #f1420b; font-weight: 700; }
  .pb-footer-powered .pb-brand-n       { color: #2a93c1; font-weight: 700; }
  .pb-footer-powered .pb-brand-ai      { color: rgba(255,255,255,0.6); font-weight: 500; }
  .pb-footer-powered .pb-brand-sep     { color: rgba(255,255,255,0.25); margin: 0 6px; }
  .pb-footer-powered .pb-brand-pt      { color: rgba(255,255,255,0.55); font-weight: 600; letter-spacing: 0.08em; }

  /* "AI Partnership. Redefined." — gradient text, prominent */
  .pb-footer-tagline {
    position: relative;
    font-family: var(--font-heading);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.1;

    /* Orange-to-blue gradient text */
    background: linear-gradient(100deg,
      #f1420b 0%,
      #ed6626 30%,
      #2a93c1 70%,
      #3a60ab 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    /* Glow effect on the text */
    filter: drop-shadow(0 0 12px rgba(241, 66, 11, 0.5)) drop-shadow(0 0 24px rgba(42, 147, 193, 0.3));
    animation: taglineGlow 3s ease-in-out infinite alternate;
  }

  @keyframes taglineGlow {
    0% {
      filter: drop-shadow(0 0 8px rgba(241, 66, 11, 0.4)) drop-shadow(0 0 16px rgba(42, 147, 193, 0.25));
    }
    100% {
      filter: drop-shadow(0 0 16px rgba(241, 66, 11, 0.65)) drop-shadow(0 0 32px rgba(42, 147, 193, 0.4));
    }
  }

  .pb-footer-tagline .tagline-dot {
    -webkit-text-fill-color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  /* ============================================================
     RESPONSIVE — mobile
     ============================================================ */

  @media (max-width: 480px) {
    .pb-login-card {
      border-radius: 16px;
    }

    .pb-card-content {
      padding: 0 24px 28px;
    }

<script>
/* ============================================================
   PARTICLE SYSTEM — floating light points
   ============================================================ */
(function initParticles() {
  const canvas = document.getElementById('pb-particles');
  const ctx    = canvas.getContext('2d');

  let W, H, particles = [];
  const COUNT = 55;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function makeParticle() {
    // Bias particles toward center-ish (where the card is)
    const cx = W * 0.5;
    const cy = H * 0.5;
    const spread = Math.min(W, H) * 0.6;
    return {
      x:     cx + randomBetween(-spread, spread),
      y:     cy + randomBetween(-spread * 0.9, spread * 0.9),
      vx:    randomBetween(-0.12, 0.12),
      vy:    randomBetween(-0.18, 0.05),
      size:  randomBetween(0.8, 2.2),
      alpha: randomBetween(0.04, 0.28),
      /* orange vs blue tint */
      hue:   Math.random() < 0.5
               ? { r: 241, g: 100, b: 30 }  /* warm orange */
               : { r: 42,  g: 147, b: 193 }, /* light blue */
      life:  randomBetween(0, Math.PI * 2), /* phase offset */
      speed: randomBetween(0.003, 0.008),
    };
  }

  function reset() {
    particles = Array.from({ length: COUNT }, makeParticle);
  }

  let raf;
  function tick() {
    ctx.clearRect(0, 0, W, H);

    particles.forEach(p => {
      p.life += p.speed;
      p.x    += p.vx;
      p.y    += p.vy;

      /* Pulsing alpha */
      const a = p.alpha * (0.5 + 0.5 * Math.sin(p.life));

      /* Wrap edges */
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.hue.r},${p.hue.g},${p.hue.b},${a})`;
      ctx.fill();
    });

    raf = requestAnimationFrame(tick);
  }

  window.addEventListener('resize', () => { resize(); reset(); });
  resize();
  reset();
  tick();
})();


/* ============================================================
   FLOATING LABEL — enforce correct state on autofill
   ============================================================ */
document.querySelectorAll('.pb-field input').forEach(function(input) {
  /* Chrome autofill fires animationstart on a named animation */
  input.addEventListener('animationstart', function(e) {
    if (e.animationName === 'onAutoFillStart') {
      input.classList.add('has-value');
    }
  });
});


/* ============================================================
   handleLogin() — STUB (replace with real implementation)
   Preserves the same interface as the original frontend.
   Reads from #loginAicivName and #loginSecret.
   ============================================================ */
function handleLogin() {
  const nameInput   = document.getElementById('loginAicivName');
  const secretInput = document.getElementById('loginSecret');
  const errorDiv    = document.getElementById('loginError');
  const button      = document.getElementById('loginButton');

  if (!nameInput || !secretInput) return;

  const aicivName = (nameInput.value   || '').trim();
  const secret    = (secretInput.value || '').trim();

  /* Clear previous error */
  errorDiv.style.display = 'none';
  errorDiv.textContent = '';

  /* Basic client-side validation */
  if (!aicivName) {
    showLoginError('Please enter your AI\'s name.');
    nameInput.focus();
    return;
  }
  if (!secret) {
    showLoginError('Please enter your secret.');
    secretInput.focus();
    return;
  }

  /* Show loading state */
  button.classList.add('loading');
  button.disabled = true;

  /* -------- REPLACE THIS BLOCK with real gateway POST --------
     Example:
     fetch('/api/auth', {
       method: 'POST',
       headers: { 'Content-Type': 'application/json' },
       body: JSON.stringify({ name: aicivName, secret })
     })
     .then(r => r.json())
     .then(data => {
       if (data.ok) {
         document.getElementById('loginOverlay').classList.add('hidden');
         // initialise the app...
       } else {
         showLoginError(data.message || 'Invalid credentials.');
       }
     })
     .catch(() => showLoginError('Connection failed. Please try again.'))
     .finally(() => {
       button.classList.remove('loading');
       button.disabled = false;
     });
     ------------------------------------------------------------- */

  /* Stub: simulate async call */
  setTimeout(function() {
    button.classList.remove('loading');
    button.disabled = false;
    /* Demo: hide overlay on success */
    /* document.getElementById('loginOverlay').classList.add('hidden'); */
    showLoginError('Gateway not configured — use "Configure gateway manually" below.');
  }, 1200);
}

function showLoginError(msg) {
  const errorDiv = document.getElementById('loginError');
  if (!errorDiv) return;
  errorDiv.textContent = msg;
  errorDiv.style.display = 'block';
  /* Shake animation */
  errorDiv.style.animation = 'none';
  errorDiv.offsetHeight; /* reflow */
  errorDiv.style.animation = 'errorShake 0.35s cubic-bezier(0.36,0.07,0.19,0.97)';
}

/* Inject shake keyframes dynamically (keeps CSS tidy above) */
(function() {
  var s = document.createElement('style');
  s.textContent = '@keyframes errorShake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)} }';
  document.head.appendChild(s);
})();


/* ============================================================
   KEYBOARD — Enter key submits
   ============================================================ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const overlay = document.getElementById('loginOverlay');
    if (overlay && !overlay.classList.contains('hidden')) {
