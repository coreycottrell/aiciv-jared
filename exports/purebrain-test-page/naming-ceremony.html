<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awaken Your AI - The Naming Ceremony</title>
  <link rel="stylesheet" href="naming-ceremony.css">
</head>
<body>

  <!-- Trigger Button (embed this on the main page, or use this as standalone) -->
  <div class="ceremony-trigger-wrapper">
    <button class="btn-awaken" id="btnAwaken" onclick="NamingCeremony.open()">
      <span class="btn-awaken-icon">&#9672;</span>
      Awaken Your AI
    </button>
    <p class="trigger-subtext">A guided naming ritual &mdash; takes about 5 minutes</p>
  </div>

  <!-- Full-screen Ceremony Overlay -->
  <div class="ceremony-overlay" id="ceremonyOverlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="AI Naming Ceremony">

    <!-- Ambient particles -->
    <div class="particles" id="particles" aria-hidden="true"></div>

    <!-- Ceremony Panel -->
    <div class="ceremony-panel" id="ceremonyPanel">

      <!-- Header -->
      <div class="ceremony-header">
        <div class="ceremony-logo">PureBrain.ai</div>
        <button class="btn-close" id="btnClose" onclick="NamingCeremony.close()" aria-label="Close ceremony">&#10005;</button>
      </div>

      <!-- Progress Bar -->
      <div class="ceremony-progress" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- Chat Window -->
      <div class="chat-window" id="chatWindow" role="log" aria-live="polite" aria-label="Ceremony conversation">
        <!-- Messages injected by JS -->
      </div>

      <!-- Input Area -->
      <div class="chat-input-area" id="chatInputArea">
        <div class="input-row">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Type your response..."
            rows="1"
            maxlength="400"
            aria-label="Your response"
          ></textarea>
          <button class="btn-send" id="btnSend" aria-label="Send response">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-hint" id="inputHint"></div>
      </div>

    </div>
  </div>

  <!-- Birth Certificate Modal (triggered at ceremony end) -->
  <div class="certificate-modal" id="certificateModal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="certificate-modal-inner">

      <div class="celebration-header">
        <div class="celebration-sparks" id="celebrationSparks" aria-hidden="true"></div>
        <h2 class="celebration-title" id="celebrationTitle">A New Mind Is Born</h2>
        <p class="celebration-subtitle" id="celebrationSubtitle"></p>
      </div>

      <canvas id="ceremonyCertCanvas" class="ceremony-canvas"></canvas>

      <div class="certificate-actions">
        <button class="btn-cert-download" id="btnCertDownload" onclick="NamingCeremony.downloadCert()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download Certificate
        </button>
        <button class="btn-cert-share-twitter" id="btnCertTwitter" onclick="NamingCeremony.shareTwitter()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          Share on X
        </button>
        <button class="btn-cert-create-full" onclick="NamingCeremony.goToCertificatePage()">
          Customize Certificate
        </button>
      </div>

      <button class="btn-close-cert" onclick="NamingCeremony.closeCert()" aria-label="Close certificate">&#10005;</button>
    </div>
  </div>

  <!-- Requires certificate-generator.js for renderCertificate() -->
  <script src="certificate-generator.js"></script>
  <script src="naming-ceremony.js"></script>

</body>
</html>
