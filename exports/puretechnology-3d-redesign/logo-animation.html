<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Technology — Logo Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #080a12;
  overflow: hidden;
  font-family: 'Oswald', sans-serif;
}

#container {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #080a12;
}

#canvas-wrap {
  position: relative;
  width: 100vmin; max-width: 900px;
  height: 100vmin; max-height: 900px;
}

canvas {
  display: block; width: 100%; height: 100%;
}

#brand-text {
  position: absolute;
  bottom: 11%;
  left: 50%; transform: translateX(-50%);
  text-align: center;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
}

#brand-name {
  font-family: 'Oswald', sans-serif;
  font-weight: 500;
  font-size: clamp(16px, 3.6vmin, 40px);
  letter-spacing: 0.30em;
  color: #ffffff;
  text-transform: uppercase;
  line-height: 1;
  text-shadow: 0 0 30px rgba(42,147,193,0.5);
}

#brand-sub {
  font-family: 'Oswald', sans-serif;
  font-weight: 300;
  font-size: clamp(8px, 1.5vmin, 16px);
  letter-spacing: 0.6em;
  color: #2a93c1;
  text-transform: uppercase;
  margin-top: 0.55em;
  line-height: 1;
  opacity: 0.8;
}

#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 2px;
  width: 0%;
  background: linear-gradient(90deg, #2a93c1, #f1420b);
  transition: none;
  z-index: 20;
}

#replay-btn {
  position: fixed;
  bottom: 22px; right: 22px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(42,147,193,0.12);
  border: 1px solid rgba(42,147,193,0.30);
  color: #2a93c1;
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.5s, background 0.2s;
  backdrop-filter: blur(10px);
  z-index: 30;
}
#replay-btn:hover { background: rgba(42,147,193,0.25); }
#replay-btn.vis { opacity: 1; }

/* CRT scanlines for cinematic feel */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
  );
  pointer-events: none;
  z-index: 100;
}
</style>
</head>
<body>
<div id="container">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="brand-text">
      <div id="brand-name">Pure Technology</div>
      <div id="brand-sub">Intelligence &middot; Design &middot; Growth</div>
    </div>
  </div>
</div>
<div id="progress-bar"></div>
<button id="replay-btn" title="Replay">&#8635;</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

// ── PALETTE ──────────────────────────────────────────────────────────────────
const C_BLUE   = new THREE.Color('#2a93c1');
const C_ORANGE = new THREE.Color('#f1420b');
const C_DARK   = '#080a12';

// ── RENDERER ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const wrap = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(C_DARK);
scene.fog = new THREE.FogExp2(C_DARK, 0.04);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 120);
camera.position.set(0, 0, 11.0);
camera.lookAt(0, 0, 0);

function onResize() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  composer.setSize(W, H);
  bloomPass.setSize(W, H);
}

// ── SYNTHETIC ENV MAP ─────────────────────────────────────────────────────────
function buildEnvMap() {
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const ec = Object.assign(document.createElement('canvas'), { width:512, height:256 });
  const ctx = ec.getContext('2d');

  ctx.fillStyle = '#020408'; ctx.fillRect(0,0,512,256);

  const paints = [
    [400, 45, 200, 'rgba(241,120,30,0.9)',  'rgba(241,66,11,0.35)'],
    [60,  220, 200, 'rgba(42,147,193,0.85)', 'rgba(20,80,140,0.3)'],
    [256, 10, 130,  'rgba(0,210,255,0.55)',  'rgba(0,0,0,0)'],
    [256, 245, 110, 'rgba(200,160,60,0.4)',  'rgba(0,0,0,0)'],
    [450, 200, 90,  'rgba(100,60,200,0.3)',  'rgba(0,0,0,0)'],
  ];
  paints.forEach(([cx,cy,cr,c0,c1]) => {
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,cr);
    g.addColorStop(0, c0); g.addColorStop(1, c1);
    ctx.fillStyle = g; ctx.fillRect(0,0,512,256);
  });

  const tex = new THREE.CanvasTexture(ec);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const env = pmrem.fromEquirectangular(tex).texture;
  pmrem.dispose();
  return env;
}

const envMap = buildEnvMap();
scene.environment = envMap;

// ── LIGHTING ──────────────────────────────────────────────────────────────────
const sunLight = new THREE.DirectionalLight(0xffffff, 2.4);
sunLight.position.set(4, 6, 5);
scene.add(sunLight);

const blueRim  = new THREE.PointLight(0x2a93c1, 4.5, 20);
blueRim.position.set(-5, 2, 3); scene.add(blueRim);

const orangePt = new THREE.PointLight(0xf1420b, 3.2, 15);
orangePt.position.set(3, -2, 2); scene.add(orangePt);

const cyanPt   = new THREE.PointLight(0x00cfff, 2.0, 14);
cyanPt.position.set(1, 5, -2); scene.add(cyanPt);

const ambLight = new THREE.AmbientLight(0x111824, 1.4); scene.add(ambLight);

// ── POST-PROCESSING ───────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(wrap.clientWidth, wrap.clientHeight),
  0.6, 0.45, 0.78
);
composer.addPass(bloomPass);

const chromaPass = new ShaderPass({
  uniforms: {
    tDiffuse: { value: null },
    uT:      { value: 0.0 },
    uCA:     { value: 0.0 },
    uVig:    { value: 0.52 },
    uFlash:  { value: 0.0 },
  },
  vertexShader:`varying vec2 vUv;
    void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform sampler2D tDiffuse;
    uniform float uT,uCA,uVig,uFlash;
    varying vec2 vUv;
    void main(){
      vec2 uv=vUv;
      vec2 c=uv-0.5; float d=length(c);
      float ca=uCA*d*0.022;
      vec2 dir=normalize(c+0.0001);
      float r=texture2D(tDiffuse,uv+dir*ca).r;
      float g=texture2D(tDiffuse,uv).g;
      float b=texture2D(tDiffuse,uv-dir*ca*0.65).b;
      float vig=1.0-smoothstep(0.32,0.90,d*uVig*1.7);
      vec3 col=vec3(r,g,b)*vig;
      col+=uFlash;
      gl_FragColor=vec4(col,1.0);
    }`
});
composer.addPass(chromaPass);
composer.addPass(new OutputPass());

// ═══════════════════════════════════════════════════════════════════════════════
//  LOGO GEOMETRY
//  8 nested hexagon ring layers. Each is a group containing:
//    - Thin extruded hex prism (MeshPhysicalMaterial, glass)
//    - EdgesGeometry wireframe (glow color)
//    - Emissive rim shell (BackSide)
// ═══════════════════════════════════════════════════════════════════════════════

// Ring definitions: radius, colors, rotation speed, direction
const RING_DEFS = [
  { r:2.60, hex:'#2a93c1', emi:'#1a5f80', dir: 1, spd:0.09 },
  { r:2.18, hex:'#2a93c1', emi:'#1a6090', dir:-1, spd:0.13 },
  { r:1.80, hex:'#4b7faa', emi:'#2a5090', dir: 1, spd:0.18 },
  { r:1.46, hex:'#8060a8', emi:'#502880', dir:-1, spd:0.25 },
  { r:1.16, hex:'#b84868', emi:'#881030', dir: 1, spd:0.33 },
  { r:0.90, hex:'#e03040', emi:'#c01020', dir:-1, spd:0.44 },
  { r:0.66, hex:'#f1420b', emi:'#ff5500', dir: 1, spd:0.59 },
  { r:0.46, hex:'#f1420b', emi:'#ff8010', dir:-1, spd:0.78 },
];

// Master group for all logo pieces
const logoGroup = new THREE.Group();
scene.add(logoGroup);

// Ring objects
const rings = [];

function makeMeshPhysGlassMat(hex, emi) {
  return new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(hex),
    emissive: new THREE.Color(emi),
    emissiveIntensity: 0.55,
    metalness: 0.12,
    roughness: 0.05,
    transmission: 0.82,
    ior: 1.48,
    thickness: 0.25,
    specularIntensity: 1.0,
    specularColor: new THREE.Color('#ffffff'),
    envMapIntensity: 1.5,
    clearcoat: 1.0,
    clearcoatRoughness: 0.03,
    transparent: true,
    opacity: 0.82,
    side: THREE.DoubleSide,
  });
}

// Scatter seed per ring
const SCATTER = RING_DEFS.map((_, i) => {
  const theta = Math.random() * Math.PI * 2;
  const phi   = (Math.random() - 0.5) * Math.PI * 0.6;
  const dist  = 5.0 + Math.random() * 4.0;
  return {
    px: Math.cos(theta) * Math.cos(phi) * dist,
    py: Math.sin(phi) * dist * 0.55,
    pz: Math.sin(theta) * Math.cos(phi) * dist * 0.3 - 4.0,
    rx: (Math.random() - 0.5) * Math.PI * 2.5,
    ry: (Math.random() - 0.5) * Math.PI * 2.5,
    rz: (Math.random() - 0.5) * Math.PI * 2.5,
  };
});

RING_DEFS.forEach((def, i) => {
  const group = new THREE.Group();
  // Final assembled: flat in XY plane = rotate X 90deg
  group.rotation.x = Math.PI / 2;

  // Hex prism: thin extruded hexagon
  const geo = new THREE.CylinderGeometry(def.r, def.r, 0.07, 6, 1, false);
  const mat = makeMeshPhysGlassMat(def.hex, def.emi);
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  // EdgesGeometry wire — crisp hex outline
  const edgeGeo = new THREE.EdgesGeometry(geo, 15);
  const edgeMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(def.hex),
    transparent: true, opacity: 0.92,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const edges = new THREE.LineSegments(edgeGeo, edgeMat);
  group.add(edges);

  // Emissive glow rim (BackSide open cylinder slightly larger)
  const rimGeo = new THREE.CylinderGeometry(def.r + 0.015, def.r + 0.015, 0.045, 6, 1, true);
  const rimMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(def.emi),
    transparent: true, opacity: 0.20,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  group.add(new THREE.Mesh(rimGeo, rimMat));

  // Inner glow disc (face-on additive plane matching hex)
  const discGeo = new THREE.CylinderGeometry(def.r * 0.85, def.r * 0.85, 0.01, 6);
  const discMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(def.hex),
    transparent: true, opacity: 0.04,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  group.add(new THREE.Mesh(discGeo, discMat));

  // Z-layering in assembled form (very subtle)
  const finalZ = i * 0.006;

  // Apply scatter start
  const sc = SCATTER[i];
  group.position.set(sc.px, sc.py, sc.pz);
  group.rotation.set(sc.rx, sc.ry, sc.rz);

  logoGroup.add(group);
  rings.push({ group, mesh, mat, edgeMat, rimMat, def, finalZ, sc, idx: i });
});

// ── SPIRAL BLADE LINES ────────────────────────────────────────────────────────
// The signature feature of the logo: spiral lines from outer hex edge to core
const bladeGroup = new THREE.Group();
bladeGroup.rotation.x = Math.PI / 2;
logoGroup.add(bladeGroup);

function buildBlades() {
  while(bladeGroup.children.length) bladeGroup.remove(bladeGroup.children[0]);

  const NUM_BLADES = 54;
  const SEG = 22;
  const OUTER_R = 2.55;
  const INNER_R = 0.17;
  const TWIST = Math.PI * 1.55; // ~280 degree spiral

  const pos = [], col = [];

  for(let b = 0; b < NUM_BLADES; b++) {
    const t0   = b / NUM_BLADES;
    const aStart = t0 * Math.PI * 2;
    const width  = 0.008 + Math.random() * 0.004; // slight width variation

    for(let s = 0; s < SEG; s++) {
      const u0 = s / SEG, u1 = (s+1) / SEG;
      const r0 = OUTER_R*(1-u0) + INNER_R*u0;
      const r1 = OUTER_R*(1-u1) + INNER_R*u1;
      const a0 = aStart + u0*TWIST;
      const a1 = aStart + u1*TWIST;

      // Slight z-arc for 3D depth
      const z0 = Math.sin(u0*Math.PI)*0.05;
      const z1 = Math.sin(u1*Math.PI)*0.05;

      pos.push(Math.cos(a0)*r0, Math.sin(a0)*r0, z0);
      pos.push(Math.cos(a1)*r1, Math.sin(a1)*r1, z1);

      // Color gradient blue→orange
      pos.push(Math.cos(a0)*r0+width, Math.sin(a0)*r0+width, z0);
      pos.push(Math.cos(a1)*r1+width, Math.sin(a1)*r1+width, z1);

      const blend0 = u0, blend1 = u1;
      const pushColor = (u) => {
        col.push(
          C_BLUE.r*(1-u)+C_ORANGE.r*u,
          C_BLUE.g*(1-u)+C_ORANGE.g*u,
          C_BLUE.b*(1-u)+C_ORANGE.b*u,
        );
      };
      pushColor(blend0); pushColor(blend1);
      pushColor(blend0); pushColor(blend1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(col, 3));

  const mat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true, opacity: 0.0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });

  return new THREE.LineSegments(geo, mat);
}

const blades = buildBlades();
bladeGroup.add(blades);

// ── CORONA TORUS RINGS ────────────────────────────────────────────────────────
const coronas = [];
function addCorona(r, tube, hex, rx=Math.PI/2, ry=0, rz=0) {
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(hex),
    emissive: new THREE.Color(hex),
    emissiveIntensity: 2.2,
    transparent: true, opacity: 0.0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const m = new THREE.Mesh(new THREE.TorusGeometry(r, tube, 12, 100), mat);
  m.rotation.set(rx, ry, rz);
  scene.add(m);
  coronas.push({ m, mat });
  return m;
}

const c1 = addCorona(2.90, 0.011, '#2a93c1');
const c2 = addCorona(2.20, 0.009, '#2a93c1', Math.PI*0.28, 0, Math.PI*0.1);
const c3 = addCorona(1.42, 0.009, '#8060a8');
const c4 = addCorona(1.10, 0.008, '#f1420b', -Math.PI*0.22, Math.PI*0.05, 0);
const c5 = addCorona(0.60, 0.007, '#f1420b');

// ── CENTRAL CORE ──────────────────────────────────────────────────────────────
const coreGroup = new THREE.Group();
scene.add(coreGroup);

// Black void
const voidM = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 64, 64),
  new THREE.MeshStandardMaterial({ color:0x000000, emissive:0x000000, roughness:1 })
);
coreGroup.add(voidM);

// Orange inner halo
const haloMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color('#f1420b'), transparent:true, opacity:0.0,
  side: THREE.BackSide, blending:THREE.AdditiveBlending, depthWrite:false
});
coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.24, 64, 64), haloMat));

// Blue outer halo
const outerHaloMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color('#2a93c1'), transparent:true, opacity:0.0,
  side: THREE.BackSide, blending:THREE.AdditiveBlending, depthWrite:false
});
coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.42, 48, 48), outerHaloMat));

// ── LIGHT RAYS (snap burst) ───────────────────────────────────────────────────
const rayGroup = new THREE.Group();
scene.add(rayGroup);
const NUM_RAYS = 12;
const rayMats = [];
for(let i = 0; i < NUM_RAYS; i++) {
  const angle = (i/NUM_RAYS)*Math.PI*2;
  const len   = 1.2 + (i%3)*0.35;
  const isBlue = i % 2 === 0;
  const rayGeo = new THREE.PlaneGeometry(0.03, len);
  const rayMat = new THREE.MeshBasicMaterial({
    color: isBlue ? new THREE.Color('#2a93c1') : new THREE.Color('#f1420b'),
    transparent: true, opacity: 0.0,
    blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
  });
  const m = new THREE.Mesh(rayGeo, rayMat);
  m.rotation.z = angle;
  m.position.set(Math.cos(angle)*len*0.5, Math.sin(angle)*len*0.5, 0.08);
  rayGroup.add(m);
  rayMats.push(rayMat);
}

// ── SHOCKWAVE ─────────────────────────────────────────────────────────────────
const shockMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color('#88ccff'), transparent:true, opacity:0.0,
  blending: THREE.AdditiveBlending, depthWrite:false
});
const shockwave = new THREE.Mesh(
  new THREE.TorusGeometry(0.08, 0.02, 8, 80),
  shockMat
);
shockwave.rotation.x = Math.PI/2;
scene.add(shockwave);

// Second orange shockwave
const shockMat2 = new THREE.MeshBasicMaterial({
  color: new THREE.Color('#ff5500'), transparent:true, opacity:0.0,
  blending: THREE.AdditiveBlending, depthWrite:false
});
const shockwave2 = new THREE.Mesh(
  new THREE.TorusGeometry(0.06, 0.018, 8, 80),
  shockMat2
);
shockwave2.rotation.x = Math.PI/2;
scene.add(shockwave2);

// ── PARTICLE FIELD ────────────────────────────────────────────────────────────
const NP = 1400;
const pp = new Float32Array(NP*3), pc = new Float32Array(NP*3);
const pR = new Float32Array(NP), pT = new Float32Array(NP);
const pPhi = new Float32Array(NP), pSpd = new Float32Array(NP);

for(let i=0;i<NP;i++){
  pR[i]   = 2.0 + Math.random()*3.0;
  pT[i]   = Math.random()*Math.PI*2;
  pPhi[i] = (Math.random()-0.5)*Math.PI*0.8;
  pSpd[i] = (0.10+Math.random()*0.22)*(Math.random()>0.5?1:-1);
  const bl = (pR[i]-2.0)/3.0;
  pc[i*3]   = C_ORANGE.r*(1-bl)+C_BLUE.r*bl;
  pc[i*3+1] = C_ORANGE.g*(1-bl)+C_BLUE.g*bl;
  pc[i*3+2] = C_ORANGE.b*(1-bl)+C_BLUE.b*bl;
}

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pp, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pc, 3));
const pMat = new THREE.PointsMaterial({
  size:0.025, vertexColors:true,
  transparent:true, opacity:0.0,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
});
const ptcls = new THREE.Points(pGeo, pMat);
scene.add(ptcls);

// ── BACKGROUND STARFIELD ──────────────────────────────────────────────────────
const NS = 600;
const sp2 = new Float32Array(NS*3), sc2 = new Float32Array(NS*3);
for(let i=0;i<NS;i++){
  sp2[i*3]   = (Math.random()-0.5)*60;
  sp2[i*3+1] = (Math.random()-0.5)*60;
  sp2[i*3+2] = (Math.random()-0.5)*30 - 15;
  sc2[i*3] = sc2[i*3+1] = sc2[i*3+2] = 0.3+Math.random()*0.7;
}
const sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.BufferAttribute(sp2, 3));
sGeo.setAttribute('color',    new THREE.BufferAttribute(sc2, 3));
scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({
  size:0.06, vertexColors:true,
  transparent:true, opacity:0.18,
  blending:THREE.AdditiveBlending, depthWrite:false
})));

// ═══════════════════════════════════════════════════════════════════════════════
//  ANIMATION STATE
// ═══════════════════════════════════════════════════════════════════════════════
let globalT = 0;
let camTargetZ = 11.0, camZ = 11.0;
let camAutoA = 0;
let masterTL = null;
let phase = 'idle';
const clock = new THREE.Clock();
let frame = 0;

// Progress bar element
const progBar = document.getElementById('progress-bar');
const TOTAL_DURATION = 8.5; // seconds of the TL

// ── RESET ALL ANIMATED STATE ──────────────────────────────────────────────────
function resetState() {
  // Scatter ring positions
  rings.forEach((ring, i) => {
    const sc = ring.sc;
    ring.group.position.set(sc.px, sc.py, sc.pz);
    ring.group.rotation.set(sc.rx, sc.ry, sc.rz);
    ring.group.scale.setScalar(1.0);
  });
  shockwave.scale.setScalar(1);
  shockwave2.scale.setScalar(1);
  shockMat.opacity   = 0;
  shockMat2.opacity  = 0;
  blades.material.opacity = 0;
  pMat.opacity        = 0;
  haloMat.opacity     = 0;
  outerHaloMat.opacity = 0;
  coronas.forEach(c => { c.mat.opacity = 0; });
  rayMats.forEach(m => { m.opacity = 0; });
  bloomPass.strength  = 0.12;
  chromaPass.uniforms.uCA.value    = 0;
  chromaPass.uniforms.uFlash.value = 0;
  camTargetZ = 11.0;
  camAutoA   = 0;
  document.getElementById('brand-text').style.opacity = '0';
  document.getElementById('brand-text').style.transition = 'none';
  document.getElementById('replay-btn').classList.remove('vis');
  progBar.style.width = '0%';
}

// ── BUILD GSAP MASTER TIMELINE ────────────────────────────────────────────────
function buildTimeline() {
  resetState();
  if(masterTL) { masterTL.kill(); masterTL = null; }

  const gsap = window.gsap;
  masterTL = gsap.timeline({
    onUpdate() {
      // Drive progress bar
      const p = masterTL.progress() * 100;
      progBar.style.width = p + '%';
    },
    onComplete() {
      phase = 'hold';
      progBar.style.width = '0%';
      document.getElementById('replay-btn').classList.add('vis');
    }
  });

  // ── PHASE 0: PRE-ROLL (0 → 0.6s) ─────────────────────────────────────────
  // Pieces are scattered, particles fade in, energy builds
  masterTL.to(pMat, { opacity: 0.45, duration: 1.4, ease:'power2.out' }, 0.0);

  // ── PHASE 1: SCATTER DRIFT (0 → 0.8s) ────────────────────────────────────
  // Each ring drifts/spins in scatter space before being called home
  rings.forEach((ring, i) => {
    masterTL.to(ring.group.rotation, {
      x: ring.sc.rx + 0.4,
      y: ring.sc.ry + 0.3,
      z: ring.sc.rz + 0.5,
      duration: 0.8, ease: 'sine.inOut',
    }, 0);
  });

  // ── PHASE 2: ASSEMBLY (0.8s → 3.6s) — rings fly in, staggered ────────────
  const ASSEMBLE_START = 0.85;
  const STAGGER = 0.20;

  rings.forEach((ring, i) => {
    const t = ASSEMBLE_START + i * STAGGER;

    // Position fly-in
    masterTL.to(ring.group.position, {
      x: 0, y: 0, z: ring.finalZ,
      duration: 1.05, ease: 'expo.out',
    }, t);

    // Rotation snap flat
    masterTL.to(ring.group.rotation, {
      x: Math.PI/2, y: 0, z: 0,
      duration: 0.95, ease: 'expo.out',
    }, t);

    // Approach scale (come in big, slam to 1)
    masterTL.fromTo(ring.group.scale,
      { x: 1.7, y: 1.7, z: 1.7 },
      { x: 1.0, y: 1.0, z: 1.0, duration: 0.65, ease: 'back.out(2.8)' },
    t + 0.42);

    // Per-ring bloom spike
    const snapT = t + 1.02;
    masterTL.to(bloomPass, { strength: 1.8, duration: 0.06, ease:'none' }, snapT);
    masterTL.to(bloomPass, { strength: 0.50, duration: 0.55, ease:'power2.out' }, snapT+0.06);

    // Emissive flash on each ring snap
    masterTL.to(ring.mat, { emissiveIntensity: 2.5, duration: 0.05 }, snapT);
    masterTL.to(ring.mat, { emissiveIntensity: 0.55, duration: 0.6, ease:'power2.out' }, snapT+0.05);
  });

  // ── PHASE 3: FINAL SNAP (rings[7] lands) ──────────────────────────────────
  const FINAL_SNAP = ASSEMBLE_START + rings.length * STAGGER + 1.05;

  // White flash
  masterTL.to(chromaPass.uniforms.uFlash, { value: 0.5, duration:0.04 }, FINAL_SNAP);
  masterTL.to(chromaPass.uniforms.uFlash, { value: 0.0, duration:0.55, ease:'power3.out' }, FINAL_SNAP+0.04);

  // Mega bloom
  masterTL.to(bloomPass, { strength: 3.0, duration:0.05 }, FINAL_SNAP);
  masterTL.to(bloomPass, { strength: 0.62, duration:1.4, ease:'power2.out' }, FINAL_SNAP+0.05);

  // Chromatic aberration spike
  masterTL.to(chromaPass.uniforms.uCA, { value: 4.0, duration:0.08 }, FINAL_SNAP);
  masterTL.to(chromaPass.uniforms.uCA, { value: 0.9, duration:1.6, ease:'power2.out' }, FINAL_SNAP+0.08);

  // Shockwave #1 (blue)
  masterTL.to(shockMat, { opacity:0.95, duration:0.03 }, FINAL_SNAP);
  masterTL.to(shockMat, { opacity:0.0, duration:0.9, ease:'power3.out' }, FINAL_SNAP+0.03);
  masterTL.to(shockwave.scale, { x:24, y:24, z:24, duration:0.9, ease:'expo.out' }, FINAL_SNAP);

  // Shockwave #2 (orange, delayed)
  masterTL.to(shockMat2, { opacity:0.75, duration:0.03 }, FINAL_SNAP+0.12);
  masterTL.to(shockMat2, { opacity:0.0, duration:0.75, ease:'power3.out' }, FINAL_SNAP+0.15);
  masterTL.to(shockwave2.scale, { x:18, y:18, z:18, duration:0.85, ease:'expo.out' }, FINAL_SNAP+0.12);

  // ── PHASE 4: REVEAL (FINAL_SNAP+0.3 → FINAL_SNAP+2.2) ────────────────────
  const R = FINAL_SNAP + 0.28;

  // Blade lines sweep in
  masterTL.to(blades.material, { opacity:0.62, duration:1.1, ease:'power2.inOut' }, R);

  // Core ignites
  masterTL.to(haloMat, { opacity:0.80, duration:0.55, ease:'power4.out' }, R+0.05);
  masterTL.to(outerHaloMat, { opacity:0.25, duration:0.9, ease:'power2.inOut' }, R+0.2);

  // Coronas appear
  coronas.forEach((c, i) => {
    masterTL.to(c.mat, { opacity:0.52, duration:0.7, ease:'power2.inOut' }, R + i*0.10);
  });

  // Ray burst (quick flash then settle)
  rayMats.forEach((m, i) => {
    masterTL.to(m, { opacity:0.55, duration:0.18, ease:'power4.out' }, R+0.05+i*0.025);
    masterTL.to(m, { opacity:0.10, duration:0.8, ease:'power2.out' }, R+0.23+i*0.025);
  });

  // Camera pull-back
  masterTL.to({ z:11 }, {
    z: 8.5,
    duration: 2.0, ease:'power2.inOut',
    onUpdate: function() { camTargetZ = this.targets()[0].z; }
  }, R);

  // ── PHASE 5: TEXT IN ─────────────────────────────────────────────────────
  const TEXT_IN = R + 1.5;
  masterTL.to({}, {
    duration: 0.01,
    onComplete: () => {
      const bt = document.getElementById('brand-text');
      bt.style.transition = 'opacity 1.3s ease';
      bt.style.opacity = '1';
    }
  }, TEXT_IN);

  phase = 'animating';
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  frame++;
  const dt    = Math.min(clock.getDelta(), 0.05);
  globalT    += dt;
  const t     = globalT;

  // ── RING ROTATIONS ────────────────────────────────────────────────────────
  const assembleP = Math.max(0, Math.min(1, (t - 3.0) * 0.8));
  rings.forEach(ring => {
    const spd = ring.def.spd * ring.def.dir;
    ring.group.rotation.z += spd * dt * assembleP;

    // Wobble when assembled
    if(assembleP > 0.6) {
      const wb = globalT * 0.45 + ring.idx * 0.55;
      ring.group.rotation.x = Math.PI/2 + Math.sin(wb*0.65)*0.018*assembleP;
    }
  });

  // Blade drift
  bladeGroup.rotation.z = t * 0.042 * assembleP;

  // ── CORONA ROTATIONS ─────────────────────────────────────────────────────
  c1.rotation.z =  t * 0.09;
  c2.rotation.y =  t * 0.05;
  c3.rotation.z = -t * 0.13;
  c4.rotation.x += 0.006;
  c5.rotation.z =  t * 0.22;

  // Rays slowly rotate
  rayGroup.rotation.z = t * 0.08;

  // ── CORE PULSE ───────────────────────────────────────────────────────────
  const pulse = 1.0 + Math.sin(t * 3.6) * 0.16;
  haloMat.emissiveIntensity = 5.2 * pulse;
  coreGroup.scale.setScalar(0.97 + Math.sin(t*2.0)*0.04);

  // ── LIGHTS ───────────────────────────────────────────────────────────────
  blueRim.position.x  = Math.cos(t*0.32)*5.0;
  blueRim.position.z  = Math.sin(t*0.32)*4.0;
  blueRim.intensity   = 4.5 + Math.sin(t*1.05)*1.0;
  orangePt.position.x = Math.sin(t*0.25)*4.0;
  orangePt.intensity  = 3.2 + Math.sin(t*2.1)*0.7;
  cyanPt.intensity    = 2.0 + Math.sin(t*0.85)*0.5;

  // ── PARTICLES (update every 2 frames) ───────────────────────────────────
  if(frame % 2 === 0) {
    const pa = pGeo.attributes.position.array;
    for(let i=0;i<NP;i++){
      pT[i] += pSpd[i]*dt;
      pa[i*3]   = Math.cos(pT[i])*Math.cos(pPhi[i])*pR[i];
      pa[i*3+1] = Math.sin(pPhi[i])*pR[i]*0.40;
      pa[i*3+2] = Math.sin(pT[i])*Math.cos(pPhi[i])*pR[i]*0.32;
    }
    pGeo.attributes.position.needsUpdate = true;
  }

  // ── CAMERA ───────────────────────────────────────────────────────────────
  camZ += (camTargetZ - camZ) * 0.038;
  camera.position.z = camZ;

  if(phase === 'hold') {
    camAutoA += 0.003;
    camera.position.x = Math.sin(camAutoA) * 0.55;
    camera.position.y = Math.cos(camAutoA*0.55) * 0.20;
    camera.lookAt(0, 0, 0);

    // Breathing bloom
    bloomPass.strength = 0.58 + Math.sin(t*1.3)*0.07;
  }

  // ── POST ─────────────────────────────────────────────────────────────────
  chromaPass.uniforms.uT.value = t;

  composer.render();
}

// ─── REPLAY ──────────────────────────────────────────────────────────────────
document.getElementById('replay-btn').addEventListener('click', () => {
  globalT = 0;
  clock.start();
  buildTimeline();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
onResize();
window.addEventListener('resize', onResize);
animate();

// Slight delay to ensure GSAP + fonts loaded
setTimeout(buildTimeline, 180);

</script>
