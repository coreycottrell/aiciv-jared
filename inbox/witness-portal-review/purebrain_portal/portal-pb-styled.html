<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Witness — AI Civilization</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bright-orange: #f1420b;
    --orange: #ed6626;
    --light-blue: #2a93c1;
    --dark-blue: #3a60ab;
    --black: #0a0a0a;
    --white: #ffffff;
    --muted: #888888;
    --card-bg: rgba(20, 20, 20, 0.97);
    --border-color: rgba(255, 255, 255, 0.1);
    --hover-bg: rgba(255, 255, 255, 0.05);
    --success: #22c55e;
    --error: #ef4444;
    --input-bg: rgba(0, 0, 0, 0.3);
    --text-primary: rgba(255, 255, 255, 0.95);
    --text-secondary: rgba(255, 255, 255, 0.7);
    --text-muted: rgba(255, 255, 255, 0.45);
    --font-heading: 'Helvetica Neue', Arial, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --sidebar-w: 200px;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--black);
    color: var(--text-primary);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    -webkit-text-size-adjust: 100%;
    line-height: 1.5;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  /* ── Gradient helpers ── */
  .grad { background: linear-gradient(135deg, var(--bright-orange), var(--light-blue)); }
  .grad-text {
    background: linear-gradient(135deg, var(--bright-orange) 0%, var(--light-blue) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ══════════════════════════════════════
     AUTH OVERLAY
  ══════════════════════════════════════ */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10, 10, 10, 0.92);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px);
  }

  .auth-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 40px 32px 36px;
    width: 360px; max-width: 92vw;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }

  .auth-logo {
    width: 64px; height: 64px; margin: 0 auto 20px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading);
    font-size: 1.6rem; font-weight: 800; color: #fff;
    letter-spacing: -0.02em;
    box-shadow: 0 8px 24px rgba(241,66,11,0.4);
    animation: logoGlow 3s ease-in-out infinite;
  }
  @keyframes logoGlow {
    0%, 100% { box-shadow: 0 8px 24px rgba(241,66,11,0.4); }
    50% { box-shadow: 0 8px 32px rgba(42,147,193,0.5); }
  }

  .auth-title {
    font-family: var(--font-heading);
    font-size: 1.4rem; font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .auth-subtitle { color: var(--muted); font-size: 0.8rem; margin-bottom: 28px; }

  .auth-field { margin-bottom: 14px; text-align: left; }
  .auth-field label {
    display: block; font-size: 0.7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-secondary); margin-bottom: 6px;
  }
  .auth-field input {
    width: 100%; padding: 11px 14px;
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    border-radius: 10px; color: var(--text-primary);
    font-size: 0.9rem; font-family: var(--font-mono);
    outline: none; transition: border-color 0.2s;
  }
  .auth-field input:focus { border-color: var(--light-blue); }
  .auth-field input::placeholder { color: var(--muted); }

  .auth-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    color: #fff; border: none; border-radius: 12px;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    letter-spacing: 0.04em; transition: opacity 0.2s, transform 0.15s;
    margin-top: 4px;
  }
  .auth-btn:hover { opacity: 0.9; transform: scale(1.01); }
  .auth-error {
    color: var(--error); font-size: 0.78rem;
    margin-top: 10px; min-height: 1.2em;
  }

  /* ══════════════════════════════════════
     HEADER
  ══════════════════════════════════════ */
  header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border-color);
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; position: relative; z-index: 50;
  }

  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo-icon {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading); font-size: 0.85rem;
    font-weight: 800; color: #fff; letter-spacing: -0.01em;
  }
  .header-name {
    font-family: var(--font-heading); font-size: 1rem;
    font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .header-tag {
    font-size: 0.68rem; color: var(--muted);
    background: var(--hover-bg); border: 1px solid var(--border-color);
    border-radius: 6px; padding: 2px 8px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .header-status { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.online {
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  #conn-label { color: var(--muted); }

  /* ══════════════════════════════════════
     LAYOUT
  ══════════════════════════════════════ */
  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar (desktop) ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--card-bg);
    border-right: 1px solid var(--border-color);
    display: flex; flex-direction: column;
    padding: 12px 8px;
    overflow: hidden;
  }

  .nav-section-title {
    font-size: 0.6rem; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--muted);
    padding: 0 8px; margin: 4px 0 6px;
    font-weight: 600;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    color: var(--text-secondary); cursor: pointer;
    font-size: 0.85rem; font-weight: 500;
    transition: all 0.18s; user-select: none;
    border: 1px solid transparent;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--hover-bg); color: var(--white); }
  .nav-item.active {
    background: rgba(241, 66, 11, 0.12);
    color: var(--white);
    border-color: rgba(241, 66, 11, 0.2);
  }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ── Content area ── */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; padding: 14px; }
  .panel.active { display: flex; }

  /* ══════════════════════════════════════
     TERMINAL PANEL
  ══════════════════════════════════════ */
  .terminal-chrome {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px 12px 0 0;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .chrome-dot { width: 10px; height: 10px; border-radius: 50%; }
  .chrome-dot-r { background: #ff5f56; }
  .chrome-dot-y { background: #ffbd2e; }
  .chrome-dot-g { background: #27c93f; }
  .terminal-title {
    margin-left: 8px; font-size: 0.72rem;
    color: var(--muted); font-family: var(--font-mono);
    flex: 1;
  }
  .ws-badge {
    font-size: 0.68rem; font-family: var(--font-mono);
    padding: 2px 8px; border-radius: 8px; font-weight: 600;
    background: rgba(239,68,68,0.15); color: var(--error);
  }
  .ws-badge.live {
    background: rgba(34,197,94,0.15); color: var(--success);
  }

  #terminal-output {
    flex: 1;
    background: #050508;
    border: 1px solid var(--border-color);
    border-top: none;
    border-bottom: none;
    padding: 12px 14px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.5;
    color: #a0e8b0;
    white-space: pre-wrap;
    word-break: break-all;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .terminal-input-bar {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 10px 12px;
    display: flex; gap: 8px; flex-shrink: 0;
  }
  .terminal-input-bar input {
    flex: 1; padding: 8px 12px;
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px; color: var(--text-primary);
    font-size: 0.85rem; font-family: var(--font-mono);
    outline: none; transition: border-color 0.2s;
  }
  .terminal-input-bar input:focus { border-color: var(--light-blue); }
  .terminal-input-bar button {
    padding: 8px 16px;
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    color: #fff; border: none; border-radius: 8px;
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .terminal-input-bar button:hover { opacity: 0.9; transform: scale(1.02); }

  /* ══════════════════════════════════════
     CHAT PANEL
  ══════════════════════════════════════ */
  #chat-messages {
    flex: 1; overflow-y: auto;
    padding: 10px 4px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .msg { display: flex; flex-direction: column; max-width: 82%; gap: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg.user .msg-row { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--dark-blue), var(--light-blue));
  }
  .msg.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    padding: 2px;
  }
  .msg-avatar-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; color: var(--light-blue);
  }

  .msg-bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 0.87rem; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--bright-orange), var(--orange));
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
    font-family: var(--font-mono); font-size: 0.8rem;
  }
  .msg-meta { font-size: 0.65rem; color: var(--muted); padding: 0 4px; }

  .chat-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 20px;
  }
  .chat-empty-orb {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    padding: 3px; animation: chatOrbGlow 3s ease-in-out infinite;
  }
  @keyframes chatOrbGlow {
    0%, 100% { box-shadow: 0 0 24px rgba(241,66,11,0.3); }
    50% { box-shadow: 0 0 32px rgba(42,147,193,0.4); }
  }
  .chat-empty-orb-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading); font-size: 1.5rem;
    font-weight: 800; color: var(--light-blue);
  }
  .chat-empty-name {
    font-family: var(--font-heading); font-size: 1.4rem;
    font-weight: 800; letter-spacing: 0.1em;
  }
  .chat-empty-tagline { color: var(--muted); font-size: 0.82rem; }

  .chat-loading { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 16px; }

  .chat-input-area {
    padding: 12px 4px 4px;
    border-top: 1px solid var(--border-color);
    flex-shrink: 0;
  }
  .chat-input-container {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 14px; padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .chat-input-container:focus-within { border-color: var(--light-blue); }
  .chat-input-field {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-primary); font-size: 0.9rem;
    font-family: var(--font-body); resize: none;
    min-height: 22px; max-height: 120px; line-height: 1.5;
  }
  .chat-input-field::placeholder { color: var(--muted); }
  .chat-submit {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--bright-orange), var(--light-blue));
    border: none; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s; flex-shrink: 0;
  }
  .chat-submit:hover { opacity: 0.9; transform: scale(1.05); }
  .chat-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .chat-submit svg { width: 16px; height: 16px; }

  /* ══════════════════════════════════════
     STATUS PANEL
  ══════════════════════════════════════ */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px; padding: 4px 0;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px; padding: 16px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: rgba(255,255,255,0.2); }
  .stat-label {
    font-size: 0.65rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 600; margin-bottom: 6px;
  }
  .stat-value { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
  .stat-value.ok { color: var(--success); }
  .stat-value.bad { color: var(--error); }
  .stat-value.dim { color: var(--muted); }
  .stat-value.accent { color: var(--light-blue); }

  .status-footer {
    margin-top: 14px; color: var(--muted); font-size: 0.75rem;
    display: flex; align-items: center; gap: 10px;
  }
  .refresh-btn {
    padding: 5px 12px;
    background: var(--hover-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px; color: var(--muted);
    cursor: pointer; font-size: 0.75rem;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--light-blue); color: var(--light-blue); }

  /* ══════════════════════════════════════
     MOBILE BOTTOM NAV
  ══════════════════════════════════════ */
  .mobile-nav {
    display: none;
    background: var(--card-bg);
    border-top: 1px solid var(--border-color);
    flex-shrink: 0; z-index: 60;
  }
  .mobile-nav-bar { display: flex; }
  .mobile-tab {
    flex: 1; padding: 10px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; color: var(--muted);
    font-size: 0.68rem; font-weight: 500;
    border-top: 2px solid transparent;
    transition: all 0.18s; user-select: none;
  }
  .mobile-tab.active { color: var(--bright-orange); border-top-color: var(--bright-orange); }
  .mobile-tab svg { width: 20px; height: 20px; }

  /* ══════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .mobile-nav { display: block; }
    header { padding: 8px 14px; }
    .header-tag { display: none; }
    .panel { padding: 8px; }
    .msg { max-width: 90%; }
    .status-grid { grid-template-columns: repeat(2, 1fr); }
    .terminal-input-bar input,
    .chat-input-field { font-size: 16px; } /* prevent iOS zoom */
    #terminal-output { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<!-- ═══ AUTH OVERLAY ═══ -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">W</div>
    <div class="auth-title grad-text">Witness</div>
    <div class="auth-subtitle">AI Civilization Portal</div>
    <div class="auth-field">
      <label for="token-input">Bearer Token</label>
      <input type="password" id="token-input" placeholder="Enter your token..." autocomplete="off">
    </div>
    <button class="auth-btn" id="auth-btn">Connect to Witness</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="header-brand">
    <div class="header-logo-icon">W</div>
    <span class="header-name grad-text">Witness</span>
    <span class="header-tag">AI Civilization</span>
  </div>
  <div class="header-status">
    <div class="status-dot" id="conn-dot"></div>
    <span id="conn-label">Connecting...</span>
  </div>
</header>

<!-- ═══ MAIN BODY ═══ -->
<div class="app-body">

  <!-- Sidebar navigation (desktop) -->
  <nav class="sidebar">
    <div class="nav-section-title">Navigation</div>

    <div class="nav-item active" data-panel="terminal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
      Terminal
    </div>
    <div class="nav-item" data-panel="chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Chat
    </div>
    <div class="nav-item" data-panel="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Status
    </div>
  </nav>

  <!-- Content panels -->
  <div class="content">

    <!-- ─── TERMINAL ─── -->
    <div class="panel active" id="panel-terminal">
      <div class="terminal-chrome">
        <span class="chrome-dot chrome-dot-r"></span>
        <span class="chrome-dot chrome-dot-y"></span>
        <span class="chrome-dot chrome-dot-g"></span>
        <span class="terminal-title" style="font-family:var(--font-mono)">witness-primary</span>
        <span class="ws-badge" id="ws-status">disconnected</span>
      </div>
      <div id="terminal-output">Connecting to terminal stream...</div>
      <div class="terminal-input-bar">
        <input type="text" id="term-input" placeholder="Send command..." autocomplete="off">
        <button id="term-send-btn">Send</button>
      </div>
    </div>

    <!-- ─── CHAT ─── -->
    <div class="panel" id="panel-chat">
      <div id="chat-messages">
        <div class="chat-empty" id="chat-empty-state">
          <div class="chat-empty-orb">
            <div class="chat-empty-orb-inner">W</div>
          </div>
          <div class="chat-empty-name grad-text">Witness</div>
          <div class="chat-empty-tagline">AI Civilization — ready to help</div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-container">
          <textarea class="chat-input-field" id="chat-input" rows="1"
            placeholder="Message Witness..."></textarea>
          <button class="chat-submit" id="send-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ─── STATUS ─── -->
    <div class="panel" id="panel-status">
      <div class="status-grid" id="status-grid">
        <div class="stat-card">
          <div class="stat-label">Loading</div>
          <div class="stat-value dim">—</div>
        </div>
      </div>
      <div class="status-footer">
        Auto-refresh every 30s
        <button class="refresh-btn" id="refresh-btn">Refresh Now</button>
      </div>
    </div>

  </div><!-- end .content -->
</div><!-- end .app-body -->

<!-- ═══ MOBILE BOTTOM NAV ═══ -->
<div class="mobile-nav">
  <div class="mobile-nav-bar">
    <div class="mobile-tab active" data-panel="terminal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
      Terminal
    </div>
    <div class="mobile-tab" data-panel="chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Chat
    </div>
    <div class="mobile-tab" data-panel="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Status
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── State ──
  var token = '';
  var termWs = null;
  var chatWs = null;
  var wsReconnectTimeout = null;
  var chatWsReconnectTimeout = null;
  var statusInterval = null;
  var activePanel = 'terminal';
  var chatLoaded = false;
  var knownMsgIds = new Set();

  // ── Elements ──
  var overlay     = document.getElementById('auth-overlay');
  var tokenInput  = document.getElementById('token-input');
  var authBtn     = document.getElementById('auth-btn');
  var authError   = document.getElementById('auth-error');
  var connDot     = document.getElementById('conn-dot');
  var connLabel   = document.getElementById('conn-label');
  var wsStatusEl  = document.getElementById('ws-status');
  var termEl      = document.getElementById('terminal-output');
  var chatMessages = document.getElementById('chat-messages');
  var chatInput   = document.getElementById('chat-input');
  var sendBtn     = document.getElementById('send-btn');
  var statusGrid  = document.getElementById('status-grid');

  // ── URL token magic link ──
  var urlParams = new URLSearchParams(window.location.search);
  var urlToken  = urlParams.get('token');
  if (urlToken) {
    tokenInput.value = urlToken;
    history.replaceState(null, '', window.location.pathname);
  }

  // ══════════════════════════════════════
  // AUTH
  // ══════════════════════════════════════
  function doAuth() {
    var t = tokenInput.value.trim();
    if (!t) { authError.textContent = 'Enter your bearer token.'; return; }
    authBtn.textContent = 'Connecting...';
    authBtn.disabled = true;
    fetch('/api/status', { headers: { Authorization: 'Bearer ' + t } })
      .then(function (r) {
        if (r.status === 401) throw new Error('Invalid token');
        if (!r.ok) throw new Error('Server error ' + r.status);
        return r.json();
      })
      .then(function () {
        token = t;
        localStorage.setItem('portal_token', t);
        overlay.style.display = 'none';
        boot();
      })
      .catch(function (e) {
        authError.textContent = e.message;
        authBtn.textContent = 'Connect to Witness';
        authBtn.disabled = false;
      });
  }

  authBtn.addEventListener('click', doAuth);
  tokenInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') doAuth(); });

  // Auto-login from localStorage or URL param
  var saved = localStorage.getItem('portal_token');
  if (saved) {
    tokenInput.value = saved;
    if (urlToken) {
      token = urlToken;
      overlay.style.display = 'none';
      boot();
    } else {
      doAuth();
    }
  } else if (urlToken) {
    doAuth();
  }

  // ══════════════════════════════════════
  // NAVIGATION
  // ══════════════════════════════════════
  function switchPanel(panel) {
    if (panel === activePanel) return;
    document.querySelectorAll('.nav-item, .mobile-tab').forEach(function (el) {
      el.classList.toggle('active', el.dataset.panel === panel);
    });
    document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
    document.getElementById('panel-' + panel).classList.add('active');
    activePanel = panel;
    if (panel === 'status') loadStatus();
    if (panel === 'chat' && !chatLoaded) loadChatHistory();
    if (panel === 'terminal' && !termWs) connectTerminalWS();
  }

  document.querySelectorAll('.nav-item, .mobile-tab').forEach(function (el) {
    el.addEventListener('click', function () { switchPanel(el.dataset.panel); });
  });

  // ══════════════════════════════════════
  // BOOT
  // ══════════════════════════════════════
  function boot() {
    connectTerminalWS();
    connectChatWS();
    loadStatus();
    statusInterval = setInterval(loadStatus, 30000);
    document.getElementById('refresh-btn').addEventListener('click', loadStatus);

    document.getElementById('send-btn').addEventListener('click', sendChat);
    chatInput.addEventListener('input', autoResizeTextarea);
    chatInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });

    document.getElementById('term-send-btn').addEventListener('click', sendTerminal);
    document.getElementById('term-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTerminal(); }
    });
  }

  function autoResizeTextarea() {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  }

  // ══════════════════════════════════════
  // CONNECTION STATUS
  // ══════════════════════════════════════
  function setConnected(connected) {
    wsStatusEl.textContent = connected ? 'live' : 'disconnected';
    wsStatusEl.className = 'ws-badge' + (connected ? ' live' : '');
    connDot.className = 'status-dot' + (connected ? ' online' : '');
    connLabel.textContent = connected ? 'Online' : 'Offline';
  }

  // ══════════════════════════════════════
  // TERMINAL WEBSOCKET
  // ══════════════════════════════════════
  function connectTerminalWS() {
    if (termWs) termWs.close();
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    termWs = new WebSocket(proto + '//' + location.host + '/ws/terminal?token=' + encodeURIComponent(token));
    termWs.onopen = function () {
      setConnected(true);
      if (wsReconnectTimeout) { clearTimeout(wsReconnectTimeout); wsReconnectTimeout = null; }
    };
    termWs.onmessage = function (e) {
      var lines = e.data.replace(/\s+$/, '').split('\n');
      while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
      termEl.textContent = lines.join('\n');
      termEl.scrollTop = termEl.scrollHeight;
    };
    termWs.onclose = function () {
      setConnected(false);
      termWs = null;
      wsReconnectTimeout = setTimeout(function () { if (token) connectTerminalWS(); }, 3000);
    };
    termWs.onerror = function () { setConnected(false); };
  }

  // ══════════════════════════════════════
  // TERMINAL SEND
  // ══════════════════════════════════════
  function sendTerminal() {
    var input = document.getElementById('term-input');
    var msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    fetch('/api/chat/send', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    }).catch(function () {});
    input.focus();
  }

  // ══════════════════════════════════════
  // CHAT
  // ══════════════════════════════════════
  function formatTime(ts) {
    var d = new Date(ts * 1000);
    var h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' : '') + m + ampm;
  }

  function addMessage(text, role, ts, id) {
    var msgId = id || ('local-' + Date.now() + '-' + Math.random());
    if (knownMsgIds.has(msgId)) return;
    knownMsgIds.add(msgId);

    // Remove empty/welcome state
    var empty = document.getElementById('chat-empty-state');
    if (empty) empty.remove();
    var placeholder = chatMessages.querySelector('.chat-loading');
    if (placeholder) placeholder.remove();

    var displayText = text.length > 4000 ? text.substring(0, 4000) + '\n\n... [truncated]' : text;
    var timeStr = ts ? formatTime(ts) : formatTime(Math.floor(Date.now() / 1000));

    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.setAttribute('data-id', msgId);

    // Avatar + bubble row
    var row = document.createElement('div');
    row.className = 'msg-row';

    var avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    if (role === 'assistant') {
      var inner = document.createElement('div');
      inner.className = 'msg-avatar-inner';
      inner.textContent = 'W';
      avatar.appendChild(inner);
    } else {
      avatar.textContent = 'C';
    }

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = displayText;

    row.appendChild(avatar);
    row.appendChild(bubble);

    var meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = (role === 'user' ? 'Corey' : 'Witness') + ' · ' + timeStr;

    div.appendChild(row);
    div.appendChild(meta);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function loadChatHistory() {
    chatLoaded = true;
    var empty = document.getElementById('chat-empty-state');
    if (empty) empty.remove();
    chatMessages.innerHTML = '<div class="chat-loading">Loading history...</div>';

    fetch('/api/chat/history?last=100', { headers: { Authorization: 'Bearer ' + token } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        chatMessages.innerHTML = '';
        if (data.messages && data.messages.length > 0) {
          data.messages.forEach(function (m) {
            addMessage(m.text, m.role, m.timestamp, m.id);
          });
        } else {
          chatMessages.innerHTML = '<div class="chat-loading">No messages yet. Start a conversation!</div>';
        }
      })
      .catch(function (e) {
        chatMessages.innerHTML = '<div class="chat-loading">Error loading history: ' + e.message + '</div>';
      });
  }

  // ── Chat WebSocket (real-time new messages) ──
  function connectChatWS() {
    if (chatWs) chatWs.close();
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    chatWs = new WebSocket(proto + '//' + location.host + '/ws/chat?token=' + encodeURIComponent(token));
    chatWs.onopen = function () {
      if (chatWsReconnectTimeout) { clearTimeout(chatWsReconnectTimeout); chatWsReconnectTimeout = null; }
    };
    chatWs.onmessage = function (e) {
      try {
        var msg = JSON.parse(e.data);
        addMessage(msg.text, msg.role, msg.timestamp, msg.id);
      } catch (err) {}
    };
    chatWs.onclose = function () {
      chatWs = null;
      chatWsReconnectTimeout = setTimeout(function () { if (token) connectChatWS(); }, 3000);
    };
    chatWs.onerror = function () {};
  }

  // ── Chat Send ──
  function sendChat() {
    var msg = chatInput.value.trim();
    if (!msg || sendBtn.disabled) return;
    chatInput.value = '';
    chatInput.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(msg, 'user', Math.floor(Date.now() / 1000), 'local-' + Date.now());

    fetch('/api/chat/send', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) addMessage('Error: ' + data.error, 'assistant', null, 'err-' + Date.now());
      })
      .catch(function (e) {
        addMessage('Network error: ' + e.message, 'assistant', null, 'err-' + Date.now());
      })
      .finally(function () { sendBtn.disabled = false; chatInput.focus(); });
  }

  // ══════════════════════════════════════
  // STATUS
  // ══════════════════════════════════════
  function fmtUptime(s) {
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm ' + (s % 60) + 's';
  }

  function statCard(label, value, cls) {
    return '<div class="stat-card">'
      + '<div class="stat-label">' + label + '</div>'
      + '<div class="stat-value ' + (cls || '') + '">' + value + '</div>'
      + '</div>';
  }

  function loadStatus() {
    fetch('/api/status', { headers: { Authorization: 'Bearer ' + token } })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        statusGrid.innerHTML =
          statCard('CIV Name', d.civ || '—', 'accent') +
          statCard('Uptime', fmtUptime(d.uptime || 0)) +
          statCard('tmux', d.tmux_alive ? 'Active' : 'Dead', d.tmux_alive ? 'ok' : 'bad') +
          statCard('Claude', d.claude_running ? 'Running' : 'Stopped', d.claude_running ? 'ok' : 'bad') +
          statCard('TG Bot', d.tg_bot_running ? 'Running' : 'Stopped', d.tg_bot_running ? 'ok' : 'bad') +
          statCard('Session', d.tmux_session || '—', 'dim');
      })
      .catch(function (e) {
        statusGrid.innerHTML = statCard('Error', e.message, 'bad');
      });
  }

})();
</script>
</body>
</html>
