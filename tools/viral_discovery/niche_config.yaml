    # Marketing Twitter accounts
    - adage
    - MarketingWeek
    - Adweek
    - diaboromon

# Engagement thresholds (minimum to consider "viral" or worth tracking)
engagement_thresholds:
  linkedin:
    reactions: 100        # 100+ reactions = notable post
    comments: 25          # 25+ comments = discussion-worthy
    viral_reactions: 500  # 500+ = viral territory

  twitter:
    retweets: 50          # 50+ RTs = gaining traction
    likes: 100            # 100+ likes = notable
    viral_retweets: 200   # 200+ = viral

  reddit:
    upvotes: 100          # 100+ upvotes = hot discussion
    comments: 50          # 50+ comments = active thread
    viral_upvotes: 500    # 500+ = trending

  tiktok:
    views: 10000          # 10K views minimum
    likes: 1000           # 1K likes = engaging
    viral_views: 100000   # 100K = viral

  instagram:
    likes: 500            # 500+ likes = notable
    comments: 50          # 50+ comments = engaging
    viral_likes: 5000     # 5K+ = viral

# Relevance scoring weights
scoring:
  # How relevant to our ICPs (0-100)
  keyword_match: 30       # Contains our keywords
  engagement_level: 25    # Engagement metrics
  recency: 20             # How recent
  author_relevance: 15    # Is author a target ICP?
  brand_mention: 10       # Mentions brands we care about

# Content categories to tag
categories:
  - product_launch
  - brand_activation
  - experiential_campaign
  - sampling_giveaway
  - influencer_collab
  - retail_partnership
  - industry_trend
  - thought_leadership
  - competitor_activity
  - case_study

# Negative keywords (filter out irrelevant content)
exclude_keywords:
  - hiring
  - job posting
  - we're hiring
  - join our team
  - career
  - MLM
  - crypto
  - NFT
  - dropshipping
