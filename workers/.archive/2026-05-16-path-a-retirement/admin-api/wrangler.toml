name = "admin-api"
main = "src/worker.js"
compatibility_date = "2026-01-01"

[[d1_databases]]
binding = "DB"
database_name = "purebrain-social"
database_id = "625dde70-0a60-45e7-bf81-e18e5ac4d854"

# Phase 5 — Service Binding to clients-api for session validation bridge
# (cf-service-binding-pattern skill, constitutional 2026-05-07)
[[services]]
binding = "CLIENTS_API"
service = "clients-api"

[vars]
CORS_ORIGINS = "https://purebrain.ai,https://portal.purebrain.ai,https://777.purebrain.ai"
MAGIC_LINK_ENABLED = "false"  # Kill switch — default off, flip "true" at deploy decision time
MAGIC_LINK_TTL_DAYS = "7"      # Default invite TTL
SESSION_TTL_DAYS = "30"         # Session lifetime on exchange
