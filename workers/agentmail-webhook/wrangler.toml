name = "agentmail-webhook"
main = "src/worker.js"
compatibility_date = "2026-01-01"

[[d1_databases]]
binding = "DB"
database_name = "purebrain-social"
database_id = "625dde70-0a60-45e7-bf81-e18e5ac4d854"

[vars]
WELCOME_EMAIL_URL = "https://welcome-email-api.in0v8.workers.dev"
TELEGRAM_CHAT_ID = "548906264"
DOMAIN_REWRITE_FROM = ".ai-civ.com"
DOMAIN_REWRITE_TO = ".app.purebrain.ai"

# Secrets (set via wrangler secret put):
#   AGENTMAIL_WEBHOOK_SECRET - shared secret from AgentMail webhook config
#   ADMIN_TOKEN              - bearer token for admin endpoints
#   TELEGRAM_BOT_TOKEN       - Telegram bot token for notifications
