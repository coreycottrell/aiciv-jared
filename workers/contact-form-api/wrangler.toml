name = "contact-form-api"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Proxies POST /api/contact submissions to Brevo transactional API.
# Brevo API key stored as a secret (never in HTML / git):
#   wrangler secret put BREVO_API_KEY --name contact-form-api
#
# Allowed origins (CORS-bound — origin IS the auth boundary for the form):
[vars]
ALLOWED_ORIGINS = "https://purebrain.ai,https://www.purebrain.ai,https://staging.purebrain.ai"
TO_EMAIL = "support@puremarketing.ai"
SENDER_EMAIL = "purebrain@puremarketing.ai"
SENDER_NAME = "PureBrain Contact Form"

# Bind to public route via dashboard after deploy:
#   purebrain.ai/api/contact/* → contact-form-api
# Or expose at *.workers.dev and call from contact-us page.
