name = "disk-telemetry-ingest"
main = "src/worker.js"
compatibility_date = "2026-05-15"

# D1: dedicated disk-telemetry database
# database_id is a PLACEHOLDER. Aether will substitute the real ID after
# `wrangler d1 create disk-telemetry` returns. DO NOT deploy with placeholder.
[[d1_databases]]
binding = "DB"
database_name = "disk-telemetry"
database_id = "<DISK_TELEMETRY_DB_ID>"

[vars]
# No public vars. INGEST_TOKEN, INGEST_TOKEN_PREVIOUS, ADMIN_TOKEN are set via:
#   wrangler secret put INGEST_TOKEN
#   wrangler secret put INGEST_TOKEN_PREVIOUS   (optional, during rotation)
#   wrangler secret put ADMIN_TOKEN
