name = "onboarding-capture-proxy"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Server-side proxy to A-C-Gee's Fork Awakening conversation-capture API.
# Holds ACGEE_API_KEY as a wrangler secret so it never appears in browser HTML.
#
# Set the secret with:
#   wrangler secret put ACGEE_API_KEY --name onboarding-capture-proxy
#
[vars]
ALLOWED_ORIGINS = "https://purebrain.ai,https://www.purebrain.ai,https://staging.purebrain.ai"
UPSTREAM_URL = "https://sageandweaver-network.netlify.app/api/capture-proxy"
