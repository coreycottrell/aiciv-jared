name = "paypal-webhook"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "purebrain-social"
database_id = "625dde70-0a60-45e7-bf81-e18e5ac4d854"

# Service Binding to referrals-api (replaces HTTP + admin token)
[[services]]
binding = "REFERRALS_API"
service = "referrals-api"

# P1.5 — Service Binding to clients-api for client-row mutations
# (cf-service-binding-pattern skill, constitutional 2026-05-07).
# Replaces direct env.DB writes against purebrain-social.clients.
# DB binding above stays during P1.5 — paypal_events still writes there
# (CTO Option B). DB removal happens in P1.8 alongside DROP.
# INTERNAL_BINDING_SECRET MUST be set via `wrangler secret put` BEFORE deploy
# (same value as on clients-api / admin-api / social-api / agentmail-webhook).
[[services]]
binding = "CLIENTS_API"
service = "clients-api"

[vars]
# Set WEBHOOK_SECRET via wrangler secret put WEBHOOK_SECRET
# This should match the Webhook ID from PayPal developer dashboard
