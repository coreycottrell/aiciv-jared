name = "paypal-webhook"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "purebrain-social"
database_id = "625dde70-0a60-45e7-bf81-e18e5ac4d854"

# Service Binding to referrals-api (replaces HTTP + admin token)
[[services]]
binding = "REFERRALS_API"
service = "referrals-api"

[vars]
# Set WEBHOOK_SECRET via wrangler secret put WEBHOOK_SECRET
# This should match the Webhook ID from PayPal developer dashboard
