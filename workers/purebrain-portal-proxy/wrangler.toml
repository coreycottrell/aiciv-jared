name = "purebrain-portal-proxy"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Route is already configured on zone purebrain.ai:
#   *.purebrain.ai/* -> purebrain-portal-proxy
# No [[routes]] block here — we're overwriting the existing script in place,
# not re-registering the route (which would cause conflicts).

# Phase 7a — Service Binding to clients-api for canary cutover of
# /api/admin/clients/* and /api/login (5% canary by deterministic hash).
# Header X-Use-Clients-API is injected server-side here, not by the browser.
# Rollback: set CANARY_PERCENT to "0" in src/worker.js — single-constant change.
[[services]]
binding = "CLIENTS_API"
service = "clients-api"

# Phase 7c — Service Binding to social-api for /api/login.
# Preserves cf-connecting-ip across Worker→Worker hop (per Cloudflare
# service-binding semantics). Fixes login rate-limit collapse from
# outbound fetch() globally bucketing all portal logins as "unknown" IP.
# Constitutional pattern: feedback_cf_service_binding_pattern.md
[[services]]
binding = "SOCIAL_API"
service = "social-api"

# Day 2 Track D — Service Binding to referrals-api for shadow-auth
# instrumentation. Used by validateLeaderSessionShadow() to dual-call the
# new /internal/validate-session that Track B adds. ZERO behavior impact
# while the shadow gate is open: every shadow result is logged and the
# legacy social-api result is ALWAYS honored for the actual auth decision.
#
# Day 3 cutover will flip the dependency direction: portal-proxy will call
# REFERRALS_API for the real auth check on /api/admin/referral/* and friends,
# at which point Track B's /internal/validate-session is the canonical path.
[[services]]
binding = "REFERRALS_API"
service = "referrals-api"

# Day 3 cutover gate (per Chy spec 2026-05-15). Flip to "true" to make
# portal-proxy honor the new per-dashboard auth path (clients-api or
# referrals-api) for /api/admin/clients/* and /api/admin/referral/* routes.
# Default "false" = legacy social-api auth (Day 2 behavior). Kill switch:
# flip back to "false" → instant rollback, no code deploy required.
[vars]
SHADOW_AUTH_ENABLED = "false"
