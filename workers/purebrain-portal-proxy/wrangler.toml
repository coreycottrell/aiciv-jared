name = "purebrain-portal-proxy"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Route is already configured on zone purebrain.ai:
#   *.purebrain.ai/* -> purebrain-portal-proxy
# No [[routes]] block here — we're overwriting the existing script in place,
# not re-registering the route (which would cause conflicts).

# Phase 7a — Service Binding to clients-api for canary cutover of
# /api/admin/clients/* and /api/login (5% canary by deterministic hash).
# Header X-Use-Clients-API is injected server-side here, not by the browser.
# Rollback: set CANARY_PERCENT to "0" in src/worker.js — single-constant change.
[[services]]
binding = "CLIENTS_API"
service = "clients-api"
