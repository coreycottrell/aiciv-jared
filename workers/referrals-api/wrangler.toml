name = "referrals-api"
main = "src/worker.js"
compatibility_date = "2026-01-01"

[[d1_databases]]
binding = "DB"
database_name = "purebrain-referrals"
database_id = "cdd9a522-f947-42a6-b9a3-c30534e02c3f"

[vars]
# Admin endpoints require X-Admin-Token header matching one of these
# (comma-separated). Set via `wrangler secret put ADMIN_TOKENS` in prod.
ADMIN_TOKENS_HINT = "set-via-secret"

# SPEC E1 / CTO Q2: Support Tier 25% commission detection.
# Comma-separated PayPal Plan IDs that map to Support Tier subscriptions.
# Worker checks this allowlist on commission write — match → commission_source='support_tier'
# and commission rate is overridden to 25% regardless of partner_tier.
# Set via `wrangler secret put SUPPORT_TIER_PLAN_IDS` in prod (or as plain var below).
# Empty default = no plans treated as Support Tier until explicitly configured.
SUPPORT_TIER_PLAN_IDS = ""
