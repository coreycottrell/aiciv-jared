name = "trio-comms"
main = "src/worker.js"
compatibility_date = "2026-01-01"

[[d1_databases]]
binding = "DB"
database_name = "purebrain-referrals"
database_id = "cdd9a522-f947-42a6-b9a3-c30534e02c3f"

# R2 binding for attachments (rooms/{room_id}/{ts}-{client_msg_id}-{filename})
# Reuses existing purebrain-uploads bucket per CTO Decision 1 (2026-05-12).
# All reads via Worker /media/{key} proxy — NEVER *.r2.dev (constitutional).
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "purebrain-uploads"

# Service binding to social-api for human session validation (Phase 1 Day 3
# dual-auth: AI bearer tokens OR human portal session cookie).
# Same pattern as purebrain-portal-proxy → social-api /internal/validate-session.
[[services]]
binding = "SOCIAL_API"
service = "social-api"
